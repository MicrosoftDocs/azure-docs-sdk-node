  - name: getAll
    uid: '@azure/arm-alertsmanagement.AlertsOperations.getAll'
    package: '@azure/arm-alertsmanagement'
    summary: >-
      List all existing alerts, where the results can be filtered on the basis
      of multiple parameters (e.g. time range). The results can then be sorted
      on the basis specific fields, with the default being lastModifiedDateTime.
    fullName: getAll
    remarks: ''
    isDeprecated: false
    syntax:
      content: >-
        getAll: (scope: string, options?: AlertsGetAllOptionalParams) =>
