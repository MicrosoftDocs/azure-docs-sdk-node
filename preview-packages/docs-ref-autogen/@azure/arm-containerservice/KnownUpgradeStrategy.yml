name: KnownUpgradeStrategy
uid: '@azure/arm-containerservice.KnownUpgradeStrategy'
package: '@azure/arm-containerservice'
summary: Defines the upgrade strategy for the agent pool. The default is Rolling.
fullName: KnownUpgradeStrategy
remarks: ''
isDeprecated: false
fields:
  - name: BlueGreen
    uid: '@azure/arm-containerservice.KnownUpgradeStrategy.BlueGreen'
    package: '@azure/arm-containerservice'
    summary: Specifies that the agent pool will conduct blue-green upgrade.
  - name: Rolling
    uid: '@azure/arm-containerservice.KnownUpgradeStrategy.Rolling'
    package: '@azure/arm-containerservice'
    summary: >-
      Specifies that the agent pool will conduct rolling upgrade. This is the
      default upgrade strategy.
