### YamlMime:TSTypeAlias
name: AgentDeploymentType
uid: '@azure/arm-cognitiveservices.AgentDeploymentType'
package: '@azure/arm-cognitiveservices'
summary: >-
  Specifies the type of deployment for an agent, indicating how the underlying
  compute and network infrastructure is managed. \

  [KnownAgentDeploymentType](xref:@azure/arm-cognitiveservices.KnownAgentDeploymentType)
  can be used interchangeably with AgentDeploymentType,
   this enum contains the known values that the service supports.
  ### Known values supported by the service

  **Managed**: The underlying infra is managed by the platform in the deployer's
  subscription \

  **Hosted**: The underlying infra is owned by the platform \

  **Custom**: The underlying infra is provisioned by the deployer (BYO)
fullName: AgentDeploymentType
remarks: ''
isDeprecated: false
syntax: |
  type AgentDeploymentType = string
