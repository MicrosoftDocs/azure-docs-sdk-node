### YamlMime:TSTypeAlias
name: IdentityType
uid: '@azure/arm-sql.IdentityType'
package: '@azure/arm-sql'
summary: >-
  The identity type. Set this to 'SystemAssigned' in order to automatically
  create and assign an Azure Active Directory principal for the resource. \

  [KnownIdentityType](xref:@azure/arm-sql.KnownIdentityType) can be used
  interchangeably with IdentityType,
   this enum contains the known values that the service supports.
  ### Known values supported by the service

  **None**: None \

  **SystemAssigned**: SystemAssigned \

  **UserAssigned**: UserAssigned \

  **SystemAssigned,UserAssigned**: SystemAssigned,UserAssigned
fullName: IdentityType
remarks: ''
isDeprecated: false
syntax: |
  type IdentityType = string
