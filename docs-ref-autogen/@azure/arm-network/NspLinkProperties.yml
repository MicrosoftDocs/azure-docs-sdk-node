### YamlMime:TSType
name: NspLinkProperties
uid: '@azure/arm-network.NspLinkProperties'
package: '@azure/arm-network'
summary: Properties of NSP Link resource.
fullName: NspLinkProperties
remarks: ''
isDeprecated: false
type: interface
properties:
  - name: autoApprovedRemotePerimeterResourceId
    uid: '@azure/arm-network.NspLinkProperties.autoApprovedRemotePerimeterResourceId'
    package: '@azure/arm-network'
    summary: >-
      Perimeter ARM Id for the remote NSP with which the link gets created in
      Auto-approval mode. It should be used when the NSP admin have
      Microsoft.Network/networkSecurityPerimeters/linkPerimeter/action
      permission on the remote NSP resource.
    fullName: autoApprovedRemotePerimeterResourceId
    remarks: ''
    isDeprecated: false
    syntax:
      content: 'autoApprovedRemotePerimeterResourceId?: string'
      return:
        description: ''
        type: string
  - name: description
    uid: '@azure/arm-network.NspLinkProperties.description'
    package: '@azure/arm-network'
    summary: >-
      A message passed to the owner of the remote NSP link resource with this
      connection request. In case of Auto-approved flow, it is default to 'Auto
      Approved'. Restricted to 140 chars.
    fullName: description
    remarks: ''
    isDeprecated: false
    syntax:
      content: 'description?: string'
      return:
        description: ''
        type: string
  - name: localInboundProfiles
    uid: '@azure/arm-network.NspLinkProperties.localInboundProfiles'
    package: '@azure/arm-network'
    summary: >-
      Local Inbound profile names to which Inbound is allowed. Use ['*'] to
      allow inbound to all profiles.
    fullName: localInboundProfiles
    remarks: ''
    isDeprecated: false
    syntax:
      content: 'localInboundProfiles?: string[]'
      return:
        description: ''
        type: string[]
  - name: localOutboundProfiles
    uid: '@azure/arm-network.NspLinkProperties.localOutboundProfiles'
    package: '@azure/arm-network'
    summary: >-
      Local Outbound profile names from which Outbound is allowed. In current
      version, it is readonly property and it's value is set to ['*'] to allow
      outbound from all profiles. In later version, user will be able to modify
      it.
    fullName: localOutboundProfiles
    remarks: ''
    isDeprecated: false
    syntax:
      content: 'localOutboundProfiles?: string[]'
      return:
        description: ''
        type: string[]
  - name: provisioningState
    uid: '@azure/arm-network.NspLinkProperties.provisioningState'
    package: '@azure/arm-network'
    summary: The provisioning state of the NSP Link resource.
    fullName: provisioningState
    remarks: ''
    isDeprecated: false
    syntax:
      content: 'provisioningState?: string'
      return:
        description: ''
        type: string
  - name: remoteInboundProfiles
    uid: '@azure/arm-network.NspLinkProperties.remoteInboundProfiles'
    package: '@azure/arm-network'
    summary: >-
      Remote Inbound profile names to which Inbound is allowed. Use ['*'] to
      allow inbound to all profiles. This property can only be updated in
      auto-approval mode.
    fullName: remoteInboundProfiles
    remarks: ''
    isDeprecated: false
    syntax:
      content: 'remoteInboundProfiles?: string[]'
      return:
        description: ''
        type: string[]
  - name: remoteOutboundProfiles
    uid: '@azure/arm-network.NspLinkProperties.remoteOutboundProfiles'
    package: '@azure/arm-network'
    summary: >-
      Remote Outbound profile names from which Outbound is allowed. In current
      version, it is readonly property and it's value is set to ['*'] to allow
      outbound from all profiles. In later version, user will be able to modify
      it.
    fullName: remoteOutboundProfiles
    remarks: ''
    isDeprecated: false
    syntax:
      content: 'remoteOutboundProfiles?: string[]'
      return:
        description: ''
        type: string[]
