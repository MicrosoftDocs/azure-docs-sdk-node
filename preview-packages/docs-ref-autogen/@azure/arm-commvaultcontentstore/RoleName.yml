### YamlMime:TSTypeAlias
name: RoleName
uid: '@azure/arm-commvaultcontentstore.RoleName'
package: '@azure/arm-commvaultcontentstore'
summary: >-
  Supported Commvault role names \

  [KnownRoleName](xref:@azure/arm-commvaultcontentstore.KnownRoleName) can be
  used interchangeably with RoleName,
   this enum contains the known values that the service supports.
  ### Known values supported by the service

  **BackupAdmin**: Backup Administrator - full access to all resources \

  **BackupOperator**: Backup Operator - can manage resources but cannot delete
  storage or plans \

  **BackupUser**: Backup User - can manage protection groups, read-only on plans
  and storage \

  **SecurityAdmin**: Security Administrator - can manage CCA enrollment and user
  management \

  **MultiPersonAuthorization**: MPA Administrator - can authorize critical
  operations protected by MPA
fullName: RoleName
remarks: ''
isDeprecated: false
syntax: |
  type RoleName = string
