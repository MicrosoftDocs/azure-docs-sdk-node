name: VirtualMachineIsolateEmulatorThread
uid: '@azure/arm-networkcloud.VirtualMachineIsolateEmulatorThread'
package: '@azure/arm-networkcloud'
summary: >-
  Field Deprecated, the value will be ignored if provided. The indicator of
  whether one of the specified CPU cores is isolated to run the emulator thread
  for this virtual machine. \

  [KnownVirtualMachineIsolateEmulatorThread](xref:@azure/arm-networkcloud.KnownVirtualMachineIsolateEmulatorThread)
  can be used interchangeably with VirtualMachineIsolateEmulatorThread,
   this enum contains the known values that the service supports.
  ### Known values supported by the service

  **False**: Do not isolate the emulator thread. \

  **True**: Isolate the emulator thread.
