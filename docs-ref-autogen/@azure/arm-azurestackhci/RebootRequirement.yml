### YamlMime:TSTypeAlias
name: RebootRequirement
uid: '@azure/arm-azurestackhci.RebootRequirement'
package: '@azure/arm-azurestackhci'
summary: >-
  Indicates whether a reboot is required after the update or operation. Helps
  determine if a system restart is necessary to complete the process. \

  [KnownRebootRequirement](xref:@azure/arm-azurestackhci.KnownRebootRequirement)
  can be used interchangeably with RebootRequirement,
   this enum contains the known values that the service supports.
  ### Known values supported by the service

  **Unknown**: It is not known whether a reboot is required. \

  **True**: A reboot is required to complete the operation. \

  **False**: No reboot is required after the operation.
fullName: RebootRequirement
remarks: ''
isDeprecated: false
syntax: |
  type RebootRequirement = string
