name: NamespaceProvisioningState
uid: '@azure/arm-containerservice.NamespaceProvisioningState'
package: '@azure/arm-containerservice'
summary: >-
  The current provisioning state of the namespace. \

  [KnownNamespaceProvisioningState](xref:@azure/arm-containerservice.KnownNamespaceProvisioningState)
  can be used interchangeably with NamespaceProvisioningState,
   this enum contains the known values that the service supports.
  ### Known values supported by the service

  **Updating**: The namespace is being updated. \

  **Deleting**: The namespace is being deleted. \

  **Creating**: The namespace is being created. \

  **Succeeded**: The namespace provisioning succeeded. \

  **Failed**: The namespace provisioning failed. \

  **Canceled**: The namespace provisioning was canceled.
fullName: NamespaceProvisioningState
