name: ProvisioningSupport
uid: '@azure/arm-edgeorder.ProvisioningSupport'
package: '@azure/arm-edgeorder'
summary: >-
  Determining nature of provisioning that the configuration supports. \

  [KnownProvisioningSupport](xref:@azure/arm-edgeorder.KnownProvisioningSupport)
  can be used interchangeably with ProvisioningSupport,
   this enum contains the known values that the service supports.
  ### Known values supported by the service

  **CloudBased**: The configuration can be provisioned from the cloud. \

  **Manual**: The configuration need to be provisioned manually by the end user.
