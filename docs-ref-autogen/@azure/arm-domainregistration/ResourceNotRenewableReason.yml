### YamlMime:TSTypeAlias
name: ResourceNotRenewableReason
uid: '@azure/arm-domainregistration.ResourceNotRenewableReason'
package: '@azure/arm-domainregistration'
summary: >-
  Reasons why domain is not renewable. \

  [KnownResourceNotRenewableReason](xref:@azure/arm-domainregistration.KnownResourceNotRenewableReason)
  can be used interchangeably with ResourceNotRenewableReason,
   this enum contains the known values that the service supports.
  ### Known values supported by the service

  **RegistrationStatusNotSupportedForRenewal**: Registration status is not
  supported for renewal. \

  **ExpirationNotInRenewalTimeRange**: Domain expiration is not in the renewal
  time range. \

  **SubscriptionNotActive**: Subscription is not active.
fullName: ResourceNotRenewableReason
remarks: ''
isDeprecated: false
syntax: |
  type ResourceNotRenewableReason = string
