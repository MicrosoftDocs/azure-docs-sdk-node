name: AutoGeneratedDomainNameLabelScope
uid: '@azure/arm-cdn.AutoGeneratedDomainNameLabelScope'
package: '@azure/arm-cdn'
summary: >-
  Indicates the endpoint name reuse scope. The default value is TenantReuse. \

  [KnownAutoGeneratedDomainNameLabelScope](xref:@azure/arm-cdn.KnownAutoGeneratedDomainNameLabelScope)
  can be used interchangeably with AutoGeneratedDomainNameLabelScope,
   this enum contains the known values that the service supports.
  ### Known values supported by the service

  **TenantReuse** \

  **SubscriptionReuse** \

  **ResourceGroupReuse** \

  **NoReuse**
