### YamlMime:TSEnum
name: KnownRaiEgressRuleActionType
uid: '@azure/arm-cognitiveservices.KnownRaiEgressRuleActionType'
package: '@azure/arm-cognitiveservices'
summary: The kind of action an egress rule takes when it matches.
fullName: KnownRaiEgressRuleActionType
remarks: ''
isDeprecated: false
fields:
  - name: Allow
    uid: '@azure/arm-cognitiveservices.KnownRaiEgressRuleActionType.Allow'
    package: '@azure/arm-cognitiveservices'
    summary: Allow the matched traffic.
  - name: Deny
    uid: '@azure/arm-cognitiveservices.KnownRaiEgressRuleActionType.Deny'
    package: '@azure/arm-cognitiveservices'
    summary: Deny the matched traffic.
  - name: Rewrite
    uid: '@azure/arm-cognitiveservices.KnownRaiEgressRuleActionType.Rewrite'
    package: '@azure/arm-cognitiveservices'
    summary: >-
      Redirect the matched traffic to a new destination, optionally applying
      header transforms. Requires a rewrite target.
  - name: Transform
    uid: '@azure/arm-cognitiveservices.KnownRaiEgressRuleActionType.Transform'
    package: '@azure/arm-cognitiveservices'
    summary: >-
      Forward the matched traffic after applying header transforms. Requires at
      least one header.
