name: ProvisioningState
uid: '@azure/arm-discovery.ProvisioningState'
package: '@azure/arm-discovery'
summary: >-
  The resource provisioning state. \

  [KnownProvisioningState](xref:@azure/arm-discovery.KnownProvisioningState) can
  be used interchangeably with ProvisioningState,
   this enum contains the known values that the service supports.
  ### Known values supported by the service

  **Succeeded**: Resource has been created. \

  **Failed**: Resource creation failed. \

  **Canceled**: Resource creation was canceled. \

  **Accepted**: The resource create request has been accepted \

  **Provisioning**: The resource is being provisioned \

  **Updating**: The resource is updating \

  **Deleting**: The resource is being deleted
fullName: ProvisioningState
