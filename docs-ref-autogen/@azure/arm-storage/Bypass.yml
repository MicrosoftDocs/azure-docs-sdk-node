### YamlMime:TSTypeAlias
name: Bypass
uid: '@azure/arm-storage.Bypass'
package: '@azure/arm-storage'
summary: >-
  Specifies whether traffic is bypassed for Logging/Metrics/AzureServices.
  Possible values are any combination of Logging|Metrics|AzureServices (For
  example, "Logging, Metrics"), or None to bypass none of those traffics. \

  [KnownBypass](xref:@azure/arm-storage.KnownBypass) can be used interchangeably
  with Bypass,
   this enum contains the known values that the service supports.
  ### Known values supported by the service

  **None** \

  **Logging** \

  **Metrics** \

  **AzureServices**
fullName: Bypass
remarks: ''
isDeprecated: false
syntax: |
  type Bypass = string
