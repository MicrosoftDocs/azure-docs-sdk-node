name: ProvisioningState
uid: '@azure/arm-webpubsub.ProvisioningState'
package: '@azure/arm-webpubsub'
summary: >-
  Provisioning state of the resource. \

  [KnownProvisioningState](xref:@azure/arm-webpubsub.KnownProvisioningState) can
  be used interchangeably with ProvisioningState,
   this enum contains the known values that the service supports.
  ### Known values supported by the service

  **Unknown**: Unknown provisioning state \

  **Succeeded**: Resource successfully provisioned \

  **Failed**: Resource provisioning failed \

  **Canceled**: Resource provisioning was canceled \

  **Running**: Resource provisioning is running \

  **Creating**: Resource is being created \

  **Updating**: Resource is being updated \

  **Deleting**: Resource is being deleted \

  **Moving**
fullName: ProvisioningState
