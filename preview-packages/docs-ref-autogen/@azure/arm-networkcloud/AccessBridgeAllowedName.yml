name: AccessBridgeAllowedName
uid: '@azure/arm-networkcloud.AccessBridgeAllowedName'
package: '@azure/arm-networkcloud'
summary: >-
  The allowed names for the access bridge. \

  [KnownAccessBridgeAllowedName](xref:@azure/arm-networkcloud.KnownAccessBridgeAllowedName)
  can be used interchangeably with AccessBridgeAllowedName,
   this enum contains the known values that the service supports.
  ### Known values supported by the service

  **Bastion**: The access bridge for bare metal machine bastion access. \

  **PrivateVault**: The access bridge for cluster access to private vault. \

  **StorageDashboard**: The access bridge for access to the storage dashboard.
