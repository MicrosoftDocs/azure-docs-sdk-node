### YamlMime:TSTypeAlias
name: ServiceUpdateAction
uid: '@azure/arm-network.ServiceUpdateAction'
package: '@azure/arm-network'
summary: >-
  Specifies the type of update operation to perform on services within the
  service gateway.


  - FullUpdate: Replaces all existing services with the new list provided in the
  request. Any previously defined services not included will be removed.

  - PartialUpdate: Updates only the specified services. \

  [KnownServiceUpdateAction](xref:@azure/arm-network.KnownServiceUpdateAction)
  can be used interchangeably with ServiceUpdateAction,
   this enum contains the known values that the service supports.
  ### Known values supported by the service

  **FullUpdate**: FullUpdate \

  **PartialUpdate**: PartialUpdate
fullName: ServiceUpdateAction
remarks: ''
isDeprecated: false
syntax: |
  type ServiceUpdateAction = string
