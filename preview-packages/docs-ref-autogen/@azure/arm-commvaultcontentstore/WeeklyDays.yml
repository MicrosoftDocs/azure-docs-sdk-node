name: WeeklyDays
uid: '@azure/arm-commvaultcontentstore.WeeklyDays'
package: '@azure/arm-commvaultcontentstore'
summary: >-
  To represent the days of the week in Weekly type \

  [KnownWeeklyDays](xref:@azure/arm-commvaultcontentstore.KnownWeeklyDays) can
  be used interchangeably with WeeklyDays,
   this enum contains the known values that the service supports.
  ### Known values supported by the service

  **SUNDAY**: First Day of the Week \

  **MONDAY**: Second Day of the Week \

  **TUESDAY**: Third Day of the Week \

  **WEDNESDAY**: Fourth Day of the Week \

  **THURSDAY**: Fifth Day of the Week \

  **FRIDAY**: Sixth Day of the Week \

  **SATURDAY**: Seventh Day of the Week
fullName: WeeklyDays
remarks: ''
isDeprecated: false
syntax: |
  type WeeklyDays = string
