### YamlMime:TSTypeAlias
name: AgentPoolMode
uid: '@azure/arm-networkcloud.AgentPoolMode'
package: '@azure/arm-networkcloud'
summary: >-
  The selection of how this agent pool is utilized, either as a system pool or a
  user pool. System pools run the features and critical services for the
  Kubernetes Cluster, while user pools are dedicated to user workloads. Every
  Kubernetes cluster must contain at least one system node pool with at least
  one node. \

  [KnownAgentPoolMode](xref:@azure/arm-networkcloud.KnownAgentPoolMode) can be
  used interchangeably with AgentPoolMode,
   this enum contains the known values that the service supports.
  ### Known values supported by the service

  **System**: System agent pool \

  **User**: User agent pool \

  **NotApplicable**: Not applicable
fullName: AgentPoolMode
remarks: ''
isDeprecated: false
syntax: |
  type AgentPoolMode = string
