name: PublicNetworkAccessFlag
uid: '@azure/arm-servicebus.PublicNetworkAccessFlag'
package: '@azure/arm-servicebus'
summary: >-
  This determines if traffic is allowed over public network. By default it is
  enabled. \

  [KnownPublicNetworkAccessFlag](xref:@azure/arm-servicebus.KnownPublicNetworkAccessFlag)
  can be used interchangeably with PublicNetworkAccessFlag,
   this enum contains the known values that the service supports.
  ### Known values supported by the service

  **Enabled** \

  **Disabled**
