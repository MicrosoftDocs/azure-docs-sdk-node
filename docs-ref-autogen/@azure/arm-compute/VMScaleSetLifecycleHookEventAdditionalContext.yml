### YamlMime:TSType
name: VMScaleSetLifecycleHookEventAdditionalContext
uid: '@azure/arm-compute.VMScaleSetLifecycleHookEventAdditionalContext'
package: '@azure/arm-compute'
summary: >-
  Additional key-value pairs set on the lifecycle hook event that gives customer
  some useful context/data.

  The keys in this dictionary are specific to the lifecycle hook type. Different
  lifecycle hook events can have different sets of keys in the additional
  context depending on the lifecycle hook type.

  For example, for a lifecycle hook event with UpgradeAutoOSScheduling type,

  the additional context can contain the key "priority" that helps customer
  identify the priority of the Auto OS Upgrade operation triggered on the
  virtual machine scale set.
fullName: VMScaleSetLifecycleHookEventAdditionalContext
remarks: ''
isDeprecated: false
type: interface
properties:
  - name: priority
    uid: '@azure/arm-compute.VMScaleSetLifecycleHookEventAdditionalContext.priority'
    package: '@azure/arm-compute'
    summary: >-
      Can only be present for a lifecycle hook event of type
      "UpgradeAutoOSScheduling".

      Denotes the priority of the virtual machine scale set lifecycle hook event
      for the Auto OS Upgrade scheduled on the virtual machine scale set.
    fullName: priority
    remarks: ''
    isDeprecated: false
    syntax:
      content: 'priority?: string'
      return:
        description: ''
        type: string
