### YamlMime:TSTypeAlias
name: VirtualMachineIPAllocationMethod
uid: '@azure/arm-networkcloud.VirtualMachineIPAllocationMethod'
package: '@azure/arm-networkcloud'
summary: >-
  The IP allocation mechanism for the virtual machine. Dynamic and Static are
  only valid for l3Network which may also specify Disabled. Otherwise, Disabled
  is the only permitted value. \

  [KnownVirtualMachineIPAllocationMethod](xref:@azure/arm-networkcloud.KnownVirtualMachineIPAllocationMethod)
  can be used interchangeably with VirtualMachineIPAllocationMethod,
   this enum contains the known values that the service supports.
  ### Known values supported by the service

  **Dynamic**: Dynamic VM IP allocation. \

  **Static**: Static VM IP allocation. \

  **Disabled**: No VM IP allocation.
fullName: VirtualMachineIPAllocationMethod
remarks: ''
isDeprecated: false
syntax: |
  type VirtualMachineIPAllocationMethod = string
