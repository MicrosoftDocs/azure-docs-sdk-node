  - name: createOperation
    uid: >-
      @azure/arm-costmanagement.GenerateDetailedCostReportOperations.createOperation
    package: '@azure/arm-costmanagement'
    summary: >-
      Generates the detailed cost report for provided date range, billing
      period(only enterprise customers) or Invoice ID asynchronously at a
      certain scope. Call returns a 202 with header
      Azure-Consumption-AsyncOperation providing a link to the operation
      created. A call on the operation will provide the status and if the
      operation is completed the blob file where generated detailed cost report
      is being stored.
