### YamlMime:TSType
name: EndpointBasedEvaluatorDefinition
uid: '@azure/ai-projects.EndpointBasedEvaluatorDefinition'
package: '@azure/ai-projects'
summary: >-
  Endpoint-based evaluator definition. The customer owns and hosts an HTTP
  endpoint that implements the evaluation contract. The evaluator references a
  Project Connection by name; the connection stores the endpoint URL and
  credentials (API Key or Entra ID). At execution time, the service resolves the
  connection to obtain the endpoint URL and authentication details, then calls
  the endpoint for each evaluation row.
fullName: EndpointBasedEvaluatorDefinition
remarks: ''
isDeprecated: false
type: interface
properties:
  - name: connection_name
    uid: '@azure/ai-projects.EndpointBasedEvaluatorDefinition.connection_name'
    package: '@azure/ai-projects'
    summary: >-
      Name of the Project Connection that stores the endpoint URL and
      credentials. The connection must exist on the project and have a non-empty
      target URL. Supported auth types: ApiKey (sends `api-key` header) and
      AAD/Entra ID (acquires a bearer token via the project's Managed Identity).
    fullName: connection_name
    remarks: ''
    isDeprecated: false
    syntax:
      content: 'connection_name: string'
      return:
        description: ''
        type: string
  - name: type
    uid: '@azure/ai-projects.EndpointBasedEvaluatorDefinition.type'
    package: '@azure/ai-projects'
    summary: 'The discriminator possible values: code, prompt, rubric, endpoint'
    fullName: type
    remarks: ''
    isDeprecated: false
    syntax:
      content: 'type: "endpoint"'
      return:
        description: ''
        type: '"endpoint"'
