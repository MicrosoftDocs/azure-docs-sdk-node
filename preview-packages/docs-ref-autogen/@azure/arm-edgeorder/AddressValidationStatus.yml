name: AddressValidationStatus
uid: '@azure/arm-edgeorder.AddressValidationStatus'
package: '@azure/arm-edgeorder'
summary: >-
  Status of address validation. \

  [KnownAddressValidationStatus](xref:@azure/arm-edgeorder.KnownAddressValidationStatus)
  can be used interchangeably with AddressValidationStatus,
   this enum contains the known values that the service supports.
  ### Known values supported by the service

  **Valid**: Address provided is valid. \

  **Invalid**: Address provided is invalid or not supported. \

  **Ambiguous**: Address provided is ambiguous, please choose one of the
  alternate addresses returned.
