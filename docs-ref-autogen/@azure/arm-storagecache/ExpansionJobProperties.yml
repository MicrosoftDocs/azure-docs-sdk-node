### YamlMime:TSType
name: ExpansionJobProperties
uid: '@azure/arm-storagecache.ExpansionJobProperties'
package: '@azure/arm-storagecache'
summary: Properties of the expansion job.
fullName: ExpansionJobProperties
remarks: ''
isDeprecated: false
type: interface
properties:
  - name: completionTimeUTC
    uid: '@azure/arm-storagecache.ExpansionJobProperties.completionTimeUTC'
    package: '@azure/arm-storagecache'
    summary: >-
      The time (in UTC) when the expansion job completed. Only populated when
      job reaches a terminal state.
    fullName: completionTimeUTC
    remarks: ''
    isDeprecated: false
    syntax:
      content: 'completionTimeUTC?: Date'
      return:
        description: ''
        type: Date
  - name: newStorageCapacityTiB
    uid: '@azure/arm-storagecache.ExpansionJobProperties.newStorageCapacityTiB'
    package: '@azure/arm-storagecache'
    summary: >-
      The new storage capacity in TiB for the AML file system after expansion.
      This must be a multiple of the Sku step size, and greater than the current
      storage capacity of the AML file system.
    fullName: newStorageCapacityTiB
    remarks: ''
    isDeprecated: false
    syntax:
      content: 'newStorageCapacityTiB?: number'
      return:
        description: ''
        type: number
  - name: percentComplete
    uid: '@azure/arm-storagecache.ExpansionJobProperties.percentComplete'
    package: '@azure/arm-storagecache'
    summary: The percentage of expansion job completion.
    fullName: percentComplete
    remarks: ''
    isDeprecated: false
    syntax:
      content: 'percentComplete?: number'
      return:
        description: ''
        type: number
  - name: provisioningState
    uid: '@azure/arm-storagecache.ExpansionJobProperties.provisioningState'
    package: '@azure/arm-storagecache'
    summary: >-
      ARM provisioning state, see
      https://github.com/Azure/azure-resource-manager-rpc/blob/master/v1.0/Addendum.md#provisioningstate-property
    fullName: provisioningState
    remarks: ''
    isDeprecated: false
    syntax:
      content: 'provisioningState?: string'
      return:
        description: ''
        type: string
  - name: startTimeUTC
    uid: '@azure/arm-storagecache.ExpansionJobProperties.startTimeUTC'
    package: '@azure/arm-storagecache'
    summary: The time (in UTC) the expansion job started.
    fullName: startTimeUTC
    remarks: ''
    isDeprecated: false
    syntax:
      content: 'startTimeUTC?: Date'
      return:
        description: ''
        type: Date
  - name: state
    uid: '@azure/arm-storagecache.ExpansionJobProperties.state'
    package: '@azure/arm-storagecache'
    summary: >-
      The operational state of the expansion job. InProgress indicates the
      expansion is still running. Completed indicates expansion finished
      successfully. Failed means the expansion was unable to complete due to a
      fatal error. Deleting indicates the expansion is being rolled back.
    fullName: state
    remarks: ''
    isDeprecated: false
    syntax:
      content: 'state?: string'
      return:
        description: ''
        type: string
  - name: statusCode
    uid: '@azure/arm-storagecache.ExpansionJobProperties.statusCode'
    package: '@azure/arm-storagecache'
    summary: Server-defined status code for expansion job.
    fullName: statusCode
    remarks: ''
    isDeprecated: false
    syntax:
      content: 'statusCode?: string'
