### YamlMime:TSTypeAlias
name: OperatorType
uid: '@azure/arm-consumption.OperatorType'
package: '@azure/arm-consumption'
summary: >-
  The comparison operator. \

  [KnownOperatorType](xref:@azure/arm-consumption.KnownOperatorType) can be used
  interchangeably with OperatorType,
   this enum contains the known values that the service supports.
  ### Known values supported by the service

  **EqualTo**: Alert will be triggered if the evaluated cost is the same as
  threshold value. Note: It’s not recommended to use this OperatorType as
  there’s low chance of cost being exactly the same as threshold value, leading
  to missing of your alert. This OperatorType will be deprecated in future. \

  **GreaterThan**: Alert will be triggered if the evaluated cost is greater than
  the threshold value. Note: This is the recommended OperatorType while
  configuring Budget Alert. \

  **GreaterThanOrEqualTo**: Alert will be triggered if the evaluated cost is
  greater than or equal to the threshold value.
fullName: OperatorType
remarks: ''
isDeprecated: false
syntax: |
  type OperatorType = string
