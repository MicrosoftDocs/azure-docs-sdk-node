### YamlMime:TSTypeAlias
name: RelationshipOrigins
uid: '@azure/arm-relationships.RelationshipOrigins'
package: '@azure/arm-relationships'
summary: >-
  The possible origins of a relationship. \

  [KnownRelationshipOrigins](xref:@azure/arm-relationships.KnownRelationshipOrigins)
  can be used interchangeably with RelationshipOrigins,
   this enum contains the known values that the service supports.
  ### Known values supported by the service

  **ServiceExplicitlyCreated**: The relationship was explicitly created by a
  system. \

  **SystemDiscoveredByRule**: The relationship was discovered by a
  system-created rule. \

  **UserExplicitlyCreated**: The relationship was explicitly created by a user.
  \

  **UserDiscoveredByRule**: The relationship was discovered by a user-created
  rule.
fullName: RelationshipOrigins
