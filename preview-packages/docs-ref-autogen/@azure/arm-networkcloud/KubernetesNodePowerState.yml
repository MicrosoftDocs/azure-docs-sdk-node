name: KubernetesNodePowerState
uid: '@azure/arm-networkcloud.KubernetesNodePowerState'
package: '@azure/arm-networkcloud'
summary: >-
  The power state of this node. \

  [KnownKubernetesNodePowerState](xref:@azure/arm-networkcloud.KnownKubernetesNodePowerState)
  can be used interchangeably with KubernetesNodePowerState,
   this enum contains the known values that the service supports.
  ### Known values supported by the service

  **On**: The node is powered on. \

  **Off**: The node is powered off. \

  **Unknown**: The node is in an unknown power state.
