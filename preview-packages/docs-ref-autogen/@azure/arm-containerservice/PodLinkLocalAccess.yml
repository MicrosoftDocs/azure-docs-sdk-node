### YamlMime:TSTypeAlias
name: PodLinkLocalAccess
uid: '@azure/arm-containerservice.PodLinkLocalAccess'
package: '@azure/arm-containerservice'
summary: >-
  Defines access to special link local addresses (Azure Instance Metadata
  Service, aka IMDS) for pods with hostNetwork=false. If not specified, the
  default is 'IMDS'. \

  [KnownPodLinkLocalAccess](xref:@azure/arm-containerservice.KnownPodLinkLocalAccess)
  can be used interchangeably with PodLinkLocalAccess,
   this enum contains the known values that the service supports.
  ### Known values supported by the service

  **IMDS**: Pods with hostNetwork=false can access Azure Instance Metadata
  Service (IMDS) without restriction. \

  **None**: Pods with hostNetwork=false cannot access Azure Instance Metadata
  Service (IMDS).
fullName: PodLinkLocalAccess
remarks: ''
isDeprecated: false
syntax: |
  type PodLinkLocalAccess = string
