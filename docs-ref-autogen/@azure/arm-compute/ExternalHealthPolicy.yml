### YamlMime:TSType
name: ExternalHealthPolicy
uid: '@azure/arm-compute.ExternalHealthPolicy'
package: '@azure/arm-compute'
summary: Specifies the external health policy for the virtual machine scale set.
fullName: ExternalHealthPolicy
remarks: ''
isDeprecated: false
type: interface
properties:
  - name: enabled
    uid: '@azure/arm-compute.ExternalHealthPolicy.enabled'
    package: '@azure/arm-compute'
    summary: >-
      If true, external health is enabled for this scale set. Cannot be set to
      true on instances where another health monitoring source is active
      (ApplicationHealth extension or SLB). Defaults to false.
    fullName: enabled
    remarks: ''
    isDeprecated: false
    syntax:
      content: 'enabled?: boolean'
      return:
        description: ''
        type: boolean
  - name: expiryDuration
    uid: '@azure/arm-compute.ExternalHealthPolicy.expiryDuration'
    package: '@azure/arm-compute'
    summary: >-
      Defines how long the health status set by External Health API will last on
      the VM. If a signal is not received/updated within this time, the VM
      Health will be marked as "unknown". Uses the ISO 8601 format. Minimum: 5
      minutes (PT5M), Maximum: 3 hours (PT3H).
    fullName: expiryDuration
    remarks: ''
    isDeprecated: false
    syntax:
      content: 'expiryDuration?: string'
      return:
        description: ''
        type: string
  - name: gracePeriod
    uid: '@azure/arm-compute.ExternalHealthPolicy.gracePeriod'
    package: '@azure/arm-compute'
    summary: >-
      Grace period for newly created VMs or when the External Health policy is
      first applied on VMSS. Uses the ISO 8601 format. Minimum: 5 minutes
      (PT5M), Maximum: 4 hours (PT4H).
    fullName: gracePeriod
    remarks: ''
    isDeprecated: false
    syntax:
      content: 'gracePeriod?: string'
      return:
        description: ''
        type: string
