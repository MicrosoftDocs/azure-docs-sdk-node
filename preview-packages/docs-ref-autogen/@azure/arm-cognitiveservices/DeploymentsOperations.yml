    package: '@azure/arm-cognitiveservices'
    summary: >-
      Resumes inferencing on a previously paused deployment by setting the
      deploymentState to 'Running' (see
      #/definitions/DeploymentProperties/properties/deploymentState). This
      operation is idempotent and can be safely called on already running
      deployments.
    fullName: resume
