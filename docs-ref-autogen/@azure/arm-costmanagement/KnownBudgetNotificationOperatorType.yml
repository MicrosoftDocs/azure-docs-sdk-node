### YamlMime:TSEnum
name: KnownBudgetNotificationOperatorType
uid: '@azure/arm-costmanagement.KnownBudgetNotificationOperatorType'
package: '@azure/arm-costmanagement'
summary: |-
  The comparison operator.

  Supported for CategoryType(s): Cost, ReservationUtilization.

  Supported operators for **CategoryType: Cost**
  - GreaterThan
  - GreaterThanOrEqualTo

  Supported operators for **CategoryType: ReservationUtilization**
  - LessThan
fullName: KnownBudgetNotificationOperatorType
remarks: ''
isDeprecated: false
fields:
  - name: EqualTo
    uid: '@azure/arm-costmanagement.KnownBudgetNotificationOperatorType.EqualTo'
    package: '@azure/arm-costmanagement'
    summary: >-
      Notification will be triggered if the evaluated cost is the same as
      threshold value. Note: It’s not recommended to use this OperatorType as
      there’s low chance of cost being exactly the same as threshold value,
      leading to missing of your alert. This OperatorType will be deprecated in
      future.


      Supported for CategoryType(s): Cost.
  - name: GreaterThan
    uid: '@azure/arm-costmanagement.KnownBudgetNotificationOperatorType.GreaterThan'
    package: '@azure/arm-costmanagement'
    summary: >-
      Notification will be triggered if the evaluated cost is greater than the
      threshold value. Note: This is the recommended OperatorType while
      configuring Budget Alert.


      Supported for CategoryType(s): Cost.
  - name: GreaterThanOrEqualTo
    uid: >-
      @azure/arm-costmanagement.KnownBudgetNotificationOperatorType.GreaterThanOrEqualTo
    package: '@azure/arm-costmanagement'
    summary: >-
      Notification will be triggered if the evaluated cost is greater than or
      equal to the threshold value.


      Supported for CategoryType(s): Cost.
  - name: LessThan
    uid: '@azure/arm-costmanagement.KnownBudgetNotificationOperatorType.LessThan'
    package: '@azure/arm-costmanagement'
    summary: >-
      Notification will be triggered if any Reservations in the scope of the
      Reservation Utilization Alert Rule have a utilization less than the
      threshold percentage.


      Supported for CategoryType(s): ReservationUtilization.
