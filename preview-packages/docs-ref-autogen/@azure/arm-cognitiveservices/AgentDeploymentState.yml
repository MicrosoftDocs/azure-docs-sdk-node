### YamlMime:TSTypeAlias
name: AgentDeploymentState
uid: '@azure/arm-cognitiveservices.AgentDeploymentState'
package: '@azure/arm-cognitiveservices'
summary: >-
  Current operational state of the agentic functionality represented by this
  deployment. \

  [KnownAgentDeploymentState](xref:@azure/arm-cognitiveservices.KnownAgentDeploymentState)
  can be used interchangeably with AgentDeploymentState,
   this enum contains the known values that the service supports.
  ### Known values supported by the service

  **Starting**: The deployment is starting. \

  **Running**: The deployment started/is operational. \

  **Stopping**: The deployment is being stopped. \

  **Stopped**: The deployment was stopped. \

  **Failed**: The deployment failed. \

  **Deleting**: The deployment is being deleted. \

  **Deleted**: The deployment was deleted. \

  **Updating**: The deployment is being updated.
fullName: AgentDeploymentState
remarks: ''
isDeprecated: false
syntax: |
  type AgentDeploymentState = string
