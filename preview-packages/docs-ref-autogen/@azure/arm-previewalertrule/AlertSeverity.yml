### YamlMime:TSTypeAlias
name: AlertSeverity
uid: '@azure/arm-previewalertrule.AlertSeverity'
package: '@azure/arm-previewalertrule'
summary: >-
  Severity of the alert. Should be an integer between [0-4]. Value of 0 is
  severest. Relevant and required only for rules of the kind LogAlert. \

  [KnownAlertSeverity](xref:@azure/arm-previewalertrule.KnownAlertSeverity) can
  be used interchangeably with AlertSeverity,
   this enum contains the known values that the service supports.
  ### Known values supported by the service

  **0**: 0 \

  **1**: 1 \

  **2**: 2 \

  **3**: 3 \

  **4**: 4
fullName: AlertSeverity
remarks: ''
isDeprecated: false
syntax: |
  type AlertSeverity = number
