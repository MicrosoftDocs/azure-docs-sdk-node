### YamlMime:TSTypeAlias
name: ZoneRedundantHighAvailabilityAndGeographicallyRedundantBackupSupport
uid: >-
  @azure/arm-postgresql-flexible.ZoneRedundantHighAvailabilityAndGeographicallyRedundantBackupSupport
package: '@azure/arm-postgresql-flexible'
summary: >-
  Indicates if high availability with zone redundancy is supported in
  conjunction with geographically redundant backups in this location. 'Enabled'
  means high availability with zone redundancy is supported in conjunction with
  geographically redundant backups is supported. 'Disabled' stands for high
  availability with zone redundancy is supported in conjunction with
  geographically redundant backups is not supported. Will be deprecated in the
  future. Look to Supported Features for 'ZoneRedundantHaAndGeoBackup'. \

  [KnownZoneRedundantHighAvailabilityAndGeographicallyRedundantBackupSupport](xref:@azure/arm-postgresql-flexible.KnownZoneRedundantHighAvailabilityAndGeographicallyRedundantBackupSupport)
  can be used interchangeably with
  ZoneRedundantHighAvailabilityAndGeographicallyRedundantBackupSupport,
   this enum contains the known values that the service supports.
  ### Known values supported by the service

  **Enabled** \

  **Disabled**
fullName: ZoneRedundantHighAvailabilityAndGeographicallyRedundantBackupSupport
remarks: ''
isDeprecated: false
syntax: |
  type ZoneRedundantHighAvailabilityAndGeographicallyRedundantBackupSupport =
    string
