  - name: SearchIndex
    uid: '@azure/search-documents.KnownKnowledgeSourceKind.SearchIndex'
    package: '@azure/search-documents'
    summary: A knowledge source that reads data from a Search Index.
  - name: Web
    uid: '@azure/search-documents.KnownKnowledgeSourceKind.Web'
    package: '@azure/search-documents'
    summary: A knowledge source that reads data from the web.
  - name: WorkIQ
    uid: '@azure/search-documents.KnownKnowledgeSourceKind.WorkIQ'
