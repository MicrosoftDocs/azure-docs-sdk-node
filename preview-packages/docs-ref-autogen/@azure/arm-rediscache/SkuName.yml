### YamlMime:TSTypeAlias
name: SkuName
uid: '@azure/arm-rediscache.SkuName'
package: '@azure/arm-rediscache'
summary: >-
  The type of Redis cache to deploy. Valid values: (Basic, Standard, Premium) \

  [KnownSkuName](xref:@azure/arm-rediscache.KnownSkuName) can be used
  interchangeably with SkuName,
   this enum contains the known values that the service supports.
  ### Known values supported by the service

  **Basic**: The well known 'Basic' SKU for Azure Cache for Redis. Basic SKU
  does not have an availability SLA. \

  **Standard**: The well known 'Standard' SKU for Azure Cache for Redis.
  Standard SKU has an availability SLA. \

  **Premium**: The well known 'Premium' SKU for Azure Cache for Redis. Premium
  SKU has an availability SLA, and higher performance tiers and more features
  compared with Standard SKU.
fullName: SkuName
remarks: ''
isDeprecated: false
syntax: |
  type SkuName = string
