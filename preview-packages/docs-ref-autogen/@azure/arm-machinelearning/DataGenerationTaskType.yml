name: DataGenerationTaskType
uid: '@azure/arm-machinelearning.DataGenerationTaskType'
package: '@azure/arm-machinelearning'
summary: >-
  Enum to determine the type of Data Generation Task. \

  [KnownDataGenerationTaskType](xref:@azure/arm-machinelearning.KnownDataGenerationTaskType)
  can be used interchangeably with DataGenerationTaskType,
   this enum contains the known values that the service supports.
  ### Known values supported by the service

  **Conversation**: Generate conversational data (multi/single turn) \

  **Math**: Generate Math data for numerical responses \

  **Nli**: Generate Natural Language Inference data \

  **NluQa**: Generate Natural Language Understanding data for Question Answering
  data \

  **Summarization**: Generate Key Summary for an Article
fullName: DataGenerationTaskType
remarks: ''
isDeprecated: false
syntax: |
  type DataGenerationTaskType = string
