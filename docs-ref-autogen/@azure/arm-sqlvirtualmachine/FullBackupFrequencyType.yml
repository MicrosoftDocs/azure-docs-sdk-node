name: FullBackupFrequencyType
uid: '@azure/arm-sqlvirtualmachine.FullBackupFrequencyType'
package: '@azure/arm-sqlvirtualmachine'
summary: >-
  Frequency of full backups. In both cases, full backups begin during the next
  scheduled time window. \

  [KnownFullBackupFrequencyType](xref:@azure/arm-sqlvirtualmachine.KnownFullBackupFrequencyType)
  can be used interchangeably with FullBackupFrequencyType,
   this enum contains the known values that the service supports.
  ### Known values supported by the service

  **Daily** \

  **Weekly**
