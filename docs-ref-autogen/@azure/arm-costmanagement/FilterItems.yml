### YamlMime:TSType
name: FilterItems
uid: '@azure/arm-costmanagement.FilterItems'
package: '@azure/arm-costmanagement'
summary: >-
  Will contain the filter name and value to operate on. This is currently only
  supported for Export Definition type of ReservationRecommendations.
fullName: FilterItems
remarks: ''
isDeprecated: false
type: interface
properties:
  - name: name
    uid: '@azure/arm-costmanagement.FilterItems.name'
    package: '@azure/arm-costmanagement'
    summary: >-
      The name of the filter. This is currently only supported for Export
      Definition type of ReservationRecommendations. Supported names are
      ['ReservationScope', 'LookBackPeriod', 'ResourceType']
    fullName: name
    remarks: ''
    isDeprecated: false
    syntax:
      content: 'name?: string'
      return:
        description: ''
        type: string
  - name: value
    uid: '@azure/arm-costmanagement.FilterItems.value'
    package: '@azure/arm-costmanagement'
    summary: >-
      Value to filter by. Currently values supported per name are, for
      'ReservationScope' supported values are ['Single', 'Shared'], for
      'LookBackPeriod' supported values are ['Last7Days', 'Last30Days',
      'Last60Days'] and for 'ResourceType' supported values are
      ['VirtualMachines', 'SQLDatabases', 'PostgreSQL', 'ManagedDisk', 'MySQL',
      'RedHat', 'MariaDB', 'RedisCache', 'CosmosDB', 'SqlDataWarehouse',
      'SUSELinux', 'AppService', 'BlockBlob', 'AzureDataExplorer',
      'VMwareCloudSimple'].
    fullName: value
    remarks: ''
    isDeprecated: false
    syntax:
      content: 'value?: string'
      return:
        description: ''
        type: string
