### YamlMime:TSEnum
name: KnownIngressClientCertificateMode
uid: '@azure/arm-appcontainers.KnownIngressClientCertificateMode'
package: '@azure/arm-appcontainers'
summary: >-
  Client certificate mode for mTLS authentication. Ignore indicates server drops
  client certificate on forwarding. Accept indicates server forwards client
  certificate but does not require a client certificate. Require indicates
  server requires a client certificate.
fullName: KnownIngressClientCertificateMode
remarks: ''
isDeprecated: false
