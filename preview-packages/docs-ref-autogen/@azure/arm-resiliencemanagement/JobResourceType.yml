name: JobResourceType
uid: '@azure/arm-resiliencemanagement.JobResourceType'
package: '@azure/arm-resiliencemanagement'
summary: >-
  A job resource type indicates the kind of jobresource. \

  [KnownJobResourceType](xref:@azure/arm-resiliencemanagement.KnownJobResourceType)
  can be used interchangeably with JobResourceType,
   this enum contains the known values that the service supports.
  ### Known values supported by the service

  **Invalid**: Abstract job resource - invalid. \

  **RecoveryPlan**: Recovery Orchestration Plan created job resource. \

  **DrillRun**: Drill Run job resource.
