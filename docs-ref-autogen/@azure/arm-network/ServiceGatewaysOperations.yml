  - name: updateAddressLocations
    uid: '@azure/arm-network.ServiceGatewaysOperations.updateAddressLocations'
    package: '@azure/arm-network'
    summary: >-
      Creates or updates address locations within the service gateway.


      The request supports both full and partial update modes at two levels:
      location and address.


      Full update replaces all existing data.


      Partial update modifies only the specified entries:


      For location-level partial updates, if no address is provided, the
      existing address will be deleted.


      For address-level partial updates, if no services are provided, the
      existing services will be considered for deletion.
    fullName: updateAddressLocations
    remarks: ''
    isDeprecated: false
    syntax:
      content: >-
        updateAddressLocations: (resourceGroupName: string, serviceGatewayName:
        string, parameters: ServiceGatewayUpdateAddressLocationsRequest,
        options?: ServiceGatewaysUpdateAddressLocationsOptionalParams) =>
        PollerLike<OperationState<void>, void>
      return:
        description: ''
        type: >-
          (resourceGroupName: string, serviceGatewayName: string, parameters:
          ServiceGatewayUpdateAddressLocationsRequest, options?:
          ServiceGatewaysUpdateAddressLocationsOptionalParams) =&gt;
          PollerLike&lt;OperationState&lt;void&gt;, void&gt;
  - name: updateServices
    uid: '@azure/arm-network.ServiceGatewaysOperations.updateServices'
    package: '@azure/arm-network'
    summary: >-
      Creates, updates, or deletes services within the service gateway.

      The request supports both full and partial update modes at the service
      level.


      Full update replaces all existing services with the new list provided in
      the request.

      Partial update modifies only the specified services.
    fullName: updateServices
    remarks: ''
    isDeprecated: false
    syntax:
