### YamlMime:TSTypeAlias
name: OptimizationType
uid: '@azure/arm-cdn.OptimizationType'
package: '@azure/arm-cdn'
summary: >-
  Specifies what scenario the customer wants this CDN endpoint to optimize, e.g.
  Download, Media services. With this information we can apply scenario driven
  optimization. \

  [KnownOptimizationType](xref:@azure/arm-cdn.KnownOptimizationType) can be used
  interchangeably with OptimizationType,
   this enum contains the known values that the service supports.
  ### Known values supported by the service

  **GeneralWebDelivery** \

  **GeneralMediaStreaming** \

  **VideoOnDemandMediaStreaming** \

  **LargeFileDownload** \

  **DynamicSiteAcceleration**
fullName: OptimizationType
remarks: ''
isDeprecated: false
syntax: |
  type OptimizationType = string
