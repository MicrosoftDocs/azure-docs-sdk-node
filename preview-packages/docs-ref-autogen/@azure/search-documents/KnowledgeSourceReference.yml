### YamlMime:TSType
name: KnowledgeSourceReference
uid: '@azure/search-documents.KnowledgeSourceReference'
package: '@azure/search-documents'
summary: Reference to a knowledge source.
fullName: KnowledgeSourceReference
remarks: ''
isDeprecated: false
type: interface
properties:
  - name: enableFreshness
    uid: '@azure/search-documents.KnowledgeSourceReference.enableFreshness'
    package: '@azure/search-documents'
    summary: >-
      Indicates whether freshness-aware retrieval should be enabled for this
      knowledge source. When true, a freshness scoring profile is applied during
      retrieval to bias results toward newer documents.
    fullName: enableFreshness
    remarks: ''
    isDeprecated: false
    syntax:
      content: 'enableFreshness?: boolean'
      return:
        description: ''
        type: boolean
  - name: enableImageServing
    uid: '@azure/search-documents.KnowledgeSourceReference.enableImageServing'
    package: '@azure/search-documents'
    summary: >-
      Indicates whether image serving should be enabled for this knowledge
      source. When true, images extracted during ingestion are delivered to
      downstream models at query time.
    fullName: enableImageServing
    remarks: ''
    isDeprecated: false
    syntax:
      content: 'enableImageServing?: boolean'
      return:
        description: ''
        type: boolean
  - name: name
    uid: '@azure/search-documents.KnowledgeSourceReference.name'
    package: '@azure/search-documents'
    summary: The name of the knowledge source.
    fullName: name
    remarks: ''
    isDeprecated: false
    syntax:
      content: 'name: string'
      return:
        description: ''
        type: string
