name: ApplyMaintenanceWindowRequest
uid: '@azure/arm-servicefabricmanagedclusters.ApplyMaintenanceWindowRequest'
package: '@azure/arm-servicefabricmanagedclusters'
summary: >-
  Describes the request to apply a maintenance window on a Service Fabric
  Managed Cluster.
fullName: ApplyMaintenanceWindowRequest
remarks: ''
isDeprecated: false
type: interface
properties:
  - name: duration
    uid: >-
      @azure/arm-servicefabricmanagedclusters.ApplyMaintenanceWindowRequest.duration
    package: '@azure/arm-servicefabricmanagedclusters'
    summary: >-
      Duration of the maintenance window in hh:mm format. If not provided,
      defaults to 5 hours. Example: 08:30 for 8 and a half hours.
    fullName: duration
    remarks: ''
    isDeprecated: false
    syntax:
      content: 'duration?: string'
      return:
        description: ''
        type: string
  - name: startDateTime
    uid: >-
      @azure/arm-servicefabricmanagedclusters.ApplyMaintenanceWindowRequest.startDateTime
    package: '@azure/arm-servicefabricmanagedclusters'
    summary: >-
      Effective start date of the maintenance window in yyyy-MM-dd HH:mm format.
      If not provided, defaults to the current time.
    fullName: startDateTime
    remarks: ''
    isDeprecated: false
    syntax:
      content: 'startDateTime?: string'
      return:
        description: ''
        type: string
  - name: timeZone
    uid: >-
      @azure/arm-servicefabricmanagedclusters.ApplyMaintenanceWindowRequest.timeZone
    package: '@azure/arm-servicefabricmanagedclusters'
    summary: >-
      Name of the timezone. List of timezones can be obtained by executing
      [System.TimeZoneInfo]::GetSystemTimeZones() in PowerShell. If not
