### YamlMime:TSEnum
name: KnownPricingTier
uid: '@azure/arm-security.KnownPricingTier'
package: '@azure/arm-security'
summary: >-
  Indicates whether the Defender plan is enabled on the selected scope.
  Microsoft Defender for Cloud is provided in two pricing tiers: free and
  standard. The standard tier offers advanced security capabilities, while the
  free tier offers basic security features.
fullName: KnownPricingTier
remarks: ''
isDeprecated: false
fields:
  - name: Free
    uid: '@azure/arm-security.KnownPricingTier.Free'
    package: '@azure/arm-security'
    summary: >-
      Get free Microsoft Defender for Cloud experience with basic security
      features
  - name: Standard
    uid: '@azure/arm-security.KnownPricingTier.Standard'
    package: '@azure/arm-security'
    summary: >-
      Get the standard Microsoft Defender for Cloud experience with advanced
      security features
