### YamlMime:TSTypeAlias
name: AutoUpgradeMode
uid: '@azure/arm-kubernetesconfiguration-extensions.AutoUpgradeMode'
package: '@azure/arm-kubernetesconfiguration-extensions'
summary: >-
  The upgrade mode for auto upgrade.

  The default is "compatible". \

  [KnownAutoUpgradeMode](xref:@azure/arm-kubernetesconfiguration-extensions.KnownAutoUpgradeMode)
  can be used interchangeably with AutoUpgradeMode,
   this enum contains the known values that the service supports.
  ### Known values supported by the service

  **none**: The extension will not be automatically upgraded. \

  **patch**: The extension will be automatically upgraded to the latest patch
  version within the minor version. \

  **compatible**: The extension will be automatically upgraded to compatible
  versions as determined by the user.
fullName: AutoUpgradeMode
remarks: ''
isDeprecated: false
syntax: |
  type AutoUpgradeMode = string
