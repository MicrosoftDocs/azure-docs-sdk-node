### YamlMime:TSEnum
name: KnownHealthState
uid: '@azure/arm-azurestackhci.KnownHealthState'
package: '@azure/arm-azurestackhci'
summary: >-
  Overall health state for update-specific health checks. Indicates whether the
  system is functioning correctly, has warnings or errors, or is undergoing a
  health evaluation.
fullName: KnownHealthState
remarks: ''
isDeprecated: false
fields:
  - name: Error
    uid: '@azure/arm-azurestackhci.KnownHealthState.Error'
    package: '@azure/arm-azurestackhci'
    summary: An error occurred during the health check process.
  - name: Failure
    uid: '@azure/arm-azurestackhci.KnownHealthState.Failure'
    package: '@azure/arm-azurestackhci'
    summary: The health check failed, indicating a critical issue.
  - name: InProgress
    uid: '@azure/arm-azurestackhci.KnownHealthState.InProgress'
    package: '@azure/arm-azurestackhci'
    summary: The health check is currently in progress.
  - name: Success
    uid: '@azure/arm-azurestackhci.KnownHealthState.Success'
    package: '@azure/arm-azurestackhci'
    summary: The health check completed successfully and the system is healthy.
  - name: Unknown
    uid: '@azure/arm-azurestackhci.KnownHealthState.Unknown'
    package: '@azure/arm-azurestackhci'
    summary: The health state is not known or cannot be determined.
  - name: Warning
    uid: '@azure/arm-azurestackhci.KnownHealthState.Warning'
    package: '@azure/arm-azurestackhci'
    summary: The health check detected a non-critical issue that may require attention.
