### YamlMime:TSTypeAlias
name: EnforcementMode
uid: '@azure/arm-policy.EnforcementMode'
package: '@azure/arm-policy'
summary: >-
  The policy assignment enforcement mode. Possible values are Default,
  DoNotEnforce, and Enroll \

  [KnownEnforcementMode](xref:@azure/arm-policy.KnownEnforcementMode) can be
  used interchangeably with EnforcementMode,
   this enum contains the known values that the service supports.
  ### Known values supported by the service

  **Default**: The policy effect is enforced during resource creation or update.
  \

  **DoNotEnforce**: The policy effect is not enforced during resource creation
  or update. \

  **Enroll**: The policy effect is not enforced during resource creation or
  update until the resource or scope of the resource is enrolled to the
  assignment instance. Enrollment occurs upon deployment of the policy
  enrollment resource.
fullName: EnforcementMode
remarks: ''
isDeprecated: false
syntax: |
  type EnforcementMode = string
