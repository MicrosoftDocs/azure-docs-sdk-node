### YamlMime:TSEnum
name: KnownManagedGatewayType
uid: '@azure/arm-containerservice.KnownManagedGatewayType'
package: '@azure/arm-containerservice'
summary: >-
  Configuration for the managed Gateway API installation. If not specified, the
  default is 'Disabled'. See https://aka.ms/k8s-gateway-api for more details.
fullName: KnownManagedGatewayType
remarks: ''
isDeprecated: false
fields:
  - name: Disabled
    uid: '@azure/arm-containerservice.KnownManagedGatewayType.Disabled'
    package: '@azure/arm-containerservice'
    summary: Gateway API CRDs will not be reconciled on your cluster.
  - name: Standard
    uid: '@azure/arm-containerservice.KnownManagedGatewayType.Standard'
    package: '@azure/arm-containerservice'
    summary: >-
      The latest Gateway CRD bundle from the standard channel that is compatible
      with your Kubernetes version will be reconciled onto your cluster. See
      https://gateway-api.sigs.k8s.io/concepts/versioning/ for more details.
