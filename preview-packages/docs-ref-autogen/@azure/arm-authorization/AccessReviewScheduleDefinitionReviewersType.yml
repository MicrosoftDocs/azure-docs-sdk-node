summary: >-
  This field specifies the type of reviewers for a review. Usually for a review,
  reviewers are explicitly assigned. However, in some cases, the reviewers may
  not be assigned and instead be chosen dynamically. For example managers review
  or self review. \

  [KnownAccessReviewScheduleDefinitionReviewersType](xref:@azure/arm-authorization.KnownAccessReviewScheduleDefinitionReviewersType)
  can be used interchangeably with AccessReviewScheduleDefinitionReviewersType,
   this enum contains the known values that the service supports.
  ### Known values supported by the service

  **Assigned**: Assigned \

  **Self**: Self \

  **Managers**: Managers
