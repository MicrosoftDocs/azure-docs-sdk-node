name: FlowType
uid: '@azure/arm-appinsights.FlowType'
package: '@azure/arm-appinsights'
summary: >-
  Used by the Application Insights system to determine what kind of flow this
  component was created by. This is to be set to 'Bluefield' when
  creating/updating a component via the REST API. \

  [KnownFlowType](xref:@azure/arm-appinsights.KnownFlowType) can be used
  interchangeably with FlowType,
   this enum contains the known values that the service supports.
  ### Known values supported by the service

  **Bluefield**: Bluefield
fullName: FlowType
