### YamlMime:TSType
name: TrafficThrottleByJwtCustomClaimRule
uid: '@azure/arm-signalr.TrafficThrottleByJwtCustomClaimRule'
package: '@azure/arm-signalr'
summary: Throttle the client traffic by a custom JWT claim
fullName: TrafficThrottleByJwtCustomClaimRule
remarks: ''
isDeprecated: false
type: interface
properties:
  - name: aggregationWindowInSeconds
    uid: >-
      @azure/arm-signalr.TrafficThrottleByJwtCustomClaimRule.aggregationWindowInSeconds
    package: '@azure/arm-signalr'
    summary: >-
      The aggregation window for the message bytes. The message bytes will be
      aggregated in this window and be reset after the window. Default value is
      60 seconds.
    fullName: aggregationWindowInSeconds
    remarks: ''
    isDeprecated: false
    syntax:
      content: 'aggregationWindowInSeconds?: number'
      return:
        description: ''
        type: number
  - name: claimName
    uid: '@azure/arm-signalr.TrafficThrottleByJwtCustomClaimRule.claimName'
    package: '@azure/arm-signalr'
    summary: >-
      The name of the claim in the JWT token. The message bytes with the same
      claim value will be aggregated. If the claim is not found in the token,
      the rule will be skipped.
    fullName: claimName
    remarks: ''
    isDeprecated: false
    syntax:
      content: 'claimName: string'
      return:
        description: ''
        type: string
  - name: maxInboundMessageBytes
    uid: >-
      @azure/arm-signalr.TrafficThrottleByJwtCustomClaimRule.maxInboundMessageBytes
    package: '@azure/arm-signalr'
    summary: >-
      Maximum accumulated inbound message bytes allowed for the same JWT
      signature within a time window. Clients with the same JWT claim will get
      disconnected if the message bytes exceeds this value. Default value is
      1GB.
    fullName: maxInboundMessageBytes
    remarks: ''
    isDeprecated: false
    syntax:
      content: 'maxInboundMessageBytes?: number'
      return:
        description: ''
        type: number
  - name: type
    uid: '@azure/arm-signalr.TrafficThrottleByJwtCustomClaimRule.type'
    package: '@azure/arm-signalr'
    summary: ''
    fullName: type
    remarks: ''
    isDeprecated: false
    syntax:
      content: 'type: "TrafficThrottleByJwtCustomClaimRule"'
      return:
        description: ''
        type: '"TrafficThrottleByJwtCustomClaimRule"'
extends: <xref uid="@azure/arm-signalr.ClientTrafficControlRule" />
