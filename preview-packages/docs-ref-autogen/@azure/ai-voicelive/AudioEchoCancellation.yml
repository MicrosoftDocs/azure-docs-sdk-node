### YamlMime:TSType
name: AudioEchoCancellation
uid: '@azure/ai-voicelive.AudioEchoCancellation'
package: '@azure/ai-voicelive'
summary: Echo cancellation configuration for server-side audio processing.
fullName: AudioEchoCancellation
remarks: ''
isDeprecated: false
type: interface
properties:
  - name: channels
    uid: '@azure/ai-voicelive.AudioEchoCancellation.channels'
    package: '@azure/ai-voicelive'
    summary: >-
      Number of input audio channels.

      - `1`: Mono input (default).

      - `2`: Interleaved stereo input where channel 0 is the microphone signal
      and channel 1 is the echo reference signal.

      When set to 2, `reference_source` must be `client` and
      `input_audio_format` must be `pcm16`.
    fullName: channels
    remarks: ''
    isDeprecated: false
    syntax:
      content: 'channels?: number'
      return:
        description: ''
        type: number
  - name: referenceSource
    uid: '@azure/ai-voicelive.AudioEchoCancellation.referenceSource'
    package: '@azure/ai-voicelive'
    summary: >-
      The source of the echo cancellation reference signal.

      - `server`: EC uses the internal TTS loopback as the reference signal
      (default, existing behavior).

      - `client`: EC uses the client-supplied reference channel (ch1 of stereo
      input). Internal TTS loopback is skipped.
    fullName: referenceSource
    remarks: ''
    isDeprecated: false
    syntax:
      content: 'referenceSource?: string'
      return:
        description: ''
        type: string
  - name: type
    uid: '@azure/ai-voicelive.AudioEchoCancellation.type'
    package: '@azure/ai-voicelive'
    summary: The type of echo cancellation model to use.
    fullName: type
    remarks: ''
    isDeprecated: false
    syntax:
      content: 'type: "server_echo_cancellation"'
      return:
        description: ''
        type: '"server_echo_cancellation"'
