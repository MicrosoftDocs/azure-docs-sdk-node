properties:
  - name: expression
    uid: '@azure/arm-datafactory.IfConditionActivityTypeProperties.expression'
    package: '@azure/arm-datafactory'
    summary: >-
      An expression that would evaluate to Boolean. This is used to determine
      the block of activities (ifTrueActivities or ifFalseActivities) that will
      be executed.
    fullName: expression
    remarks: ''
    isDeprecated: false
    syntax:
      content: 'expression: Expression'
      return:
        description: ''
        type: <xref uid="@azure/arm-datafactory.Expression" />
  - name: ifFalseActivities
    uid: '@azure/arm-datafactory.IfConditionActivityTypeProperties.ifFalseActivities'
    package: '@azure/arm-datafactory'
    summary: >-
      List of activities to execute if expression is evaluated to false. This is
      an optional property and if not provided, the activity will exit without
      any action.
    fullName: ifFalseActivities
    remarks: ''
    isDeprecated: false
    syntax:
      content: 'ifFalseActivities?: ActivityUnion[]'
      return:
        description: ''
        type: <xref uid="@azure/arm-datafactory.ActivityUnion" />[]
  - name: ifTrueActivities
    uid: '@azure/arm-datafactory.IfConditionActivityTypeProperties.ifTrueActivities'
    package: '@azure/arm-datafactory'
    summary: >-
      List of activities to execute if expression is evaluated to true. This is
