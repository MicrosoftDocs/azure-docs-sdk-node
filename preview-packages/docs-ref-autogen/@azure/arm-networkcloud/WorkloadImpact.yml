### YamlMime:TSTypeAlias
name: WorkloadImpact
uid: '@azure/arm-networkcloud.WorkloadImpact'
package: '@azure/arm-networkcloud'
summary: >-
  The indicator of whether the workload will be impacted during the upgrade. \

  [KnownWorkloadImpact](xref:@azure/arm-networkcloud.KnownWorkloadImpact) can be
  used interchangeably with WorkloadImpact,
   this enum contains the known values that the service supports.
  ### Known values supported by the service

  **True**: The workload will be impacted during the upgrade. \

  **False**: The workload will not be impacted during the upgrade.
fullName: WorkloadImpact
remarks: ''
isDeprecated: false
syntax: |
  type WorkloadImpact = string
