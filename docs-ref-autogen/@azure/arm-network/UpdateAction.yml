### YamlMime:TSTypeAlias
name: UpdateAction
uid: '@azure/arm-network.UpdateAction'
package: '@azure/arm-network'
summary: >-
  Specifies the type of update operation to perform on address locations within
  the service gateway.


  - FullUpdate: Replaces all existing address location data with the new list
  provided in the request. Any previously defined locations not included will be
  removed.

  - PartialUpdate: Updates only the specified address locations. \

  [KnownUpdateAction](xref:@azure/arm-network.KnownUpdateAction) can be used
  interchangeably with UpdateAction,
   this enum contains the known values that the service supports.
  ### Known values supported by the service

  **FullUpdate**: FullUpdate \

  **PartialUpdate**: PartialUpdate
fullName: UpdateAction
remarks: ''
isDeprecated: false
syntax: |
  type UpdateAction = string
