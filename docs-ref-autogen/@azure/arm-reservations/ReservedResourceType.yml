name: ReservedResourceType
uid: '@azure/arm-reservations.ReservedResourceType'
package: '@azure/arm-reservations'
summary: >-
  The type of the resource that is being reserved. In addition to below types we
  have also added the following: OpenAIPTU, MDC, Sentinel. \

  [KnownReservedResourceType](xref:@azure/arm-reservations.KnownReservedResourceType)
  can be used interchangeably with ReservedResourceType,
   this enum contains the known values that the service supports.
