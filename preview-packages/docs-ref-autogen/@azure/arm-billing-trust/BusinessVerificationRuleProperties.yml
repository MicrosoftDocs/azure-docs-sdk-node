    uid: '@azure/arm-billing-trust.BusinessVerificationRuleProperties.soldTo'
    package: '@azure/arm-billing-trust'
    summary: >-
      Sold-to identity used for business verification. Populated from the
      billing account at the time the rule is created. Server-managed.
    fullName: soldTo
    remarks: ''
    isDeprecated: false
    syntax:
      content: 'soldTo?: SoldTo'
      return:
        description: ''
        type: <xref uid="@azure/arm-billing-trust.SoldTo" />
