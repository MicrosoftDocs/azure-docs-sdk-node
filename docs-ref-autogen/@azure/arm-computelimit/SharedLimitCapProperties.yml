name: SharedLimitCapProperties
uid: '@azure/arm-computelimit.SharedLimitCapProperties'
package: '@azure/arm-computelimit'
summary: Properties of a shared limit cap resource.
fullName: SharedLimitCapProperties
remarks: ''
isDeprecated: false
type: interface
properties:
  - name: defaultMemberCap
    uid: '@azure/arm-computelimit.SharedLimitCapProperties.defaultMemberCap'
    package: '@azure/arm-computelimit'
    summary: |-
      The default member cap value (in count units).
      Set to a non-negative integer to apply a cap to all member subscriptions
      that do not have a per-member override. Omit the property to leave no
      default cap in effect.
    fullName: defaultMemberCap
    remarks: ''
    isDeprecated: false
    syntax:
      content: 'defaultMemberCap?: number'
      return:
        description: ''
        type: number
  - name: isBoundedCap
    uid: '@azure/arm-computelimit.SharedLimitCapProperties.isBoundedCap'
    package: '@azure/arm-computelimit'
    summary: >-
      Controls whether the service validates the aggregate cap against the

      group limit for the VM family.


      SUM(caps) is the sum of all per-member overrides' cap values plus

      `defaultMemberCap` multiplied by the number of member subscriptions
      without an override.


      When true, the service rejects any configuration where SUM(caps)

      exceeds the group limit. When false, SUM(caps) is permitted to exceed

      the group limit.


      Enabling this flag is rejected if the current configuration already
      breaches the group limit;

      reduce caps first, then enable.
    fullName: isBoundedCap
    remarks: ''
    isDeprecated: false
    syntax:
      content: 'isBoundedCap: boolean'
      return:
        description: ''
        type: boolean
  - name: provisioningState
    uid: '@azure/arm-computelimit.SharedLimitCapProperties.provisioningState'
    package: '@azure/arm-computelimit'
    summary: The provisioning state of the resource.
    fullName: provisioningState
    remarks: ''
    isDeprecated: false
    syntax:
      content: 'provisioningState?: string'
      return:
        description: ''
        type: string
