name: BareMetalMachineReimageSafeguardMode
uid: '@azure/arm-networkcloud.BareMetalMachineReimageSafeguardMode'
package: '@azure/arm-networkcloud'
summary: >-
  The safeguard mode to use for the reimage action, where None indicates to
  bypass safeguards and All indicates to utilize all safeguards. \

  [KnownBareMetalMachineReimageSafeguardMode](xref:@azure/arm-networkcloud.KnownBareMetalMachineReimageSafeguardMode)
  can be used interchangeably with BareMetalMachineReimageSafeguardMode,
   this enum contains the known values that the service supports.
  ### Known values supported by the service

  **All**: Run all pre‑operation validation checks before performing the
  reimage. If any check fails, the request is rejected and no changes are made.
  \

  **None**: Skip all safeguards and perform the reimage without running
  pre‑operation validation checks.
fullName: BareMetalMachineReimageSafeguardMode
remarks: ''
isDeprecated: false
syntax: |
  type BareMetalMachineReimageSafeguardMode = string
