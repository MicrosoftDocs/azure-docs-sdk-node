### YamlMime:TSType
name: MapsAccountUpdateParameters
uid: '@azure/arm-maps.MapsAccountUpdateParameters'
package: '@azure/arm-maps'
summary: Parameters used to update an existing Maps Account.
fullName: MapsAccountUpdateParameters
remarks: ''
isDeprecated: false
type: interface
properties:
  - name: cors
    uid: '@azure/arm-maps.MapsAccountUpdateParameters.cors'
    package: '@azure/arm-maps'
    summary: >-
      Specifies CORS rules for the Blob service. You can include up to five
      CorsRule elements in the request. If no CorsRule elements are included in
      the request body, all CORS rules will be deleted, and CORS will be
      disabled for the Blob service.
    fullName: cors
    remarks: ''
    isDeprecated: false
    syntax:
      content: 'cors?: CorsRules'
      return:
        description: ''
        type: <xref uid="@azure/arm-maps.CorsRules" />
  - name: disableLocalAuth
    uid: '@azure/arm-maps.MapsAccountUpdateParameters.disableLocalAuth'
    package: '@azure/arm-maps'
    summary: >-
      Allows toggle functionality on Azure Policy to disable Azure Maps local
      authentication support. This will disable Shared Keys and Shared Access
      Signature Token authentication from any usage.
    fullName: disableLocalAuth
    remarks: ''
    isDeprecated: false
    syntax:
      content: 'disableLocalAuth?: boolean'
      return:
        description: ''
        type: boolean
  - name: encryption
    uid: '@azure/arm-maps.MapsAccountUpdateParameters.encryption'
    package: '@azure/arm-maps'
    summary: All encryption configuration for a resource.
    fullName: encryption
    remarks: ''
    isDeprecated: false
    syntax:
      content: 'encryption?: Encryption'
      return:
        description: ''
        type: <xref uid="@azure/arm-maps.Encryption" />
  - name: identity
    uid: '@azure/arm-maps.MapsAccountUpdateParameters.identity'
    package: '@azure/arm-maps'
    summary: Managed service identity (system assigned and/or user assigned identities)
    fullName: identity
    remarks: ''
    isDeprecated: false
    syntax:
      content: 'identity?: ManagedServiceIdentity'
      return:
        description: ''
        type: <xref uid="@azure/arm-maps.ManagedServiceIdentity" />
  - name: kind
    uid: '@azure/arm-maps.MapsAccountUpdateParameters.kind'
    package: '@azure/arm-maps'
    summary: Get or Set Kind property.
    fullName: kind
    remarks: ''
    isDeprecated: false
    syntax:
      content: 'kind?: string'
      return:
        description: ''
        type: string
  - name: linkedResources
    uid: '@azure/arm-maps.MapsAccountUpdateParameters.linkedResources'
    package: '@azure/arm-maps'
    summary: >-
      The array of associated resources to the Maps account. Linked resource in
      the array cannot individually update, you must update all linked resources
      in the array together. These resources may be used on operations on the
      Azure Maps REST API. Access is controlled by the Maps Account Managed
      Identity(s) permissions to those resource(s).
    fullName: linkedResources
    remarks: ''
    isDeprecated: false
    syntax:
      content: 'linkedResources?: LinkedResource[]'
      return:
        description: ''
        type: <xref uid="@azure/arm-maps.LinkedResource" />[]
  - name: locations
    uid: '@azure/arm-maps.MapsAccountUpdateParameters.locations'
    package: '@azure/arm-maps'
    summary: >-
      List of additional data processing regions for the Maps Account, which may
      result in requests being processed in another geography. Some features or
      results may be restricted to specific regions. By default, Maps REST APIs
      process requests according to the account location or the [geographic
      scope](https://learn.microsoft.com/azure/azure-maps/geographic-scope).
    fullName: locations
    remarks: ''
    isDeprecated: false
    syntax:
      content: 'locations?: LocationsItem[]'
      return:
        description: ''
        type: <xref uid="@azure/arm-maps.LocationsItem" />[]
  - name: privateEndpointConnections
    uid: '@azure/arm-maps.MapsAccountUpdateParameters.privateEndpointConnections'
    package: '@azure/arm-maps'
    summary: List of private endpoint connections associated with the Maps Account.
    fullName: privateEndpointConnections
    remarks: ''
    isDeprecated: false
    syntax:
      content: 'privateEndpointConnections?: PrivateEndpointConnection[]'
      return:
        description: ''
        type: <xref uid="@azure/arm-maps.PrivateEndpointConnection" />[]
  - name: provisioningState
    uid: '@azure/arm-maps.MapsAccountUpdateParameters.provisioningState'
    package: '@azure/arm-maps'
    summary: >-
      The provisioning state of the Maps account resource, Account updates can
      only be performed on terminal states. Terminal states: `Succeeded` and
      `Failed`
    fullName: provisioningState
    remarks: ''
    isDeprecated: false
    syntax:
      content: 'provisioningState?: string'
      return:
        description: ''
        type: string
  - name: publicNetworkAccess
    uid: '@azure/arm-maps.MapsAccountUpdateParameters.publicNetworkAccess'
    package: '@azure/arm-maps'
    summary: >-
      Property to specify whether the Maps Account will accept traffic from
      public internet. If set to 'disabled' all traffic except private endpoint
      traffic and that that originates from trusted services will be blocked.
    fullName: publicNetworkAccess
    remarks: ''
    isDeprecated: false
    syntax:
      content: 'publicNetworkAccess?: string'
      return:
        description: ''
        type: string
  - name: sku
    uid: '@azure/arm-maps.MapsAccountUpdateParameters.sku'
    package: '@azure/arm-maps'
    summary: The SKU of this account.
    fullName: sku
    remarks: ''
    isDeprecated: false
    syntax:
      content: 'sku?: Sku'
      return:
        description: ''
        type: <xref uid="@azure/arm-maps.Sku" />
  - name: tags
    uid: '@azure/arm-maps.MapsAccountUpdateParameters.tags'
    package: '@azure/arm-maps'
    summary: >-
      Gets or sets a list of key value pairs that describe the resource. These
      tags can be used in viewing and grouping this resource (across resource
      groups). A maximum of 15 tags can be provided for a resource. Each tag
      must have a key no greater than 128 characters and value no greater than
      256 characters.
    fullName: tags
    remarks: ''
    isDeprecated: false
    syntax:
      content: 'tags?: Record<string, string>'
      return:
        description: ''
        type: Record&lt;string, string&gt;
  - name: uniqueId
    uid: '@azure/arm-maps.MapsAccountUpdateParameters.uniqueId'
    package: '@azure/arm-maps'
    summary: A unique identifier for the Maps Account
    fullName: uniqueId
    remarks: ''
    isDeprecated: false
    syntax:
      content: 'uniqueId?: string'
      return:
        description: ''
        type: string
