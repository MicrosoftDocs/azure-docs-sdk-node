name: IsoDuration
uid: '@azure/arm-resiliencemanagement.IsoDuration'
package: '@azure/arm-resiliencemanagement'
summary: >-
  ISO 8601 duration formats. \

  [KnownIsoDuration](xref:@azure/arm-resiliencemanagement.KnownIsoDuration) can
  be used interchangeably with IsoDuration,
   this enum contains the known values that the service supports.
  ### Known values supported by the service

  **PT15M**: 15 minutes. \

  **PT1H**: 1 hour. \

  **PT4H**: 4 hours. \

  **PT24H**: 24 hours.
fullName: IsoDuration
remarks: ''
isDeprecated: false
syntax: |
  type IsoDuration = string
