        description: ''
        type: string
  - name: tunnel_id
    uid: '@azure/ai-projects.MCPToolboxTool.tunnel_id'
    package: '@azure/ai-projects'
    summary: |-
      The Secure MCP Tunnel ID to use instead of a direct server URL. One of
        `server_url`, `connector_id`, or `tunnel_id` must be provided.
    fullName: tunnel_id
    remarks: ''
    isDeprecated: false
    syntax:
      content: 'tunnel_id?: string'
      return:
        description: ''
        type: string
  - name: type
    uid: '@azure/ai-projects.MCPToolboxTool.type'
    package: '@azure/ai-projects'
    summary: >-
      The discriminator possible values: code_interpreter, file_search,
      web_search, mcp, azure_ai_search, openapi, a2a_preview,
      browser_automation_preview, reminder_preview, work_iq_preview,
      fabric_iq_preview, toolbox_search_preview
    fullName: type
    remarks: ''
    isDeprecated: false
    syntax:
      content: 'type: "mcp"'
      return:
        description: ''
        type: '"mcp"'
