name: EnabledProtocols
uid: '@azure/arm-storage.EnabledProtocols'
package: '@azure/arm-storage'
summary: >-
  The authentication protocol that is used for the file share. Can only be
  specified when creating a share. \

  [KnownEnabledProtocols](xref:@azure/arm-storage.KnownEnabledProtocols) can be
  used interchangeably with EnabledProtocols,
   this enum contains the known values that the service supports.
  ### Known values supported by the service

  **SMB** \

  **NFS**
fullName: EnabledProtocols
