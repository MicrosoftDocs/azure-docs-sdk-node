### YamlMime:TSTypeAlias
name: ServerVersion
uid: '@azure/arm-mysql-flexible.ServerVersion'
package: '@azure/arm-mysql-flexible'
summary: >-
  The major version of a server. 8.0.21 stands for MySQL 8.0, 5.7.44 stands for
  MySQL 5.7 \

  [KnownServerVersion](xref:@azure/arm-mysql-flexible.KnownServerVersion) can be
  used interchangeably with ServerVersion,
   this enum contains the known values that the service supports.
  ### Known values supported by the service

  **5.7** \

  **8.0.21** \

  **8.4**
fullName: ServerVersion
remarks: ''
isDeprecated: false
syntax: |
  type ServerVersion = string
