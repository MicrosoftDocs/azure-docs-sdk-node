### YamlMime:TSTypeAlias
name: QueryStringCachingBehavior
uid: '@azure/arm-cdn.QueryStringCachingBehavior'
package: '@azure/arm-cdn'
summary: >-
  Defines how CDN caches requests that include query strings. You can ignore any
  query strings when caching, bypass caching to prevent requests that contain
  query strings from being cached, or cache every request with a unique URL.
fullName: QueryStringCachingBehavior
remarks: ''
isDeprecated: false
syntax: |
  type QueryStringCachingBehavior =
    | "IgnoreQueryString"
    | "BypassCaching"
    | "UseQueryString"
    | "NotSet"
