name: AccessKeysAuthentication
uid: '@azure/arm-redisenterprisecache.AccessKeysAuthentication'
package: '@azure/arm-redisenterprisecache'
summary: >-
  This property can be Enabled/Disabled to allow or deny access with the current
  access keys. Can be updated even after database is created. \

  [KnownAccessKeysAuthentication](xref:@azure/arm-redisenterprisecache.KnownAccessKeysAuthentication)
  can be used interchangeably with AccessKeysAuthentication,
   this enum contains the known values that the service supports.
  ### Known values supported by the service

  **Disabled**: Disabled \

  **Enabled**: Enabled
fullName: AccessKeysAuthentication
remarks: ''
isDeprecated: false
syntax: |
  type AccessKeysAuthentication = string
