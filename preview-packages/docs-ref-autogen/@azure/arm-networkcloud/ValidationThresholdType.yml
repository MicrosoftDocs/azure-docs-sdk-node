### YamlMime:TSTypeAlias
name: ValidationThresholdType
uid: '@azure/arm-networkcloud.ValidationThresholdType'
package: '@azure/arm-networkcloud'
summary: >-
  Selection of how the threshold should be evaluated. \

  [KnownValidationThresholdType](xref:@azure/arm-networkcloud.KnownValidationThresholdType)
  can be used interchangeably with ValidationThresholdType,
   this enum contains the known values that the service supports.
  ### Known values supported by the service

  **CountSuccess**: The threshold is evaluated based on the count of successful
  operations. \

  **PercentSuccess**: The threshold is evaluated based on the percentage of
  successful operations.
fullName: ValidationThresholdType
remarks: ''
isDeprecated: false
syntax: |
  type ValidationThresholdType = string
