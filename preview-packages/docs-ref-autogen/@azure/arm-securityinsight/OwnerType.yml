### YamlMime:TSTypeAlias
name: OwnerType
uid: '@azure/arm-securityinsight.OwnerType'
package: '@azure/arm-securityinsight'
summary: >-
  The type of the owner the hunt is assigned to. \

  [KnownOwnerType](xref:@azure/arm-securityinsight.KnownOwnerType) can be used
  interchangeably with OwnerType,
   this enum contains the known values that the service supports.
  ### Known values supported by the service

  **Unknown**: The hunt owner type is unknown \

  **User**: The hunt owner type is an AAD user \

  **Group**: The hunt owner type is an AAD group
fullName: OwnerType
remarks: ''
isDeprecated: false
syntax: |
  type OwnerType = string
