### YamlMime:TSTypeAlias
name: RuleSeverity
uid: '@azure/arm-security.RuleSeverity'
package: '@azure/arm-security'
summary: >-
  The rule severity. \

  [KnownRuleSeverity](xref:@azure/arm-security.KnownRuleSeverity) can be used
  interchangeably with RuleSeverity,
   this enum contains the known values that the service supports.
  ### Known values supported by the service

  **High**: High severity vulnerability requiring immediate attention. \

  **Medium**: Medium severity vulnerability that should be addressed. \

  **Low**: Low severity vulnerability with minimal risk. \

  **Informational**: Informational finding that does not indicate a
  vulnerability. \

  **Obsolete**: The rule is obsolete and no longer applicable.
fullName: RuleSeverity
remarks: ''
isDeprecated: false
syntax: |
  type RuleSeverity = string
