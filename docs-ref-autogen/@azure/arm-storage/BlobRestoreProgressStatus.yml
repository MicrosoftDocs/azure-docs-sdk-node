### YamlMime:TSTypeAlias
name: BlobRestoreProgressStatus
uid: '@azure/arm-storage.BlobRestoreProgressStatus'
package: '@azure/arm-storage'
summary: >-
  The status of blob restore progress. Possible values are: - InProgress:
  Indicates that blob restore is ongoing. - Complete: Indicates that blob
  restore has been completed successfully. - Failed: Indicates that blob restore
  is failed. \

  [KnownBlobRestoreProgressStatus](xref:@azure/arm-storage.KnownBlobRestoreProgressStatus)
  can be used interchangeably with BlobRestoreProgressStatus,
   this enum contains the known values that the service supports.
  ### Known values supported by the service

  **InProgress** \

  **Complete** \

  **Failed**
fullName: BlobRestoreProgressStatus
remarks: ''
isDeprecated: false
syntax: |
  type BlobRestoreProgressStatus = string
