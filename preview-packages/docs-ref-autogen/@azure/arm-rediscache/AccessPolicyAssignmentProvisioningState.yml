name: AccessPolicyAssignmentProvisioningState
uid: '@azure/arm-rediscache.AccessPolicyAssignmentProvisioningState'
package: '@azure/arm-rediscache'
summary: >-
  Provisioning state of an access policy assignment set \

  [KnownAccessPolicyAssignmentProvisioningState](xref:@azure/arm-rediscache.KnownAccessPolicyAssignmentProvisioningState)
  can be used interchangeably with AccessPolicyAssignmentProvisioningState,
   this enum contains the known values that the service supports.
  ### Known values supported by the service

  **Updating**: The access policy assignments are being updated \

  **Succeeded**: The access policy assignments were successfully updated \

  **Deleting**: The access policy assignments are being deleted \

  **Deleted**: The access policy assignments are considered deleted, meaning no
  custom access policies are applied. \

  **Canceled**: The operation was canceled. Access policy assignments may be in
  a partially updated state. Update them again to have a well-defined state. \

  **Failed**: The operation failed. Access policy assignments may be in a
  partially updated state. Update them again to have a well-defined state.
fullName: AccessPolicyAssignmentProvisioningState
