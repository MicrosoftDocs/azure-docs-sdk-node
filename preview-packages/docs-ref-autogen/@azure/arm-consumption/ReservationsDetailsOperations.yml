  - name: list
    uid: '@azure/arm-consumption.ReservationsDetailsOperations.list'
    package: '@azure/arm-consumption'
    summary: >-
      Lists the reservations details for provided date range. Note: ARM has a
      payload size limit of 12MB, so currently callers get 400 when the response
      size exceeds the ARM limit. If the data size is too large, customers may
      also get 504 as the API timed out preparing the data. In such cases, API
      call should be made with smaller date ranges or a call to Generate
      Reservation Details Report API should be made as it is asynchronous and
      will not run into response size time outs.
