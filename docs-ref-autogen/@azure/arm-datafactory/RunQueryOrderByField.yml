### YamlMime:TSTypeAlias
name: RunQueryOrderByField
uid: '@azure/arm-datafactory.RunQueryOrderByField'
package: '@azure/arm-datafactory'
summary: >-
  Parameter name to be used for order by. The allowed parameters to order by for
  pipeline runs are PipelineName, RunStart, RunEnd and Status; for activity runs
  are ActivityName, ActivityRunStart, ActivityRunEnd and Status; for trigger
  runs are TriggerName, TriggerRunTimestamp and Status. \

  [KnownRunQueryOrderByField](xref:@azure/arm-datafactory.KnownRunQueryOrderByField)
  can be used interchangeably with RunQueryOrderByField,
   this enum contains the known values that the service supports.
  ### Known values supported by the service

  **RunStart**: RunStart \

  **RunEnd**: RunEnd \

  **PipelineName**: PipelineName \

  **Status**: Status \

  **ActivityName**: ActivityName \

  **ActivityRunStart**: ActivityRunStart \

  **ActivityRunEnd**: ActivityRunEnd \

  **TriggerName**: TriggerName \

  **TriggerRunTimestamp**: TriggerRunTimestamp
fullName: RunQueryOrderByField
remarks: ''
isDeprecated: false
syntax: |
  type RunQueryOrderByField = string
