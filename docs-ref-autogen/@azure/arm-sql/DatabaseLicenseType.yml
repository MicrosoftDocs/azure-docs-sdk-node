### YamlMime:TSTypeAlias
name: DatabaseLicenseType
uid: '@azure/arm-sql.DatabaseLicenseType'
package: '@azure/arm-sql'
summary: >-
  The license type to apply for this database. `LicenseIncluded` if you need a
  license, or `BasePrice` if you have a license and are eligible for the Azure
  Hybrid Benefit. \

  [KnownDatabaseLicenseType](xref:@azure/arm-sql.KnownDatabaseLicenseType) can
  be used interchangeably with DatabaseLicenseType,
   this enum contains the known values that the service supports.
  ### Known values supported by the service

  **LicenseIncluded**: LicenseIncluded \

  **BasePrice**: BasePrice
fullName: DatabaseLicenseType
remarks: ''
isDeprecated: false
syntax: |
  type DatabaseLicenseType = string
