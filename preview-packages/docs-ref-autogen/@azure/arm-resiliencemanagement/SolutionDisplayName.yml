name: SolutionDisplayName
uid: '@azure/arm-resiliencemanagement.SolutionDisplayName'
package: '@azure/arm-resiliencemanagement'
summary: >-
  Identifies a high-availability solution that can be applied to a resource (for
  example, zone-pinned VM with ZRS disk). \

  [KnownSolutionDisplayName](xref:@azure/arm-resiliencemanagement.KnownSolutionDisplayName)
  can be used interchangeably with SolutionDisplayName,
   this enum contains the known values that the service supports.
  ### Known values supported by the service

  **ZonePinnedVmWithZrsDisk**: Zone pinned VM with ZRS disk. \

  **VmInMultiZoneVmss**: VM in multi-zone VMSS.
fullName: SolutionDisplayName
remarks: ''
