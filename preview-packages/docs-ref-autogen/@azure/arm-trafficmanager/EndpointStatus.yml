name: EndpointStatus
uid: '@azure/arm-trafficmanager.EndpointStatus'
package: '@azure/arm-trafficmanager'
summary: >-
  The status of the endpoint. If the endpoint is Enabled, it is probed for
  endpoint health and is included in the traffic routing method. \

  [KnownEndpointStatus](xref:@azure/arm-trafficmanager.KnownEndpointStatus) can
  be used interchangeably with EndpointStatus,
   this enum contains the known values that the service supports.
  ### Known values supported by the service

  **Enabled** \

  **Disabled**
fullName: EndpointStatus
remarks: ''
isDeprecated: false
syntax: |
  type EndpointStatus = string
