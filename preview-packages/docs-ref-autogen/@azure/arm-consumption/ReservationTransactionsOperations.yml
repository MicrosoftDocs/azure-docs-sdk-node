  - name: list
    uid: '@azure/arm-consumption.ReservationTransactionsOperations.list'
    package: '@azure/arm-consumption'
    summary: >-
      List of transactions for reserved instances on billing account scope.
      Note: The refund transactions are posted along with its purchase
      transaction (i.e. in the purchase billing month). For example, The refund
      is requested in May 2021. This refund transaction will have event date as
      May 2021 but the billing month as April 2020 when the reservation purchase
      was made. Note: ARM has a payload size limit of 12MB, so currently callers
      get 400 when the response size exceeds the ARM limit. In such cases, API
      call should be made with smaller date ranges.
    fullName: list
    remarks: ''
    isDeprecated: false
    syntax:
      content: >-
        list: (billingAccountId: string, options?:
        ReservationTransactionsListOptionalParams) =>
        PagedAsyncIterableIterator<ReservationTransaction,
        ReservationTransaction[], PageSettings>
      return:
        description: ''
        type: >-
          (billingAccountId: string, options?:
          ReservationTransactionsListOptionalParams) =&gt;
          PagedAsyncIterableIterator&lt;ReservationTransaction,
          ReservationTransaction[], PageSettings&gt;
