### YamlMime:TSTypeAlias
name: DomainEntryState
uid: '@azure/arm-billing-trust.DomainEntryState'
package: '@azure/arm-billing-trust'
summary: >-
  The verification state of a single domain entry within an eduQualification
  rule \

  [KnownDomainEntryState](xref:@azure/arm-billing-trust.KnownDomainEntryState)
  can be used interchangeably with DomainEntryState,
   this enum contains the known values that the service supports.
  ### Known values supported by the service

  **pending**: Domain verification queued or in progress \

  **actionRequired**: Customer must supply additional evidence (e.g.
  supplemental documents) \

  **failed**: Domain verification failed \

  **succeeded**: Domain verification succeeded
fullName: DomainEntryState
remarks: ''
isDeprecated: false
syntax: |
  type DomainEntryState = string
