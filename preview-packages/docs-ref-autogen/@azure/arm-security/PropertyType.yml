### YamlMime:TSTypeAlias
name: PropertyType
uid: '@azure/arm-security.PropertyType'
package: '@azure/arm-security'
summary: >-
  The data type of the compared operands (string, integer, floating point number
  or a boolean [true/false]] \

  [KnownPropertyType](xref:@azure/arm-security.KnownPropertyType) can be used
  interchangeably with PropertyType,
   this enum contains the known values that the service supports.
  ### Known values supported by the service

  **String**: String \

  **Integer**: Integer \

  **Number**: Number \

  **Boolean**: Boolean
fullName: PropertyType
remarks: ''
isDeprecated: false
syntax: |
  type PropertyType = string
