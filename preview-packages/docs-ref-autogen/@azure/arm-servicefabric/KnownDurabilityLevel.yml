### YamlMime:TSEnum
name: KnownDurabilityLevel
uid: '@azure/arm-servicefabric.KnownDurabilityLevel'
package: '@azure/arm-servicefabric'
summary: >-
  The durability level of the node type. Learn about
  [DurabilityLevel](https://docs.microsoft.com/azure/service-fabric/service-fabric-cluster-capacity).
fullName: KnownDurabilityLevel
remarks: ''
isDeprecated: false
fields:
  - name: Bronze
    uid: '@azure/arm-servicefabric.KnownDurabilityLevel.Bronze'
    package: '@azure/arm-servicefabric'
    summary: No privileges. This is the default.
  - name: Gold
    uid: '@azure/arm-servicefabric.KnownDurabilityLevel.Gold'
    package: '@azure/arm-servicefabric'
    summary: >-
      The infrastructure jobs can be paused for a duration of 2 hours per UD.
      Gold durability can be enabled only on full node VM skus like D15_V2, G5
      etc.
  - name: Silver
    uid: '@azure/arm-servicefabric.KnownDurabilityLevel.Silver'
    package: '@azure/arm-servicefabric'
    summary: The infrastructure jobs can be paused for a duration of 10 minutes per UD.
