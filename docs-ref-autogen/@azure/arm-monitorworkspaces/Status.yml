### YamlMime:TSTypeAlias
name: Status
uid: '@azure/arm-monitorworkspaces.Status'
package: '@azure/arm-monitorworkspaces'
summary: >-
  The issue status \

  [KnownStatus](xref:@azure/arm-monitorworkspaces.KnownStatus) can be used
  interchangeably with Status,
   this enum contains the known values that the service supports.
  ### Known values supported by the service

  **New**: The issue is new \

  **InProgress**: The issue is in progress \

  **Mitigated**: The issue is mitigated \

  **Closed**: The issue is closed \

  **Canceled**: The issue is canceled
fullName: Status
remarks: ''
isDeprecated: false
syntax: |
  type Status = string
