name: AccessReviewInstanceReviewersType
uid: '@azure/arm-authorization.AccessReviewInstanceReviewersType'
package: '@azure/arm-authorization'
summary: >-
  This field specifies the type of reviewers for a review. Usually for a review,
  reviewers are explicitly assigned. However, in some cases, the reviewers may
  not be assigned and instead be chosen dynamically. For example managers review
  or self review. \

  [KnownAccessReviewInstanceReviewersType](xref:@azure/arm-authorization.KnownAccessReviewInstanceReviewersType)
  can be used interchangeably with AccessReviewInstanceReviewersType,
   this enum contains the known values that the service supports.
  ### Known values supported by the service

  **Assigned**: Assigned \

  **Self**: Self \

  **Managers**: Managers
