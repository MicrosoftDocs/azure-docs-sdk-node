### YamlMime:TSTypeAlias
name: DeletionRecoveryLevel
uid: '@azure/arm-keyvault.DeletionRecoveryLevel'
package: '@azure/arm-keyvault'
summary: >-
  The deletion recovery level currently in effect for the object. If it contains
  'Purgeable', then the object can be permanently deleted by a privileged user;
  otherwise, only the system can purge the object at the end of the retention
  interval. \

  [KnownDeletionRecoveryLevel](xref:@azure/arm-keyvault.KnownDeletionRecoveryLevel)
  can be used interchangeably with DeletionRecoveryLevel,
   this enum contains the known values that the service supports.
  ### Known values supported by the service

  **Purgeable** \

  **Recoverable+Purgeable** \

  **Recoverable** \

  **Recoverable+ProtectedSubscription**
fullName: DeletionRecoveryLevel
remarks: ''
isDeprecated: false
syntax: |
  type DeletionRecoveryLevel = string
