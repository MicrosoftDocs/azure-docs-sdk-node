  - name: failover
    uid: '@azure/arm-storage.StorageAccountsOperations.failover'
    package: '@azure/arm-storage'
    summary: >-
      A failover request can be triggered for a storage account in the event a
      primary endpoint becomes unavailable for any reason. The failover occurs
      from the storage account's primary cluster to the secondary cluster for
      RA-GRS accounts. The secondary cluster will become primary after failover
      and the account is converted to LRS. In the case of a Planned Failover,
      the primary and secondary clusters are swapped after failover and the
      account remains geo-replicated. Failover should continue to be used in the
      event of availability issues as Planned failover is only available while
      the primary and secondary endpoints are available. The primary use case of
      a Planned Failover is disaster recovery testing drills. This type of
      failover is invoked by setting FailoverType parameter to 'Planned'. Learn
      more about the failover options here-
      https://learn.microsoft.com/azure/storage/common/storage-disaster-recovery-guidance
    fullName: failover
    remarks: ''
    isDeprecated: false
    syntax:
      content: >-
        failover: (resourceGroupName: string, accountName: string, options?:
        StorageAccountsFailoverOptionalParams) =>
        PollerLike<OperationState<void>, void>
      return:
        description: ''
