### YamlMime:TSTypeAlias
name: AddressUpdateAction
uid: '@azure/arm-network.AddressUpdateAction'
package: '@azure/arm-network'
summary: >-
  Specifies the type of update operation to perform on addresses within the
  address location of service gateway.


  - FullUpdate: Replaces all existing address data with the new list provided in
  the request. Any previously defined addresses not included will be removed.

  - PartialUpdate: Updates only the specified addresses. \

  [KnownAddressUpdateAction](xref:@azure/arm-network.KnownAddressUpdateAction)
  can be used interchangeably with AddressUpdateAction,
   this enum contains the known values that the service supports.
  ### Known values supported by the service

  **FullUpdate**: FullUpdate \

  **PartialUpdate**: PartialUpdate
fullName: AddressUpdateAction
remarks: ''
isDeprecated: false
syntax: |
  type AddressUpdateAction = string
