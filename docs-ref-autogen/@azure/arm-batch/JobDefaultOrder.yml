### YamlMime:TSTypeAlias
name: JobDefaultOrder
uid: '@azure/arm-batch.JobDefaultOrder'
package: '@azure/arm-batch'
summary: >-
  The order for scheduling tasks from different jobs with the same priority. \

  [KnownJobDefaultOrder](xref:@azure/arm-batch.KnownJobDefaultOrder) can be used
  interchangeably with JobDefaultOrder,
   this enum contains the known values that the service supports.
  ### Known values supported by the service

  **None**: Tasks should be scheduled uniformly from all equal-priority jobs for
  the pool. \

  **CreationTime**: If jobs have equal priority, tasks from jobs that were
  created earlier should be scheduled first.
fullName: JobDefaultOrder
remarks: ''
isDeprecated: false
syntax: |
  type JobDefaultOrder = string
