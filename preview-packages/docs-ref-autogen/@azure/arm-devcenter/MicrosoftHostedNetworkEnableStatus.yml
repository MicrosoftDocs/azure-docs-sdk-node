### YamlMime:TSTypeAlias
name: MicrosoftHostedNetworkEnableStatus
uid: '@azure/arm-devcenter.MicrosoftHostedNetworkEnableStatus'
package: '@azure/arm-devcenter'
summary: >-
  Indicates whether pools in this Dev Center can use Microsoft Hosted Networks.
  Defaults to Enabled if not set. \

  [KnownMicrosoftHostedNetworkEnableStatus](xref:@azure/arm-devcenter.KnownMicrosoftHostedNetworkEnableStatus)
  can be used interchangeably with MicrosoftHostedNetworkEnableStatus,
   this enum contains the known values that the service supports.
  ### Known values supported by the service

  **Enabled**: Microsoft Hosted Networks are enabled for this Dev Center. \

  **Disabled**: Microsoft Hosted Networks are disabled for this Dev Center.
fullName: MicrosoftHostedNetworkEnableStatus
remarks: ''
isDeprecated: false
syntax: |
  type MicrosoftHostedNetworkEnableStatus = string
