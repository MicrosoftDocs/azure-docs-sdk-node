    package: '@azure/arm-security'
    summary: >-
      Create a private link resource. This operation creates the necessary
      infrastructure to enable private endpoint connections to Microsoft
      Defender for Cloud services. For updates to existing resources, use the
      PATCH operation. The operation is asynchronous and may take several
      minutes to complete.
