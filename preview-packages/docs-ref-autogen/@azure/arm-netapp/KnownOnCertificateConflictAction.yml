### YamlMime:TSEnum
name: KnownOnCertificateConflictAction
uid: '@azure/arm-netapp.KnownOnCertificateConflictAction'
package: '@azure/arm-netapp'
summary: >-
  This action is triggered when a certificate conflict occurs. A conflict arises
  if you try to create a new bucket while one or more already exist on the
  server, or if you update a bucket when multiple buckets are present. This
  happens because a single certificate is shared among all buckets on the same
  server.


  Note: This applies both to certificates provided directly via the
  certificateObject property and to those retrieved from Azure Key Vault.
  Details for the latter case are specified in the
  akvDetails.certificateAkvDetails section.
fullName: KnownOnCertificateConflictAction
remarks: ''
isDeprecated: false
fields:
  - name: Fail
    uid: '@azure/arm-netapp.KnownOnCertificateConflictAction.Fail'
    package: '@azure/arm-netapp'
    summary: >-
      Fail the operation if a conflict occurs, meaning the bucket operation will
      fail, and the existing certificate will continue to be in use.
  - name: Update
    uid: '@azure/arm-netapp.KnownOnCertificateConflictAction.Update'
    package: '@azure/arm-netapp'
    summary: >-
      Update the existing certificate regardless of whether there is a conflict
      or not. This means all buckets on the server will now use the new
      certificate.
