name: TroubleshootersOperations
uid: '@azure/arm-selfhelp.TroubleshootersOperations'
package: '@azure/arm-selfhelp'
summary: Interface representing a Troubleshooters operations.
fullName: TroubleshootersOperations
remarks: ''
isDeprecated: false
type: interface
properties:
  - name: continue
    uid: '@azure/arm-selfhelp.TroubleshootersOperations.continue'
    package: '@azure/arm-selfhelp'
    summary: >-
      Uses ‘stepId’ and ‘responses’ as the trigger to continue the
      troubleshooting steps for the respective troubleshooter resource name.
      <br/>Continue API is used to provide inputs that are required for the
      specific troubleshooter to progress into the next step in the process.
      This API is used after the Troubleshooter has been created using the
      Create API.
    fullName: continue
    remarks: ''
    isDeprecated: false
    syntax:
      content: >-
        continue: (scope: string, troubleshooterName: string, options?:
        TroubleshootersContinueOptionalParams) => Promise<void>
      return:
        description: ''
        type: >-
          (scope: string, troubleshooterName: string, options?:
          TroubleshootersContinueOptionalParams) =&gt; Promise&lt;void&gt;
  - name: create
    uid: '@azure/arm-selfhelp.TroubleshootersOperations.create'
    package: '@azure/arm-selfhelp'
    summary: >-
      Creates the specific troubleshooter action under a resource or
      subscription using the ‘solutionId’ and  ‘properties.parameters’ as the
      trigger. <br/> Azure Troubleshooters help with hard to classify issues,
      reducing the gap between customer observed problems and solutions by
      guiding the user effortlessly through the troubleshooting process. Each
      Troubleshooter flow represents a problem area within Azure and has a
      complex tree-like structure that addresses many root causes. These flows
      are prepared with the help of Subject Matter experts and customer support
      engineers by carefully considering previous support requests raised by
      customers. Troubleshooters terminate at a well curated solution based off
      of resource backend signals and customer manual selections.
    fullName: create
    remarks: ''
    isDeprecated: false
    syntax:
      content: >-
        create: (scope: string, troubleshooterName: string, options?:
        TroubleshootersCreateOptionalParams) => Promise<TroubleshooterResource>
      return:
        description: ''
        type: >-
          (scope: string, troubleshooterName: string, options?:
          TroubleshootersCreateOptionalParams) =&gt;
          Promise&lt;TroubleshooterResource&gt;
  - name: end
    uid: '@azure/arm-selfhelp.TroubleshootersOperations.end'
    package: '@azure/arm-selfhelp'
    summary: Ends the troubleshooter action
    fullName: end
    remarks: ''
    isDeprecated: false
    syntax:
      content: >-
        end: (scope: string, troubleshooterName: string, options?:
        TroubleshootersEndOptionalParams) => Promise<void>
      return:
        description: ''
        type: >-
          (scope: string, troubleshooterName: string, options?:
          TroubleshootersEndOptionalParams) =&gt; Promise&lt;void&gt;
  - name: get
    uid: '@azure/arm-selfhelp.TroubleshootersOperations.get'
    package: '@azure/arm-selfhelp'
    summary: >-
      Gets troubleshooter instance result which includes the step status/result
      of the troubleshooter resource name that is being executed.<br/> Get API
      is used to retrieve the result of a Troubleshooter instance, which
      includes the status and result of each step in the Troubleshooter
      workflow. This API requires the Troubleshooter resource name that was
      created using the Create API.
    fullName: get
    remarks: ''
    isDeprecated: false
    syntax:
      content: >-
        get: (scope: string, troubleshooterName: string, options?:
        TroubleshootersGetOptionalParams) => Promise<TroubleshooterResource>
      return:
        description: ''
        type: >-
          (scope: string, troubleshooterName: string, options?:
          TroubleshootersGetOptionalParams) =&gt;
          Promise&lt;TroubleshooterResource&gt;
  - name: restart
    uid: '@azure/arm-selfhelp.TroubleshootersOperations.restart'
    package: '@azure/arm-selfhelp'
    summary: >-
      Restarts the troubleshooter API using applicable troubleshooter resource
      name as the input.<br/> It returns new resource name which should be used
      in subsequent request. The old resource name is obsolete after this API is
      invoked.
    fullName: restart
    remarks: ''
    isDeprecated: false
    syntax:
      content: >-
        restart: (scope: string, troubleshooterName: string, options?:
        TroubleshootersRestartOptionalParams) =>
        Promise<RestartTroubleshooterResponse>
      return:
        description: ''
        type: >-
          (scope: string, troubleshooterName: string, options?:
          TroubleshootersRestartOptionalParams) =&gt;
          Promise&lt;RestartTroubleshooterResponse&gt;
