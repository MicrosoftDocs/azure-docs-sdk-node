### YamlMime:TSEnum
name: KnownReservationType
uid: '@azure/arm-compute.KnownReservationType'
package: '@azure/arm-compute'
summary: >-
  Indicates the type of capacity reservation. Allowed values are 'Block' for
  block capacity reservations and 'Targeted' for reservations that enable a VM
  to consume a specific capacity reservation when a capacity reservation group
  is provided. The reservation type is immutable and cannot be changed after it
  is assigned.
fullName: KnownReservationType
remarks: ''
isDeprecated: false
fields:
  - name: Block
    uid: '@azure/arm-compute.KnownReservationType.Block'
    package: '@azure/arm-compute'
    summary: >-
      To consume scheduled allocated block capacity reservation when a capacity
      reservation group is provided.
  - name: Targeted
    uid: '@azure/arm-compute.KnownReservationType.Targeted'
    package: '@azure/arm-compute'
    summary: >-
      To consume on demand allocated capacity reservation when a capacity
      reservation group is provided.
