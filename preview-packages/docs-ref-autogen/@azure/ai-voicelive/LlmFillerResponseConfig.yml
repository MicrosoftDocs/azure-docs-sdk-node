name: LlmFillerResponseConfig
uid: '@azure/ai-voicelive.LlmFillerResponseConfig'
package: '@azure/ai-voicelive'
summary: >-
  Configuration for LLM-based filler response generation.

  Uses LLM to generate context-aware filler responses when any trigger condition
  is met.
fullName: LlmFillerResponseConfig
remarks: ''
isDeprecated: false
type: interface
properties:
