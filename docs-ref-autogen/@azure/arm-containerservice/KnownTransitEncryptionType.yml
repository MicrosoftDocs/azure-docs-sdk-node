### YamlMime:TSEnum
name: KnownTransitEncryptionType
uid: '@azure/arm-containerservice.KnownTransitEncryptionType'
package: '@azure/arm-containerservice'
summary: >-
  Configures pod-to-pod encryption. This can be enabled only on Cilium-based
  clusters. If not specified, the default value is None.
fullName: KnownTransitEncryptionType
remarks: ''
isDeprecated: false
fields:
  - name: None
    uid: '@azure/arm-containerservice.KnownTransitEncryptionType.None'
    package: '@azure/arm-containerservice'
    summary: Disable Transit encryption
  - name: WireGuard
    uid: '@azure/arm-containerservice.KnownTransitEncryptionType.WireGuard'
    package: '@azure/arm-containerservice'
    summary: >-
      Enable WireGuard encryption. Refer to
      https://docs.cilium.io/en/latest/security/network/encryption-wireguard/ on
      use cases and implementation details
