fields:
  - name: AzureBlob
    uid: '@azure/search-documents.KnownKnowledgeSourceKind.AzureBlob'
    package: '@azure/search-documents'
    summary: >-
      A knowledge source that read and ingest data from Azure Blob Storage to a
      Search Index.
  - name: FabricDataAgent
    uid: '@azure/search-documents.KnownKnowledgeSourceKind.FabricDataAgent'
    package: '@azure/search-documents'
    summary: A knowledge source that retrieves data from a Fabric Data Agent.
  - name: FabricOntology
    uid: '@azure/search-documents.KnownKnowledgeSourceKind.FabricOntology'
    package: '@azure/search-documents'
    summary: >-
      A knowledge source that retrieves data from Microsoft Fabric Ontology
      ontologies.
  - name: File
    uid: '@azure/search-documents.KnownKnowledgeSourceKind.File'
    package: '@azure/search-documents'
    summary: A knowledge source that supports direct file upload and indexing.
  - name: IndexedOneLake
    uid: '@azure/search-documents.KnownKnowledgeSourceKind.IndexedOneLake'
    package: '@azure/search-documents'
    summary: A knowledge source that reads data from indexed OneLake.
  - name: IndexedSharePoint
    uid: '@azure/search-documents.KnownKnowledgeSourceKind.IndexedSharePoint'
    package: '@azure/search-documents'
    summary: A knowledge source that reads data from indexed SharePoint.
  - name: IndexedSql
    uid: '@azure/search-documents.KnownKnowledgeSourceKind.IndexedSql'
    package: '@azure/search-documents'
    summary: >-
      A knowledge source that retrieves and ingests data from Azure SQL Database
