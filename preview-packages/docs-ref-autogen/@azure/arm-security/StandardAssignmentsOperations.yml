          standardAssignment: StandardAssignment, options?:
          StandardAssignmentsCreateOptionalParams) =&gt;
          Promise&lt;StandardAssignment&gt;
  - name: delete
    uid: '@azure/arm-security.StandardAssignmentsOperations.delete'
    package: '@azure/arm-security'
    summary: >-
      This operation deletes a standard assignment, given its name and the scope
      it was created in. The scope of a standard assignment is the part of its
      ID preceding
      '/providers/Microsoft.Security/standardAssignments/{standardAssignmentName}'.
    fullName: delete
    remarks: ''
    isDeprecated: false
