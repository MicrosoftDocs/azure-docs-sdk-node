### YamlMime:TSTypeAlias
name: SkipShutdown
uid: '@azure/arm-networkcloud.SkipShutdown'
package: '@azure/arm-networkcloud'
summary: >-
  The indicator of whether to skip the graceful OS shutdown and power off the
  virtual machine immediately. \

  [KnownSkipShutdown](xref:@azure/arm-networkcloud.KnownSkipShutdown) can be
  used interchangeably with SkipShutdown,
   this enum contains the known values that the service supports.
  ### Known values supported by the service

  **True**: Skip the graceful OS shutdown and power off the virtual machine
  immediately. \

  **False**: Do not skip the graceful OS shutdown.
fullName: SkipShutdown
remarks: ''
isDeprecated: false
syntax: |
  type SkipShutdown = string
