name: BareMetalMachinePowerState
uid: '@azure/arm-networkcloud.BareMetalMachinePowerState'
package: '@azure/arm-networkcloud'
summary: >-
  The power state derived from the baseboard management controller. \

  [KnownBareMetalMachinePowerState](xref:@azure/arm-networkcloud.KnownBareMetalMachinePowerState)
  can be used interchangeably with BareMetalMachinePowerState,
   this enum contains the known values that the service supports.
  ### Known values supported by the service

  **On**: The bare metal machine was marked as powered on in the latest check of
  the baseboard management controller. \

  **Off**: The bare metal machine was marked as powered off in the latest check
  of the baseboard management controller.
fullName: BareMetalMachinePowerState
remarks: ''
isDeprecated: false
syntax: |
  type BareMetalMachinePowerState = string
