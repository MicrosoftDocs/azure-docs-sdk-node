### YamlMime:TSTypeAlias
name: ContainerNetworkLogs
uid: '@azure/arm-containerservice.ContainerNetworkLogs'
package: '@azure/arm-containerservice'
summary: >-
  Configures container network logs ingestion with Azure Monitor. Which network
  logs to ingest is controlled by the CRD found in the following links. No
  network logs are ingested by default. More information on container network
  logs can be found at https://aka.ms/ContainerNetworkLogsDoc. More information
  on configuring container network log can be found at
  https://aka.ms/acns/howtoenablecnl. If not specified, the default is Disabled.
  \

  [KnownContainerNetworkLogs](xref:@azure/arm-containerservice.KnownContainerNetworkLogs)
  can be used interchangeably with ContainerNetworkLogs,
   this enum contains the known values that the service supports.
  ### Known values supported by the service

  **Disabled**: Azure monitor ingestion of container network logs is disabled \

  **Enabled**: Azure monitor ingestion of container network logs is enabled
fullName: ContainerNetworkLogs
remarks: ''
isDeprecated: false
syntax: |
  type ContainerNetworkLogs = string
