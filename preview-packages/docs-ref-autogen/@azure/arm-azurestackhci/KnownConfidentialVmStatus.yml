### YamlMime:TSEnum
name: KnownConfidentialVmStatus
uid: '@azure/arm-azurestackhci.KnownConfidentialVmStatus'
package: '@azure/arm-azurestackhci'
summary: >-
  Captures the current status of Confidential Virtual Machine (CVM) support on
  the cluster.
fullName: KnownConfidentialVmStatus
remarks: ''
isDeprecated: false
fields:
  - name: Disabled
    uid: '@azure/arm-azurestackhci.KnownConfidentialVmStatus.Disabled'
    package: '@azure/arm-azurestackhci'
    summary: CVM support is disabled. None of the nodes in the cluster are CVM capable.
  - name: Enabled
    uid: '@azure/arm-azurestackhci.KnownConfidentialVmStatus.Enabled'
    package: '@azure/arm-azurestackhci'
    summary: CVM support is fully enabled on the cluster. All nodes are CVM capable.
  - name: PartiallyEnabled
    uid: '@azure/arm-azurestackhci.KnownConfidentialVmStatus.PartiallyEnabled'
    package: '@azure/arm-azurestackhci'
    summary: >-
      CVM support is partially enabled. At least one node in the cluster is CVM
      capable.
