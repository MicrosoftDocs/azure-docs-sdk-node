name: PublicIPType
uid: '@azure/arm-kusto.PublicIPType'
package: '@azure/arm-kusto'
summary: >-
  Indicates what public IP type to create - IPv4 (default), or DualStack (both
  IPv4 and IPv6) \

  [KnownPublicIPType](xref:@azure/arm-kusto.KnownPublicIPType) can be used
  interchangeably with PublicIPType,
   this enum contains the known values that the service supports.
  ### Known values supported by the service

  **IPv4**: IPv4 \

  **DualStack**: DualStack
fullName: PublicIPType
remarks: ''
isDeprecated: false
syntax: |
  type PublicIPType = string
