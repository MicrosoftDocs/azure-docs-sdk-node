name: RenderOptionLegend
uid: '@azure/planetarycomputer.RenderOptionLegend'
package: '@azure/planetarycomputer'
summary: Configuration for generating a data legend.
fullName: RenderOptionLegend
remarks: ''
isDeprecated: false
type: interface
properties:
  - name: labels
    uid: '@azure/planetarycomputer.RenderOptionLegend.labels'
    package: '@azure/planetarycomputer'
    summary: Text labels to display on the legend.
    fullName: labels
    remarks: ''
    isDeprecated: false
    syntax:
      content: 'labels?: string[]'
      return:
        description: ''
        type: string[]
  - name: scaleFactor
    uid: '@azure/planetarycomputer.RenderOptionLegend.scaleFactor'
    package: '@azure/planetarycomputer'
    summary: >-
      A factor to multiply interval legend labels by. Useful for scaled rasters
      whose

      colormap definitions map to unscaled values, effectively showing legend
      labels

      as scaled values.
    fullName: scaleFactor
    remarks: ''
    isDeprecated: false
    syntax:
      content: 'scaleFactor?: number'
      return:
        description: ''
        type: number
  - name: trimEnd
    uid: '@azure/planetarycomputer.RenderOptionLegend.trimEnd'
    package: '@azure/planetarycomputer'
    summary: Number of items to trim from the end of the legend.
    fullName: trimEnd
    remarks: ''
    isDeprecated: false
    syntax:
      content: 'trimEnd?: number'
      return:
        description: ''
        type: number
  - name: trimStart
    uid: '@azure/planetarycomputer.RenderOptionLegend.trimStart'
    package: '@azure/planetarycomputer'
    summary: >-
      The number of items to trim from the start of the legend definition. Used
      if

      there are values important for rendering (e.g. nodata) that aren't
      desirable in

      the legend.
    fullName: trimStart
    remarks: ''
    isDeprecated: false
    syntax:
      content: 'trimStart?: number'
      return:
        description: ''
        type: number
  - name: type
    uid: '@azure/planetarycomputer.RenderOptionLegend.type'
    package: '@azure/planetarycomputer'
    summary: |-
      Legend type to make,
      one of: `continuous`,
      `classmap`,
      `interval` or `none`
      (note, `none` is a string literal).
    fullName: type
    remarks: ''
    isDeprecated: false
    syntax:
      content: 'type?: string'
      return:
        description: ''
        type: string
