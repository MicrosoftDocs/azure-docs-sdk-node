### YamlMime:TSEnum
name: KnownZonalAllocationPolicy
uid: '@azure/arm-rediscache.KnownZonalAllocationPolicy'
package: '@azure/arm-rediscache'
summary: >-
  Optional: Specifies how availability zones are allocated to the Redis cache.
  'Automatic' enables zone redundancy and Azure will automatically select zones
  based on regional availability and capacity. 'UserDefined' will select
  availability zones passed in by you using the 'zones' parameter. 'NoZones'
  will produce a non-zonal cache. If 'zonalAllocationPolicy' is not passed, it
  will be set to 'UserDefined' when zones are passed in, otherwise, it will be
  set to 'Automatic' in regions where zones are supported and 'NoZones' in
  regions where zones are not supported.
fullName: KnownZonalAllocationPolicy
remarks: ''
isDeprecated: false
fields:
  - name: Automatic
    uid: '@azure/arm-rediscache.KnownZonalAllocationPolicy.Automatic'
    package: '@azure/arm-rediscache'
    summary: >-
      The zones for the cache will be selected automatically based on
      availability and capacity.
  - name: NoZones
    uid: '@azure/arm-rediscache.KnownZonalAllocationPolicy.NoZones'
    package: '@azure/arm-rediscache'
    summary: The cache will not use multiple availability zones.
  - name: UserDefined
    uid: '@azure/arm-rediscache.KnownZonalAllocationPolicy.UserDefined'
    package: '@azure/arm-rediscache'
    summary: >-
      UserDefined means the zones for the cache are manually configured using
      the 'zones' property, and can not be automatically selected.
