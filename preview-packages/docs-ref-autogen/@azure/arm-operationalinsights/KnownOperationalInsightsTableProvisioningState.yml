### YamlMime:TSEnum
name: KnownOperationalInsightsTableProvisioningState
uid: '@azure/arm-operationalinsights.KnownOperationalInsightsTableProvisioningState'
package: '@azure/arm-operationalinsights'
summary: >-
  Table's current provisioning state. If set to 'updating', indicates a resource
  lock due to ongoing operation, forbidding any update to the table until the
  ongoing operation is concluded.
fullName: KnownOperationalInsightsTableProvisioningState
remarks: ''
isDeprecated: false
fields:
  - name: Deleting
    uid: >-
      @azure/arm-operationalinsights.KnownOperationalInsightsTableProvisioningState.Deleting
    package: '@azure/arm-operationalinsights'
    summary: Table state is deleting.
  - name: InProgress
    uid: >-
      @azure/arm-operationalinsights.KnownOperationalInsightsTableProvisioningState.InProgress
    package: '@azure/arm-operationalinsights'
    summary: Table schema is stable and without changes, table data is being updated.
  - name: Succeeded
    uid: >-
      @azure/arm-operationalinsights.KnownOperationalInsightsTableProvisioningState.Succeeded
    package: '@azure/arm-operationalinsights'
    summary: >-
      Table state is stable and without changes, table is unlocked and open for
      new updates.
  - name: Updating
    uid: >-
      @azure/arm-operationalinsights.KnownOperationalInsightsTableProvisioningState.Updating
    package: '@azure/arm-operationalinsights'
    summary: >-
      Table schema is still being built and updated, table is currently locked
      for any changes till the procedure is done.
