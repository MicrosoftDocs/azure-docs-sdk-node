### YamlMime:TSEnum
name: KnownPublicNetworkAccess
uid: '@azure/arm-rediscache.KnownPublicNetworkAccess'
package: '@azure/arm-rediscache'
summary: >-
  Whether or not public endpoint access is allowed for this cache.  Value is
  optional but if passed in, must be 'Enabled' or 'Disabled'. If 'Disabled',
  private endpoints are the exclusive access method. Default value is 'Enabled'
fullName: KnownPublicNetworkAccess
remarks: ''
isDeprecated: false
fields:
  - name: Disabled
    uid: '@azure/arm-rediscache.KnownPublicNetworkAccess.Disabled'
    package: '@azure/arm-rediscache'
    summary: >-
      Public internet access to the cache, via its public IP address, is
      disabled. Connections must use be made via private endpoints.
  - name: Enabled
    uid: '@azure/arm-rediscache.KnownPublicNetworkAccess.Enabled'
    package: '@azure/arm-rediscache'
    summary: >-
      Public internet access to the cache, via its public IP address, is
      enabled. Connections may use any network path.
