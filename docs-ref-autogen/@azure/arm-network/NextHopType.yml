### YamlMime:TSTypeAlias
name: NextHopType
uid: '@azure/arm-network.NextHopType'
package: '@azure/arm-network'
summary: >-
  Next hop type. \

  [KnownNextHopType](xref:@azure/arm-network.KnownNextHopType) can be used
  interchangeably with NextHopType,
   this enum contains the known values that the service supports.
  ### Known values supported by the service

  **Internet**: Internet \

  **VirtualAppliance**: VirtualAppliance \

  **VirtualNetworkGateway**: VirtualNetworkGateway \

  **VnetLocal**: VnetLocal \

  **HyperNetGateway**: HyperNetGateway \

  **VirtualApplianceEcmp**: Routes traffic to virtual appliances using
  Equal-Cost Multi-Path (ECMP) routing with multiple next hop IP addresses. \

  **None**: No next hop type.
fullName: NextHopType
remarks: ''
isDeprecated: false
syntax: |
  type NextHopType = string
