  - name: listByBillingProfile
    uid: '@azure/arm-billing.TransactionsOperations.listByBillingProfile'
    package: '@azure/arm-billing'
    summary: >-
      Lists the billed or unbilled transactions by billing profile name for
      given start and end date. Transactions include purchases, refunds and
      Azure usage charges. Unbilled transactions are listed under pending
      invoice Id and do not include tax. Tax is added to the amount once an
      invoice is generated.
    fullName: listByBillingProfile
    remarks: ''
    isDeprecated: false
    syntax:
