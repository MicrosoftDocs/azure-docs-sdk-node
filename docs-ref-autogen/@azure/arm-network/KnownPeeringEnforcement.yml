### YamlMime:TSEnum
name: KnownPeeringEnforcement
uid: '@azure/arm-network.KnownPeeringEnforcement'
package: '@azure/arm-network'
summary: >-
  Option indicating enforcement of peerings created by the connectivity
  configuration.
fullName: KnownPeeringEnforcement
remarks: ''
isDeprecated: false
fields:
  - name: Enforced
    uid: '@azure/arm-network.KnownPeeringEnforcement.Enforced'
    package: '@azure/arm-network'
    summary: >-
      Peerings created by the connectivity configuration will not be modifiable
      or deletable outside of the network manager.
  - name: Unenforced
    uid: '@azure/arm-network.KnownPeeringEnforcement.Unenforced'
    package: '@azure/arm-network'
    summary: >-
      Default. Peerings created by the connectivity configuration may be
      modified or deleted outside of the network manager.
