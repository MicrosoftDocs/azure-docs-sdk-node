name: FoundryAgentContextType
uid: '@azure/ai-voicelive.FoundryAgentContextType'
package: '@azure/ai-voicelive'
summary: >-
  The available set of Foundry agent context types. \

  [KnownFoundryAgentContextType](xref:@azure/ai-voicelive.KnownFoundryAgentContextType)
  can be used interchangeably with FoundryAgentContextType,
   this enum contains the known values that the service supports.
  ### Known values supported by the service

  **no_context**: Only the current user input is sent, no context maintained. \

  **agent_context**: Agent maintains its own context (thread), only current
  input sent per call.
