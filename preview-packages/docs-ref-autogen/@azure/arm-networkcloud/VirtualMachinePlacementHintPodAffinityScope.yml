### YamlMime:TSTypeAlias
name: VirtualMachinePlacementHintPodAffinityScope
uid: '@azure/arm-networkcloud.VirtualMachinePlacementHintPodAffinityScope'
package: '@azure/arm-networkcloud'
summary: >-
  The scope for the virtual machine affinity or anti-affinity placement hint. It
  should always be "Machine" in the case of node affinity. \

  [KnownVirtualMachinePlacementHintPodAffinityScope](xref:@azure/arm-networkcloud.KnownVirtualMachinePlacementHintPodAffinityScope)
  can be used interchangeably with VirtualMachinePlacementHintPodAffinityScope,
   this enum contains the known values that the service supports.
  ### Known values supported by the service

  **Machine**: The virtual machine placement hint is scoped to the bare metal
  machine. \

  **Rack**: The virtual machine placement hint is scoped to the rack.
fullName: VirtualMachinePlacementHintPodAffinityScope
remarks: ''
isDeprecated: false
syntax: |
  type VirtualMachinePlacementHintPodAffinityScope = string
