### YamlMime:TSTypeAlias
name: Intent
uid: '@azure/arm-providerhub.Intent'
package: '@azure/arm-providerhub'
summary: >-
  The intent. \

  [KnownIntent](xref:@azure/arm-providerhub.KnownIntent) can be used
  interchangeably with Intent,
   this enum contains the known values that the service supports.
  ### Known values supported by the service

  **NOT_SPECIFIED**: Default value. \

  **LOW_PRIVILEGE**: Data is not sensitive and ok to access. \

  **DEFERRED_ACCESS_CHECK**: Used for RP's using a custom authorization check
  outside of ARM. \

  **RP_CONTRACT**: RP contract allows certain operations to be unauthorized
  action.
fullName: Intent
remarks: ''
isDeprecated: false
syntax: |
  type Intent = string
