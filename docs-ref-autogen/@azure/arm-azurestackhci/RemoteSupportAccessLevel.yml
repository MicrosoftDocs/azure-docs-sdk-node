### YamlMime:TSTypeAlias
name: RemoteSupportAccessLevel
uid: '@azure/arm-azurestackhci.RemoteSupportAccessLevel'
package: '@azure/arm-azurestackhci'
summary: >-
  Defines the level of remote support access granted. \

  [KnownRemoteSupportAccessLevel](xref:@azure/arm-azurestackhci.KnownRemoteSupportAccessLevel)
  can be used interchangeably with RemoteSupportAccessLevel,
   this enum contains the known values that the service supports.
  ### Known values supported by the service

  **None**: No remote support access is granted. \

  **Diagnostics**: Access is limited to diagnostics information only. \

  **DiagnosticsAndRepair**: Access includes diagnostics information and the
  ability to perform repairs.
fullName: RemoteSupportAccessLevel
remarks: ''
isDeprecated: false
syntax: |
  type RemoteSupportAccessLevel = string
