name: KeepAwakeEnableStatus
uid: '@azure/arm-devcenter.KeepAwakeEnableStatus'
package: '@azure/arm-devcenter'
summary: >-
  Enables or disables whether Dev Boxes should be kept awake during active
  hours. \

  [KnownKeepAwakeEnableStatus](xref:@azure/arm-devcenter.KnownKeepAwakeEnableStatus)
  can be used interchangeably with KeepAwakeEnableStatus,
   this enum contains the known values that the service supports.
  ### Known values supported by the service

  **Enabled**: Keep awake is enabled. \

  **Disabled**: Keep awake is disabled.
fullName: KeepAwakeEnableStatus
