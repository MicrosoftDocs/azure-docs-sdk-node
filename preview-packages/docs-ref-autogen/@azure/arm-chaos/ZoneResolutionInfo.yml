### YamlMime:TSType
name: ZoneResolutionInfo
uid: '@azure/arm-chaos.ZoneResolutionInfo'
package: '@azure/arm-chaos'
summary: |-
  Information about how physical zones were resolved to logical zones
  for each subscription during scenario execution.
fullName: ZoneResolutionInfo
remarks: ''
isDeprecated: false
type: interface
properties:
  - name: mode
    uid: '@azure/arm-chaos.ZoneResolutionInfo.mode'
    package: '@azure/arm-chaos'
    summary: |-
      The zone targeting mode used for this run.
      `logical` — customer specified logical zone identifiers directly.
      `physical` — customer specified physical zone identifiers; the system
      resolved them to per-subscription logical zones at execution time.
    fullName: mode
    remarks: ''
    isDeprecated: false
    syntax:
      content: 'mode: string'
      return:
        description: ''
        type: string
  - name: requestedPhysicalZones
    uid: '@azure/arm-chaos.ZoneResolutionInfo.requestedPhysicalZones'
    package: '@azure/arm-chaos'
    summary: |-
      The physical zone identifiers requested by the customer in the
      scenario configuration (e.g., `["westus2-az1"]`).
      Empty array when `mode` is `logical`.
    fullName: requestedPhysicalZones
    remarks: ''
    isDeprecated: false
    syntax:
      content: 'requestedPhysicalZones: string[]'
      return:
        description: ''
        type: string[]
  - name: subscriptionZoneMappings
    uid: '@azure/arm-chaos.ZoneResolutionInfo.subscriptionZoneMappings'
    package: '@azure/arm-chaos'
    summary: |-
      Per-subscription zone resolution results. Each entry maps a subscription
      to the logical zone resolved from the requested physical zone.
      Empty when `mode` is `logical`.
    fullName: subscriptionZoneMappings
    remarks: ''
    isDeprecated: false
    syntax:
      content: 'subscriptionZoneMappings: ZoneResolutionMapping[]'
      return:
        description: ''
        type: <xref uid="@azure/arm-chaos.ZoneResolutionMapping" />[]
