name: ExecutionState
uid: '@azure/arm-resiliencemanagement.ExecutionState'
package: '@azure/arm-resiliencemanagement'
summary: >-
  Drill Execution State \

  [KnownExecutionState](xref:@azure/arm-resiliencemanagement.KnownExecutionState)
  can be used interchangeably with ExecutionState,
   this enum contains the known values that the service supports.
  ### Known values supported by the service

  **NotRunning**: Drill is not running currently. \

  **Running**: Drill is running currently. \

  **Paused**: Drill is paused, waiting for manual resume.
