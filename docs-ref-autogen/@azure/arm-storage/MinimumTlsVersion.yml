### YamlMime:TSTypeAlias
name: MinimumTlsVersion
uid: '@azure/arm-storage.MinimumTlsVersion'
package: '@azure/arm-storage'
summary: >-
  Set the minimum TLS version to be permitted on requests to storage. The
  default interpretation is TLS 1.0 for this property. Minimum TLS version 1.3
  version is not supported. \

  [KnownMinimumTlsVersion](xref:@azure/arm-storage.KnownMinimumTlsVersion) can
  be used interchangeably with MinimumTlsVersion,
   this enum contains the known values that the service supports.
  ### Known values supported by the service

  **TLS1_0** \

  **TLS1_1** \

  **TLS1_2** \

  **TLS1_3**
fullName: MinimumTlsVersion
remarks: ''
isDeprecated: false
syntax: |
  type MinimumTlsVersion = string
