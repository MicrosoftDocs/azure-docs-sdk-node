### YamlMime:TSTypeAlias
name: JobType
uid: '@azure/arm-resiliencemanagement.JobType'
package: '@azure/arm-resiliencemanagement'
summary: >-
  A job type indicates the kind of job. \

  [KnownJobType](xref:@azure/arm-resiliencemanagement.KnownJobType) can be used
  interchangeably with JobType,
   this enum contains the known values that the service supports.
  ### Known values supported by the service

  **Invalid**: Abstract job - invalid. \

  **RecoveryPlan**: Recovery Orchestration Plan created job. \

  **DrillRun**: Drill Oober job which represents a given instance of Drill.
fullName: JobType
remarks: ''
isDeprecated: false
syntax: |
  type JobType = string
