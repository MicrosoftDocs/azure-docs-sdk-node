    fullName: enabled
    remarks: ''
    isDeprecated: false
    syntax:
      content: 'enabled?: boolean'
      return:
        description: ''
        type: boolean
  - name: enabledFilteringCriteria
    uid: '@azure/arm-network.FlowLogPropertiesFormat.enabledFilteringCriteria'
    package: '@azure/arm-network'
    summary: >-
      Optional field to filter network traffic logs based on SrcIP, SrcPort,
      DstIP, DstPort, Protocol, Encryption, Direction and Action. If not
      specified, all network traffic will be logged.
    fullName: enabledFilteringCriteria
    remarks: ''
    isDeprecated: false
    syntax:
      content: 'enabledFilteringCriteria?: string'
      return:
        description: ''
        type: string
