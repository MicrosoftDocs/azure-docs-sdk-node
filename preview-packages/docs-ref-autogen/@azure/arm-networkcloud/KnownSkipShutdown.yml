### YamlMime:TSEnum
name: KnownSkipShutdown
uid: '@azure/arm-networkcloud.KnownSkipShutdown'
package: '@azure/arm-networkcloud'
summary: >-
  The indicator of whether to skip the graceful OS shutdown and power off the
  virtual machine immediately.
fullName: KnownSkipShutdown
remarks: ''
isDeprecated: false
fields:
  - name: 'False'
    uid: '@azure/arm-networkcloud.KnownSkipShutdown.False'
    package: '@azure/arm-networkcloud'
    summary: Do not skip the graceful OS shutdown.
  - name: 'True'
    uid: '@azure/arm-networkcloud.KnownSkipShutdown.True'
    package: '@azure/arm-networkcloud'
    summary: >-
      Skip the graceful OS shutdown and power off the virtual machine
      immediately.
