### YamlMime:TSTypeAlias
name: ConfidentialVmIntent
uid: '@azure/arm-azurestackhci.ConfidentialVmIntent'
package: '@azure/arm-azurestackhci'
summary: >-
  Captures the customer's intent to enable or disable Confidential Virtual
  Machine (CVM) support on the cluster, either during initial deployment (Day-0)
  or at a later stage (Day-N). \

  [KnownConfidentialVmIntent](xref:@azure/arm-azurestackhci.KnownConfidentialVmIntent)
  can be used interchangeably with ConfidentialVmIntent,
   this enum contains the known values that the service supports.
  ### Known values supported by the service

  **Enable**: Indicates that the customer intends to enable CVM support on the
  cluster. \

  **Disable**: Indicates that the customer intends to disable CVM support on the
  cluster.
fullName: ConfidentialVmIntent
remarks: ''
isDeprecated: false
syntax: |
  type ConfidentialVmIntent = string
