name: ContainerGroupRestartPolicy
uid: '@azure/arm-containerinstance.ContainerGroupRestartPolicy'
package: '@azure/arm-containerinstance'
summary: >-
  Restart policy for all containers within the container group.

  - `Always` Always restart

  - `OnFailure` Restart on failure

  - `Never` Never restart \

  [KnownContainerGroupRestartPolicy](xref:@azure/arm-containerinstance.KnownContainerGroupRestartPolicy)
  can be used interchangeably with ContainerGroupRestartPolicy,
   this enum contains the known values that the service supports.
  ### Known values supported by the service

  **Always**: Always \

  **OnFailure**: OnFailure \

  **Never**: Never
