### YamlMime:TSEnum
name: KnownSdnStatus
uid: '@azure/arm-azurestackhci.KnownSdnStatus'
package: '@azure/arm-azurestackhci'
summary: >-
  Indicates the current Software Defined Networking (SDN) status of the
  resource, which may be an individual device or a cluster.
fullName: KnownSdnStatus
remarks: ''
isDeprecated: false
fields:
  - name: Disabled
    uid: '@azure/arm-azurestackhci.KnownSdnStatus.Disabled'
    package: '@azure/arm-azurestackhci'
    summary: >-
      SDN is not enabled on the resource. The domain name will be null. This is
      the default state when SDN has not been configured.
  - name: Enabled
    uid: '@azure/arm-azurestackhci.KnownSdnStatus.Enabled'
    package: '@azure/arm-azurestackhci'
    summary: >-
      SDN is successfully enabled on the resource. The domain name will be
      populated in the format `<sdnPrefix>-nc.<domain>`. Customers may need to
      manage DNS settings to ensure proper resolution.
  - name: Unknown
    uid: '@azure/arm-azurestackhci.KnownSdnStatus.Unknown'
    package: '@azure/arm-azurestackhci'
    summary: >-
      The SDN status could not be determined due to a failure in querying the
      SDN API service. This may occur if the query script fails or if the system
      is in an inconsistent state. The domain name will be null in this case.
