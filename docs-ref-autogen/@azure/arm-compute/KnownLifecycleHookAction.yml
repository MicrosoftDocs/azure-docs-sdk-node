### YamlMime:TSEnum
name: KnownLifecycleHookAction
uid: '@azure/arm-compute.KnownLifecycleHookAction'
package: '@azure/arm-compute'
summary: >-
  The action that will be applied to a target resource in the virtual machine
  scale set lifecycle hook event if the platform does not receive a response
  from the customer for the target resource before waitUntil.
fullName: KnownLifecycleHookAction
remarks: ''
isDeprecated: false
fields:
  - name: Approve
    uid: '@azure/arm-compute.KnownLifecycleHookAction.Approve'
    package: '@azure/arm-compute'
    summary: >-
      The lifecycle hook of a target resource in a lifecycle hook event will be
      approved.
  - name: Reject
    uid: '@azure/arm-compute.KnownLifecycleHookAction.Reject'
    package: '@azure/arm-compute'
    summary: >-
      The lifecycle hook of a target resource in a lifecycle hook event will be
      rejected.
