### YamlMime:TSEnum
name: KnownCategoryType
uid: '@azure/arm-costmanagement.KnownCategoryType'
package: '@azure/arm-costmanagement'
summary: |-
  The category of the budget.
  - 'Cost' defines a Budget.
  - 'ReservationUtilization' defines a Reservation Utilization Alert Rule.
fullName: KnownCategoryType
remarks: ''
isDeprecated: false
fields:
  - name: Cost
    uid: '@azure/arm-costmanagement.KnownCategoryType.Cost'
    package: '@azure/arm-costmanagement'
    summary: >-
      A Budget that evaluates monetary cost of Azure resources against an
      amount, and alerts based on a configured notification threshold.
  - name: ReservationUtilization
    uid: '@azure/arm-costmanagement.KnownCategoryType.ReservationUtilization'
    package: '@azure/arm-costmanagement'
    summary: >-
      An Alert Rule that evaluates the utilization percentage of Azure
      Reservations, and alerts based on a configured notification threshold.
