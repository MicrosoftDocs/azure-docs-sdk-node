name: MeteringType
uid: '@azure/arm-edgeorder.MeteringType'
package: '@azure/arm-edgeorder'
summary: >-
  Represents Metering type (eg one-time or recurrent). \

  [KnownMeteringType](xref:@azure/arm-edgeorder.KnownMeteringType) can be used
  interchangeably with MeteringType,
   this enum contains the known values that the service supports.
  ### Known values supported by the service

  **OneTime**: One time billing. \

  **Recurring**: Recurring billing. \

  **Adhoc**: Adhoc billing.
