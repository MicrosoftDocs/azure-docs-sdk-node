### YamlMime:TSTypeAlias
name: ProvisioningTenantState
uid: '@azure/arm-billing.ProvisioningTenantState'
package: '@azure/arm-billing'
summary: >-
  The state determines whether subscriptions and licenses can be provisioned in
  the associated tenant. It can be set to 'Pending' to initiate a billing
  request. \

  [KnownProvisioningTenantState](xref:@azure/arm-billing.KnownProvisioningTenantState)
  can be used interchangeably with ProvisioningTenantState,
   this enum contains the known values that the service supports.
  ### Known values supported by the service

  **Other**: Other \

  **NotRequested**: NotRequested \

  **Active**: Active \

  **Pending**: Pending \

  **BillingRequestExpired**: BillingRequestExpired \

  **BillingRequestDeclined**: BillingRequestDeclined \

  **Revoked**: Revoked
fullName: ProvisioningTenantState
remarks: ''
isDeprecated: false
syntax: |
  type ProvisioningTenantState = string
