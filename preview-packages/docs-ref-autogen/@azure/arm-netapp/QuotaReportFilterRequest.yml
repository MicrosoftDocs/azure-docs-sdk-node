### YamlMime:TSType
name: QuotaReportFilterRequest
uid: '@azure/arm-netapp.QuotaReportFilterRequest'
package: '@azure/arm-netapp'
summary: >-
  Quota report filters. When filtering by quotaType or quotaTarget, both
  properties must be supplied together. This constraint is enforced by the
  service/API at runtime, and requests violating this rule will return a
  validation error. The usageThresholdPercentage filter is independent and can
  be used alone or in combination with quotaType and quotaTarget to further
  refine results.
fullName: QuotaReportFilterRequest
remarks: ''
isDeprecated: false
type: interface
properties:
  - name: quotaTarget
    uid: '@azure/arm-netapp.QuotaReportFilterRequest.quotaTarget'
    package: '@azure/arm-netapp'
    summary: >-
      UserID/GroupID/SID based on the quota target type. UserID and groupID can
      be found by running 'id' or 'getent' command for the user or group and SID
      can be found by running <wmic useraccount where name='user-name' get sid>.
      If provided, quotaType must also be specified. The quotaType and
      quotaTarget properties are optional, but when filtering by quota target,
      quotaType and quotaTarget must be supplied together. Service/API will
      return an error if only one is provided.
    fullName: quotaTarget
    remarks: ''
    isDeprecated: false
    syntax:
      content: 'quotaTarget?: string'
      return:
        description: ''
        type: string
  - name: quotaType
    uid: '@azure/arm-netapp.QuotaReportFilterRequest.quotaType'
    package: '@azure/arm-netapp'
    summary: >-
      Type of quota. If provided, quotaTarget must also be specified. The
      quotaType and quotaTarget properties are optional, but when filtering by
      quota type, quotaType and quotaTarget must be supplied together.
      Service/API will return an error if only one is provided.
    fullName: quotaType
    remarks: ''
    isDeprecated: false
    syntax:
      content: 'quotaType?: string'
      return:
        description: ''
        type: string
  - name: usageThresholdPercentage
    uid: '@azure/arm-netapp.QuotaReportFilterRequest.usageThresholdPercentage'
    package: '@azure/arm-netapp'
    summary: >-
      The usageThresholdPercentage filter takes the usage threshold percentage
      and returns records where the usage is greater than or equal to the input
      value. This is an optional property.
    fullName: usageThresholdPercentage
    remarks: ''
    isDeprecated: false
    syntax:
      content: 'usageThresholdPercentage?: number'
      return:
        description: ''
        type: number
