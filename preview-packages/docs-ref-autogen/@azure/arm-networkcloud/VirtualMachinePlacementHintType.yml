name: VirtualMachinePlacementHintType
uid: '@azure/arm-networkcloud.VirtualMachinePlacementHintType'
package: '@azure/arm-networkcloud'
summary: >-
  The specification of whether this hint supports affinity or anti-affinity with
  the referenced resources. \

  [KnownVirtualMachinePlacementHintType](xref:@azure/arm-networkcloud.KnownVirtualMachinePlacementHintType)
  can be used interchangeably with VirtualMachinePlacementHintType,
   this enum contains the known values that the service supports.
  ### Known values supported by the service

  **Affinity**: The virtual machine has affinity with the referenced resources.
  \

  **AntiAffinity**: The virtual machine has anti-affinity with the referenced
  resources.
fullName: VirtualMachinePlacementHintType
remarks: ''
isDeprecated: false
syntax: |
  type VirtualMachinePlacementHintType = string
