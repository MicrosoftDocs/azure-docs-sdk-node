name: GPUInstanceProfile
uid: '@azure/arm-containerservice.GPUInstanceProfile'
package: '@azure/arm-containerservice'
summary: >-
  GPUInstanceProfile to be used to specify GPU MIG instance profile for
  supported GPU VM SKU. \

  [KnownGPUInstanceProfile](xref:@azure/arm-containerservice.KnownGPUInstanceProfile)
  can be used interchangeably with GPUInstanceProfile,
   this enum contains the known values that the service supports.
  ### Known values supported by the service

  **MIG1g**: MIG 1g GPU instance profile. \

  **MIG2g**: MIG 2g GPU instance profile. \

  **MIG3g**: MIG 3g GPU instance profile. \

  **MIG4g**: MIG 4g GPU instance profile. \

  **MIG7g**: MIG 7g GPU instance profile.
