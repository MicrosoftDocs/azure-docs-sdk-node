### YamlMime:TSTypeAlias
name: SemanticSearchResultsType
uid: '@azure/search-documents.SemanticSearchResultsType'
package: '@azure/search-documents'
summary: >-
  Type of partial response that was returned for a semantic ranking request. \

  [KnownSemanticSearchResultsType](xref:@azure/search-documents.KnownSemanticSearchResultsType)
  can be used interchangeably with SemanticSearchResultsType,
   this enum contains the known values that the service supports.
  ### Known values supported by the service

  **baseResults**: Results without any semantic enrichment or reranking. \

  **rerankedResults**: Results have been reranked with the reranker model and
  will include semantic captions. They will not include any answers, answers
  highlights or caption highlights.
fullName: SemanticSearchResultsType
remarks: ''
isDeprecated: false
syntax: |
  type SemanticSearchResultsType = string
