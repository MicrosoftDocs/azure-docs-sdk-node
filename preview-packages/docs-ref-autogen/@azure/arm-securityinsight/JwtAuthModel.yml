    isDeprecated: false
    syntax:
      content: 'requestTimeoutInSeconds?: number'
      return:
        description: ''
        type: number
  - name: tokenEndpoint
    uid: '@azure/arm-securityinsight.JwtAuthModel.tokenEndpoint'
    package: '@azure/arm-securityinsight'
