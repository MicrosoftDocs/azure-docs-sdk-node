name: AgenticApplicationProvisioningState
uid: '@azure/arm-cognitiveservices.AgenticApplicationProvisioningState'
package: '@azure/arm-cognitiveservices'
summary: >-
  Provisioning state of an agentic application. \

  [KnownAgenticApplicationProvisioningState](xref:@azure/arm-cognitiveservices.KnownAgenticApplicationProvisioningState)
  can be used interchangeably with AgenticApplicationProvisioningState,
   this enum contains the known values that the service supports.
  ### Known values supported by the service

  **Succeeded**: The application was successfully provisioned. \

  **Failed**: The application provisioning failed. \

  **Canceled**: The application provisioning was canceled. \

  **Creating**: The application is being created. \

  **Updating**: The application is being updated. \

  **Deleting**: The application is being deleted.
fullName: AgenticApplicationProvisioningState
