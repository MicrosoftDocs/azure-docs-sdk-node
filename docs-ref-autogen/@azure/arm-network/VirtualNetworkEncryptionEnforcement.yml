name: VirtualNetworkEncryptionEnforcement
uid: '@azure/arm-network.VirtualNetworkEncryptionEnforcement'
package: '@azure/arm-network'
summary: >-
  If the encrypted VNet allows VM that does not support encryption. This field
  is for future support, AllowUnencrypted is the only supported value at general
  availability. \

  [KnownVirtualNetworkEncryptionEnforcement](xref:@azure/arm-network.KnownVirtualNetworkEncryptionEnforcement)
  can be used interchangeably with VirtualNetworkEncryptionEnforcement,
   this enum contains the known values that the service supports.
  ### Known values supported by the service

  **DropUnencrypted**: DropUnencrypted \

  **AllowUnencrypted**: AllowUnencrypted
