### YamlMime:TSTypeAlias
name: RuleIsCompressionEnabled
uid: '@azure/arm-cdn.RuleIsCompressionEnabled'
package: '@azure/arm-cdn'
summary: >-
  Indicates whether content compression is enabled. If compression is enabled,
  content will be served as compressed if user requests for a compressed
  version. Content won't be compressed on AzureFrontDoor when requested content
  is smaller than 1 byte or larger than 1 MB. \

  [KnownRuleIsCompressionEnabled](xref:@azure/arm-cdn.KnownRuleIsCompressionEnabled)
  can be used interchangeably with RuleIsCompressionEnabled,
   this enum contains the known values that the service supports.
  ### Known values supported by the service

  **Enabled** \

  **Disabled**
fullName: RuleIsCompressionEnabled
remarks: ''
isDeprecated: false
syntax: |
  type RuleIsCompressionEnabled = string
