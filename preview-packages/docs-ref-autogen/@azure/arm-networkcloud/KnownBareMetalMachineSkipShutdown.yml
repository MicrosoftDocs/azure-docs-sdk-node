### YamlMime:TSEnum
name: KnownBareMetalMachineSkipShutdown
uid: '@azure/arm-networkcloud.KnownBareMetalMachineSkipShutdown'
package: '@azure/arm-networkcloud'
summary: >-
  The indicator of whether to skip the graceful OS shutdown and power off the
  bare metal machine immediately.
fullName: KnownBareMetalMachineSkipShutdown
remarks: ''
isDeprecated: false
fields:
  - name: 'False'
    uid: '@azure/arm-networkcloud.KnownBareMetalMachineSkipShutdown.False'
    package: '@azure/arm-networkcloud'
    summary: >-
      Do not skip the graceful OS shutdown and power off the bare metal machine
      immediately.
  - name: 'True'
    uid: '@azure/arm-networkcloud.KnownBareMetalMachineSkipShutdown.True'
    package: '@azure/arm-networkcloud'
    summary: >-
      Skip the graceful OS shutdown and power off the bare metal machine
      immediately.
