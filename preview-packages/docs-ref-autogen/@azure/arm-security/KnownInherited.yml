### YamlMime:TSEnum
name: KnownInherited
uid: '@azure/arm-security.KnownInherited'
package: '@azure/arm-security'
summary: >-
  "inherited" = "True" indicates that the current scope inherits its pricing
  configuration from its parent. The ID of the parent scope that provides the
  inherited configuration is displayed in the "inheritedFrom" field. On the
  other hand, "inherited" = "False" indicates that the current scope has its own
  pricing configuration explicitly set, and does not inherit from its parent.
  This field is read only and available only for resource-level pricing.
fullName: KnownInherited
remarks: ''
isDeprecated: false
fields:
  - name: 'False'
    uid: '@azure/arm-security.KnownInherited.False'
    package: '@azure/arm-security'
    summary: >-
      Indicates that the current scope sets its own pricing configuration and
      does not inherit it from its parent
  - name: 'True'
    uid: '@azure/arm-security.KnownInherited.True'
    package: '@azure/arm-security'
    summary: >-
      Indicates that the current scope is inheriting its pricing configuration
      from its parent
