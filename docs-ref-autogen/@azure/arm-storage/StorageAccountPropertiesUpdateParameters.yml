### YamlMime:TSType
name: StorageAccountPropertiesUpdateParameters
uid: '@azure/arm-storage.StorageAccountPropertiesUpdateParameters'
package: '@azure/arm-storage'
summary: The parameters used when updating a storage account.
fullName: StorageAccountPropertiesUpdateParameters
remarks: ''
isDeprecated: false
type: interface
properties:
  - name: accessTier
    uid: '@azure/arm-storage.StorageAccountPropertiesUpdateParameters.accessTier'
    package: '@azure/arm-storage'
    summary: >-
      Required for storage accounts where kind = BlobStorage. The access tier is
      used for billing. The 'Premium' access tier is the default value for
      premium block blobs storage account type and it cannot be changed for the
      premium block blobs storage account type.
    fullName: accessTier
    remarks: ''
    isDeprecated: false
    syntax:
      content: 'accessTier?: AccessTier'
      return:
        description: ''
        type: <xref uid="@azure/arm-storage.AccessTier" />
  - name: allowBlobPublicAccess
    uid: >-
      @azure/arm-storage.StorageAccountPropertiesUpdateParameters.allowBlobPublicAccess
    package: '@azure/arm-storage'
    summary: >-
      Allow or disallow public access to all blobs or containers in the storage
      account. The default interpretation is false for this property.
    fullName: allowBlobPublicAccess
    remarks: ''
    isDeprecated: false
    syntax:
      content: 'allowBlobPublicAccess?: boolean'
      return:
        description: ''
        type: boolean
  - name: allowCrossTenantReplication
    uid: >-
      @azure/arm-storage.StorageAccountPropertiesUpdateParameters.allowCrossTenantReplication
    package: '@azure/arm-storage'
    summary: >-
      Allow or disallow cross AAD tenant object replication. Set this property
      to true for new or existing accounts only if object replication policies
      will involve storage accounts in different AAD tenants. The default
      interpretation is false for new accounts to follow best security practices
      by default.
    fullName: allowCrossTenantReplication
    remarks: ''
    isDeprecated: false
    syntax:
      content: 'allowCrossTenantReplication?: boolean'
      return:
        description: ''
        type: boolean
  - name: allowedCopyScope
    uid: >-
      @azure/arm-storage.StorageAccountPropertiesUpdateParameters.allowedCopyScope
    package: '@azure/arm-storage'
    summary: >-
      Restrict copy to and from Storage Accounts within an AAD tenant or with
      Private Links to the same VNet.
    fullName: allowedCopyScope
    remarks: ''
    isDeprecated: false
    syntax:
      content: 'allowedCopyScope?: string'
      return:
        description: ''
        type: string
  - name: allowSharedKeyAccess
    uid: >-
      @azure/arm-storage.StorageAccountPropertiesUpdateParameters.allowSharedKeyAccess
    package: '@azure/arm-storage'
    summary: >-
      Indicates whether the storage account permits requests to be authorized
      with the account access key via Shared Key. If false, then all requests,
      including shared access signatures, must be authorized with Azure Active
      Directory (Azure AD). The default value is null, which is equivalent to
      true.
    fullName: allowSharedKeyAccess
    remarks: ''
    isDeprecated: false
    syntax:
      content: 'allowSharedKeyAccess?: boolean'
      return:
        description: ''
        type: boolean
  - name: allowSharedKeyAccessForServices
    uid: >-
      @azure/arm-storage.StorageAccountPropertiesUpdateParameters.allowSharedKeyAccessForServices
    package: '@azure/arm-storage'
    summary: Indicate shared key access properties at service level
    fullName: allowSharedKeyAccessForServices
    remarks: ''
    isDeprecated: false
    syntax:
      content: >-
        allowSharedKeyAccessForServices?:
        StorageAccountSharedKeyAccessProperties
      return:
        description: ''
        type: >-
          <xref uid="@azure/arm-storage.StorageAccountSharedKeyAccessProperties"
          />
  - name: azureFilesIdentityBasedAuthentication
    uid: >-
      @azure/arm-storage.StorageAccountPropertiesUpdateParameters.azureFilesIdentityBasedAuthentication
    package: '@azure/arm-storage'
    summary: Provides the identity based authentication settings for Azure Files.
    fullName: azureFilesIdentityBasedAuthentication
    remarks: ''
    isDeprecated: false
    syntax:
      content: >-
        azureFilesIdentityBasedAuthentication?:
        AzureFilesIdentityBasedAuthentication
      return:
        description: ''
        type: >-
          <xref uid="@azure/arm-storage.AzureFilesIdentityBasedAuthentication"
          />
  - name: customDomain
    uid: '@azure/arm-storage.StorageAccountPropertiesUpdateParameters.customDomain'
    package: '@azure/arm-storage'
    summary: >-
      Custom domain assigned to the storage account by the user. Name is the
      CNAME source. Only one custom domain is supported per storage account at
      this time. To clear the existing custom domain, use an empty string for
      the custom domain name property.
    fullName: customDomain
    remarks: ''
    isDeprecated: false
    syntax:
      content: 'customDomain?: CustomDomain'
      return:
        description: ''
        type: <xref uid="@azure/arm-storage.CustomDomain" />
  - name: dataCollaborationPolicyProperties
    uid: >-
      @azure/arm-storage.StorageAccountPropertiesUpdateParameters.dataCollaborationPolicyProperties
    package: '@azure/arm-storage'
    summary: Data Collaboration policy for the storage account.
    fullName: dataCollaborationPolicyProperties
    remarks: ''
    isDeprecated: false
    syntax:
      content: >-
        dataCollaborationPolicyProperties?:
        StorageDataCollaborationPolicyProperties
      return:
        description: ''
        type: >-
          <xref
          uid="@azure/arm-storage.StorageDataCollaborationPolicyProperties" />
