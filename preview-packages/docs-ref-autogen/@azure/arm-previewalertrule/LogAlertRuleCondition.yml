      return:
        description: ''
        type: string
  - name: dimensions
    uid: '@azure/arm-previewalertrule.LogAlertRuleCondition.dimensions'
    package: '@azure/arm-previewalertrule'
    summary: List of Dimensions conditions
    fullName: dimensions
    remarks: ''
    isDeprecated: false
    syntax:
      content: 'dimensions?: LogAlertRuleDimension[]'
      return:
        description: ''
        type: <xref uid="@azure/arm-previewalertrule.LogAlertRuleDimension" />[]
  - name: failingPeriods
