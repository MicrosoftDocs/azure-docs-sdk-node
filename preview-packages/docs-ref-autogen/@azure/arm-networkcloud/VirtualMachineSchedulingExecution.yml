name: VirtualMachineSchedulingExecution
uid: '@azure/arm-networkcloud.VirtualMachineSchedulingExecution'
package: '@azure/arm-networkcloud'
summary: >-
  The indicator of whether the hint is a hard or soft requirement during
  scheduling. \

  [KnownVirtualMachineSchedulingExecution](xref:@azure/arm-networkcloud.KnownVirtualMachineSchedulingExecution)
  can be used interchangeably with VirtualMachineSchedulingExecution,
   this enum contains the known values that the service supports.
  ### Known values supported by the service

  **Hard**: The hint is a requirement during scheduling. \

  **Soft**: The hint is applied using a best-effort approach during scheduling.
