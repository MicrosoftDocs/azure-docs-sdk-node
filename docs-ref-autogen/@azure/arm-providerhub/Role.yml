### YamlMime:TSTypeAlias
name: Role
uid: '@azure/arm-providerhub.Role'
package: '@azure/arm-providerhub'
summary: >-
  The ownership role the application has on the resource types. The service
  owner role gives the application owner permissions. The limited owner role
  gives elevated permissions but does not allow all the permissions of a service
  owner, such as read/write on internal metadata. \

  [KnownRole](xref:@azure/arm-providerhub.KnownRole) can be used interchangeably
  with Role,
   this enum contains the known values that the service supports.
  ### Known values supported by the service

  **ServiceOwner** \

  **LimitedOwner**
fullName: Role
remarks: ''
isDeprecated: false
syntax: |
  type Role = string
