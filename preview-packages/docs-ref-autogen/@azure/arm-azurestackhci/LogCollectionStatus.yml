name: LogCollectionStatus
uid: '@azure/arm-azurestackhci.LogCollectionStatus'
package: '@azure/arm-azurestackhci'
summary: >-
  LogCollection status \

  [KnownLogCollectionStatus](xref:@azure/arm-azurestackhci.KnownLogCollectionStatus)
  can be used interchangeably with LogCollectionStatus,
   this enum contains the known values that the service supports.
  ### Known values supported by the service

  **None**: No log collection has been initiated. \

  **InProgress**: Log collection is currently in progress. \

  **Failed**: Log collection has failed. \

  **Succeeded**: Log collection completed successfully.
