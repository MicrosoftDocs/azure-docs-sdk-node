        PollerLike<OperationState<Product>, Product>
      return:
        description: ''
        type: >-
          (billingAccountName: string, productName: string, parameters:
          MoveProductRequest, options?: ProductsMoveOptionalParams) =&gt;
          PollerLike&lt;OperationState&lt;Product&gt;, Product&gt;
  - name: update
    uid: '@azure/arm-billing.ProductsOperations.update'
    package: '@azure/arm-billing'
    summary: >-
      Updates the properties of a Product. Currently, auto renew can be updated.
      The operation is supported only for billing accounts with agreement type
      Microsoft Customer Agreement.
    fullName: update
    remarks: ''
    isDeprecated: false
    syntax:
