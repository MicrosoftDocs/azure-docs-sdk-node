name: PrincipalPermissionsAction
uid: '@azure/arm-kusto.PrincipalPermissionsAction'
package: '@azure/arm-kusto'
summary: >-
  Indicates if the permissions for the script caller are kept following
  completion of the script. \

  [KnownPrincipalPermissionsAction](xref:@azure/arm-kusto.KnownPrincipalPermissionsAction)
  can be used interchangeably with PrincipalPermissionsAction,
   this enum contains the known values that the service supports.
  ### Known values supported by the service

  **RetainPermissionOnScriptCompletion**: RetainPermissionOnScriptCompletion \

  **RemovePermissionOnScriptCompletion**: RemovePermissionOnScriptCompletion
