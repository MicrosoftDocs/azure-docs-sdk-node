### YamlMime:TSType
name: TestConnectionResponse
uid: '@azure/arm-storage.TestConnectionResponse'
package: '@azure/arm-storage'
summary: Test connection response properties
fullName: TestConnectionResponse
remarks: ''
isDeprecated: false
type: interface
properties:
  - name: storageConnectorErrorMessage
    uid: '@azure/arm-storage.TestConnectionResponse.storageConnectorErrorMessage'
    package: '@azure/arm-storage'
    summary: >-
      A string representing the error received from the backing data store.

      Format will vary depending on the data store type and will be capped at 1
      MB in size.

      The error message will be empty if the connection was successful.
    fullName: storageConnectorErrorMessage
    remarks: ''
    isDeprecated: false
    syntax:
      content: 'storageConnectorErrorMessage?: string'
      return:
        description: ''
        type: string
  - name: storageConnectorMethodName
    uid: '@azure/arm-storage.TestConnectionResponse.storageConnectorMethodName'
    package: '@azure/arm-storage'
    summary: >-
      Indicates the method used to validate the connection to the backing data
      store.

      Valid values are `GetBlob` and `ListBlobs` for failure, and
      `TestExistingConnection` for success.
    fullName: storageConnectorMethodName
    remarks: ''
    isDeprecated: false
    syntax:
      content: 'storageConnectorMethodName: string'
      return:
        description: ''
        type: string
  - name: storageConnectorRequestId
    uid: '@azure/arm-storage.TestConnectionResponse.storageConnectorRequestId'
    package: '@azure/arm-storage'
    summary: >-
      The request Id associated with the request sent to the backing data store
      for validation.
    fullName: storageConnectorRequestId
    remarks: ''
    isDeprecated: false
    syntax:
      content: 'storageConnectorRequestId: string'
      return:
        description: ''
        type: string
