        Pick<ReadableOperatorOptions, "signal" | "concurrency">): Readable
      parameters:
        - id: fn
          type: '(data: any, options?: Abortable) =&gt; any'
          description: >-
            a function to map over every chunk in the stream. May be async. May
            be a stream or generator.
        - id: options
          type: Pick&lt;ReadableOperatorOptions, "signal" | "concurrency"&gt;
          description: ''
      return:
        description: a stream flat-mapped with the function *fn*.
        type: <xref uid="@azure/storage-common.Readable" />
  - name: >-
      forEach((data: any, options?: Abortable) => void | Promise<void>,
      Pick<ReadableOperatorOptions, "signal" | "concurrency">)
    uid: '@azure/storage-common.Readable.forEach'
    package: '@azure/storage-common'
    summary: >-
      This method allows iterating a stream. For each chunk in the stream the
      *fn* function will be called.

      If the *fn* function returns a promise - that promise will be `await`ed.


      This method is different from `for await...of` loops in that it can
      optionally process chunks concurrently.

      In addition, a `forEach` iteration can only be stopped by having passed a
      `signal` option

      and aborting the related AbortController while `for await...of` can be
      stopped with `break` or `return`.

      In either case the stream will be destroyed.


      This method is different from listening to the `'data'` event in that it
      uses the `readable` event

      in the underlying machinary and can limit the number of concurrent *fn*
      calls.
    remarks: ''
    isDeprecated: false
    syntax:
      content: >-
        function forEach(fn: (data: any, options?: Abortable) => void |
        Promise<void>, options?: Pick<ReadableOperatorOptions, "signal" |
        "concurrency">): Promise<void>
      parameters:
        - id: fn
          type: '(data: any, options?: Abortable) =&gt; void | Promise&lt;void&gt;'
          description: a function to call on each chunk of the stream. Async or not.
        - id: options
          type: Pick&lt;ReadableOperatorOptions, "signal" | "concurrency"&gt;
          description: ''
      return:
        description: a promise for when the stream has finished.
        type: Promise&lt;void&gt;
