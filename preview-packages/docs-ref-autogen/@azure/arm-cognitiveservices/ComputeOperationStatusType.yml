name: ComputeOperationStatusType
uid: '@azure/arm-cognitiveservices.ComputeOperationStatusType'
package: '@azure/arm-cognitiveservices'
summary: >-
  The status type of a compute operation. \

  [KnownComputeOperationStatusType](xref:@azure/arm-cognitiveservices.KnownComputeOperationStatusType)
  can be used interchangeably with ComputeOperationStatusType,
   this enum contains the known values that the service supports.
  ### Known values supported by the service

  **InProgress**: The operation is in progress. \

  **Succeeded**: The operation has succeeded. \

  **Failed**: The operation has failed. \

  **Canceled**: The operation has been canceled.
