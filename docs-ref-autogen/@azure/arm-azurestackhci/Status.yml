### YamlMime:TSTypeAlias
name: Status
uid: '@azure/arm-azurestackhci.Status'
package: '@azure/arm-azurestackhci'
summary: >-
  Status of the cluster agent. Indicates the current connectivity, validation,
  and deployment state of the agent within the cluster. \

  [KnownStatus](xref:@azure/arm-azurestackhci.KnownStatus) can be used
  interchangeably with Status,
   this enum contains the known values that the service supports.
  ### Known values supported by the service

  **NotYetRegistered**: The cluster agent has not yet registered with Azure. \

  **ConnectedRecently**: The cluster agent has connected to Azure recently. \

  **NotConnectedRecently**: The cluster agent has not connected to Azure
  recently. \

  **Disconnected**: The cluster agent is currently disconnected from Azure. \

  **Error**: An error occurred in the cluster agent's operation. \

  **NotSpecified**: The status of the cluster agent is not specified. \

  **ValidationInProgress**: Validation of the cluster agent is currently in
  progress. \

  **ValidationSuccess**: Validation of the cluster agent completed successfully.
  \

  **ValidationFailed**: Validation of the cluster agent failed. \

  **DeploymentInProgress**: Deployment of the cluster agent is currently in
  progress. \

  **DeploymentFailed**: Deployment of the cluster agent failed. \

  **DeploymentSuccess**: Deployment of the cluster agent completed successfully.
fullName: Status
remarks: ''
isDeprecated: false
syntax: |
  type Status = string
