name: ProvisioningStateEnum
uid: '@azure/arm-operationalinsights.ProvisioningStateEnum'
package: '@azure/arm-operationalinsights'
summary: >-
  Table's current provisioning state. If set to 'updating', indicates a resource
  lock due to ongoing operation, forbidding any update to the table until the
  ongoing operation is concluded. \

  [KnownProvisioningStateEnum](xref:@azure/arm-operationalinsights.KnownProvisioningStateEnum)
  can be used interchangeably with ProvisioningStateEnum,
   this enum contains the known values that the service supports.
  ### Known values supported by the service

  **Updating**: Table schema is still being built and updated, table is
  currently locked for any changes till the procedure is done. \

  **Succeeded**: Table state is stable and without changes, table is unlocked
  and open for new updates. \

  **Deleting**: Table state is deleting. \

  **Failed**: Table state is failed. \

  **Canceled**: Table state is canceled.
fullName: ProvisioningStateEnum
remarks: ''
isDeprecated: false
syntax: |
  type ProvisioningStateEnum = string
