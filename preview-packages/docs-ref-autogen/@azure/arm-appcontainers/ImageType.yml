### YamlMime:TSTypeAlias
name: ImageType
uid: '@azure/arm-appcontainers.ImageType'
package: '@azure/arm-appcontainers'
summary: >-
  The type of the image. Set to CloudBuild to let the system manages the image,
  where user will not be able to update image through image field. Set to
  ContainerImage for user provided image. \

  [KnownImageType](xref:@azure/arm-appcontainers.KnownImageType) can be used
  interchangeably with ImageType,
   this enum contains the known values that the service supports.
  ### Known values supported by the service

  **CloudBuild**: CloudBuild \

  **ContainerImage**: ContainerImage
fullName: ImageType
remarks: ''
isDeprecated: false
syntax: |
  type ImageType = string
