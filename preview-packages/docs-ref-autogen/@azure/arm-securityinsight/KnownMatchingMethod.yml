    uid: '@azure/arm-securityinsight.KnownMatchingMethod.AllEntities'
    package: '@azure/arm-securityinsight'
    summary: Grouping alerts into a single incident if all the entities match
  - name: AnyAlert
    uid: '@azure/arm-securityinsight.KnownMatchingMethod.AnyAlert'
    package: '@azure/arm-securityinsight'
    summary: Grouping any alerts triggered by this rule into a single incident
  - name: Selected
    uid: '@azure/arm-securityinsight.KnownMatchingMethod.Selected'
    package: '@azure/arm-securityinsight'
    summary: >-
      Grouping alerts into a single incident if the selected entities, custom
      details and alert details match
