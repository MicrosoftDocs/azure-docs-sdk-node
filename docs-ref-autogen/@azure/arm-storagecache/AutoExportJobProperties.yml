  - name: statusMessage
    uid: '@azure/arm-storagecache.AutoExportJobProperties.statusMessage'
    package: '@azure/arm-storagecache'
    summary: Server-defined status message for auto export job.
    fullName: statusMessage
    remarks: ''
    isDeprecated: false
    syntax:
      content: 'statusMessage?: string'
