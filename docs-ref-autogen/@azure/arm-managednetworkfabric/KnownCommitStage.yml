### YamlMime:TSEnum
name: KnownCommitStage
uid: '@azure/arm-managednetworkfabric.KnownCommitStage'
package: '@azure/arm-managednetworkfabric'
summary: Commit stage Action to be performed.
fullName: KnownCommitStage
remarks: ''
isDeprecated: false
fields:
  - name: Continue
    uid: '@azure/arm-managednetworkfabric.KnownCommitStage.Continue'
    package: '@azure/arm-managednetworkfabric'
    summary: >-
      CommitStage-Continue indicates to push the configuration to the devices
      provided. Either CE1 or CE2 is allowed
  - name: Rollback
    uid: '@azure/arm-managednetworkfabric.KnownCommitStage.Rollback'
    package: '@azure/arm-managednetworkfabric'
    summary: >-
      CommitStage-Rollback indicates to revert to the previous configuration for
      the devices to which configuration is pushed as part of staging.
  - name: Start
    uid: '@azure/arm-managednetworkfabric.KnownCommitStage.Start'
    package: '@azure/arm-managednetworkfabric'
    summary: >-
      CommitStage-Start indicates to prepare the device configuration for the
      devices which is decided by policy type
