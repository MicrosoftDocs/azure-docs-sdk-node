name: ParameterType
uid: '@azure/arm-policy.ParameterType'
package: '@azure/arm-policy'
summary: >-
  The data type of the parameter. \

  [KnownParameterType](xref:@azure/arm-policy.KnownParameterType) can be used
  interchangeably with ParameterType,
   this enum contains the known values that the service supports.
  ### Known values supported by the service

  **String**: The string parameter type. \

  **Array**: The array parameter type. \

  **Object**: The object parameter type. \

  **Boolean**: The boolean parameter type. \

  **Integer**: The integer parameter type. \

  **Float**: The float parameter type. \

  **DateTime**: The date-time parameter type.
fullName: ParameterType
remarks: ''
isDeprecated: false
syntax: |
  type ParameterType = string
