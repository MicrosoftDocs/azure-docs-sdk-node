name: ActionableRemediationState
uid: '@azure/arm-security.ActionableRemediationState'
package: '@azure/arm-security'
summary: >-
  ActionableRemediation Setting.

  None - the setting was never set.

  Enabled - ActionableRemediation is enabled.

  Disabled - ActionableRemediation is disabled. \

  [KnownActionableRemediationState](xref:@azure/arm-security.KnownActionableRemediationState)
  can be used interchangeably with ActionableRemediationState,
   this enum contains the known values that the service supports.
  ### Known values supported by the service

  **None**: None \

  **Disabled**: Disabled \

  **Enabled**: Enabled
