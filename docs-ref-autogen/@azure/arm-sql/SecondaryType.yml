name: SecondaryType
uid: '@azure/arm-sql.SecondaryType'
package: '@azure/arm-sql'
summary: >-
  The secondary type of the database if it is a secondary.  Valid values are
  Geo, Named and Standby. \

  [KnownSecondaryType](xref:@azure/arm-sql.KnownSecondaryType) can be used
  interchangeably with SecondaryType,
   this enum contains the known values that the service supports.
  ### Known values supported by the service

  **Geo**: Geo \

  **Named**: Named \

  **Standby**: Standby
fullName: SecondaryType
remarks: ''
