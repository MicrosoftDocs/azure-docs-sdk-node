### YamlMime:TSEnum
name: KnownKnowledgeRetrieval
uid: '@azure/arm-search.KnownKnowledgeRetrieval'
package: '@azure/arm-search'
summary: >-
  Specifies the billing plan for agentic retrieval on the Azure AI Search
  service. This configuration is only available for certain pricing tiers in
  certain regions.
fullName: KnownKnowledgeRetrieval
remarks: ''
isDeprecated: false
fields:
  - name: Free
    uid: '@azure/arm-search.KnownKnowledgeRetrieval.Free'
    package: '@azure/arm-search'
    summary: >-
      Enables knowledge retrieval on a search service and indicates that it is
      to be used within the limits of the free plan. The free plan would cap the
      volume of knowledge retrieval requests and is offered at no extra charge.
  - name: Standard
    uid: '@azure/arm-search.KnownKnowledgeRetrieval.Standard'
    package: '@azure/arm-search'
    summary: >-
      Enables knowledge retrieval on a search service as a billable feature
      after the free quota is exhausted, with higher throughput and volume of
      knowledge retrieval requests.
