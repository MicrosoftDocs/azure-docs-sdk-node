name: SubscriptionStatusReason
uid: '@azure/arm-billing.SubscriptionStatusReason'
package: '@azure/arm-billing'
summary: >-
  The suspension reason for a subscription. This field is not available for
  Enterprise Agreement billing accounts. \

  [KnownSubscriptionStatusReason](xref:@azure/arm-billing.KnownSubscriptionStatusReason)
  can be used interchangeably with SubscriptionStatusReason,
   this enum contains the known values that the service supports.
  ### Known values supported by the service

  **None**: None \

  **Cancelled**: Cancelled \

  **PastDue**: PastDue \

  **SuspiciousActivity**: SuspiciousActivity \

  **Other**: Other \

  **Transferred**: Transferred \

  **PolicyViolation**: PolicyViolation \

  **SpendingLimitReached**: SpendingLimitReached \

  **Expired**: Expired
