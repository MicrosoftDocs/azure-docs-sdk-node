### YamlMime:TSEnum
name: KnownIdentityType
uid: '@azure/arm-search.KnownIdentityType'
package: '@azure/arm-search'
summary: >-
  The type of identity used for the resource. The type 'SystemAssigned,
  UserAssigned' includes both an identity created by the system and a set of
  user assigned identities. The type 'None' will remove all identities from the
  service.
fullName: KnownIdentityType
remarks: ''
isDeprecated: false
fields:
  - name: None
    uid: '@azure/arm-search.KnownIdentityType.None'
    package: '@azure/arm-search'
    summary: >-
      Indicates that any identity associated with the search service needs to be
      removed.
  - name: SystemAssigned
    uid: '@azure/arm-search.KnownIdentityType.SystemAssigned'
    package: '@azure/arm-search'
    summary: >-
      Indicates that system-assigned identity for the search service will be
      enabled.
  - name: SystemAssignedUserAssigned
    uid: '@azure/arm-search.KnownIdentityType.SystemAssignedUserAssigned'
    package: '@azure/arm-search'
    summary: >-
      Indicates that system-assigned identity for the search service will be
      enabled along with the assignment of one or more user assigned identities.
  - name: UserAssigned
    uid: '@azure/arm-search.KnownIdentityType.UserAssigned'
    package: '@azure/arm-search'
    summary: >-
      Indicates that one or more user assigned identities will be assigned to
      the search service.
