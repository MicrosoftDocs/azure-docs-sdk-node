### YamlMime:TSEnum
name: KnownTlsVersion
uid: '@azure/arm-rediscache.KnownTlsVersion'
package: '@azure/arm-rediscache'
summary: >-
  Optional: requires clients to use a specified TLS version (or higher) to
  connect (e,g, '1.0', '1.1', '1.2')
fullName: KnownTlsVersion
remarks: ''
isDeprecated: false
fields:
  - name: One0
    uid: '@azure/arm-rediscache.KnownTlsVersion.One0'
    package: '@azure/arm-rediscache'
    summary: >-
      TLS protocol version 1.0 -- deprecated for security reasons. Do not use
      this value for new caches.
  - name: One1
    uid: '@azure/arm-rediscache.KnownTlsVersion.One1'
    package: '@azure/arm-rediscache'
    summary: >-
      TLS protocol version 1.1 -- deprecated for security reasons. Do not use
      this value for new caches.
  - name: One2
    uid: '@azure/arm-rediscache.KnownTlsVersion.One2'
    package: '@azure/arm-rediscache'
    summary: >-
      TLS protocol version 1.2 -- use this value, or higher, for new caches. Or
      do not specify, so that your cache uses the recommended default value
