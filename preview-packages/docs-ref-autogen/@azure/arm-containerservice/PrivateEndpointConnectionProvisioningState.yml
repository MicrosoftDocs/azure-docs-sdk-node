name: PrivateEndpointConnectionProvisioningState
uid: '@azure/arm-containerservice.PrivateEndpointConnectionProvisioningState'
package: '@azure/arm-containerservice'
summary: >-
  The current provisioning state. \

  [KnownPrivateEndpointConnectionProvisioningState](xref:@azure/arm-containerservice.KnownPrivateEndpointConnectionProvisioningState)
  can be used interchangeably with PrivateEndpointConnectionProvisioningState,
   this enum contains the known values that the service supports.
  ### Known values supported by the service

  **Canceled**: Private endpoint connection provisioning was canceled. \

  **Creating**: Private endpoint connection is being created. \

  **Deleting**: Private endpoint connection is being deleted. \

  **Failed**: Private endpoint connection provisioning failed. \

  **Succeeded**: Private endpoint connection provisioning succeeded.
