### YamlMime:TSTypeAlias
name: StatusType
uid: '@azure/arm-costmanagement.StatusType'
package: '@azure/arm-costmanagement'
summary: >-
  The status of the export's schedule. If 'Inactive', the export's schedule is
  paused. To enable export set the status to be Active and then make a PUT
  request. \

  [KnownStatusType](xref:@azure/arm-costmanagement.KnownStatusType) can be used
  interchangeably with StatusType,
   this enum contains the known values that the service supports.
  ### Known values supported by the service

  **Active** \

  **Inactive**
fullName: StatusType
remarks: ''
isDeprecated: false
syntax: |
  type StatusType = string
