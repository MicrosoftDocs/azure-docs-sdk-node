    package: '@azure/arm-billing-trust'
    summary: >-
      Optional external-registry identifier (e.g. DUNS) used to disambiguate
      verification matches. Settable on PATCH while `evaluationState` is
      `pending` or `actionRequired`.
    fullName: externalId
    remarks: ''
    isDeprecated: false
    syntax:
      content: 'externalId?: ExternalId'
      return:
        description: ''
        type: <xref uid="@azure/arm-billing-trust.ExternalId" />
  - name: kind
    uid: '@azure/arm-billing-trust.BusinessVerificationRuleProperties.kind'
    package: '@azure/arm-billing-trust'
    summary: 'The discriminator possible values: eduQualification, businessVerification'
    fullName: kind
    remarks: ''
    isDeprecated: false
    syntax:
      content: 'kind: "businessVerification"'
      return:
        description: ''
        type: '"businessVerification"'
  - name: registrationNumber
    uid: >-
      @azure/arm-billing-trust.BusinessVerificationRuleProperties.registrationNumber
    package: '@azure/arm-billing-trust'
    summary: >-
      Registration number context (allowed types and registration id). Populated
      from the billing account at the time the rule is created. Server-managed.
    fullName: registrationNumber
    remarks: ''
    isDeprecated: false
    syntax:
      content: 'registrationNumber?: RegistrationNumber'
      return:
        description: ''
