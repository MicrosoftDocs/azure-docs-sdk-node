    package: '@azure/arm-azurestackhci'
    summary: The cluster agent has connected to Azure recently.
  - name: DeploymentFailed
    uid: '@azure/arm-azurestackhci.KnownStatus.DeploymentFailed'
    package: '@azure/arm-azurestackhci'
