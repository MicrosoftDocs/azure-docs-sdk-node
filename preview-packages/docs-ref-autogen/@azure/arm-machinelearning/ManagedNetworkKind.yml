name: ManagedNetworkKind
uid: '@azure/arm-machinelearning.ManagedNetworkKind'
package: '@azure/arm-machinelearning'
summary: >-
  The Kind of the managed network. Users can switch from V1 to V2 for granular
  access controls, but cannot switch back to V1 once V2 is enabled. \

  [KnownManagedNetworkKind](xref:@azure/arm-machinelearning.KnownManagedNetworkKind)
  can be used interchangeably with ManagedNetworkKind,
   this enum contains the known values that the service supports.
  ### Known values supported by the service

  **V1** \

  **V2**
