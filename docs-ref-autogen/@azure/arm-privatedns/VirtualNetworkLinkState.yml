name: VirtualNetworkLinkState
uid: '@azure/arm-privatedns.VirtualNetworkLinkState'
package: '@azure/arm-privatedns'
summary: >-
  The status of the virtual network link to the Private DNS zone. Possible
  values are 'InProgress' and 'Done'. This is a read-only property and any
  attempt to set this value will be ignored. \

  [KnownVirtualNetworkLinkState](xref:@azure/arm-privatedns.KnownVirtualNetworkLinkState)
  can be used interchangeably with VirtualNetworkLinkState,
   this enum contains the known values that the service supports.
  ### Known values supported by the service

  **InProgress** \

  **Completed**
