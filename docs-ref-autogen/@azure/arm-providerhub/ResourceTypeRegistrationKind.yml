### YamlMime:TSTypeAlias
name: ResourceTypeRegistrationKind
uid: '@azure/arm-providerhub.ResourceTypeRegistrationKind'
package: '@azure/arm-providerhub'
summary: >-
  Resource type registration kind. This Metadata is also used by
  portal/tooling/etc to render different UX experiences for resources of the
  same type. \

  [KnownResourceTypeRegistrationKind](xref:@azure/arm-providerhub.KnownResourceTypeRegistrationKind)
  can be used interchangeably with ResourceTypeRegistrationKind,
   this enum contains the known values that the service supports.
  ### Known values supported by the service

  **Managed**: Resource type served by the ProviderHub service. \

  **Hybrid**: Resource type served by both the ProviderHub & the onboarded
  Resource Provider Services (i.e. The type has a mix of managed and direct
  endpoints). \

  **Direct**: Resource type served by the onboarded Resource Provider Service.
fullName: ResourceTypeRegistrationKind
remarks: ''
isDeprecated: false
syntax: |
  type ResourceTypeRegistrationKind = string
