### YamlMime:TSTypeAlias
name: SharingUpdateOperationTypes
uid: '@azure/arm-compute.SharingUpdateOperationTypes'
package: '@azure/arm-compute'
summary: >-
  This property allows you to specify the operation type of gallery sharing
  update. Possible values are: **Add,** **Remove,** **Reset.** \

  [KnownSharingUpdateOperationTypes](xref:@azure/arm-compute.KnownSharingUpdateOperationTypes)
  can be used interchangeably with SharingUpdateOperationTypes,
   this enum contains the known values that the service supports.
  ### Known values supported by the service

  **Add** \

  **Remove** \

  **Reset** \

  **EnableCommunity**
fullName: SharingUpdateOperationTypes
remarks: ''
isDeprecated: false
syntax: |
  type SharingUpdateOperationTypes = string
