### YamlMime:TSTypeAlias
name: SecurityTypes
uid: '@azure/arm-compute.SecurityTypes'
package: '@azure/arm-compute'
summary: >-
  Specifies the VM securityType; UefiSettings are enabled only when set to
  TrustedLaunch or ConfidentialVM, and returns a Standard value starting API
  version 2025-11-01. \

  [KnownSecurityTypes](xref:@azure/arm-compute.KnownSecurityTypes) can be used
  interchangeably with SecurityTypes,
   this enum contains the known values that the service supports.
  ### Known values supported by the service

  **Standard**: Indicates a VM without UEFI features such as SecureBoot or vTPM;
  returned as the default value when securityType is not specified. \

  **TrustedLaunch** \

  **ConfidentialVM**
fullName: SecurityTypes
remarks: ''
isDeprecated: false
syntax: |
  type SecurityTypes = string
