### YamlMime:TSEnum
name: KnownKeyVaultNetworkAccessTypes
uid: '@azure/arm-containerservice.KnownKeyVaultNetworkAccessTypes'
package: '@azure/arm-containerservice'
summary: >-
  Network access of the key vault. Network access of key vault. The possible
  values are `Public` and `Private`. `Public` means the key vault allows public
  access from all networks. `Private` means the key vault disables public access
  and enables private link. The default value is `Public`.
fullName: KnownKeyVaultNetworkAccessTypes
remarks: ''
isDeprecated: false
fields:
  - name: Private
    uid: '@azure/arm-containerservice.KnownKeyVaultNetworkAccessTypes.Private'
    package: '@azure/arm-containerservice'
    summary: Key vault disables public access and enables private link.
  - name: Public
    uid: '@azure/arm-containerservice.KnownKeyVaultNetworkAccessTypes.Public'
    package: '@azure/arm-containerservice'
    summary: Key vault allows public access from all networks.
