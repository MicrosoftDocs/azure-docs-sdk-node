  - name: >-
      find<T>((data: any, options?: Abortable) => data,
      Pick<ReadableOperatorOptions, "signal" | "concurrency">)
    uid: '@azure/storage-common.Readable.find'
    package: '@azure/storage-common'
    summary: >-
      This method is similar to `Array.prototype.find` and calls *fn* on each
      chunk in the stream

      to find a chunk with a truthy value for *fn*. Once an *fn* call's awaited
      return value is truthy,

      the stream is destroyed and the promise is fulfilled with value for which
      *fn* returned a truthy value.

      If all of the *fn* calls on the chunks return a falsy value, the promise
      is fulfilled with `undefined`.
    remarks: ''
    isDeprecated: false
    syntax:
      content: >-
        function find<T>(fn: (data: any, options?: Abortable) => data, options?:
        Pick<ReadableOperatorOptions, "signal" | "concurrency">):
        Promise<undefined | T>
      parameters:
        - id: fn
          type: '(data: any, options?: Abortable) =&gt; data'
          description: a function to call on each chunk of the stream. Async or not.
        - id: options
          type: Pick&lt;ReadableOperatorOptions, "signal" | "concurrency"&gt;
          description: ''
      return:
        description: >-
          a promise evaluating to the first chunk for which *fn* evaluated with
          a truthy value,

          or `undefined` if no element was found.
        type: Promise&lt;undefined | T&gt;
  - name: >-
      flatMap((data: any, options?: Abortable) => any,
      Pick<ReadableOperatorOptions, "signal" | "concurrency">)
    uid: '@azure/storage-common.Readable.flatMap'
    package: '@azure/storage-common'
    summary: >-
      This method returns a new stream by applying the given callback to each
      chunk of the stream

      and then flattening the result.


      It is possible to return a stream or another iterable or async iterable
      from *fn* and the result streams

      will be merged (flattened) into the returned stream.
    remarks: ''
    isDeprecated: false
    syntax:
      content: >-
