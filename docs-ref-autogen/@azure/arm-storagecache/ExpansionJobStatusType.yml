### YamlMime:TSTypeAlias
name: ExpansionJobStatusType
uid: '@azure/arm-storagecache.ExpansionJobStatusType'
package: '@azure/arm-storagecache'
summary: >-
  The operational state of the expansion job. InProgress indicates the expansion
  is still running. Completed indicates expansion finished successfully. Failed
  means the expansion was unable to complete due to a fatal error. Deleting
  indicates the expansion is being rolled back. \

  [KnownExpansionJobStatusType](xref:@azure/arm-storagecache.KnownExpansionJobStatusType)
  can be used interchangeably with ExpansionJobStatusType,
   this enum contains the known values that the service supports.
  ### Known values supported by the service

  **InProgress**: InProgress \

  **Completed**: Completed \

  **Failed**: Failed \

  **Deleting**: Deleting \

  **RollingBack**: RollingBack
fullName: ExpansionJobStatusType
remarks: ''
isDeprecated: false
syntax: |
  type ExpansionJobStatusType = string
