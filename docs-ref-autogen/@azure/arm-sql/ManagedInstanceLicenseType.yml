### YamlMime:TSTypeAlias
name: ManagedInstanceLicenseType
uid: '@azure/arm-sql.ManagedInstanceLicenseType'
package: '@azure/arm-sql'
summary: >-
  The license type. Possible values are 'LicenseIncluded' (regular price
  inclusive of a new SQL license) and 'BasePrice' (discounted AHB price for
  bringing your own SQL licenses). \

  [KnownManagedInstanceLicenseType](xref:@azure/arm-sql.KnownManagedInstanceLicenseType)
  can be used interchangeably with ManagedInstanceLicenseType,
   this enum contains the known values that the service supports.
  ### Known values supported by the service

  **LicenseIncluded**: LicenseIncluded \

  **BasePrice**: BasePrice
fullName: ManagedInstanceLicenseType
remarks: ''
isDeprecated: false
syntax: |
  type ManagedInstanceLicenseType = string
