### YamlMime:TSTypeAlias
name: PublicNetworkAccess
uid: '@azure/arm-appconfiguration.PublicNetworkAccess'
package: '@azure/arm-appconfiguration'
summary: >-
  Control permission for data plane traffic coming from public networks. \

  [KnownPublicNetworkAccess](xref:@azure/arm-appconfiguration.KnownPublicNetworkAccess)
  can be used interchangeably with PublicNetworkAccess,
   this enum contains the known values that the service supports.
  ### Known values supported by the service

  **Enabled**: Allow public network access to the data plane. \

  **Disabled**: Disallow public network access to the data plane. \

  **SecuredByPerimeter**: Let network security perimeter configuration control
  public network access to the data plane.
fullName: PublicNetworkAccess
remarks: ''
isDeprecated: false
syntax: |
  type PublicNetworkAccess = string
