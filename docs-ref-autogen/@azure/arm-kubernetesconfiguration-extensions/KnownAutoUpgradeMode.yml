### YamlMime:TSEnum
name: KnownAutoUpgradeMode
uid: '@azure/arm-kubernetesconfiguration-extensions.KnownAutoUpgradeMode'
package: '@azure/arm-kubernetesconfiguration-extensions'
summary: |-
  The upgrade mode for auto upgrade.
  The default is "compatible".
fullName: KnownAutoUpgradeMode
remarks: ''
isDeprecated: false
fields:
  - name: Compatible
    uid: >-
      @azure/arm-kubernetesconfiguration-extensions.KnownAutoUpgradeMode.Compatible
    package: '@azure/arm-kubernetesconfiguration-extensions'
    summary: >-
      The extension will be automatically upgraded to compatible versions as
      determined by the user.
  - name: None
    uid: '@azure/arm-kubernetesconfiguration-extensions.KnownAutoUpgradeMode.None'
    package: '@azure/arm-kubernetesconfiguration-extensions'
    summary: The extension will not be automatically upgraded.
  - name: Patch
    uid: '@azure/arm-kubernetesconfiguration-extensions.KnownAutoUpgradeMode.Patch'
    package: '@azure/arm-kubernetesconfiguration-extensions'
    summary: >-
      The extension will be automatically upgraded to the latest patch version
      within the minor version.
