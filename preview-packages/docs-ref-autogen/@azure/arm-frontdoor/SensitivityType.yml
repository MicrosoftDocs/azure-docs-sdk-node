### YamlMime:TSTypeAlias
name: SensitivityType
uid: '@azure/arm-frontdoor.SensitivityType'
package: '@azure/arm-frontdoor'
summary: >-
  Defines the sensitivity for the rule. \

  [KnownSensitivityType](xref:@azure/arm-frontdoor.KnownSensitivityType) can be
  used interchangeably with SensitivityType,
   this enum contains the known values that the service supports.
  ### Known values supported by the service

  **Low**: Low Sensitivity - triggers the rule by larger spikes in traffic \

  **Medium**: Medium Sensitivity - triggers the rule by moderate spikes in
  traffic \

  **High**: High Sensitivity - triggers the rule by smaller spikes in traffic
fullName: SensitivityType
remarks: ''
isDeprecated: false
syntax: |
  type SensitivityType = string
