      return:
        description: ''
        type: string
  - name: publicNetworkAccess
    uid: '@azure/arm-eventgrid.NamespaceProperties.publicNetworkAccess'
    package: '@azure/arm-eventgrid'
    summary: >-
      This determines if traffic is allowed over public network. By default it
      is enabled.

      You can further restrict to specific IPs by configuring <seealso
      cref="P:Microsoft.Azure.Events.ResourceProvider.Common.Contracts.PubSub.NamespaceProperties.InboundIpRules"
      />
    fullName: publicNetworkAccess
    remarks: ''
    isDeprecated: false
    syntax:
