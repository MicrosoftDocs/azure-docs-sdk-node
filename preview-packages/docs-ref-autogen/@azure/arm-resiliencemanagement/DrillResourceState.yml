### YamlMime:TSTypeAlias
name: DrillResourceState
uid: '@azure/arm-resiliencemanagement.DrillResourceState'
package: '@azure/arm-resiliencemanagement'
summary: >-
  Drill Resource State (wrt SG and RO). \

  [KnownDrillResourceState](xref:@azure/arm-resiliencemanagement.KnownDrillResourceState)
  can be used interchangeably with DrillResourceState,
   this enum contains the known values that the service supports.
  ### Known values supported by the service

  **InServiceGroupNotInDrill**: Resource is in SG but not part of the Drill \

  **InDrillNotInServiceGroup**: Resource is in Drill but not part of the SG \

  **InRecoveryPlanNotInDrill**: Resource is in RecoveryPlan but not part of the
  Drill \

  **InDrillNotInRecoveryPlan**: Resource is in Drill but not part of the
  RecoveryPlan \

  **ResourceStateIncompatibleWithFault**: Resource is not in a state where it
  can be faulted.
fullName: DrillResourceState
remarks: ''
isDeprecated: false
syntax: |
  type DrillResourceState = string
