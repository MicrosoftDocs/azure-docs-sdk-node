### YamlMime:TSTypeAlias
name: HealthStatus
uid: '@azure/arm-devcenter.HealthStatus'
package: '@azure/arm-devcenter'
summary: >-
  Health status indicating whether a pool is available to create Dev Boxes. \

  [KnownHealthStatus](xref:@azure/arm-devcenter.KnownHealthStatus) can be used
  interchangeably with HealthStatus,
   this enum contains the known values that the service supports.
  ### Known values supported by the service

  **Unknown**: Unknown health status. \

  **Pending**: Pending health status. \

  **Healthy**: Healthy health status. \

  **Warning**: Warning health status. \

  **Unhealthy**: Unhealthy health status.
fullName: HealthStatus
remarks: ''
isDeprecated: false
syntax: |
  type HealthStatus = string
