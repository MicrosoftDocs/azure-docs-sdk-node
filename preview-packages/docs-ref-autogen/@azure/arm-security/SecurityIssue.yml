  **ExcessivePermissions**: ExcessivePermissions \

  **AnonymousAccess**: AnonymousAccess \

  **NetworkExposure**: NetworkExposure \

  **TrafficEncryption**: TrafficEncryption \

  **BestPractices**: BestPractices
