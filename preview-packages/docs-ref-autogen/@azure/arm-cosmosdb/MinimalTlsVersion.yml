### YamlMime:TSTypeAlias
name: MinimalTlsVersion
uid: '@azure/arm-cosmosdb.MinimalTlsVersion'
package: '@azure/arm-cosmosdb'
summary: >-
  Indicates the minimum allowed Tls version. The default is Tls 1.0, except for
  Cassandra and Mongo API's, which only work with Tls 1.2. \

  [KnownMinimalTlsVersion](xref:@azure/arm-cosmosdb.KnownMinimalTlsVersion) can
  be used interchangeably with MinimalTlsVersion,
   this enum contains the known values that the service supports.
  ### Known values supported by the service

  **Tls** \

  **Tls11** \

  **Tls12**
fullName: MinimalTlsVersion
remarks: ''
isDeprecated: false
syntax: |
  type MinimalTlsVersion = string
