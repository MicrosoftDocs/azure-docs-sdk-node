### YamlMime:TSEnum
name: KnownIdentityProvider
uid: '@azure/arm-azurestackhci.KnownIdentityProvider'
package: '@azure/arm-azurestackhci'
summary: Identity Provider for the cluster
fullName: KnownIdentityProvider
remarks: ''
isDeprecated: false
fields:
  - name: ActiveDirectory
    uid: '@azure/arm-azurestackhci.KnownIdentityProvider.ActiveDirectory'
    package: '@azure/arm-azurestackhci'
    summary: >-
      Uses Active Directory as the identity provider, enabling domain-based
      authentication and centralized identity management. This is the default
      option.
  - name: LocalIdentity
    uid: '@azure/arm-azurestackhci.KnownIdentityProvider.LocalIdentity'
    package: '@azure/arm-azurestackhci'
    summary: >-
      Uses a local identity system integrated with Azure Key Vault for
      authentication. Suitable for AD-less environments where Active Directory
      is not available or required.
