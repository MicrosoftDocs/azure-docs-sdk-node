### YamlMime:TSTypeAlias
name: AutoStartEnableStatus
uid: '@azure/arm-devcenter.AutoStartEnableStatus'
package: '@azure/arm-devcenter'
summary: >-
  Enables or disables whether Dev Boxes should be automatically started at
  commencement of active hours. \

  [KnownAutoStartEnableStatus](xref:@azure/arm-devcenter.KnownAutoStartEnableStatus)
  can be used interchangeably with AutoStartEnableStatus,
   this enum contains the known values that the service supports.
  ### Known values supported by the service

  **Enabled**: Auto start is enabled. \

  **Disabled**: Auto start is disabled.
fullName: AutoStartEnableStatus
remarks: ''
isDeprecated: false
syntax: |
  type AutoStartEnableStatus = string
