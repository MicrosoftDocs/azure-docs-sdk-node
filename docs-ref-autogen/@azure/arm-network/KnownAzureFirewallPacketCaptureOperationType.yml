name: KnownAzureFirewallPacketCaptureOperationType
uid: '@azure/arm-network.KnownAzureFirewallPacketCaptureOperationType'
package: '@azure/arm-network'
summary: >-
  The packet capture operation to perform. If the Start operation is selected,
  please provide all the fields in the firewallPacketCaptureParameters to
  successfully initiate the packet capture. If the Status or Stop operation is
  selected, only the operation field is required; all other fields in the
  firewallPacketCaptureParameters can be omitted to successfully retrieve the
  capture status or stop the capture.
