name: MonitorAlertSeverity
uid: '@azure/arm-eventgrid.MonitorAlertSeverity'
package: '@azure/arm-eventgrid'
summary: >-
  The severity that will be attached to every Alert fired through this event
  subscription.

  This field must be provided. \

  [KnownMonitorAlertSeverity](xref:@azure/arm-eventgrid.KnownMonitorAlertSeverity)
  can be used interchangeably with MonitorAlertSeverity,
   this enum contains the known values that the service supports.
  ### Known values supported by the service

  **Sev0**: Sev0 \

  **Sev1**: Sev1 \

  **Sev2**: Sev2 \

  **Sev3**: Sev3 \

  **Sev4**: Sev4
