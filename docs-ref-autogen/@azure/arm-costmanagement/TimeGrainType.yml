### YamlMime:TSTypeAlias
name: TimeGrainType
uid: '@azure/arm-costmanagement.TimeGrainType'
package: '@azure/arm-costmanagement'
summary: >-
  The time covered by a budget. Tracking of the amount will be reset based on
  the time grain.


  Supported for CategoryType(s): Cost, ReservationUtilization.


  Supported timeGrainTypes for **CategoryType: Cost**


  - Monthly

  - Quarterly

  - Annually

  - BillingMonth*

  - BillingQuarter*

  - BillingAnnual*


  *only supported for Web Direct customers.


  Supported timeGrainTypes for **CategoryType: ReservationUtilization**

  - Last7Days

  - Last30Days


  Required for CategoryType(s): Cost, ReservationUtilization. \

  [KnownTimeGrainType](xref:@azure/arm-costmanagement.KnownTimeGrainType) can be
  used interchangeably with TimeGrainType,
   this enum contains the known values that the service supports.
  ### Known values supported by the service

  **Monthly**: The budget will track costs in the current calendar month against
  the amount.


  Supported for CategoryType: Cost only. \

  **Quarterly**: The budget will track costs in the current calendar quarter
  against the amount.


  Supported for CategoryType: Cost only. \

  **Annually**: The budget will track costs in the current calendar year against
  the amount.


  Supported for CategoryType: Cost only. \

  **BillingMonth**: The budget will track costs in the current billing month
  against the amount.


  Supported for CategoryType: Cost and Web Direct customers only. \

  **BillingQuarter**: The budget will track costs in the current billing quarter
  against the amount.


  Supported for CategoryType: Cost and Web Direct customers only. \

  **BillingAnnual**: The budget will track costs in the current billing year
  against the amount.


  Supported for CategoryType: Cost and Web Direct customers only. \

  **Last7Days**: The Reservation Utilization Alert Rule will evaluate
  reservations based on their 7-Day utilization percentage.


  Supported for CategoryType: ReservationUtilization only. \

  **Last30Days**: The Reservation Utilization Alert Rule will evaluate
  reservations based on their 30-Day utilization percentage.


  Supported for CategoryType: ReservationUtilization only.
fullName: TimeGrainType
remarks: ''
isDeprecated: false
syntax: |
  type TimeGrainType = string
