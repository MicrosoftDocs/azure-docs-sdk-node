### YamlMime:TSTypeAlias
name: WellKnownCommunities
uid: '@azure/arm-managednetworkfabric.WellKnownCommunities'
package: '@azure/arm-managednetworkfabric'
summary: >-
  `Internet` - Advertise routes to internet community.

  `LocalAS` - Advertise routes to only localAS peers.

  `NoAdvertise` - Don't advertise routes to any peer.

  `NoExport` - Don't export to next AS.

  `GShut` - Graceful Shutdown (GSHUT) withdraw routes before terminating BGP
  connection. \

  [KnownWellKnownCommunities](xref:@azure/arm-managednetworkfabric.KnownWellKnownCommunities)
  can be used interchangeably with WellKnownCommunities,
   this enum contains the known values that the service supports.
  ### Known values supported by the service

  **Internet**: WellKnownCommunities-Internet \

  **LocalAS**: WellKnownCommunities-LocalAS \

  **NoAdvertise**: WellKnownCommunities-NoAdvertise \

  **NoExport**: WellKnownCommunities-NoExport \

  **GShut**: WellKnownCommunities-GShut
fullName: WellKnownCommunities
remarks: ''
isDeprecated: false
syntax: |
  type WellKnownCommunities = string
