### YamlMime:TSTypeAlias
name: ScenarioType
uid: '@azure/arm-cognitiveservices.ScenarioType'
package: '@azure/arm-cognitiveservices'
summary: >-
  Specifies what features in AI Foundry network injection applies to. Currently
  only supports 'agent' for agent scenarios. 'none' means no network injection.
  \

  [KnownScenarioType](xref:@azure/arm-cognitiveservices.KnownScenarioType) can
  be used interchangeably with ScenarioType,
   this enum contains the known values that the service supports.
  ### Known values supported by the service

  **none** \

  **agent**
fullName: ScenarioType
remarks: ''
isDeprecated: false
syntax: |
  type ScenarioType = string
