name: AutoProvisioningStatus
uid: '@azure/arm-edgeorder.AutoProvisioningStatus'
package: '@azure/arm-edgeorder'
summary: >-
  Auto Provisioning Details. \

  [KnownAutoProvisioningStatus](xref:@azure/arm-edgeorder.KnownAutoProvisioningStatus)
  can be used interchangeably with AutoProvisioningStatus,
   this enum contains the known values that the service supports.
  ### Known values supported by the service

  **Enabled**: Provisioning Enabled. Will act as pre-approved, and arc extension
  will be enabled as soon as the device is verified to be at the right edge
  location. \

  **Disabled**: Provisioning Disabled.
