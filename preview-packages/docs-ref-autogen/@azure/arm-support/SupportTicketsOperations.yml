          =&gt; Promise&lt;SupportTicketDetails&gt;
  - name: list
    uid: '@azure/arm-support.SupportTicketsOperations.list'
    package: '@azure/arm-support'
    summary: >-
      Lists all the support tickets for an Azure subscription. You can also
      filter the support tickets by _Status_, _CreatedDate_, _ServiceId_, and
      _ProblemClassificationId_ using the $filter parameter. Output will be a
      paged result with _nextLink_, using which you can retrieve the next set of
      support tickets. <br/><br/>Support ticket data is available for 18 months
      after ticket creation. If a ticket was created more than 18 months ago, a
      request for data might cause an error.
    fullName: list
    remarks: ''
    isDeprecated: false
    syntax:
      content: >-
        list: (options?: SupportTicketsListOptionalParams) =>
        PagedAsyncIterableIterator<SupportTicketDetails, SupportTicketDetails[],
        PageSettings>
      return:
        description: ''
        type: >-
          (options?: SupportTicketsListOptionalParams) =&gt;
          PagedAsyncIterableIterator&lt;SupportTicketDetails,
          SupportTicketDetails[], PageSettings&gt;
