### YamlMime:TSType
name: CommonExportProperties
uid: '@azure/arm-costmanagement.CommonExportProperties'
package: '@azure/arm-costmanagement'
summary: The common properties of the export.
fullName: CommonExportProperties
remarks: ''
isDeprecated: false
type: interface
properties:
  - name: compressionMode
    uid: '@azure/arm-costmanagement.CommonExportProperties.compressionMode'
    package: '@azure/arm-costmanagement'
    summary: >-
      Allow customers to select compress data for exports. This setting will
      enable destination file compression scheme at runtime. By default set to
      None. Gzip is for csv and snappy for parquet.
    fullName: compressionMode
    remarks: ''
    isDeprecated: false
    syntax:
      content: 'compressionMode?: string'
      return:
        description: ''
        type: string
  - name: dataOverwriteBehavior
    uid: '@azure/arm-costmanagement.CommonExportProperties.dataOverwriteBehavior'
    package: '@azure/arm-costmanagement'
    summary: >-
      Allow customers to select overwrite data(OverwritePreviousReport) for
      exports. This setting will enable overwrite data for the same month in
      customer storage account. By default set to CreateNewReport.
    fullName: dataOverwriteBehavior
    remarks: ''
    isDeprecated: false
    syntax:
      content: 'dataOverwriteBehavior?: string'
      return:
        description: ''
        type: string
  - name: definition
    uid: '@azure/arm-costmanagement.CommonExportProperties.definition'
    package: '@azure/arm-costmanagement'
    summary: Has the definition for the export.
    fullName: definition
    remarks: ''
    isDeprecated: false
    syntax:
      content: 'definition: ExportDefinition'
      return:
        description: ''
        type: <xref uid="@azure/arm-costmanagement.ExportDefinition" />
  - name: deliveryInfo
    uid: '@azure/arm-costmanagement.CommonExportProperties.deliveryInfo'
    package: '@azure/arm-costmanagement'
    summary: Has delivery information for the export.
    fullName: deliveryInfo
    remarks: ''
    isDeprecated: false
    syntax:
      content: 'deliveryInfo: ExportDeliveryInfo'
      return:
        description: ''
        type: <xref uid="@azure/arm-costmanagement.ExportDeliveryInfo" />
  - name: exportDescription
    uid: '@azure/arm-costmanagement.CommonExportProperties.exportDescription'
    package: '@azure/arm-costmanagement'
    summary: The export description set by customer at time of export creation/update.
    fullName: exportDescription
    remarks: ''
    isDeprecated: false
    syntax:
      content: 'exportDescription?: string'
      return:
        description: ''
        type: string
  - name: format
    uid: '@azure/arm-costmanagement.CommonExportProperties.format'
    package: '@azure/arm-costmanagement'
    summary: The format of the export being delivered.
    fullName: format
    remarks: ''
    isDeprecated: false
    syntax:
      content: 'format?: string'
      return:
        description: ''
        type: string
  - name: nextRunTimeEstimate
    uid: '@azure/arm-costmanagement.CommonExportProperties.nextRunTimeEstimate'
    package: '@azure/arm-costmanagement'
    summary: >-
      If the export has an active schedule, provides an estimate of the next run
      time.
    fullName: nextRunTimeEstimate
    remarks: ''
    isDeprecated: false
    syntax:
      content: 'nextRunTimeEstimate?: Date'
      return:
        description: ''
        type: Date
  - name: partitionData
    uid: '@azure/arm-costmanagement.CommonExportProperties.partitionData'
    package: '@azure/arm-costmanagement'
    summary: >-
      If set to true, exported data will be partitioned by size and placed in a
      blob directory together with a manifest file.
    fullName: partitionData
    remarks: ''
    isDeprecated: false
    syntax:
      content: 'partitionData?: boolean'
      return:
        description: ''
        type: boolean
  - name: runHistory
    uid: '@azure/arm-costmanagement.CommonExportProperties.runHistory'
    package: '@azure/arm-costmanagement'
    summary: If requested, has the most recent run history for the export.
    fullName: runHistory
    remarks: ''
    isDeprecated: false
    syntax:
      content: 'runHistory?: ExportExecutionListResult'
      return:
        description: ''
        type: <xref uid="@azure/arm-costmanagement.ExportExecutionListResult" />
  - name: systemSuspensionContext
    uid: '@azure/arm-costmanagement.CommonExportProperties.systemSuspensionContext'
    package: '@azure/arm-costmanagement'
    summary: >-
      The export suspension reason if export is in SystemSuspended state. This
      is not populated currently.
    fullName: systemSuspensionContext
    remarks: ''
    isDeprecated: false
    syntax:
      content: 'systemSuspensionContext?: ExportSuspensionContext'
      return:
        description: ''
        type: <xref uid="@azure/arm-costmanagement.ExportSuspensionContext" />
