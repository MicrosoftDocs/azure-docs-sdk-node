### YamlMime:TSType
name: UpdateStage
uid: '@azure/arm-containerservicefleet.UpdateStage'
package: '@azure/arm-containerservicefleet'
summary: >-
  Defines a stage which contains the groups to update and the steps to take
  (e.g., wait for a time period) before starting the next stage.
fullName: UpdateStage
remarks: ''
isDeprecated: false
type: interface
properties:
  - name: afterGates
    uid: '@azure/arm-containerservicefleet.UpdateStage.afterGates'
    package: '@azure/arm-containerservicefleet'
    summary: A list of Gates that will be created after this Stage is executed.
    fullName: afterGates
    remarks: ''
    isDeprecated: false
    syntax:
      content: 'afterGates?: GateConfiguration[]'
      return:
        description: ''
        type: <xref uid="@azure/arm-containerservicefleet.GateConfiguration" />[]
  - name: afterStageWaitInSeconds
    uid: '@azure/arm-containerservicefleet.UpdateStage.afterStageWaitInSeconds'
    package: '@azure/arm-containerservicefleet'
    summary: >-
      The time in seconds to wait at the end of this stage before starting the
      next one. Defaults to 0 seconds if unspecified.
    fullName: afterStageWaitInSeconds
    remarks: ''
    isDeprecated: false
    syntax:
      content: 'afterStageWaitInSeconds?: number'
      return:
        description: ''
        type: number
  - name: beforeGates
    uid: '@azure/arm-containerservicefleet.UpdateStage.beforeGates'
    package: '@azure/arm-containerservicefleet'
    summary: A list of Gates that will be created before this Stage is executed.
    fullName: beforeGates
    remarks: ''
    isDeprecated: false
    syntax:
      content: 'beforeGates?: GateConfiguration[]'
      return:
        description: ''
        type: <xref uid="@azure/arm-containerservicefleet.GateConfiguration" />[]
  - name: groups
    uid: '@azure/arm-containerservicefleet.UpdateStage.groups'
    package: '@azure/arm-containerservicefleet'
    summary: >-
      Defines the groups to be executed in parallel in this stage. Duplicate
      groups are not allowed. Min size: 1.
    fullName: groups
    remarks: ''
    isDeprecated: false
    syntax:
      content: 'groups?: UpdateGroup[]'
      return:
        description: ''
        type: <xref uid="@azure/arm-containerservicefleet.UpdateGroup" />[]
  - name: maxConcurrency
    uid: '@azure/arm-containerservicefleet.UpdateStage.maxConcurrency'
    package: '@azure/arm-containerservicefleet'
    summary: >-
      The max number of upgrades that can run concurrently across all groups in
      this stage.

      Acts as a ceiling (and not a quota) for the number of concurrent upgrades
      within the stage you want to tolerate at a time.

      Actual concurrency may be lower depending on group-level concurrency
      limits or individual member conditions.

      Stage maxConcurrency has a min value of "1".

      Accepts either:
          • A fixed count, e.g., "3"
          • A percentage, e.g., "25%" (range 1–100). Percentage is of the total number of clusters across all groups in the stage.
            Fractional results are rounded down. A minimum of 1 upgrade is enforced.
      Examples:
          • "3"     --> up to 3 clusters from this stage upgrade at once (across all groups).
          • "100%"  --> “all at once”; up to all clusters in this stage upgrade at the same time.
          • "25%"   --> up to 25% of the stage’s total clusters upgrade at the same time.
    fullName: maxConcurrency
    remarks: ''
    isDeprecated: false
    syntax:
      content: 'maxConcurrency?: string'
      return:
        description: ''
        type: string
  - name: name
    uid: '@azure/arm-containerservicefleet.UpdateStage.name'
    package: '@azure/arm-containerservicefleet'
    summary: The name of the stage. Must be unique within the UpdateRun.
    fullName: name
    remarks: ''
    isDeprecated: false
    syntax:
      content: 'name: string'
      return:
        description: ''
        type: string
