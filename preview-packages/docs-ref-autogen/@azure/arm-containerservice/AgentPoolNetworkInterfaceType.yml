### YamlMime:TSTypeAlias
name: AgentPoolNetworkInterfaceType
uid: '@azure/arm-containerservice.AgentPoolNetworkInterfaceType'
package: '@azure/arm-containerservice'
summary: >-
  Type of network interface to be provisioned on each virtual machine instance.
  For more information, see https://aka.ms/aks/multi-nic \

  [KnownAgentPoolNetworkInterfaceType](xref:@azure/arm-containerservice.KnownAgentPoolNetworkInterfaceType)
  can be used interchangeably with AgentPoolNetworkInterfaceType,
   this enum contains the known values that the service supports.
  ### Known values supported by the service

  **Standard**: A standard network interface programmed with an IP from a
  specified VNet subnet. Must be used with `vnetSubnetId` set in the
  AgentPoolNetworkInterface. IP address family (IPv4/IPv6/Dual-stack) is
  determined by the subnet. \

  **Dynamic**: A secondary network interface created without IP configuration or
  subnet attachment. The interface is provisioned in an uninitialized state and
  the subnet is attached during workload creation. `vnetSubnetId` must be set to
  an empty string (`""`) or omitted.
fullName: AgentPoolNetworkInterfaceType
remarks: ''
isDeprecated: false
syntax: |
  type AgentPoolNetworkInterfaceType = string
