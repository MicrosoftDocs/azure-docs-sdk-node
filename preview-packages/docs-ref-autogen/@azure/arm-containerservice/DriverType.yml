### YamlMime:TSTypeAlias
name: DriverType
uid: '@azure/arm-containerservice.DriverType'
package: '@azure/arm-containerservice'
summary: >-
  Specify the type of GPU driver to install when creating Windows agent pools.
  If not provided, AKS selects the driver based on system compatibility. This
  cannot be changed once the AgentPool has been created. This cannot be set on
  Linux AgentPools. For Linux AgentPools, the driver is selected based on system
  compatibility. \

  [KnownDriverType](xref:@azure/arm-containerservice.KnownDriverType) can be
  used interchangeably with DriverType,
   this enum contains the known values that the service supports.
  ### Known values supported by the service

  **GRID**: Install the GRID driver for the GPU, suitable for applications
  requiring virtualization support. \

  **CUDA**: Install the CUDA driver for the GPU, optimized for computational
  tasks in scientific computing and data-intensive applications.
fullName: DriverType
remarks: ''
isDeprecated: false
syntax: |
  type DriverType = string
