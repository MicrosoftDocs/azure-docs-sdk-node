### YamlMime:TSTypeAlias
name: ConfirmationStatus
uid: '@azure/arm-resiliencemanagement.ConfirmationStatus'
package: '@azure/arm-resiliencemanagement'
summary: >-
  Enum for the confirmation status of a high availability solution. \

  [KnownConfirmationStatus](xref:@azure/arm-resiliencemanagement.KnownConfirmationStatus)
  can be used interchangeably with ConfirmationStatus,
   this enum contains the known values that the service supports.
  ### Known values supported by the service

  **ApprovedByUser**: The high availability solution has been approved by the
  user. \

  **ApprovalPending**: The high availability solution is pending approval from
  the user. \

  **ApprovalNotNeeded**: The high availability solution does not require user
  approval. \

  **RejectedByUser**: The high availability solution has been rejected by the
  user.
fullName: ConfirmationStatus
remarks: ''
isDeprecated: false
syntax: |
  type ConfirmationStatus = string
