### YamlMime:TSEnum
name: KnownFrequency
uid: '@azure/arm-costmanagement.KnownFrequency'
package: '@azure/arm-costmanagement'
summary: >-
  Frequency of a notification. Represents how long the notification will be
  silent after triggering an alert for a threshold breach. If not specified, the
  frequency will be set by default based on the timeGrain (Weekly when
  timeGrain: Last7Days, Monthly when timeGrain: Last30Days).


  Supported for CategoryType(s): ReservationUtilization.
fullName: KnownFrequency
remarks: ''
isDeprecated: false
fields:
  - name: Daily
    uid: '@azure/arm-costmanagement.KnownFrequency.Daily'
    package: '@azure/arm-costmanagement'
    summary: >-
      After the threshold breaches and an Alert is fired, no further alerts will
      be sent until the next calendar day.
  - name: Monthly
    uid: '@azure/arm-costmanagement.KnownFrequency.Monthly'
    package: '@azure/arm-costmanagement'
    summary: >-
      After the threshold breaches and an Alert is fired, no further alerts will
      be sent for 30 calendar days.
  - name: Weekly
    uid: '@azure/arm-costmanagement.KnownFrequency.Weekly'
    package: '@azure/arm-costmanagement'
    summary: >-
      After the threshold breaches and an Alert is fired, no further alerts will
      be sent for 7 calendar days.
