fullName: KnownLegendConfigType
remarks: ''
isDeprecated: false
fields:
  - name: Classmap
    uid: '@azure/planetarycomputer.KnownLegendConfigType.Classmap'
    package: '@azure/planetarycomputer'
    summary: Classified map with discrete colors for classes.
  - name: Continuous
    uid: '@azure/planetarycomputer.KnownLegendConfigType.Continuous'
    package: '@azure/planetarycomputer'
    summary: Continuous color ramp legend.
  - name: Interval
    uid: '@azure/planetarycomputer.KnownLegendConfigType.Interval'
    package: '@azure/planetarycomputer'
    summary: Interval-based legend with discrete ranges.
  - name: None
    uid: '@azure/planetarycomputer.KnownLegendConfigType.None'
    package: '@azure/planetarycomputer'
