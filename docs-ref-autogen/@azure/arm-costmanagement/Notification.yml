### YamlMime:TSType
name: Notification
uid: '@azure/arm-costmanagement.Notification'
package: '@azure/arm-costmanagement'
summary: |-
  The notification associated with a budget.

  Supported for CategoryType(s): Cost, ReservationUtilization.
fullName: Notification
remarks: ''
isDeprecated: false
type: interface
properties:
  - name: contactEmails
    uid: '@azure/arm-costmanagement.Notification.contactEmails'
    package: '@azure/arm-costmanagement'
    summary: >-
      Email addresses to send the notification to when the threshold is
      breached. Must have at least one contact email or contact group specified
      at the Subscription or Resource Group scopes. All other scopes must have
      at least one contact email specified.


      Supported for CategoryType(s): Cost, ReservationUtilization.
    fullName: contactEmails
    remarks: ''
    isDeprecated: false
    syntax:
      content: 'contactEmails: string[]'
      return:
        description: ''
        type: string[]
  - name: contactGroups
    uid: '@azure/arm-costmanagement.Notification.contactGroups'
    package: '@azure/arm-costmanagement'
    summary: >-
      Subscription or Resource Group scopes only. Action groups to send the
      notification to when the threshold is exceeded. Must be provided as a
      fully qualified Azure resource id.


      Supported for CategoryType(s): Cost.
    fullName: contactGroups
    remarks: ''
    isDeprecated: false
    syntax:
      content: 'contactGroups?: string[]'
      return:
        description: ''
        type: string[]
  - name: contactRoles
    uid: '@azure/arm-costmanagement.Notification.contactRoles'
    package: '@azure/arm-costmanagement'
    summary: >-
      Subscription or Resource Group scopes only. Contact roles to send the
      notification to when the threshold is breached.


      Supported for CategoryType(s): Cost.
    fullName: contactRoles
    remarks: ''
    isDeprecated: false
    syntax:
      content: 'contactRoles?: string[]'
      return:
        description: ''
        type: string[]
  - name: enabled
    uid: '@azure/arm-costmanagement.Notification.enabled'
    package: '@azure/arm-costmanagement'
    summary: |-
      The notification is enabled or not.

      Supported for CategoryType(s): Cost, ReservationUtilization.
    fullName: enabled
    remarks: ''
    isDeprecated: false
    syntax:
      content: 'enabled: boolean'
      return:
        description: ''
        type: boolean
  - name: frequency
    uid: '@azure/arm-costmanagement.Notification.frequency'
    package: '@azure/arm-costmanagement'
    summary: >-
      Frequency of a notification. Represents how long the notification will be
      silent after triggering an alert for a threshold breach. If not specified,
      the frequency will be set by default based on the timeGrain (Weekly when
      timeGrain: Last7Days, Monthly when timeGrain: Last30Days).


      Supported for CategoryType(s): ReservationUtilization.
    fullName: frequency
    remarks: ''
    isDeprecated: false
    syntax:
      content: 'frequency?: string'
      return:
        description: ''
        type: string
  - name: locale
    uid: '@azure/arm-costmanagement.Notification.locale'
    package: '@azure/arm-costmanagement'
    summary: |-
      Language in which the recipient will receive the notification,

      Supported for CategoryType(s): Cost, ReservationUtilization.
    fullName: locale
    remarks: ''
    isDeprecated: false
    syntax:
      content: 'locale?: string'
      return:
        description: ''
        type: string
  - name: operator
    uid: '@azure/arm-costmanagement.Notification.operator'
    package: '@azure/arm-costmanagement'
    summary: |-
      The comparison operator.

      Supported for CategoryType(s): Cost, ReservationUtilization.

      Supported operators for **CategoryType: Cost**
      - GreaterThan
      - GreaterThanOrEqualTo

      Supported operators for **CategoryType: ReservationUtilization**
      - LessThan
    fullName: operator
    remarks: ''
    isDeprecated: false
    syntax:
      content: 'operator: string'
      return:
        description: ''
        type: string
  - name: threshold
    uid: '@azure/arm-costmanagement.Notification.threshold'
    package: '@azure/arm-costmanagement'
    summary: >-
      Threshold value associated with a notification. It is always percent with
      a maximum of 2 decimal places.


      Supported for CategoryType(s): Cost, ReservationUtilization.


      **CategoryType: Cost** - Must be between 0 and 1000. Notification is sent
      when the cost exceeded the threshold.


      **CategoryType: ReservationUtilization** - Must be between 0 and 100.
      Notification is sent when a reservation has a utilization percentage below
      the threshold.
    fullName: threshold
    remarks: ''
    isDeprecated: false
    syntax:
      content: 'threshold: number'
      return:
        description: ''
        type: number
  - name: thresholdType
    uid: '@azure/arm-costmanagement.Notification.thresholdType'
    package: '@azure/arm-costmanagement'
    summary: |-
      The type of threshold.

      Supported for CategoryType(s): Cost.
    fullName: thresholdType
    remarks: ''
    isDeprecated: false
    syntax:
      content: 'thresholdType?: string'
      return:
        description: ''
        type: string
