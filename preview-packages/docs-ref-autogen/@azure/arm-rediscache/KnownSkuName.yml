fields:
  - name: Basic
    uid: '@azure/arm-rediscache.KnownSkuName.Basic'
    package: '@azure/arm-rediscache'
    summary: >-
      The well known 'Basic' SKU for Azure Cache for Redis. Basic SKU does not
      have an availability SLA.
  - name: Premium
    uid: '@azure/arm-rediscache.KnownSkuName.Premium'
    package: '@azure/arm-rediscache'
    summary: >-
      The well known 'Premium' SKU for Azure Cache for Redis. Premium SKU has an
      availability SLA, and higher performance tiers and more features compared
      with Standard SKU.
  - name: Standard
    uid: '@azure/arm-rediscache.KnownSkuName.Standard'
    package: '@azure/arm-rediscache'
    summary: >-
      The well known 'Standard' SKU for Azure Cache for Redis. Standard SKU has
