### YamlMime:TSTypeAlias
name: StorageType
uid: '@azure/arm-postgresql-flexible.StorageType'
package: '@azure/arm-postgresql-flexible'
summary: >-
  Type of storage assigned to a server. Allowed values are Premium_LRS,
  PremiumV2_LRS, or UltraSSD_LRS. If not specified, it defaults to Premium_LRS.
  \

  [KnownStorageType](xref:@azure/arm-postgresql-flexible.KnownStorageType) can
  be used interchangeably with StorageType,
   this enum contains the known values that the service supports.
  ### Known values supported by the service

  **Premium_LRS** \

  **PremiumV2_LRS** \

  **UltraSSD_LRS**
fullName: StorageType
remarks: ''
isDeprecated: false
syntax: |
  type StorageType = string
