name: CacheFileAccessLogs
uid: '@azure/arm-netapp.CacheFileAccessLogs'
package: '@azure/arm-netapp'
summary: >-
  Flag indicating whether file access logs are enabled for the Cache, based on
  active diagnostic settings present on the Cache. \

  [KnownCacheFileAccessLogs](xref:@azure/arm-netapp.KnownCacheFileAccessLogs)
  can be used interchangeably with CacheFileAccessLogs,
   this enum contains the known values that the service supports.
  ### Known values supported by the service

  **Enabled**: fileAccessLogs are enabled \

  **Disabled**: fileAccessLogs are not enabled
