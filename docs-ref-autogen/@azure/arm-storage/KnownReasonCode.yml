### YamlMime:TSEnum
name: KnownReasonCode
uid: '@azure/arm-storage.KnownReasonCode'
package: '@azure/arm-storage'
summary: >-
  The reason for the restriction. As of now this can be "QuotaId" or
  "NotAvailableForSubscription". Quota Id is set when the SKU has requiredQuotas
  parameter as the subscription does not belong to that quota. The
  "NotAvailableForSubscription" is related to capacity at DC.
fullName: KnownReasonCode
remarks: ''
isDeprecated: false
