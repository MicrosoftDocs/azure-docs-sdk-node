### YamlMime:TSEnum
name: KnownDistributionStrategy
uid: '@azure/arm-computeschedule.KnownDistributionStrategy'
package: '@azure/arm-computeschedule'
summary: The distribution strategy for zone allocation
fullName: KnownDistributionStrategy
remarks: ''
isDeprecated: false
fields:
  - name: BestEffortBalanced
    uid: '@azure/arm-computeschedule.KnownDistributionStrategy.BestEffortBalanced'
    package: '@azure/arm-computeschedule'
    summary: >-
      Platform attempts to evenly distribute VMs across all available zones with
      best effort
  - name: BestEffortSingleZone
    uid: '@azure/arm-computeschedule.KnownDistributionStrategy.BestEffortSingleZone'
    package: '@azure/arm-computeschedule'
    summary: >-
      Platform attempts to place as many VMs as possible in a single zone, falls
      back to multiple zones if needed
  - name: Prioritized
    uid: '@azure/arm-computeschedule.KnownDistributionStrategy.Prioritized'
    package: '@azure/arm-computeschedule'
    summary: Platform uses customer-provided zone rankings to allocate VMs
  - name: StrictBalanced
    uid: '@azure/arm-computeschedule.KnownDistributionStrategy.StrictBalanced'
    package: '@azure/arm-computeschedule'
    summary: >-
      Platform must evenly distribute VMs across zones, request is rejected if
      exact balance cannot be achieved
