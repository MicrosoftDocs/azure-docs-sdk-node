    uid: '@azure/arm-network.FlowLogPropertiesFormat.flowAnalyticsConfiguration'
    package: '@azure/arm-network'
    summary: Parameters that define the configuration of traffic analytics.
    fullName: flowAnalyticsConfiguration
    remarks: ''
    isDeprecated: false
    syntax:
      content: 'flowAnalyticsConfiguration?: TrafficAnalyticsProperties'
      return:
        description: ''
        type: <xref uid="@azure/arm-network.TrafficAnalyticsProperties" />
  - name: format
    uid: '@azure/arm-network.FlowLogPropertiesFormat.format'
    package: '@azure/arm-network'
    summary: Parameters that define the flow log format.
    fullName: format
    remarks: ''
    isDeprecated: false
    syntax:
      content: 'format?: FlowLogFormatParameters'
      return:
        description: ''
        type: <xref uid="@azure/arm-network.FlowLogFormatParameters" />
  - name: provisioningState
    uid: '@azure/arm-network.FlowLogPropertiesFormat.provisioningState'
    package: '@azure/arm-network'
    summary: The provisioning state of the flow log.
    fullName: provisioningState
    remarks: ''
    isDeprecated: false
    syntax:
      content: 'provisioningState?: string'
      return:
        description: ''
        type: string
  - name: recordTypes
    uid: '@azure/arm-network.FlowLogPropertiesFormat.recordTypes'
    package: '@azure/arm-network'
    summary: >-
      Optional field to filter network traffic logs based on flow states. Value
      of this field could be any comma separated combination string of letters
      B,C,E or D. B represents Begin, when a flow is created. C represents
      Continue for an ongoing flow generated at every five-minute interval. E
      represents End, when a flow is terminated. D represents Deny, when a flow
      is denied. If not specified, all network traffic will be logged.
    fullName: recordTypes
    remarks: ''
    isDeprecated: false
    syntax:
      content: 'recordTypes?: string'
      return:
        description: ''
        type: string
  - name: retentionPolicy
    uid: '@azure/arm-network.FlowLogPropertiesFormat.retentionPolicy'
    package: '@azure/arm-network'
    summary: Parameters that define the retention policy for flow log.
    fullName: retentionPolicy
    remarks: ''
    isDeprecated: false
    syntax:
      content: 'retentionPolicy?: RetentionPolicyParameters'
      return:
        description: ''
        type: <xref uid="@azure/arm-network.RetentionPolicyParameters" />
  - name: storageId
    uid: '@azure/arm-network.FlowLogPropertiesFormat.storageId'
    package: '@azure/arm-network'
    summary: ID of the storage account which is used to store the flow log.
    fullName: storageId
    remarks: ''
    isDeprecated: false
