### YamlMime:TSEnum
name: KnownState
uid: '@azure/arm-azurestackhci.KnownState'
package: '@azure/arm-azurestackhci'
summary: >-
  Represents the current state of the update as it relates to this stamp. This
  includes phases such as preparation, installation, scanning, and error
  handling, providing insight into the update's progress and any issues
  encountered.
fullName: KnownState
remarks: ''
isDeprecated: false
fields:
  - name: AdditionalContentRequired
    uid: '@azure/arm-azurestackhci.KnownState.AdditionalContentRequired'
    package: '@azure/arm-azurestackhci'
    summary: Additional content is required to proceed with the update.
  - name: DownloadFailed
    uid: '@azure/arm-azurestackhci.KnownState.DownloadFailed'
    package: '@azure/arm-azurestackhci'
    summary: The update download failed.
  - name: Downloading
    uid: '@azure/arm-azurestackhci.KnownState.Downloading'
    package: '@azure/arm-azurestackhci'
    summary: The update is currently being downloaded.
  - name: HasPrerequisite
    uid: '@azure/arm-azurestackhci.KnownState.HasPrerequisite'
    package: '@azure/arm-azurestackhci'
    summary: The update has prerequisites that must be fulfilled before it can proceed.
  - name: HealthCheckExpired
    uid: '@azure/arm-azurestackhci.KnownState.HealthCheckExpired'
    package: '@azure/arm-azurestackhci'
    summary: The health check has expired and needs to be redone.
  - name: HealthCheckFailed
    uid: '@azure/arm-azurestackhci.KnownState.HealthCheckFailed'
    package: '@azure/arm-azurestackhci'
    summary: The health check failed, preventing the update from proceeding.
  - name: HealthChecking
    uid: '@azure/arm-azurestackhci.KnownState.HealthChecking'
    package: '@azure/arm-azurestackhci'
    summary: A health check is being performed before applying the update.
  - name: InstallationFailed
    uid: '@azure/arm-azurestackhci.KnownState.InstallationFailed'
    package: '@azure/arm-azurestackhci'
    summary: The update installation failed.
  - name: Installed
    uid: '@azure/arm-azurestackhci.KnownState.Installed'
    package: '@azure/arm-azurestackhci'
    summary: The update has been successfully installed.
  - name: Installing
    uid: '@azure/arm-azurestackhci.KnownState.Installing'
    package: '@azure/arm-azurestackhci'
    summary: The update is currently being installed.
  - name: Invalid
    uid: '@azure/arm-azurestackhci.KnownState.Invalid'
    package: '@azure/arm-azurestackhci'
    summary: The update is invalid and cannot be applied.
  - name: NotApplicableBecauseAnotherUpdateIsInProgress
    uid: >-
      @azure/arm-azurestackhci.KnownState.NotApplicableBecauseAnotherUpdateIsInProgress
    package: '@azure/arm-azurestackhci'
    summary: >-
      The update cannot be applied because another update is currently in
      progress.
  - name: Obsolete
    uid: '@azure/arm-azurestackhci.KnownState.Obsolete'
    package: '@azure/arm-azurestackhci'
    summary: The update is obsolete and no longer applicable.
  - name: PendingOEMValidation
    uid: '@azure/arm-azurestackhci.KnownState.PendingOEMValidation'
    package: '@azure/arm-azurestackhci'
    summary: The update is pending OEM validation before it can proceed.
  - name: PreparationFailed
    uid: '@azure/arm-azurestackhci.KnownState.PreparationFailed'
    package: '@azure/arm-azurestackhci'
    summary: The update preparation phase failed.
  - name: Preparing
    uid: '@azure/arm-azurestackhci.KnownState.Preparing'
    package: '@azure/arm-azurestackhci'
    summary: The update is currently in the preparation phase.
  - name: Ready
    uid: '@azure/arm-azurestackhci.KnownState.Ready'
    package: '@azure/arm-azurestackhci'
    summary: The update is ready to be installed.
  - name: ReadyToInstall
    uid: '@azure/arm-azurestackhci.KnownState.ReadyToInstall'
    package: '@azure/arm-azurestackhci'
    summary: >-
      The update is ready to be installed after successful preparation and
      checks.
  - name: Recalled
    uid: '@azure/arm-azurestackhci.KnownState.Recalled'
    package: '@azure/arm-azurestackhci'
    summary: The update has been recalled and should not be applied.
  - name: ScanFailed
    uid: '@azure/arm-azurestackhci.KnownState.ScanFailed'
    package: '@azure/arm-azurestackhci'
    summary: The scan for updates failed.
  - name: ScanInProgress
    uid: '@azure/arm-azurestackhci.KnownState.ScanInProgress'
    package: '@azure/arm-azurestackhci'
    summary: The system is scanning for updates.
