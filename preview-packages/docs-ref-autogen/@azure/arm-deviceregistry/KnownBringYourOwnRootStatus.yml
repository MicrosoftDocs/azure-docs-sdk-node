### YamlMime:TSEnum
name: KnownBringYourOwnRootStatus
uid: '@azure/arm-deviceregistry.KnownBringYourOwnRootStatus'
package: '@azure/arm-deviceregistry'
summary: Status of the Bring Your Own Root configuration.
fullName: KnownBringYourOwnRootStatus
remarks: ''
isDeprecated: false
fields:
  - name: Active
    uid: '@azure/arm-deviceregistry.KnownBringYourOwnRootStatus.Active'
    package: '@azure/arm-deviceregistry'
    summary: >-
      The signed certificate has been successfully uploaded and validated, and
      the CA is active.
  - name: ActiveButPendingRenewal
    uid: >-
      @azure/arm-deviceregistry.KnownBringYourOwnRootStatus.ActiveButPendingRenewal
    package: '@azure/arm-deviceregistry'
    summary: >-
      The certificate is nearing expiration (within renewal window) or has
      expired. A new CSR has been generated and is waiting for the customer to
      provide a new signed certificate.
  - name: PendingActivation
    uid: '@azure/arm-deviceregistry.KnownBringYourOwnRootStatus.PendingActivation'
    package: '@azure/arm-deviceregistry'
    summary: >-
      The CSR has been generated and is waiting for the customer to provide the
      signed certificate.
