  - name: DeploymentSuccess
    uid: '@azure/arm-azurestackhci.KnownStatus.DeploymentSuccess'
    package: '@azure/arm-azurestackhci'
    summary: Deployment of the cluster agent completed successfully.
  - name: Disconnected
    uid: '@azure/arm-azurestackhci.KnownStatus.Disconnected'
