### YamlMime:TSType
name: OnGroupStreamOptions
uid: '@azure/web-pubsub-client.OnGroupStreamOptions'
package: '@azure/web-pubsub-client'
summary: |-
  Options controlling how inbound group streams are tracked and dispatched for a
  single callback registered via `client.onGroupStream(callback, options)`.

  Granularity is two-level:
  - The option *values* are scoped to the registration (i.e. per handler): each
    `onGroupStream` call carries its own values, and different handlers may use
    different values.
  - The option *effects* are applied independently to each stream, identified by
    its `(group, streamId)` pair. Concurrent streams — even two streams in the
    same group observed by the same handler — each get their own idle timer and
    their own `handleFromStart` gate. Nothing is shared or aggregated across
    streams or across groups.
fullName: OnGroupStreamOptions
remarks: ''
isDeprecated: false
type: interface
properties:
  - name: groupNames
    uid: '@azure/web-pubsub-client.OnGroupStreamOptions.groupNames'
    package: '@azure/web-pubsub-client'
    summary: >-
      Optional group names to receive streams from. When omitted, streams from
      all groups are received.
    fullName: groupNames
    remarks: ''
    isDeprecated: false
    syntax:
      content: 'groupNames?: string[]'
      return:
        description: ''
        type: string[]
  - name: handleFromStart
    uid: '@azure/web-pubsub-client.OnGroupStreamOptions.handleFromStart'
    package: '@azure/web-pubsub-client'
    summary: >-
      Whether to require the first observed fragment of a stream to start at

      `streamSequenceId === 1`, evaluated independently per stream (identified
      by

      its `(group, streamId)` pair). If true and the first observed fragment for
      a

      stream is mid-stream, that stream is ignored until its terminal frame

      arrives, without affecting any other concurrent stream.

      Default: false.
    fullName: handleFromStart
    remarks: ''
    isDeprecated: false
    syntax:
      content: 'handleFromStart?: boolean'
      return:
        description: ''
        type: boolean
  - name: idleTimeoutInMs
    uid: '@azure/web-pubsub-client.OnGroupStreamOptions.idleTimeoutInMs'
    package: '@azure/web-pubsub-client'
    summary: >-
      Inactivity timeout in milliseconds, applied independently to each stream

      (identified by its `(group, streamId)` pair). Every stream has its own
      timer

      that is reset whenever a fragment for that stream arrives. If no fragment

      arrives within this duration, only that stream is terminated with an

      `IdleTimeout` error; sibling streams of the same handler are unaffected.

      Default: 300000 (5 minutes).
    fullName: idleTimeoutInMs
    remarks: ''
    isDeprecated: false
    syntax:
      content: 'idleTimeoutInMs?: number'
      return:
        description: ''
        type: number
