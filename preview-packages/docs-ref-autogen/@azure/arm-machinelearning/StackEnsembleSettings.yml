  - name: stackMetaLearnerTrainPercentage
    uid: >-
      @azure/arm-machinelearning.StackEnsembleSettings.stackMetaLearnerTrainPercentage
    package: '@azure/arm-machinelearning'
    summary: >-
      Specifies the proportion of the training set (when choosing train and
      validation type of training) to be reserved for training the meta-learner.
      Default value is 0.2.
    fullName: stackMetaLearnerTrainPercentage
    remarks: ''
    isDeprecated: false
    syntax:
      content: 'stackMetaLearnerTrainPercentage?: number'
      return:
        description: ''
