### YamlMime:TSType
name: ValidationActivityTypeProperties
uid: '@azure/arm-datafactory.ValidationActivityTypeProperties'
package: '@azure/arm-datafactory'
summary: Validation activity properties.
fullName: ValidationActivityTypeProperties
remarks: ''
isDeprecated: false
type: interface
properties:
  - name: childItems
    uid: '@azure/arm-datafactory.ValidationActivityTypeProperties.childItems'
    package: '@azure/arm-datafactory'
    summary: >-
      Can be used if dataset points to a folder. If set to true, the folder must
      have at least one file. If set to false, the folder must be empty. Type:
      boolean (or Expression with resultType boolean).
    fullName: childItems
    remarks: ''
    isDeprecated: false
    syntax:
      content: 'childItems?: any'
      return:
        description: ''
        type: any
  - name: dataset
    uid: '@azure/arm-datafactory.ValidationActivityTypeProperties.dataset'
    package: '@azure/arm-datafactory'
    summary: Validation activity dataset reference.
    fullName: dataset
    remarks: ''
    isDeprecated: false
    syntax:
      content: 'dataset: DatasetReference'
      return:
        description: ''
        type: <xref uid="@azure/arm-datafactory.DatasetReference" />
  - name: minimumSize
    uid: '@azure/arm-datafactory.ValidationActivityTypeProperties.minimumSize'
    package: '@azure/arm-datafactory'
    summary: >-
      Can be used if dataset points to a file. The file must be greater than or
      equal in size to the value specified. Type: integer (or Expression with
      resultType integer).
    fullName: minimumSize
    remarks: ''
    isDeprecated: false
    syntax:
      content: 'minimumSize?: any'
      return:
        description: ''
        type: any
  - name: sleep
    uid: '@azure/arm-datafactory.ValidationActivityTypeProperties.sleep'
    package: '@azure/arm-datafactory'
    summary: >-
      A delay in seconds between validation attempts. If no value is specified,
      10 seconds will be used as the default. Type: integer (or Expression with
      resultType integer).
    fullName: sleep
    remarks: ''
    isDeprecated: false
    syntax:
      content: 'sleep?: any'
      return:
        description: ''
        type: any
  - name: timeout
    uid: '@azure/arm-datafactory.ValidationActivityTypeProperties.timeout'
    package: '@azure/arm-datafactory'
    summary: >-
      Specifies the timeout for the activity to run. If there is no value
      specified, it takes the value of TimeSpan.FromDays(7) which is 1 week as
      default. Type: string (or Expression with resultType string), pattern:
      ((\d+)\.)?(\d\d):(60|([0-5][0-9])):(60|([0-5][0-9])).
    fullName: timeout
    remarks: ''
    isDeprecated: false
    syntax:
      content: 'timeout?: any'
      return:
        description: ''
        type: any
