### YamlMime:TSTypeAlias
name: PatchingMode
uid: '@azure/arm-appcontainers.PatchingMode'
package: '@azure/arm-appcontainers'
summary: >-
  Patching mode for the container app. Null or default in this field will be
  interpreted as Automatic by RP. Automatic mode will automatically apply
  available patches. Manual mode will require the user to manually apply
  patches. Disabled mode will stop patch detection and auto patching. \

  [KnownPatchingMode](xref:@azure/arm-appcontainers.KnownPatchingMode) can be
  used interchangeably with PatchingMode,
   this enum contains the known values that the service supports.
  ### Known values supported by the service

  **Automatic**: Automatic \

  **Manual**: Manual \

  **Disabled**: Disabled
fullName: PatchingMode
remarks: ''
isDeprecated: false
syntax: |
  type PatchingMode = string
