### YamlMime:TSTypeAlias
name: AdvancedFilterOperatorType
uid: '@azure/arm-eventgrid.AdvancedFilterOperatorType'
package: '@azure/arm-eventgrid'
summary: >-
  The operator type used for filtering, e.g., NumberIn, StringContains,
  BoolEquals and others. \

  [KnownAdvancedFilterOperatorType](xref:@azure/arm-eventgrid.KnownAdvancedFilterOperatorType)
  can be used interchangeably with AdvancedFilterOperatorType,
   this enum contains the known values that the service supports.
  ### Known values supported by the service

  **NumberIn**: NumberIn \

  **NumberNotIn**: NumberNotIn \

  **NumberLessThan**: NumberLessThan \

  **NumberGreaterThan**: NumberGreaterThan \

  **NumberLessThanOrEquals**: NumberLessThanOrEquals \

  **NumberGreaterThanOrEquals**: NumberGreaterThanOrEquals \

  **BoolEquals**: BoolEquals \

  **StringIn**: StringIn \

  **StringNotIn**: StringNotIn \

  **StringBeginsWith**: StringBeginsWith \

  **StringEndsWith**: StringEndsWith \

  **StringContains**: StringContains \

  **NumberInRange**: NumberInRange \

  **NumberNotInRange**: NumberNotInRange \

  **StringNotBeginsWith**: StringNotBeginsWith \

  **StringNotEndsWith**: StringNotEndsWith \

  **StringNotContains**: StringNotContains \

  **IsNullOrUndefined**: IsNullOrUndefined \

  **IsNotNull**: IsNotNull
fullName: AdvancedFilterOperatorType
remarks: ''
isDeprecated: false
syntax: |
  type AdvancedFilterOperatorType = string
