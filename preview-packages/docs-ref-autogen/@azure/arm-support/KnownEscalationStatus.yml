name: KnownEscalationStatus
uid: '@azure/arm-support.KnownEscalationStatus'
package: '@azure/arm-support'
summary: Status of Direct Connect Escalation.
fullName: KnownEscalationStatus
remarks: ''
isDeprecated: false
fields:
  - name: EscalationAvailable
    uid: '@azure/arm-support.KnownEscalationStatus.EscalationAvailable'
    package: '@azure/arm-support'
    summary: Escalation is available and uninitiated
  - name: EscalationInitiated
    uid: '@azure/arm-support.KnownEscalationStatus.EscalationInitiated'
    package: '@azure/arm-support'
    summary: Escalation is unavailable and has been initiated
  - name: EscalationProcessed
    uid: '@azure/arm-support.KnownEscalationStatus.EscalationProcessed'
    package: '@azure/arm-support'
    summary: >-
      Escalation is unavailable and has finished processing after being
      initiated
  - name: EscalationUnavailable
    uid: '@azure/arm-support.KnownEscalationStatus.EscalationUnavailable'
    package: '@azure/arm-support'
    summary: >-
      Escalation is unavailable and cannot be initiated due to customer not
      being enrolled to direct escalation
  - name: EscalationUnsupported
    uid: '@azure/arm-support.KnownEscalationStatus.EscalationUnsupported'
    package: '@azure/arm-support'
    summary: >-
      Escalation is unavailable and cannot be initiated due to direct escalation
