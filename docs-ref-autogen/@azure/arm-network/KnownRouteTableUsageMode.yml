name: KnownRouteTableUsageMode
uid: '@azure/arm-network.KnownRouteTableUsageMode'
package: '@azure/arm-network'
summary: >-
  Route table usage mode defines which route table will be used by the
  configuration. If not defined, this will default to 'ManagedOnly'.
fullName: KnownRouteTableUsageMode
remarks: ''
isDeprecated: false
fields:
  - name: ManagedOnly
    uid: '@azure/arm-network.KnownRouteTableUsageMode.ManagedOnly'
    package: '@azure/arm-network'
    summary: Only route tables managed by the routing configuration will be used.
  - name: UseExisting
    uid: '@azure/arm-network.KnownRouteTableUsageMode.UseExisting'
    package: '@azure/arm-network'
    summary: Use existing user-defined route tables already associated with resources.
