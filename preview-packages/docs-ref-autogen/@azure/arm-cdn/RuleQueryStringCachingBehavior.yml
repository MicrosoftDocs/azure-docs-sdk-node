### YamlMime:TSTypeAlias
name: RuleQueryStringCachingBehavior
uid: '@azure/arm-cdn.RuleQueryStringCachingBehavior'
package: '@azure/arm-cdn'
summary: >-
  Defines how Frontdoor caches requests that include query strings. You can
  ignore any query strings when caching, ignore specific query strings, cache
  every request with a unique URL, or cache specific query strings. \

  [KnownRuleQueryStringCachingBehavior](xref:@azure/arm-cdn.KnownRuleQueryStringCachingBehavior)
  can be used interchangeably with RuleQueryStringCachingBehavior,
   this enum contains the known values that the service supports.
  ### Known values supported by the service

  **IgnoreQueryString** \

  **UseQueryString** \

  **IgnoreSpecifiedQueryStrings** \

  **IncludeSpecifiedQueryStrings**
fullName: RuleQueryStringCachingBehavior
remarks: ''
isDeprecated: false
syntax: |
  type RuleQueryStringCachingBehavior = string
