### YamlMime:TSEnum
name: KnownTimeGrainType
uid: '@azure/arm-costmanagement.KnownTimeGrainType'
package: '@azure/arm-costmanagement'
summary: >-
  The time covered by a budget. Tracking of the amount will be reset based on
  the time grain.


  Supported for CategoryType(s): Cost, ReservationUtilization.


  Supported timeGrainTypes for **CategoryType: Cost**


  - Monthly

  - Quarterly

  - Annually

  - BillingMonth*

  - BillingQuarter*

  - BillingAnnual*


  *only supported for Web Direct customers.


  Supported timeGrainTypes for **CategoryType: ReservationUtilization**

  - Last7Days

  - Last30Days


  Required for CategoryType(s): Cost, ReservationUtilization.
fullName: KnownTimeGrainType
remarks: ''
isDeprecated: false
fields:
  - name: Annually
    uid: '@azure/arm-costmanagement.KnownTimeGrainType.Annually'
    package: '@azure/arm-costmanagement'
    summary: >-
      The budget will track costs in the current calendar year against the
      amount.


      Supported for CategoryType: Cost only.
  - name: BillingAnnual
    uid: '@azure/arm-costmanagement.KnownTimeGrainType.BillingAnnual'
    package: '@azure/arm-costmanagement'
    summary: >-
      The budget will track costs in the current billing year against the
      amount.


      Supported for CategoryType: Cost and Web Direct customers only.
