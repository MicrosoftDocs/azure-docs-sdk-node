    uid: '@azure/arm-securityinsight.JwtAuthModel.headers'
    package: '@azure/arm-securityinsight'
    summary: The custom headers we want to add once we send request to token endpoint.
    fullName: headers
    remarks: ''
    isDeprecated: false
    syntax:
      content: 'headers?: Record<string, string>'
      return:
        description: ''
        type: Record&lt;string, string&gt;
  - name: isCredentialsInHeaders
    uid: '@azure/arm-securityinsight.JwtAuthModel.isCredentialsInHeaders'
    package: '@azure/arm-securityinsight'
    summary: >-
      Flag indicating whether we want to send the user name and password to
      token endpoint in the headers.
    fullName: isCredentialsInHeaders
    remarks: ''
    isDeprecated: false
    syntax:
      content: 'isCredentialsInHeaders?: boolean'
      return:
        description: ''
        type: boolean
  - name: isJsonRequest
    uid: '@azure/arm-securityinsight.JwtAuthModel.isJsonRequest'
