  - name: list
    uid: '@azure/arm-machinelearning.PrivateLinkResourcesOperations.list'
    package: '@azure/arm-machinelearning'
    summary: >-
      Called by Client (Portal, CLI, etc) to get available "private link
      resources" for the workspace.

      Each "private link resource" is a connection endpoint (IP address) to the
      resource.

      Pre single connection endpoint per workspace: the Data Plane IP address,
      returned by DNS resolution.

      Other RPs, such as Azure Storage, have multiple - one for Blobs, other for
      Queues, etc.

      Defined in the "[NRP] Private Endpoint Design" doc, topic "GET API for
      GroupIds".
    fullName: list
    remarks: ''
    isDeprecated: false
