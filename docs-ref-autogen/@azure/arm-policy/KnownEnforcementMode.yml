### YamlMime:TSEnum
name: KnownEnforcementMode
uid: '@azure/arm-policy.KnownEnforcementMode'
package: '@azure/arm-policy'
summary: >-
  The policy assignment enforcement mode. Possible values are Default,
  DoNotEnforce, and Enroll
fullName: KnownEnforcementMode
remarks: ''
isDeprecated: false
fields:
  - name: Default
    uid: '@azure/arm-policy.KnownEnforcementMode.Default'
    package: '@azure/arm-policy'
    summary: The policy effect is enforced during resource creation or update.
  - name: DoNotEnforce
    uid: '@azure/arm-policy.KnownEnforcementMode.DoNotEnforce'
    package: '@azure/arm-policy'
    summary: The policy effect is not enforced during resource creation or update.
  - name: Enroll
    uid: '@azure/arm-policy.KnownEnforcementMode.Enroll'
    package: '@azure/arm-policy'
    summary: >-
      The policy effect is not enforced during resource creation or update until
      the resource or scope of the resource is enrolled to the assignment
      instance. Enrollment occurs upon deployment of the policy enrollment
      resource.
