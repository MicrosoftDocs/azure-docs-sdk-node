    package: '@azure/arm-networkcloud'
    summary: Not applicable
  - name: System
    uid: '@azure/arm-networkcloud.KnownAgentPoolMode.System'
    package: '@azure/arm-networkcloud'
    summary: System agent pool
  - name: User
    uid: '@azure/arm-networkcloud.KnownAgentPoolMode.User'
    package: '@azure/arm-networkcloud'
    summary: User agent pool
