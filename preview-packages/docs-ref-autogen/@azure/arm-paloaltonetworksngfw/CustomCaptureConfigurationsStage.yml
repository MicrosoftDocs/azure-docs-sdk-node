name: CustomCaptureConfigurationsStage
uid: '@azure/arm-paloaltonetworksngfw.CustomCaptureConfigurationsStage'
package: '@azure/arm-paloaltonetworksngfw'
summary: >-
  Firewall stage at which to capture packets. \

  [KnownCustomCaptureConfigurationsStage](xref:@azure/arm-paloaltonetworksngfw.KnownCustomCaptureConfigurationsStage)
  can be used interchangeably with CustomCaptureConfigurationsStage,
   this enum contains the known values that the service supports.
  ### Known values supported by the service

  **Receive**: Capture packets when received by the firewall. \

  **Transmit**: Capture packets when transmitted by the firewall. \

  **Firewall**: Capture packets at the firewall processing stage. \

  **Drop**: Capture packets that were dropped by the firewall.
fullName: CustomCaptureConfigurationsStage
remarks: ''
isDeprecated: false
syntax: |
  type CustomCaptureConfigurationsStage = string
