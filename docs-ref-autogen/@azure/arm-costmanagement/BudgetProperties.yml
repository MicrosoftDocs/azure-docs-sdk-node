### YamlMime:TSType
name: BudgetProperties
uid: '@azure/arm-costmanagement.BudgetProperties'
package: '@azure/arm-costmanagement'
summary: The properties of the budget.
fullName: BudgetProperties
remarks: ''
isDeprecated: false
type: interface
properties:
  - name: amount
    uid: '@azure/arm-costmanagement.BudgetProperties.amount'
    package: '@azure/arm-costmanagement'
    summary: |-
      The total amount of cost to track with the budget.

      Supported for CategoryType(s): Cost.

      Required for CategoryType(s): Cost.
    fullName: amount
    remarks: ''
    isDeprecated: false
    syntax:
      content: 'amount?: number'
      return:
        description: ''
        type: number
  - name: category
    uid: '@azure/arm-costmanagement.BudgetProperties.category'
    package: '@azure/arm-costmanagement'
    summary: |-
      The category of the budget.
      - 'Cost' defines a Budget.
      - 'ReservationUtilization' defines a Reservation Utilization Alert Rule.
    fullName: category
    remarks: ''
    isDeprecated: false
    syntax:
      content: 'category: string'
      return:
        description: ''
        type: string
  - name: currentSpend
    uid: '@azure/arm-costmanagement.BudgetProperties.currentSpend'
    package: '@azure/arm-costmanagement'
    summary: |-
      The current amount of cost which is being tracked for a budget.

      Supported for CategoryType(s): Cost.
    fullName: currentSpend
    remarks: ''
    isDeprecated: false
    syntax:
      content: 'currentSpend?: CurrentSpend'
      return:
        description: ''
        type: <xref uid="@azure/arm-costmanagement.CurrentSpend" />
  - name: filter
    uid: '@azure/arm-costmanagement.BudgetProperties.filter'
    package: '@azure/arm-costmanagement'
    summary: |-
      May be used to filter budgets by user-specified dimensions and/or tags.

      Supported for CategoryType(s): Cost, ReservationUtilization.
    fullName: filter
    remarks: ''
    isDeprecated: false
    syntax:
      content: 'filter?: BudgetFilter'
      return:
        description: ''
        type: <xref uid="@azure/arm-costmanagement.BudgetFilter" />
  - name: forecastSpend
    uid: '@azure/arm-costmanagement.BudgetProperties.forecastSpend'
    package: '@azure/arm-costmanagement'
    summary: |-
      The forecasted cost which is being tracked for a budget.

      Supported for CategoryType(s): Cost.
    fullName: forecastSpend
    remarks: ''
    isDeprecated: false
    syntax:
      content: 'forecastSpend?: ForecastSpend'
      return:
        description: ''
        type: <xref uid="@azure/arm-costmanagement.ForecastSpend" />
  - name: notifications
    uid: '@azure/arm-costmanagement.BudgetProperties.notifications'
    package: '@azure/arm-costmanagement'
    summary: >-
      Dictionary of notifications associated with the budget.


      Supported for CategoryType(s): Cost, ReservationUtilization.


      - Constraints for **CategoryType: Cost** - Budget can have up to 5
      notifications with thresholdType: Actual and 5 notifications with
      thresholdType: Forecasted.

      - Constraints for **CategoryType: ReservationUtilization** - Only one
      notification allowed. thresholdType is not applicable.
    fullName: notifications
    remarks: ''
    isDeprecated: false
    syntax:
      content: 'notifications?: Record<string, Notification>'
      return:
        description: ''
        type: >-
          Record&lt;string, <xref uid="@azure/arm-costmanagement.Notification"
          />&gt;
  - name: timeGrain
    uid: '@azure/arm-costmanagement.BudgetProperties.timeGrain'
    package: '@azure/arm-costmanagement'
    summary: >-
      The time covered by a budget. Tracking of the amount will be reset based
      on the time grain.


      Supported for CategoryType(s): Cost, ReservationUtilization.


      Supported timeGrainTypes for **CategoryType: Cost**


      - Monthly

      - Quarterly

      - Annually

      - BillingMonth*

      - BillingQuarter*

      - BillingAnnual*


      *only supported for Web Direct customers.


      Supported timeGrainTypes for **CategoryType: ReservationUtilization**

      - Last7Days

      - Last30Days


      Required for CategoryType(s): Cost, ReservationUtilization.
    fullName: timeGrain
    remarks: ''
    isDeprecated: false
    syntax:
      content: 'timeGrain: string'
      return:
        description: ''
        type: string
  - name: timePeriod
    uid: '@azure/arm-costmanagement.BudgetProperties.timePeriod'
    package: '@azure/arm-costmanagement'
    summary: >-
      The time period that defines the active period of the budget. The budget
      will evaluate data on or after the startDate and will expire on the
      endDate.


      Supported for CategoryType(s): Cost, ReservationUtilization.


      Required for CategoryType(s): Cost, ReservationUtilization.
    fullName: timePeriod
    remarks: ''
    isDeprecated: false
    syntax:
      content: 'timePeriod: BudgetTimePeriod'
      return:
        description: ''
        type: <xref uid="@azure/arm-costmanagement.BudgetTimePeriod" />
