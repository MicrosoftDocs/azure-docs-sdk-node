### YamlMime:TSTypeAlias
name: RecoveryPointType
uid: '@azure/arm-recoveryservices-siterecovery.RecoveryPointType'
package: '@azure/arm-recoveryservices-siterecovery'
summary: >-
  The recovery point type. Values from LatestTime, LatestTag or Custom. In the
  case of custom, the recovery point provided by RecoveryPointId will be used.
  In the other two cases, recovery point id will be ignored. \

  [KnownRecoveryPointType](xref:@azure/arm-recoveryservices-siterecovery.KnownRecoveryPointType)
  can be used interchangeably with RecoveryPointType,
   this enum contains the known values that the service supports.
  ### Known values supported by the service

  **LatestTime**: LatestTime \

  **LatestTag**: LatestTag \

  **Custom**: Custom
fullName: RecoveryPointType
remarks: ''
isDeprecated: false
syntax: |
  type RecoveryPointType = string
