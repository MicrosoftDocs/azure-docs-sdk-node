### YamlMime:TSTypeAlias
name: CpuThreshold
uid: '@azure/arm-advisor.CpuThreshold'
package: '@azure/arm-advisor'
summary: >-
  Minimum percentage threshold for Advisor low CPU utilization evaluation. Valid
  only for subscriptions. Valid values: 5 (default), 10, 15 or 20. \

  [KnownCpuThreshold](xref:@azure/arm-advisor.KnownCpuThreshold) can be used
  interchangeably with CpuThreshold,
   this enum contains the known values that the service supports.
  ### Known values supported by the service

  **5** \

  **10** \

  **15** \

  **20**
fullName: CpuThreshold
remarks: ''
isDeprecated: false
syntax: |
  type CpuThreshold = string
