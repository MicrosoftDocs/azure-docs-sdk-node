### YamlMime:TSTypeAlias
name: DnsServerConfig
uid: '@azure/arm-azurestackhci.DnsServerConfig'
package: '@azure/arm-azurestackhci'
summary: >-
  Specifies how DNS servers are configured for the infrastructure network.
  Allowed values are 'UseDnsServer' to use the provided DNS servers, and
  'UseForwarder' to use DNS forwarders. \

  [KnownDnsServerConfig](xref:@azure/arm-azurestackhci.KnownDnsServerConfig) can
  be used interchangeably with DnsServerConfig,
   this enum contains the known values that the service supports.
  ### Known values supported by the service

  **UseDnsServer**: Use the provided DNS servers for the infrastructure network.
  \

  **UseForwarder**: Use DNS forwarders for the infrastructure network.
fullName: DnsServerConfig
remarks: ''
isDeprecated: false
syntax: |
  type DnsServerConfig = string
