### YamlMime:TSTypeAlias
name: OnboardingStatus
uid: '@azure/arm-monitor.OnboardingStatus'
package: '@azure/arm-monitor'
summary: >-
  The onboarding status for the resource. Note that, a higher level scope, e.g.,
  resource group or subscription, is considered onboarded if at least one
  resource under it is onboarded. \

  [KnownOnboardingStatus](xref:@azure/arm-monitor.KnownOnboardingStatus) can be
  used interchangeably with OnboardingStatus,
   this enum contains the known values that the service supports.
  ### Known values supported by the service

  **onboarded**: onboarded \

  **notOnboarded**: notOnboarded \

  **unknown**: unknown
fullName: OnboardingStatus
remarks: ''
isDeprecated: false
syntax: |
  type OnboardingStatus = string
