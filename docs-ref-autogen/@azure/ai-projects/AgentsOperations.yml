    uid: '@azure/ai-projects.AgentsOperations.disable'
    package: '@azure/ai-projects'
    summary: >-
      Disables the specified agent, preventing it from accepting new sessions or
      processing requests.

      Existing active sessions are allowed to drain gracefully but no new
      sessions can be created.

      This operation is idempotent — disabling an already-disabled agent returns
      success with no side effects.
