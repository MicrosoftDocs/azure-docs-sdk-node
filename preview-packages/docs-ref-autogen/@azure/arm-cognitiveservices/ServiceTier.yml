### YamlMime:TSTypeAlias
name: ServiceTier
uid: '@azure/arm-cognitiveservices.ServiceTier'
package: '@azure/arm-cognitiveservices'
summary: >-
  The service tier for the deployment. Determines the pricing and performance
  level for request processing. Use 'Default' for standard pricing or 'Priority'
  for higher-priority processing with premium pricing. Note: Pause operations
  are only supported on Standard, DataZoneStandard, and GlobalStandard SKUs. \

  [KnownServiceTier](xref:@azure/arm-cognitiveservices.KnownServiceTier) can be
  used interchangeably with ServiceTier,
   this enum contains the known values that the service supports.
  ### Known values supported by the service

  **Default**: Default service tier meaning the request will be processed with
  the standard pricing and performance for the selected model. \

  **Priority**: Priority service tier meaning the request will be processed with
  higher pricing and performance for the selected model.
fullName: ServiceTier
remarks: ''
isDeprecated: false
syntax: |
  type ServiceTier = string
