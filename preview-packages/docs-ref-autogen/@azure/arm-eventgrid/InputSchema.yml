name: InputSchema
uid: '@azure/arm-eventgrid.InputSchema'
package: '@azure/arm-eventgrid'
summary: >-
  This determines the format that Event Grid should expect for incoming events
  published to the Event Grid Domain Resource. \

  [KnownInputSchema](xref:@azure/arm-eventgrid.KnownInputSchema) can be used
  interchangeably with InputSchema,
   this enum contains the known values that the service supports.
  ### Known values supported by the service

  **EventGridSchema**: EventGridSchema \

  **CustomEventSchema**: CustomEventSchema \

  **CloudEventSchemaV1_0**: CloudEventSchemaV1_0
