### YamlMime:TSTypeAlias
name: DoubleEncryptionStatus
uid: '@azure/arm-edgeorder.DoubleEncryptionStatus'
package: '@azure/arm-edgeorder'
summary: >-
  Double encryption status as entered by the customer. It is compulsory to give
  this parameter if the 'Deny' or 'Disabled' policy is configured. \

  [KnownDoubleEncryptionStatus](xref:@azure/arm-edgeorder.KnownDoubleEncryptionStatus)
  can be used interchangeably with DoubleEncryptionStatus,
   this enum contains the known values that the service supports.
  ### Known values supported by the service

  **Disabled**: Double encryption is disabled. \

  **Enabled**: Double encryption is enabled.
fullName: DoubleEncryptionStatus
remarks: ''
isDeprecated: false
syntax: |
  type DoubleEncryptionStatus = string
