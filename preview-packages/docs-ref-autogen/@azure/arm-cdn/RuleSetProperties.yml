### YamlMime:TSType
name: RuleSetProperties
uid: '@azure/arm-cdn.RuleSetProperties'
package: '@azure/arm-cdn'
summary: The JSON object that contains the properties of the Rule Set to create.
fullName: RuleSetProperties
remarks: ''
isDeprecated: false
type: interface
properties:
  - name: batchMode
    uid: '@azure/arm-cdn.RuleSetProperties.batchMode'
    package: '@azure/arm-cdn'
    summary: >-
      Indicates whether rule set is in batch mode. When batch mode is enabled,
      rules will be processed in a batch along with the rule set.

      When batch mode is disabled, rules would need to be processed
      independently.

      This property can only be set during rule set creation and cannot be
      updated later.

      For switching modes, a new rule set needs to be created with the desired
      mode and rules need to be migrated to the new rule set.
    fullName: batchMode
    remarks: ''
    isDeprecated: false
    syntax:
      content: 'batchMode?: boolean'
      return:
        description: ''
        type: boolean
  - name: profileName
    uid: '@azure/arm-cdn.RuleSetProperties.profileName'
    package: '@azure/arm-cdn'
    summary: The name of the profile which holds the rule set.
    fullName: profileName
    remarks: ''
    isDeprecated: false
    syntax:
      content: 'profileName?: string'
      return:
        description: ''
        type: string
  - name: rules
    uid: '@azure/arm-cdn.RuleSetProperties.rules'
    package: '@azure/arm-cdn'
    summary: >-
      A list of rules that are part of this rule set provided the rule set is in
      batch mode.

      This property will be ignored if the rule set is not in batch mode.
    fullName: rules
    remarks: ''
    isDeprecated: false
    syntax:
      content: 'rules?: BatchRuleProperties[]'
      return:
        description: ''
        type: <xref uid="@azure/arm-cdn.BatchRuleProperties" />[]
