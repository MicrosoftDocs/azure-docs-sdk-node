### YamlMime:TSEnum
name: KnownEnforce
uid: '@azure/arm-security.KnownEnforce'
package: '@azure/arm-security'
summary: >-
  If set to "False", it allows the descendants of this scope to override the
  pricing configuration set on this scope (allows setting inherited="False"). If
  set to "True", it prevents overrides and forces this pricing configuration on
  all the descendants of this scope. This field is only available for
  subscription-level pricing.
fullName: KnownEnforce
remarks: ''
isDeprecated: false
fields:
  - name: 'False'
    uid: '@azure/arm-security.KnownEnforce.False'
    package: '@azure/arm-security'
    summary: >-
      Allows the descendants of this scope to override the pricing configuration
      set on this scope (allows setting inherited="False")
  - name: 'True'
    uid: '@azure/arm-security.KnownEnforce.True'
    package: '@azure/arm-security'
    summary: >-
      Prevents overrides and forces the current scope's pricing configuration to
      all descendants
