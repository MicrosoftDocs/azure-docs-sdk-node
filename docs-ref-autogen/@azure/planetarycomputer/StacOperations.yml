  - name: replacePartitionType
    uid: '@azure/planetarycomputer.StacOperations.replacePartitionType'
    package: '@azure/planetarycomputer'
    summary: >-
      Updates partition type for a GeoCatalog Collection. This will

      determine the partitioning scheme for items within the database,

      and can only be set before any items are loaded.


      Ideal partitioning schemes result in partitions of roughly 100k items
      each.


      The default partitioning scheme is "none" which does not partition items.
    fullName: replacePartitionType
    remarks: ''
    isDeprecated: false
    syntax:
