### YamlMime:TSTypeAlias
name: Duration
uid: '@azure/arm-advisor.Duration'
package: '@azure/arm-advisor'
summary: >-
  Minimum duration for Advisor low CPU utilization evaluation. Valid only for
  subscriptions. Valid values: 7 (default), 14, 21, 30, 60 or 90. \

  [KnownDuration](xref:@azure/arm-advisor.KnownDuration) can be used
  interchangeably with Duration,
   this enum contains the known values that the service supports.
  ### Known values supported by the service

  **7** \

  **14** \

  **21** \

  **30** \

  **60** \

  **90**
fullName: Duration
remarks: ''
isDeprecated: false
syntax: |
  type Duration = string
