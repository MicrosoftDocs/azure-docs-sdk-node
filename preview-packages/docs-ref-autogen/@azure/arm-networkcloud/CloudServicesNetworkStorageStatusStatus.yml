### YamlMime:TSTypeAlias
name: CloudServicesNetworkStorageStatusStatus
uid: '@azure/arm-networkcloud.CloudServicesNetworkStorageStatusStatus'
package: '@azure/arm-networkcloud'
summary: >-
  The status of the storage allocation for the cloud services network. \

  [KnownCloudServicesNetworkStorageStatusStatus](xref:@azure/arm-networkcloud.KnownCloudServicesNetworkStorageStatusStatus)
  can be used interchangeably with CloudServicesNetworkStorageStatusStatus,
   this enum contains the known values that the service supports.
  ### Known values supported by the service

  **Available**: The storage allocation is available \

  **ExpandingVolume**: The storage allocation is expanding the volume. \

  **ExpansionFailed**: The expansion of the storage allocation has failed. \

  **Initializing**: The storage allocation is initializing. \

  **None**: The storage allocation has no status. \

  **Repairing**: The storage allocation is being repaired.
fullName: CloudServicesNetworkStorageStatusStatus
remarks: ''
isDeprecated: false
syntax: |
  type CloudServicesNetworkStorageStatusStatus = string
