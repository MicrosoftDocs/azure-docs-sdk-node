### YamlMime:TSTypeAlias
name: FirewallPolicyIntrusionDetectionProfileType
uid: '@azure/arm-network.FirewallPolicyIntrusionDetectionProfileType'
package: '@azure/arm-network'
summary: >-
  Specifies the Intrusion Detection signature profile to apply.


  Values:

  - Off: IDPS profiles disabled; uses the same signature set that existed before
  profiles.

  - Emerging: Signatures of the newest, most recent threats.

  - Core: Complete, modern, standard set of signatures.

  - Extended: Core signatures plus older legacy signatures for maximum coverage.
  \

  [KnownFirewallPolicyIntrusionDetectionProfileType](xref:@azure/arm-network.KnownFirewallPolicyIntrusionDetectionProfileType)
  can be used interchangeably with FirewallPolicyIntrusionDetectionProfileType,
   this enum contains the known values that the service supports.
  ### Known values supported by the service

  **Off**: Off \

  **Emerging**: Emerging \

  **Core**: Core \

  **Extended**: Extended
fullName: FirewallPolicyIntrusionDetectionProfileType
remarks: ''
isDeprecated: false
syntax: |
  type FirewallPolicyIntrusionDetectionProfileType = string
