name: BusinessVerificationRuleProperties
uid: '@azure/arm-billing-trust.BusinessVerificationRuleProperties'
package: '@azure/arm-billing-trust'
summary: |-
  Properties of a business verification rule. Verifies the billing account's
  business identity.

  Sold-to fields (`soldTo`, `registrationNumber`, `taxIds`) reflect the billing
  account's information on file and cannot be supplied by end users.
fullName: BusinessVerificationRuleProperties
remarks: ''
isDeprecated: false
type: interface
properties:
