### YamlMime:TSEnum
name: KnownStorageFaultDomainAlignmentType
uid: '@azure/arm-compute.KnownStorageFaultDomainAlignmentType'
package: '@azure/arm-compute'
summary: Specifies the storage fault domain alignment type for the disk.
fullName: KnownStorageFaultDomainAlignmentType
remarks: ''
isDeprecated: false
fields:
  - name: Aligned
    uid: '@azure/arm-compute.KnownStorageFaultDomainAlignmentType.Aligned'
    package: '@azure/arm-compute'
    summary: >-
      Disk Storage Fault Domains are mapped to Compute Fault Domains. Deployment
      fails if disk does not support enough Fault Domains.
  - name: BestEffortAligned
    uid: '@azure/arm-compute.KnownStorageFaultDomainAlignmentType.BestEffortAligned'
    package: '@azure/arm-compute'
    summary: >-
      Attempt to map Storage Fault Domains to Compute Fault Domains. Disks are
      unaligned if disk does not support enough Fault Domains.
