### YamlMime:TSEnum
name: KnownExpansionJobStatusType
uid: '@azure/arm-storagecache.KnownExpansionJobStatusType'
package: '@azure/arm-storagecache'
summary: >-
  The operational state of the expansion job. InProgress indicates the expansion
  is still running. Completed indicates expansion finished successfully. Failed
  means the expansion was unable to complete due to a fatal error. Deleting
  indicates the expansion is being rolled back.
fullName: KnownExpansionJobStatusType
remarks: ''
isDeprecated: false
