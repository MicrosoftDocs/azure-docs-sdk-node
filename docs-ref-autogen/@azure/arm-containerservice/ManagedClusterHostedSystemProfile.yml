### YamlMime:TSType
name: ManagedClusterHostedSystemProfile
uid: '@azure/arm-containerservice.ManagedClusterHostedSystemProfile'
package: '@azure/arm-containerservice'
summary: Settings for hosted system addons.
fullName: ManagedClusterHostedSystemProfile
remarks: ''
isDeprecated: false
type: interface
properties:
  - name: enabled
    uid: '@azure/arm-containerservice.ManagedClusterHostedSystemProfile.enabled'
    package: '@azure/arm-containerservice'
    summary: Whether to enable hosted system addons for the cluster.
    fullName: enabled
    remarks: ''
    isDeprecated: false
    syntax:
      content: 'enabled?: boolean'
      return:
        description: ''
        type: boolean
  - name: nodeSubnetID
    uid: '@azure/arm-containerservice.ManagedClusterHostedSystemProfile.nodeSubnetID'
    package: '@azure/arm-containerservice'
    summary: >-
      The ID of the subnet that will be joined by worker nodes managed by node
      auto provisioner for running workload pods in your tenant. This must be
      provided together with `systemNodeSubnetID` and
      `apiserverAccessProfile.subnetId`, and all three subnet IDs must be in the
      same VNet. If you don’t specify it, AKS will create a subnet in the
      managed resource group using a default /16 CIDR.
    fullName: nodeSubnetID
    remarks: ''
    isDeprecated: false
    syntax:
      content: 'nodeSubnetID?: string'
      return:
        description: ''
        type: string
  - name: systemNodeSubnetID
    uid: >-
      @azure/arm-containerservice.ManagedClusterHostedSystemProfile.systemNodeSubnetID
    package: '@azure/arm-containerservice'
    summary: >-
      The ID of the subnet that will be joined by system nodes managed and
      hosted by AKS for running critical system addons. This ID must be provided
      together with `nodeSubnetID` and `apiserverAccessProfile.subnetId`, and
      all three subnet IDs must belong to the same VNet. If you don’t specify
      it, AKS will create a subnet in the managed resource group using a default
      /26 CIDR.
    fullName: systemNodeSubnetID
    remarks: ''
    isDeprecated: false
    syntax:
      content: 'systemNodeSubnetID?: string'
      return:
        description: ''
        type: string
