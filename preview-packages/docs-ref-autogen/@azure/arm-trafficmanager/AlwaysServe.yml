name: AlwaysServe
uid: '@azure/arm-trafficmanager.AlwaysServe'
package: '@azure/arm-trafficmanager'
summary: >-
  If Always Serve is enabled, probing for endpoint health will be disabled and
  endpoints will be included in the traffic routing method. \

  [KnownAlwaysServe](xref:@azure/arm-trafficmanager.KnownAlwaysServe) can be
  used interchangeably with AlwaysServe,
   this enum contains the known values that the service supports.
  ### Known values supported by the service

  **Enabled** \

  **Disabled**
