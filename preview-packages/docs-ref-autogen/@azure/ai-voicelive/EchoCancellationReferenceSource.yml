name: EchoCancellationReferenceSource
uid: '@azure/ai-voicelive.EchoCancellationReferenceSource'
package: '@azure/ai-voicelive'
summary: >-
  The source of the echo cancellation reference signal. \

  [KnownEchoCancellationReferenceSource](xref:@azure/ai-voicelive.KnownEchoCancellationReferenceSource)
  can be used interchangeably with EchoCancellationReferenceSource,
   this enum contains the known values that the service supports.
  ### Known values supported by the service

  **server**: EC uses the internal TTS loopback as the reference signal. \

  **client**: EC uses the client-supplied reference channel from the stereo
  input stream.
