summary: The static website properties for blob storage.
fullName: StaticWebsite
remarks: ''
isDeprecated: false
type: interface
properties:
  - name: defaultIndexDocumentPath
    uid: '@azure/arm-storage.StaticWebsite.defaultIndexDocumentPath'
    package: '@azure/arm-storage'
    summary: >-
      The absolute path where the default index file is present. This absolute
      path is mutually exclusive to "indexDocument" and it is case-sensitive.
    fullName: defaultIndexDocumentPath
    remarks: ''
    isDeprecated: false
    syntax:
      content: 'defaultIndexDocumentPath?: string'
      return:
        description: ''
        type: string
  - name: enabled
    uid: '@azure/arm-storage.StaticWebsite.enabled'
    package: '@azure/arm-storage'
    summary: >-
      Indicates whether static website support is enabled for the specified
      account.
    fullName: enabled
    remarks: ''
    isDeprecated: false
    syntax:
      content: 'enabled: boolean'
      return:
        description: ''
        type: boolean
  - name: errorDocument404Path
    uid: '@azure/arm-storage.StaticWebsite.errorDocument404Path'
    package: '@azure/arm-storage'
    summary: >-
      The absolute path to a webpage that Azure Storage serves for requests that
      don't correspond to an existing file. The contents of the page are
      returned with HTTP 404 Not Found. Only a single custom 404 page is
      supported in each static website.
    fullName: errorDocument404Path
    remarks: ''
    isDeprecated: false
    syntax:
      content: 'errorDocument404Path?: string'
      return:
        description: ''
        type: string
  - name: indexDocument
    uid: '@azure/arm-storage.StaticWebsite.indexDocument'
    package: '@azure/arm-storage'
    summary: >-
      The webpage that Azure Storage serves for requests to the root of a
      website or any subfolder (for example, index.html). The value is
      case-sensitive.
    fullName: indexDocument
    remarks: ''
    isDeprecated: false
    syntax:
      content: 'indexDocument?: string'
      return:
        description: ''
