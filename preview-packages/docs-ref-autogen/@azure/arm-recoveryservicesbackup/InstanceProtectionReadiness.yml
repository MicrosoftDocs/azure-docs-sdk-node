### YamlMime:TSTypeAlias
name: InstanceProtectionReadiness
uid: '@azure/arm-recoveryservicesbackup.InstanceProtectionReadiness'
package: '@azure/arm-recoveryservicesbackup'
summary: >-
  The state of instance protection. \

  [KnownInstanceProtectionReadiness](xref:@azure/arm-recoveryservicesbackup.KnownInstanceProtectionReadiness)
  can be used interchangeably with InstanceProtectionReadiness,
   this enum contains the known values that the service supports.
  ### Known values supported by the service

  **Unknown**: Instance protection readiness is unknown \

  **Ready**: Instance is ready for protection \

  **ScheduleDisabled**: Backup schedule is disabled for this instance \

  **PartialProtection**: Instance is partially protected \

  **ProtectionError**: Instance protection encountered an error
fullName: InstanceProtectionReadiness
remarks: ''
isDeprecated: false
syntax: |
  type InstanceProtectionReadiness = string
