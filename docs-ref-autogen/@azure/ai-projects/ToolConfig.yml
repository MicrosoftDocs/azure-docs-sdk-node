type: interface
properties:
  - name: additional_search_text
    uid: '@azure/ai-projects.ToolConfig.additional_search_text'
    package: '@azure/ai-projects'
    summary: >-
      Additional text indexed for tool_search. Supplements the native tool
      description

      to improve discoverability. Does not alter `tools/list` output.
    fullName: additional_search_text
    remarks: ''
    isDeprecated: false
    syntax:
      content: 'additional_search_text?: string'
      return:
        description: ''
        type: string
  - name: pin
    uid: '@azure/ai-projects.ToolConfig.pin'
    package: '@azure/ai-projects'
    summary: >-
      When true, the tool is always included in agent context and visible in
      `tools/list`.

      When false (default), the tool is hidden from `tools/list` and only
      discoverable via `tool_search`.
    fullName: pin
    remarks: ''
    isDeprecated: false
    syntax:
      content: 'pin?: boolean'
      return:
        description: ''
        type: boolean
