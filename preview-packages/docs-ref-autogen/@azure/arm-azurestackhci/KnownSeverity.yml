### YamlMime:TSEnum
name: KnownSeverity
uid: '@azure/arm-azurestackhci.KnownSeverity'
package: '@azure/arm-azurestackhci'
summary: >-
  Indicates the importance or impact level of the result. Determines whether the
  result is informational, a warning, or a critical issue that may block
  updates.
fullName: KnownSeverity
remarks: ''
isDeprecated: false
fields:
  - name: Critical
    uid: '@azure/arm-azurestackhci.KnownSeverity.Critical'
    package: '@azure/arm-azurestackhci'
    summary: A critical issue that blocks updates and requires immediate attention.
  - name: Hidden
    uid: '@azure/arm-azurestackhci.KnownSeverity.Hidden'
    package: '@azure/arm-azurestackhci'
    summary: The result is hidden and not shown in the output.
  - name: Informational
    uid: '@azure/arm-azurestackhci.KnownSeverity.Informational'
    package: '@azure/arm-azurestackhci'
    summary: General information that does not indicate any issue.
  - name: Warning
    uid: '@azure/arm-azurestackhci.KnownSeverity.Warning'
    package: '@azure/arm-azurestackhci'
    summary: A warning that may indicate a potential issue but does not block updates.
