### YamlMime:TSTypeAlias
name: ConnectionStatus
uid: '@azure/arm-containerservice.ConnectionStatus'
package: '@azure/arm-containerservice'
summary: >-
  The private link service connection status. \

  [KnownConnectionStatus](xref:@azure/arm-containerservice.KnownConnectionStatus)
  can be used interchangeably with ConnectionStatus,
   this enum contains the known values that the service supports.
  ### Known values supported by the service

  **Pending**: Connection is pending approval. \

  **Approved**: Connection is approved. \

  **Rejected**: Connection is rejected. \

  **Disconnected**: Connection is disconnected.
fullName: ConnectionStatus
remarks: ''
isDeprecated: false
syntax: |
  type ConnectionStatus = string
