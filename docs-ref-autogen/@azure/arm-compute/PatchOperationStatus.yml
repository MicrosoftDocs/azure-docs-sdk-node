### YamlMime:TSTypeAlias
name: PatchOperationStatus
uid: '@azure/arm-compute.PatchOperationStatus'
package: '@azure/arm-compute'
summary: >-
  The overall success or failure status of the operation. It remains
  "InProgress" until the operation completes. At that point it will become
  "Unknown", "Failed", "Succeeded", or "CompletedWithWarnings." \

  [KnownPatchOperationStatus](xref:@azure/arm-compute.KnownPatchOperationStatus)
  can be used interchangeably with PatchOperationStatus,
   this enum contains the known values that the service supports.
  ### Known values supported by the service

  **Unknown** \

  **InProgress** \

  **Failed** \

  **Succeeded** \

  **CompletedWithWarnings**
fullName: PatchOperationStatus
remarks: ''
isDeprecated: false
syntax: |
  type PatchOperationStatus = string
