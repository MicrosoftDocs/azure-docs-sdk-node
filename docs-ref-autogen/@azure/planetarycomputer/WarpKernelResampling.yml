### YamlMime:TSTypeAlias
name: WarpKernelResampling
uid: '@azure/planetarycomputer.WarpKernelResampling'
package: '@azure/planetarycomputer'
summary: >-
  WarpKernel resampling algorithm used when doing re-projection. Defaults to
  `nearest`. \

  [KnownWarpKernelResampling](xref:@azure/planetarycomputer.KnownWarpKernelResampling)
  can be used interchangeably with WarpKernelResampling,
   this enum contains the known values that the service supports.
  ### Known values supported by the service

  **nearest**: Nearest neighbor \

  **bilinear**: Bilinear interpolation \

  **cubic**: Cubic interpolation \

  **cubic_spline**: Cubic spline interpolation \

  **lanczos**: Lanczos windowed sinc resampling \

  **average**: Average resampling \

  **mode**: Mode resampling \

  **max**: Maximum value resampling \

  **min**: Minimum value resampling \

  **med**: Median value resampling \

  **q1**: First quartile resampling \

  **q3**: Third quartile resampling \

  **sum**: Sum resampling \

  **rms**: Root mean square resampling
fullName: WarpKernelResampling
remarks: ''
isDeprecated: false
syntax: |
  type WarpKernelResampling = string
