### YamlMime:TSTypeAlias
name: DefaultGateway
uid: '@azure/arm-networkcloud.DefaultGateway'
package: '@azure/arm-networkcloud'
summary: >-
  The indicator of whether this is the default gateway. Only one of the attached
  networks (including the CloudServicesNetwork attachment) for a single machine
  may be specified as True. \

  [KnownDefaultGateway](xref:@azure/arm-networkcloud.KnownDefaultGateway) can be
  used interchangeably with DefaultGateway,
   this enum contains the known values that the service supports.
  ### Known values supported by the service

  **True**: This is the default gateway. \

  **False**: This is not the default gateway.
fullName: DefaultGateway
remarks: ''
isDeprecated: false
syntax: |
  type DefaultGateway = string
