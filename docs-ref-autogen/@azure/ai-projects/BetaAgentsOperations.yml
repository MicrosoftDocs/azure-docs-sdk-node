    uid: '@azure/ai-projects.BetaAgentsOperations.deleteSessionFile'
    package: '@azure/ai-projects'
    summary: >-
      Delete a file or directory from the session sandbox.

      If `recursive` is false (default) and the target is a non-empty directory,
      the API returns 409 Conflict.
    fullName: deleteSessionFile
    remarks: ''
    isDeprecated: false
