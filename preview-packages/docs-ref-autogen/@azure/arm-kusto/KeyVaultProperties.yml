  - name: federatedIdentityClientId
    uid: '@azure/arm-kusto.KeyVaultProperties.federatedIdentityClientId'
    package: '@azure/arm-kusto'
    summary: >-
      The application (client) ID of the multi-tenant Microsoft Entra
      application. Used for cross-tenant customer-managed key scenarios where
      the encryption key is stored in a different tenant than the cluster. The
      application must be configured with the user-assigned managed identity as
      a federated identity credential.
    fullName: federatedIdentityClientId
