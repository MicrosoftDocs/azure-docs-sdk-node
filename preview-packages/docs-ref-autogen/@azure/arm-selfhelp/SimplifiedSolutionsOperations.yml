  - name: create
    uid: '@azure/arm-selfhelp.SimplifiedSolutionsOperations.create'
    package: '@azure/arm-selfhelp'
    summary: >-
      Creates Simplified Solutions for an Azure subscription using 'solutionId'
      from Discovery Solutions as the input. <br/><br/> Simplified Solutions API
      makes the consumption of solutions APIs easier while still providing
      access to the same powerful solutions rendered in Solutions API. With
      Simplified Solutions, users don't have to worry about stitching together
      the article using replacement maps and can use the content in the API
      response to directly render as HTML content.<br/>
    fullName: create
    remarks: ''
    isDeprecated: false
