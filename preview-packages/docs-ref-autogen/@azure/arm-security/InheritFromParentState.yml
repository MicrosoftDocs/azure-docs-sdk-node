name: InheritFromParentState
uid: '@azure/arm-security.InheritFromParentState'
package: '@azure/arm-security'
summary: >-
  Update Settings.


  Enabled - Resource should inherit configurations from parent.

  Disabled - Resource should not inherit configurations from parent. \

  [KnownInheritFromParentState](xref:@azure/arm-security.KnownInheritFromParentState)
  can be used interchangeably with InheritFromParentState,
   this enum contains the known values that the service supports.
  ### Known values supported by the service

  **Disabled**: Disabled \

  **Enabled**: Enabled
