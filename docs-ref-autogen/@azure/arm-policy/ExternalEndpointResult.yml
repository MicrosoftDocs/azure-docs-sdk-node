name: ExternalEndpointResult
uid: '@azure/arm-policy.ExternalEndpointResult'
package: '@azure/arm-policy'
summary: >-
  The result of the external endpoint. Possible values are Succeeded and Failed.
  \

  [KnownExternalEndpointResult](xref:@azure/arm-policy.KnownExternalEndpointResult)
