### YamlMime:TSType
name: ConfigurationFilters
uid: '@azure/arm-chaos.ConfigurationFilters'
package: '@azure/arm-chaos'
summary: >-
  Model that represents filter criteria for constraining which discovered

  resources participate in fault injection.


  Uses intersection (AND) logic — a resource is included only if it matches all
  criteria.
fullName: ConfigurationFilters
remarks: ''
isDeprecated: false
type: interface
properties:
  - name: locations
    uid: '@azure/arm-chaos.ConfigurationFilters.locations'
    package: '@azure/arm-chaos'
    summary: >-
      Array of Azure location strings. Only resources in these locations are
      included.


      Null or omitted means all locations (no filter). Empty array means include
      nothing.
    fullName: locations
    remarks: ''
    isDeprecated: false
    syntax:
      content: 'locations?: string[]'
      return:
        description: ''
        type: string[]
  - name: physicalZones
    uid: '@azure/arm-chaos.ConfigurationFilters.physicalZones'
    package: '@azure/arm-chaos'
    summary: >-
      Array of physical availability zone identifiers in `{region}-az{N}` format

      (e.g., `"westus2-az1"`). Only resources in the corresponding logical zone

      for each subscription are included.


      At execution time, each physical zone is resolved to per-subscription

      logical zones via the Azure locations API. The resolved mapping is
      surfaced

      on the scenario run response (`zoneResolution`).


      Null or omitted means physical zone targeting is not used.

      Only one physical zone is supported in preview.


      Mutually exclusive with `zones` — set one or the other, not both.
    fullName: physicalZones
    remarks: ''
    isDeprecated: false
    syntax:
      content: 'physicalZones?: string[]'
      return:
        description: ''
        type: string[]
  - name: zones
    uid: '@azure/arm-chaos.ConfigurationFilters.zones'
    package: '@azure/arm-chaos'
    summary: >-
      Array of availability zone identifiers ("1", "2", "3", "zone-redundant").

      Only resources whose zones intersect this list are included.


      Null or omitted means all zones (including non-zonal). Empty array means
      include nothing.


      Mutually exclusive with `physicalZones` — set one or the other, not both.
    fullName: zones
    remarks: ''
    isDeprecated: false
    syntax:
      content: 'zones?: string[]'
      return:
        description: ''
        type: string[]
