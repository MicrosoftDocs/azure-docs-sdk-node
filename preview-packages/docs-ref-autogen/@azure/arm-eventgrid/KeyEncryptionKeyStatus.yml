### YamlMime:TSTypeAlias
name: KeyEncryptionKeyStatus
uid: '@azure/arm-eventgrid.KeyEncryptionKeyStatus'
package: '@azure/arm-eventgrid'
summary: >-
  The state of the Customer Managed Key (CMK) encryption. This is a read-only
  property which determines if the associated key is active and valid and used

  actively by runtime as expected. When the associated CMK becomes invalid
  (e.g., if it is deleted, or if versioned CMK is not current anymore), Event
  Grid

  Service will set this state to disabled to indicate that this key is not valid
  anymore and requires action from user. \

  [KnownKeyEncryptionKeyStatus](xref:@azure/arm-eventgrid.KnownKeyEncryptionKeyStatus)
  can be used interchangeably with KeyEncryptionKeyStatus,
   this enum contains the known values that the service supports.
  ### Known values supported by the service

  **Active**: Active \

  **Revoked**: Revoked
fullName: KeyEncryptionKeyStatus
remarks: ''
isDeprecated: false
syntax: |
  type KeyEncryptionKeyStatus = string
