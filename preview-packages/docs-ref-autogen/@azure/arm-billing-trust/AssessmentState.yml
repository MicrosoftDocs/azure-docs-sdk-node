### YamlMime:TSTypeAlias
name: AssessmentState
uid: '@azure/arm-billing-trust.AssessmentState'
package: '@azure/arm-billing-trust'
summary: >-
  The aggregated evaluation state of an assessment, derived from its rules \

  [KnownAssessmentState](xref:@azure/arm-billing-trust.KnownAssessmentState) can
  be used interchangeably with AssessmentState,
   this enum contains the known values that the service supports.
  ### Known values supported by the service

  **pending**: One or more rules have not reached a steady state \

  **running**: One or more rules are currently being evaluated \

  **actionRequired**: One or more rules require user action \

  **underReview**: One or more rules require manual review \

  **failed**: All rules reached a steady state, and the last non-skipped rule
  failed \

  **succeeded**: All rules reached a steady state, and the last non-skipped rule
  succeeded \

  **succeededWithOverride**: Assessment succeeded but with a manual override
  applied by operations \

  **failedWithOverride**: Assessment failed but with a manual override applied
  by operations \

  **expired**: Assessment expired and requires re-evaluation
fullName: AssessmentState
remarks: ''
isDeprecated: false
syntax: |
  type AssessmentState = string
