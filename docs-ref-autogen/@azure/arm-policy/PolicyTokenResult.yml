name: PolicyTokenResult
uid: '@azure/arm-policy.PolicyTokenResult'
package: '@azure/arm-policy'
summary: >-
  The result of the completed token acquisition operation. Possible values are
  Succeeded and Failed. \

  [KnownPolicyTokenResult](xref:@azure/arm-policy.KnownPolicyTokenResult) can be
  used interchangeably with PolicyTokenResult,
   this enum contains the known values that the service supports.
  ### Known values supported by the service

  **Succeeded**: The token acquisition succeeded. \

  **Failed**: The token acquisition failed.
fullName: PolicyTokenResult
remarks: ''
isDeprecated: false
