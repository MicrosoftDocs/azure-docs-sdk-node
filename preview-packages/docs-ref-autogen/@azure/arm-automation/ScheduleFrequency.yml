name: ScheduleFrequency
uid: '@azure/arm-automation.ScheduleFrequency'
package: '@azure/arm-automation'
summary: >-
  Gets or sets the frequency of the schedule. \

  [KnownScheduleFrequency](xref:@azure/arm-automation.KnownScheduleFrequency)
  can be used interchangeably with ScheduleFrequency,
   this enum contains the known values that the service supports.
  ### Known values supported by the service

  **OneTime**: OneTime \

  **Day**: Day \

  **Hour**: Hour \

  **Week**: Week \

  **Month**: Month \

  **Minute**: The minimum allowed interval for Minute schedules is 15 minutes.
