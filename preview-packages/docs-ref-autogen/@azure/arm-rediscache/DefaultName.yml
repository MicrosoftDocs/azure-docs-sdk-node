### YamlMime:TSTypeAlias
name: DefaultName
uid: '@azure/arm-rediscache.DefaultName'
package: '@azure/arm-rediscache'
summary: >-
  The name of the resource that is the target of a particular operation. For
  singleton resources, it must be 'Default'. \

  [KnownDefaultName](xref:@azure/arm-rediscache.KnownDefaultName) can be used
  interchangeably with DefaultName,
   this enum contains the known values that the service supports.
  ### Known values supported by the service

  **default**: The name of e.g. the patch schedules resource, which is a
  singleton, must always be 'Default'
fullName: DefaultName
remarks: ''
isDeprecated: false
syntax: |
  type DefaultName = string
