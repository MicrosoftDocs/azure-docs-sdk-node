  - name: marketPrice
    uid: '@azure/arm-costmanagement.MCAPriceSheetProperties.marketPrice'
    package: '@azure/arm-costmanagement'
    summary: >-
      The current list price for a given product or service. This price is
      without any negotiations and is based on your Microsoft Agreement type.


      For PriceType Consumption, market price is reflected as the pay-as-you-go
      price.


      For PriceType Savings Plan, market price reflects the Savings plan benefit
      on top of pay-as-you-go price for the corresponding commitment term.


      For PriceType ReservedInstance, market price reflects the total price of
      the 1 or 3-year commitment.
    fullName: marketPrice
    remarks: ''
    isDeprecated: false
    syntax:
      content: 'marketPrice?: string'
      return:
        description: ''
        type: string
