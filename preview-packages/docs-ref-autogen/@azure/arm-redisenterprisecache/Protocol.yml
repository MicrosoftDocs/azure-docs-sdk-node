name: Protocol
uid: '@azure/arm-redisenterprisecache.Protocol'
package: '@azure/arm-redisenterprisecache'
summary: >-
  Specifies whether redis clients can connect using TLS-encrypted or plaintext
  redis protocols. Default is TLS-encrypted. \

  [KnownProtocol](xref:@azure/arm-redisenterprisecache.KnownProtocol) can be
  used interchangeably with Protocol,
   this enum contains the known values that the service supports.
  ### Known values supported by the service

  **Encrypted**: Encrypted \

  **Plaintext**: Plaintext
fullName: Protocol
remarks: ''
isDeprecated: false
syntax: |
  type Protocol = string
