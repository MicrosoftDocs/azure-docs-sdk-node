### YamlMime:TSTypeAlias
name: ThreatStatus
uid: '@azure/arm-recoveryservicesbackup.ThreatStatus'
package: '@azure/arm-recoveryservicesbackup'
summary: >-
  Threat status of the recovery point \

  [KnownThreatStatus](xref:@azure/arm-recoveryservicesbackup.KnownThreatStatus)
  can be used interchangeably with ThreatStatus,
   this enum contains the known values that the service supports.
  ### Known values supported by the service

  **Unknown**: Threat status is unknown \

  **Healthy**: Recovery point is healthy \

  **UnHealthy**: Recovery point is unhealthy \

  **Warning**: Recovery point has warning-level threats \

  **NotAvailable**: Threat status is not available
fullName: ThreatStatus
remarks: ''
isDeprecated: false
syntax: |
  type ThreatStatus = string
