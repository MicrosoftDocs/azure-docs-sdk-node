### YamlMime:TSEnum
name: KnownNodeProvisioningDefaultNodePools
uid: '@azure/arm-containerservice.KnownNodeProvisioningDefaultNodePools'
package: '@azure/arm-containerservice'
summary: >-
  The set of default Karpenter NodePools (CRDs) configured for node
  provisioning. This field has no effect unless mode is 'Auto'. Warning:
  Changing this from Auto to None on an existing cluster will cause the default
  Karpenter NodePools to be deleted, which will drain and delete the nodes
  associated with those pools. It is strongly recommended to not do this unless
  there are idle nodes ready to take the pods evicted by that action. If not
  specified, the default is Auto. For more information see
  aka.ms/aks/nap#node-pools.
fullName: KnownNodeProvisioningDefaultNodePools
remarks: ''
isDeprecated: false
fields:
  - name: Auto
    uid: '@azure/arm-containerservice.KnownNodeProvisioningDefaultNodePools.Auto'
    package: '@azure/arm-containerservice'
    summary: A standard set of Karpenter NodePools are provisioned
  - name: None
    uid: '@azure/arm-containerservice.KnownNodeProvisioningDefaultNodePools.None'
    package: '@azure/arm-containerservice'
    summary: >-
      No Karpenter NodePools are provisioned automatically. Automatic scaling
      will not happen unless the user creates one or more NodePool CRD
      instances.
