name: ClusterUpdateVersionSafeguardMode
uid: '@azure/arm-networkcloud.ClusterUpdateVersionSafeguardMode'
package: '@azure/arm-networkcloud'
summary: >-
  ClusterUpdateVersionSafeguardMode represents the mode of the cluster update
  safeguards. \

  [KnownClusterUpdateVersionSafeguardMode](xref:@azure/arm-networkcloud.KnownClusterUpdateVersionSafeguardMode)
  can be used interchangeably with ClusterUpdateVersionSafeguardMode,
   this enum contains the known values that the service supports.
  ### Known values supported by the service

  **All**: Run all pre‑operation validation checks before performing the version
  update. If any check fails, the request is rejected and no changes are made. \

  **None**: Skip all safeguards and perform the version update without running
  pre‑operation validation checks.
fullName: ClusterUpdateVersionSafeguardMode
remarks: ''
isDeprecated: false
syntax: |
  type ClusterUpdateVersionSafeguardMode = string
