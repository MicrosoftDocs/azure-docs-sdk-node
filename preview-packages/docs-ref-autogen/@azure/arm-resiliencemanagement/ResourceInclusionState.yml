name: ResourceInclusionState
uid: '@azure/arm-resiliencemanagement.ResourceInclusionState'
package: '@azure/arm-resiliencemanagement'
summary: >-
  A state type that indicates inclusion of the resource with respect to the
  resiliency support. \

  [KnownResourceInclusionState](xref:@azure/arm-resiliencemanagement.KnownResourceInclusionState)
  can be used interchangeably with ResourceInclusionState,
   this enum contains the known values that the service supports.
  ### Known values supported by the service

  **Included**: A state that indicates the resource is included. \

  **Excluded**: A state that indicates the resource is excluded.
fullName: ResourceInclusionState
remarks: ''
isDeprecated: false
syntax: |
  type ResourceInclusionState = string
