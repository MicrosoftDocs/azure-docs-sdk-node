### YamlMime:TSTypeAlias
name: SharingScope
uid: '@azure/arm-network.SharingScope'
package: '@azure/arm-network'
summary: >-
  Set this property to Tenant to allow sharing subnet with other subscriptions
  in your AAD tenant. This property can only be set if defaultOutboundAccess is
  set to false, both properties can only be set if subnet is empty. \

  [KnownSharingScope](xref:@azure/arm-network.KnownSharingScope) can be used
  interchangeably with SharingScope,
   this enum contains the known values that the service supports.
  ### Known values supported by the service

  **Tenant**: Tenant \

  **DelegatedServices**: DelegatedServices
fullName: SharingScope
remarks: ''
isDeprecated: false
syntax: |
  type SharingScope = string
