  - name: quality
    uid: '@azure/ai-projects.ImageGenTool.quality'
    package: '@azure/ai-projects'
    summary: |-
      The quality of the generated image. One of `low`, `medium`, `high`,
        or `auto`. Default: `auto`.
    fullName: quality
    remarks: ''
    isDeprecated: false
    syntax:
      content: 'quality?: "auto" | "low" | "medium" | "high"'
      return:
        description: ''
        type: '"auto" | "low" | "medium" | "high"'
  - name: size
    uid: '@azure/ai-projects.ImageGenTool.size'
    package: '@azure/ai-projects'
    summary: >-
      The size of the generated images. For `gpt-image-2` and
      `gpt-image-2-2026-04-21`, arbitrary resolutions are supported as
      `WIDTHxHEIGHT` strings, for example `1536x864`. Width and height must both
      be divisible by 16 and the requested aspect ratio must be between 1:3 and
      3:1. Resolutions above `2560x1440` are experimental, and the maximum
      supported resolution is `3840x2160`. The requested size must also satisfy
      the model's current pixel and edge limits. The standard sizes `1024x1024`,
      `1536x1024`, and `1024x1536` are supported by the GPT image models; `auto`
      is supported for models that allow automatic sizing. For `dall-e-2`, use
      one of `256x256`, `512x512`, or `1024x1024`. For `dall-e-3`, use one of
      `1024x1024`, `1792x1024`, or `1024x1792`.
    fullName: size
    remarks: ''
    isDeprecated: false
    syntax:
      content: 'size?: "auto" | "1024x1024" | "1024x1536" | "1536x1024"'
      return:
        description: ''
        type: '"auto" | "1024x1024" | "1024x1536" | "1536x1024"'
  - name: tool_configs
