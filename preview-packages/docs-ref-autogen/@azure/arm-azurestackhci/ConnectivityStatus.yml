### YamlMime:TSTypeAlias
name: ConnectivityStatus
uid: '@azure/arm-azurestackhci.ConnectivityStatus'
package: '@azure/arm-azurestackhci'
summary: >-
  Overall connectivity status for the cluster resource. Indicates whether the
  cluster is connected to Azure, partially connected, or has not recently
  communicated. \

  [KnownConnectivityStatus](xref:@azure/arm-azurestackhci.KnownConnectivityStatus)
  can be used interchangeably with ConnectivityStatus,
   this enum contains the known values that the service supports.
  ### Known values supported by the service

  **NotYetRegistered**: The cluster has not yet registered with Azure. \

  **Connected**: The cluster is fully connected to Azure. \

  **NotConnectedRecently**: The cluster has not connected to Azure recently. \

  **PartiallyConnected**: Some components of the cluster are connected, while
  others are not. \

  **Disconnected**: The cluster is not connected to Azure. \

  **NotSpecified**: The connectivity status is not specified.
fullName: ConnectivityStatus
remarks: ''
isDeprecated: false
syntax: |
  type ConnectivityStatus = string
