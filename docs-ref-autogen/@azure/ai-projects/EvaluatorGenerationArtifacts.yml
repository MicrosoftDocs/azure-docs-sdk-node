### YamlMime:TSType
name: EvaluatorGenerationArtifacts
uid: '@azure/ai-projects.EvaluatorGenerationArtifacts'
package: '@azure/ai-projects'
summary: >-
  Service-managed provenance artifacts produced by an evaluator generation job.
  Present only on EvaluatorVersion resources created via the generation
  pipeline. The combined-JSONL Foundry Dataset is read-only and resolves to a
  versioned dataset in a service-reserved namespace.
fullName: EvaluatorGenerationArtifacts
remarks: ''
isDeprecated: false
type: interface
properties:
  - name: dataset
    uid: '@azure/ai-projects.EvaluatorGenerationArtifacts.dataset'
    package: '@azure/ai-projects'
    summary: >-
      Reference to the single Foundry Dataset (one combined JSONL file,
      version-aligned to `EvaluatorVersion.version`) holding all artifacts
      produced by the generation pipeline. Each row in the JSONL carries a
      `kind` field discriminating its content (e.g. `spec`, `tools`, `context`).
    fullName: dataset
    remarks: ''
    isDeprecated: false
    syntax:
      content: 'dataset: DatasetReference'
      return:
        description: ''
        type: <xref uid="@azure/ai-projects.DatasetReference" />
  - name: kinds
    uid: '@azure/ai-projects.EvaluatorGenerationArtifacts.kinds'
    package: '@azure/ai-projects'
    summary: >-
      The kinds of rows present in `dataset`. Always contains `"spec"` (the
      generated evaluation specification, a Markdown document describing what
      the evaluator measures). May additionally contain `"tools"` (when the
      generation pipeline produced or inferred OpenAI tool schemas) and/or
      `"context"` (when supplementary materials such as file uploads or trace
      samples were used during generation).
    fullName: kinds
    remarks: ''
    isDeprecated: false
    syntax:
      content: 'kinds: string[]'
      return:
        description: ''
        type: string[]
