### YamlMime:TSEnum
name: KnownResourceIdentityType
uid: '@azure/arm-containerservice.KnownResourceIdentityType'
package: '@azure/arm-containerservice'
summary: >-
  The type of identity used for the managed cluster. For more information see
  [use managed identities in
  AKS](https://docs.microsoft.com/azure/aks/use-managed-identity).
fullName: KnownResourceIdentityType
remarks: ''
isDeprecated: false
fields:
  - name: None
    uid: '@azure/arm-containerservice.KnownResourceIdentityType.None'
    package: '@azure/arm-containerservice'
    summary: >-
      Do not use a managed identity for the Managed Cluster, service principal
      will be used instead.
  - name: SystemAssigned
    uid: '@azure/arm-containerservice.KnownResourceIdentityType.SystemAssigned'
    package: '@azure/arm-containerservice'
    summary: >-
      Use an implicitly created system assigned managed identity to manage
      cluster resources. Master components in the control plane such as
      kube-controller-manager will use the system assigned managed identity to
      manipulate Azure resources.
  - name: UserAssigned
    uid: '@azure/arm-containerservice.KnownResourceIdentityType.UserAssigned'
    package: '@azure/arm-containerservice'
    summary: >-
      Use a user-specified identity to manage cluster resources. Master
      components in the control plane such as kube-controller-manager will use
      the specified user assigned managed identity to manipulate Azure
      resources.
