### YamlMime:TSType
name: ComplianceProperties
uid: '@azure/arm-security.ComplianceProperties'
package: '@azure/arm-security'
summary: >-
  The Compliance score (percentage) of a Subscription is a sum of all Resources'
  Compliances under the given Subscription. A Resource Compliance is defined as
  the compliant ('healthy') Policy Definitions out of all Policy Definitions
  applicable to a given resource.
fullName: ComplianceProperties
remarks: ''
isDeprecated: false
type: interface
properties:
  - name: assessmentResult
    uid: '@azure/arm-security.ComplianceProperties.assessmentResult'
    package: '@azure/arm-security'
    summary: An array of segment, which is the actually the compliance assessment.
    fullName: assessmentResult
    remarks: ''
    isDeprecated: false
    syntax:
      content: 'assessmentResult?: ComplianceSegment[]'
      return:
        description: ''
        type: <xref uid="@azure/arm-security.ComplianceSegment" />[]
  - name: assessmentTimestampUtcDate
    uid: '@azure/arm-security.ComplianceProperties.assessmentTimestampUtcDate'
    package: '@azure/arm-security'
    summary: The timestamp when the Compliance calculation was conducted.
    fullName: assessmentTimestampUtcDate
    remarks: ''
    isDeprecated: false
    syntax:
      content: 'assessmentTimestampUtcDate?: Date'
      return:
        description: ''
        type: Date
  - name: resourceCount
    uid: '@azure/arm-security.ComplianceProperties.resourceCount'
    package: '@azure/arm-security'
    summary: >-
      The resource count of the given subscription for which the Compliance
      calculation was conducted (needed for Management Group Compliance
      calculation).
    fullName: resourceCount
    remarks: ''
    isDeprecated: false
    syntax:
      content: 'resourceCount?: number'
      return:
        description: ''
        type: number
