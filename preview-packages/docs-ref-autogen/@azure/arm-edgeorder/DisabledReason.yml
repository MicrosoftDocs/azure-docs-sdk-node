### YamlMime:TSTypeAlias
name: DisabledReason
uid: '@azure/arm-edgeorder.DisabledReason'
package: '@azure/arm-edgeorder'
summary: >-
  Reason why the product is disabled. \

  [KnownDisabledReason](xref:@azure/arm-edgeorder.KnownDisabledReason) can be
  used interchangeably with DisabledReason,
   this enum contains the known values that the service supports.
  ### Known values supported by the service

  **None**: Not disabled. \

  **Country**: Not available in the requested country. \

  **Region**: Not available to push data to the requested Azure region. \

  **Feature**: Required features are not enabled. \

  **OfferType**: Subscription does not have required offer types. \

  **NoSubscriptionInfo**: Subscription has not registered to Microsoft.DataBox
  and Service does not have the subscription notification. \

  **NotAvailable**: The product is not yet available. \

  **OutOfStock**: The product is out of stock.
fullName: DisabledReason
remarks: ''
isDeprecated: false
syntax: |
  type DisabledReason = string
