### YamlMime:TSTypeAlias
name: HealthStateType
uid: '@azure/arm-storagecache.HealthStateType'
package: '@azure/arm-storagecache'
summary: >-
  List of cache health states. Down is when the cluster is not responding. 
  Degraded is when its functioning but has some alerts. Transitioning when it is
  creating or deleting. Unknown will be returned in old api versions when a new
  value is added in future versions. WaitingForKey is when the create is waiting
  for the system assigned identity to be given access to the encryption key in
  the encryption settings. \

  [KnownHealthStateType](xref:@azure/arm-storagecache.KnownHealthStateType) can
  be used interchangeably with HealthStateType,
   this enum contains the known values that the service supports.
  ### Known values supported by the service

  **Unknown**: Unknown \

  **Healthy**: Healthy \

  **Degraded**: Degraded \

  **Down**: Down \

  **Transitioning**: Transitioning \

  **Stopping**: Stopping \

  **Stopped**: Stopped \

  **Upgrading**: Upgrading \

  **Flushing**: Flushing \

  **WaitingForKey**: WaitingForKey \

  **StartFailed**: StartFailed \

  **UpgradeFailed**: UpgradeFailed
fullName: HealthStateType
remarks: ''
isDeprecated: false
syntax: |
  type HealthStateType = string
