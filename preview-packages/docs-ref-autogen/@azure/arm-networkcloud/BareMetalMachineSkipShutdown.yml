### YamlMime:TSTypeAlias
name: BareMetalMachineSkipShutdown
uid: '@azure/arm-networkcloud.BareMetalMachineSkipShutdown'
package: '@azure/arm-networkcloud'
summary: >-
  The indicator of whether to skip the graceful OS shutdown and power off the
  bare metal machine immediately. \

  [KnownBareMetalMachineSkipShutdown](xref:@azure/arm-networkcloud.KnownBareMetalMachineSkipShutdown)
  can be used interchangeably with BareMetalMachineSkipShutdown,
   this enum contains the known values that the service supports.
  ### Known values supported by the service

  **True**: Skip the graceful OS shutdown and power off the bare metal machine
  immediately. \

  **False**: Do not skip the graceful OS shutdown and power off the bare metal
  machine immediately.
fullName: BareMetalMachineSkipShutdown
remarks: ''
isDeprecated: false
syntax: |
  type BareMetalMachineSkipShutdown = string
