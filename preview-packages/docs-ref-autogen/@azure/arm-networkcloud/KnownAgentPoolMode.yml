### YamlMime:TSEnum
name: KnownAgentPoolMode
uid: '@azure/arm-networkcloud.KnownAgentPoolMode'
package: '@azure/arm-networkcloud'
summary: >-
  The selection of how this agent pool is utilized, either as a system pool or a
  user pool. System pools run the features and critical services for the
  Kubernetes Cluster, while user pools are dedicated to user workloads. Every
  Kubernetes cluster must contain at least one system node pool with at least
  one node.
fullName: KnownAgentPoolMode
remarks: ''
isDeprecated: false
fields:
