name: State
uid: '@azure/arm-horizondb.State'
package: '@azure/arm-horizondb'
summary: >-
  Current states. \

  [KnownState](xref:@azure/arm-horizondb.KnownState) can be used interchangeably
  with State,
   this enum contains the known values that the service supports.
  ### Known values supported by the service

  **Ready**: Is ready and operational \

  **Dropping**: Is being dropped/deleted \

  **Disabled**: Is disabled \

  **Starting**: Is starting up \

  **Stopping**: Is stopping \

  **Stopped**: Is stopped \

  **Updating**: Is being updated \

  **Healthy**: Is healthy
