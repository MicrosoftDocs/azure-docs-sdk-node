### YamlMime:TSTypeAlias
name: RelayType
uid: '@azure/arm-networkcloud.RelayType'
package: '@azure/arm-networkcloud'
summary: >-
  The indicator of which relay type the machine should be assigned to use.
  Platform indicates the use of a platform-dedicated relay. Public indicates the
  use of the standard public relay for Arc services. \

  [KnownRelayType](xref:@azure/arm-networkcloud.KnownRelayType) can be used
  interchangeably with RelayType,
   this enum contains the known values that the service supports.
  ### Known values supported by the service

  **Platform**: Utilize the platform-dedicated relay for Arc services. \

  **Public**: Utilize the standard public relay for Arc services.
fullName: RelayType
remarks: ''
isDeprecated: false
syntax: |
  type RelayType = string
