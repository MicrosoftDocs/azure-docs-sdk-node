name: EncryptionPolicy
uid: '@azure/cosmos.EncryptionPolicy'
package: '@azure/cosmos'
summary: >-
  Represents the encryption policy associated with a CosmosClient.

  NOTE: keyEncryptionKeyResolver and encryptionKeyResolverName must be provided
  if enableEncryption is set to true
fullName: EncryptionPolicy
remarks: ''
isDeprecated: false
type: interface
properties:
