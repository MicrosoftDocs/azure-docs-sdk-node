### YamlMime:TSTypeAlias
name: TemporalAggregationType
uid: '@azure/arm-monitorslis.TemporalAggregationType'
package: '@azure/arm-monitorslis'
summary: >-
  Defines the available temporal aggregation types for aggregating measurements
  over a specific time window within the same time series. \

  [KnownTemporalAggregationType](xref:@azure/arm-monitorslis.KnownTemporalAggregationType)
  can be used interchangeably with TemporalAggregationType,
   this enum contains the known values that the service supports.
  ### Known values supported by the service

  **Average**: Average value. \

  **Min**: Minimum value. \

  **Max**: Maximum value. \

  **Sum**: Summation. \

  **Rate**: Rate over time. \

  **IRate**: Instance rate. \

  **Delta**: Delta over time. \

  **IDelta**: Instance delta. \

  **Increase**: Increase over time.
fullName: TemporalAggregationType
remarks: ''
isDeprecated: false
syntax: |
  type TemporalAggregationType = string
