### YamlMime:TSTypeAlias
name: StorageAutoGrow
uid: '@azure/arm-postgresql-flexible.StorageAutoGrow'
package: '@azure/arm-postgresql-flexible'
summary: >-
  Flag to enable or disable the automatic growth of storage size of a server
  when available space is nearing zero and conditions allow for automatically
  growing storage size. \

  [KnownStorageAutoGrow](xref:@azure/arm-postgresql-flexible.KnownStorageAutoGrow)
  can be used interchangeably with StorageAutoGrow,
   this enum contains the known values that the service supports.
  ### Known values supported by the service

  **Enabled** \

  **Disabled**
fullName: StorageAutoGrow
remarks: ''
isDeprecated: false
syntax: |
  type StorageAutoGrow = string
