### YamlMime:TSTypeAlias
name: DeviceLogCollectionStatus
uid: '@azure/arm-azurestackhci.DeviceLogCollectionStatus'
package: '@azure/arm-azurestackhci'
summary: >-
  Represents the status of a log collection operation. \

  [KnownDeviceLogCollectionStatus](xref:@azure/arm-azurestackhci.KnownDeviceLogCollectionStatus)
  can be used interchangeably with DeviceLogCollectionStatus,
   this enum contains the known values that the service supports.
  ### Known values supported by the service

  **NotStarted**: Log collection operation has not been initiated. \

  **Running**: Indicates that the log collection operation is currently running.
  \

  **Failed**: Indicates that the log collection operation has failed. \

  **Succeeded**: Indicates that the log collection operation has completed
  successfully. \

  **Canceled**: Indicates that the log collection operation has completed
  successfully.
fullName: DeviceLogCollectionStatus
remarks: ''
isDeprecated: false
syntax: |
  type DeviceLogCollectionStatus = string
