name: Frequency
uid: '@azure/arm-storagemover.Frequency'
package: '@azure/arm-storagemover'
summary: >-
  Type of schedule — Monthly, Weekly, or Daily \

  [KnownFrequency](xref:@azure/arm-storagemover.KnownFrequency) can be used
  interchangeably with Frequency,
   this enum contains the known values that the service supports.
  ### Known values supported by the service

  **Monthly** \

  **Weekly** \

  **Daily** \

  **Onetime** \

  **None**: No schedule frequency. The job definition will not run on a
  schedule.
