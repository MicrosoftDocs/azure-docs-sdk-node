### YamlMime:TSEnum
name: KnownConfidentialVmIntent
uid: '@azure/arm-azurestackhci.KnownConfidentialVmIntent'
package: '@azure/arm-azurestackhci'
summary: >-
  Captures the customer's intent to enable or disable Confidential Virtual
  Machine (CVM) support on the cluster, either during initial deployment (Day-0)
  or at a later stage (Day-N).
fullName: KnownConfidentialVmIntent
remarks: ''
isDeprecated: false
fields:
  - name: Disable
    uid: '@azure/arm-azurestackhci.KnownConfidentialVmIntent.Disable'
    package: '@azure/arm-azurestackhci'
    summary: Indicates that the customer intends to disable CVM support on the cluster.
  - name: Enable
    uid: '@azure/arm-azurestackhci.KnownConfidentialVmIntent.Enable'
    package: '@azure/arm-azurestackhci'
    summary: Indicates that the customer intends to enable CVM support on the cluster.
