### YamlMime:TSTypeAlias
name: AssignmentType
uid: '@azure/arm-policy.AssignmentType'
package: '@azure/arm-policy'
summary: >-
  The type of policy assignment. Possible values are NotSpecified, System,
  SystemHidden, and Custom. Immutable. \

  [KnownAssignmentType](xref:@azure/arm-policy.KnownAssignmentType) can be used
  interchangeably with AssignmentType,
   this enum contains the known values that the service supports.
  ### Known values supported by the service

  **NotSpecified**: The not specified assignment type. \

  **System**: The system assignment type. \

  **SystemHidden**: The system hidden assignment type. \

  **Custom**: The custom assignment type.
fullName: AssignmentType
remarks: ''
isDeprecated: false
syntax: |
  type AssignmentType = string
