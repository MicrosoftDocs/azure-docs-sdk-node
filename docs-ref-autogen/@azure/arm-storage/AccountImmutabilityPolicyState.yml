### YamlMime:TSTypeAlias
name: AccountImmutabilityPolicyState
uid: '@azure/arm-storage.AccountImmutabilityPolicyState'
package: '@azure/arm-storage'
summary: >-
  The ImmutabilityPolicy state defines the mode of the policy. Disabled state
  disables the policy, Unlocked state allows increase and decrease of
  immutability retention time and also allows toggling
  allowProtectedAppendWrites property, Locked state only allows the increase of
  the immutability retention time. A policy can only be created in a Disabled or
  Unlocked state and can be toggled between the two states. Only a policy in an
  Unlocked state can transition to a Locked state which cannot be reverted. \

  [KnownAccountImmutabilityPolicyState](xref:@azure/arm-storage.KnownAccountImmutabilityPolicyState)
  can be used interchangeably with AccountImmutabilityPolicyState,
   this enum contains the known values that the service supports.
  ### Known values supported by the service

  **Unlocked** \

  **Locked** \

  **Disabled**
fullName: AccountImmutabilityPolicyState
remarks: ''
isDeprecated: false
syntax: |
  type AccountImmutabilityPolicyState = string
