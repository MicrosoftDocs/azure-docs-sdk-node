### YamlMime:TSTypeAlias
name: OnlineStorageResizeSupport
uid: '@azure/arm-postgresql-flexible.OnlineStorageResizeSupport'
package: '@azure/arm-postgresql-flexible'
summary: >-
  Indicates if resizing the storage, without interrupting the operation of the
  database engine, is supported in this location for the given subscription.
  'Enabled' means resizing the storage without interrupting the operation of the
  database engine is supported. 'Disabled' means resizing the storage without
  interrupting the operation of the database engine is not supported. Will be
  deprecated in the future. Look to Supported Features for 'OnlineResize'. \

  [KnownOnlineStorageResizeSupport](xref:@azure/arm-postgresql-flexible.KnownOnlineStorageResizeSupport)
  can be used interchangeably with OnlineStorageResizeSupport,
   this enum contains the known values that the service supports.
  ### Known values supported by the service

  **Enabled** \

  **Disabled**
fullName: OnlineStorageResizeSupport
remarks: ''
isDeprecated: false
syntax: |
  type OnlineStorageResizeSupport = string
