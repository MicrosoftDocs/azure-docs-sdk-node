### YamlMime:TSTypeAlias
name: BareMetalMachineReplaceStoragePolicy
uid: '@azure/arm-networkcloud.BareMetalMachineReplaceStoragePolicy'
package: '@azure/arm-networkcloud'
summary: >-
  The indicator of whether to bypass clearing storage while replacing a bare
  metal machine. \

  [KnownBareMetalMachineReplaceStoragePolicy](xref:@azure/arm-networkcloud.KnownBareMetalMachineReplaceStoragePolicy)
  can be used interchangeably with BareMetalMachineReplaceStoragePolicy,
   this enum contains the known values that the service supports.
  ### Known values supported by the service

  **Preserve**: Storage will be preserved and not cleared during the replace
  action. \

  **DiscardAll**: Storage will be cleared during the replace action.
fullName: BareMetalMachineReplaceStoragePolicy
remarks: ''
isDeprecated: false
syntax: |
  type BareMetalMachineReplaceStoragePolicy = string
