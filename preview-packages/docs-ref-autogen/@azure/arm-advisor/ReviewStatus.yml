### YamlMime:TSTypeAlias
name: ReviewStatus
uid: '@azure/arm-advisor.ReviewStatus'
package: '@azure/arm-advisor'
summary: >-
  Review status. \

  [KnownReviewStatus](xref:@azure/arm-advisor.KnownReviewStatus) can be used
  interchangeably with ReviewStatus,
   this enum contains the known values that the service supports.
  ### Known values supported by the service

  **New**: The review has been newly created. \

  **InProgress**: The review is currently in progress. \

  **Triaged**: The review has been triaged. \

  **Completed**: The review has been completed.
fullName: ReviewStatus
remarks: ''
isDeprecated: false
syntax: |
  type ReviewStatus = string
