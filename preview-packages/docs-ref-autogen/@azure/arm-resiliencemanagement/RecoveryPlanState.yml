name: RecoveryPlanState
uid: '@azure/arm-resiliencemanagement.RecoveryPlanState'
package: '@azure/arm-resiliencemanagement'
summary: >-
  Specifies the state of the recovery orchestration plan. \

  [KnownRecoveryPlanState](xref:@azure/arm-resiliencemanagement.KnownRecoveryPlanState)
  can be used interchangeably with RecoveryPlanState,
   this enum contains the known values that the service supports.
  ### Known values supported by the service

  **UnderEdit**: The recovery orchestration plan is currently being edited. \

  **Warning**: The recovery orchestration plan is in a warning state. \

  **Ready**: The recovery orchestration plan is ready.
