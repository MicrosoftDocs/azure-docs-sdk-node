### YamlMime:TSTypeAlias
name: CompressionModeType
uid: '@azure/arm-costmanagement.CompressionModeType'
package: '@azure/arm-costmanagement'
summary: >-
  Allow customers to select compress data for exports. This setting will enable
  destination file compression scheme at runtime. By default set to None. Gzip
  is for csv and snappy for parquet. \

  [KnownCompressionModeType](xref:@azure/arm-costmanagement.KnownCompressionModeType)
  can be used interchangeably with CompressionModeType,
   this enum contains the known values that the service supports.
  ### Known values supported by the service

  **gzip** \

  **snappy** \

  **none**
fullName: CompressionModeType
remarks: ''
isDeprecated: false
syntax: |
  type CompressionModeType = string
