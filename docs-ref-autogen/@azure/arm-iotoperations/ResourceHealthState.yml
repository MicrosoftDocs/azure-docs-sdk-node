name: ResourceHealthState
uid: '@azure/arm-iotoperations.ResourceHealthState'
package: '@azure/arm-iotoperations'
summary: >-
  The health state of the resource. \

  [KnownResourceHealthState](xref:@azure/arm-iotoperations.KnownResourceHealthState)
  can be used interchangeably with ResourceHealthState,
   this enum contains the known values that the service supports.
  ### Known values supported by the service

  **Available**: Resource is Available and functioning as expected. \

  **Degraded**: Resource health is degraded. \

  **Unavailable**: Resource is not functioning as expected. \

  **Unknown**: Resource state is unknown.
