name: CredentialsAkvDetails
uid: '@azure/arm-netapp.CredentialsAkvDetails'
package: '@azure/arm-netapp'
summary: Specifies the Azure Key Vault settings for storing the bucket credentials.
fullName: CredentialsAkvDetails
remarks: ''
isDeprecated: false
type: interface
properties:
  - name: credentialsKeyVaultUri
    uid: '@azure/arm-netapp.CredentialsAkvDetails.credentialsKeyVaultUri'
    package: '@azure/arm-netapp'
    summary: >-
      The base URI of the Azure Key Vault that is used when storing the bucket
      credentials.
    fullName: credentialsKeyVaultUri
    remarks: ''
    isDeprecated: false
    syntax:
      content: 'credentialsKeyVaultUri?: string'
      return:
        description: ''
        type: string
  - name: secretName
    uid: '@azure/arm-netapp.CredentialsAkvDetails.secretName'
    package: '@azure/arm-netapp'
    summary: >-
      The name of the secret stored in Azure Key Vault. The associated key pair
      has the following structure:


      {

      "access_key_id": "<REDACTED>",

      "secret_access_key": "<REDACTED>"

      }
    fullName: secretName
    remarks: ''
    isDeprecated: false
    syntax:
      content: 'secretName?: string'
      return:
        description: ''
        type: string
  - name: userAssignedIdentity
    uid: '@azure/arm-netapp.CredentialsAkvDetails.userAssignedIdentity'
    package: '@azure/arm-netapp'
    summary: >-
      Optional resource ID of the managed identity that has access to the Azure
      Key Vault (AKV) secret. If a value is provided, it is used to find a
      matching entry in the account's collection of user-assigned managed
      identities. If no match is found, an exception is thrown. If no value is
      provided, the system-assigned managed identity is used.
    fullName: userAssignedIdentity
    remarks: ''
    isDeprecated: false
    syntax:
      content: 'userAssignedIdentity?: string'
      return:
        description: ''
        type: string
