  - name: create
    uid: '@azure/arm-selfhelp.SolutionOperations.create'
    package: '@azure/arm-selfhelp'
    summary: >-
      Creates a solution for the specific Azure resource or subscription using
      the inputs ‘solutionId and requiredInputs’ from discovery solutions. <br/>
      Azure solutions comprise a comprehensive library of self-help resources
      that have been thoughtfully curated by Azure engineers to aid customers in
      resolving typical troubleshooting issues. These solutions encompass: <br/>
      (1.) Dynamic and context-aware diagnostics, guided troubleshooting
      wizards, and data visualizations. <br/> (2.) Rich instructional video
      tutorials and illustrative diagrams and images. <br/> (3.) Thoughtfully
      assembled textual troubleshooting instructions. <br/> All these components
      are seamlessly converged into unified solutions tailored to address a
      specific support problem area.
    fullName: create
    remarks: ''
    isDeprecated: false
    syntax:
      content: >-
        create: (scope: string, solutionResourceName: string, options?:
        SolutionCreateOptionalParams) =>
        PollerLike<OperationState<SolutionResource>, SolutionResource>
      return:
        description: ''
        type: >-
          (scope: string, solutionResourceName: string, options?:
          SolutionCreateOptionalParams) =&gt;
          PollerLike&lt;OperationState&lt;SolutionResource&gt;,
          SolutionResource&gt;
