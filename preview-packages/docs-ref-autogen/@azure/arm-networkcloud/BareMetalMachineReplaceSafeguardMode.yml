name: BareMetalMachineReplaceSafeguardMode
uid: '@azure/arm-networkcloud.BareMetalMachineReplaceSafeguardMode'
package: '@azure/arm-networkcloud'
summary: >-
  The safeguard mode to use for the replace action, where None indicates to
  bypass safeguards and All indicates to utilize all safeguards. \

  [KnownBareMetalMachineReplaceSafeguardMode](xref:@azure/arm-networkcloud.KnownBareMetalMachineReplaceSafeguardMode)
  can be used interchangeably with BareMetalMachineReplaceSafeguardMode,
   this enum contains the known values that the service supports.
  ### Known values supported by the service

  **All**: All safeguards will be utilized during the replace action. \

  **None**: No safeguards will be utilized during the replace action.
fullName: BareMetalMachineReplaceSafeguardMode
