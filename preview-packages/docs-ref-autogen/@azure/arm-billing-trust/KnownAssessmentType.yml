### YamlMime:TSEnum
name: KnownAssessmentType
uid: '@azure/arm-billing-trust.KnownAssessmentType'
package: '@azure/arm-billing-trust'
summary: >-
  Assessment template name. Each template defines a fixed set of rules and their
  configuration. The list of templates may be extended in future API versions.
fullName: KnownAssessmentType
remarks: ''
isDeprecated: false
fields:
  - name: BusinessVerification
    uid: '@azure/arm-billing-trust.KnownAssessmentType.BusinessVerification'
    package: '@azure/arm-billing-trust'
    summary: >-
      Business verification assessment. Verifies the billing account's business
      identity against the sold-to information on file.
  - name: Edu
    uid: '@azure/arm-billing-trust.KnownAssessmentType.Edu'
    package: '@azure/arm-billing-trust'
    summary: >-
      Education qualification assessment. Verifies that the billing account
      qualifies for education programs based on customer-supplied domains.
  - name: PayeeEnrollment
    uid: '@azure/arm-billing-trust.KnownAssessmentType.PayeeEnrollment'
    package: '@azure/arm-billing-trust'
    summary: >-
      Payee enrollment assessment. Verifies a billing account is eligible to
      enroll as a payee. Rule names within this template may change between API
      versions — iterate `rules` via LIST rather than addressing rules by name.
  - name: PayeeProfile
    uid: '@azure/arm-billing-trust.KnownAssessmentType.PayeeProfile'
    package: '@azure/arm-billing-trust'
    summary: >-
      Payee profile assessment. Verifies the payee profile associated with a
      billing account. Rule names within this template may change between API
      versions — iterate `rules` via LIST rather than addressing rules by name.
