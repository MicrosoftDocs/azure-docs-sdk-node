### YamlMime:TSTypeAlias
name: KnowledgeRetrieval
uid: '@azure/arm-search.KnowledgeRetrieval'
package: '@azure/arm-search'
summary: >-
  Specifies the billing plan for agentic retrieval on the Azure AI Search
  service. This configuration is only available for certain pricing tiers in
  certain regions. \

  [KnownKnowledgeRetrieval](xref:@azure/arm-search.KnownKnowledgeRetrieval) can
  be used interchangeably with KnowledgeRetrieval,
   this enum contains the known values that the service supports.
  ### Known values supported by the service

  **free**: Enables knowledge retrieval on a search service and indicates that
  it is to be used within the limits of the free plan. The free plan would cap
  the volume of knowledge retrieval requests and is offered at no extra charge.
  \

  **standard**: Enables knowledge retrieval on a search service as a billable
  feature after the free quota is exhausted, with higher throughput and volume
  of knowledge retrieval requests.
fullName: KnowledgeRetrieval
remarks: ''
isDeprecated: false
syntax: |
  type KnowledgeRetrieval = string
