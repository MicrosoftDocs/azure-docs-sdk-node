  - name: getHistory
    uid: '@azure/arm-alertsmanagement.AlertsOperations.getHistory'
    package: '@azure/arm-alertsmanagement'
    summary: >-
      Get the history of an alert, which captures any monitor condition changes
      (Fired/Resolved), alert state changes (New/Acknowledged/Closed) and
      applied action rules for that particular alert. If scope is a deleted
      resource then please use scope as parent resource of the delete resource.
      For example if my alert id is
      '/subscriptions/{subscriptionId}/resourceGroups/{resourceGroup}/providers/Microsoft.Compute/virtualMachines/vm1/providers/Microsoft.AlertsManagement/alerts/{alertId}'
      and 'vm1' is deleted then if you want to get history of this particular
      alert then use parent resource of scope. So in this example get history
      call will look like this:
      '/subscriptions/{subscriptionId}/resourceGroups/{resourceGroup}/providers/Microsoft.AlertsManagement/alerts/{alertId}/history'.
    fullName: getHistory
    remarks: ''
    isDeprecated: false
    syntax:
      content: >-
        getHistory: (scope: string, alertId: string, options?:
        AlertsGetHistoryOptionalParams) => Promise<AlertModification>
      return:
        description: ''
        type: >-
          (scope: string, alertId: string, options?:
          AlertsGetHistoryOptionalParams) =&gt; Promise&lt;AlertModification&gt;
  - name: getHistoryTenant
    uid: '@azure/arm-alertsmanagement.AlertsOperations.getHistoryTenant'
    package: '@azure/arm-alertsmanagement'
