name: PaymentStatus
uid: '@azure/arm-reservations.PaymentStatus'
package: '@azure/arm-reservations'
summary: >-
  Describes whether the payment is completed, failed, cancelled or scheduled in
  the future. \

  [KnownPaymentStatus](xref:@azure/arm-reservations.KnownPaymentStatus) can be
