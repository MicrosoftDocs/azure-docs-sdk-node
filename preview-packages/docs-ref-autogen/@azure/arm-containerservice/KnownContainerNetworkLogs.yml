### YamlMime:TSEnum
name: KnownContainerNetworkLogs
uid: '@azure/arm-containerservice.KnownContainerNetworkLogs'
package: '@azure/arm-containerservice'
summary: >-
  Configures container network logs ingestion with Azure Monitor. Which network
  logs to ingest is controlled by the CRD found in the following links. No
  network logs are ingested by default. More information on container network
  logs can be found at https://aka.ms/ContainerNetworkLogsDoc. More information
  on configuring container network log can be found at
  https://aka.ms/acns/howtoenablecnl. If not specified, the default is Disabled.
fullName: KnownContainerNetworkLogs
remarks: ''
isDeprecated: false
fields:
  - name: Disabled
    uid: '@azure/arm-containerservice.KnownContainerNetworkLogs.Disabled'
    package: '@azure/arm-containerservice'
    summary: Azure monitor ingestion of container network logs is disabled
  - name: Enabled
    uid: '@azure/arm-containerservice.KnownContainerNetworkLogs.Enabled'
    package: '@azure/arm-containerservice'
    summary: Azure monitor ingestion of container network logs is enabled
