name: PolicyType
uid: '@azure/arm-policy.PolicyType'
package: '@azure/arm-policy'
summary: >-
  The type of policy definition. Possible values are NotSpecified, BuiltIn,
  Custom, and Static. \

  [KnownPolicyType](xref:@azure/arm-policy.KnownPolicyType) can be used
  interchangeably with PolicyType,
   this enum contains the known values that the service supports.
  ### Known values supported by the service

  **NotSpecified**: The not specified policy definition type. \

  **BuiltIn**: The built in policy definition type. \

  **Custom**: The custom policy definition type. \

  **Static**: The static policy definition type.
fullName: PolicyType
