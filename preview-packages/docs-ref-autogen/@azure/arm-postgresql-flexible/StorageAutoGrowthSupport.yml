### YamlMime:TSTypeAlias
name: StorageAutoGrowthSupport
uid: '@azure/arm-postgresql-flexible.StorageAutoGrowthSupport'
package: '@azure/arm-postgresql-flexible'
summary: >-
  Indicates if storage autogrow is supported in this location. 'Enabled' means
  storage autogrow is supported. 'Disabled' stands for storage autogrow is not
  supported. Will be deprecated in the future. Look to Supported Features for
  'StorageAutoGrowth'. \

  [KnownStorageAutoGrowthSupport](xref:@azure/arm-postgresql-flexible.KnownStorageAutoGrowthSupport)
  can be used interchangeably with StorageAutoGrowthSupport,
   this enum contains the known values that the service supports.
  ### Known values supported by the service

  **Enabled** \

  **Disabled**
fullName: StorageAutoGrowthSupport
remarks: ''
isDeprecated: false
syntax: |
  type StorageAutoGrowthSupport = string
