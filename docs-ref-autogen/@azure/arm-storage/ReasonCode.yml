### YamlMime:TSTypeAlias
name: ReasonCode
uid: '@azure/arm-storage.ReasonCode'
package: '@azure/arm-storage'
summary: >-
  The reason for the restriction. As of now this can be "QuotaId" or
  "NotAvailableForSubscription". Quota Id is set when the SKU has requiredQuotas
  parameter as the subscription does not belong to that quota. The
  "NotAvailableForSubscription" is related to capacity at DC. \

  [KnownReasonCode](xref:@azure/arm-storage.KnownReasonCode) can be used
  interchangeably with ReasonCode,
   this enum contains the known values that the service supports.
  ### Known values supported by the service

  **QuotaId** \

  **NotAvailableForSubscription**
fullName: ReasonCode
remarks: ''
isDeprecated: false
syntax: |
  type ReasonCode = string
