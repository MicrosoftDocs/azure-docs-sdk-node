### YamlMime:TSTypeAlias
name: ArmOrigin
uid: '@azure/arm-monitorworkspaces.ArmOrigin'
package: '@azure/arm-monitorworkspaces'
summary: >-
  The intended executor of the operation; as in Resource Based Access Control
  (RBAC) and audit logs UX. Default value is "user,system" \

  [KnownArmOrigin](xref:@azure/arm-monitorworkspaces.KnownArmOrigin) can be used
  interchangeably with ArmOrigin,
   this enum contains the known values that the service supports.
  ### Known values supported by the service

  **user**: Indicates the operation is initiated by a user. \

  **system**: Indicates the operation is initiated by a system. \

  **user,system**: Indicates the operation is initiated by a user or system.
fullName: ArmOrigin
remarks: ''
isDeprecated: false
syntax: |
  type ArmOrigin = string
