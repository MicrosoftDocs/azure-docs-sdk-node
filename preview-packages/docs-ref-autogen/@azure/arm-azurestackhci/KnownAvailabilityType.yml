### YamlMime:TSEnum
name: KnownAvailabilityType
uid: '@azure/arm-azurestackhci.KnownAvailabilityType'
package: '@azure/arm-azurestackhci'
summary: >-
  Indicates how the update content is made available for download. This
  determines whether the update is sourced locally, from an online repository,
  or requires user notification.
fullName: KnownAvailabilityType
remarks: ''
isDeprecated: false
fields:
  - name: Local
    uid: '@azure/arm-azurestackhci.KnownAvailabilityType.Local'
    package: '@azure/arm-azurestackhci'
    summary: The update content is available locally within the environment.
  - name: Notify
    uid: '@azure/arm-azurestackhci.KnownAvailabilityType.Notify'
    package: '@azure/arm-azurestackhci'
    summary: The system will notify the user when update content becomes available.
  - name: Online
    uid: '@azure/arm-azurestackhci.KnownAvailabilityType.Online'
    package: '@azure/arm-azurestackhci'
    summary: The update content is available from an online source.
