    uid: >-
      @azure/arm-storagecache.AutoExportJobProperties.lastSuccessfulIterationCompletionTimeUTC
    package: '@azure/arm-storagecache'
    summary: >-
      Time (in UTC) of the last successfully completed export iteration. Look at
