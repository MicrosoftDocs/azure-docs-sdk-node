### YamlMime:TSTypeAlias
name: AdvertiseToFabric
uid: '@azure/arm-networkcloud.AdvertiseToFabric'
package: '@azure/arm-networkcloud'
summary: >-
  The indicator of if this advertisement is also made to the network fabric
  associated with the Network Cloud Cluster. This field is ignored if
  fabricPeeringEnabled is set to False. \

  [KnownAdvertiseToFabric](xref:@azure/arm-networkcloud.KnownAdvertiseToFabric)
  can be used interchangeably with AdvertiseToFabric,
   this enum contains the known values that the service supports.
  ### Known values supported by the service

  **True**: Advertise to fabric \

  **False**: Do not advertise to fabric
fullName: AdvertiseToFabric
remarks: ''
isDeprecated: false
syntax: |
  type AdvertiseToFabric = string
