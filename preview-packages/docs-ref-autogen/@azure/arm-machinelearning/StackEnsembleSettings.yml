  - name: stackMetaLearnerType
    uid: '@azure/arm-machinelearning.StackEnsembleSettings.stackMetaLearnerType'
    package: '@azure/arm-machinelearning'
    summary: >-
      The meta-learner is a model trained on the output of the individual
      heterogeneous models.\r\nDefault meta-learners are LogisticRegression for
      classification tasks (or LogisticRegressionCV if cross-validation is
      enabled) and ElasticNet for regression/forecasting tasks (or ElasticNetCV
      if cross-validation is enabled).\r\nThis parameter can be one of the
      following strings: LogisticRegression, LogisticRegressionCV,
      LightGBMClassifier, ElasticNet, ElasticNetCV, LightGBMRegressor, or
      LinearRegression
    fullName: stackMetaLearnerType
