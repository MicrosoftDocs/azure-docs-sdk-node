### YamlMime:TSType
name: AutoExportJobProperties
uid: '@azure/arm-storagecache.AutoExportJobProperties'
package: '@azure/arm-storagecache'
summary: Properties of the auto export job.
fullName: AutoExportJobProperties
remarks: ''
isDeprecated: false
type: interface
properties:
  - name: adminStatus
    uid: '@azure/arm-storagecache.AutoExportJobProperties.adminStatus'
    package: '@azure/arm-storagecache'
    summary: >-
      The administrative status of the auto export job. Possible values:
      'Enable', 'Disable'. Passing in a value of 'Disable' will disable the
      current active auto export job. By default it is set to 'Enable'.
    fullName: adminStatus
    remarks: ''
    isDeprecated: false
    syntax:
      content: 'adminStatus?: string'
      return:
        description: ''
        type: string
  - name: autoExportPrefixes
    uid: '@azure/arm-storagecache.AutoExportJobProperties.autoExportPrefixes'
    package: '@azure/arm-storagecache'
    summary: >-
      An array of blob paths/prefixes that get auto exported to the cluster
      namespace. It has '/' as the default value. Number of maximum allowed
      paths for now is 1.
    fullName: autoExportPrefixes
    remarks: ''
    isDeprecated: false
    syntax:
      content: 'autoExportPrefixes?: string[]'
      return:
        description: ''
        type: string[]
  - name: currentIterationFilesDiscovered
    uid: >-
      @azure/arm-storagecache.AutoExportJobProperties.currentIterationFilesDiscovered
    package: '@azure/arm-storagecache'
    summary: >-
      Files discovered for export in current iteration. It may increase while
      more export items are found.
    fullName: currentIterationFilesDiscovered
    remarks: ''
    isDeprecated: false
    syntax:
      content: 'currentIterationFilesDiscovered?: number'
      return:
        description: ''
        type: number
  - name: currentIterationFilesExported
    uid: >-
      @azure/arm-storagecache.AutoExportJobProperties.currentIterationFilesExported
    package: '@azure/arm-storagecache'
    summary: Files that have been exported in current iteration.
    fullName: currentIterationFilesExported
    remarks: ''
    isDeprecated: false
    syntax:
      content: 'currentIterationFilesExported?: number'
      return:
        description: ''
        type: number
  - name: currentIterationFilesFailed
    uid: >-
      @azure/arm-storagecache.AutoExportJobProperties.currentIterationFilesFailed
    package: '@azure/arm-storagecache'
    summary: Files failed to export in current iteration.
    fullName: currentIterationFilesFailed
    remarks: ''
    isDeprecated: false
    syntax:
      content: 'currentIterationFilesFailed?: number'
      return:
        description: ''
        type: number
  - name: currentIterationMiBDiscovered
    uid: >-
      @azure/arm-storagecache.AutoExportJobProperties.currentIterationMiBDiscovered
    package: '@azure/arm-storagecache'
    summary: >-
      Data (in MiB) discovered for export in current iteration. It may increase
