### YamlMime:TSTypeAlias
name: ScanOperationStatus
uid: '@azure/arm-security.ScanOperationStatus'
package: '@azure/arm-security'
summary: >-
  The scan operation status. \

  [KnownScanOperationStatus](xref:@azure/arm-security.KnownScanOperationStatus)
  can be used interchangeably with ScanOperationStatus,
   this enum contains the known values that the service supports.
  ### Known values supported by the service

  **Passed**: The scan completed successfully with no vulnerabilities found. \

  **Failed**: The scan completed but found vulnerabilities. \

  **FailedToRun**: The scan failed to execute. \

  **InProgress**: The scan is currently running.
fullName: ScanOperationStatus
remarks: ''
isDeprecated: false
syntax: |
  type ScanOperationStatus = string
