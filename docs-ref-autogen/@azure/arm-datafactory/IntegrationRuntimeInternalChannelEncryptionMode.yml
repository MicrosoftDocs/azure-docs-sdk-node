package: '@azure/arm-datafactory'
summary: >-
  It is used to set the encryption mode for node-node communication channel
  (when more than 2 self-hosted integration runtime nodes exist). \

  [KnownIntegrationRuntimeInternalChannelEncryptionMode](xref:@azure/arm-datafactory.KnownIntegrationRuntimeInternalChannelEncryptionMode)
  can be used interchangeably with
  IntegrationRuntimeInternalChannelEncryptionMode,
   this enum contains the known values that the service supports.
  ### Known values supported by the service

  **NotSet**: NotSet \

  **SslEncrypted**: SslEncrypted \

  **NotEncrypted**: NotEncrypted
