### YamlMime:TSTypeAlias
name: TpmAttestationAuthenticationType
uid: '@azure/arm-attestation.TpmAttestationAuthenticationType'
package: '@azure/arm-attestation'
summary: >-
  The type for specifying the requirement of authentication for TPM Attestation
  REST APIs. \

  [KnownTpmAttestationAuthenticationType](xref:@azure/arm-attestation.KnownTpmAttestationAuthenticationType)
  can be used interchangeably with TpmAttestationAuthenticationType,
   this enum contains the known values that the service supports.
  ### Known values supported by the service

  **Enabled**: Enables the requirement of authentication for TPM Attestation
  REST APIs. \

  **Disabled**: Disables the requirement of authentication for TPM Attestation
  REST APIs.
fullName: TpmAttestationAuthenticationType
remarks: ''
isDeprecated: false
syntax: |
  type TpmAttestationAuthenticationType = string
