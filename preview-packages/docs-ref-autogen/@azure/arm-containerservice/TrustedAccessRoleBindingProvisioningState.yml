name: TrustedAccessRoleBindingProvisioningState
uid: '@azure/arm-containerservice.TrustedAccessRoleBindingProvisioningState'
package: '@azure/arm-containerservice'
summary: >-
  The current provisioning state of trusted access role binding. \

  [KnownTrustedAccessRoleBindingProvisioningState](xref:@azure/arm-containerservice.KnownTrustedAccessRoleBindingProvisioningState)
  can be used interchangeably with TrustedAccessRoleBindingProvisioningState,
   this enum contains the known values that the service supports.
  ### Known values supported by the service

  **Canceled**: Trusted access role binding provisioning was canceled. \

  **Deleting**: Trusted access role binding is being deleted. \

  **Failed**: Trusted access role binding provisioning failed. \

  **Succeeded**: Trusted access role binding provisioning succeeded. \

  **Updating**: Trusted access role binding is being updated.
