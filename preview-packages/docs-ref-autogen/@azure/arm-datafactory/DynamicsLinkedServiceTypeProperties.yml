### YamlMime:TSType
name: DynamicsLinkedServiceTypeProperties
uid: '@azure/arm-datafactory.DynamicsLinkedServiceTypeProperties'
package: '@azure/arm-datafactory'
summary: Dynamics linked service properties.
fullName: DynamicsLinkedServiceTypeProperties
remarks: ''
isDeprecated: false
type: interface
properties:
  - name: authenticationType
    uid: >-
      @azure/arm-datafactory.DynamicsLinkedServiceTypeProperties.authenticationType
    package: '@azure/arm-datafactory'
    summary: >-
      The authentication type to connect to Dynamics server. 'Office365' for
      online scenario, 'Ifd' for on-premises with Ifd scenario,
      'AADServicePrincipal' for Server-To-Server authentication in online
      scenario, 'Active Directory' for Dynamics on-premises with IFD. Type:
      string (or Expression with resultType string).
    fullName: authenticationType
    remarks: ''
    isDeprecated: false
    syntax:
      content: 'authenticationType: any'
      return:
        description: ''
        type: any
  - name: credential
    uid: '@azure/arm-datafactory.DynamicsLinkedServiceTypeProperties.credential'
    package: '@azure/arm-datafactory'
    summary: The credential reference containing authentication information.
    fullName: credential
    remarks: ''
    isDeprecated: false
    syntax:
      content: 'credential?: CredentialReference'
      return:
        description: ''
        type: <xref uid="@azure/arm-datafactory.CredentialReference" />
  - name: deploymentType
    uid: '@azure/arm-datafactory.DynamicsLinkedServiceTypeProperties.deploymentType'
    package: '@azure/arm-datafactory'
    summary: >-
      The deployment type of the Dynamics instance. 'Online' for Dynamics Online
      and 'OnPremisesWithIfd' for Dynamics on-premises with Ifd. Type: string
      (or Expression with resultType string).
    fullName: deploymentType
    remarks: ''
    isDeprecated: false
    syntax:
      content: 'deploymentType: any'
      return:
        description: ''
        type: any
  - name: domain
    uid: '@azure/arm-datafactory.DynamicsLinkedServiceTypeProperties.domain'
    package: '@azure/arm-datafactory'
    summary: >-
      The Active Directory domain that will verify user credentials. Type:
      string (or Expression with resultType string).
    fullName: domain
    remarks: ''
    isDeprecated: false
    syntax:
      content: 'domain?: any'
      return:
        description: ''
        type: any
  - name: encryptedCredential
    uid: >-
      @azure/arm-datafactory.DynamicsLinkedServiceTypeProperties.encryptedCredential
    package: '@azure/arm-datafactory'
    summary: >-
      The encrypted credential used for authentication. Credentials are
      encrypted using the integration runtime credential manager. Type: string.
    fullName: encryptedCredential
    remarks: ''
    isDeprecated: false
    syntax:
      content: 'encryptedCredential?: string'
      return:
        description: ''
        type: string
  - name: hostName
    uid: '@azure/arm-datafactory.DynamicsLinkedServiceTypeProperties.hostName'
    package: '@azure/arm-datafactory'
    summary: >-
      The host name of the on-premises Dynamics server. The property is required
      for on-prem and not allowed for online. Type: string (or Expression with
      resultType string).
    fullName: hostName
    remarks: ''
    isDeprecated: false
    syntax:
      content: 'hostName?: any'
      return:
        description: ''
        type: any
  - name: organizationName
    uid: >-
      @azure/arm-datafactory.DynamicsLinkedServiceTypeProperties.organizationName
    package: '@azure/arm-datafactory'
    summary: >-
      The organization name of the Dynamics instance. The property is required
      for on-prem and required for online when there are more than one Dynamics
      instances associated with the user. Type: string (or Expression with
      resultType string).
    fullName: organizationName
    remarks: ''
    isDeprecated: false
    syntax:
      content: 'organizationName?: any'
      return:
        description: ''
        type: any
  - name: password
    uid: '@azure/arm-datafactory.DynamicsLinkedServiceTypeProperties.password'
    package: '@azure/arm-datafactory'
    summary: Password to access the Dynamics instance.
    fullName: password
    remarks: ''
    isDeprecated: false
    syntax:
      content: 'password?: SecretBaseUnion'
      return:
        description: ''
        type: <xref uid="@azure/arm-datafactory.SecretBaseUnion" />
  - name: port
    uid: '@azure/arm-datafactory.DynamicsLinkedServiceTypeProperties.port'
    package: '@azure/arm-datafactory'
    summary: >-
      The port of on-premises Dynamics server. The property is required for
      on-prem and not allowed for online. Default is 443. Type: integer (or
      Expression with resultType integer), minimum: 0.
    fullName: port
    remarks: ''
    isDeprecated: false
    syntax:
      content: 'port?: any'
      return:
        description: ''
        type: any
  - name: servicePrincipalCredential
    uid: >-
      @azure/arm-datafactory.DynamicsLinkedServiceTypeProperties.servicePrincipalCredential
    package: '@azure/arm-datafactory'
    summary: >-
      The credential of the service principal object in Azure Active Directory.
      If servicePrincipalCredentialType is 'ServicePrincipalKey',
      servicePrincipalCredential can be SecureString or
      AzureKeyVaultSecretReference. If servicePrincipalCredentialType is
      'ServicePrincipalCert', servicePrincipalCredential can only be
      AzureKeyVaultSecretReference.
    fullName: servicePrincipalCredential
    remarks: ''
    isDeprecated: false
    syntax:
      content: 'servicePrincipalCredential?: SecretBaseUnion'
      return:
        description: ''
        type: <xref uid="@azure/arm-datafactory.SecretBaseUnion" />
  - name: servicePrincipalCredentialType
    uid: >-
      @azure/arm-datafactory.DynamicsLinkedServiceTypeProperties.servicePrincipalCredentialType
    package: '@azure/arm-datafactory'
    summary: >-
      The service principal credential type to use in Server-To-Server
      authentication. 'ServicePrincipalKey' for key/secret,
      'ServicePrincipalCert' for certificate. Type: string (or Expression with
      resultType string).
    fullName: servicePrincipalCredentialType
    remarks: ''
    isDeprecated: false
    syntax:
      content: 'servicePrincipalCredentialType?: any'
      return:
        description: ''
        type: any
  - name: servicePrincipalId
    uid: >-
      @azure/arm-datafactory.DynamicsLinkedServiceTypeProperties.servicePrincipalId
    package: '@azure/arm-datafactory'
    summary: >-
      The client ID of the application in Azure Active Directory used for
      Server-To-Server authentication. Type: string (or Expression with
      resultType string).
    fullName: servicePrincipalId
    remarks: ''
    isDeprecated: false
    syntax:
      content: 'servicePrincipalId?: any'
      return:
        description: ''
        type: any
  - name: serviceUri
    uid: '@azure/arm-datafactory.DynamicsLinkedServiceTypeProperties.serviceUri'
    package: '@azure/arm-datafactory'
    summary: >-
      The URL to the Microsoft Dynamics server. The property is required for
      on-line and not allowed for on-prem. Type: string (or Expression with
      resultType string).
    fullName: serviceUri
    remarks: ''
    isDeprecated: false
    syntax:
      content: 'serviceUri?: any'
      return:
        description: ''
        type: any
  - name: username
    uid: '@azure/arm-datafactory.DynamicsLinkedServiceTypeProperties.username'
    package: '@azure/arm-datafactory'
    summary: >-
      User name to access the Dynamics instance. Type: string (or Expression
      with resultType string).
    fullName: username
    remarks: ''
    isDeprecated: false
    syntax:
      content: 'username?: any'
      return:
        description: ''
        type: any
