### YamlMime:TSTypeAlias
name: HighAvailability
uid: '@azure/arm-redisenterprisecache.HighAvailability'
package: '@azure/arm-redisenterprisecache'
summary: >-
  Enabled by default. If highAvailability is disabled, the data set is not
  replicated. This affects the availability SLA, and increases the risk of data
  loss. \

  [KnownHighAvailability](xref:@azure/arm-redisenterprisecache.KnownHighAvailability)
  can be used interchangeably with HighAvailability,
   this enum contains the known values that the service supports.
  ### Known values supported by the service

  **Enabled**: Enabled \

  **Disabled**: Disabled
fullName: HighAvailability
remarks: ''
isDeprecated: false
syntax: |
  type HighAvailability = string
