  - name: groupPresenceEvents
    uid: '@azure/arm-webpubsub.EventHandler.groupPresenceEvents'
    package: '@azure/arm-webpubsub'
    summary: >-
      The group presence events that this event handler is concerned with. Group
      presence events are triggered when connections join or leave groups in the
      hub. If the value is null, no presence events will be sent to this event
      handler.
    fullName: groupPresenceEvents
    remarks: ''
    isDeprecated: false
    syntax:
      content: 'groupPresenceEvents?: GroupPresenceEventFilters'
      return:
        description: ''
        type: <xref uid="@azure/arm-webpubsub.GroupPresenceEventFilters" />
  - name: systemEvents
    uid: '@azure/arm-webpubsub.EventHandler.systemEvents'
    package: '@azure/arm-webpubsub'
    summary: Gets or sets the list of system events.
    fullName: systemEvents
    remarks: ''
    isDeprecated: false
    syntax:
      content: 'systemEvents?: string[]'
      return:
        description: ''
        type: string[]
  - name: urlTemplate
    uid: '@azure/arm-webpubsub.EventHandler.urlTemplate'
    package: '@azure/arm-webpubsub'
    summary: >-
      Gets or sets the URL template for the event handler. The actual URL is
      calculated when the corresponding event is triggered.

      The template supports predefined parameters syntax: `{event}`, `{hub}`,
      and KeyVault reference syntax
      `{@Microsoft.KeyVault(SecretUri=_your_secret_identifier_)}`

      For example, if the template is `http://example.com/api/{event}`, when
      `connect` event is triggered, a POST request will be sent to the URL
      `http://example.com/chat/api/connect`.

      Note: Parameters are not allowed in the hostname of the URL, and curly
      brackets `{}` are reserved for parameter syntax only. If your URL path
      contains literal curly brackets, please URL-encode them to ensure proper
      handling.
    fullName: urlTemplate
    remarks: ''
    isDeprecated: false
    syntax:
      content: 'urlTemplate: string'
      return:
        description: ''
        type: string
  - name: userEventPattern
    uid: '@azure/arm-webpubsub.EventHandler.userEventPattern'
    package: '@azure/arm-webpubsub'
    summary: >-
      Gets or sets the matching pattern for event names.

      There are 3 kinds of patterns supported:

      1. "*", it matches any event name

      2. Combine multiple events with ",", for example "event1,event2", it
      matches event "event1" and "event2"

      3. A single event name, for example, "event1", it matches "event1"
    fullName: userEventPattern
    remarks: ''
    isDeprecated: false
    syntax:
      content: 'userEventPattern?: string'
      return:
        description: ''
        type: string
