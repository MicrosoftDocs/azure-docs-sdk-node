### YamlMime:TSTypeAlias
name: DataMaskingRuleState
uid: '@azure/arm-sql.DataMaskingRuleState'
package: '@azure/arm-sql'
summary: >-
  The rule state. Used to delete a rule. To delete an existing rule, specify the
  schemaName, tableName, columnName, maskingFunction, and specify ruleState as
  disabled. However, if the rule doesn't already exist, the rule will be created
  with ruleState set to enabled, regardless of the provided value of ruleState.
fullName: DataMaskingRuleState
remarks: ''
isDeprecated: false
syntax: |
  type DataMaskingRuleState = "Enabled" | "Disabled"
