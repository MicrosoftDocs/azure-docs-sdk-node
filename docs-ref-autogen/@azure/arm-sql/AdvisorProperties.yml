### YamlMime:TSType
name: AdvisorProperties
uid: '@azure/arm-sql.AdvisorProperties'
package: '@azure/arm-sql'
summary: Properties for a Database, Server or Elastic Pool Advisor.
fullName: AdvisorProperties
remarks: ''
isDeprecated: false
type: interface
properties:
  - name: advisorStatus
    uid: '@azure/arm-sql.AdvisorProperties.advisorStatus'
    package: '@azure/arm-sql'
    summary: >-
      Gets the status of availability of this advisor to customers. Possible
      values are 'GA', 'PublicPreview', 'LimitedPublicPreview' and
      'PrivatePreview'.
    fullName: advisorStatus
    remarks: ''
    isDeprecated: false
    syntax:
      content: 'advisorStatus?: AdvisorStatus'
      return:
        description: ''
        type: <xref uid="@azure/arm-sql.AdvisorStatus" />
  - name: autoExecuteStatus
    uid: '@azure/arm-sql.AdvisorProperties.autoExecuteStatus'
    package: '@azure/arm-sql'
    summary: >-
      Gets the auto-execute status (whether to let the system execute the
      recommendations) of this advisor. Possible values are 'Enabled' and
      'Disabled'
    fullName: autoExecuteStatus
    remarks: ''
    isDeprecated: false
    syntax:
      content: 'autoExecuteStatus: AutoExecuteStatus'
      return:
        description: ''
        type: <xref uid="@azure/arm-sql.AutoExecuteStatus" />
  - name: autoExecuteStatusInheritedFrom
    uid: '@azure/arm-sql.AdvisorProperties.autoExecuteStatusInheritedFrom'
    package: '@azure/arm-sql'
    summary: >-
      Gets the resource from which current value of auto-execute status is
      inherited. Auto-execute status can be set on (and inherited from)
      different levels in the resource hierarchy. Possible values are
      'Subscription', 'Server', 'ElasticPool', 'Database' and 'Default' (when
      status is not explicitly set on any level).
    fullName: autoExecuteStatusInheritedFrom
    remarks: ''
    isDeprecated: false
    syntax:
      content: 'autoExecuteStatusInheritedFrom?: AutoExecuteStatusInheritedFrom'
      return:
        description: ''
        type: <xref uid="@azure/arm-sql.AutoExecuteStatusInheritedFrom" />
  - name: lastChecked
    uid: '@azure/arm-sql.AdvisorProperties.lastChecked'
    package: '@azure/arm-sql'
    summary: >-
      Gets the time when the current resource was analyzed for recommendations
      by this advisor.
    fullName: lastChecked
    remarks: ''
    isDeprecated: false
    syntax:
      content: 'lastChecked?: Date'
      return:
        description: ''
        type: Date
  - name: recommendationsStatus
    uid: '@azure/arm-sql.AdvisorProperties.recommendationsStatus'
    package: '@azure/arm-sql'
    summary: >-
      Gets that status of recommendations for this advisor and reason for not
      having any recommendations. Possible values include, but are not limited
      to, 'Ok' (Recommendations available),LowActivity (not enough workload to
      analyze), 'DbSeemsTuned' (Database is doing well), etc.
    fullName: recommendationsStatus
    remarks: ''
    isDeprecated: false
    syntax:
      content: 'recommendationsStatus?: string'
      return:
        description: ''
        type: string
  - name: recommendedActions
    uid: '@azure/arm-sql.AdvisorProperties.recommendedActions'
    package: '@azure/arm-sql'
    summary: Gets the recommended actions for this advisor.
    fullName: recommendedActions
    remarks: ''
    isDeprecated: false
    syntax:
      content: 'recommendedActions?: RecommendedAction[]'
      return:
        description: ''
        type: <xref uid="@azure/arm-sql.RecommendedAction" />[]
