### YamlMime:TSType
name: BucketPatchProperties
uid: '@azure/arm-netapp.BucketPatchProperties'
package: '@azure/arm-netapp'
summary: Bucket resource properties for a Patch operation
fullName: BucketPatchProperties
remarks: ''
isDeprecated: false
type: interface
properties:
  - name: akvDetails
    uid: '@azure/arm-netapp.BucketPatchProperties.akvDetails'
    package: '@azure/arm-netapp'
    summary: >-
      Specifies the Azure Key Vault settings. These are used when

      a) retrieving the bucket server certificate, and

      b) storing the bucket credentials


      Notes:


      1. If a bucket certificate was previously provided directly using the
      certificateObject property, it is possible to subsequently use the Azure
      Key Vault for certificate management by using these 'akvDetails'
      properties. However, once Azure Key Vault is configured, it is no longer
      possible to provide the certificate directly via the certificateObject
      property.

      2. These properties are mutually exclusive with the
      server.certificateObject property.
    fullName: akvDetails
    remarks: ''
    isDeprecated: false
    syntax:
      content: 'akvDetails?: AzureKeyVaultDetails'
      return:
        description: ''
        type: <xref uid="@azure/arm-netapp.AzureKeyVaultDetails" />
  - name: fileSystemUser
    uid: '@azure/arm-netapp.BucketPatchProperties.fileSystemUser'
    package: '@azure/arm-netapp'
    summary: >-
      File System user having access to volume data. For Unix, this is the
      user's uid and gid. For Windows, this is the user's username. Note that
      the Unix and Windows user details are mutually exclusive, meaning one or
      other must be supplied, but not both.
    fullName: fileSystemUser
    remarks: ''
    isDeprecated: false
    syntax:
      content: 'fileSystemUser?: FileSystemUser'
      return:
        description: ''
        type: <xref uid="@azure/arm-netapp.FileSystemUser" />
  - name: permissions
    uid: '@azure/arm-netapp.BucketPatchProperties.permissions'
    package: '@azure/arm-netapp'
    summary: Access permissions for the bucket. Either ReadOnly or ReadWrite.
    fullName: permissions
    remarks: ''
    isDeprecated: false
    syntax:
      content: 'permissions?: string'
      return:
        description: ''
        type: string
  - name: provisioningState
    uid: '@azure/arm-netapp.BucketPatchProperties.provisioningState'
    package: '@azure/arm-netapp'
    summary: Provisioning state of the resource
    fullName: provisioningState
    remarks: ''
    isDeprecated: false
    syntax:
      content: 'provisioningState?: string'
      return:
        description: ''
        type: string
  - name: server
    uid: '@azure/arm-netapp.BucketPatchProperties.server'
    package: '@azure/arm-netapp'
    summary: Properties of the server managing the lifecycle of volume buckets
    fullName: server
    remarks: ''
    isDeprecated: false
    syntax:
