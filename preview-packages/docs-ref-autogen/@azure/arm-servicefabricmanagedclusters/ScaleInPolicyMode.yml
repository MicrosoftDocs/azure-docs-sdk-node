### YamlMime:TSTypeAlias
name: ScaleInPolicyMode
uid: '@azure/arm-servicefabricmanagedclusters.ScaleInPolicyMode'
package: '@azure/arm-servicefabricmanagedclusters'
summary: >-
  Specifies the scale in policy mode for a node type. \

  [KnownScaleInPolicyMode](xref:@azure/arm-servicefabricmanagedclusters.KnownScaleInPolicyMode)
  can be used interchangeably with ScaleInPolicyMode,
   this enum contains the known values that the service supports.
  ### Known values supported by the service

  **Default**: Default scale in policy mode where the system will choose which
  nodes to remove when scaling in. \

  **OldestNodeFirst**: OldestNodeFirst scale in policy mode where the oldest
  node in the node type will be removed first when scaling in. \

  **NewestNodeFirst**: NewestNodeFirst scale in policy mode where the newest
  node in the node type will be removed first when scaling in.
fullName: ScaleInPolicyMode
remarks: ''
isDeprecated: false
syntax: |
  type ScaleInPolicyMode = string
