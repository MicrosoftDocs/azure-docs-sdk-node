name: RegistrationRequirement
uid: '@azure/arm-billing-trust.RegistrationRequirement'
package: '@azure/arm-billing-trust'
summary: >-
  Whether a registration number is required for the sold-to country. Extensible
  — additional states may be introduced as country-specific tax requirements
  evolve. \

  [KnownRegistrationRequirement](xref:@azure/arm-billing-trust.KnownRegistrationRequirement)
  can be used interchangeably with RegistrationRequirement,
   this enum contains the known values that the service supports.
  ### Known values supported by the service

  **required**: A registration number is required for the sold-to country. \

  **optional**: A registration number is optional for the sold-to country. \

  **notApplicable**: A registration number is not applicable for the sold-to
  country.
fullName: RegistrationRequirement
remarks: ''
isDeprecated: false
syntax: |
  type RegistrationRequirement = string
