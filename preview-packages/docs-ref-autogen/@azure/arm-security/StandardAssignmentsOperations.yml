  - name: create
    uid: '@azure/arm-security.StandardAssignmentsOperations.create'
    package: '@azure/arm-security'
    summary: >-
      This operation creates or updates a standard assignment with the given
      scope and name. standard assignments apply to all resources contained
      within their scope. For example, when you assign a policy at resource
      group scope, that policy applies to all resources in the group.
    fullName: create
    remarks: ''
    isDeprecated: false
    syntax:
      content: >-
        create: (resourceId: string, standardAssignmentName: string,
