### YamlMime:TSTypeAlias
name: AdditionalAuthenticationType
uid: '@azure/arm-containerregistry.AdditionalAuthenticationType'
package: '@azure/arm-containerregistry'
summary: >-
  The type of authentication configuration used by a cache rule to access an
  upstream registry. \

  [KnownAdditionalAuthenticationType](xref:@azure/arm-containerregistry.KnownAdditionalAuthenticationType)
  can be used interchangeably with AdditionalAuthenticationType,
   this enum contains the known values that the service supports.
  ### Known values supported by the service

  **GoogleArtifactRegistry**: Google Artifact Registry (GAR) authentication via
  workload identity federation.
fullName: AdditionalAuthenticationType
remarks: ''
isDeprecated: false
syntax: |
  type AdditionalAuthenticationType = string
