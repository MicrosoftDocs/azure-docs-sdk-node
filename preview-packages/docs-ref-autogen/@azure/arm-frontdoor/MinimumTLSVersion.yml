name: MinimumTLSVersion
uid: '@azure/arm-frontdoor.MinimumTLSVersion'
package: '@azure/arm-frontdoor'
summary: >-
  The minimum TLS version required from the clients to establish an SSL
  handshake with Front Door. \

  [KnownMinimumTLSVersion](xref:@azure/arm-frontdoor.KnownMinimumTLSVersion) can
  be used interchangeably with MinimumTLSVersion,
   this enum contains the known values that the service supports.
  ### Known values supported by the service

  **1.0**: 1.0 \

  **1.2**: 1.2
