name: ReadWriteEndpointFailoverPolicy
uid: '@azure/arm-sql.ReadWriteEndpointFailoverPolicy'
package: '@azure/arm-sql'
summary: >-
  Failover policy of the read-write endpoint for the failover group. If
  failoverPolicy is Automatic then failoverWithDataLossGracePeriodMinutes is
  required. \

  [KnownReadWriteEndpointFailoverPolicy](xref:@azure/arm-sql.KnownReadWriteEndpointFailoverPolicy)
  can be used interchangeably with ReadWriteEndpointFailoverPolicy,
   this enum contains the known values that the service supports.
  ### Known values supported by the service

  **Manual**: Manual \

  **Automatic**: Automatic
