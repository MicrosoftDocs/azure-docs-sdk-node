name: HttpAuthenticationType
uid: '@azure/arm-datafactory.HttpAuthenticationType'
package: '@azure/arm-datafactory'
summary: >-
  The authentication type to be used to connect to the HTTP server. \

  [KnownHttpAuthenticationType](xref:@azure/arm-datafactory.KnownHttpAuthenticationType)
  can be used interchangeably with HttpAuthenticationType,
   this enum contains the known values that the service supports.
  ### Known values supported by the service

  **Basic**: Basic \

  **Anonymous**: Anonymous \

  **Digest**: Digest \

  **Windows**: Windows \

  **ClientCertificate**: ClientCertificate
