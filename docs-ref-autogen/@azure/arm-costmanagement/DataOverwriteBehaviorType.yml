### YamlMime:TSTypeAlias
name: DataOverwriteBehaviorType
uid: '@azure/arm-costmanagement.DataOverwriteBehaviorType'
package: '@azure/arm-costmanagement'
summary: >-
  Allow customers to select overwrite data(OverwritePreviousReport) for exports.
  This setting will enable overwrite data for the same month in customer storage
  account. By default set to CreateNewReport. \

  [KnownDataOverwriteBehaviorType](xref:@azure/arm-costmanagement.KnownDataOverwriteBehaviorType)
  can be used interchangeably with DataOverwriteBehaviorType,
   this enum contains the known values that the service supports.
  ### Known values supported by the service

  **OverwritePreviousReport** \

  **CreateNewReport**
fullName: DataOverwriteBehaviorType
remarks: ''
isDeprecated: false
syntax: |
  type DataOverwriteBehaviorType = string
