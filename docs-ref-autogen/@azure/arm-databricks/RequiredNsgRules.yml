### YamlMime:TSTypeAlias
name: RequiredNsgRules
uid: '@azure/arm-databricks.RequiredNsgRules'
package: '@azure/arm-databricks'
summary: >-
  Gets or sets a value indicating whether data plane (clusters) to control plane
  communication happen over private endpoint. Supported values are 'AllRules'
  and 'NoAzureDatabricksRules'. 'NoAzureServiceRules' value is for internal use
  only. Not allowed in Serverless ComputeMode workspace. \

  [KnownRequiredNsgRules](xref:@azure/arm-databricks.KnownRequiredNsgRules) can
  be used interchangeably with RequiredNsgRules,
   this enum contains the known values that the service supports.
  ### Known values supported by the service

  **AllRules**: AllRules \

  **NoAzureDatabricksRules**: NoAzureDatabricksRules \

  **NoAzureServiceRules**: NoAzureServiceRules
fullName: RequiredNsgRules
remarks: ''
isDeprecated: false
syntax: |
  type RequiredNsgRules = string
