### YamlMime:TSEnum
name: KnownPatchingMode
uid: '@azure/arm-appcontainers.KnownPatchingMode'
package: '@azure/arm-appcontainers'
summary: >-
  Patching mode for the container app. Null or default in this field will be
  interpreted as Automatic by RP. Automatic mode will automatically apply
  available patches. Manual mode will require the user to manually apply
  patches. Disabled mode will stop patch detection and auto patching.
fullName: KnownPatchingMode
remarks: ''
isDeprecated: false
fields:
  - name: Automatic
    uid: '@azure/arm-appcontainers.KnownPatchingMode.Automatic'
    package: '@azure/arm-appcontainers'
    summary: Automatic
  - name: Disabled
    uid: '@azure/arm-appcontainers.KnownPatchingMode.Disabled'
    package: '@azure/arm-appcontainers'
    summary: Disabled
  - name: Manual
    uid: '@azure/arm-appcontainers.KnownPatchingMode.Manual'
    package: '@azure/arm-appcontainers'
    summary: Manual
