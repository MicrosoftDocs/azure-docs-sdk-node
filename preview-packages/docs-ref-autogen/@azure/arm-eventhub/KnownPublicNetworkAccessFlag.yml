    package: '@azure/arm-eventhub'
    summary: Enabled
  - name: SecuredByPerimeter
    uid: '@azure/arm-eventhub.KnownPublicNetworkAccessFlag.SecuredByPerimeter'
    package: '@azure/arm-eventhub'
    summary: SecuredByPerimeter
