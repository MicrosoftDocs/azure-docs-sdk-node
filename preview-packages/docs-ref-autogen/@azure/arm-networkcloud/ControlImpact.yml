name: ControlImpact
uid: '@azure/arm-networkcloud.ControlImpact'
package: '@azure/arm-networkcloud'
summary: >-
  The indicator of whether the control plane will be impacted during the
  upgrade. \

  [KnownControlImpact](xref:@azure/arm-networkcloud.KnownControlImpact) can be
  used interchangeably with ControlImpact,
   this enum contains the known values that the service supports.
  ### Known values supported by the service

  **True**: The control plane will be impacted during the upgrade. \

  **False**: The control plane will not be impacted during the upgrade.
fullName: ControlImpact
