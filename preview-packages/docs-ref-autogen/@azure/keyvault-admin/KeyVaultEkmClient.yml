### YamlMime:TSType
name: KeyVaultEkmClient
uid: '@azure/keyvault-admin.KeyVaultEkmClient'
package: '@azure/keyvault-admin'
summary: >-
  The KeyVaultEkmClient provides asynchronous methods to create, get, update,
  delete and check

  the External Key Manager (EKM) connection for an Azure Key Vault Managed HSM.
fullName: KeyVaultEkmClient
remarks: ''
isDeprecated: false
type: class
constructors:
  - name: KeyVaultEkmClient(string, TokenCredential, EkmClientOptions)
    uid: '@azure/keyvault-admin.KeyVaultEkmClient.constructor'
    package: '@azure/keyvault-admin'
    summary: |-
      Creates an instance of the KeyVaultEkmClient.

      Example usage:
      ```ts snippet:ReadmeSampleCreateEkmClient
      import { DefaultAzureCredential } from "@azure/identity";
      import { KeyVaultEkmClient } from "@azure/keyvault-admin";

      const vaultUrl = `https://<MY KEY VAULT HERE>.managedhsm.azure.net`;
      const credentials = new DefaultAzureCredential();
      const client = new KeyVaultEkmClient(vaultUrl, credentials);
      ```
    remarks: ''
    isDeprecated: false
    syntax:
      content: >-
        new KeyVaultEkmClient(vaultUrl: string, credential: TokenCredential,
        options?: EkmClientOptions)
      parameters:
        - id: vaultUrl
          type: string
          description: >-
            the URL of the Key Vault. It should have this shape:
            `https://${your-key-vault-name}.managedhsm.azure.net`. You should
            validate that this URL references a valid Key Vault or Managed HSM
            resource. See https://aka.ms/azsdk/blog/vault-uri for details.
        - id: credential
          type: <xref uid="@azure/core-auth.TokenCredential" />
          description: >-
            An object that implements the `TokenCredential` interface used to
            authenticate requests to the service. Use the @azure/identity
            package to create a credential that suits your needs.
        - id: options
          type: <xref uid="@azure/keyvault-admin.EkmClientOptions" />
          description: options used to configure Key Vault API requests.
properties:
  - name: vaultUrl
    uid: '@azure/keyvault-admin.KeyVaultEkmClient.vaultUrl'
    package: '@azure/keyvault-admin'
    summary: The base URL to the vault.
    fullName: vaultUrl
    remarks: ''
    isDeprecated: false
    syntax:
      content: 'vaultUrl: string'
      return:
        description: ''
        type: string
methods:
  - name: checkEkmConnection(CheckEkmConnectionOptions)
    uid: '@azure/keyvault-admin.KeyVaultEkmClient.checkEkmConnection'
    package: '@azure/keyvault-admin'
    summary: |-
      Checks the connectivity and authentication with the EKM proxy.
      This operation requires the ekm/read permission.
    remarks: ''
    isDeprecated: false
    syntax:
      content: >-
        function checkEkmConnection(options?: CheckEkmConnectionOptions):
        Promise<EkmProxyInfo>
      parameters:
        - id: options
          type: <xref uid="@azure/keyvault-admin.CheckEkmConnectionOptions" />
          description: the optional parameters.
      return:
        description: ''
        type: Promise&lt;<xref uid="@azure/keyvault-admin.EkmProxyInfo" />&gt;
  - name: createEkmConnection(EkmConnection, CreateEkmConnectionOptions)
    uid: '@azure/keyvault-admin.KeyVaultEkmClient.createEkmConnection'
    package: '@azure/keyvault-admin'
    summary: >-
      Sets up the EKM connection. If the EKM connection already exists, this
      operation fails.

      This operation requires the ekm/write permission.
    remarks: ''
    isDeprecated: false
    syntax:
      content: >-
        function createEkmConnection(ekmConnection: EkmConnection, options?:
        CreateEkmConnectionOptions): Promise<EkmConnection>
      parameters:
        - id: ekmConnection
          type: <xref uid="@azure/keyvault-admin.EkmConnection" />
          description: the EKM connection to create.
        - id: options
          type: <xref uid="@azure/keyvault-admin.CreateEkmConnectionOptions" />
          description: the optional parameters.
      return:
        description: ''
        type: Promise&lt;<xref uid="@azure/keyvault-admin.EkmConnection" />&gt;
  - name: deleteEkmConnection(DeleteEkmConnectionOptions)
    uid: '@azure/keyvault-admin.KeyVaultEkmClient.deleteEkmConnection'
    package: '@azure/keyvault-admin'
    summary: >-
      Deletes the existing EKM connection. If the EKM connection does not
      already exist, this operation fails.

      This operation requires the ekm/delete permission.
    remarks: ''
    isDeprecated: false
    syntax:
      content: >-
        function deleteEkmConnection(options?: DeleteEkmConnectionOptions):
        Promise<EkmConnection>
      parameters:
        - id: options
          type: <xref uid="@azure/keyvault-admin.DeleteEkmConnectionOptions" />
          description: the optional parameters.
      return:
        description: ''
        type: Promise&lt;<xref uid="@azure/keyvault-admin.EkmConnection" />&gt;
  - name: getEkmCertificate(GetEkmCertificateOptions)
    uid: '@azure/keyvault-admin.KeyVaultEkmClient.getEkmCertificate'
    package: '@azure/keyvault-admin'
    summary: >-
      Returns the client certificate that Managed HSM uses to authenticate to
      the EKM proxy.

      This operation requires the ekm/read permission.
    remarks: ''
    isDeprecated: false
    syntax:
      content: >-
        function getEkmCertificate(options?: GetEkmCertificateOptions):
        Promise<EkmProxyClientCertificateInfo>
      parameters:
        - id: options
          type: <xref uid="@azure/keyvault-admin.GetEkmCertificateOptions" />
          description: the optional parameters.
      return:
        description: ''
        type: >-
          Promise&lt;<xref
          uid="@azure/keyvault-admin.EkmProxyClientCertificateInfo" />&gt;
  - name: getEkmConnection(GetEkmConnectionOptions)
    uid: '@azure/keyvault-admin.KeyVaultEkmClient.getEkmConnection'
    package: '@azure/keyvault-admin'
    summary: >-
      Returns the EKM connection. This operation requires the ekm/read
      permission.
    remarks: ''
    isDeprecated: false
    syntax:
      content: >-
        function getEkmConnection(options?: GetEkmConnectionOptions):
        Promise<EkmConnection>
      parameters:
        - id: options
          type: <xref uid="@azure/keyvault-admin.GetEkmConnectionOptions" />
          description: the optional parameters.
      return:
        description: ''
        type: Promise&lt;<xref uid="@azure/keyvault-admin.EkmConnection" />&gt;
  - name: updateEkmConnection(EkmConnection, UpdateEkmConnectionOptions)
    uid: '@azure/keyvault-admin.KeyVaultEkmClient.updateEkmConnection'
    package: '@azure/keyvault-admin'
    summary: >-
      Updates the existing EKM connection. If the EKM connection does not exist,
      this operation fails.

      This operation requires the ekm/write permission.
    remarks: ''
    isDeprecated: false
    syntax:
      content: >-
        function updateEkmConnection(ekmConnection: EkmConnection, options?:
        UpdateEkmConnectionOptions): Promise<EkmConnection>
      parameters:
        - id: ekmConnection
          type: <xref uid="@azure/keyvault-admin.EkmConnection" />
          description: the updated EKM connection.
        - id: options
          type: <xref uid="@azure/keyvault-admin.UpdateEkmConnectionOptions" />
          description: the optional parameters.
      return:
        description: ''
        type: Promise&lt;<xref uid="@azure/keyvault-admin.EkmConnection" />&gt;
