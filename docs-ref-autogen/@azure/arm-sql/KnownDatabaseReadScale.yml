    uid: '@azure/arm-sql.KnownDatabaseReadScale.Disabled'
    package: '@azure/arm-sql'
    summary: Disabled
  - name: Enabled
    uid: '@azure/arm-sql.KnownDatabaseReadScale.Enabled'
    package: '@azure/arm-sql'
    summary: Enabled
