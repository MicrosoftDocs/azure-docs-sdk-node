  - name: createSession
    uid: '@azure/ai-projects.AgentsOperations.createSession'
    package: '@azure/ai-projects'
    summary: >-
      Creates a new session for an agent endpoint.

      The endpoint resolves the backing agent version from `version_indicator`
      and

      enforces session ownership using the provided isolation key for
      session-mutating operations.
    fullName: createSession
    remarks: ''
    isDeprecated: false
    syntax:
      content: >-
        createSession: (agentName: string, versionIndicator:
        VersionIndicatorUnion, options?: AgentsCreateSessionOptionalParams) =>
        Promise<AgentSessionResource>
      return:
        description: ''
        type: >-
          (agentName: string, versionIndicator: VersionIndicatorUnion, options?:
          AgentsCreateSessionOptionalParams) =&gt;
          Promise&lt;AgentSessionResource&gt;
  - name: createVersionFromCode
    uid: '@azure/ai-projects.AgentsOperations.createVersionFromCode'
    package: '@azure/ai-projects'
    summary: >-
      Creates a new agent version from code. Uploads the code zip and creates a
      new version

      for an existing agent. The SHA-256 hex digest of the zip is provided in
      the

      `x-ms-code-zip-sha256` header for integrity and dedup.

      The request body is multipart/form-data with a JSON metadata part and a
      binary code part (part order is irrelevant).

      Maximum upload size is 250 MB.
    fullName: createVersionFromCode
    remarks: ''
    isDeprecated: false
    syntax:
      content: >-
        createVersionFromCode: (agentName: string, codeZipSha256: string,
        content: CreateAgentVersionFromCodeContent, options?:
        AgentsCreateVersionFromCodeOptionalParams) => Promise<AgentVersion>
      return:
        description: ''
        type: >-
          (agentName: string, codeZipSha256: string, content:
          CreateAgentVersionFromCodeContent, options?:
          AgentsCreateVersionFromCodeOptionalParams) =&gt;
          Promise&lt;AgentVersion&gt;
  - name: delete
    uid: '@azure/ai-projects.AgentsOperations.delete'
    package: '@azure/ai-projects'
    summary: >-
      Deletes an agent. For hosted agents, if any version has active sessions,
      the request

      is rejected with HTTP 409 unless `force` is set to true. When force is
      true, all

      associated sessions are cascade-deleted along with the agent and its
      versions.
    fullName: delete
    remarks: ''
    isDeprecated: false
    syntax:
      content: >-
