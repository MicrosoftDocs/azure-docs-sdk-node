name: MongoDbReplication
uid: '@azure/arm-datamigration.MongoDbReplication'
package: '@azure/arm-datamigration'
summary: >-
  Describes how changes will be replicated from the source to the target. The
  default is OneTime. \

  [KnownMongoDbReplication](xref:@azure/arm-datamigration.KnownMongoDbReplication)
  can be used interchangeably with MongoDbReplication,
   this enum contains the known values that the service supports.
  ### Known values supported by the service

  **Disabled**: Disabled \

  **OneTime**: OneTime \

  **Continuous**: Continuous
fullName: MongoDbReplication
remarks: ''
isDeprecated: false
syntax: |
  type MongoDbReplication = string
