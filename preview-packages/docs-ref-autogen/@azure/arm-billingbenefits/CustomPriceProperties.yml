### YamlMime:TSType
name: CustomPriceProperties
uid: '@azure/arm-billingbenefits.CustomPriceProperties'
package: '@azure/arm-billingbenefits'
summary: Custom price properties for a given discount.
fullName: CustomPriceProperties
remarks: ''
isDeprecated: false
type: interface
properties:
  - name: billingPeriod
    uid: '@azure/arm-billingbenefits.CustomPriceProperties.billingPeriod'
    package: '@azure/arm-billingbenefits'
    summary: >-
      The billing period of the priceable node. Validation: Optional, Maximum
      length 128 characters. Only allowed if the availability derived by market,
      product, sku, and claims has terms and at least one of those terms has a
      billing period. When specified, termUnits must be specified.
    fullName: billingPeriod
    remarks: ''
    isDeprecated: false
    syntax:
      content: 'billingPeriod?: string'
      return:
        description: ''
        type: string
  - name: catalogClaims
    uid: '@azure/arm-billingbenefits.CustomPriceProperties.catalogClaims'
    package: '@azure/arm-billingbenefits'
    summary: >-
      The set of BigCat claims. Validation: Required. Must contain
      AgreementType, NationalCloud, and PricingAudience claims. Additionally
      requires AccessPass claim when creating custom price with action ==
      consume on the pricing instructions.
    fullName: catalogClaims
    remarks: ''
    isDeprecated: false
    syntax:
      content: 'catalogClaims: CatalogClaimsItem[]'
      return:
        description: ''
        type: <xref uid="@azure/arm-billingbenefits.CatalogClaimsItem" />[]
  - name: catalogId
    uid: '@azure/arm-billingbenefits.CustomPriceProperties.catalogId'
    package: '@azure/arm-billingbenefits'
    summary: >-
      The catalog instance where the priceable node lives. Validation: Required.
      No defined format, will vary per team.
    fullName: catalogId
    remarks: ''
    isDeprecated: false
    syntax:
      content: 'catalogId: string'
      return:
        description: ''
        type: string
  - name: marketSetPrices
    uid: '@azure/arm-billingbenefits.CustomPriceProperties.marketSetPrices'
    package: '@azure/arm-billingbenefits'
    summary: >-
      The set of market set prices of the priceable node. Validation: Required.
      Must contain at least one element.
    fullName: marketSetPrices
    remarks: ''
    isDeprecated: false
    syntax:
      content: 'marketSetPrices: MarketSetPricesItems[]'
      return:
        description: ''
        type: <xref uid="@azure/arm-billingbenefits.MarketSetPricesItems" />[]
  - name: meterType
    uid: '@azure/arm-billingbenefits.CustomPriceProperties.meterType'
    package: '@azure/arm-billingbenefits'
    summary: >-
      Must be present if the market, product, sku, and claims, and optional term
      information resolves to multiple availabilities that only differ by meter
      type. Validation: Maximum length 128 characters.
    fullName: meterType
    remarks: ''
    isDeprecated: false
    syntax:
      content: 'meterType?: string'
      return:
        description: ''
        type: string
  - name: ruleType
    uid: '@azure/arm-billingbenefits.CustomPriceProperties.ruleType'
    package: '@azure/arm-billingbenefits'
    summary: >-
      The type of the priceable node pricing rule. Validation: Required.
      Supported values are fixedPriceLock, fixedListPrice, and priceCeiling.
    fullName: ruleType
    remarks: ''
    isDeprecated: false
    syntax:
      content: 'ruleType: string'
      return:
        description: ''
        type: string
  - name: termUnits
    uid: '@azure/arm-billingbenefits.CustomPriceProperties.termUnits'
    package: '@azure/arm-billingbenefits'
    summary: >-
      The term units for the priceable node. Validation: Optional, Maximum
      length 128 characters. Must be present if and only if the availability
      derived by market, product, sku, and claims has terms.
    fullName: termUnits
    remarks: ''
    isDeprecated: false
    syntax:
      content: 'termUnits?: string'
      return:
        description: ''
        type: string
