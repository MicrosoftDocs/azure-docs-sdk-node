### YamlMime:TSTypeAlias
name: ExpirationAction
uid: '@azure/arm-storage.ExpirationAction'
package: '@azure/arm-storage'
summary: >-
  The SAS Expiration Action defines the action to be performed when
  sasPolicy.sasExpirationPeriod is violated. The 'Log' action can be used for
  audit purposes and the 'Block' action can be used to block and deny the usage
  of SAS tokens that do not adhere to the sas policy expiration period. \

  [KnownExpirationAction](xref:@azure/arm-storage.KnownExpirationAction) can be
  used interchangeably with ExpirationAction,
   this enum contains the known values that the service supports.
  ### Known values supported by the service

  **Log** \

  **Block**
fullName: ExpirationAction
remarks: ''
isDeprecated: false
syntax: |
  type ExpirationAction = string
