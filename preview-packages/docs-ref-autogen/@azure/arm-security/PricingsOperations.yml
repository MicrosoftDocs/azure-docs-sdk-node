### YamlMime:TSType
name: PricingsOperations
uid: '@azure/arm-security.PricingsOperations'
package: '@azure/arm-security'
summary: Interface representing a Pricings operations.
fullName: PricingsOperations
remarks: ''
isDeprecated: false
type: interface
properties:
  - name: delete
    uid: '@azure/arm-security.PricingsOperations.delete'
    package: '@azure/arm-security'
    summary: >-
      Deletes a provided Microsoft Defender for Cloud pricing configuration in a
      specific resource. Valid only for resource scope (Supported resources are:
      'VirtualMachines, VMSS, ARC Machines, and Containers').
    fullName: delete
    remarks: ''
    isDeprecated: false
    syntax:
      content: >-
        delete: (scopeId: string, pricingName: string, options?:
        PricingsDeleteOptionalParams) => Promise<void>
      return:
        description: ''
        type: >-
          (scopeId: string, pricingName: string, options?:
          PricingsDeleteOptionalParams) =&gt; Promise&lt;void&gt;
  - name: get
    uid: '@azure/arm-security.PricingsOperations.get'
    package: '@azure/arm-security'
    summary: >-
      Get the Defender plans pricing configurations of the selected scope (valid
      scopes are resource id or a subscription id). At the resource level,
      supported resource types are 'VirtualMachines, VMSS and ARC Machines'.
    fullName: get
    remarks: ''
    isDeprecated: false
    syntax:
      content: >-
        get: (scopeId: string, pricingName: string, options?:
        PricingsGetOptionalParams) => Promise<Pricing>
      return:
        description: ''
        type: >-
          (scopeId: string, pricingName: string, options?:
          PricingsGetOptionalParams) =&gt; Promise&lt;Pricing&gt;
  - name: list
    uid: '@azure/arm-security.PricingsOperations.list'
    package: '@azure/arm-security'
    summary: >-
      Lists Microsoft Defender for Cloud pricing configurations of the scopeId,
      that match the optional given $filter. Valid scopes are: subscription id
      or a specific resource id (Supported resources are: 'VirtualMachines, VMSS
      and ARC Machines'). Valid $filter is: 'name in
      ({planName1},{planName2},...)'. If $filter is not provided, the unfiltered
      list will be returned. If '$filter=name in (planName1,planName2)' is
      provided, the returned list includes the pricings set for 'planName1' and
      'planName2' only.
    fullName: list
    remarks: ''
    isDeprecated: false
    syntax:
      content: >-
        list: (scopeId: string, options?: PricingsListOptionalParams) =>
        Promise<PricingList>
      return:
        description: ''
        type: >-
          (scopeId: string, options?: PricingsListOptionalParams) =&gt;
          Promise&lt;PricingList&gt;
  - name: update
    uid: '@azure/arm-security.PricingsOperations.update'
    package: '@azure/arm-security'
    summary: >-
      Updates a provided Microsoft Defender for Cloud pricing configuration in
      the scope. Valid scopes are: subscription id or a specific resource id
      (Supported resources are: 'VirtualMachines, VMSS and ARC Machines' and
      only for plan='VirtualMachines' and subPlan='P1').
    fullName: update
    remarks: ''
    isDeprecated: false
    syntax:
      content: >-
        update: (scopeId: string, pricingName: string, pricing: Pricing,
        options?: PricingsUpdateOptionalParams) => Promise<Pricing>
      return:
        description: ''
        type: >-
          (scopeId: string, pricingName: string, pricing: Pricing, options?:
          PricingsUpdateOptionalParams) =&gt; Promise&lt;Pricing&gt;
