### YamlMime:TSTypeAlias
name: UpdateChannel
uid: '@azure/arm-rediscache.UpdateChannel'
package: '@azure/arm-rediscache'
summary: >-
  Optional: Specifies the update channel for the monthly Redis updates your
  Redis Cache will receive. Caches using 'Preview' update channel get latest
  Redis updates at least 4 weeks ahead of 'Stable' channel caches. Default value
  is 'Stable'. \

  [KnownUpdateChannel](xref:@azure/arm-rediscache.KnownUpdateChannel) can be
  used interchangeably with UpdateChannel,
   this enum contains the known values that the service supports.
  ### Known values supported by the service

  **Stable**: Stable channel receives updates, which may include important
  security and stability updates, later than Preview channel. \

  **Preview**: Preview channel normally receives updates before Stable channel,
  and is the recommended channel for non-production workloads.
fullName: UpdateChannel
remarks: ''
isDeprecated: false
syntax: |
  type UpdateChannel = string
