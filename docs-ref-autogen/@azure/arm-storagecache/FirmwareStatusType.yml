name: FirmwareStatusType
uid: '@azure/arm-storagecache.FirmwareStatusType'
package: '@azure/arm-storagecache'
summary: >-
  True if there is a firmware update ready to install on this cache. The
  firmware will automatically be installed after firmwareUpdateDeadline if not
  triggered earlier via the upgrade operation. \

  [KnownFirmwareStatusType](xref:@azure/arm-storagecache.KnownFirmwareStatusType)
  can be used interchangeably with FirmwareStatusType,
   this enum contains the known values that the service supports.
  ### Known values supported by the service

  **available**: available \

  **unavailable**: unavailable
fullName: FirmwareStatusType
remarks: ''
isDeprecated: false
syntax: |
  type FirmwareStatusType = string
