name: ScriptLevel
uid: '@azure/arm-kusto.ScriptLevel'
package: '@azure/arm-kusto'
summary: >-
  Differentiates between the type of script commands included - Database or
  Cluster. The default is Database. \

  [KnownScriptLevel](xref:@azure/arm-kusto.KnownScriptLevel) can be used
  interchangeably with ScriptLevel,
   this enum contains the known values that the service supports.
  ### Known values supported by the service

  **Database**: Database \

  **Cluster**: Cluster
