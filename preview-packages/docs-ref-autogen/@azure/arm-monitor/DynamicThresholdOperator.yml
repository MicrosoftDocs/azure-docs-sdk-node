name: DynamicThresholdOperator
uid: '@azure/arm-monitor.DynamicThresholdOperator'
package: '@azure/arm-monitor'
summary: >-
  The operator used to compare the metric value against the threshold.
  Previously undocumented values might be returned \

  [KnownDynamicThresholdOperator](xref:@azure/arm-monitor.KnownDynamicThresholdOperator)
  can be used interchangeably with DynamicThresholdOperator,
   this enum contains the known values that the service supports.
  ### Known values supported by the service

  **GreaterThan**: GreaterThan \

  **LessThan**: LessThan \

  **GreaterOrLessThan**: GreaterOrLessThan
fullName: DynamicThresholdOperator
remarks: ''
isDeprecated: false
syntax: |
  type DynamicThresholdOperator = string
