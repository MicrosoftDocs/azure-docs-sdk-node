### YamlMime:TSTypeAlias
name: McpServerOutputParsingKind
uid: '@azure/search-documents.McpServerOutputParsingKind'
package: '@azure/search-documents'
summary: >-
  The kind of output parsing for an MCP server tool. \

  [KnownMcpServerOutputParsingKind](xref:@azure/search-documents.KnownMcpServerOutputParsingKind)
  can be used interchangeably with McpServerOutputParsingKind,
   this enum contains the known values that the service supports.
  ### Known values supported by the service

  **auto**: Automatically detect the output format and parse accordingly. \

  **json**: Parse the output as a JSON document using the configured JSON
  parameters. \

  **split**: Split the output into pages using the configured split parameters.
  \

  **none**: Treat the output as a single block without any parsing.
fullName: McpServerOutputParsingKind
remarks: ''
isDeprecated: false
syntax: |
  type McpServerOutputParsingKind = string
