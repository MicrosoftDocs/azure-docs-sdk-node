name: HttpsRedirect
uid: '@azure/arm-cdn.HttpsRedirect'
package: '@azure/arm-cdn'
summary: >-
  Whether to automatically redirect HTTP traffic to HTTPS traffic. Note that
  this is a easy way to set up this rule and it will be the first rule that gets
  executed. \

  [KnownHttpsRedirect](xref:@azure/arm-cdn.KnownHttpsRedirect) can be used
  interchangeably with HttpsRedirect,
   this enum contains the known values that the service supports.
  ### Known values supported by the service

  **Enabled** \

  **Disabled**
