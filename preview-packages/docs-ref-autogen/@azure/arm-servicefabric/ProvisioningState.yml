name: ProvisioningState
uid: '@azure/arm-servicefabric.ProvisioningState'
package: '@azure/arm-servicefabric'
summary: >-
  The provisioning state of the cluster resource. \

  [KnownProvisioningState](xref:@azure/arm-servicefabric.KnownProvisioningState)
  can be used interchangeably with ProvisioningState,
   this enum contains the known values that the service supports.
  ### Known values supported by the service

  **Updating**: Cluster is updating. \

  **Succeeded**: Cluster provisioning succeeded. \

  **Failed**: Cluster provisioning failed. \

  **Canceled**: Cluster provisioning was canceled.
