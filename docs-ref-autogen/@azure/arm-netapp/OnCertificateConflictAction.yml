### YamlMime:TSTypeAlias
name: OnCertificateConflictAction
uid: '@azure/arm-netapp.OnCertificateConflictAction'
package: '@azure/arm-netapp'
summary: >-
  This action is triggered when a certificate conflict occurs. A conflict arises
  if you try to create a new bucket while one or more already exist on the
  server, or if you update a bucket when multiple buckets are present. This
  happens because a single certificate is shared among all buckets on the same
  server.


  Note: This applies both to certificates provided directly via the
  certificateObject property and to those retrieved from Azure Key Vault.
  Details for the latter case are specified in the
  akvDetails.certificateAkvDetails section. \

  [KnownOnCertificateConflictAction](xref:@azure/arm-netapp.KnownOnCertificateConflictAction)
  can be used interchangeably with OnCertificateConflictAction,
   this enum contains the known values that the service supports.
  ### Known values supported by the service

  **Update**: Update the existing certificate regardless of whether there is a
  conflict or not. This means all buckets on the server will now use the new
  certificate. \

  **Fail**: Fail the operation if a conflict occurs, meaning the bucket
  operation will fail, and the existing certificate will continue to be in use.
fullName: OnCertificateConflictAction
remarks: ''
isDeprecated: false
syntax: |
  type OnCertificateConflictAction = string
