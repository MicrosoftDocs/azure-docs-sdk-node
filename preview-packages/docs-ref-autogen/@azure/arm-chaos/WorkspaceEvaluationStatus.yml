### YamlMime:TSTypeAlias
name: WorkspaceEvaluationStatus
uid: '@azure/arm-chaos.WorkspaceEvaluationStatus'
package: '@azure/arm-chaos'
summary: >-
  Enum of the workspace evaluation status. \

  [KnownWorkspaceEvaluationStatus](xref:@azure/arm-chaos.KnownWorkspaceEvaluationStatus)
  can be used interchangeably with WorkspaceEvaluationStatus,
   this enum contains the known values that the service supports.
  ### Known values supported by the service

  **Pending**: The evaluation is pending and has not started. \

  **Queued**: The evaluation has been accepted and is queued for execution. \

  **InProgress**: The evaluation is in progress. \

  **Succeeded**: The evaluation completed successfully. \

  **PartiallySucceeded**: The evaluation partially succeeded — some scenarios
  succeeded while others failed. \

  **Failed**: The evaluation failed. \

  **Canceled**: The evaluation was canceled.
fullName: WorkspaceEvaluationStatus
remarks: ''
isDeprecated: false
syntax: |
  type WorkspaceEvaluationStatus = string
