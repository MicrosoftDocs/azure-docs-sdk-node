    uid: '@azure/cosmos.EncryptionPolicy.enableEncryption'
    package: '@azure/cosmos'
    summary: boolean flag to support operations involving client side encryption
    fullName: enableEncryption
    remarks: ''
    isDeprecated: false
    syntax:
      content: 'enableEncryption: boolean'
      return:
        description: ''
        type: boolean
  - name: encryptionKeyResolverName
    uid: '@azure/cosmos.EncryptionPolicy.encryptionKeyResolverName'
    package: '@azure/cosmos'
    summary: |-
      name of the resolver to use for client side encryption.
      Currently only AzureKeyVault implementation is supported.
    fullName: encryptionKeyResolverName
    remarks: ''
    isDeprecated: false
    syntax:
      content: 'encryptionKeyResolverName?: string'
      return:
        description: ''
        type: string
  - name: encryptionKeyTimeToLive
    uid: '@azure/cosmos.EncryptionPolicy.encryptionKeyTimeToLive'
    package: '@azure/cosmos'
    summary: >-
      time for which encryption keys and settings will be cached. Default is 2
