name: StageStatus
uid: '@azure/arm-edgeorder.StageStatus'
package: '@azure/arm-edgeorder'
summary: >-
  Stage status. \

  [KnownStageStatus](xref:@azure/arm-edgeorder.KnownStageStatus) can be used
  interchangeably with StageStatus,
   this enum contains the known values that the service supports.
  ### Known values supported by the service

  **None**: No status available yet. \

  **InProgress**: Stage is in progress. \

  **Succeeded**: Stage has succeeded. \

  **Failed**: Stage has failed. \

  **Cancelled**: Stage has been cancelled. \

  **Cancelling**: Stage is cancelling.
fullName: StageStatus
remarks: ''
isDeprecated: false
syntax: |
  type StageStatus = string
