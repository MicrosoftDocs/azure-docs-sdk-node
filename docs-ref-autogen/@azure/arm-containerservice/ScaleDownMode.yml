### YamlMime:TSTypeAlias
name: ScaleDownMode
uid: '@azure/arm-containerservice.ScaleDownMode'
package: '@azure/arm-containerservice'
summary: >-
  Describes how VMs are added to or removed from Agent Pools. See [billing
  states](https://docs.microsoft.com/azure/virtual-machines/states-billing). \

  [KnownScaleDownMode](xref:@azure/arm-containerservice.KnownScaleDownMode) can
  be used interchangeably with ScaleDownMode,
   this enum contains the known values that the service supports.
  ### Known values supported by the service

  **Delete**: Create new instances during scale up and remove instances during
  scale down. \

  **Deallocate**: Attempt to start deallocated instances (if they exist) during
  scale up and deallocate instances during scale down.
fullName: ScaleDownMode
remarks: ''
isDeprecated: false
syntax: |
  type ScaleDownMode = string
