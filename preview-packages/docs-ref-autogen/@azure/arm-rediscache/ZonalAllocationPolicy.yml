### YamlMime:TSTypeAlias
name: ZonalAllocationPolicy
uid: '@azure/arm-rediscache.ZonalAllocationPolicy'
package: '@azure/arm-rediscache'
summary: >-
  Optional: Specifies how availability zones are allocated to the Redis cache.
  'Automatic' enables zone redundancy and Azure will automatically select zones
  based on regional availability and capacity. 'UserDefined' will select
  availability zones passed in by you using the 'zones' parameter. 'NoZones'
  will produce a non-zonal cache. If 'zonalAllocationPolicy' is not passed, it
  will be set to 'UserDefined' when zones are passed in, otherwise, it will be
  set to 'Automatic' in regions where zones are supported and 'NoZones' in
  regions where zones are not supported. \

  [KnownZonalAllocationPolicy](xref:@azure/arm-rediscache.KnownZonalAllocationPolicy)
  can be used interchangeably with ZonalAllocationPolicy,
   this enum contains the known values that the service supports.
  ### Known values supported by the service

  **Automatic**: The zones for the cache will be selected automatically based on
  availability and capacity. \

  **UserDefined**: UserDefined means the zones for the cache are manually
  configured using the 'zones' property, and can not be automatically selected.
  \

  **NoZones**: The cache will not use multiple availability zones.
fullName: ZonalAllocationPolicy
remarks: ''
isDeprecated: false
syntax: |
  type ZonalAllocationPolicy = string
