name: UnavailableReason
uid: '@azure/arm-relay.UnavailableReason'
package: '@azure/arm-relay'
summary: >-
  Specifies the reason for the unavailability of the service. \

  [KnownUnavailableReason](xref:@azure/arm-relay.KnownUnavailableReason) can be
