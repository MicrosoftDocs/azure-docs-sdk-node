name: FillerTrigger
uid: '@azure/ai-voicelive.FillerTrigger'
package: '@azure/ai-voicelive'
summary: >-
  Triggers that can activate filler response generation. \

  [KnownFillerTrigger](xref:@azure/ai-voicelive.KnownFillerTrigger) can be used
  interchangeably with FillerTrigger,
   this enum contains the known values that the service supports.
  ### Known values supported by the service

  **latency**: Trigger filler when response latency exceeds threshold. \

  **tool**: Trigger filler when a tool call is being executed.
fullName: FillerTrigger
remarks: ''
isDeprecated: false
syntax: |
  type FillerTrigger = string
