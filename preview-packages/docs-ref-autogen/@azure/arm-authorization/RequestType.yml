name: RequestType
uid: '@azure/arm-authorization.RequestType'
package: '@azure/arm-authorization'
summary: >-
  The type of the role assignment schedule request. Eg: SelfActivate,
  AdminAssign etc \

  [KnownRequestType](xref:@azure/arm-authorization.KnownRequestType) can be used
  interchangeably with RequestType,
   this enum contains the known values that the service supports.
  ### Known values supported by the service

  **AdminAssign**: AdminAssign \

  **AdminRemove**: AdminRemove \

  **AdminUpdate**: AdminUpdate \

  **AdminExtend**: AdminExtend \

  **AdminRenew**: AdminRenew \

  **SelfActivate**: SelfActivate \

  **SelfDeactivate**: SelfDeactivate \

  **SelfExtend**: SelfExtend \

  **SelfRenew**: SelfRenew
fullName: RequestType
remarks: ''
isDeprecated: false
syntax: |
  type RequestType = string
