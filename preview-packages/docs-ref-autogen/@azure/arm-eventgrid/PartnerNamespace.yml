      return:
        description: ''
        type: <xref uid="@azure/arm-eventgrid.PrivateEndpointConnection" />[]
  - name: provisioningState
    uid: '@azure/arm-eventgrid.PartnerNamespace.provisioningState'
    package: '@azure/arm-eventgrid'
    summary: Provisioning state of the partner namespace.
    fullName: provisioningState
    remarks: ''
    isDeprecated: false
    syntax:
