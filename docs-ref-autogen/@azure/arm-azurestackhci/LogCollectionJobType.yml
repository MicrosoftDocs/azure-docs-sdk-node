### YamlMime:TSTypeAlias
name: LogCollectionJobType
uid: '@azure/arm-azurestackhci.LogCollectionJobType'
package: '@azure/arm-azurestackhci'
summary: >-
  Specifies the type of log collection job. Determines whether the logs are
  collected immediately on demand or as part of a scheduled operation. \

  [KnownLogCollectionJobType](xref:@azure/arm-azurestackhci.KnownLogCollectionJobType)
  can be used interchangeably with LogCollectionJobType,
   this enum contains the known values that the service supports.
  ### Known values supported by the service

  **OnDemand**: Log collection is triggered manually and executed immediately. \

  **Scheduled**: Log collection is scheduled to run at a predefined time or
  interval.
fullName: LogCollectionJobType
remarks: ''
isDeprecated: false
syntax: |
  type LogCollectionJobType = string
