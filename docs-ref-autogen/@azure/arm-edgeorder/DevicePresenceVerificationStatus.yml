name: DevicePresenceVerificationStatus
uid: '@azure/arm-edgeorder.DevicePresenceVerificationStatus'
package: '@azure/arm-edgeorder'
summary: >-
  Proof of possession status. \

  [KnownDevicePresenceVerificationStatus](xref:@azure/arm-edgeorder.KnownDevicePresenceVerificationStatus)
  can be used interchangeably with DevicePresenceVerificationStatus,
   this enum contains the known values that the service supports.
  ### Known values supported by the service

  **NotInitiated**: The device has not yet been verified to be with the right
  edge operator or at the right location. \

  **Completed**: Confirms that the device is verified to be with the right edge
  operator or at the right location.
