name: KnownGeographicallyRedundantBackupSupport
uid: '@azure/arm-postgresql-flexible.KnownGeographicallyRedundantBackupSupport'
package: '@azure/arm-postgresql-flexible'
summary: >-
  Indicates if geographically redundant backups are supported in this location.
  'Enabled' means geographically redundant backups are supported. 'Disabled'
  stands for geographically redundant backup is not supported. Will be
  deprecated in the future. Look to Supported Features for 'GeoBackup'.
fullName: KnownGeographicallyRedundantBackupSupport
remarks: ''
isDeprecated: false
