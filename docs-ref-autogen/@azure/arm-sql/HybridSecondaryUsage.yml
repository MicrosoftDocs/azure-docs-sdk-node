name: HybridSecondaryUsage
uid: '@azure/arm-sql.HybridSecondaryUsage'
package: '@azure/arm-sql'
summary: >-
  Hybrid secondary usage. Possible values are 'Active' (default value) and
  'Passive' (customer uses the secondary as Passive DR). \

  [KnownHybridSecondaryUsage](xref:@azure/arm-sql.KnownHybridSecondaryUsage) can
  be used interchangeably with HybridSecondaryUsage,
   this enum contains the known values that the service supports.
  ### Known values supported by the service

  **Active**: Active \

  **Passive**: Passive
