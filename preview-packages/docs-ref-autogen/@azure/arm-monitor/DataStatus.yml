### YamlMime:TSTypeAlias
name: DataStatus
uid: '@azure/arm-monitor.DataStatus'
package: '@azure/arm-monitor'
summary: >-
  The status of VM Insights data from the resource. When reported as `present`
  the data array will contain information about the data containers to which
  data for the specified resource is being routed. \

  [KnownDataStatus](xref:@azure/arm-monitor.KnownDataStatus) can be used
  interchangeably with DataStatus,
   this enum contains the known values that the service supports.
  ### Known values supported by the service

  **present**: present \

  **notPresent**: notPresent
fullName: DataStatus
remarks: ''
isDeprecated: false
syntax: |
  type DataStatus = string
