### YamlMime:TSTypeAlias
name: SetLegalHoldImmutability
uid: '@azure/arm-sql.SetLegalHoldImmutability'
package: '@azure/arm-sql'
summary: >-
  The setting for whether LegalHold is enabled or disabled on the LTR backup.
  When LegalHold is enabled, the backup cannot be deleted until the LegalHold is
  removed. \

  [KnownSetLegalHoldImmutability](xref:@azure/arm-sql.KnownSetLegalHoldImmutability)
  can be used interchangeably with SetLegalHoldImmutability,
   this enum contains the known values that the service supports.
  ### Known values supported by the service

  **Enabled**: Enabled \

  **Disabled**: Disabled
fullName: SetLegalHoldImmutability
remarks: ''
isDeprecated: false
syntax: |
  type SetLegalHoldImmutability = string
