### YamlMime:TSTypeAlias
name: TlsVersion
uid: '@azure/arm-rediscache.TlsVersion'
package: '@azure/arm-rediscache'
summary: >-
  Optional: requires clients to use a specified TLS version (or higher) to
  connect (e,g, '1.0', '1.1', '1.2') \

  [KnownTlsVersion](xref:@azure/arm-rediscache.KnownTlsVersion) can be used
  interchangeably with TlsVersion,
   this enum contains the known values that the service supports.
  ### Known values supported by the service

  **1.0**: TLS protocol version 1.0 -- deprecated for security reasons. Do not
  use this value for new caches. \

  **1.1**: TLS protocol version 1.1 -- deprecated for security reasons. Do not
  use this value for new caches. \

  **1.2**: TLS protocol version 1.2 -- use this value, or higher, for new
  caches. Or do not specify, so that your cache uses the recommended default
  value
fullName: TlsVersion
remarks: ''
isDeprecated: false
syntax: |
  type TlsVersion = string
