### YamlMime:TSTypeAlias
name: InterNodeCommunicationState
uid: '@azure/arm-batch.InterNodeCommunicationState'
package: '@azure/arm-batch'
summary: >-
  This imposes restrictions on which nodes can be assigned to the pool. Enabling
  this value can reduce the chance of the requested number of nodes to be
  allocated in the pool. If not specified, this value defaults to 'Disabled'.
fullName: InterNodeCommunicationState
remarks: ''
isDeprecated: false
syntax: |
  type InterNodeCommunicationState = "Enabled" | "Disabled"
