name: AllowedCopyScope
uid: '@azure/arm-storage.AllowedCopyScope'
package: '@azure/arm-storage'
summary: >-
  Restrict copy to and from Storage Accounts within an AAD tenant or with
  Private Links to the same VNet. \

  [KnownAllowedCopyScope](xref:@azure/arm-storage.KnownAllowedCopyScope) can be
  used interchangeably with AllowedCopyScope,
   this enum contains the known values that the service supports.
  ### Known values supported by the service

