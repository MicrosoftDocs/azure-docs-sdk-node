  - name: failback
    uid: '@azure/arm-operationalinsights.WorkspacesOperations.failback'
    package: '@azure/arm-operationalinsights'
    summary: >-
      Deactivates failover for the specified workspace.


      The failback operation is asynchronous and can take up to 30 minutes to
      complete. The status of the operation can be checked using the operationId
      returned in the response.
    fullName: failback
    remarks: ''
    isDeprecated: false
