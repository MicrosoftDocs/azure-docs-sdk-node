### YamlMime:TSTypeAlias
name: ReliabilityLevel
uid: '@azure/arm-servicefabric.ReliabilityLevel'
package: '@azure/arm-servicefabric'
summary: >-
  The reliability level sets the replica set size of system services. Learn
  about
  [ReliabilityLevel](https://docs.microsoft.com/azure/service-fabric/service-fabric-cluster-capacity).
  \

  [KnownReliabilityLevel](xref:@azure/arm-servicefabric.KnownReliabilityLevel)
  can be used interchangeably with ReliabilityLevel,
   this enum contains the known values that the service supports.
  ### Known values supported by the service

  **None**: Run the System services with a target replica set count of 1. This
  should only be used for test clusters. \

  **Bronze**: Run the System services with a target replica set count of 3. This
  should only be used for test clusters. \

  **Silver**: Run the System services with a target replica set count of 5. \

  **Gold**: Run the System services with a target replica set count of 7. \

  **Platinum**: Run the System services with a target replica set count of 9.
fullName: ReliabilityLevel
remarks: ''
isDeprecated: false
syntax: |
  type ReliabilityLevel = string
