### YamlMime:TSTypeAlias
name: LegendConfigType
uid: '@azure/planetarycomputer.LegendConfigType'
package: '@azure/planetarycomputer'
summary: >-
  Legend type to make, one of: `continuous`, `classmap`, `interval` or `none`

  (note, `none` is a string literal). \

  [KnownLegendConfigType](xref:@azure/planetarycomputer.KnownLegendConfigType)
  can be used interchangeably with LegendConfigType,
   this enum contains the known values that the service supports.
  ### Known values supported by the service

  **continuous**: Continuous color ramp legend. \

  **classmap**: Classified map with discrete colors for classes. \

  **interval**: Interval-based legend with discrete ranges. \

  **none**: No legend.
fullName: LegendConfigType
remarks: ''
isDeprecated: false
syntax: |
  type LegendConfigType = string
