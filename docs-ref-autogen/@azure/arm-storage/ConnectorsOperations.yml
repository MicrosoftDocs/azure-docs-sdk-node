  - name: testExistingConnection
    uid: '@azure/arm-storage.ConnectorsOperations.testExistingConnection'
    package: '@azure/arm-storage'
    summary: >-
      This method is used to verify that the connection to the backing data
      store works.

      This API is designed to be used for monitoring and debugging purposes.
      From the caller’s perspective,

      this method does the following: Calls List on the backing data store,
      attempting to list up to one blob/object/etc.

      If the above succeeds, and if a blob/object/etc is found, calls Get on
      that object, attempting to download one byte.
    fullName: testExistingConnection
    remarks: ''
    isDeprecated: false
