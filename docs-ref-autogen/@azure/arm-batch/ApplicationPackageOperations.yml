properties:
  - name: activate
    uid: '@azure/arm-batch.ApplicationPackageOperations.activate'
    package: '@azure/arm-batch'
    summary: >-
      Activates the specified application package. This should be done after the
      `ApplicationPackage` was created and uploaded. This needs to be done
      before an `ApplicationPackage` can be used on Pools or Tasks.
    fullName: activate
    remarks: ''
    isDeprecated: false
    syntax:
      content: >-
        activate: (resourceGroupName: string, accountName: string,
        applicationName: string, versionName: string, parameters:
        ActivateApplicationPackageParameters, options?:
        ApplicationPackageActivateOptionalParams) => Promise<ApplicationPackage>
      return:
        description: ''
        type: >-
          (resourceGroupName: string, accountName: string, applicationName:
          string, versionName: string, parameters:
          ActivateApplicationPackageParameters, options?:
          ApplicationPackageActivateOptionalParams) =&gt;
          Promise&lt;ApplicationPackage&gt;
  - name: create
    uid: '@azure/arm-batch.ApplicationPackageOperations.create'
    package: '@azure/arm-batch'
    summary: >-
      Creates an application package record. The record contains a storageUrl
      where the package should be uploaded to.  Once it is uploaded the
      `ApplicationPackage` needs to be activated using
      `ApplicationPackageActive` before it can be used. If the auto storage
      account was configured to use storage keys, the URL returned will contain
      a SAS.
    fullName: create
    remarks: ''
    isDeprecated: false
    syntax:
      content: >-
        create: (resourceGroupName: string, accountName: string,
        applicationName: string, versionName: string, options?:
        ApplicationPackageCreateOptionalParams) => Promise<ApplicationPackage>
      return:
        description: ''
        type: >-
