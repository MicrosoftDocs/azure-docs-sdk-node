### YamlMime:TSTypeAlias
name: SessionProbeType
uid: '@azure/arm-appcontainers.SessionProbeType'
package: '@azure/arm-appcontainers'
summary: >-
  Denotes the type of probe. Can be Liveness or Startup, Readiness probe is not
  supported in sessions. Type must be unique for each probe within the context
  of a list of probes (SessionProbes). \

  [KnownSessionProbeType](xref:@azure/arm-appcontainers.KnownSessionProbeType)
  can be used interchangeably with SessionProbeType,
   this enum contains the known values that the service supports.
  ### Known values supported by the service

  **Liveness**: Liveness \

  **Startup**: Startup
fullName: SessionProbeType
remarks: ''
isDeprecated: false
syntax: |
  type SessionProbeType = string
