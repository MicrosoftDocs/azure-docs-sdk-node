### YamlMime:TSType
name: CustomCaptureConfigurationsProperties
uid: '@azure/arm-paloaltonetworksngfw.CustomCaptureConfigurationsProperties'
package: '@azure/arm-paloaltonetworksngfw'
summary: >-
  Properties of a Custom Capture Configuration. NOTE: this is a sync proxy
  resource, NOT an LRO — there is intentionally no provisioningState field.
fullName: CustomCaptureConfigurationsProperties
remarks: ''
isDeprecated: false
type: interface
properties:
  - name: durationInSec
    uid: >-
      @azure/arm-paloaltonetworksngfw.CustomCaptureConfigurationsProperties.durationInSec
    package: '@azure/arm-paloaltonetworksngfw'
    summary: >-
      Capture duration in seconds (1-180). Required on PUT (input). May be
      omitted in GET responses while pcapStatus is InProgress because the
      backend has not finalized echo-back yet; echoed in terminal Success
      responses.
    fullName: durationInSec
    remarks: ''
    isDeprecated: false
    syntax:
      content: 'durationInSec?: number'
      return:
        description: ''
        type: number
  - name: message
    uid: >-
      @azure/arm-paloaltonetworksngfw.CustomCaptureConfigurationsProperties.message
    package: '@azure/arm-paloaltonetworksngfw'
    summary: >-
      Human-readable status message for display in client UIs (Portal blade, CLI
      output, etc.). English only. Read-only.
    fullName: message
    remarks: ''
    isDeprecated: false
    syntax:
      content: 'message?: string'
      return:
        description: ''
        type: string
  - name: nextCheckInSeconds
    uid: >-
      @azure/arm-paloaltonetworksngfw.CustomCaptureConfigurationsProperties.nextCheckInSeconds
    package: '@azure/arm-paloaltonetworksngfw'
    summary: >-
      Polling-cadence hint in seconds. Set on non-terminal responses (pcapStatus
      = InProgress) so clients know how long to wait before the next GET.
      Omitted on terminal responses (Success / Failed). Read-only.
    fullName: nextCheckInSeconds
    remarks: ''
    isDeprecated: false
    syntax:
      content: 'nextCheckInSeconds?: number'
      return:
        description: ''
        type: number
  - name: pcapDetailReason
    uid: >-
      @azure/arm-paloaltonetworksngfw.CustomCaptureConfigurationsProperties.pcapDetailReason
    package: '@azure/arm-paloaltonetworksngfw'
    summary: >-
      Detailed reason for the current status, populated by PAN. Typically set
      when pcapStatus is Failed. Read-only.
    fullName: pcapDetailReason
    remarks: ''
    isDeprecated: false
    syntax:
      content: 'pcapDetailReason?: string'
      return:
        description: ''
        type: string
  - name: pcapFilter
    uid: >-
      @azure/arm-paloaltonetworksngfw.CustomCaptureConfigurationsProperties.pcapFilter
    package: '@azure/arm-paloaltonetworksngfw'
    summary: >-
      List of filters to match packets against (1-4 entries). Required on PUT
      (input). May be omitted in GET responses while pcapStatus is InProgress
      because the backend has not finalized echo-back yet; echoed in terminal
      Success responses.
    fullName: pcapFilter
    remarks: ''
    isDeprecated: false
    syntax:
      content: 'pcapFilter?: CustomCaptureConfigurationsFilter[]'
      return:
        description: ''
        type: >-
          <xref
          uid="@azure/arm-paloaltonetworksngfw.CustomCaptureConfigurationsFilter"
          />[]
  - name: pcapStages
    uid: >-
      @azure/arm-paloaltonetworksngfw.CustomCaptureConfigurationsProperties.pcapStages
    package: '@azure/arm-paloaltonetworksngfw'
    summary: >-
      List of firewall stages where packets should be captured (1-4 entries).
      Required on PUT (input). May be omitted in GET responses while pcapStatus
      is InProgress because the backend has not finalized echo-back yet; echoed
      in terminal Success responses.
    fullName: pcapStages
    remarks: ''
    isDeprecated: false
    syntax:
      content: 'pcapStages?: string[]'
      return:
        description: ''
        type: string[]
  - name: pcapStatus
    uid: >-
      @azure/arm-paloaltonetworksngfw.CustomCaptureConfigurationsProperties.pcapStatus
    package: '@azure/arm-paloaltonetworksngfw'
    summary: >-
      Current capture status. Read-only. Clients should poll GET until this is
      Success or Failed.
    fullName: pcapStatus
    remarks: ''
    isDeprecated: false
    syntax:
      content: 'pcapStatus?: string'
      return:
        description: ''
        type: string
  - name: storageAccountResourceId
    uid: >-
      @azure/arm-paloaltonetworksngfw.CustomCaptureConfigurationsProperties.storageAccountResourceId
    package: '@azure/arm-paloaltonetworksngfw'
    summary: >-
      ARM resource ID of the customer's storage account where the capture file
      will be written. Required on PUT (input). May be omitted in GET responses
      while pcapStatus is InProgress because the backend has not finalized
      echo-back yet; echoed in terminal Success responses.
    fullName: storageAccountResourceId
    remarks: ''
    isDeprecated: false
    syntax:
      content: 'storageAccountResourceId?: string'
      return:
        description: ''
        type: string
