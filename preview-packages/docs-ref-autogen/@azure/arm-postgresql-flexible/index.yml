  - name: >-
      restorePoller<TResponse,
      TResult>(PostgreSQLManagementFlexibleServerClient, string, (args: any[])
      => PollerLike<OperationState<TResult>, TResult>,
      RestorePollerOptions<TResult, PathUncheckedResponse>)
    uid: '@azure/arm-postgresql-flexible.restorePoller'
    package: '@azure/arm-postgresql-flexible'
    summary: |-
      Creates a poller from the serialized state of another poller. This can be
      useful when you want to create pollers on a different host or a poller
      needs to be constructed after the original one is not in scope.
    remarks: ''
    isDeprecated: false
    syntax:
      content: >-
        function restorePoller<TResponse, TResult>(client:
        PostgreSQLManagementFlexibleServerClient, serializedState: string,
        sourceOperation: (args: any[]) => PollerLike<OperationState<TResult>,
        TResult>, options?: RestorePollerOptions<TResult,
        PathUncheckedResponse>): PollerLike<OperationState<TResult>, TResult>
      parameters:
        - id: client
          type: >-
            <xref
            uid="@azure/arm-postgresql-flexible.PostgreSQLManagementFlexibleServerClient"
            />
          description: ''
        - id: serializedState
          type: string
          description: ''
        - id: sourceOperation
          type: >-
            (args: any[]) =&gt; PollerLike&lt;OperationState&lt;TResult&gt;,
            TResult&gt;
