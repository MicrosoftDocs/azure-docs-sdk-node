name: CloudServicesNetworkStorageMode
uid: '@azure/arm-networkcloud.CloudServicesNetworkStorageMode'
package: '@azure/arm-networkcloud'
summary: >-
  The indicator to enable shared storage on the cloud services network. If not
  specified, the allocation will align with the standard storage enablement. \

  [KnownCloudServicesNetworkStorageMode](xref:@azure/arm-networkcloud.KnownCloudServicesNetworkStorageMode)
  can be used interchangeably with CloudServicesNetworkStorageMode,
   this enum contains the known values that the service supports.
  ### Known values supported by the service

  **None**: No shared storage. \

  **Standard**: Standard shared storage.
fullName: CloudServicesNetworkStorageMode
remarks: ''
isDeprecated: false
syntax: |
  type CloudServicesNetworkStorageMode = string
