name: ItemScope
uid: '@azure/arm-appinsights.ItemScope'
package: '@azure/arm-appinsights'
summary: >-
  Enum indicating if this item definition is owned by a specific user or is
  shared between all users with access to the Application Insights component. \

  [KnownItemScope](xref:@azure/arm-appinsights.KnownItemScope) can be used
  interchangeably with ItemScope,
   this enum contains the known values that the service supports.
  ### Known values supported by the service

  **shared**: shared \

  **user**: user
fullName: ItemScope
remarks: ''
isDeprecated: false
syntax: |
  type ItemScope = string
