  - name: update
    uid: '@azure/arm-billing-trust.RulesOperations.update'
    package: '@azure/arm-billing-trust'
    summary: >-
      Update a Rule. The PATCH body is discriminated by `kind` and must match
      the existing rule's kind. For `eduQualification` rules, only
      `supplementalDocuments` is patchable, and only when `evaluationState ==
      actionRequired`. For `businessVerification` rules, the patchable fields
      are `supplementalDocuments` and `externalId`, and only when
      `evaluationState` is `pending` or `actionRequired`. All other field/state
      combinations are rejected with 400 InvalidParameterValue or 409
      RuleNotActionable.
    fullName: update
    remarks: ''
    isDeprecated: false
    syntax:
      content: >-
        update: (resourceUri: string, ruleName: string, properties:
        RulePatchPropertiesUnion, options?: RulesUpdateOptionalParams) =>
        Promise<Rule>
      return:
        description: ''
        type: >-
          (resourceUri: string, ruleName: string, properties:
          RulePatchPropertiesUnion, options?: RulesUpdateOptionalParams) =&gt;
          Promise&lt;Rule&gt;
