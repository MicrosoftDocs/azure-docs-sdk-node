### YamlMime:TSTypeAlias
name: HostingMode
uid: '@azure/arm-search.HostingMode'
package: '@azure/arm-search'
summary: >-
  Applicable only for the standard3 SKU. You can set this property to enable up
  to 3 high density partitions that allow up to 1000 indexes, which is much
  higher than the maximum indexes allowed for any other SKU. For the standard3
  SKU, the value is either 'Default' or 'HighDensity'. For all other SKUs, this
  value must be 'Default'.
fullName: HostingMode
remarks: ''
isDeprecated: false
syntax: |
  type HostingMode = "Default" | "HighDensity"
