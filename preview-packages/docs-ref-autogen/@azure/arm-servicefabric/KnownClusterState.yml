### YamlMime:TSEnum
name: KnownClusterState
uid: '@azure/arm-servicefabric.KnownClusterState'
package: '@azure/arm-servicefabric'
summary: The current state of the cluster.
fullName: KnownClusterState
remarks: ''
isDeprecated: false
fields:
  - name: AutoScale
    uid: '@azure/arm-servicefabric.KnownClusterState.AutoScale'
    package: '@azure/arm-servicefabric'
    summary: Indicates that the ReliabilityLevel of the cluster is being adjusted.
  - name: BaselineUpgrade
    uid: '@azure/arm-servicefabric.KnownClusterState.BaselineUpgrade'
    package: '@azure/arm-servicefabric'
    summary: >-
      Indicates that the cluster is upgrading to establishes the cluster
      version. This upgrade is automatically initiated when the cluster boots up
      for the first time.
  - name: Deploying
    uid: '@azure/arm-servicefabric.KnownClusterState.Deploying'
    package: '@azure/arm-servicefabric'
    summary: >-
      Indicates that the Service Fabric runtime is being installed on the VMs.
      Cluster resource will be in this state until the cluster boots up and
      system services are up.
  - name: EnforcingClusterVersion
    uid: '@azure/arm-servicefabric.KnownClusterState.EnforcingClusterVersion'
    package: '@azure/arm-servicefabric'
    summary: >-
      Indicates that cluster is on a different version than expected and the
      cluster is being upgraded to the expected version.
  - name: Ready
    uid: '@azure/arm-servicefabric.KnownClusterState.Ready'
    package: '@azure/arm-servicefabric'
    summary: Indicates that the cluster is in a stable state.
  - name: UpdatingInfrastructure
    uid: '@azure/arm-servicefabric.KnownClusterState.UpdatingInfrastructure'
    package: '@azure/arm-servicefabric'
    summary: >-
      Indicates that the cluster is being upgraded with the latest Service
      Fabric runtime version. This happens only when the **upgradeMode** is set
      to 'Automatic'.
  - name: UpdatingUserCertificate
    uid: '@azure/arm-servicefabric.KnownClusterState.UpdatingUserCertificate'
    package: '@azure/arm-servicefabric'
    summary: >-
      Indicates that the cluster is being upgraded with the user provided
      certificate.
  - name: UpdatingUserConfiguration
    uid: '@azure/arm-servicefabric.KnownClusterState.UpdatingUserConfiguration'
    package: '@azure/arm-servicefabric'
    summary: >-
      Indicates that the cluster is being upgraded with the user provided
      configuration.
  - name: UpgradeServiceUnreachable
    uid: '@azure/arm-servicefabric.KnownClusterState.UpgradeServiceUnreachable'
    package: '@azure/arm-servicefabric'
    summary: >-
      Indicates that the system service in the cluster is no longer polling the
      Resource Provider. Clusters in this state cannot be managed by the
      Resource Provider.
  - name: WaitingForNodes
    uid: '@azure/arm-servicefabric.KnownClusterState.WaitingForNodes'
    package: '@azure/arm-servicefabric'
    summary: >-
      Indicates that the cluster resource is created and the resource provider
      is waiting for Service Fabric VM extension to boot up and report to it.
