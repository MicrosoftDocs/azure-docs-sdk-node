name: IdentityType
uid: '@azure/arm-sqlvirtualmachine.IdentityType'
package: '@azure/arm-sqlvirtualmachine'
summary: >-
  The identity type. Set this to 'SystemAssigned' in order to automatically
  create and assign an Azure Active Directory principal for the resource. \

  [KnownIdentityType](xref:@azure/arm-sqlvirtualmachine.KnownIdentityType) can
  be used interchangeably with IdentityType,
   this enum contains the known values that the service supports.
  ### Known values supported by the service

  **None** \

  **SystemAssigned** \

  **UserAssigned** \

  **SystemAssigned,UserAssigned**
fullName: IdentityType
remarks: ''
isDeprecated: false
