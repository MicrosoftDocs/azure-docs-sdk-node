### YamlMime:TSTypeAlias
name: DeploymentState
uid: '@azure/arm-cognitiveservices.DeploymentState'
package: '@azure/arm-cognitiveservices'
summary: >-
  The state of the deployment. Controls whether the deployment is accepting
  inference requests. Use 'Running' for active deployments that process
  requests, or 'Paused' to temporarily stop inference while preserving the
  deployment configuration. \

  [KnownDeploymentState](xref:@azure/arm-cognitiveservices.KnownDeploymentState)
  can be used interchangeably with DeploymentState,
   this enum contains the known values that the service supports.
  ### Known values supported by the service

  **Running**: The deployment is running and accepting inference requests. \

  **Paused**: The deployment is paused and not accepting inference requests.
fullName: DeploymentState
remarks: ''
isDeprecated: false
syntax: |
  type DeploymentState = string
