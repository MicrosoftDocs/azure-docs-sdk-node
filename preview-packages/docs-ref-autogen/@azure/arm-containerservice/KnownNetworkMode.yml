### YamlMime:TSEnum
name: KnownNetworkMode
uid: '@azure/arm-containerservice.KnownNetworkMode'
package: '@azure/arm-containerservice'
summary: >-
  The network mode Azure CNI is configured with. This cannot be specified if
  networkPlugin is anything other than 'azure'.
fullName: KnownNetworkMode
remarks: ''
isDeprecated: false
fields:
  - name: Bridge
    uid: '@azure/arm-containerservice.KnownNetworkMode.Bridge'
    package: '@azure/arm-containerservice'
    summary: This is no longer supported
  - name: Transparent
    uid: '@azure/arm-containerservice.KnownNetworkMode.Transparent'
    package: '@azure/arm-containerservice'
    summary: >-
      No bridge is created. Intra-VM Pod to Pod communication is through IP
      routes created by Azure CNI. See [Transparent
      Mode](https://docs.microsoft.com/azure/aks/faq#transparent-mode) for more
      information.
