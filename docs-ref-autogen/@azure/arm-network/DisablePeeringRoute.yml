name: DisablePeeringRoute
uid: '@azure/arm-network.DisablePeeringRoute'
package: '@azure/arm-network'
summary: >-
  Whether to disable the routes learned by peering on the route table. \

  [KnownDisablePeeringRoute](xref:@azure/arm-network.KnownDisablePeeringRoute)
  can be used interchangeably with DisablePeeringRoute,
   this enum contains the known values that the service supports.
  ### Known values supported by the service

  **None**: Peering routes are enabled. \

  **All**: All peering routes are disabled.
