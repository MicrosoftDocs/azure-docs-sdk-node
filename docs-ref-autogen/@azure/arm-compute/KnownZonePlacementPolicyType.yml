### YamlMime:TSEnum
name: KnownZonePlacementPolicyType
uid: '@azure/arm-compute.KnownZonePlacementPolicyType'
package: '@azure/arm-compute'
summary: >-
  Specifies the policy for resource's placement in availability zone. Possible
  values are: **Any** (used for Virtual Machines), **Auto** (used for Virtual
  Machine Scale Sets) - An availability zone will be automatically picked by
  system as part of resource creation.
fullName: KnownZonePlacementPolicyType
remarks: ''
isDeprecated: false
fields:
  - name: Any
    uid: '@azure/arm-compute.KnownZonePlacementPolicyType.Any'
    package: '@azure/arm-compute'
    summary: Any
  - name: Auto
    uid: '@azure/arm-compute.KnownZonePlacementPolicyType.Auto'
    package: '@azure/arm-compute'
    summary: Automatic zone placement in a Virtual Machine Scale Set.
