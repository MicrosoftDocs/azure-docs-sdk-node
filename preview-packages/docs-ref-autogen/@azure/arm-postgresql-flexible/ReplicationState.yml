### YamlMime:TSTypeAlias
name: ReplicationState
uid: '@azure/arm-postgresql-flexible.ReplicationState'
package: '@azure/arm-postgresql-flexible'
summary: >-
  Indicates the replication state of a read replica. This property is returned
  only when the target server is a read replica. Possible  values are Active,
  Broken, Catchup, Provisioning, Reconfiguring, and Updating \

  [KnownReplicationState](xref:@azure/arm-postgresql-flexible.KnownReplicationState)
  can be used interchangeably with ReplicationState,
   this enum contains the known values that the service supports.
  ### Known values supported by the service

  **Active**: The read replica server is fully synchronized and actively
  replicating data from the primary server. \

  **Catchup**: The read replica server is behind the primary server and is
  currently catching up with pending changes. \

  **Provisioning**: The read replica server is being created and is in process
  of getting initialized. \

  **Updating**: The read replica server is undergoing some changes it can be
  changing compute size of promoting it to primary server. \

  **Broken**: Replication has failed or been interrupted. \

  **Reconfiguring**: The read replica server is being reconfigured, possibly due
  to changes in source or settings.
fullName: ReplicationState
remarks: ''
isDeprecated: false
syntax: |
  type ReplicationState = string
