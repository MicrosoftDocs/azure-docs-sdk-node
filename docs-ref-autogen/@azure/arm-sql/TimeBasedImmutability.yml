### YamlMime:TSTypeAlias
name: TimeBasedImmutability
uid: '@azure/arm-sql.TimeBasedImmutability'
package: '@azure/arm-sql'
summary: >-
  The setting for whether or not time-based immutability is enabled for the LTR
  backup. When time-based immutability is enabled and locked, the backup cannot
  be deleted until BackupExpirationTime. \

  [KnownTimeBasedImmutability](xref:@azure/arm-sql.KnownTimeBasedImmutability)
  can be used interchangeably with TimeBasedImmutability,
   this enum contains the known values that the service supports.
  ### Known values supported by the service

  **Enabled**: Enabled \

  **Disabled**: Disabled
fullName: TimeBasedImmutability
remarks: ''
isDeprecated: false
syntax: |
  type TimeBasedImmutability = string
