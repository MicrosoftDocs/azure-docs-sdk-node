### YamlMime:TSTypeAlias
name: LocationRestricted
uid: '@azure/arm-postgresql-flexible.LocationRestricted'
package: '@azure/arm-postgresql-flexible'
summary: >-
  Indicates if this location is restricted. 'Enabled' means location is
  restricted. 'Disabled' stands for location is not restricted. Will be
  deprecated in the future. Look to Supported Features for 'Restricted'. \

  [KnownLocationRestricted](xref:@azure/arm-postgresql-flexible.KnownLocationRestricted)
  can be used interchangeably with LocationRestricted,
   this enum contains the known values that the service supports.
  ### Known values supported by the service

  **Enabled** \

  **Disabled**
fullName: LocationRestricted
remarks: ''
isDeprecated: false
syntax: |
  type LocationRestricted = string
