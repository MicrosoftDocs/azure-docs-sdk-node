### YamlMime:TSTypeAlias
name: QualificationState
uid: '@azure/arm-resiliencemanagement.QualificationState'
package: '@azure/arm-resiliencemanagement'
summary: >-
  A state type that indicates qualification of a resource for an operation. \

  [KnownQualificationState](xref:@azure/arm-resiliencemanagement.KnownQualificationState)
  can be used interchangeably with QualificationState,
   this enum contains the known values that the service supports.
  ### Known values supported by the service

  **Unknown**: A state that indicates the qualification state is unknown. \

  **Qualified**: A state that indicates the resource is qualified for the
  operation. \

  **NotQualified**: A state that indicates the resource is not qualified for the
  operation. \

  **Excluded**: A state that indicates the resource is excluded from the
  recovery plan itself.
fullName: QualificationState
remarks: ''
isDeprecated: false
syntax: |
  type QualificationState = string
