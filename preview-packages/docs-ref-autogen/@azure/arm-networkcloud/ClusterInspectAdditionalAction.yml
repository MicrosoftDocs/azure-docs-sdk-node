name: ClusterInspectAdditionalAction
uid: '@azure/arm-networkcloud.ClusterInspectAdditionalAction'
package: '@azure/arm-networkcloud'
summary: >-
  Additional actions supplement the default non-disruptive cluster inspection.
  Additional actions may be disallowed if the cluster is in a deployed and
  running state. \

  [KnownClusterInspectAdditionalAction](xref:@azure/arm-networkcloud.KnownClusterInspectAdditionalAction)
  can be used interchangeably with ClusterInspectAdditionalAction,
   this enum contains the known values that the service supports.
  ### Known values supported by the service

  **ResetHardware**: Indicates that hardware reset should be performed during
  inspection.
fullName: ClusterInspectAdditionalAction
remarks: ''
isDeprecated: false
syntax: |
  type ClusterInspectAdditionalAction = string
