name: L3NetworkConfigurationIpamEnabled
uid: '@azure/arm-networkcloud.L3NetworkConfigurationIpamEnabled'
package: '@azure/arm-networkcloud'
summary: >-
  The indication of whether this network will or will not perform IP address
  management and allocate IP addresses when attached. \

  [KnownL3NetworkConfigurationIpamEnabled](xref:@azure/arm-networkcloud.KnownL3NetworkConfigurationIpamEnabled)
  can be used interchangeably with L3NetworkConfigurationIpamEnabled,
   this enum contains the known values that the service supports.
  ### Known values supported by the service

  **True**: IP address management enabled. \

  **False**: IP address management disabled.
fullName: L3NetworkConfigurationIpamEnabled
remarks: ''
isDeprecated: false
syntax: |
  type L3NetworkConfigurationIpamEnabled = string
