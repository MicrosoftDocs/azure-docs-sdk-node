### YamlMime:TSTypeAlias
name: ProbeProtocol
uid: '@azure/arm-network.ProbeProtocol'
package: '@azure/arm-network'
summary: >-
  The protocol of the end point. If 'Tcp' is specified, a received ACK is
  required for the probe to be successful. If 'Http' or 'Https' is specified, a
  200 OK response from the specifies URI is required for the probe to be
  successful. \

  [KnownProbeProtocol](xref:@azure/arm-network.KnownProbeProtocol) can be used
  interchangeably with ProbeProtocol,
   this enum contains the known values that the service supports.
  ### Known values supported by the service

  **Http**: Http \

  **Tcp**: Tcp \

  **Https**: Https
fullName: ProbeProtocol
remarks: ''
isDeprecated: false
syntax: |
  type ProbeProtocol = string
