### YamlMime:TSTypeAlias
name: UpdateSummariesPropertiesState
uid: '@azure/arm-azurestackhci.UpdateSummariesPropertiesState'
package: '@azure/arm-azurestackhci'
summary: >-
  Overall update state of the stamp. Indicates the current status of update
  deployment across the stamp, including preparation, application, and any
  issues encountered. \

  [KnownUpdateSummariesPropertiesState](xref:@azure/arm-azurestackhci.KnownUpdateSummariesPropertiesState)
  can be used interchangeably with UpdateSummariesPropertiesState,
   this enum contains the known values that the service supports.
  ### Known values supported by the service

  **Unknown**: The update state is not known. \

  **AppliedSuccessfully**: Updates have been successfully applied to the stamp.
  \

  **UpdateAvailable**: Updates are available but have not yet been applied. \

  **UpdateInProgress**: Updates are currently being applied to the stamp. \

  **UpdateFailed**: The update process failed. \

  **NeedsAttention**: The update process requires user intervention or has
  encountered issues needing attention. \

  **PreparationInProgress**: Preparation for the update is currently in
  progress. \

  **PreparationFailed**: Preparation for the update failed.
fullName: UpdateSummariesPropertiesState
remarks: ''
isDeprecated: false
syntax: |
  type UpdateSummariesPropertiesState = string
