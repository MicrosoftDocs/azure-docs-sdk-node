name: PrivateLinkResource
uid: '@azure/arm-security.PrivateLinkResource'
package: '@azure/arm-security'
summary: >-
  A private link resource that enables secure, private connectivity to Microsoft
  Defender for Cloud services. This resource manages the lifecycle of private
  endpoint connections and provides the necessary infrastructure for private
  connectivity.
fullName: PrivateLinkResource
remarks: ''
isDeprecated: false
type: interface
