### YamlMime:TSTypeAlias
name: GatewayAPIIstioEnabled
uid: '@azure/arm-containerservice.GatewayAPIIstioEnabled'
package: '@azure/arm-containerservice'
summary: >-
  Whether to enable Istio as a Gateway API implementation for managed ingress
  with App Routing. \

  [KnownGatewayAPIIstioEnabled](xref:@azure/arm-containerservice.KnownGatewayAPIIstioEnabled)
  can be used interchangeably with GatewayAPIIstioEnabled,
   this enum contains the known values that the service supports.
  ### Known values supported by the service

  **Enabled**: Enables managed ingress via the Gateway API using a sidecar-less
  Istio controlplane. \

  **Disabled**: Disables the sidecar-less istio control plane for managed
  ingress via the Gateway API.
fullName: GatewayAPIIstioEnabled
remarks: ''
isDeprecated: false
syntax: |
  type GatewayAPIIstioEnabled = string
