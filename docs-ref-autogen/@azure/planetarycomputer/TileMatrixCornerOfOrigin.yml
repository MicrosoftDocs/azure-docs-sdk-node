### YamlMime:TSTypeAlias
name: TileMatrixCornerOfOrigin
uid: '@azure/planetarycomputer.TileMatrixCornerOfOrigin'
package: '@azure/planetarycomputer'
summary: >-
  The corner of the tile matrix (_topLeft_ or _bottomLeft_) used as the origin

  for numbering tile rows and columns. This corner is also a corner of the (0,
  0)

  tile. \

  [KnownTileMatrixCornerOfOrigin](xref:@azure/planetarycomputer.KnownTileMatrixCornerOfOrigin)
  can be used interchangeably with TileMatrixCornerOfOrigin,
   this enum contains the known values that the service supports.
  ### Known values supported by the service

  **topLeft**: Origin at the top-left corner (Y increases downward) \

  **bottomLeft**: Origin at the bottom-left corner (Y increases upward)
fullName: TileMatrixCornerOfOrigin
remarks: ''
isDeprecated: false
syntax: |
  type TileMatrixCornerOfOrigin = string
