name: KnownResourceTypeRegistrationKind
uid: '@azure/arm-providerhub.KnownResourceTypeRegistrationKind'
package: '@azure/arm-providerhub'
summary: >-
  Resource type registration kind. This Metadata is also used by
  portal/tooling/etc to render different UX experiences for resources of the
  same type.
fullName: KnownResourceTypeRegistrationKind
remarks: ''
isDeprecated: false
fields:
  - name: Direct
    uid: '@azure/arm-providerhub.KnownResourceTypeRegistrationKind.Direct'
    package: '@azure/arm-providerhub'
    summary: Resource type served by the onboarded Resource Provider Service.
  - name: Hybrid
    uid: '@azure/arm-providerhub.KnownResourceTypeRegistrationKind.Hybrid'
    package: '@azure/arm-providerhub'
    summary: >-
      Resource type served by both the ProviderHub & the onboarded Resource
      Provider Services (i.e. The type has a mix of managed and direct
      endpoints).
  - name: Managed
    uid: '@azure/arm-providerhub.KnownResourceTypeRegistrationKind.Managed'
    package: '@azure/arm-providerhub'
    summary: Resource type served by the ProviderHub service.
