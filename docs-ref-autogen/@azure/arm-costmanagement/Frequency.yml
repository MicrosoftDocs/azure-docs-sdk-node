### YamlMime:TSTypeAlias
name: Frequency
uid: '@azure/arm-costmanagement.Frequency'
package: '@azure/arm-costmanagement'
summary: >-
  Frequency of a notification. Represents how long the notification will be
  silent after triggering an alert for a threshold breach. If not specified, the
  frequency will be set by default based on the timeGrain (Weekly when
  timeGrain: Last7Days, Monthly when timeGrain: Last30Days).


  Supported for CategoryType(s): ReservationUtilization. \

  [KnownFrequency](xref:@azure/arm-costmanagement.KnownFrequency) can be used
  interchangeably with Frequency,
   this enum contains the known values that the service supports.
  ### Known values supported by the service

  **Daily**: After the threshold breaches and an Alert is fired, no further
  alerts will be sent until the next calendar day. \

  **Weekly**: After the threshold breaches and an Alert is fired, no further
  alerts will be sent for 7 calendar days. \

  **Monthly**: After the threshold breaches and an Alert is fired, no further
  alerts will be sent for 30 calendar days.
fullName: Frequency
remarks: ''
isDeprecated: false
syntax: |
  type Frequency = string
