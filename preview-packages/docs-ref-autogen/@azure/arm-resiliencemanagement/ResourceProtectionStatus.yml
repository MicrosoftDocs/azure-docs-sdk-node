### YamlMime:TSTypeAlias
name: ResourceProtectionStatus
uid: '@azure/arm-resiliencemanagement.ResourceProtectionStatus'
package: '@azure/arm-resiliencemanagement'
summary: >-
  A state type that indicates the protection status of a resource with an Azure
  solution for regional or zonal recovery. \

  [KnownResourceProtectionStatus](xref:@azure/arm-resiliencemanagement.KnownResourceProtectionStatus)
  can be used interchangeably with ResourceProtectionStatus,
   this enum contains the known values that the service supports.
  ### Known values supported by the service

  **Unknown**: The protection status of the resource is unknown. \

  **Protected**: A state indicating that the resource is protected by the
  recovery solution. \

  **NotProtected**: A state indicating that the resource is not protected by any
  recovery solution. \

  **HighlyAvailable**: A state indicating that the resource is protected by the
  highly available recovery solution.
fullName: ResourceProtectionStatus
remarks: ''
isDeprecated: false
syntax: |
  type ResourceProtectionStatus = string
