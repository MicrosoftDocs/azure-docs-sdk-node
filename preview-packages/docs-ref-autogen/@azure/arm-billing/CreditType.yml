name: CreditType
uid: '@azure/arm-billing.CreditType'
package: '@azure/arm-billing'
summary: >-
  The credit type of the transaction. Applies only to credited transactions. \

  [KnownCreditType](xref:@azure/arm-billing.KnownCreditType) can be used
  interchangeably with CreditType,
   this enum contains the known values that the service supports.
  ### Known values supported by the service

  **Other**: Other \

  **AzureFreeCredit**: AzureFreeCredit \

  **AzureCreditOffer**: AzureCreditOffer \

  **ServiceInterruption**: ServiceInterruption \

  **Refund**: Refund
