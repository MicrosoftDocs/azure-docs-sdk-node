### YamlMime:TSTypeAlias
name: HybridSecondaryUsageDetected
uid: '@azure/arm-sql.HybridSecondaryUsageDetected'
package: '@azure/arm-sql'
summary: >-
  Hybrid secondary usage detected. Possible values are 'Active' (customer does
  not meet the requirements to use the secondary as Passive DR) and 'Passive'
  (customer meets the requirements to use the secondary as Passive DR). \

  [KnownHybridSecondaryUsageDetected](xref:@azure/arm-sql.KnownHybridSecondaryUsageDetected)
  can be used interchangeably with HybridSecondaryUsageDetected,
   this enum contains the known values that the service supports.
  ### Known values supported by the service

  **Active**: Active \

  **Passive**: Passive
fullName: HybridSecondaryUsageDetected
remarks: ''
isDeprecated: false
syntax: |
  type HybridSecondaryUsageDetected = string
