name: KnownExpirationAction
uid: '@azure/arm-storage.KnownExpirationAction'
package: '@azure/arm-storage'
summary: >-
  The SAS Expiration Action defines the action to be performed when
  sasPolicy.sasExpirationPeriod is violated. The 'Log' action can be used for
  audit purposes and the 'Block' action can be used to block and deny the usage
  of SAS tokens that do not adhere to the sas policy expiration period.
fullName: KnownExpirationAction
remarks: ''
