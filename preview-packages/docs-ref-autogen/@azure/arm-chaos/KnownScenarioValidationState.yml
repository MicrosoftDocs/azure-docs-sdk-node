### YamlMime:TSEnum
name: KnownScenarioValidationState
uid: '@azure/arm-chaos.KnownScenarioValidationState'
package: '@azure/arm-chaos'
summary: Enum of the scenario validation state.
fullName: KnownScenarioValidationState
remarks: ''
isDeprecated: false
fields:
  - name: Accepted
    uid: '@azure/arm-chaos.KnownScenarioValidationState.Accepted'
    package: '@azure/arm-chaos'
    summary: The scenario validation has been accepted.
  - name: Generating
    uid: '@azure/arm-chaos.KnownScenarioValidationState.Generating'
    package: '@azure/arm-chaos'
    summary: The scenario validation is in a generating state.
  - name: NoResolvedResources
    uid: '@azure/arm-chaos.KnownScenarioValidationState.NoResolvedResources'
    package: '@azure/arm-chaos'
    summary: >-
      The scenario validation found no valid resources to perform fault
      behaviors against.

      This is a terminal failure state.
  - name: NotStarted
    uid: '@azure/arm-chaos.KnownScenarioValidationState.NotStarted'
    package: '@azure/arm-chaos'
    summary: The scenario validation has not yet started.
  - name: RequiresAttention
    uid: '@azure/arm-chaos.KnownScenarioValidationState.RequiresAttention'
    package: '@azure/arm-chaos'
    summary: |-
      The scenario validation reflects a state that requires attention.
