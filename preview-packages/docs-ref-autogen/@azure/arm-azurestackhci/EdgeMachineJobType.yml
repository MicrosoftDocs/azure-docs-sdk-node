name: EdgeMachineJobType
uid: '@azure/arm-azurestackhci.EdgeMachineJobType'
package: '@azure/arm-azurestackhci'
summary: >-
  Job Type supported. \

  [KnownEdgeMachineJobType](xref:@azure/arm-azurestackhci.KnownEdgeMachineJobType)
  can be used interchangeably with EdgeMachineJobType,
   this enum contains the known values that the service supports.
  ### Known values supported by the service

  **CollectLog**: Job to collect logs from the device. \

  **RemoteSupport**: Job to provide remote support to the device. \

  **ProvisionOs**: Job to provision operating system in the device. \

  **DownloadOs**: Job to download OS packages on to the device
