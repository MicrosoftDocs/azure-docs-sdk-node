    uid: '@azure/planetarycomputer.TileMatrix.variableMatrixWidths'
    package: '@azure/planetarycomputer'
    summary: >-
      Describes the rows that has variable matrix width


      ref:
      https://github.com/opengeospatial/2D-Tile-Matrix-Set/blob/master/schemas/tms/2.0/json/variableMatrixWidth.json
    fullName: variableMatrixWidths
    remarks: ''
    isDeprecated: false
    syntax:
      content: 'variableMatrixWidths?: VariableMatrixWidth[]'
      return:
        description: ''
        type: <xref uid="@azure/planetarycomputer.VariableMatrixWidth" />[]
