### YamlMime:TSTypeAlias
name: BenefitUtilizationSummaryReportSchema
uid: '@azure/arm-costmanagement.BenefitUtilizationSummaryReportSchema'
package: '@azure/arm-costmanagement'
summary: >-
  The CSV file from the reportUrl and secondaryReportUrl blob link will consist
  of the following columns of benefit utilization data. UtilizedPercentage will
  be 0 for savings plans reports and non data bricks reservations. Utilization
  percentages will be 0 for data bricks reservations. \

  [KnownBenefitUtilizationSummaryReportSchema](xref:@azure/arm-costmanagement.KnownBenefitUtilizationSummaryReportSchema)
  can be used interchangeably with BenefitUtilizationSummaryReportSchema,
   this enum contains the known values that the service supports.
  ### Known values supported by the service

  **Kind** \

  **AvgUtilizationPercentage** \

  **BenefitOrderId** \

  **BenefitId** \

  **BenefitType** \

  **MaxUtilizationPercentage** \

  **MinUtilizationPercentage** \

  **UsageDate** \

  **UtilizedPercentage**
fullName: BenefitUtilizationSummaryReportSchema
remarks: ''
isDeprecated: false
syntax: |
  type BenefitUtilizationSummaryReportSchema = string
