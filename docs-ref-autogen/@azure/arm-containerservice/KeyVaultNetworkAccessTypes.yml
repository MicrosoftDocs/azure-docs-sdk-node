### YamlMime:TSTypeAlias
name: KeyVaultNetworkAccessTypes
uid: '@azure/arm-containerservice.KeyVaultNetworkAccessTypes'
package: '@azure/arm-containerservice'
summary: >-
  Network access of the key vault. Network access of key vault. The possible
  values are `Public` and `Private`. `Public` means the key vault allows public
  access from all networks. `Private` means the key vault disables public access
  and enables private link. The default value is `Public`. \

  [KnownKeyVaultNetworkAccessTypes](xref:@azure/arm-containerservice.KnownKeyVaultNetworkAccessTypes)
  can be used interchangeably with KeyVaultNetworkAccessTypes,
   this enum contains the known values that the service supports.
  ### Known values supported by the service

  **Public**: Key vault allows public access from all networks. \

  **Private**: Key vault disables public access and enables private link.
fullName: KeyVaultNetworkAccessTypes
remarks: ''
isDeprecated: false
syntax: |
  type KeyVaultNetworkAccessTypes = string
