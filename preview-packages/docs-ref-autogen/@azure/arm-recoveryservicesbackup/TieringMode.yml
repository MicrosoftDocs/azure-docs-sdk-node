### YamlMime:TSTypeAlias
name: TieringMode
uid: '@azure/arm-recoveryservicesbackup.TieringMode'
package: '@azure/arm-recoveryservicesbackup'
summary: >-
  Tiering Mode to control automatic tiering of recovery points. Supported values
  are:

  1. TierRecommended: Tier all recovery points recommended to be tiered

  2. TierAfter: Tier all recovery points after a fixed period, as specified in
  duration + durationType below.

  3. DoNotTier: Do not tier any recovery points \

  [KnownTieringMode](xref:@azure/arm-recoveryservicesbackup.KnownTieringMode)
  can be used interchangeably with TieringMode,
   this enum contains the known values that the service supports.
  ### Known values supported by the service

  **Invalid** \

  **TierRecommended** \

  **TierAfter** \

  **DoNotTier**
fullName: TieringMode
remarks: ''
isDeprecated: false
syntax: |
  type TieringMode = string
