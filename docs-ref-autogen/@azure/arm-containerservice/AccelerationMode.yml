### YamlMime:TSTypeAlias
name: AccelerationMode
uid: '@azure/arm-containerservice.AccelerationMode'
package: '@azure/arm-containerservice'
summary: >-
  Enable advanced network acceleration options. This allows users to configure
  acceleration using BPF host routing. This can be enabled only with Cilium
  dataplane. If not specified, the default value is None (no acceleration). The
  acceleration mode can be changed on a pre-existing cluster. See
  https://aka.ms/acnsperformance for a detailed explanation \

  [KnownAccelerationMode](xref:@azure/arm-containerservice.KnownAccelerationMode)
  can be used interchangeably with AccelerationMode,
   this enum contains the known values that the service supports.
  ### Known values supported by the service

  **BpfVeth**: Enable eBPF host routing with veth device mode. \

  **None**: Disable acceleration options.
fullName: AccelerationMode
remarks: ''
isDeprecated: false
syntax: |
  type AccelerationMode = string
