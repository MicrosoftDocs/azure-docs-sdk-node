### YamlMime:TSTypeAlias
name: DedicatedHostLicenseTypes
uid: '@azure/arm-compute.DedicatedHostLicenseTypes'
package: '@azure/arm-compute'
summary: >-
  Specifies the software license type that will be applied to the VMs deployed
  on the dedicated host. Possible values are: **None,**
  **Windows_Server_Hybrid,** **Windows_Server_Perpetual.** The default value is:
  **None.**
fullName: DedicatedHostLicenseTypes
remarks: ''
isDeprecated: false
syntax: |
  type DedicatedHostLicenseTypes =
    | "None"
    | "Windows_Server_Hybrid"
    | "Windows_Server_Perpetual"
