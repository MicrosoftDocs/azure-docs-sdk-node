### YamlMime:TSTypeAlias
name: ConsistencyModeTypes
uid: '@azure/arm-compute.ConsistencyModeTypes'
package: '@azure/arm-compute'
summary: >-
  ConsistencyMode of the RestorePoint. Can be specified in the input while
  creating a restore point. For now, only CrashConsistent is accepted as a valid
  input. Please refer to https://aka.ms/RestorePoints for more details. \

  [KnownConsistencyModeTypes](xref:@azure/arm-compute.KnownConsistencyModeTypes)
  can be used interchangeably with ConsistencyModeTypes,
   this enum contains the known values that the service supports.
  ### Known values supported by the service

  **CrashConsistent** \

  **FileSystemConsistent** \

  **ApplicationConsistent**
fullName: ConsistencyModeTypes
remarks: ''
isDeprecated: false
syntax: |
  type ConsistencyModeTypes = string
