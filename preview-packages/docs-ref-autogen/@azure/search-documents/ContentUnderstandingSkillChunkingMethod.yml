name: ContentUnderstandingSkillChunkingMethod
uid: '@azure/search-documents.ContentUnderstandingSkillChunkingMethod'
package: '@azure/search-documents'
summary: >-
  The chunking strategy used by the Content Understanding skill. Default is
  'fixedSize'. \

  <xref:KnownContentUnderstandingSkillChunkingMethod> can be used
  interchangeably with ContentUnderstandingSkillChunkingMethod,
   this enum contains the known values that the service supports.
  ### Known values supported by the service

  **fixedSize**: Fixed-size character-based windowed chunking. \

  **semantic**: Layout-aware, paragraph-boundary-respecting chunking.
