  - name: pause
    uid: '@azure/arm-cognitiveservices.DeploymentsOperations.pause'
    package: '@azure/arm-cognitiveservices'
    summary: >-
      Pauses inferencing on a deployment by setting the deploymentState to
      'Paused' (see
      #/definitions/DeploymentProperties/properties/deploymentState). Only
      Standard, DataZoneStandard, and GlobalStandard SKUs support this
      operation. Inference requests to the paused deployment endpoint will
      receive HTTP 423 (Locked). This operation is idempotent.
    fullName: pause
    remarks: ''
    isDeprecated: false
    syntax:
      content: >-
