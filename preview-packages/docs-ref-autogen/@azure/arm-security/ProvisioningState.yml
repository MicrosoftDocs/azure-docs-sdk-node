### YamlMime:TSTypeAlias
name: ProvisioningState
uid: '@azure/arm-security.ProvisioningState'
package: '@azure/arm-security'
summary: >-
  The current provisioning state of the resource. Indicates the status of the
  last operation performed on the resource. \

  [KnownProvisioningState](xref:@azure/arm-security.KnownProvisioningState) can
  be used interchangeably with ProvisioningState,
   this enum contains the known values that the service supports.
  ### Known values supported by the service

  **Succeeded**: The resource has been successfully provisioned and is ready for
  use. \

  **Creating**: The resource is being created. This is a transitional state. \

  **Updating**: The resource is being updated. This is a transitional state. \

  **Deleting**: The resource is being deleted. This is a transitional state. \

  **Failed**: The last operation on the resource failed. Check the error details
  for more information. \

  **Canceled**: The operation was canceled before completion. \

  **InProgress**: InProgress
fullName: ProvisioningState
remarks: ''
isDeprecated: false
syntax: |
  type ProvisioningState = string
