### YamlMime:TSEnum
name: KnownHealthStateType
uid: '@azure/arm-storagecache.KnownHealthStateType'
package: '@azure/arm-storagecache'
summary: >-
  List of cache health states. Down is when the cluster is not responding. 
  Degraded is when its functioning but has some alerts. Transitioning when it is
  creating or deleting. Unknown will be returned in old api versions when a new
  value is added in future versions. WaitingForKey is when the create is waiting
  for the system assigned identity to be given access to the encryption key in
  the encryption settings.
