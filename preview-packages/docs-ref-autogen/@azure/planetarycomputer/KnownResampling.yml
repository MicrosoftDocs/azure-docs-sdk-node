### YamlMime:TSEnum
name: KnownResampling
uid: '@azure/planetarycomputer.KnownResampling'
package: '@azure/planetarycomputer'
summary: >-
  Resampling algorithm to use when reading source raster data at different
  resolutions
fullName: KnownResampling
remarks: ''
isDeprecated: false
fields:
  - name: Average
    uid: '@azure/planetarycomputer.KnownResampling.Average'
    package: '@azure/planetarycomputer'
    summary: Average resampling - calculates the mean of all contributing pixels
  - name: Bilinear
    uid: '@azure/planetarycomputer.KnownResampling.Bilinear'
    package: '@azure/planetarycomputer'
    summary: >-
      Bilinear interpolation - calculates output values using a weighted average
      of 2x2 input cells
  - name: Cubic
    uid: '@azure/planetarycomputer.KnownResampling.Cubic'
    package: '@azure/planetarycomputer'
    summary: >-
      Cubic interpolation - uses a weighted average of 4x4 input cells for
      smoother results
  - name: CubicSpline
    uid: '@azure/planetarycomputer.KnownResampling.CubicSpline'
    package: '@azure/planetarycomputer'
    summary: Cubic spline interpolation - similar to cubic but preserves edges better
  - name: Gauss
    uid: '@azure/planetarycomputer.KnownResampling.Gauss'
    package: '@azure/planetarycomputer'
    summary: >-
      Gaussian weighted resampling - applies a gaussian weighting to
      contributing pixels
  - name: Lanczos
    uid: '@azure/planetarycomputer.KnownResampling.Lanczos'
    package: '@azure/planetarycomputer'
    summary: Lanczos windowed sinc resampling - high-quality with minimal artifacts
  - name: Mode
    uid: '@azure/planetarycomputer.KnownResampling.Mode'
    package: '@azure/planetarycomputer'
    summary: Mode resampling - selects the most common value from contributing pixels
  - name: Nearest
    uid: '@azure/planetarycomputer.KnownResampling.Nearest'
    package: '@azure/planetarycomputer'
    summary: Nearest neighbor - fastest method that selects the closest pixel value
  - name: Rms
    uid: '@azure/planetarycomputer.KnownResampling.Rms'
    package: '@azure/planetarycomputer'
    summary: >-
      Root mean square resampling - useful for resampling error or deviation
      grids
