name: ManagedServerCreateMode
uid: '@azure/arm-sql.ManagedServerCreateMode'
package: '@azure/arm-sql'
summary: >-
  Specifies the mode of database creation.


  Default: Regular instance creation.


  Restore: Creates an instance by restoring a set of backups to specific point
  in time. RestorePointInTime and SourceManagedInstanceId must be specified. \

  [KnownManagedServerCreateMode](xref:@azure/arm-sql.KnownManagedServerCreateMode)
  can be used interchangeably with ManagedServerCreateMode,
   this enum contains the known values that the service supports.
  ### Known values supported by the service

  **Default**: Default \

  **PointInTimeRestore**: PointInTimeRestore
