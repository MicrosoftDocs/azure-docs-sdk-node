    summary: ARM provisioning state.
    fullName: provisioningState
    remarks: ''
    isDeprecated: false
    syntax:
      content: 'provisioningState?: string'
      return:
        description: ''
        type: string
  - name: state
    uid: '@azure/arm-storagecache.AutoExportJobProperties.state'
    package: '@azure/arm-storagecache'
    summary: >-
      The operational state of auto export. InProgress indicates the export is
      running.  Disabling indicates the user has requested to disable the export
      but the disabling is still in progress. Disabled indicates auto export has
      been disabled.  DisableFailed indicates the disabling has failed.  Failed
      means the export was unable to continue, due to a fatal error.
    fullName: state
    remarks: ''
    isDeprecated: false
    syntax:
      content: 'state?: string'
      return:
        description: ''
        type: string
  - name: statusCode
    uid: '@azure/arm-storagecache.AutoExportJobProperties.statusCode'
