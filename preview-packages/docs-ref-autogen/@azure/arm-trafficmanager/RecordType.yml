### YamlMime:TSTypeAlias
name: RecordType
uid: '@azure/arm-trafficmanager.RecordType'
package: '@azure/arm-trafficmanager'
summary: >-
  When record type is set, a traffic manager profile will allow only endpoints
  that match this type. \

  [KnownRecordType](xref:@azure/arm-trafficmanager.KnownRecordType) can be used
  interchangeably with RecordType,
   this enum contains the known values that the service supports.
  ### Known values supported by the service

  **A**: A record type. \

  **AAAA**: AAAA record type. \

  **CNAME**: CNAME record type.
fullName: RecordType
remarks: ''
isDeprecated: false
syntax: |
  type RecordType = string
