### YamlMime:TSTypeAlias
name: IngressClientCertificateMode
uid: '@azure/arm-appcontainers.IngressClientCertificateMode'
package: '@azure/arm-appcontainers'
summary: >-
  Client certificate mode for mTLS authentication. Ignore indicates server drops
  client certificate on forwarding. Accept indicates server forwards client
  certificate but does not require a client certificate. Require indicates
  server requires a client certificate. \

  [KnownIngressClientCertificateMode](xref:@azure/arm-appcontainers.KnownIngressClientCertificateMode)
  can be used interchangeably with IngressClientCertificateMode,
   this enum contains the known values that the service supports.
  ### Known values supported by the service

  **ignore**: ignore \

  **accept**: accept \

  **require**: require
fullName: IngressClientCertificateMode
remarks: ''
isDeprecated: false
syntax: |
  type IngressClientCertificateMode = string
