### YamlMime:TSTypeAlias
name: NspReadinessState
uid: '@azure/arm-network.NspReadinessState'
package: '@azure/arm-network'
summary: >-
  The readiness state of the resource type for NSP support. \

  [KnownNspReadinessState](xref:@azure/arm-network.KnownNspReadinessState) can
  be used interchangeably with NspReadinessState,
   this enum contains the known values that the service supports.
  ### Known values supported by the service

  **Onboarding**: Resource Provider is actively being onboarded to NSP \

  **Preview**: Resource Provider supports NSP in Preview \

  **GA**: Resource Provider is generally available for NSP Integration \

  **NotReady**: NSP Onboarding is not started or not Supported
fullName: NspReadinessState
remarks: ''
isDeprecated: false
syntax: |
  type NspReadinessState = string
