### YamlMime:TSType
name: KubeReserved
uid: '@azure/arm-containerservice.KubeReserved'
package: '@azure/arm-containerservice'
summary: >-
  Kube-reserved values for kubelet. When a value is not set, the system-computed
  default based on VM size is used. See [AKS node resource
  reservations](https://aka.ms/aks/nodereservations) for details on computed
  defaults. Only applicable for Linux nodepools.
fullName: KubeReserved
remarks: ''
isDeprecated: false
type: interface
properties:
  - name: cpuMillicores
    uid: '@azure/arm-containerservice.KubeReserved.cpuMillicores'
    package: '@azure/arm-containerservice'
    summary: >-
      The amount of CPU reserved for Kubernetes system daemons, in millicores.
      Must be greater than or equal to 140. For example, a value of 200 means
      200m (0.2 CPU cores).
    fullName: cpuMillicores
    remarks: ''
    isDeprecated: false
    syntax:
      content: 'cpuMillicores?: number'
      return:
        description: ''
        type: number
  - name: memoryMB
    uid: '@azure/arm-containerservice.KubeReserved.memoryMB'
    package: '@azure/arm-containerservice'
    summary: >-
      The amount of memory reserved for Kubernetes system daemons, in MiB. Must
      be greater than or equal to 750.
    fullName: memoryMB
    remarks: ''
    isDeprecated: false
    syntax:
      content: 'memoryMB?: number'
      return:
        description: ''
        type: number
