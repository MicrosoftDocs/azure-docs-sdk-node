name: ODataAuthenticationType
uid: '@azure/arm-datafactory.ODataAuthenticationType'
package: '@azure/arm-datafactory'
summary: >-
  Type of authentication used to connect to the OData service. \

  [KnownODataAuthenticationType](xref:@azure/arm-datafactory.KnownODataAuthenticationType)
  can be used interchangeably with ODataAuthenticationType,
   this enum contains the known values that the service supports.
  ### Known values supported by the service

  **Basic**: Basic \

  **Anonymous**: Anonymous \

  **Windows**: Windows \

  **AadServicePrincipal**: AadServicePrincipal \

  **ManagedServiceIdentity**: ManagedServiceIdentity
