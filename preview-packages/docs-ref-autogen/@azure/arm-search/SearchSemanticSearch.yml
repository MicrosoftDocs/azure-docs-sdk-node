### YamlMime:TSTypeAlias
name: SearchSemanticSearch
uid: '@azure/arm-search.SearchSemanticSearch'
package: '@azure/arm-search'
summary: >-
  Specifies the availability and billing plan for semantic search on the Azure
  AI Search service. This configuration is only available for certain pricing
  tiers in certain regions. \

  [KnownSearchSemanticSearch](xref:@azure/arm-search.KnownSearchSemanticSearch)
  can be used interchangeably with SearchSemanticSearch,
   this enum contains the known values that the service supports.
  ### Known values supported by the service

  **disabled**: Indicates that semantic reranker is disabled for the search
  service. \

  **free**: Enables semantic reranker on a search service and indicates that it
  is to be used within the limits of the free plan. The free plan would cap the
  volume of semantic ranking requests and is offered at no extra charge. This is
  the default for newly provisioned search services. This is the default. \

  **standard**: Enables semantic reranker on a search service as a billable
  feature after the free quota is exhausted, with higher throughput and volume
  of semantically reranked queries.
fullName: SearchSemanticSearch
remarks: ''
isDeprecated: false
syntax: |
  type SearchSemanticSearch = string
