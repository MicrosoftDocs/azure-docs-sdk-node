### YamlMime:TSTypeAlias
name: McpServerToolInclusionMode
uid: '@azure/search-documents.McpServerToolInclusionMode'
package: '@azure/search-documents'
summary: >-
  Controls how parsed MCP tool results are integrated into the final result set.
  \

  [KnownMcpServerToolInclusionMode](xref:@azure/search-documents.KnownMcpServerToolInclusionMode)
  can be used interchangeably with McpServerToolInclusionMode,
   this enum contains the known values that the service supports.
  ### Known values supported by the service

  **reranked**: Tool results go through the reranking and aggregation pipeline
  alongside results from other knowledge sources. This is the default behavior.
  \

  **always**: Tool results bypass reranking and are always included in the agent
  context.
fullName: McpServerToolInclusionMode
remarks: ''
isDeprecated: false
syntax: |
  type McpServerToolInclusionMode = string
