### YamlMime:TSTypeAlias
name: RemoteVendorManagementStatus
uid: '@azure/arm-networkcloud.RemoteVendorManagementStatus'
package: '@azure/arm-networkcloud'
summary: >-
  The indicator of whether the remote vendor management feature is enabled or
  disabled, or unsupported if it is an unsupported feature. \

  [KnownRemoteVendorManagementStatus](xref:@azure/arm-networkcloud.KnownRemoteVendorManagementStatus)
  can be used interchangeably with RemoteVendorManagementStatus,
   this enum contains the known values that the service supports.
  ### Known values supported by the service

  **Enabled**: Remote vendor management is enabled. \

  **Disabled**: Remote vendor management is disabled. \

  **Unsupported**: Remote vendor management is unsupported.
fullName: RemoteVendorManagementStatus
remarks: ''
isDeprecated: false
syntax: |
  type RemoteVendorManagementStatus = string
