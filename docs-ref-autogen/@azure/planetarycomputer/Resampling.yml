### YamlMime:TSTypeAlias
name: Resampling
uid: '@azure/planetarycomputer.Resampling'
package: '@azure/planetarycomputer'
summary: >-
  Resampling algorithm to use when reading source raster data at different
  resolutions \

  [KnownResampling](xref:@azure/planetarycomputer.KnownResampling) can be used
  interchangeably with Resampling,
   this enum contains the known values that the service supports.
  ### Known values supported by the service

  **nearest**: Nearest neighbor - fastest method that selects the closest pixel
  value \

  **bilinear**: Bilinear interpolation - calculates output values using a
  weighted average of 2x2 input cells \

  **cubic**: Cubic interpolation - uses a weighted average of 4x4 input cells
  for smoother results \

  **cubic_spline**: Cubic spline interpolation - similar to cubic but preserves
  edges better \

  **lanczos**: Lanczos windowed sinc resampling - high-quality with minimal
  artifacts \

  **average**: Average resampling - calculates the mean of all contributing
  pixels \

  **mode**: Mode resampling - selects the most common value from contributing
  pixels \

  **gauss**: Gaussian weighted resampling - applies a gaussian weighting to
  contributing pixels \

  **rms**: Root mean square resampling - useful for resampling error or
  deviation grids
fullName: Resampling
remarks: ''
isDeprecated: false
syntax: |
  type Resampling = string
