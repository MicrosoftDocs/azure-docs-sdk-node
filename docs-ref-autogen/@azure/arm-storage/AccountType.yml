### YamlMime:TSTypeAlias
name: AccountType
uid: '@azure/arm-storage.AccountType'
package: '@azure/arm-storage'
summary: >-
  Specifies the Active Directory account type for Azure Storage. If
  directoryServiceOptions is set to AD (AD DS authentication), this property is
  optional. If provided, samAccountName should also be provided. For
  directoryServiceOptions AADDS (Entra DS authentication) or AADKERB (Entra
  authentication), this property can be omitted. \

  [KnownAccountType](xref:@azure/arm-storage.KnownAccountType) can be used
  interchangeably with AccountType,
   this enum contains the known values that the service supports.
  ### Known values supported by the service

  **User** \

  **Computer**
fullName: AccountType
remarks: ''
isDeprecated: false
syntax: |
  type AccountType = string
