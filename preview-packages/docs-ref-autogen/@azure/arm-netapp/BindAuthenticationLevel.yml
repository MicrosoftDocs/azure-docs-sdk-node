### YamlMime:TSTypeAlias
name: BindAuthenticationLevel
uid: '@azure/arm-netapp.BindAuthenticationLevel'
package: '@azure/arm-netapp'
summary: >-
  The authentication level to use when binding to the LDAP server. \

  [KnownBindAuthenticationLevel](xref:@azure/arm-netapp.KnownBindAuthenticationLevel)
  can be used interchangeably with BindAuthenticationLevel,
   this enum contains the known values that the service supports.
  ### Known values supported by the service

  **Anonymous**: Anonymous bind i.e. no credentials provided \

  **Simple**: Simple bind i.e. plain text credentials provided
fullName: BindAuthenticationLevel
remarks: ''
isDeprecated: false
syntax: |
  type BindAuthenticationLevel = string
