name: BillingRelationshipType
uid: '@azure/arm-billing.BillingRelationshipType'
package: '@azure/arm-billing'
summary: >-
  Identifies the billing relationships represented by a billing account or
  billing profile. The billing relationship may be between Microsoft, the
  customer, and/or a third-party. \

  [KnownBillingRelationshipType](xref:@azure/arm-billing.KnownBillingRelationshipType)
  can be used interchangeably with BillingRelationshipType,
   this enum contains the known values that the service supports.
  ### Known values supported by the service

  **Other**: Other \

  **Direct**: Direct \

  **IndirectCustomer**: IndirectCustomer \

  **IndirectPartner**: IndirectPartner \

  **CSPPartner**: CSPPartner \

  **CSPCustomer**: CSPCustomer
fullName: BillingRelationshipType
remarks: ''
isDeprecated: false
syntax: |
  type BillingRelationshipType = string
