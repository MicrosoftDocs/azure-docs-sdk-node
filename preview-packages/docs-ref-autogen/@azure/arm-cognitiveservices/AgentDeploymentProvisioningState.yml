name: AgentDeploymentProvisioningState
uid: '@azure/arm-cognitiveservices.AgentDeploymentProvisioningState'
package: '@azure/arm-cognitiveservices'
summary: >-
  Provisioning state of an agentic deployment, as an Azure resource. \

  [KnownAgentDeploymentProvisioningState](xref:@azure/arm-cognitiveservices.KnownAgentDeploymentProvisioningState)
  can be used interchangeably with AgentDeploymentProvisioningState,
   this enum contains the known values that the service supports.
  ### Known values supported by the service

  **Succeeded**: The deployment was successfully completed. \

  **Failed**: The deployment failed. \

  **Canceled**: The deployment was canceled. \

  **Creating**: The deployment is being created. \

  **Updating**: The deployment is being updated. \

  **Deleting**: The deployment is being deleted.
