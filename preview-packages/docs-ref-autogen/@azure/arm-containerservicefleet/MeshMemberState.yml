name: MeshMemberState
uid: '@azure/arm-containerservicefleet.MeshMemberState'
package: '@azure/arm-containerservicefleet'
summary: >-
  Mesh member state. \

  [KnownMeshMemberState](xref:@azure/arm-containerservicefleet.KnownMeshMemberState)
  can be used interchangeably with MeshMemberState,
   this enum contains the known values that the service supports.
  ### Known values supported by the service

  **Connecting**: The member is connecting to the mesh. \

  **Connected**: The member is connected to the mesh. \

  **Disconnecting**: The member is disconnecting from the mesh. \

  **Failed**: The member failed to connect due to an error.
