name: RegionalEndpoints
uid: '@azure/arm-containerregistry.RegionalEndpoints'
package: '@azure/arm-containerregistry'
summary: >-
  Whether or not per-region endpoints are enabled for accessing the registry. \

  [KnownRegionalEndpoints](xref:@azure/arm-containerregistry.KnownRegionalEndpoints)
  can be used interchangeably with RegionalEndpoints,
   this enum contains the known values that the service supports.
  ### Known values supported by the service

  **Enabled**: Regional endpoints are enabled. \

  **Disabled**: Regional endpoints are disabled.
