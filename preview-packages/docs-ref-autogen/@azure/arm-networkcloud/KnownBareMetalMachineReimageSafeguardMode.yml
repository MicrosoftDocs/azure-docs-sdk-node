### YamlMime:TSEnum
name: KnownBareMetalMachineReimageSafeguardMode
uid: '@azure/arm-networkcloud.KnownBareMetalMachineReimageSafeguardMode'
package: '@azure/arm-networkcloud'
summary: >-
  The safeguard mode to use for the reimage action, where None indicates to
  bypass safeguards and All indicates to utilize all safeguards.
fullName: KnownBareMetalMachineReimageSafeguardMode
remarks: ''
isDeprecated: false
fields:
  - name: All
    uid: '@azure/arm-networkcloud.KnownBareMetalMachineReimageSafeguardMode.All'
    package: '@azure/arm-networkcloud'
    summary: >-
      Run all pre‑operation validation checks before performing the reimage. If
      any check fails, the request is rejected and no changes are made.
  - name: None
    uid: '@azure/arm-networkcloud.KnownBareMetalMachineReimageSafeguardMode.None'
    package: '@azure/arm-networkcloud'
    summary: >-
      Skip all safeguards and perform the reimage without running pre‑operation
      validation checks.
