### YamlMime:TSTypeAlias
name: HealthProbeEnabled
uid: '@azure/arm-frontdoor.HealthProbeEnabled'
package: '@azure/arm-frontdoor'
summary: >-
  Whether to enable health probes to be made against backends defined under
  backendPools. Health probes can only be disabled if there is a single enabled
  backend in single enabled backend pool. \

  [KnownHealthProbeEnabled](xref:@azure/arm-frontdoor.KnownHealthProbeEnabled)
  can be used interchangeably with HealthProbeEnabled,
   this enum contains the known values that the service supports.
  ### Known values supported by the service

  **Enabled**: Enabled \

  **Disabled**: Disabled
fullName: HealthProbeEnabled
remarks: ''
isDeprecated: false
syntax: |
  type HealthProbeEnabled = string
