name: KnownOverwriteDatabasesOnTargetServer
uid: '@azure/arm-postgresql-flexible.KnownOverwriteDatabasesOnTargetServer'
package: '@azure/arm-postgresql-flexible'
summary: >-
  Indicates if databases on the target server can be overwritten when already
  present. If set to 'False', when the migration workflow detects that the
  database already exists on the target server, it will wait for a confirmation.
fullName: KnownOverwriteDatabasesOnTargetServer
remarks: ''
isDeprecated: false
fields:
  - name: 'False'
    uid: '@azure/arm-postgresql-flexible.KnownOverwriteDatabasesOnTargetServer.False'
    package: '@azure/arm-postgresql-flexible'
    summary: 'False'
  - name: 'True'
    uid: '@azure/arm-postgresql-flexible.KnownOverwriteDatabasesOnTargetServer.True'
    package: '@azure/arm-postgresql-flexible'
    summary: 'True'
