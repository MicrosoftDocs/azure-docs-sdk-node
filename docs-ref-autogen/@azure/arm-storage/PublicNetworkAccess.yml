### YamlMime:TSTypeAlias
name: PublicNetworkAccess
uid: '@azure/arm-storage.PublicNetworkAccess'
package: '@azure/arm-storage'
summary: >-
  Allow, disallow, or let Network Security Perimeter configuration to evaluate
  public network access to Storage Account. Value is optional but if passed in,
  must be 'Enabled', 'Disabled' or 'SecuredByPerimeter'. \

  [KnownPublicNetworkAccess](xref:@azure/arm-storage.KnownPublicNetworkAccess)
  can be used interchangeably with PublicNetworkAccess,
   this enum contains the known values that the service supports.
  ### Known values supported by the service

  **Enabled** \

  **Disabled** \

  **SecuredByPerimeter**
fullName: PublicNetworkAccess
remarks: ''
isDeprecated: false
syntax: |
  type PublicNetworkAccess = string
