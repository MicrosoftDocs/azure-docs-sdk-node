### YamlMime:TSTypeAlias
name: AzureAiServicesMode
uid: '@azure/arm-devcenter.AzureAiServicesMode'
package: '@azure/arm-devcenter'
summary: >-
  Indicates whether Azure AI services are enabled for a project. \

  [KnownAzureAiServicesMode](xref:@azure/arm-devcenter.KnownAzureAiServicesMode)
  can be used interchangeably with AzureAiServicesMode,
   this enum contains the known values that the service supports.
  ### Known values supported by the service

  **Disabled**: Azure AI services are disabled for this project. \

  **AutoDeploy**: Azure AI services are enabled for this project and necessary
  resources will be automatically setup.
fullName: AzureAiServicesMode
remarks: ''
isDeprecated: false
syntax: |
  type AzureAiServicesMode = string
