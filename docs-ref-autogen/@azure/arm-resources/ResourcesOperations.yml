  - name: validateMoveResources
    uid: '@azure/arm-resources.ResourcesOperations.validateMoveResources'
    package: '@azure/arm-resources'
    summary: >-
      This operation checks whether the specified resources can be moved to the
      target. The resources to be moved must be in the same source resource
      group in the source subscription being used. The target resource group may
      be in a different subscription. If validation succeeds, it returns HTTP
      response code 204 (no content). If validation fails, it returns HTTP
      response code 409 (Conflict) with an error message. Retrieve the URL in
      the Location header value to check the result of the long-running
      operation.
    fullName: validateMoveResources
    remarks: ''
    isDeprecated: false
    syntax:
      content: >-
        validateMoveResources: (sourceResourceGroupName: string, parameters:
        ResourcesMoveInfo, options?:
        ResourcesValidateMoveResourcesOptionalParams) =>
        PollerLike<OperationState<void>, void>
      return:
