### YamlMime:TSEnum
name: KnownVMOperationStatus
uid: '@azure/arm-computefleet.KnownVMOperationStatus'
package: '@azure/arm-computefleet'
summary: Virtual Machine operation status values.
fullName: KnownVMOperationStatus
remarks: ''
isDeprecated: false
fields:
  - name: Creating
    uid: '@azure/arm-computefleet.KnownVMOperationStatus.Creating'
    package: '@azure/arm-computefleet'
    summary: >-
      Indicates that the virtual machine is either in the process of being
      created or is scheduled to be created.
  - name: Failed
    uid: '@azure/arm-computefleet.KnownVMOperationStatus.Failed'
    package: '@azure/arm-computefleet'
    summary: Indicates that the virtual machine operation failed.
  - name: Launching
    uid: '@azure/arm-computefleet.KnownVMOperationStatus.Launching'
    package: '@azure/arm-computefleet'
    summary: >-
      Indicates that the virtual machine has not been accepted by Compute yet
      and is still scheduled to be created.
  - name: Succeeded
    uid: '@azure/arm-computefleet.KnownVMOperationStatus.Succeeded'
    package: '@azure/arm-computefleet'
    summary: Indicates that the virtual machine operation completed successfully.
