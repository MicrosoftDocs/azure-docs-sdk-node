### YamlMime:TSTypeAlias
name: PublicNetworkAccess
uid: '@azure/arm-maps.PublicNetworkAccess'
package: '@azure/arm-maps'
summary: >-
  Property to specify whether the Maps Account will accept traffic from public
  internet. If set to 'disabled' all traffic except private endpoint traffic and
  that that originates from trusted services will be blocked. \

  [KnownPublicNetworkAccess](xref:@azure/arm-maps.KnownPublicNetworkAccess) can
  be used interchangeably with PublicNetworkAccess,
   this enum contains the known values that the service supports.
  ### Known values supported by the service

  **enabled**: enabled \

  **disabled**: disabled
fullName: PublicNetworkAccess
remarks: ''
isDeprecated: false
syntax: |
  type PublicNetworkAccess = string
