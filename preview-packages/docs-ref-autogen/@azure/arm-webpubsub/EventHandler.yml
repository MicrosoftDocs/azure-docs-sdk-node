properties:
  - name: auth
    uid: '@azure/arm-webpubsub.EventHandler.auth'
    package: '@azure/arm-webpubsub'
    summary: Upstream auth settings. If not set, no auth is used for upstream messages.
    fullName: auth
    remarks: ''
    isDeprecated: false
    syntax:
      content: 'auth?: UpstreamAuthSettings'
      return:
        description: ''
