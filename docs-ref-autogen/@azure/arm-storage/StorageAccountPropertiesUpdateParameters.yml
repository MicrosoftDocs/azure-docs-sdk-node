    uid: >-
      @azure/arm-storage.StorageAccountPropertiesUpdateParameters.enableHttpsTrafficOnly
    package: '@azure/arm-storage'
    summary: Allows https traffic only to storage service if sets to true.
    fullName: enableHttpsTrafficOnly
    remarks: ''
    isDeprecated: false
    syntax:
      content: 'enableHttpsTrafficOnly?: boolean'
      return:
        description: ''
        type: boolean
