### YamlMime:TSTypeAlias
name: ClusterConnectionStatus
uid: '@azure/arm-networkcloud.ClusterConnectionStatus'
package: '@azure/arm-networkcloud'
summary: >-
  The latest heartbeat status between the cluster manager and the cluster. \

  [KnownClusterConnectionStatus](xref:@azure/arm-networkcloud.KnownClusterConnectionStatus)
  can be used interchangeably with ClusterConnectionStatus,
   this enum contains the known values that the service supports.
  ### Known values supported by the service

  **Connected**: The latest heartbeat status is healthy. \

  **Disconnected**: The latest heartbeat status is unhealthy. \

  **Timeout**: Too many of the latest heartbeats were missed. \

  **Undefined**: Could not determine the latest heartbeat status.
fullName: ClusterConnectionStatus
remarks: ''
isDeprecated: false
syntax: |
  type ClusterConnectionStatus = string
