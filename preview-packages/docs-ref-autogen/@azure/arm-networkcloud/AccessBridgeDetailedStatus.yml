name: AccessBridgeDetailedStatus
uid: '@azure/arm-networkcloud.AccessBridgeDetailedStatus'
package: '@azure/arm-networkcloud'
summary: >-
  The detailed status reported by the access bridge. \

  [KnownAccessBridgeDetailedStatus](xref:@azure/arm-networkcloud.KnownAccessBridgeDetailedStatus)
  can be used interchangeably with AccessBridgeDetailedStatus,
   this enum contains the known values that the service supports.
  ### Known values supported by the service

  **Running**: The access bridge is healthy and operating normally. \

  **Degraded**: The access bridge is experiencing degraded performance or
  partial outages. \

  **Failed**: The access bridge is not operational.
