name: EvaluationType
uid: '@azure/arm-monitorslis.EvaluationType'
package: '@azure/arm-monitorslis'
summary: >-
  Specifies how the SLI is evaluated. \

  [KnownEvaluationType](xref:@azure/arm-monitorslis.KnownEvaluationType) can be
  used interchangeably with EvaluationType,
   this enum contains the known values that the service supports.
  ### Known values supported by the service

  **WindowBased**: Evaluates SLI based on time windows. \

  **RequestBased**: Evaluates SLI based on request counts.
