  - name: updateAtScope
    uid: '@azure/arm-resources.TagsOperationsOperations.updateAtScope'
    package: '@azure/arm-resources'
    summary: >-
      This operation allows replacing, merging or selectively deleting tags on
      the specified resource or subscription. The specified entity can have a
      maximum of 50 tags at the end of the operation. The 'replace' option
      replaces the entire set of existing tags with a new set. The 'merge'
      option allows adding tags with new names and updating the values of tags
      with existing names. The 'delete' option allows selectively deleting tags
      based on given names or name/value pairs.
    fullName: updateAtScope
    remarks: ''
    isDeprecated: false
    syntax:
      content: >-
