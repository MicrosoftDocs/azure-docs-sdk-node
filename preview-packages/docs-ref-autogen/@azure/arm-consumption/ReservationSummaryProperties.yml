    fullName: reservationOrderId
    remarks: ''
    isDeprecated: false
    syntax:
      content: 'reservationOrderId?: string'
      return:
        description: ''
        type: string
  - name: reservedHours
    uid: '@azure/arm-consumption.ReservationSummaryProperties.reservedHours'
    package: '@azure/arm-consumption'
    summary: >-
      This is the total hours reserved. E.g. if reservation for 1 instance was
      made on 1 PM, this will be 11 hours for that day and 24 hours from
      subsequent days
    fullName: reservedHours
    remarks: ''
    isDeprecated: false
    syntax:
      content: 'reservedHours?: number'
      return:
        description: ''
        type: number
