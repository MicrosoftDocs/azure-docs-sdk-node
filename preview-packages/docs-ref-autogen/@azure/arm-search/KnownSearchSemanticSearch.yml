### YamlMime:TSEnum
name: KnownSearchSemanticSearch
uid: '@azure/arm-search.KnownSearchSemanticSearch'
package: '@azure/arm-search'
summary: >-
  Specifies the availability and billing plan for semantic search on the Azure
  AI Search service. This configuration is only available for certain pricing
  tiers in certain regions.
fullName: KnownSearchSemanticSearch
remarks: ''
isDeprecated: false
fields:
  - name: Disabled
    uid: '@azure/arm-search.KnownSearchSemanticSearch.Disabled'
    package: '@azure/arm-search'
    summary: Indicates that semantic reranker is disabled for the search service.
  - name: Free
    uid: '@azure/arm-search.KnownSearchSemanticSearch.Free'
    package: '@azure/arm-search'
    summary: >-
      Enables semantic reranker on a search service and indicates that it is to
      be used within the limits of the free plan. The free plan would cap the
      volume of semantic ranking requests and is offered at no extra charge.
      This is the default for newly provisioned search services. This is the
      default.
  - name: Standard
    uid: '@azure/arm-search.KnownSearchSemanticSearch.Standard'
    package: '@azure/arm-search'
    summary: >-
      Enables semantic reranker on a search service as a billable feature after
      the free quota is exhausted, with higher throughput and volume of
      semantically reranked queries.
