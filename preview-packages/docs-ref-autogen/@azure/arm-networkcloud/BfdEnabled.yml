### YamlMime:TSTypeAlias
name: BfdEnabled
uid: '@azure/arm-networkcloud.BfdEnabled'
package: '@azure/arm-networkcloud'
summary: >-
  The indicator to determine if automatic allocation from the pool should occur.
  \

  [KnownBfdEnabled](xref:@azure/arm-networkcloud.KnownBfdEnabled) can be used
  interchangeably with BfdEnabled,
   this enum contains the known values that the service supports.
  ### Known values supported by the service

  **True**: BFD is enabled for this BGP peer. \

  **False**: BFD is disabled for this BGP peer.
fullName: BfdEnabled
remarks: ''
isDeprecated: false
syntax: |
  type BfdEnabled = string
