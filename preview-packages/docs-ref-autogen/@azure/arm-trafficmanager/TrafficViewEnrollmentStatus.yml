name: TrafficViewEnrollmentStatus
uid: '@azure/arm-trafficmanager.TrafficViewEnrollmentStatus'
package: '@azure/arm-trafficmanager'
summary: >-
  Indicates whether Traffic View is 'Enabled' or 'Disabled' for the Traffic
  Manager profile. Null, indicates 'Disabled'. Enabling this feature will
  increase the cost of the Traffic Manage profile. \

  [KnownTrafficViewEnrollmentStatus](xref:@azure/arm-trafficmanager.KnownTrafficViewEnrollmentStatus)
  can be used interchangeably with TrafficViewEnrollmentStatus,
   this enum contains the known values that the service supports.
  ### Known values supported by the service

  **Enabled** \

  **Disabled**
fullName: TrafficViewEnrollmentStatus
remarks: ''
isDeprecated: false
syntax: |
  type TrafficViewEnrollmentStatus = string
