name: StorageType
uid: '@azure/arm-appcontainers.StorageType'
package: '@azure/arm-appcontainers'
summary: >-
  Storage type for the volume. If not provided, use EmptyDir. \

  [KnownStorageType](xref:@azure/arm-appcontainers.KnownStorageType) can be used
  interchangeably with StorageType,
   this enum contains the known values that the service supports.
  ### Known values supported by the service

  **AzureFile**: AzureFile \

  **EmptyDir**: EmptyDir \

  **Secret**: Secret \

  **NfsAzureFile**: NfsAzureFile \

  **Smb**: Smb
