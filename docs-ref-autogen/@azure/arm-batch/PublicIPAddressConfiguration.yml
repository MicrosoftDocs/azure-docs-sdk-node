### YamlMime:TSType
name: PublicIPAddressConfiguration
uid: '@azure/arm-batch.PublicIPAddressConfiguration'
package: '@azure/arm-batch'
summary: The public IP Address configuration of the networking configuration of a Pool.
fullName: PublicIPAddressConfiguration
remarks: ''
isDeprecated: false
type: interface
properties:
  - name: ipAddressIds
    uid: '@azure/arm-batch.PublicIPAddressConfiguration.ipAddressIds'
    package: '@azure/arm-batch'
    summary: >-
      The number of IPs specified here limits the maximum size of the Pool - 100
      dedicated nodes or 100 Spot/low-priority nodes can be allocated for each
      public IP. For example, a pool needing 250 dedicated VMs would need at
      least 3 public IPs specified. Each element of this collection is of the
      form:
      /subscriptions/{subscription}/resourceGroups/{group}/providers/Microsoft.Network/publicIPAddresses/{ip}.
    fullName: ipAddressIds
    remarks: ''
    isDeprecated: false
    syntax:
      content: 'ipAddressIds?: string[]'
      return:
        description: ''
        type: string[]
  - name: ipFamilies
    uid: '@azure/arm-batch.PublicIPAddressConfiguration.ipFamilies'
    package: '@azure/arm-batch'
    summary: >-
      IP families are used to determine single-stack or dual-stack pools. For
      single-stack, the expected value is IPv4. For dual-stack, the expected
      values are IPv4 and IPv6.
    fullName: ipFamilies
    remarks: ''
    isDeprecated: false
    syntax:
      content: 'ipFamilies?: string[]'
      return:
        description: ''
        type: string[]
  - name: ipTags
    uid: '@azure/arm-batch.PublicIPAddressConfiguration.ipTags'
    package: '@azure/arm-batch'
    summary: IP Tags that will applied to new Public IPs that Batch creates.
    fullName: ipTags
    remarks: ''
    isDeprecated: false
    syntax:
      content: 'ipTags?: IPTag[]'
      return:
        description: ''
        type: <xref uid="@azure/arm-batch.IPTag" />[]
  - name: provision
    uid: '@azure/arm-batch.PublicIPAddressConfiguration.provision'
    package: '@azure/arm-batch'
    summary: The default value is BatchManaged
    fullName: provision
    remarks: ''
    isDeprecated: false
    syntax:
      content: 'provision?: IPAddressProvisioningType'
      return:
        description: ''
        type: <xref uid="@azure/arm-batch.IPAddressProvisioningType" />
