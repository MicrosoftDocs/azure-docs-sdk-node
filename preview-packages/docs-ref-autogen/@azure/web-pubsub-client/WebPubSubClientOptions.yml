properties:
  - name: autoReconnect
    uid: '@azure/web-pubsub-client.WebPubSubClientOptions.autoReconnect'
    package: '@azure/web-pubsub-client'
    summary: Whether to auto reconnect after connection is dropped and not recoverable
    fullName: autoReconnect
    remarks: ''
    isDeprecated: false
    syntax:
      content: 'autoReconnect?: boolean'
      return:
        description: ''
        type: boolean
  - name: autoRejoinGroups
    uid: '@azure/web-pubsub-client.WebPubSubClientOptions.autoRejoinGroups'
    package: '@azure/web-pubsub-client'
    summary: Whether to enable restoring group after reconnecting
    fullName: autoRejoinGroups
    remarks: ''
    isDeprecated: false
    syntax:
      content: 'autoRejoinGroups?: boolean'
      return:
        description: ''
        type: boolean
  - name: keepAliveIntervalInMs
    uid: '@azure/web-pubsub-client.WebPubSubClientOptions.keepAliveIntervalInMs'
    package: '@azure/web-pubsub-client'
    summary: >-
      The interval in milliseconds at which to send keep-alive ping messages to
      the runtime. Default

      is 20000ms (20 seconds). Set to 0 to disable client-initiated keep-alive
      pings. Must be greater

      than or equal to 0. We recommend choosing a value that is lower than
      `keepAliveTimeoutInMs`

      (again, about 3x lower) so the timeout only triggers when multiple pings
      fail.
    fullName: keepAliveIntervalInMs
    remarks: ''
    isDeprecated: false
    syntax:
      content: 'keepAliveIntervalInMs?: number'
      return:
        description: ''
        type: number
  - name: keepAliveTimeoutInMs
    uid: '@azure/web-pubsub-client.WebPubSubClientOptions.keepAliveTimeoutInMs'
    package: '@azure/web-pubsub-client'
    summary: >-
      The idle timeout in milliseconds used to detect half-open connections when
      no data or pong has

      been received. Default is 120000ms (120 seconds). Set to 0 to disable this
      timeout check. Must

      be greater than or equal to 0. We recommend keeping this value comfortably
      larger than

      `keepAliveIntervalInMs` (for example 3x) so that probes have time to run
      before the timeout

      closes the socket.
    fullName: keepAliveTimeoutInMs
    remarks: ''
    isDeprecated: false
    syntax:
      content: 'keepAliveTimeoutInMs?: number'
      return:
        description: ''
        type: number
