### YamlMime:TSTypeAlias
name: Enforce
uid: '@azure/arm-security.Enforce'
package: '@azure/arm-security'
summary: >-
  If set to "False", it allows the descendants of this scope to override the
  pricing configuration set on this scope (allows setting inherited="False"). If
  set to "True", it prevents overrides and forces this pricing configuration on
  all the descendants of this scope. This field is only available for
  subscription-level pricing. \

  [KnownEnforce](xref:@azure/arm-security.KnownEnforce) can be used
  interchangeably with Enforce,
   this enum contains the known values that the service supports.
  ### Known values supported by the service

  **False**: Allows the descendants of this scope to override the pricing
  configuration set on this scope (allows setting inherited="False") \

  **True**: Prevents overrides and forces the current scope's pricing
  configuration to all descendants
fullName: Enforce
remarks: ''
isDeprecated: false
syntax: |
  type Enforce = string
