name: SpecialTaxationType
uid: '@azure/arm-billing.SpecialTaxationType'
package: '@azure/arm-billing'
summary: >-
  Identifies the type of tax calculation used for the invoice. The field is
  applicable only to invoices with special tax calculation logic. \

  [KnownSpecialTaxationType](xref:@azure/arm-billing.KnownSpecialTaxationType)
  can be used interchangeably with SpecialTaxationType,
   this enum contains the known values that the service supports.
  ### Known values supported by the service

  **SubtotalLevel**: SubtotalLevel \

  **InvoiceLevel**: InvoiceLevel
