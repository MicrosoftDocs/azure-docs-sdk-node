### YamlMime:TSTypeAlias
name: MigStrategy
uid: '@azure/arm-containerservice.MigStrategy'
package: '@azure/arm-containerservice'
summary: >-
  Sets the MIG (Multi-Instance GPU) strategy that will be used for managed MIG
  support. For more information about the different strategies, visit
  aka.ms/aks/managed-gpu. When not specified, the default is None. \

  [KnownMigStrategy](xref:@azure/arm-containerservice.KnownMigStrategy) can be
  used interchangeably with MigStrategy,
   this enum contains the known values that the service supports.
  ### Known values supported by the service

  **None**: Don't set a MIG strategy. If you previously had one set, this will
  override it and set remove the set MIG strategy. \

  **Single**: Set the MIG strategy for managed MIG as single. \

  **Mixed**: Set the MIG strategy for managed MIG as mixed.
fullName: MigStrategy
remarks: ''
isDeprecated: false
syntax: |
  type MigStrategy = string
