  - name: update
    uid: '@azure/arm-billing.BillingAccountsOperations.update'
    package: '@azure/arm-billing'
    summary: >-
      Updates the properties of a billing account. Currently, displayName and
      address can be updated for billing accounts with agreement type Microsoft
      Customer Agreement. Currently address and notification email address can
      be updated for billing accounts with agreement type Microsoft Online
      Services Agreement. Currently, purchase order number can be edited for
      billing accounts with agreement type Enterprise Agreement.
