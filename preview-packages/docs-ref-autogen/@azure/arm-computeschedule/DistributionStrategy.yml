### YamlMime:TSTypeAlias
name: DistributionStrategy
uid: '@azure/arm-computeschedule.DistributionStrategy'
package: '@azure/arm-computeschedule'
summary: >-
  The distribution strategy for zone allocation \

  [KnownDistributionStrategy](xref:@azure/arm-computeschedule.KnownDistributionStrategy)
  can be used interchangeably with DistributionStrategy,
   this enum contains the known values that the service supports.
  ### Known values supported by the service

  **BestEffortSingleZone**: Platform attempts to place as many VMs as possible
  in a single zone, falls back to multiple zones if needed \

  **Prioritized**: Platform uses customer-provided zone rankings to allocate VMs
  \

  **BestEffortBalanced**: Platform attempts to evenly distribute VMs across all
  available zones with best effort \

  **StrictBalanced**: Platform must evenly distribute VMs across zones, request
  is rejected if exact balance cannot be achieved
fullName: DistributionStrategy
remarks: ''
isDeprecated: false
syntax: |
  type DistributionStrategy = string
