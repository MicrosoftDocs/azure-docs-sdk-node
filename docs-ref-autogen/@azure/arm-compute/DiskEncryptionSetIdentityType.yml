### YamlMime:TSTypeAlias
name: DiskEncryptionSetIdentityType
uid: '@azure/arm-compute.DiskEncryptionSetIdentityType'
package: '@azure/arm-compute'
summary: >-
  The type of Managed Identity used by the DiskEncryptionSet. Only
  SystemAssigned is supported for new creations. Disk Encryption Sets can be
  updated with Identity type None during migration of subscription to a new
  Azure Active Directory tenant; it will cause the encrypted resources to lose
  access to the keys. \

  [KnownDiskEncryptionSetIdentityType](xref:@azure/arm-compute.KnownDiskEncryptionSetIdentityType)
  can be used interchangeably with DiskEncryptionSetIdentityType,
   this enum contains the known values that the service supports.
  ### Known values supported by the service

  **SystemAssigned** \

  **UserAssigned** \

  **SystemAssigned, UserAssigned** \

  **None**
fullName: DiskEncryptionSetIdentityType
remarks: ''
isDeprecated: false
syntax: |
  type DiskEncryptionSetIdentityType = string
