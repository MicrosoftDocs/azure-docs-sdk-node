name: RaiEgressRuleActionType
uid: '@azure/arm-cognitiveservices.RaiEgressRuleActionType'
package: '@azure/arm-cognitiveservices'
summary: >-
  The kind of action an egress rule takes when it matches. \

  [KnownRaiEgressRuleActionType](xref:@azure/arm-cognitiveservices.KnownRaiEgressRuleActionType)
  can be used interchangeably with RaiEgressRuleActionType,
   this enum contains the known values that the service supports.
  ### Known values supported by the service

  **Allow**: Allow the matched traffic. \

  **Deny**: Deny the matched traffic. \

  **Transform**: Forward the matched traffic after applying header transforms.
  Requires at least one header. \

  **Rewrite**: Redirect the matched traffic to a new destination, optionally
  applying header transforms. Requires a rewrite target.
fullName: RaiEgressRuleActionType
remarks: ''
isDeprecated: false
syntax: |
  type RaiEgressRuleActionType = string
