### YamlMime:TSEnum
name: KnownProvisioningStateEnum
uid: '@azure/arm-operationalinsights.KnownProvisioningStateEnum'
package: '@azure/arm-operationalinsights'
summary: >-
  Table's current provisioning state. If set to 'updating', indicates a resource
  lock due to ongoing operation, forbidding any update to the table until the
  ongoing operation is concluded.
fullName: KnownProvisioningStateEnum
remarks: ''
isDeprecated: false
fields:
  - name: Canceled
    uid: '@azure/arm-operationalinsights.KnownProvisioningStateEnum.Canceled'
    package: '@azure/arm-operationalinsights'
    summary: Table state is canceled.
  - name: Deleting
    uid: '@azure/arm-operationalinsights.KnownProvisioningStateEnum.Deleting'
    package: '@azure/arm-operationalinsights'
    summary: Table state is deleting.
  - name: Failed
    uid: '@azure/arm-operationalinsights.KnownProvisioningStateEnum.Failed'
    package: '@azure/arm-operationalinsights'
    summary: Table state is failed.
  - name: Succeeded
    uid: '@azure/arm-operationalinsights.KnownProvisioningStateEnum.Succeeded'
    package: '@azure/arm-operationalinsights'
    summary: >-
      Table state is stable and without changes, table is unlocked and open for
      new updates.
  - name: Updating
    uid: '@azure/arm-operationalinsights.KnownProvisioningStateEnum.Updating'
    package: '@azure/arm-operationalinsights'
    summary: >-
      Table schema is still being built and updated, table is currently locked
      for any changes till the procedure is done.
