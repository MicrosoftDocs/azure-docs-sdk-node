### YamlMime:TSTypeAlias
name: AutoExportStatusType
uid: '@azure/arm-storagecache.AutoExportStatusType'
package: '@azure/arm-storagecache'
summary: >-
  The operational state of auto export. InProgress indicates the export is
  running.  Disabling indicates the user has requested to disable the export but
  the disabling is still in progress. Disabled indicates auto export has been
  disabled.  DisableFailed indicates the disabling has failed.  Failed means the
  export was unable to continue, due to a fatal error. \

  [KnownAutoExportStatusType](xref:@azure/arm-storagecache.KnownAutoExportStatusType)
  can be used interchangeably with AutoExportStatusType,
   this enum contains the known values that the service supports.
  ### Known values supported by the service

  **InProgress**: InProgress \

  **Disabling**: Disabling \

  **Disabled**: Disabled \

  **DisableFailed**: DisableFailed \

  **Failed**: Failed
fullName: AutoExportStatusType
remarks: ''
isDeprecated: false
syntax: |
  type AutoExportStatusType = string
