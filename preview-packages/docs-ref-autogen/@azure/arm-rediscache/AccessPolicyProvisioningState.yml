name: AccessPolicyProvisioningState
uid: '@azure/arm-rediscache.AccessPolicyProvisioningState'
package: '@azure/arm-rediscache'
summary: >-
  Provisioning state of access policy \

  [KnownAccessPolicyProvisioningState](xref:@azure/arm-rediscache.KnownAccessPolicyProvisioningState)
  can be used interchangeably with AccessPolicyProvisioningState,
   this enum contains the known values that the service supports.
  ### Known values supported by the service

  **Updating**: An operation is in progress. \

  **Succeeded**: The operation succeeded. \

  **Deleting**: A delete operation is in progress. \

  **Deleted**: The access policy is considered deleted, if it still exists. \

  **Canceled**: The operation was canceled. Access policies may be in a
  partially updated state. Update them again to have a well-defined state. \

  **Failed**: The operation failed. Access policies may be in a partially
  updated state. Update them again to have a well-defined state.
fullName: AccessPolicyProvisioningState
