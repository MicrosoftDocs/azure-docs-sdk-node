### YamlMime:TSType
name: ThrottleByJwtCustomClaimRule
uid: '@azure/arm-signalr.ThrottleByJwtCustomClaimRule'
package: '@azure/arm-signalr'
summary: Throttle the client connection by a custom JWT claim
fullName: ThrottleByJwtCustomClaimRule
remarks: ''
isDeprecated: false
type: interface
properties:
  - name: claimName
    uid: '@azure/arm-signalr.ThrottleByJwtCustomClaimRule.claimName'
    package: '@azure/arm-signalr'
    summary: >-
      The name of the claim in the JWT token. The client connection with the
      same claim value will be aggregated. If the claim is not found in the
      token, the connection will be allowed.
    fullName: claimName
    remarks: ''
    isDeprecated: false
    syntax:
      content: 'claimName: string'
      return:
        description: ''
        type: string
  - name: maxCount
    uid: '@azure/arm-signalr.ThrottleByJwtCustomClaimRule.maxCount'
    package: '@azure/arm-signalr'
    summary: >-
      Maximum connection count allowed for the same Jwt claim value. Clients
      with the same Jwt claim will get rejected if the connection count exceeds
      this value. Default value is 20.
    fullName: maxCount
    remarks: ''
    isDeprecated: false
    syntax:
      content: 'maxCount?: number'
      return:
        description: ''
        type: number
  - name: type
    uid: '@azure/arm-signalr.ThrottleByJwtCustomClaimRule.type'
    package: '@azure/arm-signalr'
    summary: ''
    fullName: type
    remarks: ''
    isDeprecated: false
    syntax:
      content: 'type: "ThrottleByJwtCustomClaimRule"'
      return:
        description: ''
        type: '"ThrottleByJwtCustomClaimRule"'
extends: <xref uid="@azure/arm-signalr.ClientConnectionCountRule" />
