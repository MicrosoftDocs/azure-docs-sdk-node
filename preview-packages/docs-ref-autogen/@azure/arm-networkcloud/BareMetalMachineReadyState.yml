summary: >-
  The indicator of whether the bare metal machine is ready to receive workloads.
  \

  [KnownBareMetalMachineReadyState](xref:@azure/arm-networkcloud.KnownBareMetalMachineReadyState)
  can be used interchangeably with BareMetalMachineReadyState,
   this enum contains the known values that the service supports.
  ### Known values supported by the service

  **True**: The bare metal machine is ready to receive workloads. \

  **False**: The bare metal machine is not ready to receive workloads.
