name: StopOnDisconnectEnableStatus
uid: '@azure/arm-devcenter.StopOnDisconnectEnableStatus'
package: '@azure/arm-devcenter'
summary: >-
  Stop on disconnect enable or disable status. Indicates whether stop on
  disconnect to is either enabled or disabled. \

  [KnownStopOnDisconnectEnableStatus](xref:@azure/arm-devcenter.KnownStopOnDisconnectEnableStatus)
  can be used interchangeably with StopOnDisconnectEnableStatus,
   this enum contains the known values that the service supports.
  ### Known values supported by the service

  **Enabled**: Stop on disconnect is enabled. \

  **Disabled**: Stop on disconnect is disabled.
fullName: StopOnDisconnectEnableStatus
