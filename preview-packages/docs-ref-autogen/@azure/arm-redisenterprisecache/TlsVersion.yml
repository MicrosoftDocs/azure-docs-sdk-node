### YamlMime:TSTypeAlias
name: TlsVersion
uid: '@azure/arm-redisenterprisecache.TlsVersion'
package: '@azure/arm-redisenterprisecache'
summary: >-
  The minimum TLS version for the cluster to support, e.g. '1.2'. Newer versions
  can be added in the future. Note that TLS 1.0 and TLS 1.1 are now completely
  obsolete -- you cannot use them. They are mentioned only for the sake of
  consistency with old API versions. \

  [KnownTlsVersion](xref:@azure/arm-redisenterprisecache.KnownTlsVersion) can be
  used interchangeably with TlsVersion,
   this enum contains the known values that the service supports.
  ### Known values supported by the service

  **1.0**: 1.0 \

  **1.1**: 1.1 \

  **1.2**: 1.2
fullName: TlsVersion
remarks: ''
isDeprecated: false
syntax: |
  type TlsVersion = string
