### YamlMime:TSTypeAlias
name: IdentityProvisioningState
uid: '@azure/arm-cognitiveservices.IdentityProvisioningState'
package: '@azure/arm-cognitiveservices'
summary: >-
  Represents the provisioning state of an identity resource. \

  [KnownIdentityProvisioningState](xref:@azure/arm-cognitiveservices.KnownIdentityProvisioningState)
  can be used interchangeably with IdentityProvisioningState,
   this enum contains the known values that the service supports.
  ### Known values supported by the service

  **Creating**: Identity is being created. \

  **Updating**: Identity is being updated. \

  **Succeeded**: Identity has been successfully provisioned. \

  **Failed**: Identity provisioning has failed. \

  **Canceled**: Identity provisioning has been canceled. \

  **Deleting**: Identity is being deleted.
fullName: IdentityProvisioningState
remarks: ''
isDeprecated: false
syntax: |
  type IdentityProvisioningState = string
