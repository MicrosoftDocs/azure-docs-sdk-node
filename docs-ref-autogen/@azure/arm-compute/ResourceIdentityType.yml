### YamlMime:TSTypeAlias
name: ResourceIdentityType
uid: '@azure/arm-compute.ResourceIdentityType'
package: '@azure/arm-compute'
summary: >-
  The type of identity used for the virtual machine scale set. The type
  'SystemAssigned, UserAssigned' includes both an implicitly created identity
  and a set of user assigned identities. The type 'None' will remove any
  identities from the virtual machine scale set.
fullName: ResourceIdentityType
remarks: ''
isDeprecated: false
syntax: |
  type ResourceIdentityType =
    | "SystemAssigned"
    | "UserAssigned"
    | "SystemAssigned, UserAssigned"
    | "None"
