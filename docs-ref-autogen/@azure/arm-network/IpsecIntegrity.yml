name: IpsecIntegrity
uid: '@azure/arm-network.IpsecIntegrity'
package: '@azure/arm-network'
summary: >-
  The IPSec integrity algorithm (IKE phase 1). \

  [KnownIpsecIntegrity](xref:@azure/arm-network.KnownIpsecIntegrity) can be used
  interchangeably with IpsecIntegrity,
   this enum contains the known values that the service supports.
  ### Known values supported by the service

  **MD5**: MD5 \

  **SHA1**: SHA1 \

  **SHA256**: SHA256 \

  **GCMAES128**: GCMAES128 \

  **GCMAES192**: GCMAES192 \

  **GCMAES256**: GCMAES256
