### YamlMime:TSEnum
name: KnownOnlineStorageResizeSupport
uid: '@azure/arm-postgresql-flexible.KnownOnlineStorageResizeSupport'
package: '@azure/arm-postgresql-flexible'
summary: >-
  Indicates if resizing the storage, without interrupting the operation of the
  database engine, is supported in this location for the given subscription.
  'Enabled' means resizing the storage without interrupting the operation of the
  database engine is supported. 'Disabled' means resizing the storage without
  interrupting the operation of the database engine is not supported. Will be
  deprecated in the future. Look to Supported Features for 'OnlineResize'.
fullName: KnownOnlineStorageResizeSupport
remarks: ''
isDeprecated: false
fields:
  - name: Disabled
    uid: '@azure/arm-postgresql-flexible.KnownOnlineStorageResizeSupport.Disabled'
    package: '@azure/arm-postgresql-flexible'
    summary: Disabled
  - name: Enabled
    uid: '@azure/arm-postgresql-flexible.KnownOnlineStorageResizeSupport.Enabled'
    package: '@azure/arm-postgresql-flexible'
    summary: Enabled
