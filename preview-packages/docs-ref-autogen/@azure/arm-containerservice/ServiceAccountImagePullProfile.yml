### YamlMime:TSType
name: ServiceAccountImagePullProfile
uid: '@azure/arm-containerservice.ServiceAccountImagePullProfile'
package: '@azure/arm-containerservice'
summary: >-
  Profile for configuring image pull authentication to use service account
  scoped managed identities for authentication instead of node scoped managed
  identity (kubelet identity) for authentication to Azure Container Registry.
  For more information, refer to
  https://aka.ms/aks/identity-binding/acr-image-pull/docs
fullName: ServiceAccountImagePullProfile
remarks: ''
isDeprecated: false
type: interface
properties:
  - name: defaultManagedIdentityId
    uid: >-
      @azure/arm-containerservice.ServiceAccountImagePullProfile.defaultManagedIdentityId
    package: '@azure/arm-containerservice'
    summary: >-
      Optional. The default managed identity resource ID used for image pulls at
      the cluster level. When configured, this identity is used if a Pod’s
      service account does not explicitly specify an identity for pulling
      images. If not configured and no identity is specified at service account
      level, image will be pulled via anonymous authentication.
    fullName: defaultManagedIdentityId
    remarks: ''
    isDeprecated: false
    syntax:
      content: 'defaultManagedIdentityId?: string'
      return:
        description: ''
        type: string
  - name: enabled
    uid: '@azure/arm-containerservice.ServiceAccountImagePullProfile.enabled'
    package: '@azure/arm-containerservice'
    summary: >-
      Indicates whether service account based image pull is enabled, for which
      identity bindings are required for the managed identity to be used for
      authentication. For more information, refer to
      https://aka.ms/aks/identity-binding-docs.
    fullName: enabled
    remarks: ''
    isDeprecated: false
    syntax:
      content: 'enabled?: boolean'
      return:
        description: ''
        type: boolean
