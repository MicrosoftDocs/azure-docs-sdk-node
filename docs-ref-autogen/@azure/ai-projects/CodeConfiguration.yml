### YamlMime:TSType
name: CodeConfiguration
uid: '@azure/ai-projects.CodeConfiguration'
package: '@azure/ai-projects'
summary: Code-based deployment configuration for a hosted agent.
fullName: CodeConfiguration
remarks: ''
isDeprecated: false
type: interface
properties:
  - name: content_hash
    uid: '@azure/ai-projects.CodeConfiguration.content_hash'
    package: '@azure/ai-projects'
    summary: >-
      The SHA-256 hex digest of the uploaded code zip. Set by the service from
      the `x-ms-code-zip-sha256` request header; read-only in responses and
      never accepted in request payloads.
    fullName: content_hash
    remarks: ''
    isDeprecated: false
    syntax:
      content: 'content_hash?: string'
      return:
        description: ''
        type: string
  - name: dependency_resolution
    uid: '@azure/ai-projects.CodeConfiguration.dependency_resolution'
    package: '@azure/ai-projects'
    summary: >-
      How package dependencies are resolved at deployment time. Defaults to
      `bundled`,

      where the caller bundles all dependencies into the uploaded zip and the
      service

      performs no remote build. `remote_build` instructs the service to build

      dependencies remotely from the manifest included in the uploaded zip.
    fullName: dependency_resolution
    remarks: ''
    isDeprecated: false
    syntax:
      content: 'dependency_resolution: CodeDependencyResolution'
      return:
        description: ''
        type: <xref uid="@azure/ai-projects.CodeDependencyResolution" />
  - name: entry_point
    uid: '@azure/ai-projects.CodeConfiguration.entry_point'
    package: '@azure/ai-projects'
    summary: The entry point command and arguments for the code execution.
    fullName: entry_point
    remarks: ''
    isDeprecated: false
    syntax:
      content: 'entry_point: string[]'
      return:
        description: ''
        type: string[]
  - name: runtime
    uid: '@azure/ai-projects.CodeConfiguration.runtime'
    package: '@azure/ai-projects'
    summary: >-
      The runtime identifier for code execution (e.g., 'python_3_11',
      'python_3_12', 'python_3_13').
    fullName: runtime
    remarks: ''
    isDeprecated: false
    syntax:
      content: 'runtime: string'
      return:
        description: ''
        type: string
