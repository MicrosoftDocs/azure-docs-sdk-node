name: KnownRole
uid: '@azure/arm-providerhub.KnownRole'
package: '@azure/arm-providerhub'
summary: >-
  The ownership role the application has on the resource types. The service
  owner role gives the application owner permissions. The limited owner role
  gives elevated permissions but does not allow all the permissions of a service
  owner, such as read/write on internal metadata.
