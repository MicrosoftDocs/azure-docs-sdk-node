name: KnownZonePlacementPolicyType
uid: '@azure/arm-computeschedule.KnownZonePlacementPolicyType'
package: '@azure/arm-computeschedule'
summary: >-
  Specifies the policy for resource's placement in availability zone. Possible
  values are: **Any** (used for Virtual Machines), **Auto** (used for Virtual
  Machine Scale Sets) - An availability zone will be automatically picked by
  system as part of resource creation.
fullName: KnownZonePlacementPolicyType
remarks: ''
isDeprecated: false
fields:
  - name: Any
    uid: '@azure/arm-computeschedule.KnownZonePlacementPolicyType.Any'
    package: '@azure/arm-computeschedule'
    summary: Any
  - name: Auto
    uid: '@azure/arm-computeschedule.KnownZonePlacementPolicyType.Auto'
    package: '@azure/arm-computeschedule'
    summary: >-
      The platform automatically selects an availability zone based on the
      request.
