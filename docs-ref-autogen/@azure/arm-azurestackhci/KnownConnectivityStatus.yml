### YamlMime:TSEnum
name: KnownConnectivityStatus
uid: '@azure/arm-azurestackhci.KnownConnectivityStatus'
package: '@azure/arm-azurestackhci'
summary: >-
  Overall connectivity status for the cluster resource. Indicates whether the
  cluster is connected to Azure, partially connected, or has not recently
  communicated.
fullName: KnownConnectivityStatus
remarks: ''
isDeprecated: false
fields:
  - name: Connected
    uid: '@azure/arm-azurestackhci.KnownConnectivityStatus.Connected'
    package: '@azure/arm-azurestackhci'
    summary: The cluster is fully connected to Azure.
  - name: Disconnected
    uid: '@azure/arm-azurestackhci.KnownConnectivityStatus.Disconnected'
    package: '@azure/arm-azurestackhci'
    summary: The cluster is not connected to Azure.
  - name: NotConnectedRecently
    uid: '@azure/arm-azurestackhci.KnownConnectivityStatus.NotConnectedRecently'
    package: '@azure/arm-azurestackhci'
    summary: The cluster has not connected to Azure recently.
  - name: NotSpecified
    uid: '@azure/arm-azurestackhci.KnownConnectivityStatus.NotSpecified'
    package: '@azure/arm-azurestackhci'
    summary: The connectivity status is not specified.
  - name: NotYetRegistered
    uid: '@azure/arm-azurestackhci.KnownConnectivityStatus.NotYetRegistered'
    package: '@azure/arm-azurestackhci'
    summary: The cluster has not yet registered with Azure.
  - name: PartiallyConnected
    uid: '@azure/arm-azurestackhci.KnownConnectivityStatus.PartiallyConnected'
    package: '@azure/arm-azurestackhci'
    summary: Some components of the cluster are connected, while others are not.
