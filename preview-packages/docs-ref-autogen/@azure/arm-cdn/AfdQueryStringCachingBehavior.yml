### YamlMime:TSTypeAlias
name: AfdQueryStringCachingBehavior
uid: '@azure/arm-cdn.AfdQueryStringCachingBehavior'
package: '@azure/arm-cdn'
summary: >-
  Defines how Frontdoor caches requests that include query strings. You can
  ignore any query strings when caching, ignore specific query strings, cache
  every request with a unique URL, or cache specific query strings. \

  [KnownAfdQueryStringCachingBehavior](xref:@azure/arm-cdn.KnownAfdQueryStringCachingBehavior)
  can be used interchangeably with AfdQueryStringCachingBehavior,
   this enum contains the known values that the service supports.
  ### Known values supported by the service

  **IgnoreQueryString** \

  **UseQueryString** \

  **IgnoreSpecifiedQueryStrings** \

  **IncludeSpecifiedQueryStrings**
fullName: AfdQueryStringCachingBehavior
remarks: ''
isDeprecated: false
syntax: |
  type AfdQueryStringCachingBehavior = string
