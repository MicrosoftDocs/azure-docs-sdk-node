### YamlMime:TSTypeAlias
name: IncidentClassification
uid: '@azure/arm-securityinsight.IncidentClassification'
package: '@azure/arm-securityinsight'
summary: >-
  The reason the incident was closed \

  [KnownIncidentClassification](xref:@azure/arm-securityinsight.KnownIncidentClassification)
  can be used interchangeably with IncidentClassification,
   this enum contains the known values that the service supports.
  ### Known values supported by the service

  **Undetermined**: Incident classification was undetermined \

  **TruePositive**: Incident was true positive \

  **BenignPositive**: Incident was benign positive \

  **FalsePositive**: Incident was false positive
fullName: IncidentClassification
remarks: ''
isDeprecated: false
syntax: |
  type IncidentClassification = string
