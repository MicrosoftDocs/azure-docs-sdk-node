### YamlMime:TSTypeAlias
name: AdvancedPlatformMetricsFilterType
uid: '@azure/arm-storage.AdvancedPlatformMetricsFilterType'
package: '@azure/arm-storage'
summary: >-
  The type of filter applied to the advanced platform metrics rule. \

  [KnownAdvancedPlatformMetricsFilterType](xref:@azure/arm-storage.KnownAdvancedPlatformMetricsFilterType)
  can be used interchangeably with AdvancedPlatformMetricsFilterType,
   this enum contains the known values that the service supports.
  ### Known values supported by the service

  **AllContainersFilter**: Filter applies to all containers \

  **ContainerPrefixFilter**: Filter applies to containers matching a prefix \

  **ContainerListFilter**: Filter applies to a specific list of containers
fullName: AdvancedPlatformMetricsFilterType
remarks: ''
isDeprecated: false
syntax: |
  type AdvancedPlatformMetricsFilterType = string
