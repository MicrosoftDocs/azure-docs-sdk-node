package: '@azure/arm-frontdoor'
summary: >-
  Whether to enforce certificate name check on HTTPS requests to all backend
  pools. No effect on non-HTTPS requests. \

  [KnownEnforceCertificateNameCheckEnabledState](xref:@azure/arm-frontdoor.KnownEnforceCertificateNameCheckEnabledState)
