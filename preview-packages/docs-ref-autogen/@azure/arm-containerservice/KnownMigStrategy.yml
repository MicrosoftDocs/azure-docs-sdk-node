### YamlMime:TSEnum
name: KnownMigStrategy
uid: '@azure/arm-containerservice.KnownMigStrategy'
package: '@azure/arm-containerservice'
summary: >-
  Sets the MIG (Multi-Instance GPU) strategy that will be used for managed MIG
  support. For more information about the different strategies, visit
  aka.ms/aks/managed-gpu. When not specified, the default is None.
fullName: KnownMigStrategy
remarks: ''
isDeprecated: false
fields:
  - name: Mixed
    uid: '@azure/arm-containerservice.KnownMigStrategy.Mixed'
    package: '@azure/arm-containerservice'
    summary: Set the MIG strategy for managed MIG as mixed.
  - name: None
    uid: '@azure/arm-containerservice.KnownMigStrategy.None'
    package: '@azure/arm-containerservice'
    summary: >-
      Don't set a MIG strategy. If you previously had one set, this will
      override it and set remove the set MIG strategy.
  - name: Single
    uid: '@azure/arm-containerservice.KnownMigStrategy.Single'
    package: '@azure/arm-containerservice'
    summary: Set the MIG strategy for managed MIG as single.
