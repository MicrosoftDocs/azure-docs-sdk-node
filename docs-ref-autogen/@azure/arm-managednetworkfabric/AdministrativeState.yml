name: AdministrativeState
uid: '@azure/arm-managednetworkfabric.AdministrativeState'
package: '@azure/arm-managednetworkfabric'
summary: >-
  State defined to represent administrative actions or post actions on a
  particular resource. \

  [KnownAdministrativeState](xref:@azure/arm-managednetworkfabric.KnownAdministrativeState)
  can be used interchangeably with AdministrativeState,
   this enum contains the known values that the service supports.
  ### Known values supported by the service

  **Enabled**: Enabled Administrative State \

  **Disabled**: Disabled Administrative State \

  **MAT**: MAT(Manual Action Taken) Administrative State \

  **RMA**: RMA(Return Material Authorization) Administrative State \

  **UnderMaintenance**: UnderMaintenance Administrative State \

  **EnabledDegraded**: EnabledDegraded Administrative State.
fullName: AdministrativeState
remarks: ''
isDeprecated: false
syntax: |
  type AdministrativeState = string
