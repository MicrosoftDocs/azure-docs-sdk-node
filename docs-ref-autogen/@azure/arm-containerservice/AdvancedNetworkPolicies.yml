### YamlMime:TSTypeAlias
name: AdvancedNetworkPolicies
uid: '@azure/arm-containerservice.AdvancedNetworkPolicies'
package: '@azure/arm-containerservice'
summary: >-
  Enable advanced network policies. This allows users to configure Layer 7
  network policies (FQDN, HTTP, Kafka). Policies themselves must be configured
  via the Cilium Network Policy resources, see
  https://docs.cilium.io/en/latest/security/policy/index.html. This can be
  enabled only on cilium-based clusters. If not specified, the default value is
  FQDN if security.enabled is set to true. \

  [KnownAdvancedNetworkPolicies](xref:@azure/arm-containerservice.KnownAdvancedNetworkPolicies)
  can be used interchangeably with AdvancedNetworkPolicies,
   this enum contains the known values that the service supports.
  ### Known values supported by the service

  **L7**: Enable Layer7 network policies (FQDN, HTTP/S, Kafka). This option is a
  superset of the FQDN option. \

  **FQDN**: Enable FQDN based network policies \

  **None**: Disable Layer 7 network policies (FQDN, HTTP/S, Kafka)
fullName: AdvancedNetworkPolicies
remarks: ''
isDeprecated: false
syntax: |
  type AdvancedNetworkPolicies = string
