name: RaiEgressDefaultAction
uid: '@azure/arm-cognitiveservices.RaiEgressDefaultAction'
package: '@azure/arm-cognitiveservices'
summary: >-
  The default action when no user-defined egress rules match. \

  [KnownRaiEgressDefaultAction](xref:@azure/arm-cognitiveservices.KnownRaiEgressDefaultAction)
  can be used interchangeably with RaiEgressDefaultAction,
   this enum contains the known values that the service supports.
  ### Known values supported by the service

  **Allow**: Allow traffic by default when no rules match. \

  **Deny**: Deny traffic by default when no rules match.
