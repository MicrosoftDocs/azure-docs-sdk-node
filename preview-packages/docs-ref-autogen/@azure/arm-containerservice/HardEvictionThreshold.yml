### YamlMime:TSType
name: HardEvictionThreshold
uid: '@azure/arm-containerservice.HardEvictionThreshold'
package: '@azure/arm-containerservice'
summary: >-
  Hard eviction thresholds for kubelet. These thresholds trigger pod eviction
  when node resources drop below the specified values. Values must be greater
  than or equal to the documented minimums for each signal. Supported formats
  are Ki, Mi, Gi, or percentages using %.
fullName: HardEvictionThreshold
remarks: ''
isDeprecated: false
type: interface
properties:
  - name: memoryAvailable
    uid: '@azure/arm-containerservice.HardEvictionThreshold.memoryAvailable'
    package: '@azure/arm-containerservice'
    summary: >-
      The threshold for available memory below which pod eviction is triggered.
      Accepts absolute values (e.g. '500Mi') or percentage values (e.g. '5%').
      Absolute values must be greater than or equal to 100Mi. Percentage values
      must be greater than or equal to 2%.
    fullName: memoryAvailable
    remarks: ''
    isDeprecated: false
    syntax:
      content: 'memoryAvailable?: string'
      return:
        description: ''
        type: string
  - name: nodeFsAvailable
    uid: '@azure/arm-containerservice.HardEvictionThreshold.nodeFsAvailable'
    package: '@azure/arm-containerservice'
    summary: >-
      The threshold for available node filesystem space below which pod eviction
      is triggered. Accepts absolute values (e.g. '1Gi') or percentage values
      (e.g. '10%'). Must be greater than or equal to the system default of 10%.
    fullName: nodeFsAvailable
    remarks: ''
    isDeprecated: false
    syntax:
      content: 'nodeFsAvailable?: string'
      return:
        description: ''
        type: string
  - name: nodeFsInodesFree
    uid: '@azure/arm-containerservice.HardEvictionThreshold.nodeFsInodesFree'
    package: '@azure/arm-containerservice'
    summary: >-
      The threshold for available inodes on the node filesystem below which pod
      eviction is triggered. Accepts absolute inode counts (e.g. '100000') or
      percentage values (e.g. '5%'). Percentage values must be greater than or
      equal to the system default of 5%.
    fullName: nodeFsInodesFree
    remarks: ''
    isDeprecated: false
    syntax:
      content: 'nodeFsInodesFree?: string'
      return:
        description: ''
        type: string
