name: MembershipType
uid: '@azure/arm-resiliencemanagement.MembershipType'
package: '@azure/arm-resiliencemanagement'
summary: >-
  Membership type of the service group to resource. \

  [KnownMembershipType](xref:@azure/arm-resiliencemanagement.KnownMembershipType)
  can be used interchangeably with MembershipType,
   this enum contains the known values that the service supports.
  ### Known values supported by the service

  **Direct**: Resource is direct member of service group. \

  **ThroughSubscription**: Resource is member of service group through
  subscription. \

  **ThroughResourceGroup**: Resource is member of service group through resource
  group.
