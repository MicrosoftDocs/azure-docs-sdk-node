  - name: maxBatchPercent
    uid: >-
      @azure/arm-containerinstance.UpdateProfileRollingUpdateProfile.maxBatchPercent
    package: '@azure/arm-containerinstance'
    summary: >-
      Maximum percentage of total Container Groups which can be updated
      simultaneously by rolling update in one batch.
    fullName: maxBatchPercent
    remarks: ''
    isDeprecated: false
    syntax:
      content: 'maxBatchPercent?: number'
      return:
        description: ''
        type: number
  - name: maxUnhealthyPercent
    uid: >-
      @azure/arm-containerinstance.UpdateProfileRollingUpdateProfile.maxUnhealthyPercent
    package: '@azure/arm-containerinstance'
    summary: >-
      Maximum percentage of the updated Container Groups which can be in
