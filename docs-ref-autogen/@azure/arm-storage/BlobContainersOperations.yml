  - name: deleteImmutabilityPolicy
    uid: '@azure/arm-storage.BlobContainersOperations.deleteImmutabilityPolicy'
    package: '@azure/arm-storage'
    summary: >-
      Aborts an unlocked immutability policy. The response of delete has
      immutabilityPeriodSinceCreationInDays set to 0. ETag in If-Match is
      required for this operation. Deleting a locked immutability policy is not
      allowed, the only way is to delete the container after deleting all
      expired blobs inside the policy locked container.
    fullName: deleteImmutabilityPolicy
    remarks: ''
    isDeprecated: false
    syntax:
      content: >-
        deleteImmutabilityPolicy: (resourceGroupName: string, accountName:
        string, containerName: string, ifMatch: string, options?:
