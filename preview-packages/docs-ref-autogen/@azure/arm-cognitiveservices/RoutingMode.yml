### YamlMime:TSTypeAlias
name: RoutingMode
uid: '@azure/arm-cognitiveservices.RoutingMode'
package: '@azure/arm-cognitiveservices'
summary: >-
  The model-router routing mode that determines how requests are distributed
  across models. \

  [KnownRoutingMode](xref:@azure/arm-cognitiveservices.KnownRoutingMode) can be
  used interchangeably with RoutingMode,
   this enum contains the known values that the service supports.
  ### Known values supported by the service

  **cost**: Route requests to minimize cost while meeting performance
  requirements. \

  **balanced**: Balance cost and quality when routing requests across models. \

  **quality**: Route requests to maximize quality regardless of cost.
fullName: RoutingMode
remarks: ''
isDeprecated: false
syntax: |
  type RoutingMode = string
