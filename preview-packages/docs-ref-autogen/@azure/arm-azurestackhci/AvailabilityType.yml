### YamlMime:TSTypeAlias
name: AvailabilityType
uid: '@azure/arm-azurestackhci.AvailabilityType'
package: '@azure/arm-azurestackhci'
summary: >-
  Indicates how the update content is made available for download. This
  determines whether the update is sourced locally, from an online repository,
  or requires user notification. \

  [KnownAvailabilityType](xref:@azure/arm-azurestackhci.KnownAvailabilityType)
  can be used interchangeably with AvailabilityType,
   this enum contains the known values that the service supports.
  ### Known values supported by the service

  **Local**: The update content is available locally within the environment. \

  **Online**: The update content is available from an online source. \

  **Notify**: The system will notify the user when update content becomes
  available.
fullName: AvailabilityType
remarks: ''
isDeprecated: false
syntax: |
  type AvailabilityType = string
