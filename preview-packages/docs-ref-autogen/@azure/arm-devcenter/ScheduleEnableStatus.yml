name: ScheduleEnableStatus
uid: '@azure/arm-devcenter.ScheduleEnableStatus'
package: '@azure/arm-devcenter'
summary: >-
  Schedule enable or disable status. Indicates whether the schedule applied to
  is either enabled or disabled. \

  [KnownScheduleEnableStatus](xref:@azure/arm-devcenter.KnownScheduleEnableStatus)
  can be used interchangeably with ScheduleEnableStatus,
   this enum contains the known values that the service supports.
  ### Known values supported by the service

  **Enabled**: Schedule is enabled. \

  **Disabled**: Schedule is disabled.
