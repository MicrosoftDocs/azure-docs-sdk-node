name: StorageType
uid: '@azure/arm-azurestackhci.StorageType'
package: '@azure/arm-azurestackhci'
summary: >-
  Storage type supported for HCI Cluster. \

  [KnownStorageType](xref:@azure/arm-azurestackhci.KnownStorageType) can be used
  interchangeably with StorageType,
   this enum contains the known values that the service supports.
  ### Known values supported by the service

  **S2D**: Storage Spaces Direct (S2D) storage type. \

  **SAN**: Storage Area Network (SAN) storage type. \

  **SANS2D**: Combined SAN and Storage Spaces Direct (SANS2D) storage type.
fullName: StorageType
remarks: ''
isDeprecated: false
syntax: |
  type StorageType = string
