    uid: '@azure/ai-voicelive.LlmFillerResponseConfig.instructions'
    package: '@azure/ai-voicelive'
    summary: >-
      Custom instructions for generating filler responses. If not provided, a
      default prompt is used.
    fullName: instructions
    remarks: ''
    isDeprecated: false
    syntax:
      content: 'instructions?: string'
      return:
        description: ''
        type: string
  - name: maxCompletionTokens
    uid: '@azure/ai-voicelive.LlmFillerResponseConfig.maxCompletionTokens'
    package: '@azure/ai-voicelive'
    summary: Maximum number of tokens to generate for the filler response.
    fullName: maxCompletionTokens
    remarks: ''
    isDeprecated: false
    syntax:
      content: 'maxCompletionTokens?: number'
      return:
        description: ''
        type: number
  - name: model
    uid: '@azure/ai-voicelive.LlmFillerResponseConfig.model'
    package: '@azure/ai-voicelive'
