name: AutoImportJobUpdatePropertiesAdminStatus
uid: '@azure/arm-storagecache.AutoImportJobUpdatePropertiesAdminStatus'
package: '@azure/arm-storagecache'
summary: >-
  The administrative status of the auto import job. Possible values: 'Enable',
  'Disable'. Passing in a value of 'Disable' will disable the current active
  auto import job. By default it is set to 'Enable'. \

  [KnownAutoImportJobUpdatePropertiesAdminStatus](xref:@azure/arm-storagecache.KnownAutoImportJobUpdatePropertiesAdminStatus)
  can be used interchangeably with AutoImportJobUpdatePropertiesAdminStatus,
   this enum contains the known values that the service supports.
  ### Known values supported by the service

  **Enable**: Enable \

  **Disable**: Disable
fullName: AutoImportJobUpdatePropertiesAdminStatus
