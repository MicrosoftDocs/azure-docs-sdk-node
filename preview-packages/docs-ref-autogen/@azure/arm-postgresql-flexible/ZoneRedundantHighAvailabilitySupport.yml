### YamlMime:TSTypeAlias
name: ZoneRedundantHighAvailabilitySupport
uid: '@azure/arm-postgresql-flexible.ZoneRedundantHighAvailabilitySupport'
package: '@azure/arm-postgresql-flexible'
summary: >-
  Indicates if high availability with zone redundancy is supported in this
  location. 'Enabled' means high availability with zone redundancy is supported.
  'Disabled' stands for high availability with zone redundancy is not supported.
  Will be deprecated in the future. Look to Supported Features for 
  'ZoneRedundantHa'. \

  [KnownZoneRedundantHighAvailabilitySupport](xref:@azure/arm-postgresql-flexible.KnownZoneRedundantHighAvailabilitySupport)
  can be used interchangeably with ZoneRedundantHighAvailabilitySupport,
   this enum contains the known values that the service supports.
  ### Known values supported by the service

  **Enabled** \

  **Disabled**
fullName: ZoneRedundantHighAvailabilitySupport
remarks: ''
isDeprecated: false
syntax: |
  type ZoneRedundantHighAvailabilitySupport = string
