name: RemoteVendorManagementFeature
uid: '@azure/arm-networkcloud.RemoteVendorManagementFeature'
package: '@azure/arm-networkcloud'
summary: >-
  The indicator of whether the storage appliance supports remote vendor
  management. \

  [KnownRemoteVendorManagementFeature](xref:@azure/arm-networkcloud.KnownRemoteVendorManagementFeature)
  can be used interchangeably with RemoteVendorManagementFeature,
   this enum contains the known values that the service supports.
  ### Known values supported by the service

  **Supported**: Remote vendor management is supported. \

  **Unsupported**: Remote vendor management is unsupported.
