### YamlMime:TSEnum
name: KnownRaiEgressMode
uid: '@azure/arm-cognitiveservices.KnownRaiEgressMode'
package: '@azure/arm-cognitiveservices'
summary: |-
  The enforcement mode for egress rules.
  If omitted on create, the server defaults to Enforced.
fullName: KnownRaiEgressMode
remarks: ''
isDeprecated: false
fields:
  - name: Audit
    uid: '@azure/arm-cognitiveservices.KnownRaiEgressMode.Audit'
    package: '@azure/arm-cognitiveservices'
    summary: >-
      Rules are evaluated and logged but not enforced. Traffic is always
      forwarded regardless of

      rule action. A would-be Deny is logged but not applied. Transform and
      Rewrite actions are

      still applied to matching traffic (only Deny enforcement is suppressed).
  - name: Enforced
    uid: '@azure/arm-cognitiveservices.KnownRaiEgressMode.Enforced'
    package: '@azure/arm-cognitiveservices'
    summary: >-
      Rules are enforced. Matching traffic is allowed or denied per rule
      actions.
