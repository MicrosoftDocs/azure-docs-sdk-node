name: PublicNetworkAccess
uid: '@azure/arm-databricks.PublicNetworkAccess'
package: '@azure/arm-databricks'
summary: >-
  The network access type for accessing workspace. Set value to disabled to
  access workspace only via private link. Used to configure front-end only
  private link for Serverless ComputeMode workspace. \

  [KnownPublicNetworkAccess](xref:@azure/arm-databricks.KnownPublicNetworkAccess)
  can be used interchangeably with PublicNetworkAccess,
   this enum contains the known values that the service supports.
  ### Known values supported by the service

  **Enabled**: Enabled \

  **Disabled**: Disabled
fullName: PublicNetworkAccess
remarks: ''
isDeprecated: false
syntax: |
  type PublicNetworkAccess = string
