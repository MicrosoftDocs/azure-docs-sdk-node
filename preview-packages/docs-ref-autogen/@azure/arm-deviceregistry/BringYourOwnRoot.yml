### YamlMime:TSType
name: BringYourOwnRoot
uid: '@azure/arm-deviceregistry.BringYourOwnRoot'
package: '@azure/arm-deviceregistry'
summary: >-
  Configuration for Bring Your Own Root. When enabled, customers provide their
  own CA-signed certificates instead of using the service-managed CA.
fullName: BringYourOwnRoot
remarks: ''
isDeprecated: false
type: interface
properties:
  - name: certificateSigningRequest
    uid: '@azure/arm-deviceregistry.BringYourOwnRoot.certificateSigningRequest'
    package: '@azure/arm-deviceregistry'
    summary: >-
      Certificate Signing Request (CSR) in PEM format, generated by the service.
      Sign this CSR with your Certificate Authority and activate via the
      activateBringYourOwnRoot action. A new CSR is generated at policy creation
      and when certificates near expiration.
    fullName: certificateSigningRequest
    remarks: ''
    isDeprecated: false
    syntax:
      content: 'certificateSigningRequest?: string'
      return:
        description: ''
        type: string
  - name: enabled
    uid: '@azure/arm-deviceregistry.BringYourOwnRoot.enabled'
    package: '@azure/arm-deviceregistry'
    summary: >-
      Indicates whether Bring Your Own Root is enabled. This can only be set at
      creation time and cannot be changed afterward.
    fullName: enabled
    remarks: ''
    isDeprecated: false
    syntax:
      content: 'enabled: boolean'
      return:
        description: ''
        type: boolean
  - name: issuingCertificateThumbprint
    uid: '@azure/arm-deviceregistry.BringYourOwnRoot.issuingCertificateThumbprint'
    package: '@azure/arm-deviceregistry'
    summary: Thumbprint of the issuing certificate.
    fullName: issuingCertificateThumbprint
    remarks: ''
    isDeprecated: false
    syntax:
      content: 'issuingCertificateThumbprint?: string'
      return:
        description: ''
        type: string
  - name: status
    uid: '@azure/arm-deviceregistry.BringYourOwnRoot.status'
    package: '@azure/arm-deviceregistry'
    summary: >-
      The status of the Bring Your Own Root configuration, indicating the
      current state of the certificate lifecycle.
    fullName: status
    remarks: ''
    isDeprecated: false
    syntax:
      content: 'status?: string'
      return:
        description: ''
        type: string
