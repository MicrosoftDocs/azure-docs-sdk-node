### YamlMime:TSTypeAlias
name: BareMetalMachineEvacuate
uid: '@azure/arm-networkcloud.BareMetalMachineEvacuate'
package: '@azure/arm-networkcloud'
summary: >-
  The indicator of whether to evacuate the node workload when the bare metal
  machine is cordoned. \

  [KnownBareMetalMachineEvacuate](xref:@azure/arm-networkcloud.KnownBareMetalMachineEvacuate)
  can be used interchangeably with BareMetalMachineEvacuate,
   this enum contains the known values that the service supports.
  ### Known values supported by the service

  **True**: Evacuate workloads from the node when the bare metal machine is
  cordoned. \

  **False**: Do not evacuate workloads from the node when the bare metal machine
  is cordoned.
fullName: BareMetalMachineEvacuate
remarks: ''
isDeprecated: false
syntax: |
  type BareMetalMachineEvacuate = string
