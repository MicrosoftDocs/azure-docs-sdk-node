### YamlMime:TSEnum
name: KnownZoneRedundantHighAvailabilityAndGeographicallyRedundantBackupSupport
uid: >-
  @azure/arm-postgresql-flexible.KnownZoneRedundantHighAvailabilityAndGeographicallyRedundantBackupSupport
package: '@azure/arm-postgresql-flexible'
summary: >-
  Indicates if high availability with zone redundancy is supported in
  conjunction with geographically redundant backups in this location. 'Enabled'
  means high availability with zone redundancy is supported in conjunction with
  geographically redundant backups is supported. 'Disabled' stands for high
  availability with zone redundancy is supported in conjunction with
  geographically redundant backups is not supported. Will be deprecated in the
  future. Look to Supported Features for 'ZoneRedundantHaAndGeoBackup'.
fullName: KnownZoneRedundantHighAvailabilityAndGeographicallyRedundantBackupSupport
remarks: ''
isDeprecated: false
fields:
  - name: Disabled
    uid: >-
      @azure/arm-postgresql-flexible.KnownZoneRedundantHighAvailabilityAndGeographicallyRedundantBackupSupport.Disabled
    package: '@azure/arm-postgresql-flexible'
    summary: Disabled
  - name: Enabled
    uid: >-
      @azure/arm-postgresql-flexible.KnownZoneRedundantHighAvailabilityAndGeographicallyRedundantBackupSupport.Enabled
    package: '@azure/arm-postgresql-flexible'
    summary: Enabled
