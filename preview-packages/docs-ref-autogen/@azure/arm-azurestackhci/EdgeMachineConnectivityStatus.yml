name: EdgeMachineConnectivityStatus
uid: '@azure/arm-azurestackhci.EdgeMachineConnectivityStatus'
package: '@azure/arm-azurestackhci'
summary: >-
  Overall connectivity status for the machine resource. \

  [KnownEdgeMachineConnectivityStatus](xref:@azure/arm-azurestackhci.KnownEdgeMachineConnectivityStatus)
  can be used interchangeably with EdgeMachineConnectivityStatus,
   this enum contains the known values that the service supports.
  ### Known values supported by the service

  **NotSpecified**: The connectivity status of the machine resource is not
  specified. \

  **Disconnected**: The machine resource is disconnected. \

  **Connected**: The machine resource is connected.
