### YamlMime:TSTypeAlias
name: ConditionOperator
uid: '@azure/arm-monitorslis.ConditionOperator'
package: '@azure/arm-monitorslis'
summary: >-
  Defines operators used in filter conditions. \

  [KnownConditionOperator](xref:@azure/arm-monitorslis.KnownConditionOperator)
  can be used interchangeably with ConditionOperator,
   this enum contains the known values that the service supports.
  ### Known values supported by the service

  **eq**: Equal to. \

  **ne**: Not equal to. \

  **lt**: Less than. \

  **lte**: Less than or equal to. \

  **gt**: Greater than. \

  **gte**: Greater than or equal to. \

  **in**: Matches when `value` is one of the items in the `^^`-delimited list
  (for example, `value` = "east^^west^^north"). \

  **notin**: Matches when `value` is none of the items in the `^^`-delimited
  list (for example, `value` = "east^^west^^north"). \

  **startswith**: Starts with. \

  **notstartswith**: Does not start with. \

  **contains**: Contains the value. \

  **notcontains**: Does not contain the value.
fullName: ConditionOperator
remarks: ''
isDeprecated: false
syntax: |
  type ConditionOperator = string
