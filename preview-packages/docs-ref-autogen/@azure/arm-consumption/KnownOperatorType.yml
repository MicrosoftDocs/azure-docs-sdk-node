### YamlMime:TSEnum
name: KnownOperatorType
uid: '@azure/arm-consumption.KnownOperatorType'
package: '@azure/arm-consumption'
summary: The comparison operator.
fullName: KnownOperatorType
remarks: ''
isDeprecated: false
fields:
  - name: EqualTo
    uid: '@azure/arm-consumption.KnownOperatorType.EqualTo'
    package: '@azure/arm-consumption'
    summary: >-
      Alert will be triggered if the evaluated cost is the same as threshold
      value. Note: It’s not recommended to use this OperatorType as there’s low
      chance of cost being exactly the same as threshold value, leading to
      missing of your alert. This OperatorType will be deprecated in future.
  - name: GreaterThan
    uid: '@azure/arm-consumption.KnownOperatorType.GreaterThan'
    package: '@azure/arm-consumption'
    summary: >-
      Alert will be triggered if the evaluated cost is greater than the
      threshold value. Note: This is the recommended OperatorType while
      configuring Budget Alert.
  - name: GreaterThanOrEqualTo
    uid: '@azure/arm-consumption.KnownOperatorType.GreaterThanOrEqualTo'
    package: '@azure/arm-consumption'
    summary: >-
      Alert will be triggered if the evaluated cost is greater than or equal to
      the threshold value.
