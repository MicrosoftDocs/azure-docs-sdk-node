name: SkuFamily
uid: '@azure/arm-rediscache.SkuFamily'
package: '@azure/arm-rediscache'
summary: >-
  The SKU family to use. Valid values: (C, P). (C = Basic/Standard, P =
  Premium). \

  [KnownSkuFamily](xref:@azure/arm-rediscache.KnownSkuFamily) can be used
  interchangeably with SkuFamily,
   this enum contains the known values that the service supports.
  ### Known values supported by the service

  **C**: The SKU family to use - must be 'C' for Basic/Standard SKU redis
  caches. \

  **P**: The SKU family to use - must be 'P' for Premium SKU redis caches.
fullName: SkuFamily
remarks: ''
isDeprecated: false
syntax: |
  type SkuFamily = string
