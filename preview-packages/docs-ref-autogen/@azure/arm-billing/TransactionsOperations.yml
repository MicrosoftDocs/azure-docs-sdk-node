        options?: TransactionsListByBillingProfileOptionalParams) =>
        PagedAsyncIterableIterator<Transaction, Transaction[], PageSettings>
      return:
        description: ''
        type: >-
          (billingAccountName: string, billingProfileName: string,
          periodStartDate: Date, periodEndDate: Date, typeParam: string,
          options?: TransactionsListByBillingProfileOptionalParams) =&gt;
