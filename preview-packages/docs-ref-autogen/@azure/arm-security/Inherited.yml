### YamlMime:TSTypeAlias
name: Inherited
uid: '@azure/arm-security.Inherited'
package: '@azure/arm-security'
summary: >-
  "inherited" = "True" indicates that the current scope inherits its pricing
  configuration from its parent. The ID of the parent scope that provides the
  inherited configuration is displayed in the "inheritedFrom" field. On the
  other hand, "inherited" = "False" indicates that the current scope has its own
  pricing configuration explicitly set, and does not inherit from its parent.
  This field is read only and available only for resource-level pricing. \

  [KnownInherited](xref:@azure/arm-security.KnownInherited) can be used
  interchangeably with Inherited,
   this enum contains the known values that the service supports.
  ### Known values supported by the service

  **True**: Indicates that the current scope is inheriting its pricing
  configuration from its parent \

  **False**: Indicates that the current scope sets its own pricing configuration
  and does not inherit it from its parent
fullName: Inherited
remarks: ''
isDeprecated: false
syntax: |
  type Inherited = string
