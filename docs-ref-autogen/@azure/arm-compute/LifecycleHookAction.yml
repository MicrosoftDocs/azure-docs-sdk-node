### YamlMime:TSTypeAlias
name: LifecycleHookAction
uid: '@azure/arm-compute.LifecycleHookAction'
package: '@azure/arm-compute'
summary: >-
  The action that will be applied to a target resource in the virtual machine
  scale set lifecycle hook event if the platform does not receive a response
  from the customer for the target resource before waitUntil. \

  [KnownLifecycleHookAction](xref:@azure/arm-compute.KnownLifecycleHookAction)
  can be used interchangeably with LifecycleHookAction,
   this enum contains the known values that the service supports.
  ### Known values supported by the service

  **Approve**: The lifecycle hook of a target resource in a lifecycle hook event
  will be approved. \

  **Reject**: The lifecycle hook of a target resource in a lifecycle hook event
  will be rejected.
fullName: LifecycleHookAction
remarks: ''
isDeprecated: false
syntax: |
  type LifecycleHookAction = string
