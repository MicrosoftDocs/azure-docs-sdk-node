### YamlMime:TSTypeAlias
name: SingleSignOnStatus
uid: '@azure/arm-devcenter.SingleSignOnStatus'
package: '@azure/arm-devcenter'
summary: >-
  SingleSignOn (SSO) enable or disable status. Indicates whether Dev Boxes in
  the Pool will have SSO enabled or disabled. \

  [KnownSingleSignOnStatus](xref:@azure/arm-devcenter.KnownSingleSignOnStatus)
  can be used interchangeably with SingleSignOnStatus,
   this enum contains the known values that the service supports.
  ### Known values supported by the service

  **Disabled**: Single Sign On is disabled. \

  **Enabled**: Single Sign On is enabled.
fullName: SingleSignOnStatus
remarks: ''
isDeprecated: false
syntax: |
  type SingleSignOnStatus = string
