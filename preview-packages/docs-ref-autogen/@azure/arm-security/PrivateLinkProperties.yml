name: PrivateLinkProperties
uid: '@azure/arm-security.PrivateLinkProperties'
package: '@azure/arm-security'
summary: >-
  Properties of a private link resource. These properties control the behavior
  and configuration of private endpoint connectivity to Defender services.
fullName: PrivateLinkProperties
remarks: ''
isDeprecated: false
type: interface
properties:
