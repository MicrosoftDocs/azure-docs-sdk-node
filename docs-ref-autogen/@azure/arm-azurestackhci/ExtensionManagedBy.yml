name: ExtensionManagedBy
uid: '@azure/arm-azurestackhci.ExtensionManagedBy'
package: '@azure/arm-azurestackhci'
summary: >-
  Indicates whether the extension is managed by the user or by Azure. \

  [KnownExtensionManagedBy](xref:@azure/arm-azurestackhci.KnownExtensionManagedBy)
  can be used interchangeably with ExtensionManagedBy,
   this enum contains the known values that the service supports.
  ### Known values supported by the service

  **User**: The extension is managed by the user. \

  **Azure**: The extension is managed by Azure.
