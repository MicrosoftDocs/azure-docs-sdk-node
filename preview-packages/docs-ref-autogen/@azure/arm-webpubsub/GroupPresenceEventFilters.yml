name: GroupPresenceEventFilters
uid: '@azure/arm-webpubsub.GroupPresenceEventFilters'
package: '@azure/arm-webpubsub'
summary: Represents presence event filters for event handler configuration.
fullName: GroupPresenceEventFilters
remarks: ''
isDeprecated: false
type: interface
properties:
  - name: eventNames
    uid: '@azure/arm-webpubsub.GroupPresenceEventFilters.eventNames'
    package: '@azure/arm-webpubsub'
    summary: >-
      The concerning event names. Valid values are "joined", "left". If the
      value is null or empty, no presence events will be sent to the event
      handler.
    fullName: eventNames
    remarks: ''
    isDeprecated: false
    syntax:
      content: 'eventNames: string[]'
      return:
        description: ''
        type: string[]
  - name: groupFilters
    uid: '@azure/arm-webpubsub.GroupPresenceEventFilters.groupFilters'
    package: '@azure/arm-webpubsub'
    summary: >-
      The group filters. Only events from these groups will be sent to the event
      handler. Each element is a pattern that may match multiple groups. If null
      or empty, events from all groups will be sent (subject to eventNames).
    fullName: groupFilters
    remarks: ''
    isDeprecated: false
    syntax:
      content: 'groupFilters?: string[]'
      return:
        description: ''
        type: string[]
