### YamlMime:TSTypeAlias
name: AvailabilityStage
uid: '@azure/arm-edgeorder.AvailabilityStage'
package: '@azure/arm-edgeorder'
summary: >-
  Current availability stage of the product. \

  [KnownAvailabilityStage](xref:@azure/arm-edgeorder.KnownAvailabilityStage) can
  be used interchangeably with AvailabilityStage,
   this enum contains the known values that the service supports.
  ### Known values supported by the service

  **Available**: Product is available. \

  **Preview**: Product is in preview. \

  **Signup**: Product is available only on signup. \

  **Discoverable**: Product is not available in our service but can be
  discovered from other sources. \

  **ComingSoon**: Product is coming soon. \

  **Unavailable**: Product is not available. \

  **Deprecated**: Product is deprecated.
fullName: AvailabilityStage
remarks: ''
isDeprecated: false
syntax: |
  type AvailabilityStage = string
