name: FulfillmentType
uid: '@azure/arm-edgeorder.FulfillmentType'
package: '@azure/arm-edgeorder'
summary: >-
  The entity responsible for fulfillment of the item at the given hierarchy
  level. \

  [KnownFulfillmentType](xref:@azure/arm-edgeorder.KnownFulfillmentType) can be
  used interchangeably with FulfillmentType,
   this enum contains the known values that the service supports.
  ### Known values supported by the service

  **Microsoft**: The fulfillment (the whole journey of the product offering) is
  handled by microsoft. \

  **External**: The fulfillment (the whole journey of the product offering) is
  handled by external third party entities.
