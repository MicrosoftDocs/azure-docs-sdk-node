### YamlMime:TSTypeAlias
name: HealthState
uid: '@azure/arm-azurestackhci.HealthState'
package: '@azure/arm-azurestackhci'
summary: >-
  Overall health state for update-specific health checks. Indicates whether the
  system is functioning correctly, has warnings or errors, or is undergoing a
  health evaluation. \

  [KnownHealthState](xref:@azure/arm-azurestackhci.KnownHealthState) can be used
  interchangeably with HealthState,
   this enum contains the known values that the service supports.
  ### Known values supported by the service

  **Unknown**: The health state is not known or cannot be determined. \

  **Success**: The health check completed successfully and the system is
  healthy. \

  **Failure**: The health check failed, indicating a critical issue. \

  **Warning**: The health check detected a non-critical issue that may require
  attention. \

  **Error**: An error occurred during the health check process. \

  **InProgress**: The health check is currently in progress.
fullName: HealthState
remarks: ''
isDeprecated: false
syntax: |
  type HealthState = string
