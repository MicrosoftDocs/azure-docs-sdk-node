### YamlMime:TSTypeAlias
name: DevOpsProvisioningState
uid: '@azure/arm-security.DevOpsProvisioningState'
package: '@azure/arm-security'
summary: >-
  The provisioning state of the resource.


  Pending - Provisioning pending.

  Failed - Provisioning failed.

  Succeeded - Successful provisioning.

  Canceled - Provisioning canceled.

  PendingDeletion - Deletion pending.

  DeletionSuccess - Deletion successful.

  DeletionFailure - Deletion failure. \

  [KnownDevOpsProvisioningState](xref:@azure/arm-security.KnownDevOpsProvisioningState)
  can be used interchangeably with DevOpsProvisioningState,
   this enum contains the known values that the service supports.
  ### Known values supported by the service

  **Succeeded**: Succeeded \

  **Failed**: Failed \

  **Canceled**: Canceled \

  **Pending**: Pending \

  **PendingDeletion**: PendingDeletion \

  **DeletionSuccess**: DeletionSuccess \

  **DeletionFailure**: DeletionFailure
fullName: DevOpsProvisioningState
remarks: ''
isDeprecated: false
syntax: |
  type DevOpsProvisioningState = string
