### YamlMime:TSTypeAlias
name: FilterItemNames
uid: '@azure/arm-costmanagement.FilterItemNames'
package: '@azure/arm-costmanagement'
summary: >-
  The name of the filter. This is currently only supported for Export Definition
  type of ReservationRecommendations. Supported names are ['ReservationScope',
  'LookBackPeriod', 'ResourceType'] \

  [KnownFilterItemNames](xref:@azure/arm-costmanagement.KnownFilterItemNames)
  can be used interchangeably with FilterItemNames,
   this enum contains the known values that the service supports.
  ### Known values supported by the service

  **ReservationScope** \

  **ResourceType** \

  **LookBackPeriod**
fullName: FilterItemNames
remarks: ''
isDeprecated: false
syntax: |
  type FilterItemNames = string
