### YamlMime:TSEnum
name: KnownTlsVersion
uid: '@azure/arm-redisenterprisecache.KnownTlsVersion'
package: '@azure/arm-redisenterprisecache'
summary: >-
  The minimum TLS version for the cluster to support, e.g. '1.2'. Newer versions
  can be added in the future. Note that TLS 1.0 and TLS 1.1 are now completely
  obsolete -- you cannot use them. They are mentioned only for the sake of
  consistency with old API versions.
