### YamlMime:TSTypeAlias
name: JobStatus
uid: '@azure/arm-resiliencemanagement.JobStatus'
package: '@azure/arm-resiliencemanagement'
summary: >-
  Job Statuses \

  [KnownJobStatus](xref:@azure/arm-resiliencemanagement.KnownJobStatus) can be
  used interchangeably with JobStatus,
   this enum contains the known values that the service supports.
  ### Known values supported by the service

  **NotApplicable**: The job status is not applicable. \

  **NotStarted**: The job has not started yet. \

  **Pending**: The job is pending execution, awaiting the completion of
  dependent stages. \

  **InProgress**: The job is currently in progress. \

  **Completed**: The job has been completed successfully. \

  **CompletedWithWarnings**: The job has been completed with warnings. \

  **Failed**: The job has failed. \

  **Skipped**: The job skipped for the resource (resource not qualified or not
  applicable). \

  **Cancelling**: The job is in the process of being cancelled. \

  **Cancelled**: The job has been cancelled. \

  **Paused**: The job is currently paused.
fullName: JobStatus
remarks: ''
isDeprecated: false
syntax: |
  type JobStatus = string
