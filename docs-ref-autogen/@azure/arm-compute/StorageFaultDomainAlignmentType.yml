### YamlMime:TSTypeAlias
name: StorageFaultDomainAlignmentType
uid: '@azure/arm-compute.StorageFaultDomainAlignmentType'
package: '@azure/arm-compute'
summary: >-
  Specifies the storage fault domain alignment type for the disk. \

  [KnownStorageFaultDomainAlignmentType](xref:@azure/arm-compute.KnownStorageFaultDomainAlignmentType)
  can be used interchangeably with StorageFaultDomainAlignmentType,
   this enum contains the known values that the service supports.
  ### Known values supported by the service

  **Aligned**: Disk Storage Fault Domains are mapped to Compute Fault Domains.
  Deployment fails if disk does not support enough Fault Domains. \

  **BestEffortAligned**: Attempt to map Storage Fault Domains to Compute Fault
  Domains. Disks are unaligned if disk does not support enough Fault Domains.
fullName: StorageFaultDomainAlignmentType
remarks: ''
isDeprecated: false
syntax: |
  type StorageFaultDomainAlignmentType = string
