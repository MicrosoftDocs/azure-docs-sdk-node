name: TestFailoverState
uid: '@azure/arm-resiliencemanagement.TestFailoverState'
package: '@azure/arm-resiliencemanagement'
summary: >-
  A state specific to the resource that helps identify its TestFailover state. \

  [KnownTestFailoverState](xref:@azure/arm-resiliencemanagement.KnownTestFailoverState)
  can be used interchangeably with TestFailoverState,
   this enum contains the known values that the service supports.
  ### Known values supported by the service

  **None**: The resource is Not in TestFailedOver state (No test failover
  cleanup pending). \

  **TestFailoverCleanupPending**: he resource is in test failover cleanup
  pending state.
