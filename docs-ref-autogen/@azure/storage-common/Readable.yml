    uid: '@azure/storage-common.Readable.[asyncIterator]'
    package: '@azure/storage-common'
    summary: ''
    remarks: ''
    isDeprecated: false
    syntax:
      content: 'function [asyncIterator](): AsyncIterator<any, undefined, any>'
      return:
