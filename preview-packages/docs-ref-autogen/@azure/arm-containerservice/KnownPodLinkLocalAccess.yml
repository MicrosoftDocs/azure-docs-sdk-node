### YamlMime:TSEnum
name: KnownPodLinkLocalAccess
uid: '@azure/arm-containerservice.KnownPodLinkLocalAccess'
package: '@azure/arm-containerservice'
summary: >-
  Defines access to special link local addresses (Azure Instance Metadata
  Service, aka IMDS) for pods with hostNetwork=false. If not specified, the
  default is 'IMDS'.
fullName: KnownPodLinkLocalAccess
remarks: ''
isDeprecated: false
fields:
  - name: Imds
    uid: '@azure/arm-containerservice.KnownPodLinkLocalAccess.Imds'
    package: '@azure/arm-containerservice'
    summary: >-
      Pods with hostNetwork=false can access Azure Instance Metadata Service
      (IMDS) without restriction.
  - name: None
    uid: '@azure/arm-containerservice.KnownPodLinkLocalAccess.None'
    package: '@azure/arm-containerservice'
    summary: >-
      Pods with hostNetwork=false cannot access Azure Instance Metadata Service
      (IMDS).
