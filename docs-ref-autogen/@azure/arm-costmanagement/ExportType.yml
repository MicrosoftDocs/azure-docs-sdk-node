### YamlMime:TSTypeAlias
name: ExportType
uid: '@azure/arm-costmanagement.ExportType'
package: '@azure/arm-costmanagement'
summary: >-
  The type of the export. Note that 'Usage' is equivalent to 'ActualCost' and is
  applicable to exports that do not yet provide data for charges or amortization
  for service reservations. \

  [KnownExportType](xref:@azure/arm-costmanagement.KnownExportType) can be used
  interchangeably with ExportType,
   this enum contains the known values that the service supports.
  ### Known values supported by the service

  **Usage** \

  **ActualCost** \

  **AmortizedCost** \

  **FocusCost** \

  **PriceSheet** \

  **ReservationTransactions** \

  **ReservationRecommendations** \

  **ReservationDetails**
fullName: ExportType
remarks: ''
isDeprecated: false
syntax: |
  type ExportType = string
