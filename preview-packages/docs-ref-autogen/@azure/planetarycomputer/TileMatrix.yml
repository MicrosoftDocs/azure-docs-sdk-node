### YamlMime:TSType
name: TileMatrix
uid: '@azure/planetarycomputer.TileMatrix'
package: '@azure/planetarycomputer'
summary: >-
  Tile Matrix Definition


  A tile matrix, usually corresponding to a particular zoom level of a

  TileMatrixSet.


  ref:

  https://github.com/opengeospatial/2D-Tile-Matrix-Set/blob/master/schemas/tms/2.0/json/tileMatrix.json


  Definition of a tile matrix at a specific zoom level within a tile matrix set
fullName: TileMatrix
remarks: ''
isDeprecated: false
type: interface
properties:
  - name: cellSize
    uid: '@azure/planetarycomputer.TileMatrix.cellSize'
    package: '@azure/planetarycomputer'
    summary: Size of a pixel in map units at this tile matrix level
    fullName: cellSize
    remarks: ''
    isDeprecated: false
    syntax:
      content: 'cellSize: number'
      return:
        description: ''
        type: number
  - name: cornerOfOrigin
    uid: '@azure/planetarycomputer.TileMatrix.cornerOfOrigin'
    package: '@azure/planetarycomputer'
    summary: >-
      The corner of the tile matrix (_topLeft_ or _bottomLeft_) used as the
      origin

      for numbering tile rows and columns. This corner is also a corner of the
      (0, 0)

      tile.
    fullName: cornerOfOrigin
    remarks: ''
    isDeprecated: false
    syntax:
      content: 'cornerOfOrigin?: string'
      return:
        description: ''
        type: string
  - name: description
    uid: '@azure/planetarycomputer.TileMatrix.description'
    package: '@azure/planetarycomputer'
    summary: Human-readable description of this tile matrix level
    fullName: description
    remarks: ''
    isDeprecated: false
    syntax:
      content: 'description?: string'
      return:
        description: ''
        type: string
  - name: id
    uid: '@azure/planetarycomputer.TileMatrix.id'
    package: '@azure/planetarycomputer'
    summary: Unique identifier for this tile matrix level, often the zoom level
    fullName: id
    remarks: ''
    isDeprecated: false
    syntax:
      content: 'id: string'
      return:
        description: ''
        type: string
  - name: keywords
    uid: '@azure/planetarycomputer.TileMatrix.keywords'
    package: '@azure/planetarycomputer'
    summary: >-
      Unordered list of one or more commonly used or formalized word(s) or
      phrase(s)

      used to describe this dataset
    fullName: keywords
    remarks: ''
    isDeprecated: false
    syntax:
      content: 'keywords?: string[]'
      return:
        description: ''
        type: string[]
  - name: matrixHeight
    uid: '@azure/planetarycomputer.TileMatrix.matrixHeight'
    package: '@azure/planetarycomputer'
    summary: Number of tiles vertically at this matrix level
    fullName: matrixHeight
    remarks: ''
    isDeprecated: false
    syntax:
      content: 'matrixHeight: number'
      return:
        description: ''
        type: number
  - name: matrixWidth
    uid: '@azure/planetarycomputer.TileMatrix.matrixWidth'
    package: '@azure/planetarycomputer'
    summary: Number of tiles horizontally at this matrix level
    fullName: matrixWidth
    remarks: ''
    isDeprecated: false
    syntax:
      content: 'matrixWidth: number'
      return:
        description: ''
        type: number
  - name: pointOfOrigin
    uid: '@azure/planetarycomputer.TileMatrix.pointOfOrigin'
    package: '@azure/planetarycomputer'
    summary: >-
      Precise position in CRS coordinates of the corner of origin (e.g. the
      top-left

      corner) for this tile matrix. This position is also a corner of the (0, 0)

      tile. In previous version, this was 'topLeftCorner' and 'cornerOfOrigin'
      did

      not exist.
    fullName: pointOfOrigin
    remarks: ''
    isDeprecated: false
    syntax:
      content: 'pointOfOrigin: number[]'
      return:
        description: ''
        type: number[]
  - name: scaleDenominator
    uid: '@azure/planetarycomputer.TileMatrix.scaleDenominator'
    package: '@azure/planetarycomputer'
    summary: Scale denominator representing the scale of this tile matrix level
    fullName: scaleDenominator
    remarks: ''
    isDeprecated: false
    syntax:
      content: 'scaleDenominator: number'
      return:
        description: ''
        type: number
  - name: tileHeight
    uid: '@azure/planetarycomputer.TileMatrix.tileHeight'
    package: '@azure/planetarycomputer'
    summary: Pixel height of each tile at this level
    fullName: tileHeight
    remarks: ''
    isDeprecated: false
    syntax:
      content: 'tileHeight: number'
      return:
        description: ''
        type: number
  - name: tileWidth
    uid: '@azure/planetarycomputer.TileMatrix.tileWidth'
    package: '@azure/planetarycomputer'
    summary: Pixel width of each tile at this level
    fullName: tileWidth
    remarks: ''
    isDeprecated: false
    syntax:
      content: 'tileWidth: number'
      return:
        description: ''
        type: number
  - name: title
    uid: '@azure/planetarycomputer.TileMatrix.title'
    package: '@azure/planetarycomputer'
    summary: Human-readable title of the tile matrix level
    fullName: title
    remarks: ''
    isDeprecated: false
    syntax:
      content: 'title?: string'
      return:
        description: ''
        type: string
