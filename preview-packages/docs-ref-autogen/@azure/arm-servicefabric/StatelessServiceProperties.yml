properties:
  - name: instanceCloseDelayDuration
    uid: >-
      @azure/arm-servicefabric.StatelessServiceProperties.instanceCloseDelayDuration
    package: '@azure/arm-servicefabric'
    summary: >-
      Delay duration for RequestDrain feature to ensures that the endpoint
      advertised by the stateless instance is removed before the delay starts
      prior to closing the instance. This delay enables existing requests to
      drain gracefully before the instance actually goes down
      (https://docs.microsoft.com/en-us/azure/service-fabric/service-fabric-application-upgrade-advanced#avoid-connection-drops-during-stateless-service-planned-downtime-preview).
      It is represented in ISO 8601 format (hh:mm:ss.s).
    fullName: instanceCloseDelayDuration
    remarks: ''
    isDeprecated: false
    syntax:
      content: 'instanceCloseDelayDuration?: string'
      return:
        description: ''
        type: string
  - name: instanceCount
    uid: '@azure/arm-servicefabric.StatelessServiceProperties.instanceCount'
    package: '@azure/arm-servicefabric'
    summary: The instance count.
    fullName: instanceCount
    remarks: ''
    isDeprecated: false
    syntax:
      content: 'instanceCount?: number'
      return:
        description: ''
        type: number
  - name: minInstanceCount
    uid: '@azure/arm-servicefabric.StatelessServiceProperties.minInstanceCount'
    package: '@azure/arm-servicefabric'
    summary: >-
      MinInstanceCount is the minimum number of instances that must be up to
      meet the EnsureAvailability safety check during operations like upgrade or
      deactivate node. The actual number that is used is max( MinInstanceCount,
      ceil( MinInstancePercentage/100.0 * InstanceCount) ). Note, if
      InstanceCount is set to -1, during MinInstanceCount computation -1 is
      first converted into the number of nodes on which the instances are
      allowed to be placed according to the placement constraints on the
      service.
    fullName: minInstanceCount
    remarks: ''
    isDeprecated: false
    syntax:
      content: 'minInstanceCount?: number'
      return:
        description: ''
        type: number
  - name: minInstancePercentage
    uid: '@azure/arm-servicefabric.StatelessServiceProperties.minInstancePercentage'
    package: '@azure/arm-servicefabric'
    summary: >-
      MinInstancePercentage is the minimum percentage of InstanceCount that must
      be up to meet the EnsureAvailability safety check during operations like
      upgrade or deactivate node. The actual number that is used is max(
      MinInstanceCount, ceil( MinInstancePercentage/100.0 * InstanceCount) ).
      Note, if InstanceCount is set to -1, during MinInstancePercentage
      computation, -1 is first converted into the number of nodes on which the
      instances are allowed to be placed according to the placement constraints
      on the service.
    fullName: minInstancePercentage
    remarks: ''
    isDeprecated: false
    syntax:
      content: 'minInstancePercentage?: Uint8Array'
      return:
        description: ''
        type: Uint8Array
  - name: serviceKind
    uid: '@azure/arm-servicefabric.StatelessServiceProperties.serviceKind'
    package: '@azure/arm-servicefabric'
    summary: The kind of service (Stateless or Stateful).
    fullName: serviceKind
    remarks: ''
    isDeprecated: false
    syntax:
      content: 'serviceKind: "Stateless"'
      return:
        description: ''
        type: '"Stateless"'
