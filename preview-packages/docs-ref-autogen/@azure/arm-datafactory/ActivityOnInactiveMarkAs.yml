name: ActivityOnInactiveMarkAs
uid: '@azure/arm-datafactory.ActivityOnInactiveMarkAs'
package: '@azure/arm-datafactory'
summary: >-
  Status result of the activity when the state is set to Inactive. This is an
  optional property and if not provided when the activity is inactive, the
  status will be Succeeded by default. \

  [KnownActivityOnInactiveMarkAs](xref:@azure/arm-datafactory.KnownActivityOnInactiveMarkAs)
  can be used interchangeably with ActivityOnInactiveMarkAs,
   this enum contains the known values that the service supports.
  ### Known values supported by the service

  **Succeeded**: Succeeded \

  **Failed**: Failed \

  **Skipped**: Skipped
