### YamlMime:TSTypeAlias
name: Mode
uid: '@azure/arm-powerbidedicated.Mode'
package: '@azure/arm-powerbidedicated'
summary: >-
  Specifies the generation of the Power BI Embedded capacity. If no value is
  specified, the default value 'Gen2' is used. [Learn
  More](https://docs.microsoft.com/power-bi/developer/embedded/power-bi-embedded-generation-2)
  \

  [KnownMode](xref:@azure/arm-powerbidedicated.KnownMode) can be used
  interchangeably with Mode,
   this enum contains the known values that the service supports.
  ### Known values supported by the service

  **Gen1** \

  **Gen2**
fullName: Mode
remarks: ''
isDeprecated: false
syntax: |
  type Mode = string
