### YamlMime:TSTypeAlias
name: AutomatedResponseType
uid: '@azure/arm-security.AutomatedResponseType'
package: '@azure/arm-security'
summary: >-
  Optional. Specifies the automated response action to take when malware is
  detected. \

  [KnownAutomatedResponseType](xref:@azure/arm-security.KnownAutomatedResponseType)
  can be used interchangeably with AutomatedResponseType,
   this enum contains the known values that the service supports.
  ### Known values supported by the service

  **None**: No automated response will be taken when malware is detected. \

  **BlobSoftDelete**: The blob will be soft deleted when malware is detected.
fullName: AutomatedResponseType
remarks: ''
isDeprecated: false
syntax: |
  type AutomatedResponseType = string
