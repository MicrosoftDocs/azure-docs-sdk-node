name: ScalarFunction
uid: '@azure/arm-monitorslis.ScalarFunction'
package: '@azure/arm-monitorslis'
summary: >-
  Defines scalar functions used in filtering. \

  [KnownScalarFunction](xref:@azure/arm-monitorslis.KnownScalarFunction) can be
  used interchangeably with ScalarFunction,
   this enum contains the known values that the service supports.
  ### Known values supported by the service

  **max**: Maximum value. \

  **min**: Minimum value. \

  **avg**: Average value. \

  **sum**: Summation.
