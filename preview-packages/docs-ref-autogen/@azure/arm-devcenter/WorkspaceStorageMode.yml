name: WorkspaceStorageMode
uid: '@azure/arm-devcenter.WorkspaceStorageMode'
package: '@azure/arm-devcenter'
summary: >-
  Indicates whether workspace storage is enabled. \

  [KnownWorkspaceStorageMode](xref:@azure/arm-devcenter.KnownWorkspaceStorageMode)
  can be used interchangeably with WorkspaceStorageMode,
   this enum contains the known values that the service supports.
  ### Known values supported by the service

  **Disabled**: Workspace storage is disabled. \

  **AutoDeploy**: Workspace storage is enabled and necessary resources will be
  automatically setup.
