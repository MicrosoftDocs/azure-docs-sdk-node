### YamlMime:TSTypeAlias
name: ConfidentialVmStatus
uid: '@azure/arm-azurestackhci.ConfidentialVmStatus'
package: '@azure/arm-azurestackhci'
summary: >-
  Captures the current status of Confidential Virtual Machine (CVM) support on
  the cluster. \

  [KnownConfidentialVmStatus](xref:@azure/arm-azurestackhci.KnownConfidentialVmStatus)
  can be used interchangeably with ConfidentialVmStatus,
   this enum contains the known values that the service supports.
  ### Known values supported by the service

  **Enabled**: CVM support is fully enabled on the cluster. All nodes are CVM
  capable. \

  **PartiallyEnabled**: CVM support is partially enabled. At least one node in
  the cluster is CVM capable. \

  **Disabled**: CVM support is disabled. None of the nodes in the cluster are
  CVM capable.
fullName: ConfidentialVmStatus
remarks: ''
isDeprecated: false
syntax: |
  type ConfidentialVmStatus = string
