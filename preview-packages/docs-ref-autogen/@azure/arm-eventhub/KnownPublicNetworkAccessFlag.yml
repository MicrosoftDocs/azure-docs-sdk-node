### YamlMime:TSEnum
name: KnownPublicNetworkAccessFlag
uid: '@azure/arm-eventhub.KnownPublicNetworkAccessFlag'
package: '@azure/arm-eventhub'
summary: >-
  This determines if traffic is allowed over public network. By default it is
  enabled. If value is SecuredByPerimeter then Inbound and Outbound
  communication is controlled by the network security perimeter and profile's
  access rules.
fullName: KnownPublicNetworkAccessFlag
remarks: ''
isDeprecated: false
