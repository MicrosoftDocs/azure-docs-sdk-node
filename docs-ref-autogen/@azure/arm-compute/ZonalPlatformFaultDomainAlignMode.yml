name: ZonalPlatformFaultDomainAlignMode
uid: '@azure/arm-compute.ZonalPlatformFaultDomainAlignMode'
package: '@azure/arm-compute'
summary: >-
  Specifies the align mode between Virtual Machine Scale Set compute and storage
  Fault Domain count. \

  [KnownZonalPlatformFaultDomainAlignMode](xref:@azure/arm-compute.KnownZonalPlatformFaultDomainAlignMode)
  can be used interchangeably with ZonalPlatformFaultDomainAlignMode,
   this enum contains the known values that the service supports.
  ### Known values supported by the service

  **Aligned** \

  **Unaligned** \

  **BestEffortAligned**: Offload Alignment to VMSS. VMSS aligns disks that
  support enough Storage Fault Domains, while keeping others unaligned.
fullName: ZonalPlatformFaultDomainAlignMode
remarks: ''
isDeprecated: false
syntax: |
  type ZonalPlatformFaultDomainAlignMode = string
