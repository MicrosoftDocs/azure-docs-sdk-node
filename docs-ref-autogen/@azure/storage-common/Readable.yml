inheritedMethods:
  - name: eventNames()
    uid: '@azure/storage-common.Readable.eventNames'
    package: '@azure/storage-common'
    summary: |-
      Returns an array listing the events for which the emitter has registered
      listeners.

      ```js
      import { EventEmitter } from 'node:events';

      const myEE = new EventEmitter();
      myEE.on('foo', () => {});
      myEE.on('bar', () => {});

      const sym = Symbol('symbol');
      myEE.on(sym, () => {});

      console.log(myEE.eventNames());
      // Prints: [ 'foo', 'bar', Symbol(symbol) ]
      ```
    remarks: ''
    isDeprecated: false
    syntax:
      content: 'function eventNames(): (string | symbol)[]'
      return:
        description: ''
        type: (string | symbol)[]
    inheritanceDescription: <b>Inherited From</b> Stream.eventNames
  - name: getMaxListeners()
