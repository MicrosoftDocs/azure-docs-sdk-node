### YamlMime:TSTypeAlias
name: ServerPublicNetworkAccessFlag
uid: '@azure/arm-sql.ServerPublicNetworkAccessFlag'
package: '@azure/arm-sql'
summary: >-
  Whether or not public endpoint access is allowed for this server.  Value is
  optional but if passed in, must be 'Enabled' or 'Disabled' or
  'SecuredByPerimeter' \

  [KnownServerPublicNetworkAccessFlag](xref:@azure/arm-sql.KnownServerPublicNetworkAccessFlag)
  can be used interchangeably with ServerPublicNetworkAccessFlag,
   this enum contains the known values that the service supports.
  ### Known values supported by the service

  **Enabled**: Enabled \

  **Disabled**: Disabled \

  **SecuredByPerimeter**: SecuredByPerimeter
fullName: ServerPublicNetworkAccessFlag
remarks: ''
isDeprecated: false
syntax: |
  type ServerPublicNetworkAccessFlag = string
