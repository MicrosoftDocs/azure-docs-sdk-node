name: IsWorkloadManagementNetworkEnabled
uid: '@azure/arm-managednetworkfabric.IsWorkloadManagementNetworkEnabled'
package: '@azure/arm-managednetworkfabric'
summary: >-
  A workload management network is required for all the tenant (workload)
  traffic. This traffic is only dedicated for Tenant workloads which are
  required to access internet or any other MSFT/Public endpoints. \

  [KnownIsWorkloadManagementNetworkEnabled](xref:@azure/arm-managednetworkfabric.KnownIsWorkloadManagementNetworkEnabled)
  can be used interchangeably with IsWorkloadManagementNetworkEnabled,
   this enum contains the known values that the service supports.
  ### Known values supported by the service

  **True**: IsWorkloadManagementNetworkEnabled-True \

  **False**: IsWorkloadManagementNetworkEnabled-False
