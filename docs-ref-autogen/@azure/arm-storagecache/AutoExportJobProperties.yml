    fullName: currentIterationMiBDiscovered
    remarks: ''
    isDeprecated: false
    syntax:
      content: 'currentIterationMiBDiscovered?: number'
      return:
        description: ''
        type: number
  - name: currentIterationMiBExported
    uid: >-
      @azure/arm-storagecache.AutoExportJobProperties.currentIterationMiBExported
