name: IPFamily
uid: '@azure/arm-batch.IPFamily'
package: '@azure/arm-batch'
summary: >-
  The IP families used to specify IP versions available to the pool. \

  [KnownIPFamily](xref:@azure/arm-batch.KnownIPFamily) can be used
  interchangeably with IPFamily,
   this enum contains the known values that the service supports.
  ### Known values supported by the service

  **IPv4**: IPv4 is available to the pool. \

  **IPv6**: IPv6 is available to the pool.
fullName: IPFamily
remarks: ''
isDeprecated: false
syntax: |
  type IPFamily = string
