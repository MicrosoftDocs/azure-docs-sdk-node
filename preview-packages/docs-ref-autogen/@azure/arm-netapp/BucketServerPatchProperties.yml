properties:
  - name: certificateObject
    uid: '@azure/arm-netapp.BucketServerPatchProperties.certificateObject'
    package: '@azure/arm-netapp'
    summary: >-
      The base64-encoded contents of a PEM file, which includes both the bucket
      server's certificate and private key. It is generated by the end user and
      allows the user to access volume data in a read-only manner.

      Note: This is only used when Azure Key Vault is not configured. This
      property is mutually exclusive with the Azure Key Vault 'akv' properties.
    fullName: certificateObject
    remarks: ''
    isDeprecated: false
    syntax:
      content: 'certificateObject?: string'
      return:
        description: ''
        type: string
  - name: fqdn
    uid: '@azure/arm-netapp.BucketServerPatchProperties.fqdn'
    package: '@azure/arm-netapp'
    summary: >-
      The host part of the bucket URL, resolving to the bucket IP address and
      allowed by the server certificate.
    fullName: fqdn
    remarks: ''
    isDeprecated: false
    syntax:
      content: 'fqdn?: string'
      return:
        description: ''
        type: string
  - name: onCertificateConflictAction
    uid: '@azure/arm-netapp.BucketServerPatchProperties.onCertificateConflictAction'
    package: '@azure/arm-netapp'
    summary: |-
      Action to take when there is a certificate conflict.
