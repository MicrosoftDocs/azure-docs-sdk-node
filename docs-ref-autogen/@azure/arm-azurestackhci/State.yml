### YamlMime:TSTypeAlias
name: State
uid: '@azure/arm-azurestackhci.State'
package: '@azure/arm-azurestackhci'
summary: >-
  Represents the current state of the update as it relates to this stamp. This
  includes phases such as preparation, installation, scanning, and error
  handling, providing insight into the update's progress and any issues
  encountered. \

  [KnownState](xref:@azure/arm-azurestackhci.KnownState) can be used
  interchangeably with State,
   this enum contains the known values that the service supports.
  ### Known values supported by the service

  **HasPrerequisite**: The update has prerequisites that must be fulfilled
  before it can proceed. \

  **Obsolete**: The update is obsolete and no longer applicable. \

  **Ready**: The update is ready to be installed. \

  **NotApplicableBecauseAnotherUpdateIsInProgress**: The update cannot be
  applied because another update is currently in progress. \

  **Preparing**: The update is currently in the preparation phase. \

  **Installing**: The update is currently being installed. \

  **Installed**: The update has been successfully installed. \

  **PreparationFailed**: The update preparation phase failed. \

  **InstallationFailed**: The update installation failed. \

  **Invalid**: The update is invalid and cannot be applied. \

  **Recalled**: The update has been recalled and should not be applied. \

  **Downloading**: The update is currently being downloaded. \

  **DownloadFailed**: The update download failed. \

  **HealthChecking**: A health check is being performed before applying the
  update. \

  **HealthCheckFailed**: The health check failed, preventing the update from
  proceeding. \

  **ReadyToInstall**: The update is ready to be installed after successful
  preparation and checks. \

  **ScanInProgress**: The system is scanning for updates. \

  **ScanFailed**: The scan for updates failed. \

  **AdditionalContentRequired**: Additional content is required to proceed with
  the update.
fullName: State
remarks: ''
isDeprecated: false
syntax: |
  type State = string
