### YamlMime:TSType
name: Dimension
uid: '@azure/ai-projects.Dimension'
package: '@azure/ai-projects'
summary: >-
  A single dimension — one independent, measurable quality dimension within a
  rubric evaluator's scoring blueprint.
fullName: Dimension
remarks: ''
isDeprecated: false
type: interface
properties:
  - name: always_applicable
    uid: '@azure/ai-projects.Dimension.always_applicable'
    package: '@azure/ai-projects'
    summary: >-
      When true, the LLM judge always scores this dimension regardless of
      relevance (skips applicability assessment). The service-generated general
      quality/policy dimension has this set to true and is non-editable. Users
      may set this on their own custom dimensions.
    fullName: always_applicable
    remarks: ''
    isDeprecated: false
    syntax:
      content: 'always_applicable?: boolean'
      return:
        description: ''
        type: boolean
  - name: description
    uid: '@azure/ai-projects.Dimension.description'
    package: '@azure/ai-projects'
    summary: >-
      What this dimension measures (e.g., 'Correctly identifies the user's
      reservation intent and pursues the appropriate workflow').
    fullName: description
    remarks: ''
    isDeprecated: false
    syntax:
      content: 'description: string'
      return:
        description: ''
        type: string
  - name: id
    uid: '@azure/ai-projects.Dimension.id'
    package: '@azure/ai-projects'
    summary: >-
      Stable identifier for this dimension (snake_case, e.g.,
      `correct_resolution`). Required. Provided by the user when manually
      creating a rubric evaluator or during human-in-the-loop review of a
      generated set; the generation pipeline produces an initial value the user
      can edit. Editable when saving new versions.
    fullName: id
    remarks: ''
    isDeprecated: false
    syntax:
      content: 'id: string'
      return:
        description: ''
        type: string
  - name: weight
    uid: '@azure/ai-projects.Dimension.weight'
    package: '@azure/ai-projects'
    summary: >-
      Relative weight of this dimension (1-10). The generation pipeline assigns
      exactly one dimension weight 8-10; all others use 1-6. User edits are not
      constrained by this heuristic.
    fullName: weight
    remarks: ''
    isDeprecated: false
    syntax:
      content: 'weight: number'
      return:
        description: ''
        type: number
