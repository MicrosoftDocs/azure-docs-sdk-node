### YamlMime:TSEnum
name: KnownAccelerationMode
uid: '@azure/arm-containerservice.KnownAccelerationMode'
package: '@azure/arm-containerservice'
summary: >-
  Enable advanced network acceleration options. This allows users to configure
  acceleration using BPF host routing. This can be enabled only with Cilium
  dataplane. If not specified, the default value is None (no acceleration). The
  acceleration mode can be changed on a pre-existing cluster. See
  https://aka.ms/acnsperformance for a detailed explanation
fullName: KnownAccelerationMode
remarks: ''
isDeprecated: false
fields:
  - name: BpfVeth
    uid: '@azure/arm-containerservice.KnownAccelerationMode.BpfVeth'
    package: '@azure/arm-containerservice'
    summary: Enable eBPF host routing with veth device mode.
  - name: None
    uid: '@azure/arm-containerservice.KnownAccelerationMode.None'
    package: '@azure/arm-containerservice'
    summary: Disable acceleration options.
