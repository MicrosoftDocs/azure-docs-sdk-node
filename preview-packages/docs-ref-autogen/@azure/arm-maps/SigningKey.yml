### YamlMime:TSTypeAlias
name: SigningKey
uid: '@azure/arm-maps.SigningKey'
package: '@azure/arm-maps'
summary: >-
  The Maps account key to use for signing. Picking `primaryKey` or
  `secondaryKey` will use the Maps account Shared Keys, and using
  `managedIdentity` will use the auto-renewed private key to sign the SAS. \

  [KnownSigningKey](xref:@azure/arm-maps.KnownSigningKey) can be used
  interchangeably with SigningKey,
   this enum contains the known values that the service supports.
  ### Known values supported by the service

  **primaryKey**: primaryKey \

  **secondaryKey**: secondaryKey \

  **managedIdentity**: managedIdentity
fullName: SigningKey
remarks: ''
isDeprecated: false
syntax: |
  type SigningKey = string
