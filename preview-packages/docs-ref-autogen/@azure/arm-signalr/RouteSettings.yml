### YamlMime:TSType
name: RouteSettings
uid: '@azure/arm-signalr.RouteSettings'
package: '@azure/arm-signalr'
summary: Route settings for the resource
fullName: RouteSettings
remarks: ''
isDeprecated: false
type: interface
properties:
  - name: connectionBalanceWeight
    uid: '@azure/arm-signalr.RouteSettings.connectionBalanceWeight'
    package: '@azure/arm-signalr'
    summary: >-
      Gets or sets the connection balance weight.

      A higher value means a greater balance of client connections across
      different server connections.

      A value of 0 distributes connections randomly, while a value of 255
      ensures maximum balancing.

      The default value is 255.

      Recommended ```255``` for all of the cases.
    fullName: connectionBalanceWeight
    remarks: ''
    isDeprecated: false
    syntax:
      content: 'connectionBalanceWeight?: number'
      return:
        description: ''
        type: number
  - name: latencyWeight
    uid: '@azure/arm-signalr.RouteSettings.latencyWeight'
    package: '@azure/arm-signalr'
    summary: >-
      Gets or sets the weight for latency-based routing.

      A higher value increases the influence of latency-based routing.

      A value of 0 disables latency-based routing entirely, while a value of 255
      enables it fully.

      The default value is 0.

      Recommended ```255``` for replicas or app servers in different regions for
      disaster recovery.
    fullName: latencyWeight
    remarks: ''
    isDeprecated: false
    syntax:
      content: 'latencyWeight?: number'
      return:
        description: ''
        type: number
  - name: serverBalanceWeight
    uid: '@azure/arm-signalr.RouteSettings.serverBalanceWeight'
    package: '@azure/arm-signalr'
    summary: >-
      Gets or sets the server balance weight.

      A higher value means a greater balance of client connections across
      different app server instances.

      A value of 0 distributes connections randomly, while a value of 255
      ensures maximum balancing.

      The default value is 255.

      Recommended ```255``` for multiple app servers in same size.
    fullName: serverBalanceWeight
    remarks: ''
    isDeprecated: false
    syntax:
      content: 'serverBalanceWeight?: number'
      return:
        description: ''
        type: number
