### YamlMime:TSTypeAlias
name: ZonePlacementPolicyType
uid: '@azure/arm-computeschedule.ZonePlacementPolicyType'
package: '@azure/arm-computeschedule'
summary: >-
  Specifies the policy for resource's placement in availability zone. Possible
  values are: **Any** (used for Virtual Machines), **Auto** (used for Virtual
  Machine Scale Sets) - An availability zone will be automatically picked by
  system as part of resource creation. \

  [KnownZonePlacementPolicyType](xref:@azure/arm-computeschedule.KnownZonePlacementPolicyType)
  can be used interchangeably with ZonePlacementPolicyType,
   this enum contains the known values that the service supports.
  ### Known values supported by the service

  **Any** \

  **Auto**: The platform automatically selects an availability zone based on the
  request.
fullName: ZonePlacementPolicyType
remarks: ''
isDeprecated: false
syntax: |
  type ZonePlacementPolicyType = string
