### YamlMime:TSTypeAlias
name: LicenseType
uid: '@azure/arm-containerservice.LicenseType'
package: '@azure/arm-containerservice'
summary: >-
  The license type to use for Windows VMs. See [Azure Hybrid User
  Benefits](https://azure.microsoft.com/pricing/hybrid-benefit/faq/) for more
  details. \

  [KnownLicenseType](xref:@azure/arm-containerservice.KnownLicenseType) can be
  used interchangeably with LicenseType,
   this enum contains the known values that the service supports.
  ### Known values supported by the service

  **None**: No additional licensing is applied. \

  **Windows_Server**: Enables Azure Hybrid User Benefits for Windows VMs.
fullName: LicenseType
remarks: ''
isDeprecated: false
syntax: |
  type LicenseType = string
