name: VirtualMachinePowerState
uid: '@azure/arm-networkcloud.VirtualMachinePowerState'
package: '@azure/arm-networkcloud'
summary: >-
  The power state of the virtual machine. \

  [KnownVirtualMachinePowerState](xref:@azure/arm-networkcloud.KnownVirtualMachinePowerState)
  can be used interchangeably with VirtualMachinePowerState,
   this enum contains the known values that the service supports.
  ### Known values supported by the service

  **Off**: The virtual machine is powered off. \

  **On**: The virtual machine is powered on. \

  **Unknown**: The virtual machine power state is unknown.
