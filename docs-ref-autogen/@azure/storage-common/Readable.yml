  - name: >-
      compose(WritableStream | WritableStream<any> | TransformStream<any, any> |
      (source: any) => void, Abortable)
    uid: '@azure/storage-common.Readable.compose'
    package: '@azure/storage-common'
    summary: >-
      ```js

      import { Readable } from 'node:stream';


      async function* splitToWords(source) {
        for await (const chunk of source) {
          const words = String(chunk).split(' ');

          for (const word of words) {
            yield word;
          }
        }
      }


      const wordsStream = Readable.from(['text passed through', 'composed
      stream']).compose(splitToWords);

      const words = await wordsStream.toArray();


      console.log(words); // prints ['text', 'passed', 'through', 'composed',
      'stream']

      ```


      `readable.compose(s)` is equivalent to `stream.compose(readable, s)`.


      This method also allows for an `AbortSignal` to be provided, which will
      destroy

      the composed stream when aborted.


      See
      [`stream.compose(...streams)`](https://nodejs.org/docs/latest-v26.x/api/stream.html#streamcomposestreams)
      for more information.
    remarks: ''
    isDeprecated: false
    syntax:
      content: >-
        function compose(stream: WritableStream | WritableStream<any> |
        TransformStream<any, any> | (source: any) => void, options?: Abortable):
        Duplex
      parameters:
        - id: stream
          type: >-
            WritableStream | WritableStream&lt;any&gt; | TransformStream&lt;any,
            any&gt; | (source: any) =&gt; void
          description: ''
        - id: options
          type: Abortable
          description: ''
      return:
        description: a stream composed with the stream `stream`.
        type: Duplex
  - name: destroy(Error)
    uid: '@azure/storage-common.Readable.destroy'
    package: '@azure/storage-common'
    summary: >-
      Destroy the stream. Optionally emit an `'error'` event, and emit a
      `'close'` event (unless `emitClose` is set to `false`). After this call,
      the readable

      stream will release any internal resources and subsequent calls to
      `push()` will be ignored.


      Once `destroy()` has been called any further calls will be a no-op and no

      further errors except from `_destroy()` may be emitted as `'error'`.


      Implementors should not override this method, but instead implement
      `readable._destroy()`.
    remarks: ''
    isDeprecated: false
    syntax:
      content: 'function destroy(error?: Error): Readable'
      parameters:
        - id: error
          type: Error
          description: Error which will be passed as payload in `'error'` event
      return:
        description: ''
        type: <xref uid="@azure/storage-common.Readable" />
