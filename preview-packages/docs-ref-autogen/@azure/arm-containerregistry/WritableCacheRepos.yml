name: WritableCacheRepos
uid: '@azure/arm-containerregistry.WritableCacheRepos'
package: '@azure/arm-containerregistry'
summary: >-
  Whether to allow cache operations that write to repositories in this registry.
  \

  [KnownWritableCacheRepos](xref:@azure/arm-containerregistry.KnownWritableCacheRepos)
  can be used interchangeably with WritableCacheRepos,
   this enum contains the known values that the service supports.
  ### Known values supported by the service

  **Enabled**: Cache write operations are enabled. \

  **Disabled**: Cache write operations are disabled.
