name: SpatialAggregationType
uid: '@azure/arm-monitorslis.SpatialAggregationType'
package: '@azure/arm-monitorslis'
summary: >-
  Defines the available spatial aggregation types for aggregating measurements
  across multiple time series. \

  [KnownSpatialAggregationType](xref:@azure/arm-monitorslis.KnownSpatialAggregationType)
  can be used interchangeably with SpatialAggregationType,
   this enum contains the known values that the service supports.
  ### Known values supported by the service

  **Average**: Average value. \

  **Min**: Minimum value. \

  **Max**: Maximum value. \

  **Sum**: Summation. \

  **Count**: Count of occurrences.
fullName: SpatialAggregationType
remarks: ''
isDeprecated: false
syntax: |
  type SpatialAggregationType = string
