### YamlMime:TSType
name: PartnerNamespaceProperties
uid: '@azure/arm-eventgrid.PartnerNamespaceProperties'
package: '@azure/arm-eventgrid'
summary: Properties of the partner namespace.
fullName: PartnerNamespaceProperties
remarks: ''
isDeprecated: false
type: interface
properties:
  - name: disableLocalAuth
    uid: '@azure/arm-eventgrid.PartnerNamespaceProperties.disableLocalAuth'
    package: '@azure/arm-eventgrid'
    summary: >-
      This boolean is used to enable or disable local auth. Default value is
      false. When the property is set to true, only Microsoft Entra ID token
      will be used to authenticate if user is allowed to publish to the partner
      namespace.
    fullName: disableLocalAuth
    remarks: ''
    isDeprecated: false
    syntax:
      content: 'disableLocalAuth?: boolean'
      return:
        description: ''
        type: boolean
  - name: endpoint
    uid: '@azure/arm-eventgrid.PartnerNamespaceProperties.endpoint'
    package: '@azure/arm-eventgrid'
    summary: Endpoint for the partner namespace.
    fullName: endpoint
    remarks: ''
    isDeprecated: false
    syntax:
      content: 'endpoint?: string'
      return:
        description: ''
        type: string
  - name: inboundIpRules
    uid: '@azure/arm-eventgrid.PartnerNamespaceProperties.inboundIpRules'
    package: '@azure/arm-eventgrid'
    summary: >-
      This can be used to restrict traffic from specific IPs instead of all IPs.
      Note: These are considered only if PublicNetworkAccess is enabled.
    fullName: inboundIpRules
    remarks: ''
    isDeprecated: false
    syntax:
      content: 'inboundIpRules?: InboundIpRule[]'
      return:
        description: ''
        type: <xref uid="@azure/arm-eventgrid.InboundIpRule" />[]
  - name: minimumTlsVersionAllowed
    uid: '@azure/arm-eventgrid.PartnerNamespaceProperties.minimumTlsVersionAllowed'
    package: '@azure/arm-eventgrid'
    summary: >-
      Minimum TLS version of the publisher allowed to publish to this partner
      namespace
    fullName: minimumTlsVersionAllowed
    remarks: ''
    isDeprecated: false
    syntax:
      content: 'minimumTlsVersionAllowed?: string'
      return:
        description: ''
        type: string
  - name: partnerRegistrationFullyQualifiedId
    uid: >-
      @azure/arm-eventgrid.PartnerNamespaceProperties.partnerRegistrationFullyQualifiedId
    package: '@azure/arm-eventgrid'
    summary: >-
      The fully qualified ARM Id of the partner registration that should be
      associated with this partner namespace. This takes the following format:

      /subscriptions/{subscriptionId}/resourceGroups/{resourceGroupName}/providers/Microsoft.EventGrid/partnerRegistrations/{partnerRegistrationName}.
    fullName: partnerRegistrationFullyQualifiedId
    remarks: ''
    isDeprecated: false
    syntax:
      content: 'partnerRegistrationFullyQualifiedId?: string'
      return:
        description: ''
        type: string
  - name: partnerTopicRoutingMode
    uid: '@azure/arm-eventgrid.PartnerNamespaceProperties.partnerTopicRoutingMode'
    package: '@azure/arm-eventgrid'
    summary: >-
      This determines if events published to this partner namespace should use
      the source attribute in the event payload

      or use the channel name in the header when matching to the partner topic.
      If none is specified, source attribute routing will be used to match the
      partner topic.
    fullName: partnerTopicRoutingMode
    remarks: ''
    isDeprecated: false
    syntax:
      content: 'partnerTopicRoutingMode?: string'
      return:
        description: ''
        type: string
  - name: privateEndpointConnections
    uid: '@azure/arm-eventgrid.PartnerNamespaceProperties.privateEndpointConnections'
    package: '@azure/arm-eventgrid'
    summary: List of private endpoint connections.
    fullName: privateEndpointConnections
    remarks: ''
    isDeprecated: false
    syntax:
      content: 'privateEndpointConnections?: PrivateEndpointConnection[]'
      return:
        description: ''
        type: <xref uid="@azure/arm-eventgrid.PrivateEndpointConnection" />[]
  - name: provisioningState
    uid: '@azure/arm-eventgrid.PartnerNamespaceProperties.provisioningState'
    package: '@azure/arm-eventgrid'
    summary: Provisioning state of the partner namespace.
    fullName: provisioningState
    remarks: ''
    isDeprecated: false
    syntax:
      content: 'provisioningState?: string'
      return:
        description: ''
        type: string
  - name: publicNetworkAccess
    uid: '@azure/arm-eventgrid.PartnerNamespaceProperties.publicNetworkAccess'
    package: '@azure/arm-eventgrid'
    summary: >-
      This determines if traffic is allowed over public network. By default it
      is enabled.

      You can further restrict to specific IPs by configuring <seealso
      cref="P:Microsoft.Azure.Events.ResourceProvider.Common.Contracts.PartnerNamespaceProperties.InboundIpRules"
      />
    fullName: publicNetworkAccess
    remarks: ''
    isDeprecated: false
    syntax:
      content: 'publicNetworkAccess?: string'
      return:
        description: ''
        type: string
