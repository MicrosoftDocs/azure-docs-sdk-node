  The type of threshold.

  Supported for CategoryType(s): Cost.
fullName: KnownThresholdType
remarks: ''
isDeprecated: false
fields:
  - name: Actual
    uid: '@azure/arm-costmanagement.KnownThresholdType.Actual'
    package: '@azure/arm-costmanagement'
    summary: >-
      Actual costs budget alerts notify when the actual accrued cost exceeds the
      allocated budget.
  - name: Forecasted
    uid: '@azure/arm-costmanagement.KnownThresholdType.Forecasted'
    package: '@azure/arm-costmanagement'
    summary: >-
      Forecasted costs budget alerts provide advanced notification that your
      spending trends are likely to exceed your allocated budget, as it relies
      on forecasted cost predictions.
