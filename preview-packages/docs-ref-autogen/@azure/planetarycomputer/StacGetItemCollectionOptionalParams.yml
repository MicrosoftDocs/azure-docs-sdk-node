  - name: limit
    uid: '@azure/planetarycomputer.StacGetItemCollectionOptionalParams.limit'
    package: '@azure/planetarycomputer'
    summary: >-
      The optional limit parameter recommends the number of items that should be
      present in the response document.


      If the limit parameter value is greater than advertised limit maximum, the
      server must return the

      maximum possible number of items, rather than responding with an error.


      Only items are counted that are on the first level of the collection in
      the response document.

      Nested objects contained within the explicitly requested items must not be
      counted.


      Minimum = 1. Maximum = 10000. Default = 10.
    fullName: limit
    remarks: ''
    isDeprecated: false
    syntax:
      content: 'limit?: number'
      return:
        description: ''
        type: number
  - name: sign
    uid: '@azure/planetarycomputer.StacGetItemCollectionOptionalParams.sign'
    package: '@azure/planetarycomputer'
