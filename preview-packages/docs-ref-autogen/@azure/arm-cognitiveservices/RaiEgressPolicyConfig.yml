### YamlMime:TSType
name: RaiEgressPolicyConfig
uid: '@azure/arm-cognitiveservices.RaiEgressPolicyConfig'
package: '@azure/arm-cognitiveservices'
summary: >-
  Egress (outbound network) policy configuration nested within an RAI policy.

  Controls which external endpoints sandboxed agents can reach and what

  transformations (header injection, URL rewrite) are applied to matching
  traffic.
fullName: RaiEgressPolicyConfig
remarks: ''
isDeprecated: false
type: interface
properties:
  - name: defaultAction
    uid: '@azure/arm-cognitiveservices.RaiEgressPolicyConfig.defaultAction'
    package: '@azure/arm-cognitiveservices'
    summary: >-
      The default action when no user-defined rules match.

      Deny blocks unmatched traffic; Allow permits it. Transform and Rewrite
      rules

      are always applied to their matched traffic regardless of this setting —

      defaultAction only governs traffic that does not match any rule.

      If omitted on create, the server defaults to Deny (fail-closed). On
      subsequent

      GET requests, the server always returns the effective value.
    fullName: defaultAction
    remarks: ''
    isDeprecated: false
    syntax:
      content: 'defaultAction?: string'
      return:
        description: ''
        type: string
  - name: description
    uid: '@azure/arm-cognitiveservices.RaiEgressPolicyConfig.description'
    package: '@azure/arm-cognitiveservices'
    summary: Description of the egress policy.
    fullName: description
    remarks: ''
    isDeprecated: false
    syntax:
      content: 'description?: string'
      return:
        description: ''
        type: string
  - name: mode
    uid: '@azure/arm-cognitiveservices.RaiEgressPolicyConfig.mode'
    package: '@azure/arm-cognitiveservices'
    summary: |-
      The enforcement mode for egress rules.
      If omitted on create, the server defaults to Enforced. On subsequent GET
      requests, the server always returns the effective mode.
    fullName: mode
    remarks: ''
    isDeprecated: false
    syntax:
      content: 'mode?: string'
      return:
        description: ''
        type: string
  - name: rules
    uid: '@azure/arm-cognitiveservices.RaiEgressPolicyConfig.rules'
    package: '@azure/arm-cognitiveservices'
    summary: >-
      Ordered list of egress rules. First matching rule wins.

      Rules are evaluated in declaration order; the first rule whose match
      criteria

      are satisfied determines the action taken on the request.
    fullName: rules
    remarks: ''
    isDeprecated: false
    syntax:
      content: 'rules?: RaiEgressRule[]'
      return:
        description: ''
        type: <xref uid="@azure/arm-cognitiveservices.RaiEgressRule" />[]
