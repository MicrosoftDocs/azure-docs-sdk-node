uid: '@azure/arm-networkcloud.HybridAksIpamEnabled'
package: '@azure/arm-networkcloud'
summary: >-
  Field Deprecated. The field was previously optional, now it will have no
  defined behavior and will be ignored. The indicator of whether or not to
  disable IPAM allocation on the network attachment definition injected into the
  Hybrid AKS Cluster. \

  [KnownHybridAksIpamEnabled](xref:@azure/arm-networkcloud.KnownHybridAksIpamEnabled)
  can be used interchangeably with HybridAksIpamEnabled,
   this enum contains the known values that the service supports.
  ### Known values supported by the service

  **True**: Hybrid AKS IPAM allocation is enabled. \

  **False**: Hybrid AKS IPAM allocation is disabled.
