### YamlMime:TSTypeAlias
name: ResourceProtectionSolutionType
uid: '@azure/arm-resiliencemanagement.ResourceProtectionSolutionType'
package: '@azure/arm-resiliencemanagement'
summary: >-
  Protection solution type for the resources by which recovery takes place \

  [KnownResourceProtectionSolutionType](xref:@azure/arm-resiliencemanagement.KnownResourceProtectionSolutionType)
  can be used interchangeably with ResourceProtectionSolutionType,
   this enum contains the known values that the service supports.
  ### Known values supported by the service

  **None**: Resource is not protected with any protection solution. \

  **AzureNative**: Resource is protected with the Azure native solution provided
  by the native Azure service. \

  **AzureSiteRecovery**: Resource protected with the Azure solution provided by
  the native Azure Site Service for Azure VMs. \

  **CrossZoneVMRecovery**: Cross zone recovery enabled Azure VMs. \

  **CustomRunbook**: Resource is not protected with native solution and using
  custom runbook automation scripts for recovery verbs.
fullName: ResourceProtectionSolutionType
remarks: ''
isDeprecated: false
syntax: |
  type ResourceProtectionSolutionType = string
