name: KnownMatchingMethod
uid: '@azure/arm-securityinsight.KnownMatchingMethod'
package: '@azure/arm-securityinsight'
summary: >-
  Grouping matching method. When method is Selected at least one of
  groupByEntities, groupByAlertDetails, groupByCustomDetails must be provided
  and not empty.
fullName: KnownMatchingMethod
remarks: ''
isDeprecated: false
fields:
