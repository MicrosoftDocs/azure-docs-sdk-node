### YamlMime:TSEnum
name: KnownSkuName
uid: '@azure/arm-search.KnownSkuName'
package: '@azure/arm-search'
summary: >-
  The SKU of the search service. Valid values include: 'free': Shared service.
  'basic': Dedicated service with up to 3 replicas. 'standard': Dedicated
  service with up to 12 partitions and 12 replicas. 'standard2': Similar to
  standard, but with more capacity per search unit. 'standard3': The largest
  Standard offering with up to 12 partitions and 12 replicas (or up to 3
  partitions with more indexes if you also set the hostingMode property to
  'highDensity'). 'storage_optimized_l1': Supports 1TB per partition, up to 12
  partitions. 'storage_optimized_l2': Supports 2TB per partition, up to 12
  partitions. 'serverless': Serverless tier with auto-scaling capabilities.
fullName: KnownSkuName
remarks: ''
isDeprecated: false
fields:
  - name: Basic
    uid: '@azure/arm-search.KnownSkuName.Basic'
    package: '@azure/arm-search'
    summary: Billable tier for a dedicated service having up to 3 replicas.
  - name: Free
    uid: '@azure/arm-search.KnownSkuName.Free'
    package: '@azure/arm-search'
    summary: >-
      Free tier, with no SLA guarantees and a subset of the features offered on
      billable tiers.
  - name: Serverless
    uid: '@azure/arm-search.KnownSkuName.Serverless'
    package: '@azure/arm-search'
    summary: >-
      Serverless tier, offering low-touch, consumption-based, and pay-as-you-go
      experience, with auto-scaling capabilities.
  - name: Standard
    uid: '@azure/arm-search.KnownSkuName.Standard'
    package: '@azure/arm-search'
    summary: >-
      Billable tier for a dedicated service having up to 12 partitions and 12
      replicas.
  - name: Standard2
    uid: '@azure/arm-search.KnownSkuName.Standard2'
    package: '@azure/arm-search'
    summary: Similar to 'standard', but with more capacity per search unit.
  - name: Standard3
    uid: '@azure/arm-search.KnownSkuName.Standard3'
    package: '@azure/arm-search'
    summary: >-
      The largest Standard offering with up to 12 partitions and 12 replicas (or
      up to 3 partitions with more indexes if you also set the hostingMode
      property to 'highDensity').
  - name: StorageOptimizedL1
    uid: '@azure/arm-search.KnownSkuName.StorageOptimizedL1'
    package: '@azure/arm-search'
    summary: >-
      Billable tier for a dedicated service that supports 1TB per partition, up
      to 12 partitions.
  - name: StorageOptimizedL2
    uid: '@azure/arm-search.KnownSkuName.StorageOptimizedL2'
    package: '@azure/arm-search'
    summary: >-
      Billable tier for a dedicated service that supports 2TB per partition, up
      to 12 partitions.
