  - name: status
    uid: '@azure/arm-machinelearning.PrivateLinkServiceConnectionState.status'
    package: '@azure/arm-machinelearning'
    summary: >-
      Connection status of the service consumer with the service
      provider\r\nPossible state transitions\r\nPending -> Approved (Service
      provider approves the connection request)\r\nPending -> Rejected (Service
      provider rejects the connection request)\r\nPending -> Disconnected
      (Service provider deletes the connection)\r\nApproved -> Rejected (Service
      provider rejects the approved connection)\r\nApproved -> Disconnected
      (Service provider deletes the connection)\r\nRejected -> Pending (Service
      consumer re-initiates the connection request that was
      rejected)\r\nRejected -> Disconnected (Service provider deletes the
      connection)
    fullName: status
