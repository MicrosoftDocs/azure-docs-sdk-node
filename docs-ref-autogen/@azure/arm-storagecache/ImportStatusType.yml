### YamlMime:TSTypeAlias
name: ImportStatusType
uid: '@azure/arm-storagecache.ImportStatusType'
package: '@azure/arm-storagecache'
summary: >-
  The operational state of the import job. InProgress indicates the import is
  still running. Canceled indicates it has been canceled by the user. Completed
  indicates import finished, successfully importing all discovered blobs into
  the Lustre namespace. CompletedPartial indicates the import finished but some
  blobs either were found to be conflicting and could not be imported or other
  errors were encountered. Failed means the import was unable to complete due to
  a fatal error. \

  [KnownImportStatusType](xref:@azure/arm-storagecache.KnownImportStatusType)
  can be used interchangeably with ImportStatusType,
   this enum contains the known values that the service supports.
  ### Known values supported by the service

  **InProgress**: InProgress \

  **Cancelling**: Cancelling \

  **Canceled**: Canceled \

  **Completed**: Completed \

  **CompletedPartial**: CompletedPartial \

  **Failed**: Failed
fullName: ImportStatusType
remarks: ''
isDeprecated: false
syntax: |
  type ImportStatusType = string
