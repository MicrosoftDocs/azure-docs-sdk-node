### YamlMime:TSTypeAlias
name: AutoExecuteStatusInheritedFrom
uid: '@azure/arm-sql.AutoExecuteStatusInheritedFrom'
package: '@azure/arm-sql'
summary: >-
  Gets the resource from which current value of auto-execute status is
  inherited. Auto-execute status can be set on (and inherited from) different
  levels in the resource hierarchy. Possible values are 'Subscription',
  'Server', 'ElasticPool', 'Database' and 'Default' (when status is not
  explicitly set on any level).
fullName: AutoExecuteStatusInheritedFrom
remarks: ''
isDeprecated: false
syntax: |
  type AutoExecuteStatusInheritedFrom =
    | "Default"
    | "Subscription"
    | "Server"
    | "ElasticPool"
    | "Database"
