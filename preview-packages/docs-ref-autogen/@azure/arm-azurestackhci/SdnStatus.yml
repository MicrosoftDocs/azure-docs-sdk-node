### YamlMime:TSTypeAlias
name: SdnStatus
uid: '@azure/arm-azurestackhci.SdnStatus'
package: '@azure/arm-azurestackhci'
summary: >-
  Indicates the current Software Defined Networking (SDN) status of the
  resource, which may be an individual device or a cluster. \

  [KnownSdnStatus](xref:@azure/arm-azurestackhci.KnownSdnStatus) can be used
  interchangeably with SdnStatus,
   this enum contains the known values that the service supports.
  ### Known values supported by the service

  **Unknown**: The SDN status could not be determined due to a failure in
  querying the SDN API service. This may occur if the query script fails or if
  the system is in an inconsistent state. The domain name will be null in this
  case. \

  **Disabled**: SDN is not enabled on the resource. The domain name will be
  null. This is the default state when SDN has not been configured. \

  **Enabled**: SDN is successfully enabled on the resource. The domain name will
  be populated in the format `<sdnPrefix>-nc.<domain>`. Customers may need to
  manage DNS settings to ensure proper resolution.
fullName: SdnStatus
remarks: ''
isDeprecated: false
syntax: |
  type SdnStatus = string
