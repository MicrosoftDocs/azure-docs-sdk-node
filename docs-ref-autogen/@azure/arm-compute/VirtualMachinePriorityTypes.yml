### YamlMime:TSTypeAlias
name: VirtualMachinePriorityTypes
uid: '@azure/arm-compute.VirtualMachinePriorityTypes'
package: '@azure/arm-compute'
summary: >-
  Specifies the priority for a standalone virtual machine or the virtual
  machines in the scale set. 'Low' enum will be deprecated in the future, please
  use 'Spot' as the enum to deploy Azure Spot VM/VMSS. \

  [KnownVirtualMachinePriorityTypes](xref:@azure/arm-compute.KnownVirtualMachinePriorityTypes)
  can be used interchangeably with VirtualMachinePriorityTypes,
   this enum contains the known values that the service supports.
  ### Known values supported by the service

  **Regular** \

  **Low** \

  **Spot**
fullName: VirtualMachinePriorityTypes
remarks: ''
isDeprecated: false
syntax: |
  type VirtualMachinePriorityTypes = string
