name: JobStatus
uid: '@azure/arm-automation.JobStatus'
package: '@azure/arm-automation'
summary: >-
  Gets or sets the status of the job. \

  [KnownJobStatus](xref:@azure/arm-automation.KnownJobStatus) can be used
  interchangeably with JobStatus,
   this enum contains the known values that the service supports.
  ### Known values supported by the service

  **New**: New \

  **Activating**: Activating \

  **Running**: Running \

  **Completed**: Completed \

  **Failed**: Failed \

  **Stopped**: Stopped \

  **Blocked**: Blocked \

  **Suspended**: Suspended \

  **Disconnected**: Disconnected \

  **Suspending**: Suspending \

  **Stopping**: Stopping \

  **Resuming**: Resuming \

  **Removing**: Removing
