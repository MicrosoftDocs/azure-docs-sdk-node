### YamlMime:TSTypeAlias
name: DeploymentType
uid: '@azure/arm-networkcloud.DeploymentType'
package: '@azure/arm-networkcloud'
summary: >-
  The type (kind) of the cluster. When specified, the value must exactly match
  the kind configured on the cluster manager that manages the cluster. If
  omitted, the service will default the value to the kind value of the cluster
  manager. \

  [KnownDeploymentType](xref:@azure/arm-networkcloud.KnownDeploymentType) can be
  used interchangeably with DeploymentType,
   this enum contains the known values that the service supports.
  ### Known values supported by the service

  **Nexus**: Azure Operator Nexus \

  **AzureLocal**: Azure Local
fullName: DeploymentType
remarks: ''
isDeprecated: false
syntax: |
  type DeploymentType = string
