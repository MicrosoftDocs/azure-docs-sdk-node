### YamlMime:TSType
name: ToLlmInputOptions
uid: '@azure/ai-content-understanding.ToLlmInputOptions'
package: '@azure/ai-content-understanding'
summary: Options for [toLlmInput](xref:@azure/ai-content-understanding.toLlmInput).
fullName: ToLlmInputOptions
remarks: ''
isDeprecated: false
type: interface
properties:
  - name: includeFields
    uid: '@azure/ai-content-understanding.ToLlmInputOptions.includeFields'
    package: '@azure/ai-content-understanding'
    summary: |-
      Whether to include structured fields in the output. Defaults to `true`.
      Set to `false` for markdown-only output (smaller token footprint, no
      structured data).
    fullName: includeFields
    remarks: ''
    isDeprecated: false
    syntax:
      content: 'includeFields?: boolean'
      return:
        description: ''
        type: boolean
  - name: includeMarkdown
    uid: '@azure/ai-content-understanding.ToLlmInputOptions.includeMarkdown'
    package: '@azure/ai-content-understanding'
    summary: |-
      Whether to include markdown content in the output. Defaults to `true`.
      Set to `false` for fields-only output.
    fullName: includeMarkdown
    remarks: ''
    isDeprecated: false
    syntax:
      content: 'includeMarkdown?: boolean'
      return:
        description: ''
        type: boolean
  - name: metadata
    uid: '@azure/ai-content-understanding.ToLlmInputOptions.metadata'
    package: '@azure/ai-content-understanding'
    summary: |-
      Optional user-supplied key/value pairs to include in the YAML front
      matter. Common keys include `"source"` (filename), `"department"`,
      `"batchId"`, etc. Metadata keys are placed after `contentType` and
      before auto-detected keys (`timeRange`, `category`, `pages`).

      Metadata keys must not conflict with helper-generated front matter
      keys: `contentType`, `timeRange`, `category`, `pages`, `fields`, or
      `rai_warnings`.
    fullName: metadata
    remarks: ''
    isDeprecated: false
    syntax:
      content: 'metadata?: Record<string, unknown>'
      return:
        description: ''
        type: Record&lt;string, unknown&gt;
