name: RestServiceAuthenticationType
uid: '@azure/arm-datafactory.RestServiceAuthenticationType'
package: '@azure/arm-datafactory'
summary: >-
  Type of authentication used to connect to the REST service. \

  [KnownRestServiceAuthenticationType](xref:@azure/arm-datafactory.KnownRestServiceAuthenticationType)
  can be used interchangeably with RestServiceAuthenticationType,
   this enum contains the known values that the service supports.
  ### Known values supported by the service

  **Anonymous**: Anonymous \

  **Basic**: Basic \

  **AadServicePrincipal**: AadServicePrincipal \

  **ManagedServiceIdentity**: ManagedServiceIdentity \

  **OAuth2ClientCredential**: OAuth2ClientCredential
