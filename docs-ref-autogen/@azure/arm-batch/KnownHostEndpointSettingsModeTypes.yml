### YamlMime:TSEnum
name: KnownHostEndpointSettingsModeTypes
uid: '@azure/arm-batch.KnownHostEndpointSettingsModeTypes'
package: '@azure/arm-batch'
summary: Specifies the access control policy execution mode.
fullName: KnownHostEndpointSettingsModeTypes
remarks: ''
isDeprecated: false
fields:
  - name: Audit
    uid: '@azure/arm-batch.KnownHostEndpointSettingsModeTypes.Audit'
    package: '@azure/arm-batch'
    summary: >-
      In Audit mode, the system acts as if it is enforcing the access control
      policy, including emitting access denial entries in the logs but it does
      not actually deny any requests to host endpoints.
  - name: Enforce
    uid: '@azure/arm-batch.KnownHostEndpointSettingsModeTypes.Enforce'
    package: '@azure/arm-batch'
    summary: >-
      Enforce mode is the recommended mode of operation and system will enforce
      the access control policy. This property cannot be used together with
      'inVMAccessControlProfileReferenceId'.
