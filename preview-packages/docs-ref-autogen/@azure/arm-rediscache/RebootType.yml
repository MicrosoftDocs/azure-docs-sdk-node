### YamlMime:TSTypeAlias
name: RebootType
uid: '@azure/arm-rediscache.RebootType'
package: '@azure/arm-rediscache'
summary: >-
  Which Redis node(s) to reboot. Depending on this value data loss is possible.
  \

  [KnownRebootType](xref:@azure/arm-rediscache.KnownRebootType) can be used
  interchangeably with RebootType,
   this enum contains the known values that the service supports.
  ### Known values supported by the service

  **PrimaryNode**: Reboot the primary nodes used for redis write operations.
  (This may trigger role changes.) \

  **SecondaryNode**: Reboot only the secondary or replica nodes \

  **AllNodes**: Reboot all nodes, not guaranteed to happen simultaneously.
fullName: RebootType
remarks: ''
isDeprecated: false
syntax: |
  type RebootType = string
