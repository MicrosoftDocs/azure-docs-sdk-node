name: UpdateRunPropertiesState
uid: '@azure/arm-azurestackhci.UpdateRunPropertiesState'
package: '@azure/arm-azurestackhci'
summary: >-
  Represents the current state of the update run. Indicates whether the update
  is in progress, has completed successfully, failed, or is in an unknown state.
  \

  [KnownUpdateRunPropertiesState](xref:@azure/arm-azurestackhci.KnownUpdateRunPropertiesState)
  can be used interchangeably with UpdateRunPropertiesState,
   this enum contains the known values that the service supports.
  ### Known values supported by the service

  **Unknown**: The state of the update run is not known. \

  **Succeeded**: The update run completed successfully. \

  **InProgress**: The update run is currently in progress. \

  **Failed**: The update run failed to complete successfully.
fullName: UpdateRunPropertiesState
remarks: ''
isDeprecated: false
syntax: |
  type UpdateRunPropertiesState = string
