name: KnownManagementMode
uid: '@azure/arm-containerservice.KnownManagementMode'
package: '@azure/arm-containerservice'
summary: >-
  The Managed GPU experience installs additional components, such as the Data
  Center GPU Manager (DCGM) metrics for monitoring, on top of the GPU driver for
  you. For more details of what is installed, check out aka.ms/aks/managed-gpu.
fullName: KnownManagementMode
remarks: ''
isDeprecated: false
fields:
  - name: Managed
    uid: '@azure/arm-containerservice.KnownManagementMode.Managed'
    package: '@azure/arm-containerservice'
    summary: Managed GPU experience is enabled for NVIDIA GPUs.
  - name: Unmanaged
    uid: '@azure/arm-containerservice.KnownManagementMode.Unmanaged'
    package: '@azure/arm-containerservice'
    summary: Managed GPU experience is disabled for NVIDIA GPUs.
