### YamlMime:TSType
name: ExtensionProperties
uid: '@azure/arm-azurestackhci.ExtensionProperties'
package: '@azure/arm-azurestackhci'
summary: Status of Arc Extension for a particular node in HCI Cluster.
fullName: ExtensionProperties
remarks: ''
isDeprecated: false
type: interface
properties:
  - name: aggregateState
    uid: '@azure/arm-azurestackhci.ExtensionProperties.aggregateState'
    package: '@azure/arm-azurestackhci'
    summary: >-
      Aggregate state of Arc Extensions across the nodes in this HCI cluster.
      This reflects the overall status of the extension deployment and operation
      across all nodes.
    fullName: aggregateState
    remarks: ''
    isDeprecated: false
    syntax:
      content: 'aggregateState?: string'
      return:
        description: ''
        type: string
  - name: autoUpgradeMinorVersion
    uid: '@azure/arm-azurestackhci.ExtensionProperties.autoUpgradeMinorVersion'
    package: '@azure/arm-azurestackhci'
    summary: >-
      Indicates whether the extension should use a newer minor version if one is
      available at deployment time. Once deployed, however, the extension will
      not upgrade minor versions unless redeployed, even with this property set
      to true.
    fullName: autoUpgradeMinorVersion
    remarks: ''
    isDeprecated: false
    syntax:
      content: 'autoUpgradeMinorVersion?: boolean'
      return:
        description: ''
        type: boolean
  - name: enableAutomaticUpgrade
    uid: '@azure/arm-azurestackhci.ExtensionProperties.enableAutomaticUpgrade'
    package: '@azure/arm-azurestackhci'
    summary: >-
      Indicates whether the extension should be automatically upgraded by the
      platform if there is a newer version available.
    fullName: enableAutomaticUpgrade
    remarks: ''
    isDeprecated: false
    syntax:
      content: 'enableAutomaticUpgrade?: boolean'
      return:
        description: ''
        type: boolean
  - name: forceUpdateTag
    uid: '@azure/arm-azurestackhci.ExtensionProperties.forceUpdateTag'
    package: '@azure/arm-azurestackhci'
    summary: >-
      How the extension handler should be forced to update even if the extension
      configuration has not changed.
    fullName: forceUpdateTag
    remarks: ''
    isDeprecated: false
    syntax:
      content: 'forceUpdateTag?: string'
      return:
        description: ''
        type: string
  - name: managedBy
    uid: '@azure/arm-azurestackhci.ExtensionProperties.managedBy'
    package: '@azure/arm-azurestackhci'
    summary: >-
      Indicates if the extension is managed by Azure or the user. This
      determines who controls the deployment and lifecycle of the extension.
    fullName: managedBy
    remarks: ''
    isDeprecated: false
    syntax:
      content: 'managedBy?: string'
      return:
        description: ''
        type: string
  - name: perNodeExtensionDetails
    uid: '@azure/arm-azurestackhci.ExtensionProperties.perNodeExtensionDetails'
    package: '@azure/arm-azurestackhci'
    summary: State of Arc Extension in each of the nodes.
    fullName: perNodeExtensionDetails
    remarks: ''
    isDeprecated: false
    syntax:
      content: 'perNodeExtensionDetails?: PerNodeExtensionState[]'
      return:
        description: ''
        type: <xref uid="@azure/arm-azurestackhci.PerNodeExtensionState" />[]
  - name: protectedSettings
    uid: '@azure/arm-azurestackhci.ExtensionProperties.protectedSettings'
    package: '@azure/arm-azurestackhci'
    summary: Protected settings (may contain secrets).
    fullName: protectedSettings
    remarks: ''
    isDeprecated: false
    syntax:
      content: 'protectedSettings?: any'
      return:
        description: ''
        type: any
  - name: provisioningState
    uid: '@azure/arm-azurestackhci.ExtensionProperties.provisioningState'
    package: '@azure/arm-azurestackhci'
    summary: >-
      Provisioning state of the Extension proxy resource. Indicates the current
      lifecycle status of the resource, such as whether it's being created,
      updated, deleted, or has encountered an error.
    fullName: provisioningState
    remarks: ''
    isDeprecated: false
    syntax:
      content: 'provisioningState?: string'
      return:
        description: ''
        type: string
  - name: publisher
    uid: '@azure/arm-azurestackhci.ExtensionProperties.publisher'
    package: '@azure/arm-azurestackhci'
    summary: The name of the extension handler publisher.
    fullName: publisher
    remarks: ''
    isDeprecated: false
    syntax:
      content: 'publisher?: string'
      return:
        description: ''
        type: string
  - name: settings
    uid: '@azure/arm-azurestackhci.ExtensionProperties.settings'
    package: '@azure/arm-azurestackhci'
    summary: Json formatted public settings for the extension.
    fullName: settings
    remarks: ''
    isDeprecated: false
    syntax:
      content: 'settings?: any'
      return:
        description: ''
        type: any
  - name: type
    uid: '@azure/arm-azurestackhci.ExtensionProperties.type'
    package: '@azure/arm-azurestackhci'
    summary: >-
      Specifies the type of the extension; an example is
      "CustomScriptExtension".
    fullName: type
    remarks: ''
    isDeprecated: false
    syntax:
      content: 'type?: string'
      return:
        description: ''
        type: string
  - name: typeHandlerVersion
    uid: '@azure/arm-azurestackhci.ExtensionProperties.typeHandlerVersion'
    package: '@azure/arm-azurestackhci'
    summary: >-
      Specifies the version of the script handler. Latest version would be used
      if not specified.
    fullName: typeHandlerVersion
    remarks: ''
    isDeprecated: false
    syntax:
      content: 'typeHandlerVersion?: string'
      return:
        description: ''
        type: string
