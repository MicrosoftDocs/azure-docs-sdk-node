name: DdosTrafficType
uid: '@azure/arm-network.DdosTrafficType'
package: '@azure/arm-network'
summary: >-
  The traffic type (one of Tcp, Udp, TcpSyn) that the detection rule will be
  applied upon. \

  [KnownDdosTrafficType](xref:@azure/arm-network.KnownDdosTrafficType) can be
  used interchangeably with DdosTrafficType,
   this enum contains the known values that the service supports.
