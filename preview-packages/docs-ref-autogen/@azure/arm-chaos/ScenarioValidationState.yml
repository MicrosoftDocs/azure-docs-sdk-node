### YamlMime:TSTypeAlias
name: ScenarioValidationState
uid: '@azure/arm-chaos.ScenarioValidationState'
package: '@azure/arm-chaos'
summary: >-
  Enum of the scenario validation state. \

  [KnownScenarioValidationState](xref:@azure/arm-chaos.KnownScenarioValidationState)
  can be used interchangeably with ScenarioValidationState,
   this enum contains the known values that the service supports.
  ### Known values supported by the service

  **Resolving**: The scenario validation is in a resolving state. \

  **Generating**: The scenario validation is in a generating state. \

  **Validating**: The scenario validation is in a validating state. \

  **Accepted**: The scenario validation has been accepted. \

  **NotStarted**: The scenario validation has not yet started. \

  **RequiresAttention**: The scenario validation reflects a state that requires
  attention.

  This is a terminal failure state indicating validation issues were found. \

  **NoResolvedResources**: The scenario validation found no valid resources to
  perform fault behaviors against.

  This is a terminal failure state. \

  **Succeeded**: The scenario validation completed successfully and the scenario
  is ready to execute.
fullName: ScenarioValidationState
remarks: ''
isDeprecated: false
syntax: |
  type ScenarioValidationState = string
