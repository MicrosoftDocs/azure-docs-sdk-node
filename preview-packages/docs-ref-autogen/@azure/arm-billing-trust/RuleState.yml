### YamlMime:TSTypeAlias
name: RuleState
uid: '@azure/arm-billing-trust.RuleState'
package: '@azure/arm-billing-trust'
summary: >-
  The evaluation state of a rule \

  [KnownRuleState](xref:@azure/arm-billing-trust.KnownRuleState) can be used
  interchangeably with RuleState,
   this enum contains the known values that the service supports.
  ### Known values supported by the service

  **pending**: Rule is queued and not yet evaluated \

  **running**: Rule evaluation is in progress \

  **actionRequired**: Customer input is required to proceed \

  **underReview**: Operations review is in progress \

  **skipped**: Rule preconditions (runAfter) were not met; rule was skipped \

  **failed**: Rule evaluation failed \

  **succeeded**: Rule evaluation succeeded \

  **succeededWithOverride**: Rule succeeded but with a manual override applied
  by operations \

  **failedWithOverride**: Rule failed but with a manual override applied by
  operations \

  **expired**: Rule expired and requires re-evaluation
fullName: RuleState
remarks: ''
isDeprecated: false
syntax: |
  type RuleState = string
