### YamlMime:TSEnum
name: KnownDriverType
uid: '@azure/arm-containerservice.KnownDriverType'
package: '@azure/arm-containerservice'
summary: >-
  Specify the type of GPU driver to install when creating Windows agent pools.
  If not provided, AKS selects the driver based on system compatibility. This
  cannot be changed once the AgentPool has been created. This cannot be set on
  Linux AgentPools. For Linux AgentPools, the driver is selected based on system
  compatibility.
fullName: KnownDriverType
remarks: ''
isDeprecated: false
fields:
  - name: Cuda
    uid: '@azure/arm-containerservice.KnownDriverType.Cuda'
    package: '@azure/arm-containerservice'
    summary: >-
      Install the CUDA driver for the GPU, optimized for computational tasks in
      scientific computing and data-intensive applications.
  - name: Grid
    uid: '@azure/arm-containerservice.KnownDriverType.Grid'
    package: '@azure/arm-containerservice'
    summary: >-
      Install the GRID driver for the GPU, suitable for applications requiring
      virtualization support.
