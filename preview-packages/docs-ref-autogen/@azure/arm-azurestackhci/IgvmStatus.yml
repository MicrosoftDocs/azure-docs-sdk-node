### YamlMime:TSTypeAlias
name: IgvmStatus
uid: '@azure/arm-azurestackhci.IgvmStatus'
package: '@azure/arm-azurestackhci'
summary: >-
  Represents the IGVM support status for the device. \

  [KnownIgvmStatus](xref:@azure/arm-azurestackhci.KnownIgvmStatus) can be used
  interchangeably with IgvmStatus,
   this enum contains the known values that the service supports.
  ### Known values supported by the service

  **Unknown**: The IGVM status could not be determined due to a query failure or
  inconsistent system state. \

  **Enabled**: IGVM support is enabled, indicating that confidential VM features
  are available on this device. \

  **Disabled**: IGVM status is disabled, indicating that confidential VM
  features are not supported on this device.
fullName: IgvmStatus
remarks: ''
isDeprecated: false
syntax: |
  type IgvmStatus = string
