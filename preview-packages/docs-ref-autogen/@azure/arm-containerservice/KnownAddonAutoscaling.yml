### YamlMime:TSEnum
name: KnownAddonAutoscaling
uid: '@azure/arm-containerservice.KnownAddonAutoscaling'
package: '@azure/arm-containerservice'
summary: Whether VPA add-on is enabled and configured to scale AKS-managed add-ons.
fullName: KnownAddonAutoscaling
remarks: ''
isDeprecated: false
fields:
  - name: Disabled
    uid: '@azure/arm-containerservice.KnownAddonAutoscaling.Disabled'
    package: '@azure/arm-containerservice'
    summary: Feature to autoscale AKS-managed add-ons is disabled.
  - name: Enabled
    uid: '@azure/arm-containerservice.KnownAddonAutoscaling.Enabled'
    package: '@azure/arm-containerservice'
    summary: >-
      Feature to autoscale AKS-managed add-ons is enabled. The default VPA
      update mode is Initial mode.
