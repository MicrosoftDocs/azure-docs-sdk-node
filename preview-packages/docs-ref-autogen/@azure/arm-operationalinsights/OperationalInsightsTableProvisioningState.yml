name: OperationalInsightsTableProvisioningState
uid: '@azure/arm-operationalinsights.OperationalInsightsTableProvisioningState'
package: '@azure/arm-operationalinsights'
summary: >-
  Table's current provisioning state. If set to 'updating', indicates a resource
  lock due to ongoing operation, forbidding any update to the table until the
  ongoing operation is concluded. \

  [KnownOperationalInsightsTableProvisioningState](xref:@azure/arm-operationalinsights.KnownOperationalInsightsTableProvisioningState)
  can be used interchangeably with OperationalInsightsTableProvisioningState,
   this enum contains the known values that the service supports.
  ### Known values supported by the service

  **Updating**: Table schema is still being built and updated, table is
  currently locked for any changes till the procedure is done. \

  **InProgress**: Table schema is stable and without changes, table data is
  being updated. \

  **Succeeded**: Table state is stable and without changes, table is unlocked
  and open for new updates. \

  **Deleting**: Table state is deleting.
fullName: OperationalInsightsTableProvisioningState
remarks: ''
isDeprecated: false
syntax: |
  type OperationalInsightsTableProvisioningState = string
