name: OrderItemCancellationEnum
uid: '@azure/arm-edgeorder.OrderItemCancellationEnum'
package: '@azure/arm-edgeorder'
summary: >-
  Describes whether the order item is cancellable or not. \

  [KnownOrderItemCancellationEnum](xref:@azure/arm-edgeorder.KnownOrderItemCancellationEnum)
  can be used interchangeably with OrderItemCancellationEnum,
   this enum contains the known values that the service supports.
  ### Known values supported by the service

  **Cancellable**: Order item can be cancelled without fee. \

  **CancellableWithFee**: Order item can be cancelled with fee. \

  **NotCancellable**: Order item not cancellable.
