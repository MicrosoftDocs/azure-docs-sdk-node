### YamlMime:TSType
name: Assessment
uid: '@azure/arm-billing-trust.Assessment'
package: '@azure/arm-billing-trust'
summary: >-
  A billing trust assessment. An assessment runs a set of rules to evaluate
  trust attributes of a billing account. The assessment is a singleton per
  parent resource and is always named 'default'. Re-issuing PUT with the same
  `assessmentType` is idempotent; changing `assessmentType` after the assessment
  exists is not supported.
fullName: Assessment
remarks: ''
isDeprecated: false
type: interface
