### YamlMime:TSTypeAlias
name: OperationStatus
uid: '@azure/planetarycomputer.OperationStatus'
package: '@azure/planetarycomputer'
summary: >-
  Operation status \

  [KnownOperationStatus](xref:@azure/planetarycomputer.KnownOperationStatus) can
  be used interchangeably with OperationStatus,
   this enum contains the known values that the service supports.
  ### Known values supported by the service

  **Pending**: Operation accepted and ready to be run \

  **Running**: Operation is running \

  **Succeeded**: Operation has already finished its execution \

  **Canceled**: Operation canceled by the user \

  **Canceling**: Operation is being canceling \

  **Failed**: Operation failed
fullName: OperationStatus
remarks: ''
isDeprecated: false
syntax: |
  type OperationStatus = string
