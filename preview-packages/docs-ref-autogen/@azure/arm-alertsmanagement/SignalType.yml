name: SignalType
uid: '@azure/arm-alertsmanagement.SignalType'
package: '@azure/arm-alertsmanagement'
summary: >-
  The type of signal the alert is based on, which could be metrics, logs or
  activity logs. \

  [KnownSignalType](xref:@azure/arm-alertsmanagement.KnownSignalType) can be
  used interchangeably with SignalType,
   this enum contains the known values that the service supports.
  ### Known values supported by the service

  **Metric**: Metric \

  **Log**: Log \

  **Unknown**: Unknown
