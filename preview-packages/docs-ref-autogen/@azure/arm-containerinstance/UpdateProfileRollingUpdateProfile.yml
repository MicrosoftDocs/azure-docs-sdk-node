    summary: >-
      Default is false. If set to true, the CGs will be updated in-place instead
      of creating new CG and deleting old ones.
    fullName: inPlaceUpdate
    remarks: ''
    isDeprecated: false
    syntax:
      content: 'inPlaceUpdate?: boolean'
      return:
        description: ''
