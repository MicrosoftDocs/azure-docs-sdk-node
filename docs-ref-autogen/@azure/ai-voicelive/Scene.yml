### YamlMime:TSType
name: Scene
uid: '@azure/ai-voicelive.Scene'
package: '@azure/ai-voicelive'
summary: >-
  Configuration for avatar's zoom level, position, rotation and movement
  amplitude in the video frame.
fullName: Scene
remarks: ''
isDeprecated: false
type: interface
properties:
  - name: amplitude
    uid: '@azure/ai-voicelive.Scene.amplitude'
    package: '@azure/ai-voicelive'
    summary: >-
      Amplitude of the avatar movement. Range is (0, 1]. Values in (0, 1) mean
      reduced amplitude, 1 means full amplitude.
    fullName: amplitude
    remarks: ''
    isDeprecated: false
    syntax:
      content: 'amplitude?: number'
      return:
        description: ''
        type: number
  - name: positionX
    uid: '@azure/ai-voicelive.Scene.positionX'
    package: '@azure/ai-voicelive'
    summary: >-
      Horizontal position of the avatar. Range is [-1, 1], as a proportion of
      frame width. Negative values move left, positive values move right.
    fullName: positionX
    remarks: ''
    isDeprecated: false
    syntax:
      content: 'positionX?: number'
      return:
        description: ''
        type: number
  - name: positionY
    uid: '@azure/ai-voicelive.Scene.positionY'
    package: '@azure/ai-voicelive'
    summary: >-
      Vertical position of the avatar. Range is [-1, 1], as a proportion of
      frame height. Negative values move up, positive values move down.
    fullName: positionY
    remarks: ''
    isDeprecated: false
    syntax:
      content: 'positionY?: number'
      return:
        description: ''
        type: number
  - name: rotationX
    uid: '@azure/ai-voicelive.Scene.rotationX'
    package: '@azure/ai-voicelive'
    summary: >-
      Rotation around the X-axis (pitch). Range is [-π, π] in radians. Negative
      values rotate up, positive values rotate down.
    fullName: rotationX
    remarks: ''
    isDeprecated: false
    syntax:
      content: 'rotationX?: number'
      return:
        description: ''
        type: number
  - name: rotationY
    uid: '@azure/ai-voicelive.Scene.rotationY'
    package: '@azure/ai-voicelive'
    summary: >-
      Rotation around the Y-axis (yaw). Range is [-π, π] in radians. Negative
      values rotate left, positive values rotate right.
    fullName: rotationY
    remarks: ''
    isDeprecated: false
    syntax:
      content: 'rotationY?: number'
      return:
        description: ''
        type: number
  - name: rotationZ
    uid: '@azure/ai-voicelive.Scene.rotationZ'
    package: '@azure/ai-voicelive'
    summary: >-
      Rotation around the Z-axis (roll). Range is [-π, π] in radians. Negative
      values rotate anticlockwise, positive values rotate clockwise.
    fullName: rotationZ
    remarks: ''
    isDeprecated: false
    syntax:
      content: 'rotationZ?: number'
      return:
        description: ''
        type: number
  - name: zoom
    uid: '@azure/ai-voicelive.Scene.zoom'
    package: '@azure/ai-voicelive'
    summary: >-
      Zoom level of the avatar. Range is (0, +∞). Values less than 1 zoom out,
      values greater than 1 zoom in.
    fullName: zoom
    remarks: ''
    isDeprecated: false
    syntax:
      content: 'zoom?: number'
      return:
        description: ''
        type: number
