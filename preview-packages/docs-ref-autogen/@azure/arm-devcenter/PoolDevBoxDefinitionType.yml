### YamlMime:TSTypeAlias
name: PoolDevBoxDefinitionType
uid: '@azure/arm-devcenter.PoolDevBoxDefinitionType'
package: '@azure/arm-devcenter'
summary: >-
  Indicates if the pool is created from an existing Dev Box Definition or if one
  is provided directly. \

  [KnownPoolDevBoxDefinitionType](xref:@azure/arm-devcenter.KnownPoolDevBoxDefinitionType)
  can be used interchangeably with PoolDevBoxDefinitionType,
   this enum contains the known values that the service supports.
  ### Known values supported by the service

  **Reference**: Indicates the pool is created from an existing Dev Box
  definition. \

  **Value**: Indicates the pool is created from a Dev Box definition that's
  created from an image reference and a SKU directly. This is used for creating
  an image definition pool or an image pool.
fullName: PoolDevBoxDefinitionType
remarks: ''
isDeprecated: false
syntax: |
  type PoolDevBoxDefinitionType = string
