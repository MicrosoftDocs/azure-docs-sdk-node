name: BlobScanResultsOptions
uid: '@azure/arm-security.BlobScanResultsOptions'
package: '@azure/arm-security'
summary: >-
  Optional. Write scan result on BlobIndexTags by default. \

  [KnownBlobScanResultsOptions](xref:@azure/arm-security.KnownBlobScanResultsOptions)
  can be used interchangeably with BlobScanResultsOptions,
   this enum contains the known values that the service supports.
  ### Known values supported by the service

  **BlobIndexTags**: Write scan results on the blobs index tags. \

  **None**: Do not write scan results on the blobs index tags.
