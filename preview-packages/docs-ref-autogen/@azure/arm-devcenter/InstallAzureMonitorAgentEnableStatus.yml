name: InstallAzureMonitorAgentEnableStatus
uid: '@azure/arm-devcenter.InstallAzureMonitorAgentEnableStatus'
package: '@azure/arm-devcenter'
summary: >-
  Setting to be used when determining whether to install the Azure Monitor Agent
  service on Dev Boxes that belong to this dev center. \

  [KnownInstallAzureMonitorAgentEnableStatus](xref:@azure/arm-devcenter.KnownInstallAzureMonitorAgentEnableStatus)
  can be used interchangeably with InstallAzureMonitorAgentEnableStatus,
   this enum contains the known values that the service supports.
  ### Known values supported by the service

  **Enabled**: Azure Monitor Agent service is enabled. \

  **Disabled**: Azure Monitor Agent service is disabled.
fullName: InstallAzureMonitorAgentEnableStatus
remarks: ''
isDeprecated: false
syntax: |
  type InstallAzureMonitorAgentEnableStatus = string
