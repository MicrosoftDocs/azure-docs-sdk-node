### YamlMime:TSType
name: OnUploadFilters
uid: '@azure/arm-security.OnUploadFilters'
package: '@azure/arm-security'
summary: >-
  Optional. Determine which blobs get scanned by On Upload malware scanning. An
  Or operation is performed between each filter type.
fullName: OnUploadFilters
remarks: ''
isDeprecated: false
type: interface
properties:
  - name: excludeBlobsLargerThan
    uid: '@azure/arm-security.OnUploadFilters.excludeBlobsLargerThan'
    package: '@azure/arm-security'
    summary: >-
      Optional. Specifies the maximum size in bytes for blobs to be scanned.
      This parameter accepts a single positive integer value. Blobs larger than
      this value will be excluded from scanning.
    fullName: excludeBlobsLargerThan
    remarks: ''
    isDeprecated: false
    syntax:
      content: 'excludeBlobsLargerThan?: any'
      return:
        description: ''
        type: any
  - name: excludeBlobsWithPrefix
    uid: '@azure/arm-security.OnUploadFilters.excludeBlobsWithPrefix'
    package: '@azure/arm-security'
    summary: >-
      Optional. A list of prefixes to exclude from on-upload malware scanning.

      Format: `container-name/blob-name` (start with the container name; do not
      include the storage account name).

      Exclude entire containers: Use prefix of container names you want to
      exclude without a trailing `/`.

      Exclude a single container: Add a trailing slash `/` after the container
      name to avoid excluding other containers with similar prefixes.
    fullName: excludeBlobsWithPrefix
    remarks: ''
    isDeprecated: false
    syntax:
      content: 'excludeBlobsWithPrefix?: string[]'
      return:
        description: ''
        type: string[]
  - name: excludeBlobsWithSuffix
    uid: '@azure/arm-security.OnUploadFilters.excludeBlobsWithSuffix'
    package: '@azure/arm-security'
    summary: >-
      Optional. A list of suffixes to exclude from on-upload malware scanning.
      Suffixes match only the end of blob names, and should be used for file
      extensions or blob name endings only.
    fullName: excludeBlobsWithSuffix
    remarks: ''
    isDeprecated: false
    syntax:
      content: 'excludeBlobsWithSuffix?: string[]'
      return:
        description: ''
        type: string[]
