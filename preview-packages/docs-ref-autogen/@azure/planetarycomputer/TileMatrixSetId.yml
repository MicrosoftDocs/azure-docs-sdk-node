### YamlMime:TSTypeAlias
name: TileMatrixSetId
uid: '@azure/planetarycomputer.TileMatrixSetId'
package: '@azure/planetarycomputer'
summary: >-
  Identifier selecting one of the TileMatrixSetId supported (default:

  'WebMercatorQuad')


  Standard identifier for a coordinate reference system and tiling scheme used
  for serving map tiles \

  [KnownTileMatrixSetId](xref:@azure/planetarycomputer.KnownTileMatrixSetId) can
  be used interchangeably with TileMatrixSetId,
   this enum contains the known values that the service supports.
  ### Known values supported by the service

  **CanadianNAD83_LCC**: Canadian NAD83 Lambert Conformal Conic projection tile
  matrix set \

  **EuropeanETRS89_LAEAQuad**: European ETRS89 Lambert Azimuthal Equal Area Quad
  tile matrix set \

  **LINZAntarticaMapTilegrid**: Land Information New Zealand (LINZ) Antarctica
  Map tile grid matrix set \

  **NZTM2000Quad**: New Zealand Transverse Mercator 2000 Quad tile matrix set \

  **UPSAntarcticWGS84Quad**: Universal Polar Stereographic Antarctic WGS84 Quad
  tile matrix set \

  **UPSArcticWGS84Quad**: Universal Polar Stereographic Arctic WGS84 Quad tile
  matrix set \

  **UTM31WGS84Quad**: Universal Transverse Mercator Zone 31 WGS84 Quad tile
  matrix set \

  **WGS1984Quad**: WGS 1984 Quad tile matrix set \

  **WebMercatorQuad**: Web Mercator Quad tile matrix set \

  **WorldCRS84Quad**: World CRS84 Quad tile matrix set \

  **WorldMercatorWGS84Quad**: World Mercator WGS84 Quad tile matrix set
fullName: TileMatrixSetId
remarks: ''
isDeprecated: false
syntax: |
  type TileMatrixSetId = string
