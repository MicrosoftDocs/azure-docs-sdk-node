name: ActionType
uid: '@azure/arm-frontdoor.ActionType'
package: '@azure/arm-frontdoor'
summary: >-
  Defines the action to take on rule match. \

  [KnownActionType](xref:@azure/arm-frontdoor.KnownActionType) can be used
  interchangeably with ActionType,
