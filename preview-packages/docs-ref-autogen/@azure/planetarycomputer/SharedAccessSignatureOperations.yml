name: SharedAccessSignatureOperations
uid: '@azure/planetarycomputer.SharedAccessSignatureOperations'
package: '@azure/planetarycomputer'
summary: Interface representing a SharedAccessSignature operations.
fullName: SharedAccessSignatureOperations
remarks: ''
