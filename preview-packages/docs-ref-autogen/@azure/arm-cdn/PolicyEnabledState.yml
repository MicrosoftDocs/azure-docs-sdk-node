name: PolicyEnabledState
uid: '@azure/arm-cdn.PolicyEnabledState'
package: '@azure/arm-cdn'
summary: >-
  Describes if the policy is in enabled or disabled state. Defaults to Enabled
  if not specified. \

  [KnownPolicyEnabledState](xref:@azure/arm-cdn.KnownPolicyEnabledState) can be
  used interchangeably with PolicyEnabledState,
   this enum contains the known values that the service supports.
  ### Known values supported by the service

