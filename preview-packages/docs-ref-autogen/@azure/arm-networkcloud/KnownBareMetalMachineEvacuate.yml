### YamlMime:TSEnum
name: KnownBareMetalMachineEvacuate
uid: '@azure/arm-networkcloud.KnownBareMetalMachineEvacuate'
package: '@azure/arm-networkcloud'
summary: >-
  The indicator of whether to evacuate the node workload when the bare metal
  machine is cordoned.
fullName: KnownBareMetalMachineEvacuate
remarks: ''
isDeprecated: false
fields:
  - name: 'False'
    uid: '@azure/arm-networkcloud.KnownBareMetalMachineEvacuate.False'
    package: '@azure/arm-networkcloud'
    summary: >-
      Do not evacuate workloads from the node when the bare metal machine is
      cordoned.
  - name: 'True'
    uid: '@azure/arm-networkcloud.KnownBareMetalMachineEvacuate.True'
    package: '@azure/arm-networkcloud'
    summary: Evacuate workloads from the node when the bare metal machine is cordoned.
