### YamlMime:TSTypeAlias
name: RaiEgressMode
uid: '@azure/arm-cognitiveservices.RaiEgressMode'
package: '@azure/arm-cognitiveservices'
summary: >-
  The enforcement mode for egress rules.

  If omitted on create, the server defaults to Enforced. \

  [KnownRaiEgressMode](xref:@azure/arm-cognitiveservices.KnownRaiEgressMode) can
  be used interchangeably with RaiEgressMode,
   this enum contains the known values that the service supports.
  ### Known values supported by the service

  **Enforced**: Rules are enforced. Matching traffic is allowed or denied per
  rule actions. \

  **Audit**: Rules are evaluated and logged but not enforced. Traffic is always
  forwarded regardless of

  rule action. A would-be Deny is logged but not applied. Transform and Rewrite
  actions are

  still applied to matching traffic (only Deny enforcement is suppressed).
fullName: RaiEgressMode
remarks: ''
isDeprecated: false
syntax: |
  type RaiEgressMode = string
