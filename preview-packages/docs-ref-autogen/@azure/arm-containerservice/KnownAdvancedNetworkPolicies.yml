### YamlMime:TSEnum
name: KnownAdvancedNetworkPolicies
uid: '@azure/arm-containerservice.KnownAdvancedNetworkPolicies'
package: '@azure/arm-containerservice'
summary: >-
  Enable advanced network policies. This allows users to configure Layer 7
  network policies (FQDN, HTTP, Kafka). Policies themselves must be configured
  via the Cilium Network Policy resources, see
  https://docs.cilium.io/en/latest/security/policy/index.html. This can be
  enabled only on cilium-based clusters. If not specified, the default value is
  FQDN if security.enabled is set to true.
fullName: KnownAdvancedNetworkPolicies
remarks: ''
isDeprecated: false
fields:
  - name: Fqdn
    uid: '@azure/arm-containerservice.KnownAdvancedNetworkPolicies.Fqdn'
    package: '@azure/arm-containerservice'
    summary: Enable FQDN based network policies
  - name: L7
    uid: '@azure/arm-containerservice.KnownAdvancedNetworkPolicies.L7'
    package: '@azure/arm-containerservice'
    summary: >-
      Enable Layer7 network policies (FQDN, HTTP/S, Kafka). This option is a
      superset of the FQDN option.
  - name: None
    uid: '@azure/arm-containerservice.KnownAdvancedNetworkPolicies.None'
    package: '@azure/arm-containerservice'
    summary: Disable Layer 7 network policies (FQDN, HTTP/S, Kafka)
