### YamlMime:TSTypeAlias
name: ValidationThresholdGrouping
uid: '@azure/arm-networkcloud.ValidationThresholdGrouping'
package: '@azure/arm-networkcloud'
summary: >-
  Selection of how the type evaluation is applied to the cluster calculation. \

  [KnownValidationThresholdGrouping](xref:@azure/arm-networkcloud.KnownValidationThresholdGrouping)
  can be used interchangeably with ValidationThresholdGrouping,
   this enum contains the known values that the service supports.
  ### Known values supported by the service

  **PerCluster**: The threshold is calculated for the whole cluster. \

  **PerRack**: The threshold is calculated for each rack in the cluster.
fullName: ValidationThresholdGrouping
remarks: ''
isDeprecated: false
syntax: |
  type ValidationThresholdGrouping = string
