### YamlMime:TSTypeAlias
name: SearchEncryptionComplianceStatus
uid: '@azure/arm-search.SearchEncryptionComplianceStatus'
package: '@azure/arm-search'
summary: >-
  Returns the status of search service compliance with respect to
  non-CMK-encrypted objects. If a service has more than one unencrypted object,
  and enforcement is enabled, the service is marked as noncompliant.
fullName: SearchEncryptionComplianceStatus
remarks: ''
isDeprecated: false
syntax: |
  type SearchEncryptionComplianceStatus = "Compliant" | "NonCompliant"
