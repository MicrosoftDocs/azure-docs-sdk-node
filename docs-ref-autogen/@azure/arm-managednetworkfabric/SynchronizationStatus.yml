### YamlMime:TSTypeAlias
name: SynchronizationStatus
uid: '@azure/arm-managednetworkfabric.SynchronizationStatus'
package: '@azure/arm-managednetworkfabric'
summary: >-
  Synchronization status of a secret or certificate for a device (Network Device
  or Terminal Server). Whether the device has been configured with the latest
  version of the secret or certificate. \

  [KnownSynchronizationStatus](xref:@azure/arm-managednetworkfabric.KnownSynchronizationStatus)
  can be used interchangeably with SynchronizationStatus,
   this enum contains the known values that the service supports.
  ### Known values supported by the service

  **InSync**: The device has been configured with the latest version of the
  secret. \

  **Synchronizing**: The device is being reconfigured with the latest version of
  the secret.


  While in this state, the secret archive reference may not match the secret
  configured on the device. \

  **OutOfSync**: The device has not been configured with the latest version of
  the secret.
fullName: SynchronizationStatus
remarks: ''
isDeprecated: false
syntax: |
  type SynchronizationStatus = string
