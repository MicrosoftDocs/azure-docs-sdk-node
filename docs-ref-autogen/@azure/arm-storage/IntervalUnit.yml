name: IntervalUnit
uid: '@azure/arm-storage.IntervalUnit'
package: '@azure/arm-storage'
summary: >-
  Run interval unit of task execution. This is a required field when
  ExecutionTrigger.properties.type is 'OnSchedule'; this property should not be
  present when ExecutionTrigger.properties.type is 'RunOnce' \

  [KnownIntervalUnit](xref:@azure/arm-storage.KnownIntervalUnit) can be used
  interchangeably with IntervalUnit,
   this enum contains the known values that the service supports.
  ### Known values supported by the service

  **Days**
fullName: IntervalUnit
remarks: ''
isDeprecated: false
syntax: |
  type IntervalUnit = string
