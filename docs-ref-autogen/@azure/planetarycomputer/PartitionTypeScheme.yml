name: PartitionTypeScheme
uid: '@azure/planetarycomputer.PartitionTypeScheme'
package: '@azure/planetarycomputer'
summary: >-
  Defines partitioning schemes for temporal data organization. \

  [KnownPartitionTypeScheme](xref:@azure/planetarycomputer.KnownPartitionTypeScheme)
  can be used interchangeably with PartitionTypeScheme,
   this enum contains the known values that the service supports.
  ### Known values supported by the service

  **year**: Partition data by year. \

  **month**: Partition data by month. \

  **none**: No partitioning.
