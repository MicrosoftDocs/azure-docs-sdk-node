### YamlMime:TSTypeAlias
name: AutoExportJobAdminStatus
uid: '@azure/arm-storagecache.AutoExportJobAdminStatus'
package: '@azure/arm-storagecache'
summary: >-
  The administrative status of the auto export job. Possible values: 'Enable',
  'Disable'. Passing in a value of 'Disable' will disable the current active
  auto export job. By default it is set to 'Enable'. \

  [KnownAutoExportJobAdminStatus](xref:@azure/arm-storagecache.KnownAutoExportJobAdminStatus)
  can be used interchangeably with AutoExportJobAdminStatus,
   this enum contains the known values that the service supports.
  ### Known values supported by the service

  **Enable**: Enable \

  **Disable**: Disable
fullName: AutoExportJobAdminStatus
remarks: ''
isDeprecated: false
syntax: |
  type AutoExportJobAdminStatus = string
