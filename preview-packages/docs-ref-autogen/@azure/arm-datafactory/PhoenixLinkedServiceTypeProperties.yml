### YamlMime:TSType
name: PhoenixLinkedServiceTypeProperties
uid: '@azure/arm-datafactory.PhoenixLinkedServiceTypeProperties'
package: '@azure/arm-datafactory'
summary: Phoenix server linked service properties.
fullName: PhoenixLinkedServiceTypeProperties
remarks: ''
isDeprecated: false
type: interface
properties:
  - name: allowHostNameCNMismatch
    uid: >-
      @azure/arm-datafactory.PhoenixLinkedServiceTypeProperties.allowHostNameCNMismatch
    package: '@azure/arm-datafactory'
    summary: >-
      Specifies whether to require a CA-issued SSL certificate name to match the
      host name of the server when connecting over SSL. The default value is
      false.
    fullName: allowHostNameCNMismatch
    remarks: ''
    isDeprecated: false
    syntax:
      content: 'allowHostNameCNMismatch?: any'
      return:
        description: ''
        type: any
  - name: allowSelfSignedServerCert
    uid: >-
      @azure/arm-datafactory.PhoenixLinkedServiceTypeProperties.allowSelfSignedServerCert
    package: '@azure/arm-datafactory'
    summary: >-
      Specifies whether to allow self-signed certificates from the server. The
      default value is false.
    fullName: allowSelfSignedServerCert
    remarks: ''
    isDeprecated: false
    syntax:
      content: 'allowSelfSignedServerCert?: any'
      return:
        description: ''
        type: any
  - name: authenticationType
    uid: >-
      @azure/arm-datafactory.PhoenixLinkedServiceTypeProperties.authenticationType
    package: '@azure/arm-datafactory'
    summary: The authentication mechanism used to connect to the Phoenix server.
    fullName: authenticationType
    remarks: ''
    isDeprecated: false
    syntax:
      content: 'authenticationType: string'
      return:
        description: ''
        type: string
  - name: enableSsl
    uid: '@azure/arm-datafactory.PhoenixLinkedServiceTypeProperties.enableSsl'
    package: '@azure/arm-datafactory'
    summary: >-
      Specifies whether the connections to the server are encrypted using SSL.
      The default value is false.
    fullName: enableSsl
    remarks: ''
    isDeprecated: false
    syntax:
      content: 'enableSsl?: any'
      return:
        description: ''
        type: any
  - name: encryptedCredential
    uid: >-
      @azure/arm-datafactory.PhoenixLinkedServiceTypeProperties.encryptedCredential
    package: '@azure/arm-datafactory'
    summary: >-
      The encrypted credential used for authentication. Credentials are
      encrypted using the integration runtime credential manager. Type: string.
    fullName: encryptedCredential
    remarks: ''
    isDeprecated: false
    syntax:
      content: 'encryptedCredential?: string'
      return:
        description: ''
        type: string
  - name: host
    uid: '@azure/arm-datafactory.PhoenixLinkedServiceTypeProperties.host'
    package: '@azure/arm-datafactory'
    summary: The IP address or host name of the Phoenix server. (i.e. 192.168.222.160)
    fullName: host
    remarks: ''
    isDeprecated: false
    syntax:
      content: 'host: any'
      return:
        description: ''
        type: any
  - name: httpPath
    uid: '@azure/arm-datafactory.PhoenixLinkedServiceTypeProperties.httpPath'
    package: '@azure/arm-datafactory'
    summary: >-
      The partial URL corresponding to the Phoenix server. (i.e.
      /gateway/sandbox/phoenix/version). The default value is hbasephoenix if
      using WindowsAzureHDInsightService.
    fullName: httpPath
    remarks: ''
    isDeprecated: false
    syntax:
      content: 'httpPath?: any'
      return:
        description: ''
        type: any
  - name: password
    uid: '@azure/arm-datafactory.PhoenixLinkedServiceTypeProperties.password'
    package: '@azure/arm-datafactory'
    summary: The password corresponding to the user name.
    fullName: password
    remarks: ''
    isDeprecated: false
    syntax:
      content: 'password?: SecretBaseUnion'
      return:
        description: ''
        type: <xref uid="@azure/arm-datafactory.SecretBaseUnion" />
  - name: port
    uid: '@azure/arm-datafactory.PhoenixLinkedServiceTypeProperties.port'
    package: '@azure/arm-datafactory'
    summary: >-
      The TCP port that the Phoenix server uses to listen for client
      connections. The default value is 8765.
    fullName: port
    remarks: ''
    isDeprecated: false
    syntax:
      content: 'port?: any'
      return:
        description: ''
        type: any
  - name: trustedCertPath
    uid: '@azure/arm-datafactory.PhoenixLinkedServiceTypeProperties.trustedCertPath'
    package: '@azure/arm-datafactory'
    summary: >-
      The full path of the .pem file containing trusted CA certificates for
      verifying the server when connecting over SSL. This property can only be
      set when using SSL on self-hosted IR. The default value is the cacerts.pem
      file installed with the IR.
    fullName: trustedCertPath
    remarks: ''
    isDeprecated: false
    syntax:
      content: 'trustedCertPath?: any'
      return:
        description: ''
        type: any
  - name: username
    uid: '@azure/arm-datafactory.PhoenixLinkedServiceTypeProperties.username'
    package: '@azure/arm-datafactory'
    summary: The user name used to connect to the Phoenix server.
    fullName: username
    remarks: ''
    isDeprecated: false
    syntax:
      content: 'username?: any'
      return:
        description: ''
        type: any
  - name: useSystemTrustStore
    uid: >-
      @azure/arm-datafactory.PhoenixLinkedServiceTypeProperties.useSystemTrustStore
    package: '@azure/arm-datafactory'
    summary: >-
      Specifies whether to use a CA certificate from the system trust store or
      from a specified PEM file. The default value is false.
    fullName: useSystemTrustStore
    remarks: ''
    isDeprecated: false
    syntax:
      content: 'useSystemTrustStore?: any'
      return:
        description: ''
        type: any
