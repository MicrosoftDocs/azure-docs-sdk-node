  - name: requireAuthorizationForGroupCreation
    uid: >-
      @azure/arm-managementgroups.HierarchySettingsProperties.requireAuthorizationForGroupCreation
    package: '@azure/arm-managementgroups'
    summary: >-
      Indicates whether RBAC access is required upon group creation under the
      root Management Group. If set to true, user will require
      Microsoft.Management/managementGroups/write action on the root Management
      Group scope in order to create new Groups directly under the root. This
      will prevent new users from creating new Management Groups, unless they
      are given access.
    fullName: requireAuthorizationForGroupCreation
    remarks: ''
    isDeprecated: false
    syntax:
      content: 'requireAuthorizationForGroupCreation?: boolean'
      return:
        description: ''
        type: boolean
