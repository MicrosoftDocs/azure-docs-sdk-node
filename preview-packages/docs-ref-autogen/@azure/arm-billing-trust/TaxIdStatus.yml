name: TaxIdStatus
uid: '@azure/arm-billing-trust.TaxIdStatus'
package: '@azure/arm-billing-trust'
summary: >-
  Status of a tax id record. \

  [KnownTaxIdStatus](xref:@azure/arm-billing-trust.KnownTaxIdStatus) can be used
  interchangeably with TaxIdStatus,
   this enum contains the known values that the service supports.
  ### Known values supported by the service

  **valid**: The tax id has been verified and is currently valid. \

  **invalid**: The tax id is no longer valid (e.g. expired or revoked). \

  **other**: Status could not be determined from the upstream registry.
fullName: TaxIdStatus
remarks: ''
isDeprecated: false
syntax: |
  type TaxIdStatus = string
