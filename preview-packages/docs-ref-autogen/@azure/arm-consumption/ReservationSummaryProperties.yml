  - name: reservationId
    uid: '@azure/arm-consumption.ReservationSummaryProperties.reservationId'
    package: '@azure/arm-consumption'
    summary: >-
      The reservation ID is the identifier of a reservation within a reservation
      order. Each reservation is the grouping for applying the benefit scope and
      also specifies the number of instances to which the reservation benefit
      can be applied to.
    fullName: reservationId
    remarks: ''
    isDeprecated: false
    syntax:
      content: 'reservationId?: string'
      return:
        description: ''
        type: string
  - name: reservationOrderId
    uid: '@azure/arm-consumption.ReservationSummaryProperties.reservationOrderId'
    package: '@azure/arm-consumption'
    summary: >-
      The reservation order ID is the identifier for a reservation purchase.
