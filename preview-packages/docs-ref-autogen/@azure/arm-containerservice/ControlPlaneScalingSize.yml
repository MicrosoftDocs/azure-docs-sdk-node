### YamlMime:TSTypeAlias
name: ControlPlaneScalingSize
uid: '@azure/arm-containerservice.ControlPlaneScalingSize'
package: '@azure/arm-containerservice'
summary: >-
  The scaling size of the control plane. Scaling sizes offer guaranteed capacity
  and predictable Kubernetes performance beyond standard tier defaults. Higher H
  sizes provide increased performance guarantees. See
  https://aka.ms/aks/hyperscale for performance metrics details for each size. \

  [KnownControlPlaneScalingSize](xref:@azure/arm-containerservice.KnownControlPlaneScalingSize)
  can be used interchangeably with ControlPlaneScalingSize,
   this enum contains the known values that the service supports.
  ### Known values supported by the service

  **H2**: H2 is the smallest scaling size with guaranteed capacity and
  predictable performance beyond standard tier defaults. \

  **H4**: H4 scaling size provides increased guaranteed performance over H2. \

  **H8**: H8 scaling size provides increased guaranteed performance over H4.
fullName: ControlPlaneScalingSize
remarks: ''
isDeprecated: false
syntax: |
  type ControlPlaneScalingSize = string
