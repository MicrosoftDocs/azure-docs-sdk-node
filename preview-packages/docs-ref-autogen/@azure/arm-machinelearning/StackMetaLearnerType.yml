### YamlMime:TSTypeAlias
name: StackMetaLearnerType
uid: '@azure/arm-machinelearning.StackMetaLearnerType'
package: '@azure/arm-machinelearning'
summary: >-
  The meta-learner is a model trained on the output of the individual
  heterogeneous models.

  Default meta-learners are LogisticRegression for classification tasks (or
  LogisticRegressionCV if cross-validation is enabled) and ElasticNet for
  regression/forecasting tasks (or ElasticNetCV if cross-validation is enabled).

  This parameter can be one of the following strings: LogisticRegression,
  LogisticRegressionCV, LightGBMClassifier, ElasticNet, ElasticNetCV,
  LightGBMRegressor, or LinearRegression \

  [KnownStackMetaLearnerType](xref:@azure/arm-machinelearning.KnownStackMetaLearnerType)
  can be used interchangeably with StackMetaLearnerType,
   this enum contains the known values that the service supports.
  ### Known values supported by the service

  **None** \

  **LogisticRegression**: Default meta-learners are LogisticRegression for
  classification tasks. \

  **LogisticRegressionCV**: Default meta-learners are LogisticRegression for
  classification task when CV is on. \

  **LightGBMClassifier** \

  **ElasticNet**: Default meta-learners are LogisticRegression for regression
  task. \

  **ElasticNetCV**: Default meta-learners are LogisticRegression for regression
  task when CV is on. \

  **LightGBMRegressor** \

  **LinearRegression**
fullName: StackMetaLearnerType
remarks: ''
isDeprecated: false
syntax: |
  type StackMetaLearnerType = string
