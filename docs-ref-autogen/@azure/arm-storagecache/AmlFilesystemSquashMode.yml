### YamlMime:TSTypeAlias
name: AmlFilesystemSquashMode
uid: '@azure/arm-storagecache.AmlFilesystemSquashMode'
package: '@azure/arm-storagecache'
summary: >-
  Squash mode of the AML file system. 'All': User and Group IDs on files will be
  squashed to the provided values for all users on non-trusted systems.
  'RootOnly': User and Group IDs on files will be squashed to provided values
  for solely the root user on non-trusted systems. 'None': No squashing of User
  and Group IDs is performed for any users on any systems. \

  [KnownAmlFilesystemSquashMode](xref:@azure/arm-storagecache.KnownAmlFilesystemSquashMode)
  can be used interchangeably with AmlFilesystemSquashMode,
   this enum contains the known values that the service supports.
  ### Known values supported by the service

  **None**: None \

  **RootOnly**: RootOnly \

  **All**: All
fullName: AmlFilesystemSquashMode
remarks: ''
isDeprecated: false
syntax: |
  type AmlFilesystemSquashMode = string
