### YamlMime:TSTypeAlias
name: ResourceIdentityType
uid: '@azure/arm-network.ResourceIdentityType'
package: '@azure/arm-network'
summary: >-
  The type of identity used for the resource. The type 'SystemAssigned,
  UserAssigned' includes both an implicitly created identity and a set of user
  assigned identities. The type 'None' will remove any identities from the
  virtual machine.
fullName: ResourceIdentityType
remarks: ''
isDeprecated: false
syntax: |
  type ResourceIdentityType =
    | "SystemAssigned"
    | "UserAssigned"
    | "SystemAssigned, UserAssigned"
    | "None"
