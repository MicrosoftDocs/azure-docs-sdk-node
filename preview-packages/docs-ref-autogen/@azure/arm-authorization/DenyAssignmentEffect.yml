name: DenyAssignmentEffect
uid: '@azure/arm-authorization.DenyAssignmentEffect'
package: '@azure/arm-authorization'
summary: >-
  The effect of the deny assignment. 'enforced' blocks access, 'audit' logs
  without blocking. \

  [KnownDenyAssignmentEffect](xref:@azure/arm-authorization.KnownDenyAssignmentEffect)
  can be used interchangeably with DenyAssignmentEffect,
   this enum contains the known values that the service supports.
  ### Known values supported by the service

  **enforced**: enforced \

  **audit**: audit
