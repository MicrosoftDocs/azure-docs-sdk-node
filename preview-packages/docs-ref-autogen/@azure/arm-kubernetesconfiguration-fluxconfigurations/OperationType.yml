package: '@azure/arm-kubernetesconfiguration-fluxconfigurations'
summary: >-
  The operation to be performed on the selected layer. The default value is
  'extract', but it can be set to 'copy'. \

  [KnownOperationType](xref:@azure/arm-kubernetesconfiguration-fluxconfigurations.KnownOperationType)
