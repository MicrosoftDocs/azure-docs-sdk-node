name: SamplingType
uid: '@azure/arm-monitorslis.SamplingType'
package: '@azure/arm-monitorslis'
summary: >-
  Defines the available sampling types. \

  [KnownSamplingType](xref:@azure/arm-monitorslis.KnownSamplingType) can be used
  interchangeably with SamplingType,
   this enum contains the known values that the service supports.
  ### Known values supported by the service

  **Average**: Average value. \

  **Sum**: Summation. \

  **Count**: Count of occurrences. \

  **Min**: Minimum value. \

  **Max**: Maximum value.
fullName: SamplingType
remarks: ''
isDeprecated: false
syntax: |
  type SamplingType = string
