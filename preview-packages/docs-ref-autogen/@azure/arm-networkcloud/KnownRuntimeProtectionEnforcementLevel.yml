### YamlMime:TSEnum
name: KnownRuntimeProtectionEnforcementLevel
uid: '@azure/arm-networkcloud.KnownRuntimeProtectionEnforcementLevel'
package: '@azure/arm-networkcloud'
summary: The mode of operation for runtime protection.
fullName: KnownRuntimeProtectionEnforcementLevel
remarks: ''
isDeprecated: false
fields:
  - name: Audit
    uid: '@azure/arm-networkcloud.KnownRuntimeProtectionEnforcementLevel.Audit'
    package: '@azure/arm-networkcloud'
    summary: Real-time scans detect but do not remediate detected issues.
  - name: Disabled
    uid: '@azure/arm-networkcloud.KnownRuntimeProtectionEnforcementLevel.Disabled'
    package: '@azure/arm-networkcloud'
    summary: Real-time scans are disabled and can not be triggered.
  - name: OnDemand
    uid: '@azure/arm-networkcloud.KnownRuntimeProtectionEnforcementLevel.OnDemand'
    package: '@azure/arm-networkcloud'
    summary: >-
      Real-time scans are disabled but can be triggered to remediate detected
      issues.
  - name: Passive
    uid: '@azure/arm-networkcloud.KnownRuntimeProtectionEnforcementLevel.Passive'
    package: '@azure/arm-networkcloud'
    summary: >-
      Real-time scans are disabled but can be triggered to detect issues without
      remediation.
  - name: RealTime
    uid: '@azure/arm-networkcloud.KnownRuntimeProtectionEnforcementLevel.RealTime'
    package: '@azure/arm-networkcloud'
    summary: Real-time scans detect and remediate detected issues.
