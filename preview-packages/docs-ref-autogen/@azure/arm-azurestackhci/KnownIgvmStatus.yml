### YamlMime:TSEnum
name: KnownIgvmStatus
uid: '@azure/arm-azurestackhci.KnownIgvmStatus'
package: '@azure/arm-azurestackhci'
summary: Represents the IGVM support status for the device.
fullName: KnownIgvmStatus
remarks: ''
isDeprecated: false
fields:
  - name: Disabled
    uid: '@azure/arm-azurestackhci.KnownIgvmStatus.Disabled'
    package: '@azure/arm-azurestackhci'
    summary: >-
      IGVM status is disabled, indicating that confidential VM features are not
      supported on this device.
  - name: Enabled
    uid: '@azure/arm-azurestackhci.KnownIgvmStatus.Enabled'
    package: '@azure/arm-azurestackhci'
    summary: >-
      IGVM support is enabled, indicating that confidential VM features are
      available on this device.
  - name: Unknown
    uid: '@azure/arm-azurestackhci.KnownIgvmStatus.Unknown'
    package: '@azure/arm-azurestackhci'
    summary: >-
      The IGVM status could not be determined due to a query failure or
      inconsistent system state.
