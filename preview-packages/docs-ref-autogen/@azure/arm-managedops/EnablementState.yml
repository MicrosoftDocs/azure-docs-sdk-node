name: EnablementState
uid: '@azure/arm-managedops.EnablementState'
package: '@azure/arm-managedops'
summary: >-
  The enablement state of a service. \

  [KnownEnablementState](xref:@azure/arm-managedops.KnownEnablementState) can be
  used interchangeably with EnablementState,
   this enum contains the known values that the service supports.
  ### Known values supported by the service

  **Enabled**: Service is enabled. \

  **InProgress**: Service enablement is in progress. \

  **Failed**: Service enablement has failed. \

  **Disabled**: Service is disabled.
