### YamlMime:TSTypeAlias
name: ReadReplicaPromoteMode
uid: '@azure/arm-postgresql-flexible.ReadReplicaPromoteMode'
package: '@azure/arm-postgresql-flexible'
summary: >-
  Type of operation to apply on the read replica. This property is write only.
  Standalone means that the read replica will be promoted to a standalone
  server, and will become a completely independent entity from the replication
  set. Switchover means that the read replica will roles with the primary
  server. \

  [KnownReadReplicaPromoteMode](xref:@azure/arm-postgresql-flexible.KnownReadReplicaPromoteMode)
  can be used interchangeably with ReadReplicaPromoteMode,
   this enum contains the known values that the service supports.
  ### Known values supported by the service

  **Standalone**: Read replica will become an independent server. \

  **Switchover**: Read replica will swap roles with primary server.
fullName: ReadReplicaPromoteMode
remarks: ''
isDeprecated: false
syntax: |
  type ReadReplicaPromoteMode = string
