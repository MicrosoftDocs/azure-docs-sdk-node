### YamlMime:TSTypeAlias
name: SecurityEncryptionTypes
uid: '@azure/arm-batch.SecurityEncryptionTypes'
package: '@azure/arm-batch'
summary: >-
  Specifies the EncryptionType of the managed disk. It is set to
  DiskWithVMGuestState for encryption of the managed disk along with
  VMGuestState blob, VMGuestStateOnly for encryption of just the VMGuestState
  blob, and NonPersistedTPM for not persisting firmware state in the
  VMGuestState blob. **Note**: It can be set for only Confidential VMs and
  required when using Confidential VMs. \

  [KnownSecurityEncryptionTypes](xref:@azure/arm-batch.KnownSecurityEncryptionTypes)
  can be used interchangeably with SecurityEncryptionTypes,
   this enum contains the known values that the service supports.
  ### Known values supported by the service

  **NonPersistedTPM**: EncryptionType of the managed disk is set to
  NonPersistedTPM for not persisting firmware state in the VMGuestState blob. \

  **VMGuestStateOnly**: EncryptionType of the managed disk is set to
  VMGuestStateOnly for encryption of just the VMGuestState blob. \

  **DiskWithVMGuestState**: EncryptionType of the managed disk is set to
  DiskWithVMGuestState for encryption of the managed disk along with
  VMGuestState blob. It is not supported in data disks.
fullName: SecurityEncryptionTypes
remarks: ''
isDeprecated: false
syntax: |
  type SecurityEncryptionTypes = string
