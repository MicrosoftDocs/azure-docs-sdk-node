### YamlMime:TSEnum
name: KnownSynchronizationStatus
uid: '@azure/arm-managednetworkfabric.KnownSynchronizationStatus'
package: '@azure/arm-managednetworkfabric'
summary: >-
  Synchronization status of a secret or certificate for a device (Network Device
  or Terminal Server). Whether the device has been configured with the latest
  version of the secret or certificate.
fullName: KnownSynchronizationStatus
remarks: ''
isDeprecated: false
fields:
  - name: InSync
    uid: '@azure/arm-managednetworkfabric.KnownSynchronizationStatus.InSync'
    package: '@azure/arm-managednetworkfabric'
    summary: The device has been configured with the latest version of the secret.
  - name: OutOfSync
    uid: '@azure/arm-managednetworkfabric.KnownSynchronizationStatus.OutOfSync'
    package: '@azure/arm-managednetworkfabric'
    summary: The device has not been configured with the latest version of the secret.
  - name: Synchronizing
    uid: '@azure/arm-managednetworkfabric.KnownSynchronizationStatus.Synchronizing'
    package: '@azure/arm-managednetworkfabric'
    summary: >-
      The device is being reconfigured with the latest version of the secret.


      While in this state, the secret archive reference may not match the secret
      configured on the device.
