name: ContainerType
uid: '@azure/arm-appcontainers.ContainerType'
package: '@azure/arm-appcontainers'
summary: >-
  The container type of the sessions. You can use your own container to build
  the session pool, or you can use a predefined container to run workload with
  specific language. \

  [KnownContainerType](xref:@azure/arm-appcontainers.KnownContainerType) can be
  used interchangeably with ContainerType,
   this enum contains the known values that the service supports.
  ### Known values supported by the service

  **CustomContainer**: CustomContainer \

  **PythonLTS**: PythonLTS \

  **Shell**: Shell \

  **NodeLTS**: NodeLTS
fullName: ContainerType
remarks: ''
isDeprecated: false
syntax: |
  type ContainerType = string
