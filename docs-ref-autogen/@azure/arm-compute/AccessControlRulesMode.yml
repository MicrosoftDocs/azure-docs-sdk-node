### YamlMime:TSTypeAlias
name: AccessControlRulesMode
uid: '@azure/arm-compute.AccessControlRulesMode'
package: '@azure/arm-compute'
summary: >-
  This property allows you to specify whether the access control rules are in
  Audit mode, in Enforce mode or Disabled. Possible values are: 'Audit',
  'Enforce' or 'Disabled'. \

  [KnownAccessControlRulesMode](xref:@azure/arm-compute.KnownAccessControlRulesMode)
  can be used interchangeably with AccessControlRulesMode,
   this enum contains the known values that the service supports.
  ### Known values supported by the service

  **Audit** \

  **Enforce** \

  **Disabled**
fullName: AccessControlRulesMode
remarks: ''
isDeprecated: false
syntax: |
  type AccessControlRulesMode = string
