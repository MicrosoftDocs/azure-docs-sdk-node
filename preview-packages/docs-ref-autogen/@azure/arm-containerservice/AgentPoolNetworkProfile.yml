### YamlMime:TSType
name: AgentPoolNetworkProfile
uid: '@azure/arm-containerservice.AgentPoolNetworkProfile'
package: '@azure/arm-containerservice'
summary: Network settings of an agent pool.
fullName: AgentPoolNetworkProfile
remarks: ''
isDeprecated: false
type: interface
properties:
  - name: allowedHostPorts
    uid: '@azure/arm-containerservice.AgentPoolNetworkProfile.allowedHostPorts'
    package: '@azure/arm-containerservice'
    summary: >-
      The port ranges that are allowed to access. The specified ranges are
      allowed to overlap.
    fullName: allowedHostPorts
    remarks: ''
    isDeprecated: false
    syntax:
      content: 'allowedHostPorts?: PortRange[]'
      return:
        description: ''
        type: <xref uid="@azure/arm-containerservice.PortRange" />[]
  - name: applicationSecurityGroups
    uid: >-
      @azure/arm-containerservice.AgentPoolNetworkProfile.applicationSecurityGroups
    package: '@azure/arm-containerservice'
    summary: >-
      The IDs of the application security groups which agent pool will associate
      when created.
    fullName: applicationSecurityGroups
    remarks: ''
    isDeprecated: false
    syntax:
      content: 'applicationSecurityGroups?: string[]'
      return:
        description: ''
        type: string[]
  - name: nodePublicIPPrefixIDs
    uid: '@azure/arm-containerservice.AgentPoolNetworkProfile.nodePublicIPPrefixIDs'
    package: '@azure/arm-containerservice'
    summary: >-
      The resource IDs of public IP prefixes for node public IPs. At most one
      IPv4 and one IPv6 prefix may be specified. Order does not matter; the RP
      determines IP version from the referenced resource's
      publicIPAddressVersion. Requires enableNodePublicIP to be true on the
      agent pool. Mutually exclusive with the top-level nodePublicIPPrefixID
      property. Immutable after node pool creation. To change prefixes, delete
      and recreate the node pool. For more information, see
      https://aka.ms/aks/ipv6-ilpip
    fullName: nodePublicIPPrefixIDs
    remarks: ''
    isDeprecated: false
    syntax:
      content: 'nodePublicIPPrefixIDs?: string[]'
      return:
        description: ''
        type: string[]
  - name: nodePublicIPTags
    uid: '@azure/arm-containerservice.AgentPoolNetworkProfile.nodePublicIPTags'
    package: '@azure/arm-containerservice'
    summary: IPTags of instance-level public IPs.
    fullName: nodePublicIPTags
    remarks: ''
    isDeprecated: false
    syntax:
      content: 'nodePublicIPTags?: IPTag[]'
      return:
        description: ''
        type: <xref uid="@azure/arm-containerservice.IPTag" />[]
  - name: secondaryNetworkInterfaces
    uid: >-
      @azure/arm-containerservice.AgentPoolNetworkProfile.secondaryNetworkInterfaces
    package: '@azure/arm-containerservice'
    summary: >-
      Secondary network interface configurations for each VM in the agent pool.
      Each entry is a template: one physical NIC per entry is provisioned on
      every VM instance. These interfaces are created at agent pool creation
      time and are immutable. The length of the list must be less than the NIC
      capacity minus 1 for the VM size of the agent pool (AKS manages the
      primary NIC). For example, a Standard_D8a_v4 VM supports up to 4 NICs, so
      the maximum number of secondary interfaces allowed is 3. For mixed-SKU VM
      pools the effective capacity is the minimum across all SKUs:
      count(secondaryNetworkInterfaces) + 1 <= min(maxNICs). For more
      information, see https://aka.ms/aks/multi-nic
    fullName: secondaryNetworkInterfaces
    remarks: ''
    isDeprecated: false
    syntax:
      content: 'secondaryNetworkInterfaces?: AgentPoolNetworkInterface[]'
      return:
        description: ''
        type: <xref uid="@azure/arm-containerservice.AgentPoolNetworkInterface" />[]
