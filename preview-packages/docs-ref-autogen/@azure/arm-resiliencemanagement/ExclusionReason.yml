### YamlMime:TSTypeAlias
name: ExclusionReason
uid: '@azure/arm-resiliencemanagement.ExclusionReason'
package: '@azure/arm-resiliencemanagement'
summary: >-
  Enum for the reason why a resource is excluded. \

  [KnownExclusionReason](xref:@azure/arm-resiliencemanagement.KnownExclusionReason)
  can be used interchangeably with ExclusionReason,
   this enum contains the known values that the service supports.
  ### Known values supported by the service

  **UserSelectedExclusion**: The resource was excluded by user selection. \

  **FailedOverResource**: The resource failed over and is excluded. \

  **UnsupportedResource**: The resource is unsupported and excluded.
fullName: ExclusionReason
remarks: ''
isDeprecated: false
syntax: |
  type ExclusionReason = string
