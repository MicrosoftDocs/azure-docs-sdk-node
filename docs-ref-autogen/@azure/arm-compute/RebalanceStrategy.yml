### YamlMime:TSTypeAlias
name: RebalanceStrategy
uid: '@azure/arm-compute.RebalanceStrategy'
package: '@azure/arm-compute'
summary: >-
  Type of rebalance strategy that will be used for rebalancing virtual machines
  in the scale set across availability zones. Default and only supported value
  for now is Recreate. \

  [KnownRebalanceStrategy](xref:@azure/arm-compute.KnownRebalanceStrategy) can
  be used interchangeably with RebalanceStrategy,
   this enum contains the known values that the service supports.
  ### Known values supported by the service

  **Recreate**
fullName: RebalanceStrategy
remarks: ''
isDeprecated: false
syntax: |
  type RebalanceStrategy = string
