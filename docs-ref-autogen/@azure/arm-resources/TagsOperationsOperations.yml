  - name: createOrUpdate
    uid: '@azure/arm-resources.TagsOperationsOperations.createOrUpdate'
    package: '@azure/arm-resources'
    summary: >-
      This operation allows adding a name to the list of predefined tag names
      for the given subscription. A tag name can have a maximum of 512
      characters and is case-insensitive. Tag names cannot have the following
      prefixes which are reserved for Azure use: 'microsoft', 'azure',
      'windows'.
    fullName: createOrUpdate
    remarks: ''
    isDeprecated: false
    syntax:
      content: >-
        createOrUpdate: (tagName: string, options?:
        TagsOperationsCreateOrUpdateOptionalParams) => Promise<TagDetails>
      return:
        description: ''
        type: >-
          (tagName: string, options?:
          TagsOperationsCreateOrUpdateOptionalParams) =&gt;
          Promise&lt;TagDetails&gt;
  - name: createOrUpdateAtScope
    uid: '@azure/arm-resources.TagsOperationsOperations.createOrUpdateAtScope'
    package: '@azure/arm-resources'
    summary: >-
      This operation allows adding or replacing the entire set of tags on the
      specified resource or subscription. The specified entity can have a
      maximum of 50 tags.
    fullName: createOrUpdateAtScope
    remarks: ''
    isDeprecated: false
    syntax:
      content: >-
