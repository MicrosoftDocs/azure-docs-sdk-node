### YamlMime:TSTypeAlias
name: ReasonCode
uid: '@azure/arm-storagecache.ReasonCode'
package: '@azure/arm-storagecache'
summary: >-
  The reason for the restriction. As of now this can be "QuotaId" or
  "NotAvailableForSubscription". "QuotaId" is set when the SKU has
  requiredQuotas parameter as the subscription does not belong to that quota.
  "NotAvailableForSubscription" is related to capacity at the datacenter. \

  [KnownReasonCode](xref:@azure/arm-storagecache.KnownReasonCode) can be used
  interchangeably with ReasonCode,
   this enum contains the known values that the service supports.
  ### Known values supported by the service

  **QuotaId**: QuotaId \

  **NotAvailableForSubscription**: NotAvailableForSubscription
fullName: ReasonCode
remarks: ''
isDeprecated: false
syntax: |
  type ReasonCode = string
