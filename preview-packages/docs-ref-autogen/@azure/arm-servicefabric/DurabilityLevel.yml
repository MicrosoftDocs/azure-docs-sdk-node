### YamlMime:TSTypeAlias
name: DurabilityLevel
uid: '@azure/arm-servicefabric.DurabilityLevel'
package: '@azure/arm-servicefabric'
summary: >-
  The durability level of the node type. Learn about
  [DurabilityLevel](https://docs.microsoft.com/azure/service-fabric/service-fabric-cluster-capacity).
  \

  [KnownDurabilityLevel](xref:@azure/arm-servicefabric.KnownDurabilityLevel) can
  be used interchangeably with DurabilityLevel,
   this enum contains the known values that the service supports.
  ### Known values supported by the service

  **Bronze**: No privileges. This is the default. \

  **Silver**: The infrastructure jobs can be paused for a duration of 10 minutes
  per UD. \

  **Gold**: The infrastructure jobs can be paused for a duration of 2 hours per
  UD. Gold durability can be enabled only on full node VM skus like D15_V2, G5
  etc.
fullName: DurabilityLevel
remarks: ''
isDeprecated: false
syntax: |
  type DurabilityLevel = string
