type: interface
properties:
  - name: getToken
    uid: '@azure/planetarycomputer.SharedAccessSignatureOperations.getToken'
    package: '@azure/planetarycomputer'
    summary: >-
      Generate a [SAS
      Token](https://docs.microsoft.com//azure/storage/common/storage-sas-overview#how-a-shared-access-signature-works)

      for the given storage account and container. The storage account and
      container

      must be associated with a Planetary Computer dataset indexed by the STAC
      API.
    fullName: getToken
    remarks: ''
    isDeprecated: false
    syntax:
      content: >-
        getToken: (collectionId: string, options?:
        SharedAccessSignatureGetTokenOptionalParams) =>
        Promise<SharedAccessSignatureToken>
      return:
        description: ''
        type: >-
          (collectionId: string, options?:
          SharedAccessSignatureGetTokenOptionalParams) =&gt;
          Promise&lt;SharedAccessSignatureToken&gt;
  - name: getUrl
    uid: '@azure/planetarycomputer.SharedAccessSignatureOperations.getUrl'
    package: '@azure/planetarycomputer'
    summary: >-
      Signs a HREF (a link URL) by appending a [SAS
      Token](https://docs.microsoft.com//azure/storage/common/storage-sas-overview#how-a-shared-access-signature-works).

      If the HREF is not a Azure Blob Storage HREF, then pass back the HREF
      unsigned.
    fullName: getUrl
    remarks: ''
    isDeprecated: false
    syntax:
      content: >-
        getUrl: (href: string, options?:
        SharedAccessSignatureGetUrlOptionalParams) =>
        Promise<SharedAccessSignatureSignedLink>
      return:
        description: ''
        type: >-
          (href: string, options?: SharedAccessSignatureGetUrlOptionalParams)
          =&gt; Promise&lt;SharedAccessSignatureSignedLink&gt;
  - name: revokeToken
    uid: '@azure/planetarycomputer.SharedAccessSignatureOperations.revokeToken'
    package: '@azure/planetarycomputer'
    summary: >-
      Revoke a [SAS
      Token](https://docs.microsoft.com//azure/storage/common/storage-sas-overview#how-a-shared-access-signature-works)

      for managed storage account of this GeoCatalog.
    fullName: revokeToken
    remarks: ''
    isDeprecated: false
    syntax:
      content: >-
        revokeToken: (options?: SharedAccessSignatureRevokeTokenOptionalParams)
        => Promise<void>
      return:
        description: ''
        type: >-
          (options?: SharedAccessSignatureRevokeTokenOptionalParams) =&gt;
          Promise&lt;void&gt;
