### YamlMime:TSEnum
name: KnownControlPlaneScalingSize
uid: '@azure/arm-containerservice.KnownControlPlaneScalingSize'
package: '@azure/arm-containerservice'
summary: >-
  The scaling size of the control plane. Scaling sizes offer guaranteed capacity
  and predictable Kubernetes performance beyond standard tier defaults. Higher H
  sizes provide increased performance guarantees. See
  https://aka.ms/aks/hyperscale for performance metrics details for each size.
fullName: KnownControlPlaneScalingSize
remarks: ''
isDeprecated: false
fields:
  - name: H2
    uid: '@azure/arm-containerservice.KnownControlPlaneScalingSize.H2'
    package: '@azure/arm-containerservice'
    summary: >-
      H2 is the smallest scaling size with guaranteed capacity and predictable
      performance beyond standard tier defaults.
  - name: H4
    uid: '@azure/arm-containerservice.KnownControlPlaneScalingSize.H4'
    package: '@azure/arm-containerservice'
    summary: H4 scaling size provides increased guaranteed performance over H2.
  - name: H8
    uid: '@azure/arm-containerservice.KnownControlPlaneScalingSize.H8'
    package: '@azure/arm-containerservice'
    summary: H8 scaling size provides increased guaranteed performance over H4.
