    summary: >-
      This is the minimum hourly utilization in the usage time (day or month).
      E.g. if usage record corresponds to 12/10/2017 and on that for hour 4 and
      5, utilization was 10%, this field will return 10% for that day
    fullName: minUtilizationPercentage
    remarks: ''
    isDeprecated: false
    syntax:
