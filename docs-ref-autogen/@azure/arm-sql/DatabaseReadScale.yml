### YamlMime:TSTypeAlias
name: DatabaseReadScale
uid: '@azure/arm-sql.DatabaseReadScale'
package: '@azure/arm-sql'
summary: >-
  The state of read-only routing. If enabled, connections that have application
  intent set to readonly in their connection string may be routed to a readonly
  secondary replica in the same region. Not applicable to a Hyperscale database
  within an elastic pool. \

  [KnownDatabaseReadScale](xref:@azure/arm-sql.KnownDatabaseReadScale) can be
  used interchangeably with DatabaseReadScale,
   this enum contains the known values that the service supports.
  ### Known values supported by the service

  **Enabled**: Enabled \

  **Disabled**: Disabled
fullName: DatabaseReadScale
remarks: ''
isDeprecated: false
syntax: |
  type DatabaseReadScale = string
