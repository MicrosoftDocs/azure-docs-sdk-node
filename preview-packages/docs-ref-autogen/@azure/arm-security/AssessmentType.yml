### YamlMime:TSTypeAlias
name: AssessmentType
uid: '@azure/arm-security.AssessmentType'
package: '@azure/arm-security'
summary: >-
  BuiltIn if the assessment based on built-in Azure Policy definition, Custom if
  the assessment based on custom Azure Policy definition \

  [KnownAssessmentType](xref:@azure/arm-security.KnownAssessmentType) can be
  used interchangeably with AssessmentType,
   this enum contains the known values that the service supports.
  ### Known values supported by the service

  **Unknown**: Unknown assessment type \

  **BuiltIn**: Microsoft Defender for Cloud managed assessments \

  **Custom**: User defined custom assessments \

  **CustomPolicy**: User defined policies that are automatically ingested from
  Azure Policy to Microsoft Defender for Cloud \

  **CustomerManaged**: User assessments pushed directly by the user or other
  third party to Microsoft Defender for Cloud \

  **BuiltInPolicy**: Microsoft Defender for Cloud managed policies \

  **VerifiedPartner**: Third party assessments that are verified by Microsoft
  Defender for Cloud \

  **ManualBuiltInPolicy**: Microsoft Defender for Cloud managed policies that
  are manually created by the user \

  **ManualBuiltIn**: Microsoft Defender for Cloud managed assessments that are
  manually created by the user \

  **ManualCustomPolicy**: User defined policies that are manually created by the
  user \

  **DynamicBuiltIn**: Microsoft Defender for Cloud managed assessments that are
  dynamically created by the system
fullName: AssessmentType
remarks: ''
isDeprecated: false
syntax: |
  type AssessmentType = string
