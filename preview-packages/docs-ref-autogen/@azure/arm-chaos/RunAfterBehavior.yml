### YamlMime:TSTypeAlias
name: RunAfterBehavior
uid: '@azure/arm-chaos.RunAfterBehavior'
package: '@azure/arm-chaos'
summary: >-
  Enum for run after behavior. \

  [KnownRunAfterBehavior](xref:@azure/arm-chaos.KnownRunAfterBehavior) can be
  used interchangeably with RunAfterBehavior,
   this enum contains the known values that the service supports.
  ### Known values supported by the service

  **Any**: Always continues after all dependencies (like a finally block). \

  **All**: All dependencies must be satisfied to continue. \

  **AtLeastOne**: At least one dependency must be satisfied to continue.
fullName: RunAfterBehavior
remarks: ''
isDeprecated: false
syntax: |
  type RunAfterBehavior = string
