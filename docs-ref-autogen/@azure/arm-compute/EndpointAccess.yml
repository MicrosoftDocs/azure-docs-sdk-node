### YamlMime:TSTypeAlias
name: EndpointAccess
uid: '@azure/arm-compute.EndpointAccess'
package: '@azure/arm-compute'
summary: >-
  This property allows you to specify if the requests will be allowed to access
  the host endpoints. Possible values are: 'Allow', 'Deny'. \

  [KnownEndpointAccess](xref:@azure/arm-compute.KnownEndpointAccess) can be used
  interchangeably with EndpointAccess,
   this enum contains the known values that the service supports.
  ### Known values supported by the service

  **Allow** \

  **Deny**
fullName: EndpointAccess
remarks: ''
isDeprecated: false
syntax: |
  type EndpointAccess = string
