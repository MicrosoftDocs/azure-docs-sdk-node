### YamlMime:TSTypeAlias
name: ClusterNodeType
uid: '@azure/arm-azurestackhci.ClusterNodeType'
package: '@azure/arm-azurestackhci'
summary: >-
  Specifies the type of hardware vendor for all nodes in the cluster. Indicates
  whether the nodes are provided by Microsoft or a third-party vendor. \

  [KnownClusterNodeType](xref:@azure/arm-azurestackhci.KnownClusterNodeType) can
  be used interchangeably with ClusterNodeType,
   this enum contains the known values that the service supports.
  ### Known values supported by the service

  **FirstParty**: All nodes in the cluster are provided and managed by
  Microsoft. \

  **ThirdParty**: All nodes in the cluster are provided and managed by a
  third-party vendor.
fullName: ClusterNodeType
remarks: ''
isDeprecated: false
syntax: |
  type ClusterNodeType = string
