name: ReplicationMode
uid: '@azure/arm-imagebuilder.ReplicationMode'
package: '@azure/arm-imagebuilder'
summary: >-
  Describes replication mode for distribution in Azure Compute Gallery. Omit to
  use the default (Full). \

  [KnownReplicationMode](xref:@azure/arm-imagebuilder.KnownReplicationMode) can
  be used interchangeably with ReplicationMode,
   this enum contains the known values that the service supports.
  ### Known values supported by the service

  **Full**: Full replication mode \

  **Shallow**: Shallow replication mode
fullName: ReplicationMode
remarks: ''
isDeprecated: false
