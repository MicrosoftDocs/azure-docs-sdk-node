name: NetworkMigrationState
uid: '@azure/arm-postgresql-flexible.NetworkMigrationState'
package: '@azure/arm-postgresql-flexible'
summary: >-
  The state of the network migration operation. \

  [KnownNetworkMigrationState](xref:@azure/arm-postgresql-flexible.KnownNetworkMigrationState)
  can be used interchangeably with NetworkMigrationState,
   this enum contains the known values that the service supports.
  ### Known values supported by the service

  **Pending**: The network migration is pending. \

  **InProgress**: The network migration is in progress. \

  **Succeeded**: The network migration succeeded. \

  **Failed**: The network migration failed. \

  **CancelInProgress**: The network migration cancellation is in progress. \

  **Cancelled**: The network migration was cancelled.
fullName: NetworkMigrationState
remarks: ''
isDeprecated: false
syntax: |
  type NetworkMigrationState = string
