### YamlMime:TSTypeAlias
name: RouteNextHopType
uid: '@azure/arm-network.RouteNextHopType'
package: '@azure/arm-network'
summary: >-
  The type of Azure hop the packet should be sent to. \

  [KnownRouteNextHopType](xref:@azure/arm-network.KnownRouteNextHopType) can be
  used interchangeably with RouteNextHopType,
   this enum contains the known values that the service supports.
  ### Known values supported by the service

  **VirtualNetworkGateway**: VirtualNetworkGateway \

  **VnetLocal**: VnetLocal \

  **Internet**: Internet \

  **VirtualAppliance**: VirtualAppliance \

  **VirtualApplianceEcmp**: Routes traffic to virtual appliances using
  Equal-Cost Multi-Path (ECMP) routing with multiple next hop IP addresses. \

  **None**: No next hop type.
fullName: RouteNextHopType
remarks: ''
isDeprecated: false
syntax: |
  type RouteNextHopType = string
