summary: >-
  Whether Nat64 is enabled for the NAT gateway resource. \

  [KnownNat64State](xref:@azure/arm-network.KnownNat64State) can be used
  interchangeably with Nat64State,
   this enum contains the known values that the service supports.
  ### Known values supported by the service

  **None**: Nat64 Property is not set. \

  **Enabled**: Nat64 is enabled. \

  **Disabled**: Nat64 is disabled.
