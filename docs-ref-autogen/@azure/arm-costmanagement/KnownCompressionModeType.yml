    uid: '@azure/arm-costmanagement.KnownCompressionModeType.Gzip'
    package: '@azure/arm-costmanagement'
    summary: gzip
  - name: None
    uid: '@azure/arm-costmanagement.KnownCompressionModeType.None'
    package: '@azure/arm-costmanagement'
    summary: none
  - name: Snappy
    uid: '@azure/arm-costmanagement.KnownCompressionModeType.Snappy'
    package: '@azure/arm-costmanagement'
    summary: snappy
