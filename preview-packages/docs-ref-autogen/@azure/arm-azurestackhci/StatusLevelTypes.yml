### YamlMime:TSTypeAlias
name: StatusLevelTypes
uid: '@azure/arm-azurestackhci.StatusLevelTypes'
package: '@azure/arm-azurestackhci'
summary: >-
  The level code. Indicates the severity or importance of the status message. \

  [KnownStatusLevelTypes](xref:@azure/arm-azurestackhci.KnownStatusLevelTypes)
  can be used interchangeably with StatusLevelTypes,
   this enum contains the known values that the service supports.
  ### Known values supported by the service

  **Info**: Informational message indicating normal operation. \

  **Warning**: Warning message indicating a potential issue or non-critical
  problem. \

  **Error**: Error message indicating a failure or critical issue.
fullName: StatusLevelTypes
remarks: ''
isDeprecated: false
syntax: |
  type StatusLevelTypes = string
