name: KnownLogCollectionJobType
uid: '@azure/arm-azurestackhci.KnownLogCollectionJobType'
package: '@azure/arm-azurestackhci'
summary: >-
  Specifies the type of log collection job. Determines whether the logs are
  collected immediately on demand or as part of a scheduled operation.
fullName: KnownLogCollectionJobType
remarks: ''
isDeprecated: false
fields:
  - name: OnDemand
    uid: '@azure/arm-azurestackhci.KnownLogCollectionJobType.OnDemand'
    package: '@azure/arm-azurestackhci'
    summary: Log collection is triggered manually and executed immediately.
  - name: Scheduled
    uid: '@azure/arm-azurestackhci.KnownLogCollectionJobType.Scheduled'
    package: '@azure/arm-azurestackhci'
    summary: Log collection is scheduled to run at a predefined time or interval.
