      return:
        description: ''
        type: <xref uid="@azure/arm-costmanagement.ScheduleProperties" />
  - name: scope
    uid: '@azure/arm-costmanagement.ScheduledActionProperties.scope'
    package: '@azure/arm-costmanagement'
    summary: >-
      For private scheduled action(Create or Update), scope will be empty.<br />
      For shared scheduled action(Create or Update By Scope), Cost Management
      scope can be 'subscriptions/{subscriptionId}' for subscription scope,
      'subscriptions/{subscriptionId}/resourceGroups/{resourceGroupName}' for
      resourceGroup scope,
      'providers/Microsoft.Billing/billingAccounts/{billingAccountId}' for
      Billing Account scope,
      'providers/Microsoft.Billing/billingAccounts/{billingAccountId}/departments/{departmentId}'
      for Department scope,
      'providers/Microsoft.Billing/billingAccounts/{billingAccountId}/enrollmentAccounts/{enrollmentAccountId}'
      for EnrollmentAccount scope,
      'providers/Microsoft.Billing/billingAccounts/{billingAccountId}/billingProfiles/{billingProfileId}'
      for BillingProfile scope,
      'providers/Microsoft.Billing/billingAccounts/{billingAccountId}/invoiceSections/{invoiceSectionId}'
      for InvoiceSection scope,
      '/providers/Microsoft.CostManagement/externalBillingAccounts/{externalBillingAccountName}'
      for ExternalBillingAccount scope, and
      '/providers/Microsoft.CostManagement/externalSubscriptions/{externalSubscriptionName}'
      for ExternalSubscription scope.
    fullName: scope
    remarks: ''
    isDeprecated: false
    syntax:
      content: 'scope?: string'
      return:
        description: ''
        type: string
  - name: status
    uid: '@azure/arm-costmanagement.ScheduledActionProperties.status'
