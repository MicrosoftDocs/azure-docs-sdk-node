### YamlMime:TSType
name: Placement
uid: '@azure/arm-computeschedule.Placement'
package: '@azure/arm-computeschedule'
summary: Describes the user-defined constraints for resource hardware placement.
fullName: Placement
remarks: ''
isDeprecated: false
type: interface
properties:
  - name: excludeZones
    uid: '@azure/arm-computeschedule.Placement.excludeZones'
    package: '@azure/arm-computeschedule'
    summary: >-
      This property supplements the 'zonePlacementPolicy' property. If
      'zonePlacementPolicy' is set to 'Any'/'Auto', availability zone selected
      by the system must not be present in the list of availability zones passed
      with 'excludeZones'. If 'excludeZones' is not provided, all availability
      zones in region will be considered for selection.
    fullName: excludeZones
    remarks: ''
    isDeprecated: false
    syntax:
      content: 'excludeZones?: string[]'
      return:
        description: ''
        type: string[]
  - name: includeZones
    uid: '@azure/arm-computeschedule.Placement.includeZones'
    package: '@azure/arm-computeschedule'
    summary: >-
      This property supplements the 'zonePlacementPolicy' property. If
      'zonePlacementPolicy' is set to 'Any'/'Auto', availability zone selected
      by the system must be present in the list of availability zones passed
      with 'includeZones'. If 'includeZones' is not provided, all availability
      zones in region will be considered for selection.
    fullName: includeZones
    remarks: ''
    isDeprecated: false
    syntax:
      content: 'includeZones?: string[]'
      return:
        description: ''
        type: string[]
  - name: zonePlacementPolicy
    uid: '@azure/arm-computeschedule.Placement.zonePlacementPolicy'
    package: '@azure/arm-computeschedule'
    summary: >-
      Specifies the policy for resource's placement in availability zone.
      Possible values are: **Any** (used for Virtual Machines), **Auto** (used
      for Virtual Machine Scale Sets) - An availability zone will be
      automatically picked by system as part of resource creation.
    fullName: zonePlacementPolicy
    remarks: ''
    isDeprecated: false
    syntax:
      content: 'zonePlacementPolicy?: string'
      return:
        description: ''
        type: string
