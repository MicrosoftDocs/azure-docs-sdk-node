### YamlMime:TSTypeAlias
name: BringYourOwnRootStatus
uid: '@azure/arm-deviceregistry.BringYourOwnRootStatus'
package: '@azure/arm-deviceregistry'
summary: >-
  Status of the Bring Your Own Root configuration. \

  [KnownBringYourOwnRootStatus](xref:@azure/arm-deviceregistry.KnownBringYourOwnRootStatus)
  can be used interchangeably with BringYourOwnRootStatus,
   this enum contains the known values that the service supports.
  ### Known values supported by the service

  **PendingActivation**: The CSR has been generated and is waiting for the
  customer to provide the signed certificate. \

  **Active**: The signed certificate has been successfully uploaded and
  validated, and the CA is active. \

  **ActiveButPendingRenewal**: The certificate is nearing expiration (within
  renewal window) or has expired. A new CSR has been generated and is waiting
  for the customer to provide a new signed certificate.
fullName: BringYourOwnRootStatus
remarks: ''
isDeprecated: false
syntax: |
  type BringYourOwnRootStatus = string
