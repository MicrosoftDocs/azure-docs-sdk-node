### YamlMime:TSTypeAlias
name: FastProvisioningSupport
uid: '@azure/arm-postgresql-flexible.FastProvisioningSupport'
package: '@azure/arm-postgresql-flexible'
summary: >-
  Indicates if fast provisioning is supported. 'Enabled' means fast provisioning
  is supported. 'Disabled' stands for fast provisioning is not supported. Will
  be deprecated in the future. Look to Supported Features for
  'FastProvisioning'. \

  [KnownFastProvisioningSupport](xref:@azure/arm-postgresql-flexible.KnownFastProvisioningSupport)
  can be used interchangeably with FastProvisioningSupport,
   this enum contains the known values that the service supports.
  ### Known values supported by the service

  **Enabled** \

  **Disabled**
fullName: FastProvisioningSupport
remarks: ''
isDeprecated: false
syntax: |
  type FastProvisioningSupport = string
