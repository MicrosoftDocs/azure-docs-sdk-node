### YamlMime:TSEnum
name: KnownVMScaleSetLifecycleHookEventState
uid: '@azure/arm-compute.KnownVMScaleSetLifecycleHookEventState'
package: '@azure/arm-compute'
summary: >-
  The states that a virtual machine scale set lifecycle hook event can be in.
  This is not settable by the customer. It is set only by the platform.
fullName: KnownVMScaleSetLifecycleHookEventState
remarks: ''
isDeprecated: false
fields:
  - name: Active
    uid: '@azure/arm-compute.KnownVMScaleSetLifecycleHookEventState.Active'
    package: '@azure/arm-compute'
    summary: >-
      The lifecycle hook event is active. E.g., waiting on a response from the
      customer.
  - name: Completed
    uid: '@azure/arm-compute.KnownVMScaleSetLifecycleHookEventState.Completed'
    package: '@azure/arm-compute'
    summary: >-
      The lifecycle hook event is completed. i.e., all the target resources in
      the event have moved to a terminal state.
