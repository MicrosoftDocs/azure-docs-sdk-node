### YamlMime:TSEnum
name: KnownScaleDownMode
uid: '@azure/arm-containerservice.KnownScaleDownMode'
package: '@azure/arm-containerservice'
summary: >-
  Describes how VMs are added to or removed from Agent Pools. See [billing
  states](https://docs.microsoft.com/azure/virtual-machines/states-billing).
fullName: KnownScaleDownMode
remarks: ''
isDeprecated: false
fields:
  - name: Deallocate
    uid: '@azure/arm-containerservice.KnownScaleDownMode.Deallocate'
    package: '@azure/arm-containerservice'
    summary: >-
      Attempt to start deallocated instances (if they exist) during scale up and
      deallocate instances during scale down.
  - name: Delete
    uid: '@azure/arm-containerservice.KnownScaleDownMode.Delete'
    package: '@azure/arm-containerservice'
    summary: >-
      Create new instances during scale up and remove instances during scale
      down.
