### YamlMime:TSTypeAlias
name: PublicNetworkAccessFlag
uid: '@azure/arm-eventhub.PublicNetworkAccessFlag'
package: '@azure/arm-eventhub'
summary: >-
  This determines if traffic is allowed over public network. By default it is
  enabled. If value is SecuredByPerimeter then Inbound and Outbound
  communication is controlled by the network security perimeter and profile's
  access rules. \

  [KnownPublicNetworkAccessFlag](xref:@azure/arm-eventhub.KnownPublicNetworkAccessFlag)
  can be used interchangeably with PublicNetworkAccessFlag,
   this enum contains the known values that the service supports.
  ### Known values supported by the service

  **Enabled** \

  **Disabled** \

  **SecuredByPerimeter**
fullName: PublicNetworkAccessFlag
remarks: ''
isDeprecated: false
syntax: |
  type PublicNetworkAccessFlag = string
