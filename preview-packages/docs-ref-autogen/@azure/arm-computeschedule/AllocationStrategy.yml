### YamlMime:TSTypeAlias
name: AllocationStrategy
uid: '@azure/arm-computeschedule.AllocationStrategy'
package: '@azure/arm-computeschedule'
summary: >-
  The allocation strategy for VM size selection \

  [KnownAllocationStrategy](xref:@azure/arm-computeschedule.KnownAllocationStrategy)
  can be used interchangeably with AllocationStrategy,
   this enum contains the known values that the service supports.
  ### Known values supported by the service

  **LowestPrice**: Platform prioritizes VM sizes with the lowest hourly cost \

  **Prioritized**: Customer specifies a rank for each VM size, platform uses VM
  sizes in rank order \

  **CapacityOptimized**: Platform prioritizes VM sizes with the highest
  available capacity first
fullName: AllocationStrategy
remarks: ''
isDeprecated: false
syntax: |
  type AllocationStrategy = string
