name: JwtAuthModel
uid: '@azure/arm-securityinsight.JwtAuthModel'
package: '@azure/arm-securityinsight'
summary: >-
  Model for API authentication with JWT. Simple exchange between user name +
  password to access token.
fullName: JwtAuthModel
remarks: ''
isDeprecated: false
type: interface
properties:
