### YamlMime:TSTypeAlias
name: ResolutionPolicy
uid: '@azure/arm-privatedns.ResolutionPolicy'
package: '@azure/arm-privatedns'
summary: >-
  The resolution policy on the virtual network link. Only applicable for virtual
  network links to privatelink zones, and for A,AAAA,CNAME queries. When set to
  'NxDomainRedirect', Azure DNS resolver falls back to public resolution if
  private dns query resolution results in non-existent domain response. \

  [KnownResolutionPolicy](xref:@azure/arm-privatedns.KnownResolutionPolicy) can
  be used interchangeably with ResolutionPolicy,
   this enum contains the known values that the service supports.
  ### Known values supported by the service

  **Default** \

  **NxDomainRedirect**
fullName: ResolutionPolicy
remarks: ''
isDeprecated: false
syntax: |
  type ResolutionPolicy = string
