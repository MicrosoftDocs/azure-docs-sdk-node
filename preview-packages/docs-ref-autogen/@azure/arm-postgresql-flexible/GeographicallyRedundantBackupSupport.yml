### YamlMime:TSTypeAlias
name: GeographicallyRedundantBackupSupport
uid: '@azure/arm-postgresql-flexible.GeographicallyRedundantBackupSupport'
package: '@azure/arm-postgresql-flexible'
summary: >-
  Indicates if geographically redundant backups are supported in this location.
  'Enabled' means geographically redundant backups are supported. 'Disabled'
  stands for geographically redundant backup is not supported. Will be
  deprecated in the future. Look to Supported Features for 'GeoBackup'. \

  [KnownGeographicallyRedundantBackupSupport](xref:@azure/arm-postgresql-flexible.KnownGeographicallyRedundantBackupSupport)
  can be used interchangeably with GeographicallyRedundantBackupSupport,
   this enum contains the known values that the service supports.
  ### Known values supported by the service

  **Enabled** \

  **Disabled**
fullName: GeographicallyRedundantBackupSupport
remarks: ''
isDeprecated: false
syntax: |
  type GeographicallyRedundantBackupSupport = string
