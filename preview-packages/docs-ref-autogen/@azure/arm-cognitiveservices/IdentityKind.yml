### YamlMime:TSTypeAlias
name: IdentityKind
uid: '@azure/arm-cognitiveservices.IdentityKind'
package: '@azure/arm-cognitiveservices'
summary: >-
  Specifies the kind of Entra identity described by this object. \

  [KnownIdentityKind](xref:@azure/arm-cognitiveservices.KnownIdentityKind) can
  be used interchangeably with IdentityKind,
   this enum contains the known values that the service supports.
  ### Known values supported by the service

  **AgentBlueprint**: Represents a class identity, used for agentic
  applications. \

  **AgentInstance**: Represents an instance identity. \

  **AgenticUser**: Represents an agentic instance identity with user-like
  traits. \

  **Managed**: Represents a classic managed identity. \

  **None**: No identity.
fullName: IdentityKind
remarks: ''
isDeprecated: false
syntax: |
  type IdentityKind = string
