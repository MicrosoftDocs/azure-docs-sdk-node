name: RaiPolicyMode
uid: '@azure/arm-cognitiveservices.RaiPolicyMode'
package: '@azure/arm-cognitiveservices'
summary: >-
  Rai policy mode. The enum value mapping is as below: Default = 0, Deferred=1,
  Blocking=2, Asynchronous_filter =3. Please use 'Asynchronous_filter' after
  2025-06-01. It is the same as 'Deferred' in previous version. \

  [KnownRaiPolicyMode](xref:@azure/arm-cognitiveservices.KnownRaiPolicyMode) can
  be used interchangeably with RaiPolicyMode,
   this enum contains the known values that the service supports.
  ### Known values supported by the service

  **Default** \

  **Deferred** \

  **Blocking** \

  **Asynchronous_filter**
fullName: RaiPolicyMode
remarks: ''
isDeprecated: false
syntax: |
  type RaiPolicyMode = string
