### YamlMime:TSTypeAlias
name: RemoteLoginPortPublicAccess
uid: '@azure/arm-machinelearning.RemoteLoginPortPublicAccess'
package: '@azure/arm-machinelearning'
summary: >-
  State of the public SSH port. Possible values are: Disabled - Indicates that
  the public ssh port is closed on all nodes of the cluster. Enabled - Indicates
  that the public ssh port is open on all nodes of the cluster. NotSpecified -
  Indicates that the public ssh port is closed on all nodes of the cluster if
  VNet is defined, else is open all public nodes. It can be default only during
  cluster creation time, after creation it will be either enabled or disabled. \

  [KnownRemoteLoginPortPublicAccess](xref:@azure/arm-machinelearning.KnownRemoteLoginPortPublicAccess)
  can be used interchangeably with RemoteLoginPortPublicAccess,
   this enum contains the known values that the service supports.
  ### Known values supported by the service

  **Enabled** \

  **Disabled** \

  **NotSpecified**
fullName: RemoteLoginPortPublicAccess
remarks: ''
isDeprecated: false
syntax: |
  type RemoteLoginPortPublicAccess = string
