### YamlMime:TSTypeAlias
name: UnavailableNameReason
uid: '@azure/arm-search.UnavailableNameReason'
package: '@azure/arm-search'
summary: >-
  The reason why the name is not available. 'Invalid' indicates the name
  provided does not match the naming requirements (incorrect length, unsupported
  characters, etc.). 'AlreadyExists' indicates that the name is already in use
  and is therefore unavailable. \

  [KnownUnavailableNameReason](xref:@azure/arm-search.KnownUnavailableNameReason)
  can be used interchangeably with UnavailableNameReason,
   this enum contains the known values that the service supports.
  ### Known values supported by the service

  **Invalid**: The search service name doesn't match naming requirements. \

  **AlreadyExists**: The search service name is already assigned to a different
  search service.
fullName: UnavailableNameReason
remarks: ''
isDeprecated: false
syntax: |
  type UnavailableNameReason = string
