### YamlMime:TSTypeAlias
name: AssessmentType
uid: '@azure/arm-billing-trust.AssessmentType'
package: '@azure/arm-billing-trust'
summary: >-
  Assessment template name. Each template defines a fixed set of rules and their
  configuration. The list of templates may be extended in future API versions. \

  [KnownAssessmentType](xref:@azure/arm-billing-trust.KnownAssessmentType) can
  be used interchangeably with AssessmentType,
   this enum contains the known values that the service supports.
  ### Known values supported by the service

  **Edu**: Education qualification assessment. Verifies that the billing account
  qualifies for education programs based on customer-supplied domains. \

  **BusinessVerification**: Business verification assessment. Verifies the
  billing account's business identity against the sold-to information on file. \

  **PayeeEnrollment**: Payee enrollment assessment. Verifies a billing account
  is eligible to enroll as a payee. Rule names within this template may change
  between API versions — iterate `rules` via LIST rather than addressing rules
  by name. \

  **PayeeProfile**: Payee profile assessment. Verifies the payee profile
  associated with a billing account. Rule names within this template may change
  between API versions — iterate `rules` via LIST rather than addressing rules
  by name.
fullName: AssessmentType
remarks: ''
isDeprecated: false
syntax: |
  type AssessmentType = string
