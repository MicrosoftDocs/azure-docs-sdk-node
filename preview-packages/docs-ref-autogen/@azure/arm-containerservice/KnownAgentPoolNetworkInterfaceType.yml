### YamlMime:TSEnum
name: KnownAgentPoolNetworkInterfaceType
uid: '@azure/arm-containerservice.KnownAgentPoolNetworkInterfaceType'
package: '@azure/arm-containerservice'
summary: >-
  Type of network interface to be provisioned on each virtual machine instance.
  For more information, see https://aka.ms/aks/multi-nic
fullName: KnownAgentPoolNetworkInterfaceType
remarks: ''
isDeprecated: false
fields:
  - name: Dynamic
    uid: '@azure/arm-containerservice.KnownAgentPoolNetworkInterfaceType.Dynamic'
    package: '@azure/arm-containerservice'
    summary: >-
      A secondary network interface created without IP configuration or subnet
      attachment. The interface is provisioned in an uninitialized state and the
      subnet is attached during workload creation. `vnetSubnetId` must be set to
      an empty string (`""`) or omitted.
  - name: Standard
    uid: '@azure/arm-containerservice.KnownAgentPoolNetworkInterfaceType.Standard'
    package: '@azure/arm-containerservice'
    summary: >-
      A standard network interface programmed with an IP from a specified VNet
      subnet. Must be used with `vnetSubnetId` set in the
      AgentPoolNetworkInterface. IP address family (IPv4/IPv6/Dual-stack) is
      determined by the subnet.
