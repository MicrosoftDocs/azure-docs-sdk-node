### YamlMime:TSType
name: RaiEgressRuleMatch
uid: '@azure/arm-cognitiveservices.RaiEgressRuleMatch'
package: '@azure/arm-cognitiveservices'
summary: >-
  The match criteria for an egress rule.

  If both host and path are omitted, the rule matches all traffic.

  Host uses DNS wildcard syntax (e.g., "*.openai.com" matches "api.openai.com").

  Path uses URI prefix matching with '*' as a single-segment wildcard (e.g.,
  "/v1/*" matches "/v1/chat").
fullName: RaiEgressRuleMatch
remarks: ''
isDeprecated: false
type: interface
properties:
  - name: host
    uid: '@azure/arm-cognitiveservices.RaiEgressRuleMatch.host'
    package: '@azure/arm-cognitiveservices'
    summary: |-
      Host pattern to match using DNS wildcard syntax (e.g., "*.openai.com").
      A leading "*." matches any subdomain. Omit to match all hosts.
    fullName: host
    remarks: ''
    isDeprecated: false
    syntax:
      content: 'host?: string'
      return:
        description: ''
        type: string
  - name: path
    uid: '@azure/arm-cognitiveservices.RaiEgressRuleMatch.path'
    package: '@azure/arm-cognitiveservices'
    summary: |-
      Path pattern to match using URI prefix with '*' wildcard (e.g., "/v1/*").
      Omit to match all paths.
    fullName: path
    remarks: ''
    isDeprecated: false
    syntax:
      content: 'path?: string'
      return:
        description: ''
        type: string
