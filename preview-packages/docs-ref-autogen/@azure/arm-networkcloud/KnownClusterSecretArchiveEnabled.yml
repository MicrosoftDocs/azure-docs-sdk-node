### YamlMime:TSEnum
name: KnownClusterSecretArchiveEnabled
uid: '@azure/arm-networkcloud.KnownClusterSecretArchiveEnabled'
package: '@azure/arm-networkcloud'
summary: >-
  The indicator if the specified key vault should be used to archive the secrets
  of the cluster.
fullName: KnownClusterSecretArchiveEnabled
remarks: ''
isDeprecated: false
fields:
  - name: 'False'
    uid: '@azure/arm-networkcloud.KnownClusterSecretArchiveEnabled.False'
    package: '@azure/arm-networkcloud'
    summary: >-
      Disable use of the cluster secret archive even if a key vault is
      specified.
  - name: 'True'
    uid: '@azure/arm-networkcloud.KnownClusterSecretArchiveEnabled.True'
    package: '@azure/arm-networkcloud'
    summary: Enable the cluster secret archive with the specified key vault.
