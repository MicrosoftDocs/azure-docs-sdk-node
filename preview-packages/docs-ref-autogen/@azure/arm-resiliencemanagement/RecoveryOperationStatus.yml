### YamlMime:TSTypeAlias
name: RecoveryOperationStatus
uid: '@azure/arm-resiliencemanagement.RecoveryOperationStatus'
package: '@azure/arm-resiliencemanagement'
summary: >-
  Specifies the operation status for failover and validation. \

  [KnownRecoveryOperationStatus](xref:@azure/arm-resiliencemanagement.KnownRecoveryOperationStatus)
  can be used interchangeably with RecoveryOperationStatus,
   this enum contains the known values that the service supports.
  ### Known values supported by the service

  **NotStarted**: Operation has not started or ran. \

  **ValidationInProgress**: Operation is in the process of being validated. \

  **InProgress**: Operation is in progress. \

  **Succeeded**: Operation has completed successfully. \

  **CompletedWithWarning**: Operation has completed but ran into some warning
  state. \

  **ValidationFailed**: Operation has completed but ran into some validation
  error state. \

  **Failed**: Operation has completed but ran into some error state. \

  **Canceled**: Operation has been canceled by the user.
fullName: RecoveryOperationStatus
remarks: ''
isDeprecated: false
syntax: |
  type RecoveryOperationStatus = string
