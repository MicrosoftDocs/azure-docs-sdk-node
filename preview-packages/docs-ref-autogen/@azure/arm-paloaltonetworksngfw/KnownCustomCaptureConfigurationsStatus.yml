  - name: InProgress
    uid: >-
      @azure/arm-paloaltonetworksngfw.KnownCustomCaptureConfigurationsStatus.InProgress
    package: '@azure/arm-paloaltonetworksngfw'
    summary: Capture is still running.
  - name: Success
    uid: >-
      @azure/arm-paloaltonetworksngfw.KnownCustomCaptureConfigurationsStatus.Success
