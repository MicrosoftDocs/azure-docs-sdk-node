  **PostgreSql**: PostgreSql \

  **DedicatedHost**: DedicatedHost \

  **SapHana**: SapHana \

  **SqlAzureHybridBenefit**: SqlAzureHybridBenefit \

  **AVS**: AVS \

  **DataFactory**: DataFactory \

