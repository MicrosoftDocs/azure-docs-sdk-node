    package: '@azure/arm-keyvault'
    summary: Recoverable
  - name: RecoverableProtectedSubscription
    uid: >-
      @azure/arm-keyvault.KnownDeletionRecoveryLevel.RecoverableProtectedSubscription
    package: '@azure/arm-keyvault'
    summary: Recoverable+ProtectedSubscription
  - name: RecoverablePurgeable
    uid: '@azure/arm-keyvault.KnownDeletionRecoveryLevel.RecoverablePurgeable'
    package: '@azure/arm-keyvault'
    summary: Recoverable+Purgeable
