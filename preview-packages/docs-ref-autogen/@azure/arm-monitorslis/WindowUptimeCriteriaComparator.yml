name: WindowUptimeCriteriaComparator
uid: '@azure/arm-monitorslis.WindowUptimeCriteriaComparator'
package: '@azure/arm-monitorslis'
summary: >-
  Defines comparison operators for window uptime criteria. \

  [KnownWindowUptimeCriteriaComparator](xref:@azure/arm-monitorslis.KnownWindowUptimeCriteriaComparator)
  can be used interchangeably with WindowUptimeCriteriaComparator,
   this enum contains the known values that the service supports.
  ### Known values supported by the service

  **<**: Less than the target value. \

  **>**: Greater than the target value. \

  **<=**: Less than or equal to the target value. \

  **>=**: Greater than or equal to the target value.
