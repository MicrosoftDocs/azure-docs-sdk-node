### YamlMime:TSTypeAlias
name: Severity
uid: '@azure/arm-azurestackhci.Severity'
package: '@azure/arm-azurestackhci'
summary: >-
  Indicates the importance or impact level of the result. Determines whether the
  result is informational, a warning, or a critical issue that may block
  updates. \

  [KnownSeverity](xref:@azure/arm-azurestackhci.KnownSeverity) can be used
  interchangeably with Severity,
   this enum contains the known values that the service supports.
  ### Known values supported by the service

  **Critical**: A critical issue that blocks updates and requires immediate
  attention. \

  **Warning**: A warning that may indicate a potential issue but does not block
  updates. \

  **Informational**: General information that does not indicate any issue. \

  **Hidden**: The result is hidden and not shown in the output.
fullName: Severity
remarks: ''
isDeprecated: false
syntax: |
  type Severity = string
