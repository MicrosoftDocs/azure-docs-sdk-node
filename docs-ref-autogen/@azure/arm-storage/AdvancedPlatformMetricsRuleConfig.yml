### YamlMime:TSType
name: AdvancedPlatformMetricsRuleConfig
uid: '@azure/arm-storage.AdvancedPlatformMetricsRuleConfig'
package: '@azure/arm-storage'
summary: Configuration for the advanced platform metrics rule.
fullName: AdvancedPlatformMetricsRuleConfig
remarks: ''
isDeprecated: false
type: interface
properties:
  - name: filterType
    uid: '@azure/arm-storage.AdvancedPlatformMetricsRuleConfig.filterType'
    package: '@azure/arm-storage'
    summary: >-
      The type of filter applied to the rule. Possible values include:
      AllContainersFilter, ContainerPrefixFilter, ContainerListFilter.
    fullName: filterType
    remarks: ''
    isDeprecated: false
    syntax:
      content: 'filterType?: string'
      return:
        description: ''
        type: string
  - name: filterValues
    uid: '@azure/arm-storage.AdvancedPlatformMetricsRuleConfig.filterValues'
    package: '@azure/arm-storage'
    summary: >-
      The values for the filter applied to the rule. If filter type is
      AllContainersFilter, filter values should be empty. If filter type is
      ContainerPrefixFilter, filter values should contain a list of container
      prefixes. If filter type is ContainerListFilter, filter values should
      contain a list of container names.
    fullName: filterValues
    remarks: ''
    isDeprecated: false
    syntax:
      content: 'filterValues?: string[]'
      return:
        description: ''
        type: string[]
