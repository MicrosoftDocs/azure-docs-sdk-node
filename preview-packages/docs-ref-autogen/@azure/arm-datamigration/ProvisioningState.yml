name: ProvisioningState
uid: '@azure/arm-datamigration.ProvisioningState'
package: '@azure/arm-datamigration'
summary: >-
  Provisioning State of migration. ProvisioningState as Succeeded implies that
  validations have been performed and migration has started. \

  [KnownProvisioningState](xref:@azure/arm-datamigration.KnownProvisioningState)
  can be used interchangeably with ProvisioningState,
   this enum contains the known values that the service supports.
  ### Known values supported by the service

  **Provisioning**: Provisioning \

  **Updating**: Updating \

  **Succeeded**: Succeeded \

  **Failed**: Failed \

  **Canceled**: Canceled
