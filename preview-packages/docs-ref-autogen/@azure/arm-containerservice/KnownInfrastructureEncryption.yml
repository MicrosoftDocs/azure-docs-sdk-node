### YamlMime:TSEnum
name: KnownInfrastructureEncryption
uid: '@azure/arm-containerservice.KnownInfrastructureEncryption'
package: '@azure/arm-containerservice'
summary: >-
  Whether to enable encryption at rest of Kubernetes resource objects using
  service-managed keys. More information on this can be found under
  https://aka.ms/aks/kubernetesResourceObjectEncryption.
fullName: KnownInfrastructureEncryption
remarks: ''
isDeprecated: false
fields:
  - name: Disabled
    uid: '@azure/arm-containerservice.KnownInfrastructureEncryption.Disabled'
    package: '@azure/arm-containerservice'
    summary: >-
      Encryption at rest of Kubernetes resource objects using service-managed
      keys is disabled. More information on this can be found under
      https://aka.ms/aks/kubernetesResourceObjectEncryption.
  - name: Enabled
    uid: '@azure/arm-containerservice.KnownInfrastructureEncryption.Enabled'
    package: '@azure/arm-containerservice'
    summary: >-
      Encryption at rest of Kubernetes resource objects using service-managed
      keys is enabled. More information on this can be found under
      https://aka.ms/aks/kubernetesResourceObjectEncryption.
