### YamlMime:TSTypeAlias
name: AofFrequency
uid: '@azure/arm-redisenterprisecache.AofFrequency'
package: '@azure/arm-redisenterprisecache'
summary: >-
  Sets the frequency at which data is written to disk. Defaults to '1s', meaning
  'every second'. Note that the 'always' setting is deprecated, because of its
  performance impact. \

  [KnownAofFrequency](xref:@azure/arm-redisenterprisecache.KnownAofFrequency)
  can be used interchangeably with AofFrequency,
   this enum contains the known values that the service supports.
  ### Known values supported by the service

  **1s**: 1s \

  **always**: always
fullName: AofFrequency
remarks: ''
isDeprecated: false
syntax: |
  type AofFrequency = string
