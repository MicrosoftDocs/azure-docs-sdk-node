### YamlMime:TSTypeAlias
name: DiffBackupIntervalInHours
uid: '@azure/arm-sql.DiffBackupIntervalInHours'
package: '@azure/arm-sql'
summary: >-
  The differential backup interval in hours. This is how many interval hours
  between each differential backup will be supported. This is only applicable to
  live databases but not dropped databases. \

  [KnownDiffBackupIntervalInHours](xref:@azure/arm-sql.KnownDiffBackupIntervalInHours)
  can be used interchangeably with DiffBackupIntervalInHours,
   this enum contains the known values that the service supports.
  ### Known values supported by the service

  **12**: 12 \

  **24**: 24
fullName: DiffBackupIntervalInHours
remarks: ''
isDeprecated: false
syntax: |
  type DiffBackupIntervalInHours = number
