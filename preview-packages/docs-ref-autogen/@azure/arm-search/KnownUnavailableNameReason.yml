### YamlMime:TSEnum
name: KnownUnavailableNameReason
uid: '@azure/arm-search.KnownUnavailableNameReason'
package: '@azure/arm-search'
summary: >-
  The reason why the name is not available. 'Invalid' indicates the name
  provided does not match the naming requirements (incorrect length, unsupported
  characters, etc.). 'AlreadyExists' indicates that the name is already in use
  and is therefore unavailable.
fullName: KnownUnavailableNameReason
remarks: ''
isDeprecated: false
fields:
  - name: AlreadyExists
    uid: '@azure/arm-search.KnownUnavailableNameReason.AlreadyExists'
    package: '@azure/arm-search'
    summary: The search service name is already assigned to a different search service.
  - name: Invalid
    uid: '@azure/arm-search.KnownUnavailableNameReason.Invalid'
    package: '@azure/arm-search'
    summary: The search service name doesn't match naming requirements.
