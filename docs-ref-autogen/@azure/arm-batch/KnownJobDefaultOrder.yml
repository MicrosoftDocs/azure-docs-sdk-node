### YamlMime:TSEnum
name: KnownJobDefaultOrder
uid: '@azure/arm-batch.KnownJobDefaultOrder'
package: '@azure/arm-batch'
summary: The order for scheduling tasks from different jobs with the same priority.
fullName: KnownJobDefaultOrder
remarks: ''
isDeprecated: false
fields:
  - name: CreationTime
    uid: '@azure/arm-batch.KnownJobDefaultOrder.CreationTime'
    package: '@azure/arm-batch'
    summary: >-
      If jobs have equal priority, tasks from jobs that were created earlier
      should be scheduled first.
  - name: None
    uid: '@azure/arm-batch.KnownJobDefaultOrder.None'
    package: '@azure/arm-batch'
    summary: >-
      Tasks should be scheduled uniformly from all equal-priority jobs for the
      pool.
