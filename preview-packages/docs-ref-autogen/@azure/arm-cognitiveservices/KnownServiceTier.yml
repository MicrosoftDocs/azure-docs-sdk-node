### YamlMime:TSEnum
name: KnownServiceTier
uid: '@azure/arm-cognitiveservices.KnownServiceTier'
package: '@azure/arm-cognitiveservices'
summary: >-
  The service tier for the deployment. Determines the pricing and performance
  level for request processing. Use 'Default' for standard pricing or 'Priority'
  for higher-priority processing with premium pricing. Note: Pause operations
  are only supported on Standard, DataZoneStandard, and GlobalStandard SKUs.
fullName: KnownServiceTier
remarks: ''
isDeprecated: false
fields:
  - name: Default
    uid: '@azure/arm-cognitiveservices.KnownServiceTier.Default'
    package: '@azure/arm-cognitiveservices'
    summary: >-
      Default service tier meaning the request will be processed with the
      standard pricing and performance for the selected model.
  - name: Priority
    uid: '@azure/arm-cognitiveservices.KnownServiceTier.Priority'
    package: '@azure/arm-cognitiveservices'
    summary: >-
      Priority service tier meaning the request will be processed with higher
      pricing and performance for the selected model.
