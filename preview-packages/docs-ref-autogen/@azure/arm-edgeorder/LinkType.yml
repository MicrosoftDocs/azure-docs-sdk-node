### YamlMime:TSTypeAlias
name: LinkType
uid: '@azure/arm-edgeorder.LinkType'
package: '@azure/arm-edgeorder'
summary: >-
  Type of link. \

  [KnownLinkType](xref:@azure/arm-edgeorder.KnownLinkType) can be used
  interchangeably with LinkType,
   this enum contains the known values that the service supports.
  ### Known values supported by the service

  **Generic**: Generic link. \

  **TermsAndConditions**: Terms and conditions link. \

  **Specification**: Link to product specification. \

  **Documentation**: Link to product documentation. \

  **KnowMore**: Link to know more. \

  **SignUp**: Link to sign up for products. \

  **Discoverable**: Link to order the product from another source and not from
  Azure Edge Hardware Center.
fullName: LinkType
remarks: ''
isDeprecated: false
syntax: |
  type LinkType = string
