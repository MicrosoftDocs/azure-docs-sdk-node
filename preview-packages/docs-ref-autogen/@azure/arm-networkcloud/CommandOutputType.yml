name: CommandOutputType
uid: '@azure/arm-networkcloud.CommandOutputType'
package: '@azure/arm-networkcloud'
summary: >-
  The type of command output for the override. \

  [KnownCommandOutputType](xref:@azure/arm-networkcloud.KnownCommandOutputType)
  can be used interchangeably with CommandOutputType,
   this enum contains the known values that the service supports.
  ### Known values supported by the service

  **BareMetalMachineRunCommand**: BareMetalMachineRunCommand output type \

  **BareMetalMachineRunDataExtracts**: BareMetalMachineRunDataExtracts output
  type \

  **BareMetalMachineRunReadCommands**: BareMetalMachineRunReadCommands output
  type \

  **ClusterSupportAdministrativeActions**: ClusterSupportAdministrativeActions
  output type supporting administrative actions that can be run on a cluster for
  support purposes. \

  **StorageRunReadCommands**: StorageRunReadCommands output type \

  **BareMetalMachineRunDataExtractsRestricted**:
  BareMetalMachineRunDataExtractsRestricted output type
fullName: CommandOutputType
remarks: ''
isDeprecated: false
syntax: |
  type CommandOutputType = string
