name: InboundSecurityRuleType
uid: '@azure/arm-network.InboundSecurityRuleType'
package: '@azure/arm-network'
summary: >-
  Rule Type. This should be either AutoExpire or Permanent. Auto Expire Rule
  only creates NSG rules. Permanent Rule creates NSG rule and SLB LB Rule. \

  [KnownInboundSecurityRuleType](xref:@azure/arm-network.KnownInboundSecurityRuleType)
  can be used interchangeably with InboundSecurityRuleType,
   this enum contains the known values that the service supports.
  ### Known values supported by the service

  **AutoExpire**: AutoExpire \

  **Permanent**: Permanent
