name: SshPublicAccess
uid: '@azure/arm-machinelearning.SshPublicAccess'
package: '@azure/arm-machinelearning'
summary: >-
  State of the public SSH port. Possible values are: Disabled - Indicates that
  the public ssh port is closed on this instance. Enabled - Indicates that the
  public ssh port is open and accessible according to the VNet/subnet policy if
  applicable. \

  [KnownSshPublicAccess](xref:@azure/arm-machinelearning.KnownSshPublicAccess)
  can be used interchangeably with SshPublicAccess,
   this enum contains the known values that the service supports.
  ### Known values supported by the service

  **Enabled** \

  **Disabled**
fullName: SshPublicAccess
remarks: ''
isDeprecated: false
syntax: |
  type SshPublicAccess = string
