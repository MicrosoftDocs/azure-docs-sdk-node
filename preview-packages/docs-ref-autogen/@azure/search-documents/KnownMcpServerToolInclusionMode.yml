### YamlMime:TSEnum
name: KnownMcpServerToolInclusionMode
uid: '@azure/search-documents.KnownMcpServerToolInclusionMode'
package: '@azure/search-documents'
summary: Controls how parsed MCP tool results are integrated into the final result set.
fullName: KnownMcpServerToolInclusionMode
remarks: ''
isDeprecated: false
fields:
  - name: Always
    uid: '@azure/search-documents.KnownMcpServerToolInclusionMode.Always'
    package: '@azure/search-documents'
    summary: >-
      Tool results bypass reranking and are always included in the agent
      context.
  - name: Reranked
    uid: '@azure/search-documents.KnownMcpServerToolInclusionMode.Reranked'
    package: '@azure/search-documents'
    summary: >-
      Tool results go through the reranking and aggregation pipeline alongside
      results from other knowledge sources. This is the default behavior.
