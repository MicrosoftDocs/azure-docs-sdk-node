properties:
  - name: provision
    uid: >-
      @azure/arm-recoveryservicesbackup.ItemLevelRecoveryConnectionsOperations.provision
    package: '@azure/arm-recoveryservicesbackup'
    summary: >-
      Provisions a script which invokes an iSCSI connection to the backup data.
      Executing this script opens a file

      explorer displaying all the recoverable files and folders. This is an
      asynchronous operation. To know the status of

      provisioning, call GetProtectedItemOperationResult API.
    fullName: provision
    remarks: ''
    isDeprecated: false
    syntax:
      content: >-
        provision: (vaultName: string, resourceGroupName: string, fabricName:
        string, containerName: string, protectedItemName: string,
        recoveryPointId: string, parameters: ILRRequestResource, options?:
        ItemLevelRecoveryConnectionsProvisionOptionalParams) => Promise<void>
      return:
        description: ''
        type: >-
          (vaultName: string, resourceGroupName: string, fabricName: string,
          containerName: string, protectedItemName: string, recoveryPointId:
          string, parameters: ILRRequestResource, options?:
          ItemLevelRecoveryConnectionsProvisionOptionalParams) =&gt;
          Promise&lt;void&gt;
  - name: revoke
    uid: >-
      @azure/arm-recoveryservicesbackup.ItemLevelRecoveryConnectionsOperations.revoke
    package: '@azure/arm-recoveryservicesbackup'
    summary: >-
      Revokes an iSCSI connection which can be used to download a script.
      Executing this script opens a file explorer

      displaying all recoverable files and folders. This is an asynchronous
      operation.
    fullName: revoke
    remarks: ''
    isDeprecated: false
    syntax:
      content: >-
        revoke: (vaultName: string, resourceGroupName: string, fabricName:
        string, containerName: string, protectedItemName: string,
        recoveryPointId: string, options?:
        ItemLevelRecoveryConnectionsRevokeOptionalParams) => Promise<void>
      return:
        description: ''
        type: >-
          (vaultName: string, resourceGroupName: string, fabricName: string,
          containerName: string, protectedItemName: string, recoveryPointId:
          string, options?: ItemLevelRecoveryConnectionsRevokeOptionalParams)
          =&gt; Promise&lt;void&gt;
