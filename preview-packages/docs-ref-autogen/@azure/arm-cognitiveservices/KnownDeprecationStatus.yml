name: KnownDeprecationStatus
uid: '@azure/arm-cognitiveservices.KnownDeprecationStatus'
package: '@azure/arm-cognitiveservices'
summary: >-
  Indicates whether the deprecation date is a confirmed planned end-of-life date
  or an estimated deprecation date. When 'Planned', the deprecation date
  represents a confirmed and communicated model end-of-life date. When
  'Tentative', the deprecation date is an estimated timeline that may be subject
  to change.
fullName: KnownDeprecationStatus
remarks: ''
isDeprecated: false
