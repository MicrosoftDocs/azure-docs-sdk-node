name: TIObjectKind
uid: '@azure/arm-securityinsight.TIObjectKind'
package: '@azure/arm-securityinsight'
summary: >-
  The kind of the TI object \

  [KnownTIObjectKind](xref:@azure/arm-securityinsight.KnownTIObjectKind) can be
  used interchangeably with TIObjectKind,
   this enum contains the known values that the service supports.
  ### Known values supported by the service

  **AttackPattern**: A TI object that represents an attack pattern. \

  **Identity**: A TI object that represents an identity. \

  **Indicator**: A TI object that represents an indicator. \

  **Relationship**: A TI object that represents a relationship between two TI
  objects. \

  **ThreatActor**: A TI object that represents a threat actor.
fullName: TIObjectKind
