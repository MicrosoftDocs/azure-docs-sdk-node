### YamlMime:TSTypeAlias
name: ManagementMode
uid: '@azure/arm-containerservice.ManagementMode'
package: '@azure/arm-containerservice'
summary: >-
  The Managed GPU experience installs additional components, such as the Data
  Center GPU Manager (DCGM) metrics for monitoring, on top of the GPU driver for
  you. For more details of what is installed, check out aka.ms/aks/managed-gpu.
  \

  [KnownManagementMode](xref:@azure/arm-containerservice.KnownManagementMode)
  can be used interchangeably with ManagementMode,
   this enum contains the known values that the service supports.
  ### Known values supported by the service

  **Unmanaged**: Managed GPU experience is disabled for NVIDIA GPUs. \

  **Managed**: Managed GPU experience is enabled for NVIDIA GPUs.
fullName: ManagementMode
remarks: ''
isDeprecated: false
syntax: |
  type ManagementMode = string
