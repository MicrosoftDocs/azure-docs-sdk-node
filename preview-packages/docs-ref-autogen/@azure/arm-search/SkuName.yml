### YamlMime:TSTypeAlias
name: SkuName
uid: '@azure/arm-search.SkuName'
package: '@azure/arm-search'
summary: >-
  The SKU of the search service. Valid values include: 'free': Shared service.
  'basic': Dedicated service with up to 3 replicas. 'standard': Dedicated
  service with up to 12 partitions and 12 replicas. 'standard2': Similar to
  standard, but with more capacity per search unit. 'standard3': The largest
  Standard offering with up to 12 partitions and 12 replicas (or up to 3
  partitions with more indexes if you also set the hostingMode property to
  'highDensity'). 'storage_optimized_l1': Supports 1TB per partition, up to 12
  partitions. 'storage_optimized_l2': Supports 2TB per partition, up to 12
  partitions. 'serverless': Serverless tier with auto-scaling capabilities. \

  [KnownSkuName](xref:@azure/arm-search.KnownSkuName) can be used
  interchangeably with SkuName,
   this enum contains the known values that the service supports.
  ### Known values supported by the service

  **free**: Free tier, with no SLA guarantees and a subset of the features
  offered on billable tiers. \

  **basic**: Billable tier for a dedicated service having up to 3 replicas. \

  **standard**: Billable tier for a dedicated service having up to 12 partitions
  and 12 replicas. \

  **standard2**: Similar to 'standard', but with more capacity per search unit.
  \

  **standard3**: The largest Standard offering with up to 12 partitions and 12
  replicas (or up to 3 partitions with more indexes if you also set the
  hostingMode property to 'highDensity'). \

  **storage_optimized_l1**: Billable tier for a dedicated service that supports
  1TB per partition, up to 12 partitions. \

  **storage_optimized_l2**: Billable tier for a dedicated service that supports
  2TB per partition, up to 12 partitions. \

  **serverless**: Serverless tier, offering low-touch, consumption-based, and
  pay-as-you-go experience, with auto-scaling capabilities.
fullName: SkuName
remarks: ''
isDeprecated: false
syntax: |
  type SkuName = string
