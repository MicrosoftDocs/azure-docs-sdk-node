### YamlMime:TSTypeAlias
name: RunQueryFilterOperand
uid: '@azure/arm-datafactory.RunQueryFilterOperand'
package: '@azure/arm-datafactory'
summary: >-
  Parameter name to be used for filter. The allowed operands to query pipeline
  runs are PipelineName, RunStart, RunEnd and Status; to query activity runs are
  ActivityName, ActivityRunStart, ActivityRunEnd, ActivityType and Status, and
  to query trigger runs are TriggerName, TriggerRunTimestamp and Status. \

  [KnownRunQueryFilterOperand](xref:@azure/arm-datafactory.KnownRunQueryFilterOperand)
  can be used interchangeably with RunQueryFilterOperand,
   this enum contains the known values that the service supports.
  ### Known values supported by the service

  **PipelineName**: PipelineName \

  **Status**: Status \

  **RunStart**: RunStart \

  **RunEnd**: RunEnd \

  **ActivityName**: ActivityName \

  **ActivityRunStart**: ActivityRunStart \

  **ActivityRunEnd**: ActivityRunEnd \

  **ActivityType**: ActivityType \

  **TriggerName**: TriggerName \

  **TriggerRunTimestamp**: TriggerRunTimestamp \

  **RunGroupId**: RunGroupId \

  **LatestOnly**: LatestOnly
fullName: RunQueryFilterOperand
remarks: ''
isDeprecated: false
syntax: |
  type RunQueryFilterOperand = string
