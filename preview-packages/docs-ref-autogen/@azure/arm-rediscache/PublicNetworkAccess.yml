### YamlMime:TSTypeAlias
name: PublicNetworkAccess
uid: '@azure/arm-rediscache.PublicNetworkAccess'
package: '@azure/arm-rediscache'
summary: >-
  Whether or not public endpoint access is allowed for this cache.  Value is
  optional but if passed in, must be 'Enabled' or 'Disabled'. If 'Disabled',
  private endpoints are the exclusive access method. Default value is 'Enabled'
  \

  [KnownPublicNetworkAccess](xref:@azure/arm-rediscache.KnownPublicNetworkAccess)
  can be used interchangeably with PublicNetworkAccess,
   this enum contains the known values that the service supports.
  ### Known values supported by the service

  **Enabled**: Public internet access to the cache, via its public IP address,
  is enabled. Connections may use any network path. \

  **Disabled**: Public internet access to the cache, via its public IP address,
  is disabled. Connections must use be made via private endpoints.
fullName: PublicNetworkAccess
remarks: ''
isDeprecated: false
syntax: |
  type PublicNetworkAccess = string
