name: SetMultiVmSyncStatus
uid: '@azure/arm-recoveryservices-siterecovery.SetMultiVmSyncStatus'
package: '@azure/arm-recoveryservices-siterecovery'
summary: >-
  A value indicating whether multi-VM sync has to be enabled. Value should be
  'Enabled' or 'Disabled'. \

  [KnownSetMultiVmSyncStatus](xref:@azure/arm-recoveryservices-siterecovery.KnownSetMultiVmSyncStatus)
  can be used interchangeably with SetMultiVmSyncStatus,
   this enum contains the known values that the service supports.
  ### Known values supported by the service

  **Enable**: Enable \

  **Disable**: Disable
