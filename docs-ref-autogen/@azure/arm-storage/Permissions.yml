name: Permissions
uid: '@azure/arm-storage.Permissions'
package: '@azure/arm-storage'
summary: >-
  The signed permissions for the account SAS. Possible values include: Read (r),
  Write (w), Delete (d), List (l), Add (a), Create (c), Update (u) and Process
  (p). \

  [KnownPermissions](xref:@azure/arm-storage.KnownPermissions) can be used
  interchangeably with Permissions,
   this enum contains the known values that the service supports.
  ### Known values supported by the service

  **r** \

  **d** \

  **w** \

  **l** \

  **a** \

  **c** \

  **u** \

  **p**
fullName: Permissions
remarks: ''
isDeprecated: false
syntax: |
  type Permissions = string
