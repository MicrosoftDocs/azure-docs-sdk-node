properties:
  - name: alertSensitivity
    uid: '@azure/arm-previewalertrule.LogAlertRuleCondition.alertSensitivity'
    package: '@azure/arm-previewalertrule'
    summary: >-
      The extent of deviation required to trigger an alert. Allowed values are
      'Low', 'Medium' and 'High'. This will affect how tight the threshold is to
      the metric series pattern. Relevant and required only for dynamic
      threshold rules of the kind LogAlert.
    fullName: alertSensitivity
    remarks: ''
    isDeprecated: false
    syntax:
      content: 'alertSensitivity?: string'
      return:
        description: ''
        type: string
