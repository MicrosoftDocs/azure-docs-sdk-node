### YamlMime:TSEnum
name: KnownReadReplicaPromoteMode
uid: '@azure/arm-postgresql-flexible.KnownReadReplicaPromoteMode'
package: '@azure/arm-postgresql-flexible'
summary: >-
  Type of operation to apply on the read replica. This property is write only.
  Standalone means that the read replica will be promoted to a standalone
  server, and will become a completely independent entity from the replication
  set. Switchover means that the read replica will roles with the primary
  server.
fullName: KnownReadReplicaPromoteMode
remarks: ''
isDeprecated: false
fields:
  - name: Standalone
    uid: '@azure/arm-postgresql-flexible.KnownReadReplicaPromoteMode.Standalone'
    package: '@azure/arm-postgresql-flexible'
    summary: Read replica will become an independent server.
  - name: Switchover
    uid: '@azure/arm-postgresql-flexible.KnownReadReplicaPromoteMode.Switchover'
    package: '@azure/arm-postgresql-flexible'
    summary: Read replica will swap roles with primary server.
