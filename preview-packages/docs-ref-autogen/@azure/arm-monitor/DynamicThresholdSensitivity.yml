### YamlMime:TSTypeAlias
name: DynamicThresholdSensitivity
uid: '@azure/arm-monitor.DynamicThresholdSensitivity'
package: '@azure/arm-monitor'
summary: >-
  The extent of deviation required to trigger an alert. This will affect how
  tight the threshold is to the metric series pattern. Previously undocumented
  values might be returned \

  [KnownDynamicThresholdSensitivity](xref:@azure/arm-monitor.KnownDynamicThresholdSensitivity)
  can be used interchangeably with DynamicThresholdSensitivity,
   this enum contains the known values that the service supports.
  ### Known values supported by the service

  **Low**: Low \

  **Medium**: Medium \

  **High**: High
fullName: DynamicThresholdSensitivity
remarks: ''
isDeprecated: false
syntax: |
  type DynamicThresholdSensitivity = string
