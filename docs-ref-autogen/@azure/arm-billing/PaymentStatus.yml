name: PaymentStatus
uid: '@azure/arm-billing.PaymentStatus'
package: '@azure/arm-billing'
summary: >-
  Describes whether the payment is completed, failed, pending, cancelled or
  scheduled in the future. \

  [KnownPaymentStatus](xref:@azure/arm-billing.KnownPaymentStatus) can be used
  interchangeably with PaymentStatus,
   this enum contains the known values that the service supports.
  ### Known values supported by the service

  **Succeeded**: Succeeded \

  **Failed**: Failed \

  **Scheduled**: Scheduled \

  **Cancelled**: Cancelled \

  **Completed**: Completed \

  **Pending**: Pending
fullName: PaymentStatus
remarks: ''
isDeprecated: false
syntax: |
  type PaymentStatus = string
