name: ClusterContinueUpdateVersionSafeguardMode
uid: '@azure/arm-networkcloud.ClusterContinueUpdateVersionSafeguardMode'
package: '@azure/arm-networkcloud'
summary: >-
  ClusterContinueUpdateVersionSafeguardMode represents the mode of the cluster
  continue update safeguards. \

  [KnownClusterContinueUpdateVersionSafeguardMode](xref:@azure/arm-networkcloud.KnownClusterContinueUpdateVersionSafeguardMode)
  can be used interchangeably with ClusterContinueUpdateVersionSafeguardMode,
   this enum contains the known values that the service supports.
  ### Known values supported by the service

  **All**: Run all pre‑operation validation checks before continuing the version
  update. If any check fails, the request is rejected and no changes are made. \

  **None**: Skip all safeguards and continue the version update without running
  pre‑operation validation checks.
fullName: ClusterContinueUpdateVersionSafeguardMode
remarks: ''
isDeprecated: false
syntax: |
  type ClusterContinueUpdateVersionSafeguardMode = string
