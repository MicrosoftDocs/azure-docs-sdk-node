### YamlMime:TSTypeAlias
name: LogLevel
uid: '@azure/arm-appcontainers.LogLevel'
package: '@azure/arm-appcontainers'
summary: >-
  Sets the log level for the Dapr sidecar. Allowed values are debug, info, warn,
  error. Default is info. \

  [KnownLogLevel](xref:@azure/arm-appcontainers.KnownLogLevel) can be used
  interchangeably with LogLevel,
   this enum contains the known values that the service supports.
  ### Known values supported by the service

  **info**: info \

  **debug**: debug \

  **warn**: warn \

  **error**: error
fullName: LogLevel
remarks: ''
isDeprecated: false
syntax: |
  type LogLevel = string
