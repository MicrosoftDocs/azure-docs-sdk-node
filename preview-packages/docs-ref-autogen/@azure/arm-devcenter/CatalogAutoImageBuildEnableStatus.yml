name: CatalogAutoImageBuildEnableStatus
uid: '@azure/arm-devcenter.CatalogAutoImageBuildEnableStatus'
package: '@azure/arm-devcenter'
summary: >-
  Indicates whether auto image build is enabled/disabled for image definitions
  in the catalog. \

  [KnownCatalogAutoImageBuildEnableStatus](xref:@azure/arm-devcenter.KnownCatalogAutoImageBuildEnableStatus)
  can be used interchangeably with CatalogAutoImageBuildEnableStatus,
   this enum contains the known values that the service supports.
  ### Known values supported by the service

  **Disabled**: Auto image build is disabled. \

  **Enabled**: Auto image build is enabled.
fullName: CatalogAutoImageBuildEnableStatus
remarks: ''
isDeprecated: false
syntax: |
  type CatalogAutoImageBuildEnableStatus = string
