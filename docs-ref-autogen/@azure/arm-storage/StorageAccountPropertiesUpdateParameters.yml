    fullName: encryption
    remarks: ''
    isDeprecated: false
    syntax:
      content: 'encryption?: Encryption'
      return:
        description: ''
        type: <xref uid="@azure/arm-storage.Encryption" />
  - name: geoPriorityReplicationStatus
    uid: >-
      @azure/arm-storage.StorageAccountPropertiesUpdateParameters.geoPriorityReplicationStatus
