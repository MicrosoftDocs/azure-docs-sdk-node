### YamlMime:TSTypeAlias
name: ClusterSecretArchiveEnabled
uid: '@azure/arm-networkcloud.ClusterSecretArchiveEnabled'
package: '@azure/arm-networkcloud'
summary: >-
  The indicator if the specified key vault should be used to archive the secrets
  of the cluster. \

  [KnownClusterSecretArchiveEnabled](xref:@azure/arm-networkcloud.KnownClusterSecretArchiveEnabled)
  can be used interchangeably with ClusterSecretArchiveEnabled,
   this enum contains the known values that the service supports.
  ### Known values supported by the service

  **True**: Enable the cluster secret archive with the specified key vault. \

  **False**: Disable use of the cluster secret archive even if a key vault is
  specified.
fullName: ClusterSecretArchiveEnabled
remarks: ''
isDeprecated: false
syntax: |
  type ClusterSecretArchiveEnabled = string
