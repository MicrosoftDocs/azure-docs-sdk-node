### YamlMime:TSEnum
name: KnownStacQueryableDefinitionDataType
uid: '@azure/planetarycomputer.KnownStacQueryableDefinitionDataType'
package: '@azure/planetarycomputer'
summary: |-
  Queryable data types for the queryables extension.
  These are the data types supported by Basic CQL2.
fullName: KnownStacQueryableDefinitionDataType
remarks: ''
isDeprecated: false
fields:
  - name: Boolean
    uid: '@azure/planetarycomputer.KnownStacQueryableDefinitionDataType.Boolean'
    package: '@azure/planetarycomputer'
    summary: |-
      Booleans.
      Examples: true, false
  - name: Date
    uid: '@azure/planetarycomputer.KnownStacQueryableDefinitionDataType.Date'
    package: '@azure/planetarycomputer'
    summary: |-
      An instant with a granularity of a day.
      Example (JSON): { "date": "1969-07-20" }
  - name: Number
    uid: '@azure/planetarycomputer.KnownStacQueryableDefinitionDataType.Number'
    package: '@azure/planetarycomputer'
    summary: |-
      Numbers including integers and floating point values.
      Examples: -100, 3.14159
  - name: String
    uid: '@azure/planetarycomputer.KnownStacQueryableDefinitionDataType.String'
    package: '@azure/planetarycomputer'
    summary: |-
      Character strings.
      Example: 'This is a literal string.'
  - name: Timestamp
    uid: '@azure/planetarycomputer.KnownStacQueryableDefinitionDataType.Timestamp'
    package: '@azure/planetarycomputer'
    summary: |-
      An instant with a granularity of a second or smaller.
      Example (JSON): { "timestamp": "1969-07-20T20:17:40Z" }
