### YamlMime:TSTypeAlias
name: KeyType
uid: '@azure/arm-storage.KeyType'
package: '@azure/arm-storage'
summary: >-
  Encryption key type to be used for the encryption service. 'Account' key type
  implies that an account-scoped encryption key will be used. 'Service' key type
  implies that a default service key is used. \

  [KnownKeyType](xref:@azure/arm-storage.KnownKeyType) can be used
  interchangeably with KeyType,
   this enum contains the known values that the service supports.
  ### Known values supported by the service

  **Service** \

  **Account**
fullName: KeyType
remarks: ''
isDeprecated: false
syntax: |
  type KeyType = string
