### YamlMime:TSEnum
name: KnownSecurityTypes
uid: '@azure/arm-compute.KnownSecurityTypes'
package: '@azure/arm-compute'
summary: >-
  Specifies the VM securityType; UefiSettings are enabled only when set to
  TrustedLaunch or ConfidentialVM, and returns a Standard value starting API
  version 2025-11-01.
fullName: KnownSecurityTypes
remarks: ''
isDeprecated: false
fields:
  - name: ConfidentialVM
    uid: '@azure/arm-compute.KnownSecurityTypes.ConfidentialVM'
    package: '@azure/arm-compute'
    summary: ConfidentialVM
  - name: Standard
    uid: '@azure/arm-compute.KnownSecurityTypes.Standard'
    package: '@azure/arm-compute'
    summary: >-
      Indicates a VM without UEFI features such as SecureBoot or vTPM; returned
      as the default value when securityType is not specified.
  - name: TrustedLaunch
    uid: '@azure/arm-compute.KnownSecurityTypes.TrustedLaunch'
    package: '@azure/arm-compute'
    summary: TrustedLaunch
