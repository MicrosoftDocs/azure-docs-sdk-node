    package: '@azure/arm-billing'
    summary: >-
      The Available Credit or Payment on Account Balance for a billing account.
      The credit balance can be used to settle due or past due invoices and is
      supported for billing accounts with agreement type Microsoft Customer
      Agreement. The payment on account balance is supported for billing
      accounts with agreement type Microsoft Customer Agreement or Microsoft
      Online Services Program.
