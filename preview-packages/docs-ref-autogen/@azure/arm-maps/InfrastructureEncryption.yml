### YamlMime:TSTypeAlias
name: InfrastructureEncryption
uid: '@azure/arm-maps.InfrastructureEncryption'
package: '@azure/arm-maps'
summary: >-
  (Optional) Discouraged to include in resource definition. Only needed where it
  is possible to disable platform (AKA infrastructure) encryption. Azure SQL TDE
  is an example of this. Values are enabled and disabled. \

  [KnownInfrastructureEncryption](xref:@azure/arm-maps.KnownInfrastructureEncryption)
  can be used interchangeably with InfrastructureEncryption,
   this enum contains the known values that the service supports.
  ### Known values supported by the service

  **enabled**: Encryption is enabled \

  **disabled**: Encryption is disabled
fullName: InfrastructureEncryption
remarks: ''
isDeprecated: false
syntax: |
  type InfrastructureEncryption = string
