### YamlMime:TSTypeAlias
name: DiagnosticLevel
uid: '@azure/arm-azurestackhci.DiagnosticLevel'
package: '@azure/arm-azurestackhci'
summary: >-
  Desired level of diagnostic data emitted by the cluster. \

  [KnownDiagnosticLevel](xref:@azure/arm-azurestackhci.KnownDiagnosticLevel) can
  be used interchangeably with DiagnosticLevel,
   this enum contains the known values that the service supports.
  ### Known values supported by the service

  **Off**: No diagnostic data will be emitted. \

  **Basic**: Basic diagnostic data will be emitted, including essential health
  metrics. \

  **Enhanced**: Enhanced diagnostic data will be emitted, including detailed
  performance and usage metrics.
fullName: DiagnosticLevel
remarks: ''
isDeprecated: false
syntax: |
  type DiagnosticLevel = string
