  - name: createOrUpdate
    uid: '@azure/arm-datamigration.ServicesOperations.createOrUpdate'
    package: '@azure/arm-datamigration'
    summary: >-
      The services resource is the top-level resource that represents the Azure
      Database Migration Service (classic). The PUT method creates a new service
      or updates an existing one. When a service is updated, existing child
      resources (i.e. tasks) are unaffected. Services currently support a single
      kind, "vm", which refers to a VM-based service, although other kinds may
      be added in the future. This method can change the kind, SKU, and network
      of the service, but if tasks are currently running (i.e. the service is
      busy), this will fail with 400 Bad Request ("ServiceIsBusy"). The provider
      will reply when successful with 200 OK or 201 Created. Long-running
      operations use the provisioningState property.
    fullName: createOrUpdate
    remarks: ''
    isDeprecated: false
    syntax:
      content: >-
        createOrUpdate: (groupName: string, serviceName: string, parameters:
        DataMigrationService, options?: ServicesCreateOrUpdateOptionalParams) =>
        PollerLike<OperationState<DataMigrationService>, DataMigrationService>
      return:
        description: ''
        type: >-
          (groupName: string, serviceName: string, parameters:
          DataMigrationService, options?: ServicesCreateOrUpdateOptionalParams)
          =&gt; PollerLike&lt;OperationState&lt;DataMigrationService&gt;,
          DataMigrationService&gt;
