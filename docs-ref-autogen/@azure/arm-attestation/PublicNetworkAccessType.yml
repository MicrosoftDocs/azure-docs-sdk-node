name: PublicNetworkAccessType
uid: '@azure/arm-attestation.PublicNetworkAccessType'
package: '@azure/arm-attestation'
summary: >-
  The public network access type for API calls to the Attestation Provider. \

  [KnownPublicNetworkAccessType](xref:@azure/arm-attestation.KnownPublicNetworkAccessType)
  can be used interchangeably with PublicNetworkAccessType,
   this enum contains the known values that the service supports.
  ### Known values supported by the service

  **Enabled**: Enables public network connectivity to the Attestation Provider
  REST APIs. \

  **Disabled**: Disables public network connectivity to the Attestation Provider
  REST APIs.
