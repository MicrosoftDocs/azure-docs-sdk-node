### YamlMime:TSTypeAlias
name: RuntimeProtectionEnforcementLevel
uid: '@azure/arm-networkcloud.RuntimeProtectionEnforcementLevel'
package: '@azure/arm-networkcloud'
summary: >-
  The mode of operation for runtime protection. \

  [KnownRuntimeProtectionEnforcementLevel](xref:@azure/arm-networkcloud.KnownRuntimeProtectionEnforcementLevel)
  can be used interchangeably with RuntimeProtectionEnforcementLevel,
   this enum contains the known values that the service supports.
  ### Known values supported by the service

  **Audit**: Real-time scans detect but do not remediate detected issues. \

  **Disabled**: Real-time scans are disabled and can not be triggered. \

  **OnDemand**: Real-time scans are disabled but can be triggered to remediate
  detected issues. \

  **Passive**: Real-time scans are disabled but can be triggered to detect
  issues without remediation. \

  **RealTime**: Real-time scans detect and remediate detected issues.
fullName: RuntimeProtectionEnforcementLevel
remarks: ''
isDeprecated: false
syntax: |
  type RuntimeProtectionEnforcementLevel = string
