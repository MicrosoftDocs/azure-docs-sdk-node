    uid: >-
      @azure/arm-signalr.TrafficThrottleByJwtSignatureRule.maxInboundMessageBytes
    package: '@azure/arm-signalr'
    summary: >-
      Maximum accumulated inbound message bytes allowed for the same JWT
      signature within a time window. Clients with the same JWT signature will
      get disconnected if the message bytes exceeds this value. Default value is
      1GB.
    fullName: maxInboundMessageBytes
    remarks: ''
