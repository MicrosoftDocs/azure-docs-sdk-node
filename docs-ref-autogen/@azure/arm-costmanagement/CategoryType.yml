### YamlMime:TSTypeAlias
name: CategoryType
uid: '@azure/arm-costmanagement.CategoryType'
package: '@azure/arm-costmanagement'
summary: >-
  The category of the budget.

  - 'Cost' defines a Budget.

  - 'ReservationUtilization' defines a Reservation Utilization Alert Rule. \

  [KnownCategoryType](xref:@azure/arm-costmanagement.KnownCategoryType) can be
  used interchangeably with CategoryType,
   this enum contains the known values that the service supports.
  ### Known values supported by the service

  **Cost**: A Budget that evaluates monetary cost of Azure resources against an
  amount, and alerts based on a configured notification threshold. \

  **ReservationUtilization**: An Alert Rule that evaluates the utilization
  percentage of Azure Reservations, and alerts based on a configured
  notification threshold.
fullName: CategoryType
remarks: ''
isDeprecated: false
syntax: |
  type CategoryType = string
