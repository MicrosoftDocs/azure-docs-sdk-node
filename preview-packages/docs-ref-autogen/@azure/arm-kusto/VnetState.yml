name: VnetState
uid: '@azure/arm-kusto.VnetState'
package: '@azure/arm-kusto'
summary: >-
  When enabled, the cluster is deployed into the configured subnet, when
  disabled it will be removed from the subnet. \

  [KnownVnetState](xref:@azure/arm-kusto.KnownVnetState) can be used
  interchangeably with VnetState,
   this enum contains the known values that the service supports.
  ### Known values supported by the service

  **Enabled**: Enabled \

  **Disabled**: Disabled
