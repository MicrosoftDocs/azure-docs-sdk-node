name: ProvisioningState
uid: '@azure/arm-horizondb.ProvisioningState'
package: '@azure/arm-horizondb'
summary: >-
  The provisioning state. \

  [KnownProvisioningState](xref:@azure/arm-horizondb.KnownProvisioningState) can
  be used interchangeably with ProvisioningState,
   this enum contains the known values that the service supports.
  ### Known values supported by the service

  **Succeeded**: Provisioning completed successfully \

  **Failed**: Provisioning failed \

  **Canceled**: Provisioning was canceled \

  **InProgress**: Provisioning is in progress \

  **Provisioning**: Provisioning is in progress
