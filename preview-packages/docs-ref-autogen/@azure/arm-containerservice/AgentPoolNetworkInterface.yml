name: AgentPoolNetworkInterface
uid: '@azure/arm-containerservice.AgentPoolNetworkInterface'
package: '@azure/arm-containerservice'
summary: >-
  Configuration of a secondary network interface provisioned on each VM instance
  in the agent pool. For more information, see https://aka.ms/aks/multi-nic
fullName: AgentPoolNetworkInterface
remarks: ''
isDeprecated: false
type: interface
properties:
  - name: enableAcceleratedNetworking
    uid: >-
      @azure/arm-containerservice.AgentPoolNetworkInterface.enableAcceleratedNetworking
    package: '@azure/arm-containerservice'
    summary: >-
      Whether accelerated networking is enabled on this secondary NIC. If
      omitted, this defaults to true only when the agent pool VM SKU supports
      accelerated networking. Validation will fail if it is enabled on an
      unsupported SKU or NIC configuration.
    fullName: enableAcceleratedNetworking
    remarks: ''
    isDeprecated: false
    syntax:
      content: 'enableAcceleratedNetworking?: boolean'
      return:
        description: ''
        type: boolean
  - name: type
    uid: '@azure/arm-containerservice.AgentPoolNetworkInterface.type'
    package: '@azure/arm-containerservice'
    summary: Type of NIC to be provisioned on the VM.
    fullName: type
    remarks: ''
    isDeprecated: false
    syntax:
      content: 'type?: string'
      return:
        description: ''
        type: string
  - name: vnetSubnetId
    uid: '@azure/arm-containerservice.AgentPoolNetworkInterface.vnetSubnetId'
    package: '@azure/arm-containerservice'
    summary: >-
      The resource ID of the subnet which will be attached to the secondary
      network interface. Required when `type` is `Standard`; must be an empty
      string (`""`) or omitted when `type` is `Dynamic`.
    fullName: vnetSubnetId
    remarks: ''
    isDeprecated: false
    syntax:
      content: 'vnetSubnetId?: string'
      return:
        description: ''
        type: string
