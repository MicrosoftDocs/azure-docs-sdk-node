name: KnownTileMatrixCornerOfOrigin
uid: '@azure/planetarycomputer.KnownTileMatrixCornerOfOrigin'
package: '@azure/planetarycomputer'
summary: >-
  The corner of the tile matrix (_topLeft_ or _bottomLeft_) used as the origin

  for numbering tile rows and columns. This corner is also a corner of the (0,
  0)

  tile.
fullName: KnownTileMatrixCornerOfOrigin
remarks: ''
isDeprecated: false
fields:
  - name: BottomLeft
    uid: '@azure/planetarycomputer.KnownTileMatrixCornerOfOrigin.BottomLeft'
    package: '@azure/planetarycomputer'
    summary: Origin at the bottom-left corner (Y increases upward)
  - name: TopLeft
    uid: '@azure/planetarycomputer.KnownTileMatrixCornerOfOrigin.TopLeft'
    package: '@azure/planetarycomputer'
    summary: Origin at the top-left corner (Y increases downward)
