name: AllocationState
uid: '@azure/arm-cosmosdb.AllocationState'
package: '@azure/arm-cosmosdb'
summary: >-
  Allocation state of the cluster and data center resources. \

  [KnownAllocationState](xref:@azure/arm-cosmosdb.KnownAllocationState) can be
  used interchangeably with AllocationState,
   this enum contains the known values that the service supports.
  ### Known values supported by the service

  **Active**: Active implies the virtual machines of the cluster are allocated.
  \

  **Deallocated**: Deallocated implies virtual machines and resources are
  deallocated.
fullName: AllocationState
