### YamlMime:TSTypeAlias
name: SecureKeyWrapAlgorithm
uid: '@azure/keyvault-keys.SecureKeyWrapAlgorithm'
package: '@azure/keyvault-keys'
summary: |-
  The algorithms supported by the secure wrap and unwrap operations on
  [KeyClient](xref:@azure/keyvault-keys.KeyClient).

  Secure wrap/unwrap operations support a wider set of algorithms than the
  regular wrap/unwrap. The additional algorithms typically end with `KWPAD`
  (key-wrap with padding) or are prefixed with `CKM_` (PKCS#11 mechanisms).
fullName: SecureKeyWrapAlgorithm
remarks: ''
isDeprecated: false
syntax: |
  type SecureKeyWrapAlgorithm =
    | "RSA-OAEP-256"
    | "A128KW"
    | "A192KW"
    | "A256KW"
    | "A128KWPAD"
    | "A192KWPAD"
    | "A256KWPAD"
    | "CKM_AES_KEY_WRAP"
    | "CKM_AES_KEY_WRAP_PAD"
