### YamlMime:TSType
name: BudgetTimePeriod
uid: '@azure/arm-costmanagement.BudgetTimePeriod'
package: '@azure/arm-costmanagement'
summary: >-
  The time period that defines the active period of the budget. The budget will
  evaluate data on or after the startDate and will expire on the endDate.


  Supported for CategoryType(s): Cost, ReservationUtilization.


  Required for CategoryType(s): Cost, ReservationUtilization.
fullName: BudgetTimePeriod
remarks: ''
isDeprecated: false
type: interface
properties:
  - name: endDate
    uid: '@azure/arm-costmanagement.BudgetTimePeriod.endDate'
    package: '@azure/arm-costmanagement'
    summary: >-
      The end date for the budget.


      - Constraints for **CategoryType: Cost** - No constraints. If not
      provided, we default this to 10 years from the start date.


      - Constraints for **CategoryType: ReservationUtilization** - End date
      cannot be more than 3 years after the start date.
    fullName: endDate
    remarks: ''
    isDeprecated: false
    syntax:
      content: 'endDate?: Date'
      return:
        description: ''
        type: Date
  - name: startDate
    uid: '@azure/arm-costmanagement.BudgetTimePeriod.startDate'
    package: '@azure/arm-costmanagement'
    summary: >-
      The start date for the budget.


      - Constraints for **CategoryType: Cost** - Must be first of the month and
      should be less than the end date. Budget start date must be on or after
      June 1, 2017. Future start date should not be more than twelve months.
      Past start date should  be selected within the timegrain period.


      - Constraints for **CategoryType: ReservationUtilization** - Must be on or
      after the current date and less than the end date.
    fullName: startDate
    remarks: ''
    isDeprecated: false
    syntax:
      content: 'startDate: Date'
      return:
        description: ''
        type: Date
