name: KubernetesPluginType
uid: '@azure/arm-networkcloud.KubernetesPluginType'
package: '@azure/arm-networkcloud'
summary: >-
  The indicator of how this network will be utilized by the Kubernetes cluster.
  \

  [KnownKubernetesPluginType](xref:@azure/arm-networkcloud.KnownKubernetesPluginType)
  can be used interchangeably with KubernetesPluginType,
   this enum contains the known values that the service supports.
  ### Known values supported by the service

  **DPDK**: DPDK plugin type \

  **SRIOV**: SRIOV plugin type \

  **OSDevice**: OSDevice plugin type \

  **MACVLAN**: MACVLAN plugin type \

  **IPVLAN**: IPVLAN plugin type
