### YamlMime:TSTypeAlias
name: IdentityProvider
uid: '@azure/arm-azurestackhci.IdentityProvider'
package: '@azure/arm-azurestackhci'
summary: >-
  Identity Provider for the cluster \

  [KnownIdentityProvider](xref:@azure/arm-azurestackhci.KnownIdentityProvider)
  can be used interchangeably with IdentityProvider,
   this enum contains the known values that the service supports.
  ### Known values supported by the service

  **ActiveDirectory**: Uses Active Directory as the identity provider, enabling
  domain-based authentication and centralized identity management. This is the
  default option. \

  **LocalIdentity**: Uses a local identity system integrated with Azure Key
  Vault for authentication. Suitable for AD-less environments where Active
  Directory is not available or required.
fullName: IdentityProvider
remarks: ''
isDeprecated: false
syntax: |
  type IdentityProvider = string
