name: UpdateType
uid: '@azure/arm-monitorworkspaces.UpdateType'
package: '@azure/arm-monitorworkspaces'
summary: >-
  The type of update that triggers a notification \

  [KnownUpdateType](xref:@azure/arm-monitorworkspaces.KnownUpdateType) can be
  used interchangeably with UpdateType,
   this enum contains the known values that the service supports.
  ### Known values supported by the service

  **IssueCreation**: Notification sent when an issue is created \

  **TimeBased**: Notification sent based on time intervals \

  **OnChange**: Notification sent when the issue changes
