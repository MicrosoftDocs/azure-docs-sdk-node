### YamlMime:TSEnum
name: KnownRelayType
uid: '@azure/arm-networkcloud.KnownRelayType'
package: '@azure/arm-networkcloud'
summary: >-
  The indicator of which relay type the machine should be assigned to use.
  Platform indicates the use of a platform-dedicated relay. Public indicates the
  use of the standard public relay for Arc services.
fullName: KnownRelayType
remarks: ''
isDeprecated: false
fields:
  - name: Platform
    uid: '@azure/arm-networkcloud.KnownRelayType.Platform'
    package: '@azure/arm-networkcloud'
    summary: Utilize the platform-dedicated relay for Arc services.
  - name: Public
    uid: '@azure/arm-networkcloud.KnownRelayType.Public'
    package: '@azure/arm-networkcloud'
    summary: Utilize the standard public relay for Arc services.
