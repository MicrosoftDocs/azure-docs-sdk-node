### YamlMime:TSTypeAlias
name: RecoveryOperationNames
uid: '@azure/arm-resiliencemanagement.RecoveryOperationNames'
package: '@azure/arm-resiliencemanagement'
summary: >-
  Defines the set of operations that can be executed on a Recovery Orchestration
  Plan. These operations are applicable only to resources that meet the
  qualification criteria. \

  [KnownRecoveryOperationNames](xref:@azure/arm-resiliencemanagement.KnownRecoveryOperationNames)
  can be used interchangeably with RecoveryOperationNames,
   this enum contains the known values that the service supports.
  ### Known values supported by the service

  **Failover**: Initiates a failover process to recover eligible resources to
  the target location. \

  **FailoverCommit**: Commits the failover for resources that require an
  explicit commit after recovery. \

  **Reprotect**: Performs re-protection or configuration changes for resources
  that have failed over, as required. \

  **TestFailover**: Initiates a test failover process for qualified resources
  and those that support test failover. \

  **TestFailoverCleanup**: Cleans up resources and configurations created during
  a test failover, as required.
fullName: RecoveryOperationNames
remarks: ''
isDeprecated: false
syntax: |
  type RecoveryOperationNames = string
