### YamlMime:TSTypeAlias
name: IpAllocationType
uid: '@azure/arm-networkcloud.IpAllocationType'
package: '@azure/arm-networkcloud'
summary: >-
  The type of the IP address allocation, defaulted to "DualStack". \

  [KnownIpAllocationType](xref:@azure/arm-networkcloud.KnownIpAllocationType)
  can be used interchangeably with IpAllocationType,
   this enum contains the known values that the service supports.
  ### Known values supported by the service

  **IPV4**: The IPV4 address allocation type. \

  **IPV6**: The IPV6 address allocation type. \

  **DualStack**: The DualStack address allocation type.
fullName: IpAllocationType
remarks: ''
isDeprecated: false
syntax: |
  type IpAllocationType = string
