name: ServerlessGpuSessionsMode
uid: '@azure/arm-devcenter.ServerlessGpuSessionsMode'
package: '@azure/arm-devcenter'
summary: >-
  Indicates whether serverless GPU session access is enabled. \

  [KnownServerlessGpuSessionsMode](xref:@azure/arm-devcenter.KnownServerlessGpuSessionsMode)
  can be used interchangeably with ServerlessGpuSessionsMode,
   this enum contains the known values that the service supports.
  ### Known values supported by the service

  **Disabled**: Serverless GPU session access is disabled. \

  **AutoDeploy**: Serverless GPU session access is enabled and necessary
  resources will be automatically setup.
