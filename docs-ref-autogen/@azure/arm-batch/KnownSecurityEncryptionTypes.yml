### YamlMime:TSEnum
name: KnownSecurityEncryptionTypes
uid: '@azure/arm-batch.KnownSecurityEncryptionTypes'
package: '@azure/arm-batch'
summary: >-
  Specifies the EncryptionType of the managed disk. It is set to
  DiskWithVMGuestState for encryption of the managed disk along with
  VMGuestState blob, VMGuestStateOnly for encryption of just the VMGuestState
  blob, and NonPersistedTPM for not persisting firmware state in the
  VMGuestState blob. **Note**: It can be set for only Confidential VMs and
  required when using Confidential VMs.
fullName: KnownSecurityEncryptionTypes
remarks: ''
isDeprecated: false
fields:
  - name: DiskWithVMGuestState
    uid: '@azure/arm-batch.KnownSecurityEncryptionTypes.DiskWithVMGuestState'
    package: '@azure/arm-batch'
    summary: >-
      EncryptionType of the managed disk is set to DiskWithVMGuestState for
      encryption of the managed disk along with VMGuestState blob. It is not
      supported in data disks.
  - name: NonPersistedTPM
    uid: '@azure/arm-batch.KnownSecurityEncryptionTypes.NonPersistedTPM'
    package: '@azure/arm-batch'
    summary: >-
      EncryptionType of the managed disk is set to NonPersistedTPM for not
      persisting firmware state in the VMGuestState blob.
  - name: VMGuestStateOnly
    uid: '@azure/arm-batch.KnownSecurityEncryptionTypes.VMGuestStateOnly'
    package: '@azure/arm-batch'
    summary: >-
      EncryptionType of the managed disk is set to VMGuestStateOnly for
      encryption of just the VMGuestState blob.
