package: '@azure/arm-redisenterprisecache'
summary: >-
  Properties for validating migration from Azure Cache for Redis to Redis
  Enterprise.
fullName: MigrationValidationRequest
remarks: ''
isDeprecated: false
type: interface
properties:
  - name: forceMigrate
    uid: '@azure/arm-redisenterprisecache.MigrationValidationRequest.forceMigrate'
    package: '@azure/arm-redisenterprisecache'
    summary: >-
      Sets whether to ignore warnings when validating if the source cache can be
      migrated to the target cache. If this property is true, the isValid
      property in the response will ignore warning-level disparities between the
      source and target resource. The default value is false.
    fullName: forceMigrate
    remarks: ''
    isDeprecated: false
    syntax:
      content: 'forceMigrate?: boolean'
      return:
        description: ''
        type: boolean
  - name: skipDataMigration
    uid: >-
      @azure/arm-redisenterprisecache.MigrationValidationRequest.skipDataMigration
    package: '@azure/arm-redisenterprisecache'
    summary: >-
      Sets whether the data is migrated from source to target or not. The
      default value is true.
    fullName: skipDataMigration
    remarks: ''
    isDeprecated: false
    syntax:
      content: 'skipDataMigration?: boolean'
      return:
        description: ''
        type: boolean
  - name: sourceResourceId
    uid: >-
      @azure/arm-redisenterprisecache.MigrationValidationRequest.sourceResourceId
    package: '@azure/arm-redisenterprisecache'
    summary: >-
      The source resource ID to validate migration from. This is the resource ID
