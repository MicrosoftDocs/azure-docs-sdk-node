      return:
        description: ''
        type: >-
          (resourceGroupName: string, accountName: string,
          mapsAccountSasParameters: AccountSasParameters, options?:
          AccountsListSasOptionalParams) =&gt;
          Promise&lt;MapsAccountSasToken&gt;
