### YamlMime:TSTypeAlias
name: PreferredIPVersion
uid: '@azure/arm-network.PreferredIPVersion'
package: '@azure/arm-network'
summary: >-
  The preferred IP version to use in test evaluation. The connection monitor may
  choose to use a different version depending on other parameters. \

  [KnownPreferredIPVersion](xref:@azure/arm-network.KnownPreferredIPVersion) can
  be used interchangeably with PreferredIPVersion,
   this enum contains the known values that the service supports.
  ### Known values supported by the service

  **IPv4**: IPv4 \

  **IPv6**: IPv6
fullName: PreferredIPVersion
remarks: ''
isDeprecated: false
syntax: |
  type PreferredIPVersion = string
