### YamlMime:TSTypeAlias
name: FreeLimitExhaustionBehavior
uid: '@azure/arm-sql.FreeLimitExhaustionBehavior'
package: '@azure/arm-sql'
summary: >-
  Specifies the behavior when monthly free limits are exhausted for the free
  database.


  AutoPause: The database will be auto paused upon exhaustion of free limits for
  remainder of the month.


  BillForUsage: The database will continue to be online upon exhaustion of free
  limits and any overage will be billed. \

  [KnownFreeLimitExhaustionBehavior](xref:@azure/arm-sql.KnownFreeLimitExhaustionBehavior)
  can be used interchangeably with FreeLimitExhaustionBehavior,
   this enum contains the known values that the service supports.
  ### Known values supported by the service

  **AutoPause**: AutoPause \

  **BillOverUsage**: BillOverUsage
fullName: FreeLimitExhaustionBehavior
remarks: ''
isDeprecated: false
syntax: |
  type FreeLimitExhaustionBehavior = string
