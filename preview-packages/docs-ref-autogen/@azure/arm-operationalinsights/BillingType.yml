### YamlMime:TSTypeAlias
name: BillingType
uid: '@azure/arm-operationalinsights.BillingType'
package: '@azure/arm-operationalinsights'
summary: >-
  Configures whether billing will be only on the cluster or each workspace will
  be billed by its proportional use. This does not change the overall billing,
  only how it will be distributed. Default value is 'Cluster' \

  [KnownBillingType](xref:@azure/arm-operationalinsights.KnownBillingType) can
  be used interchangeably with BillingType,
   this enum contains the known values that the service supports.
  ### Known values supported by the service

  **Cluster**: Cluster \

  **Workspaces**: Workspaces
fullName: BillingType
remarks: ''
isDeprecated: false
syntax: |
  type BillingType = string
