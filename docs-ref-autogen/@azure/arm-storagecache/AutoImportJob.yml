### YamlMime:TSType
name: AutoImportJob
uid: '@azure/arm-storagecache.AutoImportJob'
package: '@azure/arm-storagecache'
summary: >-
  An auto import job instance. Follows Azure Resource Manager standards:
  https://github.com/Azure/azure-resource-manager-rpc/blob/master/v1.0/resource-api-reference.md
fullName: AutoImportJob
remarks: ''
isDeprecated: false
type: interface
properties:
  - name: adminStatus
    uid: '@azure/arm-storagecache.AutoImportJob.adminStatus'
    package: '@azure/arm-storagecache'
    summary: >-
      The administrative status of the auto import job. Possible values:
      'Enable', 'Disable'. Passing in a value of 'Disable' will disable the
      current active auto import job. By default it is set to 'Enable'.
    fullName: adminStatus
    remarks: ''
    isDeprecated: false
    syntax:
      content: 'adminStatus?: string'
      return:
        description: ''
        type: string
  - name: autoImportPrefixes
    uid: '@azure/arm-storagecache.AutoImportJob.autoImportPrefixes'
    package: '@azure/arm-storagecache'
    summary: >-
      An array of blob paths/prefixes that get auto imported to the cluster
      namespace. It has '/' as the default value. Number of maximum allowed
      paths is 100.
    fullName: autoImportPrefixes
    remarks: ''
    isDeprecated: false
    syntax:
      content: 'autoImportPrefixes?: string[]'
      return:
        description: ''
        type: string[]
  - name: conflictResolutionMode
    uid: '@azure/arm-storagecache.AutoImportJob.conflictResolutionMode'
    package: '@azure/arm-storagecache'
    summary: >-
      How the auto import job will handle conflicts. For example, if the auto
      import job is trying to bring in a directory, but a file is at that path,
      how it handles it. Fail indicates that the auto import job should stop
      immediately and not do anything with the conflict. Skip indicates that it
      should pass over the conflict. OverwriteIfDirty causes the auto import job
      to delete and re-import the file or directory if it is a conflicting type,
      is dirty, or is currently released. OverwriteAlways extends
      OverwriteIfDirty to include releasing files that had been restored but
      were not dirty. Please reference
      https://learn.microsoft.com/en-us/azure/azure-managed-lustre/blob-integration#conflict-resolution-mode
      for a thorough explanation of these resolution modes.
    fullName: conflictResolutionMode
    remarks: ''
    isDeprecated: false
    syntax:
      content: 'conflictResolutionMode?: string'
      return:
        description: ''
        type: string
  - name: enableDeletions
    uid: '@azure/arm-storagecache.AutoImportJob.enableDeletions'
    package: '@azure/arm-storagecache'
    summary: >-
      Whether or not to enable deletions during auto import. This only affects
      overwrite-dirty.
    fullName: enableDeletions
    remarks: ''
    isDeprecated: false
    syntax:
      content: 'enableDeletions?: boolean'
      return:
        description: ''
        type: boolean
  - name: maximumErrors
    uid: '@azure/arm-storagecache.AutoImportJob.maximumErrors'
    package: '@azure/arm-storagecache'
    summary: >-
      Total non-conflict-oriented errors (e.g., OS errors) Import will tolerate
      before exiting with failure. -1 means infinite. 0 means exit immediately
      on any error.
    fullName: maximumErrors
    remarks: ''
    isDeprecated: false
    syntax:
      content: 'maximumErrors?: number'
      return:
        description: ''
        type: number
  - name: provisioningState
    uid: '@azure/arm-storagecache.AutoImportJob.provisioningState'
    package: '@azure/arm-storagecache'
    summary: ARM provisioning state.
    fullName: provisioningState
    remarks: ''
    isDeprecated: false
    syntax:
      content: 'provisioningState?: string'
      return:
        description: ''
        type: string
  - name: status
    uid: '@azure/arm-storagecache.AutoImportJob.status'
    package: '@azure/arm-storagecache'
    summary: The status of the auto import job.
    fullName: status
    remarks: ''
    isDeprecated: false
    syntax:
      content: 'status?: AutoImportJobPropertiesStatus'
      return:
        description: ''
        type: <xref uid="@azure/arm-storagecache.AutoImportJobPropertiesStatus" />
