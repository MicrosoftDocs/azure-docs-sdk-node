### YamlMime:TSType
name: CustomerManagedKeyEncryption
uid: '@azure/arm-eventgrid.CustomerManagedKeyEncryption'
package: '@azure/arm-eventgrid'
summary: All Customer-managed key encryption properties for the resource.
fullName: CustomerManagedKeyEncryption
remarks: ''
isDeprecated: false
type: interface
properties:
  - name: keyEncryptionKeyIdentity
    uid: '@azure/arm-eventgrid.CustomerManagedKeyEncryption.keyEncryptionKeyIdentity'
    package: '@azure/arm-eventgrid'
    summary: >-
      All identity configuration for Customer-managed key settings defining
      which identity should be used to auth to Key Vault. This is an optional
      property.

      When not specified, the SystemAssigned identity will be used.
    fullName: keyEncryptionKeyIdentity
    remarks: ''
    isDeprecated: false
    syntax:
      content: 'keyEncryptionKeyIdentity?: KeyEncryptionKeyIdentity'
      return:
        description: ''
        type: <xref uid="@azure/arm-eventgrid.KeyEncryptionKeyIdentity" />
  - name: keyEncryptionKeyStatus
    uid: '@azure/arm-eventgrid.CustomerManagedKeyEncryption.keyEncryptionKeyStatus'
    package: '@azure/arm-eventgrid'
    summary: >-
      The state of the Customer Managed Key (CMK) encryption. This is a
      read-only property which determines if the associated key is active and
      valid and used

      actively by runtime as expected. When the associated CMK becomes invalid
      (e.g., if it is deleted, or if versioned CMK is not current anymore),
      Event Grid

      Service will set this state to disabled to indicate that this key is not
      valid anymore and requires action from user.
    fullName: keyEncryptionKeyStatus
    remarks: ''
    isDeprecated: false
    syntax:
      content: 'keyEncryptionKeyStatus?: string'
      return:
        description: ''
        type: string
  - name: keyEncryptionKeyStatusFriendlyDescription
    uid: >-
      @azure/arm-eventgrid.CustomerManagedKeyEncryption.keyEncryptionKeyStatusFriendlyDescription
    package: '@azure/arm-eventgrid'
    summary: >-
      Friendly description about the Customer Managed Key (CMK) encryption
      state. This is a read-only property which determines why the associated
      key is revoked which

      will help user to mitigate the issue and re-enable the CMK key.
    fullName: keyEncryptionKeyStatusFriendlyDescription
    remarks: ''
    isDeprecated: false
    syntax:
      content: 'keyEncryptionKeyStatusFriendlyDescription?: string'
      return:
        description: ''
        type: string
  - name: keyEncryptionKeyUrl
    uid: '@azure/arm-eventgrid.CustomerManagedKeyEncryption.keyEncryptionKeyUrl'
    package: '@azure/arm-eventgrid'
    summary: >-
      Key encryption key URL. This URL can be either versioned (e.g.,
      https://contosovault.vault.azure.net/keys/contosokek/562a4bb76b524a1493a6afe8e536ee78),
      or unversioned (e.g.,

      https://contosovault.vault.azure.net/keys/contosokek. When versioned URL
      is used, this version of the key will be used by Event Grid Runtime even
      if it is rotated. It is user

      responsibility to update the URL with the new version by updating the
      namespace resource. When URL without version is used, Event Grid will
      query and get latest version and will

      be used automatically.
    fullName: keyEncryptionKeyUrl
    remarks: ''
    isDeprecated: false
    syntax:
      content: 'keyEncryptionKeyUrl: string'
      return:
        description: ''
        type: string
