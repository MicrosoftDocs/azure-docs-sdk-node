### YamlMime:TSTypeAlias
name: AutoImportJobPropertiesAdminStatus
uid: '@azure/arm-storagecache.AutoImportJobPropertiesAdminStatus'
package: '@azure/arm-storagecache'
summary: >-
  The administrative status of the auto import job. Possible values: 'Enable',
  'Disable'. Passing in a value of 'Disable' will disable the current active
  auto import job. By default it is set to 'Enable'. \

  [KnownAutoImportJobPropertiesAdminStatus](xref:@azure/arm-storagecache.KnownAutoImportJobPropertiesAdminStatus)
  can be used interchangeably with AutoImportJobPropertiesAdminStatus,
   this enum contains the known values that the service supports.
  ### Known values supported by the service

  **Enable**: Enable \

  **Disable**: Disable
fullName: AutoImportJobPropertiesAdminStatus
remarks: ''
isDeprecated: false
syntax: |
  type AutoImportJobPropertiesAdminStatus = string
