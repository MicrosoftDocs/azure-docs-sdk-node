properties:
  - name: batchMode
    uid: '@azure/arm-cdn.RuleSet.batchMode'
    package: '@azure/arm-cdn'
    summary: >-
      Indicates whether rule set is in batch mode. When batch mode is enabled,
      rules will be processed in a batch along with the rule set.

      When batch mode is disabled, rules would need to be processed
      independently.

      This property can only be set during rule set creation and cannot be
      updated later.

      For switching modes, a new rule set needs to be created with the desired
      mode and rules need to be migrated to the new rule set.
    fullName: batchMode
    remarks: ''
    isDeprecated: false
    syntax:
      content: 'batchMode?: boolean'
      return:
        description: ''
        type: boolean
  - name: deploymentStatus
