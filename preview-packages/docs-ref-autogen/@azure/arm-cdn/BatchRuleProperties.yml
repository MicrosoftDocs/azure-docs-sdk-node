### YamlMime:TSType
name: BatchRuleProperties
uid: '@azure/arm-cdn.BatchRuleProperties'
package: '@azure/arm-cdn'
summary: The JSON object that contains a rule with its name for batch mode operations.
fullName: BatchRuleProperties
remarks: ''
isDeprecated: false
type: interface
properties:
  - name: actions
    uid: '@azure/arm-cdn.BatchRuleProperties.actions'
    package: '@azure/arm-cdn'
    summary: >-
      A list of actions that are executed when all the conditions of a rule are
      satisfied.
    fullName: actions
    remarks: ''
    isDeprecated: false
    syntax:
      content: 'actions?: DeliveryRuleActionUnion[]'
      return:
        description: ''
        type: <xref uid="@azure/arm-cdn.DeliveryRuleActionUnion" />[]
  - name: conditions
    uid: '@azure/arm-cdn.BatchRuleProperties.conditions'
    package: '@azure/arm-cdn'
    summary: A list of conditions that must be matched for the actions to be executed
    fullName: conditions
    remarks: ''
    isDeprecated: false
    syntax:
      content: 'conditions?: DeliveryRuleConditionUnion[]'
      return:
        description: ''
        type: <xref uid="@azure/arm-cdn.DeliveryRuleConditionUnion" />[]
  - name: matchProcessingBehavior
    uid: '@azure/arm-cdn.BatchRuleProperties.matchProcessingBehavior'
    package: '@azure/arm-cdn'
    summary: >-
      If this rule is a match should the rules engine continue running the
      remaining rules or stop. If not present, defaults to Continue.
    fullName: matchProcessingBehavior
    remarks: ''
    isDeprecated: false
    syntax:
      content: 'matchProcessingBehavior?: string'
      return:
        description: ''
        type: string
  - name: order
    uid: '@azure/arm-cdn.BatchRuleProperties.order'
    package: '@azure/arm-cdn'
    summary: >-
      The order in which the rules are applied for the endpoint. Possible values
      {0,1,2,3,………}. A rule with a lesser order will be applied before a rule
      with a greater order. Rule with order 0 is a special rule. It does not
      require any condition and actions listed in it will always be applied.
    fullName: order
    remarks: ''
    isDeprecated: false
    syntax:
      content: 'order?: number'
      return:
        description: ''
        type: number
  - name: ruleName
    uid: '@azure/arm-cdn.BatchRuleProperties.ruleName'
    package: '@azure/arm-cdn'
    summary: Name of the rule.
    fullName: ruleName
    remarks: ''
    isDeprecated: false
    syntax:
      content: 'ruleName: string'
      return:
        description: ''
        type: string
  - name: ruleSetName
    uid: '@azure/arm-cdn.BatchRuleProperties.ruleSetName'
    package: '@azure/arm-cdn'
    summary: The name of the rule set containing the rule.
    fullName: ruleSetName
    remarks: ''
    isDeprecated: false
    syntax:
      content: 'ruleSetName?: string'
      return:
        description: ''
        type: string
