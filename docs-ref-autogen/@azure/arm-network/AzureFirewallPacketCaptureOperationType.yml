### YamlMime:TSTypeAlias
name: AzureFirewallPacketCaptureOperationType
uid: '@azure/arm-network.AzureFirewallPacketCaptureOperationType'
package: '@azure/arm-network'
summary: >-
  The packet capture operation to perform. If the Start operation is selected,
  please provide all the fields in the firewallPacketCaptureParameters to
  successfully initiate the packet capture. If the Status or Stop operation is
  selected, only the operation field is required; all other fields in the
  firewallPacketCaptureParameters can be omitted to successfully retrieve the
  capture status or stop the capture. \

  [KnownAzureFirewallPacketCaptureOperationType](xref:@azure/arm-network.KnownAzureFirewallPacketCaptureOperationType)
  can be used interchangeably with AzureFirewallPacketCaptureOperationType,
   this enum contains the known values that the service supports.
  ### Known values supported by the service

  **Start**: Start \

  **Status**: Status \

  **Stop**: Stop
fullName: AzureFirewallPacketCaptureOperationType
remarks: ''
isDeprecated: false
syntax: |
  type AzureFirewallPacketCaptureOperationType = string
