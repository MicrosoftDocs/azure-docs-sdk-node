name: CustomDomainValidationState
uid: '@azure/arm-eventgrid.CustomDomainValidationState'
package: '@azure/arm-eventgrid'
summary: >-
  Validation state for the custom domain. This is a read only property and is
  initially set to 'Pending' and will be updated to 'Approved' by Event Grid
  only after ownership of the domain name has been successfully validated. \

  [KnownCustomDomainValidationState](xref:@azure/arm-eventgrid.KnownCustomDomainValidationState)
  can be used interchangeably with CustomDomainValidationState,
   this enum contains the known values that the service supports.
  ### Known values supported by the service

  **Pending**: Pending \

  **Approved**: Approved \

  **ErrorRetrievingDnsRecord**: ErrorRetrievingDnsRecord
fullName: CustomDomainValidationState
remarks: ''
isDeprecated: false
syntax: |
  type CustomDomainValidationState = string
