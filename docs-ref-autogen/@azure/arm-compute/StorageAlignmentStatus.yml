### YamlMime:TSTypeAlias
name: StorageAlignmentStatus
uid: '@azure/arm-compute.StorageAlignmentStatus'
package: '@azure/arm-compute'
summary: >-
  Specifies the storage alignment status for the disk. \

  [KnownStorageAlignmentStatus](xref:@azure/arm-compute.KnownStorageAlignmentStatus)
  can be used interchangeably with StorageAlignmentStatus,
   this enum contains the known values that the service supports.
  ### Known values supported by the service

  **Unaligned**: Disk does not have Storage Fault Domain to Compute Fault Domain
  mapping. A single Storage Fault Domain failure may impact all VMs that
  reference this disk profile. \

  **Aligned**: Disk has Storage Fault Domain to Compute Fault Domain mapping.
  Storage Fault Domain failure is contained to VMs in a single Compute Fault
  Domain.
fullName: StorageAlignmentStatus
remarks: ''
isDeprecated: false
syntax: |
  type StorageAlignmentStatus = string
