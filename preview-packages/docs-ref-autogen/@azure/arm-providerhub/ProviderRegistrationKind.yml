name: ProviderRegistrationKind
uid: '@azure/arm-providerhub.ProviderRegistrationKind'
package: '@azure/arm-providerhub'
summary: >-
  Provider registration kind. This Metadata is also used by portal/tooling/etc
  to render different UX experiences for resources of the same type. \

  [KnownProviderRegistrationKind](xref:@azure/arm-providerhub.KnownProviderRegistrationKind)
  can be used interchangeably with ProviderRegistrationKind,
   this enum contains the known values that the service supports.
  ### Known values supported by the service

  **Managed**: Resource Provider with all the resource types 'managed' by the
  ProviderHub service. \

  **Hybrid**: Resource Provider with a mix of 'managed' and 'direct' resource
  types. \

  **Direct**: Resource Provider with all the resource types 'managed' on by
  itself.
fullName: ProviderRegistrationKind
remarks: ''
isDeprecated: false
syntax: |
  type ProviderRegistrationKind = string
