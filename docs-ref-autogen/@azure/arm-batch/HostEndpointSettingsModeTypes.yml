### YamlMime:TSTypeAlias
name: HostEndpointSettingsModeTypes
uid: '@azure/arm-batch.HostEndpointSettingsModeTypes'
package: '@azure/arm-batch'
summary: >-
  Specifies the access control policy execution mode. \

  [KnownHostEndpointSettingsModeTypes](xref:@azure/arm-batch.KnownHostEndpointSettingsModeTypes)
  can be used interchangeably with HostEndpointSettingsModeTypes,
   this enum contains the known values that the service supports.
  ### Known values supported by the service

  **Audit**: In Audit mode, the system acts as if it is enforcing the access
  control policy, including emitting access denial entries in the logs but it
  does not actually deny any requests to host endpoints. \

  **Enforce**: Enforce mode is the recommended mode of operation and system will
  enforce the access control policy. This property cannot be used together with
  'inVMAccessControlProfileReferenceId'.
fullName: HostEndpointSettingsModeTypes
remarks: ''
isDeprecated: false
syntax: |
  type HostEndpointSettingsModeTypes = string
