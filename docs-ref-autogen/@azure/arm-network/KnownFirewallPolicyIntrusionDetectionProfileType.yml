### YamlMime:TSEnum
name: KnownFirewallPolicyIntrusionDetectionProfileType
uid: '@azure/arm-network.KnownFirewallPolicyIntrusionDetectionProfileType'
package: '@azure/arm-network'
summary: >-
  Specifies the Intrusion Detection signature profile to apply.


  Values:

  - Off: IDPS profiles disabled; uses the same signature set that existed before
  profiles.

  - Emerging: Signatures of the newest, most recent threats.

  - Core: Complete, modern, standard set of signatures.

  - Extended: Core signatures plus older legacy signatures for maximum coverage.
