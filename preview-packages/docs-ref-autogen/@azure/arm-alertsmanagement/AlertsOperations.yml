properties:
  - name: changeState
    uid: '@azure/arm-alertsmanagement.AlertsOperations.changeState'
    package: '@azure/arm-alertsmanagement'
    summary: >-
      Change the state of an alert. If scope is a deleted resource then please
      use scope as parent resource of the delete resource. For example if my
      alert id is
      '/subscriptions/{subscriptionId}/resourceGroups/{resourceGroup}/providers/Microsoft.Compute/virtualMachines/vm1/providers/Microsoft.AlertsManagement/alerts/{alertId}'
      and 'vm1' is deleted then if you want to change state of this particular
      alert then use parent resource of scope. So in this example change state
      call will look like this:
      '/subscriptions/{subscriptionId}/resourceGroups/{resourceGroup}/providers/Microsoft.AlertsManagement/alerts/{alertId}'.
    fullName: changeState
    remarks: ''
    isDeprecated: false
    syntax:
      content: >-
        changeState: (scope: string, alertId: string, newState: string,
        options?: AlertsChangeStateOptionalParams) => Promise<Alert>
      return:
        description: ''
        type: >-
          (scope: string, alertId: string, newState: string, options?:
          AlertsChangeStateOptionalParams) =&gt; Promise&lt;Alert&gt;
