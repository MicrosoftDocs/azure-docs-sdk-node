### YamlMime:TSTypeAlias
name: LocalAdminStatus
uid: '@azure/arm-devcenter.LocalAdminStatus'
package: '@azure/arm-devcenter'
summary: >-
  Local Administrator enable or disable status. Indicates whether owners of Dev
  Boxes are added as local administrators on the Dev Box. \

  [KnownLocalAdminStatus](xref:@azure/arm-devcenter.KnownLocalAdminStatus) can
  be used interchangeably with LocalAdminStatus,
   this enum contains the known values that the service supports.
  ### Known values supported by the service

  **Disabled**: Local administrator is disabled. \

  **Enabled**: Local administrator is enabled.
fullName: LocalAdminStatus
remarks: ''
isDeprecated: false
syntax: |
  type LocalAdminStatus = string
