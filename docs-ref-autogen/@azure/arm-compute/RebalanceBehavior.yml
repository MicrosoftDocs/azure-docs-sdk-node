### YamlMime:TSTypeAlias
name: RebalanceBehavior
uid: '@azure/arm-compute.RebalanceBehavior'
package: '@azure/arm-compute'
summary: >-
  Type of rebalance behavior that will be used for recreating virtual machines
  in the scale set across availability zones. Default and only supported value
  for now is CreateBeforeDelete. \

  [KnownRebalanceBehavior](xref:@azure/arm-compute.KnownRebalanceBehavior) can
  be used interchangeably with RebalanceBehavior,
   this enum contains the known values that the service supports.
  ### Known values supported by the service

  **CreateBeforeDelete**
fullName: RebalanceBehavior
remarks: ''
isDeprecated: false
syntax: |
  type RebalanceBehavior = string
