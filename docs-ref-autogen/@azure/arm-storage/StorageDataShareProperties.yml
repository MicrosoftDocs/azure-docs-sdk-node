properties:
  - name: accessPolicies
    uid: '@azure/arm-storage.StorageDataShareProperties.accessPolicies'
    package: '@azure/arm-storage'
    summary: >-
      List of access policies that specify the permission allowed to a managed
      identity.

      For Create - This property is required and cannot be null. If no access
      policies are provided at creation time, specify an empty array.

      For Update - This property is optional. If set to null or not passed, the
      existing access policies are left unchanged.

      If provided with a non-null value, the existing access policies are
      replaced with the specified list.
    fullName: accessPolicies
    remarks: ''
    isDeprecated: false
    syntax:
      content: 'accessPolicies: StorageDataShareAccessPolicy[]'
      return:
        description: ''
        type: <xref uid="@azure/arm-storage.StorageDataShareAccessPolicy" />[]
  - name: assets
    uid: '@azure/arm-storage.StorageDataShareProperties.assets'
    package: '@azure/arm-storage'
    summary: >-
      List of assets that specify the properties of the shared resources.

      For Create - This property is required and cannot be null. If no assets
      are provided at creation time, specify an empty array.

      For Update - This property is optional. If set to null or not passed, the
      existing assets are left unchanged.

      If provided with a non-null value, the existing assets are replaced with
      the specified list.
    fullName: assets
    remarks: ''
    isDeprecated: false
    syntax:
      content: 'assets: StorageDataShareAsset[]'
      return:
        description: ''
        type: <xref uid="@azure/arm-storage.StorageDataShareAsset" />[]
