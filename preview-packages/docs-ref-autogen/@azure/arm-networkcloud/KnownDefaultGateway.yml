### YamlMime:TSEnum
name: KnownDefaultGateway
uid: '@azure/arm-networkcloud.KnownDefaultGateway'
package: '@azure/arm-networkcloud'
summary: >-
  The indicator of whether this is the default gateway. Only one of the attached
  networks (including the CloudServicesNetwork attachment) for a single machine
  may be specified as True.
fullName: KnownDefaultGateway
remarks: ''
isDeprecated: false
fields:
  - name: 'False'
    uid: '@azure/arm-networkcloud.KnownDefaultGateway.False'
    package: '@azure/arm-networkcloud'
    summary: This is not the default gateway.
  - name: 'True'
    uid: '@azure/arm-networkcloud.KnownDefaultGateway.True'
    package: '@azure/arm-networkcloud'
    summary: This is the default gateway.
