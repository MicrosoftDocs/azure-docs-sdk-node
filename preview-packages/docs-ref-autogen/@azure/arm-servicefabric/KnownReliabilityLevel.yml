### YamlMime:TSEnum
name: KnownReliabilityLevel
uid: '@azure/arm-servicefabric.KnownReliabilityLevel'
package: '@azure/arm-servicefabric'
summary: >-
  The reliability level sets the replica set size of system services. Learn
  about
  [ReliabilityLevel](https://docs.microsoft.com/azure/service-fabric/service-fabric-cluster-capacity).
fullName: KnownReliabilityLevel
remarks: ''
isDeprecated: false
fields:
  - name: Bronze
    uid: '@azure/arm-servicefabric.KnownReliabilityLevel.Bronze'
    package: '@azure/arm-servicefabric'
    summary: >-
      Run the System services with a target replica set count of 3. This should
      only be used for test clusters.
  - name: Gold
    uid: '@azure/arm-servicefabric.KnownReliabilityLevel.Gold'
    package: '@azure/arm-servicefabric'
    summary: Run the System services with a target replica set count of 7.
  - name: None
    uid: '@azure/arm-servicefabric.KnownReliabilityLevel.None'
    package: '@azure/arm-servicefabric'
    summary: >-
      Run the System services with a target replica set count of 1. This should
      only be used for test clusters.
  - name: Platinum
    uid: '@azure/arm-servicefabric.KnownReliabilityLevel.Platinum'
    package: '@azure/arm-servicefabric'
    summary: Run the System services with a target replica set count of 9.
  - name: Silver
    uid: '@azure/arm-servicefabric.KnownReliabilityLevel.Silver'
    package: '@azure/arm-servicefabric'
    summary: Run the System services with a target replica set count of 5.
