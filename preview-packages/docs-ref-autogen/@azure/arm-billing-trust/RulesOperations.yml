properties:
  - name: createOrUpdate
    uid: '@azure/arm-billing-trust.RulesOperations.createOrUpdate'
    package: '@azure/arm-billing-trust'
    summary: >-
      Create or update a Rule. **This operation is required for RPaaS
      tracked-resource

      cache population and MUST remain in the public spec.** Rules are created
      by the

      service when the parent assessment is created; they are not directly
      creatable

      by end users. All customer PUT calls are rejected at runtime with

      `OperationNotAllowed` via the RPaaS ResourceCreationValidate extension.

      Use PATCH to modify rule fields that the customer is authorized to change.

      Peer RPs with the same topology (extension singleton parent + proxy child)

      declare an identical public PUT for the same RPaaS cache-population
      reason:

      Microsoft.ScVmm/virtualMachineInstances/guestAgents,

      Microsoft.ConnectedVMwarevSphere/virtualMachineInstances/guestAgents.
    fullName: createOrUpdate
    remarks: ''
    isDeprecated: false
    syntax:
      content: >-
        createOrUpdate: (resourceUri: string, ruleName: string, resource: Rule,
        options?: RulesCreateOrUpdateOptionalParams) => Promise<Rule>
      return:
        description: ''
        type: >-
          (resourceUri: string, ruleName: string, resource: Rule, options?:
          RulesCreateOrUpdateOptionalParams) =&gt; Promise&lt;Rule&gt;
