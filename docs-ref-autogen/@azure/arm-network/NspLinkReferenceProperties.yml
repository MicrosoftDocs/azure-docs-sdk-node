### YamlMime:TSType
name: NspLinkReferenceProperties
uid: '@azure/arm-network.NspLinkReferenceProperties'
package: '@azure/arm-network'
summary: Properties of NSP LinkReference resource.
fullName: NspLinkReferenceProperties
remarks: ''
isDeprecated: false
type: interface
properties:
  - name: description
    uid: '@azure/arm-network.NspLinkReferenceProperties.description'
    package: '@azure/arm-network'
    summary: >-
      A message sent by the remote NSP link admin for connection request. In
      case of Auto-approved flow, it is default to 'Auto Approved'.
    fullName: description
    remarks: ''
    isDeprecated: false
    syntax:
      content: 'description?: string'
      return:
        description: ''
        type: string
  - name: localInboundProfiles
    uid: '@azure/arm-network.NspLinkReferenceProperties.localInboundProfiles'
    package: '@azure/arm-network'
    summary: >-
      Local Inbound profile names to which Inbound is allowed. Use ['*'] to
      allow inbound to all profiles.
    fullName: localInboundProfiles
    remarks: ''
    isDeprecated: false
    syntax:
      content: 'localInboundProfiles?: string[]'
      return:
        description: ''
        type: string[]
  - name: localOutboundProfiles
    uid: '@azure/arm-network.NspLinkReferenceProperties.localOutboundProfiles'
    package: '@azure/arm-network'
    summary: >-
      Local Outbound profile names from which Outbound is allowed. In current
      version, it is readonly property and it's value is set to ['*'] to allow
      outbound from all profiles. In later version, user will be able to modify
      it.
    fullName: localOutboundProfiles
    remarks: ''
    isDeprecated: false
    syntax:
      content: 'localOutboundProfiles?: string[]'
      return:
        description: ''
        type: string[]
  - name: provisioningState
    uid: '@azure/arm-network.NspLinkReferenceProperties.provisioningState'
    package: '@azure/arm-network'
    summary: The provisioning state of the NSP LinkReference resource.
    fullName: provisioningState
    remarks: ''
    isDeprecated: false
    syntax:
      content: 'provisioningState?: string'
      return:
        description: ''
        type: string
  - name: remoteInboundProfiles
    uid: '@azure/arm-network.NspLinkReferenceProperties.remoteInboundProfiles'
    package: '@azure/arm-network'
    summary: >-
      Remote Inbound profile names to which Inbound is allowed. ['*'] value
      implies inbound is allowed to all profiles at remote perimeter. This
      property can only be updated from corresponding link resource present in
      remote perimeter.
    fullName: remoteInboundProfiles
    remarks: ''
    isDeprecated: false
    syntax:
      content: 'remoteInboundProfiles?: string[]'
      return:
        description: ''
        type: string[]
  - name: remoteOutboundProfiles
    uid: '@azure/arm-network.NspLinkReferenceProperties.remoteOutboundProfiles'
    package: '@azure/arm-network'
    summary: >-
      Remote Outbound profile names from which Outbound is allowed. ['*'] value
      implies outbound is allowed from all profiles at remote perimeter. This
      property can only be updated from corresponding link resource present in
      remote perimeter.
    fullName: remoteOutboundProfiles
    remarks: ''
    isDeprecated: false
    syntax:
      content: 'remoteOutboundProfiles?: string[]'
      return:
        description: ''
        type: string[]
  - name: remotePerimeterGuid
    uid: '@azure/arm-network.NspLinkReferenceProperties.remotePerimeterGuid'
    package: '@azure/arm-network'
    summary: Remote NSP Guid with which the link is created.
    fullName: remotePerimeterGuid
    remarks: ''
    isDeprecated: false
    syntax:
      content: 'remotePerimeterGuid?: string'
      return:
        description: ''
        type: string
  - name: remotePerimeterLocation
    uid: '@azure/arm-network.NspLinkReferenceProperties.remotePerimeterLocation'
    package: '@azure/arm-network'
    summary: Remote NSP location with which the link gets created.
    fullName: remotePerimeterLocation
    remarks: ''
    isDeprecated: false
    syntax:
      content: 'remotePerimeterLocation?: string'
      return:
        description: ''
        type: string
  - name: remotePerimeterResourceId
    uid: '@azure/arm-network.NspLinkReferenceProperties.remotePerimeterResourceId'
    package: '@azure/arm-network'
    summary: Perimeter ARM Id for the remote NSP with which the link is created.
    fullName: remotePerimeterResourceId
    remarks: ''
    isDeprecated: false
    syntax:
      content: 'remotePerimeterResourceId?: string'
      return:
        description: ''
        type: string
  - name: status
    uid: '@azure/arm-network.NspLinkReferenceProperties.status'
    package: '@azure/arm-network'
    summary: >-
      The NSP linkReference state. It cannot be changed if link is created in
      auto-approval mode.
    fullName: status
    remarks: ''
    isDeprecated: false
    syntax:
      content: 'status?: string'
      return:
        description: ''
        type: string
