### YamlMime:TSType
name: RedirectPolicyOptions
uid: '@azure/core-rest-pipeline.RedirectPolicyOptions'
package: '@azure/core-rest-pipeline'
summary: Options for how redirect responses are handled.
fullName: RedirectPolicyOptions
remarks: ''
isDeprecated: false
type: interface
properties:
  - name: allowCrossOriginRedirects
    uid: '@azure/core-rest-pipeline.RedirectPolicyOptions.allowCrossOriginRedirects'
    package: '@azure/core-rest-pipeline'
    summary: |-
      Whether to follow redirects to a different origin (scheme + host + port).
      When false (the default), cross-origin redirects are not followed and the
      redirect response is returned directly to the caller.
      Defaults to false.
    fullName: allowCrossOriginRedirects
    remarks: ''
    isDeprecated: false
    syntax:
      content: 'allowCrossOriginRedirects?: boolean'
      return:
        description: ''
        type: boolean
  - name: maxRetries
    uid: '@azure/core-rest-pipeline.RedirectPolicyOptions.maxRetries'
    package: '@azure/core-rest-pipeline'
    summary: |-
      The maximum number of times the redirect URL will be tried before
      failing.  Defaults to 20.
    fullName: maxRetries
    remarks: ''
    isDeprecated: false
    syntax:
      content: 'maxRetries?: number'
      return:
        description: ''
        type: number
