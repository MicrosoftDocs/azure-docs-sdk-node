name: ClusterMeshState
uid: '@azure/arm-containerservicefleet.ClusterMeshState'
package: '@azure/arm-containerservicefleet'
summary: >-
  Cluster mesh state. \

  [KnownClusterMeshState](xref:@azure/arm-containerservicefleet.KnownClusterMeshState)
  can be used interchangeably with ClusterMeshState,
   this enum contains the known values that the service supports.
  ### Known values supported by the service

  **NotConnected**: The mesh is not connected. \

  **Applying**: The mesh is applying. \

  **Connected**: The mesh is connected. \

  **Degraded**: The mesh is degraded. \

  **Failed**: The mesh failed to connect.
