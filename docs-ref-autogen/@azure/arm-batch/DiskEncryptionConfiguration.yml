### YamlMime:TSType
name: DiskEncryptionConfiguration
uid: '@azure/arm-batch.DiskEncryptionConfiguration'
package: '@azure/arm-batch'
summary: >-
  The disk encryption configuration applied on compute nodes in the pool. Disk
  encryption configuration is not supported on Linux pool created with Virtual
  Machine Image or Azure Compute Gallery Image.
fullName: DiskEncryptionConfiguration
remarks: ''
isDeprecated: false
type: interface
properties:
  - name: customerManagedKey
    uid: '@azure/arm-batch.DiskEncryptionConfiguration.customerManagedKey'
    package: '@azure/arm-batch'
    summary: >-
      Customer Managed Key will encrypt OS Disk by EncryptionAtRest, and by
      default we will encrypt the data disk as well. It can be used only when
      the pool is configured with an identity and OsDisk is set as one of the
      targets of DiskEncryption.
    fullName: customerManagedKey
    remarks: ''
    isDeprecated: false
    syntax:
      content: 'customerManagedKey?: DiskCustomerManagedKey'
      return:
        description: ''
        type: <xref uid="@azure/arm-batch.DiskCustomerManagedKey" />
  - name: targets
    uid: '@azure/arm-batch.DiskEncryptionConfiguration.targets'
    package: '@azure/arm-batch'
    summary: >-
      On Linux pool, only "TemporaryDisk" is supported; on Windows pool,
      "OsDisk" and "TemporaryDisk" must be specified.
    fullName: targets
    remarks: ''
    isDeprecated: false
    syntax:
      content: 'targets?: DiskEncryptionTarget[]'
      return:
        description: ''
        type: <xref uid="@azure/arm-batch.DiskEncryptionTarget" />[]
