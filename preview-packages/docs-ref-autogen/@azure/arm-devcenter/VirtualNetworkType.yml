name: VirtualNetworkType
uid: '@azure/arm-devcenter.VirtualNetworkType'
package: '@azure/arm-devcenter'
summary: >-
  Indicates a pool uses a Virtual Network managed by Microsoft (Managed), or a
  customer provided Network (Unmanaged). \

  [KnownVirtualNetworkType](xref:@azure/arm-devcenter.KnownVirtualNetworkType)
  can be used interchangeably with VirtualNetworkType,
   this enum contains the known values that the service supports.
  ### Known values supported by the service

  **Managed**: Virtual Network is managed by Microsoft. \

  **Unmanaged**: Virtual Network is managed by user.
fullName: VirtualNetworkType
remarks: ''
isDeprecated: false
syntax: |
  type VirtualNetworkType = string
