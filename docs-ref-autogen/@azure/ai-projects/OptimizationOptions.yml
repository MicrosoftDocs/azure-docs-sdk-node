### YamlMime:TSType
name: OptimizationOptions
uid: '@azure/ai-projects.OptimizationOptions'
package: '@azure/ai-projects'
summary: Tuning knobs and run-mode for an optimization job.
fullName: OptimizationOptions
remarks: ''
isDeprecated: false
type: interface
properties:
  - name: evaluation_level
    uid: '@azure/ai-projects.OptimizationOptions.evaluation_level'
    package: '@azure/ai-projects'
    summary: >-
      Evaluation granularity. Null/omitted means per-item single-turn. Set to
      'conversation' for per-conversation multi-turn simulation scoring.
    fullName: evaluation_level
    remarks: ''
    isDeprecated: false
    syntax:
      content: 'evaluation_level?: EvaluationLevel'
      return:
        description: ''
        type: <xref uid="@azure/ai-projects.EvaluationLevel" />
  - name: eval_model
    uid: '@azure/ai-projects.OptimizationOptions.eval_model'
    package: '@azure/ai-projects'
    summary: >-
      Model deployment used for evaluation. Defaults to server config (typically
      'gpt-4o').
    fullName: eval_model
    remarks: ''
    isDeprecated: false
    syntax:
      content: 'eval_model?: string'
      return:
        description: ''
        type: string
  - name: max_candidates
    uid: '@azure/ai-projects.OptimizationOptions.max_candidates'
    package: '@azure/ai-projects'
    summary: >-
      Maximum number of optimization candidates to generate. Must be >= 1.
      Default: 5.
    fullName: max_candidates
    remarks: ''
    isDeprecated: false
    syntax:
      content: 'max_candidates?: number'
      return:
        description: ''
        type: number
  - name: optimization_config
    uid: '@azure/ai-projects.OptimizationOptions.optimization_config'
    package: '@azure/ai-projects'
    summary: >-
      Per-target-attribute configuration overrides. Contains skills, tools,
      system_prompt for the agent, plus model space for model optimization.
    fullName: optimization_config
    remarks: ''
    isDeprecated: false
    syntax:
      content: 'optimization_config?: Record<string, any>'
      return:
        description: ''
        type: Record&lt;string, any&gt;
  - name: optimization_model
    uid: '@azure/ai-projects.OptimizationOptions.optimization_model'
    package: '@azure/ai-projects'
    summary: >-
      Model deployment for optimization reasoning (must be gpt-5 family). Falls
      back to the default eval model when not set.
    fullName: optimization_model
    remarks: ''
    isDeprecated: false
    syntax:
      content: 'optimization_model?: string'
      return:
        description: ''
        type: string
