### YamlMime:TSTypeAlias
name: OnboardingState
uid: '@azure/arm-security.OnboardingState'
package: '@azure/arm-security'
summary: >-
  Details about resource onboarding status across all connectors.


  OnboardedByOtherConnector - this resource has already been onboarded to
  another connector. This is only applicable to top-level resources.

  Onboarded - this resource has already been onboarded by the specified
  connector.

  NotOnboarded - this resource has not been onboarded to any connector.

  NotApplicable - the onboarding state is not applicable to the current
  endpoint. \

  [KnownOnboardingState](xref:@azure/arm-security.KnownOnboardingState) can be
  used interchangeably with OnboardingState,
   this enum contains the known values that the service supports.
  ### Known values supported by the service

  **NotApplicable**: NotApplicable \

  **OnboardedByOtherConnector**: OnboardedByOtherConnector \

  **Onboarded**: Onboarded \

  **NotOnboarded**: NotOnboarded
fullName: OnboardingState
remarks: ''
isDeprecated: false
syntax: |
  type OnboardingState = string
