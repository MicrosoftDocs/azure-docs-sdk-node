### YamlMime:TSEnum
name: KnownClusterUpdateVersionSafeguardMode
uid: '@azure/arm-networkcloud.KnownClusterUpdateVersionSafeguardMode'
package: '@azure/arm-networkcloud'
summary: >-
  ClusterUpdateVersionSafeguardMode represents the mode of the cluster update
  safeguards.
fullName: KnownClusterUpdateVersionSafeguardMode
remarks: ''
isDeprecated: false
fields:
  - name: All
    uid: '@azure/arm-networkcloud.KnownClusterUpdateVersionSafeguardMode.All'
    package: '@azure/arm-networkcloud'
    summary: >-
      Run all pre‑operation validation checks before performing the version
      update. If any check fails, the request is rejected and no changes are
      made.
  - name: None
    uid: '@azure/arm-networkcloud.KnownClusterUpdateVersionSafeguardMode.None'
    package: '@azure/arm-networkcloud'
    summary: >-
      Skip all safeguards and perform the version update without running
      pre‑operation validation checks.
