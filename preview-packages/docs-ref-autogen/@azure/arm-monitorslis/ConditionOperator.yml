### YamlMime:TSTypeAlias
name: ConditionOperator
uid: '@azure/arm-monitorslis.ConditionOperator'
package: '@azure/arm-monitorslis'
summary: >-
  Defines operators used in filter conditions. \

  [KnownConditionOperator](xref:@azure/arm-monitorslis.KnownConditionOperator)
  can be used interchangeably with ConditionOperator,
   this enum contains the known values that the service supports.
  ### Known values supported by the service

  **==**: Equal to. \

  **!=**: Not equal to. \

  **<**: Less than. \

  **<=**: Less than or equal to. \

  **>**: Greater than. \

  **>=**: Greater than or equal to. \

  **@in**: In operator. \

  **!in**: Not in. \

  **startswith**: Starts with. \

  **!startswith**: Does not start with. \

  **contains**: Contains the value. \

  **!contains**: Does not contain the value.
fullName: ConditionOperator
remarks: ''
isDeprecated: false
syntax: |
  type ConditionOperator = string
