name: NetezzaSecurityLevelType
uid: '@azure/arm-datafactory.NetezzaSecurityLevelType'
package: '@azure/arm-datafactory'
summary: >-
  Specifies the security level for the driver connection to the data store.
  PreferredUnSecured : prefer unsecured, allow fallback to secured connection if
  required. OnlyUnSecured : strictly unsecured, no fallback. \

  [KnownNetezzaSecurityLevelType](xref:@azure/arm-datafactory.KnownNetezzaSecurityLevelType)
  can be used interchangeably with NetezzaSecurityLevelType,
   this enum contains the known values that the service supports.
  ### Known values supported by the service

  **PreferredUnSecured**: PreferredUnSecured \

  **OnlyUnSecured**: OnlyUnSecured
fullName: NetezzaSecurityLevelType
remarks: ''
isDeprecated: false
syntax: |
  type NetezzaSecurityLevelType = string
