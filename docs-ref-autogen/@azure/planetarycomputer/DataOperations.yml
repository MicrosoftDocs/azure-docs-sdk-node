  - name: getIntervalLegend
    uid: '@azure/planetarycomputer.DataOperations.getIntervalLegend'
    package: '@azure/planetarycomputer'
    summary: >-
      Generate values and color swatches mapping for a given interval classmap.


      Returns a color map for intervals, where each interval is defined by

      a numeric range [min, max] representing the interval boundaries and

      an RGBA color [red, green, blue, alpha] associated with the interval.


      The response is a 2D array of interval definitions, where each element is
      a pair:

      the first element is an array of two numbers [min, max] defining the
      interval,

      and the second element is an array of four numbers [red, green, blue,
      alpha] defining the RGBA color.


      Example: [[ [-2, 0], [0, 0, 0, 0] ], [ [1, 32], [255, 255, 178, 255] ]].

