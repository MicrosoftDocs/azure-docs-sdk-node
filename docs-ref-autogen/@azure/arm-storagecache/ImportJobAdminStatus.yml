name: ImportJobAdminStatus
uid: '@azure/arm-storagecache.ImportJobAdminStatus'
package: '@azure/arm-storagecache'
summary: >-
  The administrative status of the import job. Possible values: 'Active',
  'Cancel'. Passing in a value of 'Cancel' will cancel the current active import
  job. By default it is set to 'Active'. \

  [KnownImportJobAdminStatus](xref:@azure/arm-storagecache.KnownImportJobAdminStatus)
  can be used interchangeably with ImportJobAdminStatus,
   this enum contains the known values that the service supports.
  ### Known values supported by the service

  **Active**: Active \

  **Cancel**: Cancel
fullName: ImportJobAdminStatus
remarks: ''
isDeprecated: false
syntax: |
  type ImportJobAdminStatus = string
