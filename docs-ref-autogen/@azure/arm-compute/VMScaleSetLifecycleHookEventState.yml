name: VMScaleSetLifecycleHookEventState
uid: '@azure/arm-compute.VMScaleSetLifecycleHookEventState'
package: '@azure/arm-compute'
summary: >-
  The states that a virtual machine scale set lifecycle hook event can be in.
  This is not settable by the customer. It is set only by the platform. \

  [KnownVMScaleSetLifecycleHookEventState](xref:@azure/arm-compute.KnownVMScaleSetLifecycleHookEventState)
  can be used interchangeably with VMScaleSetLifecycleHookEventState,
   this enum contains the known values that the service supports.
  ### Known values supported by the service

  **Active**: The lifecycle hook event is active. E.g., waiting on a response
  from the customer. \

  **Completed**: The lifecycle hook event is completed. i.e., all the target
  resources in the event have moved to a terminal state.
fullName: VMScaleSetLifecycleHookEventState
remarks: ''
isDeprecated: false
syntax: |
  type VMScaleSetLifecycleHookEventState = string
