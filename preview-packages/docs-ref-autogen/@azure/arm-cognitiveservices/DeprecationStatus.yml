### YamlMime:TSTypeAlias
name: DeprecationStatus
uid: '@azure/arm-cognitiveservices.DeprecationStatus'
package: '@azure/arm-cognitiveservices'
summary: >-
  Indicates whether the deprecation date is a confirmed planned end-of-life date
  or an estimated deprecation date. When 'Planned', the deprecation date
  represents a confirmed and communicated model end-of-life date. When
  'Tentative', the deprecation date is an estimated timeline that may be subject
  to change. \

  [KnownDeprecationStatus](xref:@azure/arm-cognitiveservices.KnownDeprecationStatus)
  can be used interchangeably with DeprecationStatus,
   this enum contains the known values that the service supports.
  ### Known values supported by the service

  **Planned** \

  **Tentative**
fullName: DeprecationStatus
remarks: ''
isDeprecated: false
syntax: |
  type DeprecationStatus = string
