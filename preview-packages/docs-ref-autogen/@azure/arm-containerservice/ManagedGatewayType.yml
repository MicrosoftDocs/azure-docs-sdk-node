### YamlMime:TSTypeAlias
name: ManagedGatewayType
uid: '@azure/arm-containerservice.ManagedGatewayType'
package: '@azure/arm-containerservice'
summary: >-
  Configuration for the managed Gateway API installation. If not specified, the
  default is 'Disabled'. See https://aka.ms/k8s-gateway-api for more details. \

  [KnownManagedGatewayType](xref:@azure/arm-containerservice.KnownManagedGatewayType)
  can be used interchangeably with ManagedGatewayType,
   this enum contains the known values that the service supports.
  ### Known values supported by the service

  **Disabled**: Gateway API CRDs will not be reconciled on your cluster. \

  **Standard**: Gateway API CRDs from the standard release channel will be
  reconciled onto your cluster. See https://aka.ms/gateway-api-versions to see
  which bundle will be installed for your Kubernetes version.
fullName: ManagedGatewayType
remarks: ''
isDeprecated: false
syntax: |
  type ManagedGatewayType = string
