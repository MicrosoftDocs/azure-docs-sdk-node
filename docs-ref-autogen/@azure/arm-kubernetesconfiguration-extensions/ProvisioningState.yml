name: ProvisioningState
uid: '@azure/arm-kubernetesconfiguration-extensions.ProvisioningState'
package: '@azure/arm-kubernetesconfiguration-extensions'
summary: >-
  The provisioning state of the resource. \

  [KnownProvisioningState](xref:@azure/arm-kubernetesconfiguration-extensions.KnownProvisioningState)
  can be used interchangeably with ProvisioningState,
   this enum contains the known values that the service supports.
  ### Known values supported by the service

  **Succeeded**: Resource has been created. \

  **Failed**: Resource creation failed. \

  **Canceled**: Resource creation was canceled. \

  **Creating**: Resource is being created. \

  **Updating**: Resource is being updated. \

  **Deleting**: Resource is being deleted.
