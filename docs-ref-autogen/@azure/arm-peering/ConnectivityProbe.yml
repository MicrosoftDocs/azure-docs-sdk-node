### YamlMime:TSType
name: ConnectivityProbe
uid: '@azure/arm-peering.ConnectivityProbe'
package: '@azure/arm-peering'
summary: >-
  Represents a connectivity probe, a configuration peers can add to direct and
  exchange peerings to create ping tests. These ping

  tests will allow us to generate availability, jitter, and latency data for
  traffic (using ICMP or TCP) from Azure to an endpoint

  IP address given by the customer. This data will be emitted such that the peer
  can view these metrics in the Azure portal in the

  Connectivity probe blade of their peering.
fullName: ConnectivityProbe
remarks: ''
isDeprecated: false
type: interface
properties:
  - name: azureRegion
    uid: '@azure/arm-peering.ConnectivityProbe.azureRegion'
    package: '@azure/arm-peering'
    summary: >-
      The Azure region where traffic will originate from for the connectivity
      probe.
    fullName: azureRegion
    remarks: ''
    isDeprecated: false
    syntax:
      content: 'azureRegion?: string'
      return:
        description: ''
        type: string
  - name: endpoint
    uid: '@azure/arm-peering.ConnectivityProbe.endpoint'
    package: '@azure/arm-peering'
    summary: >-
      The endpoint IP address where traffic will be sent to from Azure for the
      connectivity probe.
    fullName: endpoint
    remarks: ''
    isDeprecated: false
    syntax:
      content: 'endpoint?: string'
      return:
        description: ''
        type: string
  - name: prefixesToAccesslist
    uid: '@azure/arm-peering.ConnectivityProbe.prefixesToAccesslist'
    package: '@azure/arm-peering'
    summary: >-
      Set to contain the prefixes that agents in Azure will send traffic from.
      For peers to allow into their

      network the connectivity probe traffic can reach their endpoint for the
      connectivity probe.
    fullName: prefixesToAccesslist
    remarks: ''
    isDeprecated: false
    syntax:
      content: 'prefixesToAccesslist?: string[]'
      return:
        description: ''
        type: string[]
  - name: protocol
    uid: '@azure/arm-peering.ConnectivityProbe.protocol'
    package: '@azure/arm-peering'
    summary: The protocol of the traffic that will be sent for the connectivity probe.
    fullName: protocol
    remarks: ''
    isDeprecated: false
    syntax:
      content: 'protocol?: string'
      return:
        description: ''
        type: string
