### YamlMime:TSTypeAlias
name: EscalationStatus
uid: '@azure/arm-support.EscalationStatus'
package: '@azure/arm-support'
summary: >-
  Status of Direct Connect Escalation. \

  [KnownEscalationStatus](xref:@azure/arm-support.KnownEscalationStatus) can be
  used interchangeably with EscalationStatus,
   this enum contains the known values that the service supports.
  ### Known values supported by the service

  **EscalationAvailable**: Escalation is available and uninitiated \

  **EscalationInitiated**: Escalation is unavailable and has been initiated \

  **EscalationProcessed**: Escalation is unavailable and has finished processing
  after being initiated \

  **EscalationUnsupported**: Escalation is unavailable and cannot be initiated
  due to direct escalation being unsupported on this product or topic \

  **EscalationUnavailable**: Escalation is unavailable and cannot be initiated
  due to customer not being enrolled to direct escalation
fullName: EscalationStatus
remarks: ''
isDeprecated: false
syntax: |
  type EscalationStatus = string
