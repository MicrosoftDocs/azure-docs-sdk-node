name: FailoverModeType
uid: '@azure/arm-sql.FailoverModeType'
package: '@azure/arm-sql'
summary: >-
  The link failover mode - can be Manual if intended to be used for two-way
  failover with a supported SQL Server, or None for one-way failover to Azure. \

  [KnownFailoverModeType](xref:@azure/arm-sql.KnownFailoverModeType) can be used
  interchangeably with FailoverModeType,
   this enum contains the known values that the service supports.
  ### Known values supported by the service

  **None**: None \

  **Manual**: Manual
fullName: FailoverModeType
remarks: ''
isDeprecated: false
syntax: |
  type FailoverModeType = string
