### YamlMime:TSType
name: Condition
uid: '@azure/arm-monitor.Condition'
package: '@azure/arm-monitor'
summary: A condition of the scheduled query rule.
fullName: Condition
remarks: ''
isDeprecated: false
type: interface
properties:
  - name: alertSensitivity
    uid: '@azure/arm-monitor.Condition.alertSensitivity'
    package: '@azure/arm-monitor'
    summary: >-
      The extent of deviation required to trigger an alert. Allowed values are
      'Low', 'Medium' and 'High'. This will affect how tight the threshold is to
      the metric series pattern. Relevant only for dynamic threshold rules of
      the kind LogAlert.
    fullName: alertSensitivity
    remarks: ''
    isDeprecated: false
    syntax:
      content: 'alertSensitivity?: string'
      return:
        description: ''
        type: string
  - name: criterionType
    uid: '@azure/arm-monitor.Condition.criterionType'
    package: '@azure/arm-monitor'
    summary: Specifies the type of threshold criteria
    fullName: criterionType
    remarks: ''
    isDeprecated: false
    syntax:
      content: 'criterionType?: string'
      return:
        description: ''
        type: string
  - name: dimensions
    uid: '@azure/arm-monitor.Condition.dimensions'
    package: '@azure/arm-monitor'
    summary: List of Dimensions conditions
    fullName: dimensions
    remarks: ''
    isDeprecated: false
    syntax:
      content: 'dimensions?: Dimension[]'
      return:
        description: ''
        type: <xref uid="@azure/arm-monitor.Dimension" />[]
  - name: failingPeriods
    uid: '@azure/arm-monitor.Condition.failingPeriods'
    package: '@azure/arm-monitor'
    summary: >-
      The minimum number of violations required within the selected lookback
      time window required to raise an alert. Relevant only for rules of the
      kind LogAlert.
    fullName: failingPeriods
    remarks: ''
    isDeprecated: false
    syntax:
      content: 'failingPeriods?: ConditionFailingPeriods'
      return:
        description: ''
        type: <xref uid="@azure/arm-monitor.ConditionFailingPeriods" />
  - name: ignoreDataBefore
    uid: '@azure/arm-monitor.Condition.ignoreDataBefore'
    package: '@azure/arm-monitor'
    summary: >-
      Use this option to set the date from which to start learning the metric
      historical data and calculate the dynamic thresholds (in ISO8601 format).
      Relevant only for dynamic threshold rules of the kind LogAlert.
    fullName: ignoreDataBefore
    remarks: ''
    isDeprecated: false
    syntax:
      content: 'ignoreDataBefore?: Date'
      return:
        description: ''
        type: Date
  - name: metricMeasureColumn
    uid: '@azure/arm-monitor.Condition.metricMeasureColumn'
    package: '@azure/arm-monitor'
    summary: >-
      The column containing the metric measure number. Relevant only for rules
      of the kind LogAlert.
    fullName: metricMeasureColumn
    remarks: ''
    isDeprecated: false
    syntax:
      content: 'metricMeasureColumn?: string'
      return:
        description: ''
        type: string
  - name: metricName
    uid: '@azure/arm-monitor.Condition.metricName'
    package: '@azure/arm-monitor'
    summary: >-
      The name of the metric to be sent. Relevant and required only for rules of
      the kind LogToMetric.
    fullName: metricName
    remarks: ''
    isDeprecated: false
    syntax:
      content: 'metricName?: string'
      return:
        description: ''
        type: string
  - name: minRecurrenceCount
    uid: '@azure/arm-monitor.Condition.minRecurrenceCount'
    package: '@azure/arm-monitor'
    summary: >-
      The minimum results count that should be found for triggering an alert.
      Relevant only for rules of the kind SimpleLogAlert.
    fullName: minRecurrenceCount
    remarks: ''
    isDeprecated: false
    syntax:
      content: 'minRecurrenceCount?: number'
      return:
        description: ''
        type: number
  - name: operator
    uid: '@azure/arm-monitor.Condition.operator'
    package: '@azure/arm-monitor'
    summary: >-
      The criteria operator. Relevant and required only for rules of the kind
      LogAlert.
    fullName: operator
    remarks: ''
    isDeprecated: false
    syntax:
      content: 'operator?: string'
      return:
        description: ''
        type: string
  - name: query
    uid: '@azure/arm-monitor.Condition.query'
    package: '@azure/arm-monitor'
    summary: Log query alert
    fullName: query
    remarks: ''
    isDeprecated: false
    syntax:
      content: 'query?: string'
      return:
        description: ''
        type: string
  - name: resourceIdColumn
    uid: '@azure/arm-monitor.Condition.resourceIdColumn'
    package: '@azure/arm-monitor'
    summary: >-
      The column containing the resource id. The content of the column must be a
      uri formatted as resource id. Relevant only for rules of the kind
      LogAlert.
    fullName: resourceIdColumn
    remarks: ''
    isDeprecated: false
    syntax:
      content: 'resourceIdColumn?: string'
      return:
        description: ''
        type: string
  - name: threshold
    uid: '@azure/arm-monitor.Condition.threshold'
    package: '@azure/arm-monitor'
    summary: >-
      the criteria threshold value that activates the alert. Relevant and
      required only for static threshold rules of the kind LogAlert.
    fullName: threshold
    remarks: ''
    isDeprecated: false
    syntax:
      content: 'threshold?: number'
      return:
        description: ''
        type: number
  - name: timeAggregation
    uid: '@azure/arm-monitor.Condition.timeAggregation'
    package: '@azure/arm-monitor'
    summary: >-
      Aggregation type. Relevant and required only for rules of the kind
      LogAlert.
    fullName: timeAggregation
    remarks: ''
    isDeprecated: false
    syntax:
      content: 'timeAggregation?: string'
      return:
        description: ''
        type: string
