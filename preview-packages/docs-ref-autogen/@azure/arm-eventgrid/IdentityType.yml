### YamlMime:TSTypeAlias
name: IdentityType
uid: '@azure/arm-eventgrid.IdentityType'
package: '@azure/arm-eventgrid'
summary: >-
  The type of managed identity used. The type 'SystemAssigned, UserAssigned'
  includes both an implicitly created identity and a set of user-assigned
  identities. The type 'None' will remove any identity. \

  [KnownIdentityType](xref:@azure/arm-eventgrid.KnownIdentityType) can be used
  interchangeably with IdentityType,
   this enum contains the known values that the service supports.
  ### Known values supported by the service

  **None**: None \

  **SystemAssigned**: SystemAssigned \

  **UserAssigned**: UserAssigned \

  **SystemAssigned, UserAssigned**: SystemAssigned, UserAssigned
fullName: IdentityType
remarks: ''
isDeprecated: false
syntax: |
  type IdentityType = string
