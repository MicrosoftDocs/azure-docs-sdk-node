name: LifecycleHookActionState
uid: '@azure/arm-compute.LifecycleHookActionState'
package: '@azure/arm-compute'
summary: >-
  Approval status of a target resource in a virtual machine scale set lifecycle
  hook event. \

  [KnownLifecycleHookActionState](xref:@azure/arm-compute.KnownLifecycleHookActionState)
  can be used interchangeably with LifecycleHookActionState,
   this enum contains the known values that the service supports.
  ### Known values supported by the service

  **Waiting**: The lifecycle hook for the target resource is waiting for
  approval. \

  **Approved**: The lifecycle hook for the target resource is approved. \

  **Rejected**: The lifecycle hook for the target resource is rejected.
fullName: LifecycleHookActionState
remarks: ''
isDeprecated: false
syntax: |
  type LifecycleHookActionState = string
