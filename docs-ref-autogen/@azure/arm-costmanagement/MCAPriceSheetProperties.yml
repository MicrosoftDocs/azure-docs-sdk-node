  - name: unitPrice
    uid: '@azure/arm-costmanagement.MCAPriceSheetProperties.unitPrice'
    package: '@azure/arm-costmanagement'
    summary: >-
      The per-unit price at the time of billing for a given product or service,
      inclusive of any negotiated discounts on top of the market price.


      For PriceType ReservedInstance, unit price reflects the total cost of the
      1 or 3-year commitment including discounts.


      Note: The unit price isn't the same as the effective price in usage
      details downloads when services have differential prices across tiers.


      If services have multi-tiered pricing, the effective price is a blended
      rate across the tiers and doesn't show a tier-specific unit price. The
      blended price or effective price is the net price for the consumed
      quantity spanning across the multiple tiers (where each tier has a
      specific unit price).
    fullName: unitPrice
    remarks: ''
    isDeprecated: false
    syntax:
      content: 'unitPrice?: string'
      return:
        description: ''
        type: string
