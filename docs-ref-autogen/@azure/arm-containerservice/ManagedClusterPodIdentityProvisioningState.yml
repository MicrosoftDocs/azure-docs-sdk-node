name: ManagedClusterPodIdentityProvisioningState
uid: '@azure/arm-containerservice.ManagedClusterPodIdentityProvisioningState'
package: '@azure/arm-containerservice'
summary: >-
  The current provisioning state of the pod identity. \

  [KnownManagedClusterPodIdentityProvisioningState](xref:@azure/arm-containerservice.KnownManagedClusterPodIdentityProvisioningState)
  can be used interchangeably with ManagedClusterPodIdentityProvisioningState,
   this enum contains the known values that the service supports.
  ### Known values supported by the service

  **Assigned**: Pod identity is assigned. \

  **Canceled**: Pod identity assignment was canceled. \

  **Deleting**: Pod identity is being deleted. \

  **Failed**: Pod identity assignment failed. \

  **Succeeded**: Pod identity assignment succeeded. \

  **Updating**: Pod identity is being updated.
