### YamlMime:TSType
name: PrestoLinkedServiceTypeProperties
uid: '@azure/arm-datafactory.PrestoLinkedServiceTypeProperties'
package: '@azure/arm-datafactory'
summary: Presto server linked service properties.
fullName: PrestoLinkedServiceTypeProperties
remarks: ''
isDeprecated: false
type: interface
properties:
  - name: allowHostNameCNMismatch
    uid: >-
      @azure/arm-datafactory.PrestoLinkedServiceTypeProperties.allowHostNameCNMismatch
    package: '@azure/arm-datafactory'
    summary: >-
      Specifies whether to require a CA-issued SSL certificate name to match the
      host name of the server when connecting over SSL. The default value is
      false. Only used for Version 1.0.
    fullName: allowHostNameCNMismatch
    remarks: ''
    isDeprecated: false
    syntax:
      content: 'allowHostNameCNMismatch?: any'
      return:
        description: ''
        type: any
  - name: allowSelfSignedServerCert
    uid: >-
      @azure/arm-datafactory.PrestoLinkedServiceTypeProperties.allowSelfSignedServerCert
    package: '@azure/arm-datafactory'
    summary: >-
      Specifies whether to allow self-signed certificates from the server. The
      default value is false. Only used for Version 1.0.
    fullName: allowSelfSignedServerCert
    remarks: ''
    isDeprecated: false
    syntax:
      content: 'allowSelfSignedServerCert?: any'
      return:
        description: ''
        type: any
  - name: authenticationType
    uid: >-
      @azure/arm-datafactory.PrestoLinkedServiceTypeProperties.authenticationType
    package: '@azure/arm-datafactory'
    summary: The authentication mechanism used to connect to the Presto server.
    fullName: authenticationType
    remarks: ''
    isDeprecated: false
    syntax:
      content: 'authenticationType: string'
      return:
        description: ''
        type: string
  - name: catalog
    uid: '@azure/arm-datafactory.PrestoLinkedServiceTypeProperties.catalog'
    package: '@azure/arm-datafactory'
    summary: The catalog context for all request against the server.
    fullName: catalog
    remarks: ''
    isDeprecated: false
    syntax:
      content: 'catalog: any'
      return:
        description: ''
        type: any
  - name: enableServerCertificateValidation
    uid: >-
      @azure/arm-datafactory.PrestoLinkedServiceTypeProperties.enableServerCertificateValidation
    package: '@azure/arm-datafactory'
    summary: >-
      Specifies whether the connections to the server will validate server
      certificate, the default value is True. Only used for Version 2.0
    fullName: enableServerCertificateValidation
    remarks: ''
    isDeprecated: false
    syntax:
      content: 'enableServerCertificateValidation?: any'
      return:
        description: ''
        type: any
  - name: enableSsl
    uid: '@azure/arm-datafactory.PrestoLinkedServiceTypeProperties.enableSsl'
    package: '@azure/arm-datafactory'
    summary: >-
      Specifies whether the connections to the server are encrypted using SSL.
      The default value for legacy version is False. The default value for
      version 2.0 is True.
    fullName: enableSsl
    remarks: ''
    isDeprecated: false
    syntax:
      content: 'enableSsl?: any'
      return:
        description: ''
        type: any
  - name: encryptedCredential
    uid: >-
      @azure/arm-datafactory.PrestoLinkedServiceTypeProperties.encryptedCredential
    package: '@azure/arm-datafactory'
    summary: >-
      The encrypted credential used for authentication. Credentials are
      encrypted using the integration runtime credential manager. Type: string.
    fullName: encryptedCredential
    remarks: ''
    isDeprecated: false
    syntax:
      content: 'encryptedCredential?: string'
      return:
        description: ''
        type: string
  - name: host
    uid: '@azure/arm-datafactory.PrestoLinkedServiceTypeProperties.host'
    package: '@azure/arm-datafactory'
    summary: The IP address or host name of the Presto server. (i.e. 192.168.222.160)
    fullName: host
    remarks: ''
    isDeprecated: false
    syntax:
      content: 'host: any'
      return:
        description: ''
        type: any
  - name: password
    uid: '@azure/arm-datafactory.PrestoLinkedServiceTypeProperties.password'
    package: '@azure/arm-datafactory'
    summary: The password corresponding to the user name.
    fullName: password
    remarks: ''
    isDeprecated: false
    syntax:
      content: 'password?: SecretBaseUnion'
      return:
        description: ''
        type: <xref uid="@azure/arm-datafactory.SecretBaseUnion" />
  - name: port
    uid: '@azure/arm-datafactory.PrestoLinkedServiceTypeProperties.port'
    package: '@azure/arm-datafactory'
    summary: >-
      The TCP port that the Presto server uses to listen for client connections.
      The default value is 8080 when disable SSL, default value is 443 when
      enable SSL.
    fullName: port
    remarks: ''
    isDeprecated: false
    syntax:
      content: 'port?: any'
      return:
        description: ''
        type: any
  - name: serverVersion
    uid: '@azure/arm-datafactory.PrestoLinkedServiceTypeProperties.serverVersion'
    package: '@azure/arm-datafactory'
    summary: >-
      The version of the Presto server. (i.e. 0.148-t) Only used for Version
      1.0.
    fullName: serverVersion
    remarks: ''
    isDeprecated: false
    syntax:
      content: 'serverVersion?: any'
      return:
        description: ''
        type: any
  - name: timeZoneID
    uid: '@azure/arm-datafactory.PrestoLinkedServiceTypeProperties.timeZoneID'
    package: '@azure/arm-datafactory'
    summary: >-
      The local time zone used by the connection. Valid values for this option
      are specified in the IANA Time Zone Database. The default value for
      Version 1.0 is the client system time zone. The default value for Version
      2.0 is server system timeZone
    fullName: timeZoneID
    remarks: ''
    isDeprecated: false
    syntax:
      content: 'timeZoneID?: any'
      return:
        description: ''
        type: any
  - name: trustedCertPath
    uid: '@azure/arm-datafactory.PrestoLinkedServiceTypeProperties.trustedCertPath'
    package: '@azure/arm-datafactory'
    summary: >-
      The full path of the .pem file containing trusted CA certificates for
      verifying the server when connecting over SSL. This property can only be
      set when using SSL on self-hosted IR. The default value is the cacerts.pem
      file installed with the IR. Only used for Version 1.0.
    fullName: trustedCertPath
    remarks: ''
    isDeprecated: false
    syntax:
      content: 'trustedCertPath?: any'
      return:
        description: ''
        type: any
  - name: username
    uid: '@azure/arm-datafactory.PrestoLinkedServiceTypeProperties.username'
    package: '@azure/arm-datafactory'
    summary: The user name used to connect to the Presto server.
    fullName: username
    remarks: ''
    isDeprecated: false
    syntax:
      content: 'username?: any'
      return:
        description: ''
        type: any
  - name: useSystemTrustStore
    uid: >-
      @azure/arm-datafactory.PrestoLinkedServiceTypeProperties.useSystemTrustStore
    package: '@azure/arm-datafactory'
    summary: >-
      Specifies whether to use a CA certificate from the system trust store or
      from a specified PEM file. The default value is false. Only used for
      Version 1.0.
    fullName: useSystemTrustStore
    remarks: ''
    isDeprecated: false
    syntax:
      content: 'useSystemTrustStore?: any'
      return:
        description: ''
        type: any
