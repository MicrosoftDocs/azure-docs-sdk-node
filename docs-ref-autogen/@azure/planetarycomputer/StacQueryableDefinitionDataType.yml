### YamlMime:TSTypeAlias
name: StacQueryableDefinitionDataType
uid: '@azure/planetarycomputer.StacQueryableDefinitionDataType'
package: '@azure/planetarycomputer'
summary: >-
  Queryable data types for the queryables extension.

  These are the data types supported by Basic CQL2. \

  [KnownStacQueryableDefinitionDataType](xref:@azure/planetarycomputer.KnownStacQueryableDefinitionDataType)
  can be used interchangeably with StacQueryableDefinitionDataType,
   this enum contains the known values that the service supports.
  ### Known values supported by the service

  **string**: Character strings.

  Example: 'This is a literal string.' \

  **number**: Numbers including integers and floating point values.

  Examples: -100, 3.14159 \

  **boolean**: Booleans.

  Examples: true, false \

  **timestamp**: An instant with a granularity of a second or smaller.

  Example (JSON): { "timestamp": "1969-07-20T20:17:40Z" } \

  **date**: An instant with a granularity of a day.

  Example (JSON): { "date": "1969-07-20" }
fullName: StacQueryableDefinitionDataType
remarks: ''
isDeprecated: false
syntax: |
  type StacQueryableDefinitionDataType = string
