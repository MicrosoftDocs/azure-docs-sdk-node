name: BuiltInAuthorizationScheme
uid: '@azure/arm-cognitiveservices.BuiltInAuthorizationScheme'
package: '@azure/arm-cognitiveservices'
summary: >-
  Authorization scheme type. \

  [KnownBuiltInAuthorizationScheme](xref:@azure/arm-cognitiveservices.KnownBuiltInAuthorizationScheme)
  can be used interchangeably with BuiltInAuthorizationScheme,
   this enum contains the known values that the service supports.
  ### Known values supported by the service

  **Default**: Standard AzureML RBAC \

  **OrganizationScope**: Claim-based, requires membership in the tenant \

  **Channels**: Channels-specific (AzureBotService) authorization \

  **Custom**: Custom scheme defined by the application author
