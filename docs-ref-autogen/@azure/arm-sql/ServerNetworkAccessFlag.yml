### YamlMime:TSTypeAlias
name: ServerNetworkAccessFlag
uid: '@azure/arm-sql.ServerNetworkAccessFlag'
package: '@azure/arm-sql'
summary: >-
  Whether or not to restrict outbound network access for this server.  Value is
  optional but if passed in, must be 'Enabled' or 'Disabled' \

  [KnownServerNetworkAccessFlag](xref:@azure/arm-sql.KnownServerNetworkAccessFlag)
  can be used interchangeably with ServerNetworkAccessFlag,
   this enum contains the known values that the service supports.
  ### Known values supported by the service

  **Enabled**: Enabled \

  **Disabled**: Disabled
fullName: ServerNetworkAccessFlag
remarks: ''
isDeprecated: false
syntax: |
  type ServerNetworkAccessFlag = string
