### YamlMime:TSTypeAlias
name: SelMethod
uid: '@azure/planetarycomputer.SelMethod'
package: '@azure/planetarycomputer'
summary: >-
  Xarray indexing method to use for inexact matches \

  [KnownSelMethod](xref:@azure/planetarycomputer.KnownSelMethod) can be used
  interchangeably with SelMethod,
   this enum contains the known values that the service supports.
  ### Known values supported by the service

  **nearest**: Nearest neighbor method \

  **linear**: Linear interpolation \

  **bilinear**: Bilinear interpolation \

  **cubic**: Cubic interpolation \

  **cubic_spline**: Cubic spline interpolation \

  **lanczos**: Lanczos interpolation \

  **area**: Area-weighted interpolation \

  **mode**: Mode (most common) value
fullName: SelMethod
remarks: ''
isDeprecated: false
syntax: |
  type SelMethod = string
