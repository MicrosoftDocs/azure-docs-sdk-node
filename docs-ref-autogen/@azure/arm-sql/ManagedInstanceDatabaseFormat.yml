name: ManagedInstanceDatabaseFormat
uid: '@azure/arm-sql.ManagedInstanceDatabaseFormat'
package: '@azure/arm-sql'
summary: >-
  Specifies the internal format of instance databases specific to the SQL engine
  version. \

  [KnownManagedInstanceDatabaseFormat](xref:@azure/arm-sql.KnownManagedInstanceDatabaseFormat)
  can be used interchangeably with ManagedInstanceDatabaseFormat,
   this enum contains the known values that the service supports.
  ### Known values supported by the service

  **AlwaysUpToDate**: AlwaysUpToDate \

  **SQLServer2022**: SQLServer2022 \

  **SQLServer2025**: SQLServer2025
