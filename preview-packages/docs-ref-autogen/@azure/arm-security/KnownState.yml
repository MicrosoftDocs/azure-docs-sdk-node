### YamlMime:TSEnum
name: KnownState
uid: '@azure/arm-security.KnownState'
package: '@azure/arm-security'
summary: Aggregative state based on the standard's supported controls states
fullName: KnownState
remarks: ''
isDeprecated: false
fields:
  - name: Failed
    uid: '@azure/arm-security.KnownState.Failed'
    package: '@azure/arm-security'
    summary: >-
      At least one supported regulatory compliance control in the given standard
      has a state of failed
  - name: 'Off'
    uid: '@azure/arm-security.KnownState.Off'
    package: '@azure/arm-security'
    summary: Don't send notification on new alerts to the subscription's admins
  - name: 'On'
    uid: '@azure/arm-security.KnownState.On'
    package: '@azure/arm-security'
    summary: Send notification on new alerts to the subscription's admins
  - name: Passed
    uid: '@azure/arm-security.KnownState.Passed'
    package: '@azure/arm-security'
    summary: >-
      All supported regulatory compliance controls in the given standard have a
      passed state
  - name: Skipped
    uid: '@azure/arm-security.KnownState.Skipped'
    package: '@azure/arm-security'
    summary: >-
      All supported regulatory compliance controls in the given standard have a
      state of skipped
  - name: Unsupported
    uid: '@azure/arm-security.KnownState.Unsupported'
    package: '@azure/arm-security'
    summary: No supported regulatory compliance data for the given standard
