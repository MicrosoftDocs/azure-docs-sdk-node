name: KnownServiceUpdateAction
uid: '@azure/arm-network.KnownServiceUpdateAction'
package: '@azure/arm-network'
summary: >-
  Specifies the type of update operation to perform on services within the
  service gateway.


  - FullUpdate: Replaces all existing services with the new list provided in the
  request. Any previously defined services not included will be removed.

  - PartialUpdate: Updates only the specified services.
