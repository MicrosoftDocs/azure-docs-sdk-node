### YamlMime:TSTypeAlias
name: PartnerTopicRoutingMode
uid: '@azure/arm-eventgrid.PartnerTopicRoutingMode'
package: '@azure/arm-eventgrid'
summary: >-
  This determines if events published to this partner namespace should use the
  source attribute in the event payload

  or use the channel name in the header when matching to the partner topic. If
  none is specified, source attribute routing will be used to match the partner
  topic. \

  [KnownPartnerTopicRoutingMode](xref:@azure/arm-eventgrid.KnownPartnerTopicRoutingMode)
  can be used interchangeably with PartnerTopicRoutingMode,
   this enum contains the known values that the service supports.
  ### Known values supported by the service

  **SourceEventAttribute**: SourceEventAttribute \

  **ChannelNameHeader**: ChannelNameHeader
fullName: PartnerTopicRoutingMode
remarks: ''
isDeprecated: false
syntax: |
  type PartnerTopicRoutingMode = string
