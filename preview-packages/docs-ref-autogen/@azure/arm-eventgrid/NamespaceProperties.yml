### YamlMime:TSType
name: NamespaceProperties
uid: '@azure/arm-eventgrid.NamespaceProperties'
package: '@azure/arm-eventgrid'
summary: Properties of the namespace resource.
fullName: NamespaceProperties
remarks: ''
isDeprecated: false
type: interface
properties:
  - name: inboundIpRules
    uid: '@azure/arm-eventgrid.NamespaceProperties.inboundIpRules'
    package: '@azure/arm-eventgrid'
    summary: >-
      This can be used to restrict traffic from specific IPs instead of all IPs.
      Note: These are considered only if PublicNetworkAccess is enabled.
    fullName: inboundIpRules
    remarks: ''
    isDeprecated: false
    syntax:
      content: 'inboundIpRules?: InboundIpRule[]'
      return:
        description: ''
        type: <xref uid="@azure/arm-eventgrid.InboundIpRule" />[]
  - name: isZoneRedundant
    uid: '@azure/arm-eventgrid.NamespaceProperties.isZoneRedundant'
    package: '@azure/arm-eventgrid'
    summary: >-
      This is an optional property and it allows the user to specify if the
      namespace resource supports zone-redundancy capability or not. If this

      property is not specified explicitly by the user, its default value
      depends on the following conditions:

      a. For Availability Zones enabled regions - The default property value
      would be true.

      b. For non-Availability Zones enabled regions - The default property value
      would be false.

      Once specified, this property cannot be updated.
    fullName: isZoneRedundant
    remarks: ''
    isDeprecated: false
    syntax:
      content: 'isZoneRedundant?: boolean'
      return:
        description: ''
        type: boolean
  - name: minimumTlsVersionAllowed
    uid: '@azure/arm-eventgrid.NamespaceProperties.minimumTlsVersionAllowed'
    package: '@azure/arm-eventgrid'
    summary: >-
      Minimum TLS version of the publisher allowed to publish to this namespace.
      Only TLS version 1.2 is supported.
    fullName: minimumTlsVersionAllowed
    remarks: ''
    isDeprecated: false
    syntax:
      content: 'minimumTlsVersionAllowed?: string'
      return:
        description: ''
        type: string
  - name: privateEndpointConnections
    uid: '@azure/arm-eventgrid.NamespaceProperties.privateEndpointConnections'
    package: '@azure/arm-eventgrid'
    summary: List of private endpoint connections.
    fullName: privateEndpointConnections
    remarks: ''
    isDeprecated: false
    syntax:
      content: 'privateEndpointConnections?: PrivateEndpointConnection[]'
      return:
        description: ''
        type: <xref uid="@azure/arm-eventgrid.PrivateEndpointConnection" />[]
  - name: provisioningState
    uid: '@azure/arm-eventgrid.NamespaceProperties.provisioningState'
    package: '@azure/arm-eventgrid'
    summary: Provisioning state of the namespace resource.
    fullName: provisioningState
    remarks: ''
    isDeprecated: false
    syntax:
