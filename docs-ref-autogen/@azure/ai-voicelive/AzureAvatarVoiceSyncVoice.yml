### YamlMime:TSType
name: AzureAvatarVoiceSyncVoice
uid: '@azure/ai-voicelive.AzureAvatarVoiceSyncVoice'
package: '@azure/ai-voicelive'
summary: >-
  Azure avatar voice sync configuration. Uses personal voice synthesis with
  avatar character.
fullName: AzureAvatarVoiceSyncVoice
remarks: ''
isDeprecated: false
type: interface
properties:
  - name: customLexiconUrl
    uid: '@azure/ai-voicelive.AzureAvatarVoiceSyncVoice.customLexiconUrl'
    package: '@azure/ai-voicelive'
    summary: URL of a custom lexicon file for pronunciation customization.
    fullName: customLexiconUrl
    remarks: ''
    isDeprecated: false
    syntax:
      content: 'customLexiconUrl?: string'
      return:
        description: ''
        type: string
  - name: customTextNormalizationUrl
    uid: '@azure/ai-voicelive.AzureAvatarVoiceSyncVoice.customTextNormalizationUrl'
    package: '@azure/ai-voicelive'
    summary: URL of a custom text normalization endpoint.
    fullName: customTextNormalizationUrl
    remarks: ''
    isDeprecated: false
    syntax:
      content: 'customTextNormalizationUrl?: string'
      return:
        description: ''
        type: string
  - name: locale
    uid: '@azure/ai-voicelive.AzureAvatarVoiceSyncVoice.locale'
    package: '@azure/ai-voicelive'
    summary: >-
      Enforced locale in BCP-47 format for TTS output. If set, TTS will always
      use the specified

      locale to speak. For example, setting locale to `en-US` forces American
      English accent for all

      text content, even if the text is in another language, and TTS will output
      silence for

      unsupported languages (e.g., Chinese text with `en-US` locale). If not
      set, TTS automatically

      detects the language from the text content.
    fullName: locale
    remarks: ''
    isDeprecated: false
    syntax:
      content: 'locale?: string'
      return:
        description: ''
        type: string
  - name: model
    uid: '@azure/ai-voicelive.AzureAvatarVoiceSyncVoice.model'
    package: '@azure/ai-voicelive'
    summary: Underlying neural model to use.
    fullName: model
    remarks: ''
    isDeprecated: false
    syntax:
      content: 'model: string'
      return:
        description: ''
        type: string
  - name: pitch
    uid: '@azure/ai-voicelive.AzureAvatarVoiceSyncVoice.pitch'
    package: '@azure/ai-voicelive'
    summary: >-
      Pitch adjustment for the voice output. Follows the same rules as the
      `pitch` attribute of the

      SSML `prosody` element (see

      https://learn.microsoft.com/azure/ai-services/speech-service/speech-synthesis-markup-voice#adjust-prosody).

      Typical values: a named level (`x-low`, `low`, `medium`, `high`, `x-high`,
      `default`),

      a relative change (e.g., `+10%`, `-5%`, `+50Hz`, `-2st`), or an absolute
      frequency (e.g., `200Hz`).
    fullName: pitch
    remarks: ''
    isDeprecated: false
    syntax:
      content: 'pitch?: string'
      return:
        description: ''
        type: string
  - name: preferLocales
    uid: '@azure/ai-voicelive.AzureAvatarVoiceSyncVoice.preferLocales'
    package: '@azure/ai-voicelive'
    summary: >-
      Preferred locales in BCP-47 format that change the accents of languages.

      If not set, TTS uses the default accent for each language (e.g., American
      English for English,

      Mexican Spanish for Spanish). Setting this to `["en-GB", "es-ES"]` changes
      the English accent

      to British English and the Spanish accent to European Spanish, while TTS
      can still speak other

      languages like French or Chinese with their default accents.
    fullName: preferLocales
    remarks: ''
    isDeprecated: false
    syntax:
      content: 'preferLocales?: string[]'
      return:
        description: ''
        type: string[]
  - name: rate
    uid: '@azure/ai-voicelive.AzureAvatarVoiceSyncVoice.rate'
    package: '@azure/ai-voicelive'
    summary: >-
      Speaking rate adjustment for the voice output. Follows the same rules as
      the `rate` attribute of

      the SSML `prosody` element (see

      https://learn.microsoft.com/azure/ai-services/speech-service/speech-synthesis-markup-voice#adjust-prosody).

      Typical values: a named level (`x-slow`, `slow`, `medium`, `fast`,
      `x-fast`, `default`),

      a relative percentage (e.g., `+20%`, `-10%`), or a non-negative multiplier
      (e.g., `0.5`, `1.5`).
    fullName: rate
    remarks: ''
    isDeprecated: false
    syntax:
      content: 'rate?: string'
      return:
        description: ''
        type: string
  - name: style
    uid: '@azure/ai-voicelive.AzureAvatarVoiceSyncVoice.style'
    package: '@azure/ai-voicelive'
    summary: Speaking style for the voice (e.g., 'cheerful', 'sad').
    fullName: style
    remarks: ''
    isDeprecated: false
    syntax:
      content: 'style?: string'
      return:
        description: ''
        type: string
  - name: temperature
    uid: '@azure/ai-voicelive.AzureAvatarVoiceSyncVoice.temperature'
    package: '@azure/ai-voicelive'
    summary: Temperature must be between 0.0 and 1.0.
    fullName: temperature
    remarks: ''
    isDeprecated: false
    syntax:
      content: 'temperature?: number'
      return:
        description: ''
        type: number
  - name: type
    uid: '@azure/ai-voicelive.AzureAvatarVoiceSyncVoice.type'
    package: '@azure/ai-voicelive'
    summary: >-
      The discriminator possible values: azure-custom, azure-standard,
      azure-personal, avatar-voice-sync
    fullName: type
    remarks: ''
    isDeprecated: false
    syntax:
      content: 'type: "avatar-voice-sync"'
      return:
        description: ''
        type: '"avatar-voice-sync"'
  - name: volume
    uid: '@azure/ai-voicelive.AzureAvatarVoiceSyncVoice.volume'
    package: '@azure/ai-voicelive'
    summary: >-
      Volume adjustment for the voice output. Follows the same rules as the
      `volume` attribute of the

      SSML `prosody` element (see

      https://learn.microsoft.com/azure/ai-services/speech-service/speech-synthesis-markup-voice#adjust-prosody).

      Typical values: a named level (`silent`, `x-soft`, `soft`, `medium`,
      `loud`, `x-loud`, `default`),

      an absolute number from 0.0 to 100.0, or a relative change (e.g., `+10`,
      `-6dB`).
    fullName: volume
    remarks: ''
    isDeprecated: false
    syntax:
      content: 'volume?: string'
      return:
        description: ''
        type: string
extends: <xref uid="@azure/ai-voicelive.AzureVoice" />
