### YamlMime:TSTypeAlias
name: ApplicationSharingPolicy
uid: '@azure/arm-machinelearning.ApplicationSharingPolicy'
package: '@azure/arm-machinelearning'
summary: >-
  Policy for sharing applications on this compute instance among users of parent
  workspace. If Personal, only the creator can access applications on this
  compute instance. When Shared, any workspace user can access applications on
  this instance depending on his/her assigned role. \

  [KnownApplicationSharingPolicy](xref:@azure/arm-machinelearning.KnownApplicationSharingPolicy)
  can be used interchangeably with ApplicationSharingPolicy,
   this enum contains the known values that the service supports.
  ### Known values supported by the service

  **Personal** \

  **Shared**
fullName: ApplicationSharingPolicy
remarks: ''
isDeprecated: false
syntax: |
  type ApplicationSharingPolicy = string
