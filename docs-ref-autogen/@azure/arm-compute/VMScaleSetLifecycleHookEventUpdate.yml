name: VMScaleSetLifecycleHookEventUpdate
uid: '@azure/arm-compute.VMScaleSetLifecycleHookEventUpdate'
package: '@azure/arm-compute'
summary: >-
  Specifies information about the virtual machine scale set lifecycle hook
  event.
fullName: VMScaleSetLifecycleHookEventUpdate
remarks: ''
isDeprecated: false
type: interface
properties:
  - name: additionalContext
    uid: '@azure/arm-compute.VMScaleSetLifecycleHookEventUpdate.additionalContext'
    package: '@azure/arm-compute'
    summary: >-
      Additional key-value pairs set on the lifecycle hook event that gives
      customer some useful context/data.

      The keys in this dictionary are specific to the lifecycle hook type.
      Different lifecycle hook events can have different sets of keys in the
      additional context depending on the lifecycle hook type.

      For example, for a lifecycle hook event with UpgradeAutoOSScheduling type,

      the additional context can contain the key "priority" that helps customer
      identify the priority of the Auto OS Upgrade operation triggered on the
      virtual machine scale set.
    fullName: additionalContext
    remarks: ''
    isDeprecated: false
    syntax:
      content: 'additionalContext?: VMScaleSetLifecycleHookEventAdditionalContext'
      return:
        description: ''
        type: >-
          <xref
          uid="@azure/arm-compute.VMScaleSetLifecycleHookEventAdditionalContext"
          />
  - name: defaultAction
    uid: '@azure/arm-compute.VMScaleSetLifecycleHookEventUpdate.defaultAction'
    package: '@azure/arm-compute'
    summary: >-
      Specify the action that will be applied on the a target resource in the
      virtual machine scale set lifecycle hook event if the platform does not
      get a response from the customer for the target resource before waitUntil.
    fullName: defaultAction
    remarks: ''
    isDeprecated: false
    syntax:
      content: 'defaultAction?: string'
      return:
        description: ''
        type: string
  - name: maxWaitUntil
    uid: '@azure/arm-compute.VMScaleSetLifecycleHookEventUpdate.maxWaitUntil'
    package: '@azure/arm-compute'
    summary: >-
      Specifies the exact UTC timestamp in ISO 8601 format till when the
      customer can delay the lifecycle hook event. The customer will not be
      allowed to delay the event to a timestamp beyond this.
    fullName: maxWaitUntil
    remarks: ''
    isDeprecated: false
    syntax:
      content: 'maxWaitUntil?: string'
      return:
        description: ''
        type: string
  - name: state
    uid: '@azure/arm-compute.VMScaleSetLifecycleHookEventUpdate.state'
    package: '@azure/arm-compute'
    summary: Specifies the state of the virtual machine scale set lifecycle hook event.
    fullName: state
