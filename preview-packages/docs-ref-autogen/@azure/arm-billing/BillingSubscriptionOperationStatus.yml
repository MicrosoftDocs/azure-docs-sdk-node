name: BillingSubscriptionOperationStatus
uid: '@azure/arm-billing.BillingSubscriptionOperationStatus'
package: '@azure/arm-billing'
summary: >-
  The status of an operation on the subscription. When None, there is no ongoing
  operation. When LockedForUpdate, write operations will be blocked on the
  Billing Subscription. Other is the default value and you may need to refer to
  the latest API version for more details. \

  [KnownBillingSubscriptionOperationStatus](xref:@azure/arm-billing.KnownBillingSubscriptionOperationStatus)
  can be used interchangeably with BillingSubscriptionOperationStatus,
   this enum contains the known values that the service supports.
  ### Known values supported by the service

  **Other**: Other \

  **None**: None \

  **LockedForUpdate**: LockedForUpdate
