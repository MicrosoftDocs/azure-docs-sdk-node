        description: ''
        type: string
  - name: targetResources
    uid: '@azure/arm-compute.VMScaleSetLifecycleHookEventUpdate.targetResources'
    package: '@azure/arm-compute'
    summary: >-
      List of target resources which are getting processed in the virtual
