### YamlMime:TSTypeAlias
name: AuthenticationMethod
uid: '@azure/arm-cosmosdb.AuthenticationMethod'
package: '@azure/arm-cosmosdb'
summary: >-
  Which authentication method Cassandra should use to authenticate clients.
  'None' turns off authentication, so should not be used except in emergencies.
  'Cassandra' is the default password based authentication. The default is
  'Cassandra'. \

  [KnownAuthenticationMethod](xref:@azure/arm-cosmosdb.KnownAuthenticationMethod)
  can be used interchangeably with AuthenticationMethod,
   this enum contains the known values that the service supports.
  ### Known values supported by the service

  **None** \

  **Cassandra** \

  **Ldap**
fullName: AuthenticationMethod
remarks: ''
isDeprecated: false
syntax: |
  type AuthenticationMethod = string
