  - name: createSession
    uid: '@azure/ai-projects.BetaAgentsOperations.createSession'
    package: '@azure/ai-projects'
    summary: >-
      Creates a new session for an agent endpoint.

      The endpoint resolves the backing agent version from `version_indicator`
      and

      enforces session ownership using the provided isolation key for
      session-mutating operations.
    fullName: createSession
    remarks: ''
    isDeprecated: false
    syntax:
      content: >-
        createSession: (agentName: string, isolationKey: string,
        versionIndicator: VersionIndicatorUnion, options?:
        BetaAgentsCreateSessionOptionalParams) => Promise<AgentSessionResource>
      return:
        description: ''
        type: >-
          (agentName: string, isolationKey: string, versionIndicator:
          VersionIndicatorUnion, options?:
          BetaAgentsCreateSessionOptionalParams) =&gt;
          Promise&lt;AgentSessionResource&gt;
  - name: deleteSession
    uid: '@azure/ai-projects.BetaAgentsOperations.deleteSession'
    package: '@azure/ai-projects'
    summary: |-
      Deletes a session synchronously.
      Returns 204 No Content when the session is deleted or does not exist.
    fullName: deleteSession
    remarks: ''
    isDeprecated: false
    syntax:
      content: >-
        deleteSession: (agentName: string, sessionId: string, isolationKey:
        string, options?: BetaAgentsDeleteSessionOptionalParams) =>
