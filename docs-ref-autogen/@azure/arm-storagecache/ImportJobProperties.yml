### YamlMime:TSType
name: ImportJobProperties
uid: '@azure/arm-storagecache.ImportJobProperties'
package: '@azure/arm-storagecache'
summary: Properties of the import job.
fullName: ImportJobProperties
remarks: ''
isDeprecated: false
type: interface
properties:
  - name: adminStatus
    uid: '@azure/arm-storagecache.ImportJobProperties.adminStatus'
    package: '@azure/arm-storagecache'
    summary: >-
      The administrative status of the import job. Possible values: 'Active',
      'Cancel'. Passing in a value of 'Cancel' will cancel the current active
      import job. By default it is set to 'Active'.
    fullName: adminStatus
    remarks: ''
    isDeprecated: false
    syntax:
      content: 'adminStatus?: string'
      return:
        description: ''
        type: string
  - name: blobsImportedPerSecond
    uid: '@azure/arm-storagecache.ImportJobProperties.blobsImportedPerSecond'
    package: '@azure/arm-storagecache'
    summary: >-
      A recent and frequently updated rate of total files, directories, and
      symlinks imported per second.
    fullName: blobsImportedPerSecond
    remarks: ''
    isDeprecated: false
    syntax:
      content: 'blobsImportedPerSecond?: number'
      return:
        description: ''
        type: number
  - name: blobsWalkedPerSecond
    uid: '@azure/arm-storagecache.ImportJobProperties.blobsWalkedPerSecond'
    package: '@azure/arm-storagecache'
    summary: A recent and frequently updated rate of blobs walked per second.
    fullName: blobsWalkedPerSecond
    remarks: ''
    isDeprecated: false
    syntax:
      content: 'blobsWalkedPerSecond?: number'
      return:
        description: ''
        type: number
  - name: conflictResolutionMode
    uid: '@azure/arm-storagecache.ImportJobProperties.conflictResolutionMode'
    package: '@azure/arm-storagecache'
    summary: >-
      How the import job will handle conflicts. For example, if the import job
      is trying to bring in a directory, but a file is at that path, how it
      handles it. Fail indicates that the import job should stop immediately and
      not do anything with the conflict. Skip indicates that it should pass over
      the conflict. OverwriteIfDirty causes the import job to delete and
      re-import the file or directory if it is a conflicting type, is dirty, or
      was not previously imported. OverwriteAlways extends OverwriteIfDirty to
      include releasing files that had been restored but were not dirty. Please
      reference https://learn.microsoft.com/en-us/azure/azure-managed-lustre/
      for a thorough explanation of these resolution modes.
    fullName: conflictResolutionMode
    remarks: ''
    isDeprecated: false
    syntax:
      content: 'conflictResolutionMode?: string'
      return:
        description: ''
        type: string
  - name: importedDirectories
    uid: '@azure/arm-storagecache.ImportJobProperties.importedDirectories'
    package: '@azure/arm-storagecache'
    summary: New or modified directories that have been imported into the filesystem.
    fullName: importedDirectories
    remarks: ''
    isDeprecated: false
    syntax:
      content: 'importedDirectories?: number'
      return:
        description: ''
        type: number
  - name: importedFiles
    uid: '@azure/arm-storagecache.ImportJobProperties.importedFiles'
    package: '@azure/arm-storagecache'
    summary: New or modified files that have been imported into the filesystem.
    fullName: importedFiles
    remarks: ''
    isDeprecated: false
    syntax:
      content: 'importedFiles?: number'
      return:
        description: ''
        type: number
  - name: importedSymlinks
    uid: '@azure/arm-storagecache.ImportJobProperties.importedSymlinks'
    package: '@azure/arm-storagecache'
    summary: Newly added symbolic links into the filesystem.
    fullName: importedSymlinks
    remarks: ''
    isDeprecated: false
    syntax:
      content: 'importedSymlinks?: number'
      return:
        description: ''
        type: number
  - name: importPrefixes
    uid: '@azure/arm-storagecache.ImportJobProperties.importPrefixes'
    package: '@azure/arm-storagecache'
    summary: >-
      An array of blob paths/prefixes that get imported into the cluster
      namespace. It has '/' as the default value.
    fullName: importPrefixes
    remarks: ''
    isDeprecated: false
    syntax:
      content: 'importPrefixes?: string[]'
      return:
        description: ''
        type: string[]
  - name: lastCompletionTime
    uid: '@azure/arm-storagecache.ImportJobProperties.lastCompletionTime'
    package: '@azure/arm-storagecache'
    summary: The time (in UTC) of the last completed import job.
    fullName: lastCompletionTime
    remarks: ''
    isDeprecated: false
    syntax:
      content: 'lastCompletionTime?: Date'
      return:
        description: ''
        type: Date
  - name: lastStartedTime
    uid: '@azure/arm-storagecache.ImportJobProperties.lastStartedTime'
    package: '@azure/arm-storagecache'
    summary: The time (in UTC) the latest import job started.
    fullName: lastStartedTime
    remarks: ''
    isDeprecated: false
    syntax:
      content: 'lastStartedTime?: Date'
      return:
        description: ''
        type: Date
  - name: maximumErrors
    uid: '@azure/arm-storagecache.ImportJobProperties.maximumErrors'
    package: '@azure/arm-storagecache'
    summary: >-
      Total non-conflict oriented errors the import job will tolerate before
      exiting with failure. -1 means infinite. 0 means exit immediately and is
      the default.
    fullName: maximumErrors
    remarks: ''
    isDeprecated: false
    syntax:
      content: 'maximumErrors?: number'
      return:
        description: ''
        type: number
  - name: preexistingDirectories
    uid: '@azure/arm-storagecache.ImportJobProperties.preexistingDirectories'
    package: '@azure/arm-storagecache'
    summary: >-
      Directories that already exist in the filesystem and have not been
      modified.
    fullName: preexistingDirectories
    remarks: ''
    isDeprecated: false
    syntax:
      content: 'preexistingDirectories?: number'
      return:
        description: ''
        type: number
  - name: preexistingFiles
    uid: '@azure/arm-storagecache.ImportJobProperties.preexistingFiles'
    package: '@azure/arm-storagecache'
    summary: Files that already exist in the filesystem and have not been modified.
    fullName: preexistingFiles
    remarks: ''
    isDeprecated: false
    syntax:
      content: 'preexistingFiles?: number'
      return:
        description: ''
        type: number
  - name: preexistingSymlinks
    uid: '@azure/arm-storagecache.ImportJobProperties.preexistingSymlinks'
    package: '@azure/arm-storagecache'
    summary: >-
      Symbolic links that already exist in the filesystem and have not been
      modified.
    fullName: preexistingSymlinks
    remarks: ''
    isDeprecated: false
    syntax:
      content: 'preexistingSymlinks?: number'
      return:
        description: ''
        type: number
  - name: provisioningState
    uid: '@azure/arm-storagecache.ImportJobProperties.provisioningState'
    package: '@azure/arm-storagecache'
    summary: ARM provisioning state.
    fullName: provisioningState
    remarks: ''
    isDeprecated: false
    syntax:
      content: 'provisioningState?: string'
      return:
        description: ''
        type: string
  - name: state
    uid: '@azure/arm-storagecache.ImportJobProperties.state'
    package: '@azure/arm-storagecache'
    summary: >-
      The operational state of the import job. InProgress indicates the import
      is still running. Canceled indicates it has been canceled by the user.
      Completed indicates import finished, successfully importing all discovered
      blobs into the Lustre namespace. CompletedPartial indicates the import
      finished but some blobs either were found to be conflicting and could not
      be imported or other errors were encountered. Failed means the import was
      unable to complete due to a fatal error.
    fullName: state
    remarks: ''
    isDeprecated: false
    syntax:
      content: 'state?: string'
      return:
        description: ''
        type: string
  - name: statusMessage
    uid: '@azure/arm-storagecache.ImportJobProperties.statusMessage'
    package: '@azure/arm-storagecache'
    summary: The status message of the import job.
    fullName: statusMessage
    remarks: ''
    isDeprecated: false
    syntax:
      content: 'statusMessage?: string'
      return:
        description: ''
        type: string
  - name: totalBlobsImported
    uid: '@azure/arm-storagecache.ImportJobProperties.totalBlobsImported'
    package: '@azure/arm-storagecache'
    summary: The total blobs that have been imported since import began.
    fullName: totalBlobsImported
    remarks: ''
    isDeprecated: false
    syntax:
      content: 'totalBlobsImported?: number'
      return:
        description: ''
        type: number
  - name: totalBlobsWalked
    uid: '@azure/arm-storagecache.ImportJobProperties.totalBlobsWalked'
    package: '@azure/arm-storagecache'
    summary: The total blob objects walked.
    fullName: totalBlobsWalked
    remarks: ''
    isDeprecated: false
    syntax:
      content: 'totalBlobsWalked?: number'
      return:
        description: ''
        type: number
  - name: totalConflicts
    uid: '@azure/arm-storagecache.ImportJobProperties.totalConflicts'
    package: '@azure/arm-storagecache'
    summary: Number of conflicts in the import job.
    fullName: totalConflicts
    remarks: ''
    isDeprecated: false
    syntax:
      content: 'totalConflicts?: number'
      return:
        description: ''
        type: number
  - name: totalErrors
    uid: '@azure/arm-storagecache.ImportJobProperties.totalErrors'
    package: '@azure/arm-storagecache'
    summary: Number of errors in the import job.
    fullName: totalErrors
    remarks: ''
    isDeprecated: false
    syntax:
      content: 'totalErrors?: number'
      return:
        description: ''
        type: number
