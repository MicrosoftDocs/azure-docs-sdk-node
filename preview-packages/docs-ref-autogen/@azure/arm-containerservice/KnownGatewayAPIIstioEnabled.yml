### YamlMime:TSEnum
name: KnownGatewayAPIIstioEnabled
uid: '@azure/arm-containerservice.KnownGatewayAPIIstioEnabled'
package: '@azure/arm-containerservice'
summary: >-
  Whether to enable Istio as a Gateway API implementation for managed ingress
  with App Routing.
fullName: KnownGatewayAPIIstioEnabled
remarks: ''
isDeprecated: false
fields:
  - name: Disabled
    uid: '@azure/arm-containerservice.KnownGatewayAPIIstioEnabled.Disabled'
    package: '@azure/arm-containerservice'
    summary: >-
      Disables the sidecar-less istio control plane for managed ingress via the
      Gateway API.
  - name: Enabled
    uid: '@azure/arm-containerservice.KnownGatewayAPIIstioEnabled.Enabled'
    package: '@azure/arm-containerservice'
    summary: >-
      Enables managed ingress via the Gateway API using a sidecar-less Istio
      controlplane.
