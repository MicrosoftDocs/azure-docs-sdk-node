### YamlMime:TSTypeAlias
name: PublicNetworkAccess
uid: '@azure/arm-redisenterprisecache.PublicNetworkAccess'
package: '@azure/arm-redisenterprisecache'
summary: >-
  Whether or not public network traffic can access the Redis cluster. Only
  'Enabled' or 'Disabled' can be set. null is returned only for clusters created
  using an old API version which do not have this property and cannot be set. \

  [KnownPublicNetworkAccess](xref:@azure/arm-redisenterprisecache.KnownPublicNetworkAccess)
  can be used interchangeably with PublicNetworkAccess,
   this enum contains the known values that the service supports.
  ### Known values supported by the service

  **Enabled**: Enabled \

  **Disabled**: Disabled
fullName: PublicNetworkAccess
remarks: ''
isDeprecated: false
syntax: |
  type PublicNetworkAccess = string
