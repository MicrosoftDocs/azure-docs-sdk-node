name: PublicNetworkAccess
uid: '@azure/arm-eventgrid.PublicNetworkAccess'
package: '@azure/arm-eventgrid'
summary: >-
  This determines if traffic is allowed over public network. By default it is
  enabled.

  You can further restrict to specific IPs by configuring <seealso
  cref="P:Microsoft.Azure.Events.ResourceProvider.Common.Contracts.DomainProperties.InboundIpRules"
  /> \

  [KnownPublicNetworkAccess](xref:@azure/arm-eventgrid.KnownPublicNetworkAccess)
  can be used interchangeably with PublicNetworkAccess,
   this enum contains the known values that the service supports.
  ### Known values supported by the service

  **Enabled**: Enabled \

  **Disabled**: Disabled \

  **SecuredByPerimeter**: SecuredByPerimeter
fullName: PublicNetworkAccess
remarks: ''
isDeprecated: false
syntax: |
  type PublicNetworkAccess = string
