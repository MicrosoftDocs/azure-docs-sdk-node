### YamlMime:TSTypeAlias
name: EdgeMachineState
uid: '@azure/arm-azurestackhci.EdgeMachineState'
package: '@azure/arm-azurestackhci'
summary: >-
  OS State \

  [KnownEdgeMachineState](xref:@azure/arm-azurestackhci.KnownEdgeMachineState)
  can be used interchangeably with EdgeMachineState,
   this enum contains the known values that the service supports.
  ### Known values supported by the service

  **Created**: Created when EdgeMachine resource created \

  **Registering**: EdgeMachine state during device discovery and registration \

  **Unpurposed**: EdgeMachine state when machine configured with restricted OS
  and not provisioned to deploy workloads \

  **Transitioning**: EdgeMachine state when transitioning from initial OS to
  target OS \

  **Purposed**: EdgeMachine state when machine configured with target OS to
  deploy workloads \

  **Updating**: EdgeMachine state when OS updates are in-progress \

  **Resetting**: EdgeMachine state when transitioning from target OS to
  restricted OS \

  **Failed**: EdgeMachine failed state and only option to recover is to
  re-provisioning machine \

  **Preparing**: Preparing EdgeMachine
fullName: EdgeMachineState
remarks: ''
isDeprecated: false
syntax: |
  type EdgeMachineState = string
