### YamlMime:TSEnum
name: KnownNodeDisruptionPolicy
uid: '@azure/arm-containerservice.KnownNodeDisruptionPolicy'
package: '@azure/arm-containerservice'
summary: >-
  The policy configuration for when to allow certain operations which require
  node re-image and trigger redeployment. For example, some operations, such as
  updating the
  .properties.ManagedClusterSecurityProfile.customCATrustCertificates field on
  an existing managed cluster, trigger rolling updates of the nodes. This
  setting allows control over when such updates are accepted. The default is
  'Allow'. For a full list of covered operations see
  aka.ms/aks/nodedisruptionpolicy".
fullName: KnownNodeDisruptionPolicy
remarks: ''
isDeprecated: false
fields:
  - name: Allow
    uid: '@azure/arm-containerservice.KnownNodeDisruptionPolicy.Allow'
    package: '@azure/arm-containerservice'
    summary: >-
      Allows operations that will require node re-image and trigger
      redeployment.
  - name: AllowDuringMaintenanceWindow
    uid: >-
      @azure/arm-containerservice.KnownNodeDisruptionPolicy.AllowDuringMaintenanceWindow
    package: '@azure/arm-containerservice'
    summary: >-
      Blocks certain operations that will require node re-image and trigger
      redeployment unless within the aksManagedNodeOSUpgradeSchedule maintenance
      window. For a full list of covered operations see
      aka.ms/aks/nodedisruptionpolicy . For more information on using the
      aksManagedNodeOSUpgradeSchedule maintenance window, please see
      https://learn.microsoft.com/azure/aks/planned-maintenance?tabs=azure-cli
  - name: Block
    uid: '@azure/arm-containerservice.KnownNodeDisruptionPolicy.Block'
    package: '@azure/arm-containerservice'
    summary: >-
      Blocks certain operations that will require node re-image and trigger
      redeployment. For a full list of covered operations see
      aka.ms/aks/nodedisruptionpolicy
