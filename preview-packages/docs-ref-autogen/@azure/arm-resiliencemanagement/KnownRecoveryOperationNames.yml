### YamlMime:TSEnum
name: KnownRecoveryOperationNames
uid: '@azure/arm-resiliencemanagement.KnownRecoveryOperationNames'
package: '@azure/arm-resiliencemanagement'
summary: >-
  Defines the set of operations that can be executed on a Recovery Orchestration
  Plan. These operations are applicable only to resources that meet the
  qualification criteria.
fullName: KnownRecoveryOperationNames
remarks: ''
isDeprecated: false
fields:
  - name: Failover
    uid: '@azure/arm-resiliencemanagement.KnownRecoveryOperationNames.Failover'
    package: '@azure/arm-resiliencemanagement'
    summary: >-
      Initiates a failover process to recover eligible resources to the target
      location.
  - name: FailoverCommit
    uid: '@azure/arm-resiliencemanagement.KnownRecoveryOperationNames.FailoverCommit'
    package: '@azure/arm-resiliencemanagement'
    summary: >-
      Commits the failover for resources that require an explicit commit after
      recovery.
  - name: Reprotect
    uid: '@azure/arm-resiliencemanagement.KnownRecoveryOperationNames.Reprotect'
    package: '@azure/arm-resiliencemanagement'
    summary: >-
      Performs re-protection or configuration changes for resources that have
      failed over, as required.
  - name: TestFailover
    uid: '@azure/arm-resiliencemanagement.KnownRecoveryOperationNames.TestFailover'
    package: '@azure/arm-resiliencemanagement'
    summary: >-
      Initiates a test failover process for qualified resources and those that
      support test failover.
  - name: TestFailoverCleanup
    uid: >-
      @azure/arm-resiliencemanagement.KnownRecoveryOperationNames.TestFailoverCleanup
    package: '@azure/arm-resiliencemanagement'
    summary: >-
      Cleans up resources and configurations created during a test failover, as
      required.
