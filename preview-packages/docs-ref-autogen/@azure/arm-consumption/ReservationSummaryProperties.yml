  - name: maxUtilizationPercentage
    uid: >-
      @azure/arm-consumption.ReservationSummaryProperties.maxUtilizationPercentage
    package: '@azure/arm-consumption'
    summary: >-
      This is the maximum hourly utilization in the usage time (day or month).
      E.g. if usage record corresponds to 12/10/2017 and on that for hour 4 and
      5, utilization was 100%, this field will return 100% for that day.
    fullName: maxUtilizationPercentage
    remarks: ''
    isDeprecated: false
    syntax:
      content: 'maxUtilizationPercentage?: number'
      return:
        description: ''
        type: number
  - name: minUtilizationPercentage
    uid: >-
      @azure/arm-consumption.ReservationSummaryProperties.minUtilizationPercentage
