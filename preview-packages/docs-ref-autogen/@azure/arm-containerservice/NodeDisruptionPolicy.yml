### YamlMime:TSTypeAlias
name: NodeDisruptionPolicy
uid: '@azure/arm-containerservice.NodeDisruptionPolicy'
package: '@azure/arm-containerservice'
summary: >-
  The policy configuration for when to allow certain operations which require
  node re-image and trigger redeployment. For example, some operations, such as
  updating the
  .properties.ManagedClusterSecurityProfile.customCATrustCertificates field on
  an existing managed cluster, trigger rolling updates of the nodes. This
  setting allows control over when such updates are accepted. The default is
  'Allow'. For a full list of covered operations see
  aka.ms/aks/nodedisruptionpolicy". \

  [KnownNodeDisruptionPolicy](xref:@azure/arm-containerservice.KnownNodeDisruptionPolicy)
  can be used interchangeably with NodeDisruptionPolicy,
   this enum contains the known values that the service supports.
  ### Known values supported by the service

  **Allow**: Allows operations that will require node re-image and trigger
  redeployment. \

  **AllowDuringMaintenanceWindow**: Blocks certain operations that will require
  node re-image and trigger redeployment unless within the
  aksManagedNodeOSUpgradeSchedule maintenance window. For a full list of covered
  operations see aka.ms/aks/nodedisruptionpolicy . For more information on using
  the aksManagedNodeOSUpgradeSchedule maintenance window, please see
  https://learn.microsoft.com/azure/aks/planned-maintenance?tabs=azure-cli \

  **Block**: Blocks certain operations that will require node re-image and
  trigger redeployment. For a full list of covered operations see
  aka.ms/aks/nodedisruptionpolicy
fullName: NodeDisruptionPolicy
remarks: ''
isDeprecated: false
syntax: |
  type NodeDisruptionPolicy = string
