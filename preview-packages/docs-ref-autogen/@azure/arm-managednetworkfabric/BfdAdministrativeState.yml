### YamlMime:TSTypeAlias
name: BfdAdministrativeState
uid: '@azure/arm-managednetworkfabric.BfdAdministrativeState'
package: '@azure/arm-managednetworkfabric'
summary: >-
  Administrative state of the BfdConfiguration. Example: Enabled | Disabled. \

  [KnownBfdAdministrativeState](xref:@azure/arm-managednetworkfabric.KnownBfdAdministrativeState)
  can be used interchangeably with BfdAdministrativeState,
   this enum contains the known values that the service supports.
  ### Known values supported by the service

  **Enabled**: Represents the enabled state of BFD administrative state. \

  **Disabled**: Represents the disabled state of BFD administrative state. \

  **MAT**: Represents the MAT(Manual Action Taken) state of BFD administrative
  state. \

  **RMA**: Represents the RMA(Return Material Authorization) state of BFD
  administrative state.
fullName: BfdAdministrativeState
remarks: ''
isDeprecated: false
syntax: |
  type BfdAdministrativeState = string
