name: CatalogItemSyncEnableStatus
uid: '@azure/arm-devcenter.CatalogItemSyncEnableStatus'
package: '@azure/arm-devcenter'
summary: >-
  Catalog item sync types enable or disable status. Indicates whether project
  catalogs are allowed to sync catalog items under projects associated to this
  dev center. \

  [KnownCatalogItemSyncEnableStatus](xref:@azure/arm-devcenter.KnownCatalogItemSyncEnableStatus)
  can be used interchangeably with CatalogItemSyncEnableStatus,
   this enum contains the known values that the service supports.
  ### Known values supported by the service

  **Enabled**: Catalog item sync is enabled. \

  **Disabled**: Catalog item sync is disabled.
fullName: CatalogItemSyncEnableStatus
remarks: ''
isDeprecated: false
syntax: |
  type CatalogItemSyncEnableStatus = string
