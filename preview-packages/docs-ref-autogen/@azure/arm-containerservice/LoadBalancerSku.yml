### YamlMime:TSTypeAlias
name: LoadBalancerSku
uid: '@azure/arm-containerservice.LoadBalancerSku'
package: '@azure/arm-containerservice'
summary: >-
  The load balancer sku for the managed cluster. The default is 'standard'. See
  [Azure Load Balancer
  SKUs](https://docs.microsoft.com/azure/load-balancer/skus) for more
  information about the differences between load balancer SKUs. \

  [KnownLoadBalancerSku](xref:@azure/arm-containerservice.KnownLoadBalancerSku)
  can be used interchangeably with LoadBalancerSku,
   this enum contains the known values that the service supports.
  ### Known values supported by the service

  **standard**: Use a a standard Load Balancer. This is the recommended Load
  Balancer SKU. For more information about on working with the load balancer in
  the managed cluster, see the [standard Load
  Balancer](https://docs.microsoft.com/azure/aks/load-balancer-standard)
  article. \

  **basic**: Use a basic Load Balancer with limited functionality.
fullName: LoadBalancerSku
remarks: ''
isDeprecated: false
syntax: |
  type LoadBalancerSku = string
