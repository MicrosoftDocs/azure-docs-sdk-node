  - name: addPaymentTerms
    uid: '@azure/arm-billing.BillingAccountsOperations.addPaymentTerms'
    package: '@azure/arm-billing'
    summary: >-
      Adds payment terms to all the billing profiles under the billing account.
      Currently, payment terms can be added only on billing accounts that have
      Agreement Type as 'Microsoft Customer Agreement' and AccountType as
      'Enterprise'. This action needs pre-authorization and only Field Sellers
      are authorized to add the payment terms and is not a self-serve action.
    fullName: addPaymentTerms
    remarks: ''
    isDeprecated: false
    syntax:
      content: >-
        addPaymentTerms: (billingAccountName: string, parameters: PaymentTerm[],
        options?: BillingAccountsAddPaymentTermsOptionalParams) =>
        PollerLike<OperationState<BillingAccount>, BillingAccount>
      return:
        description: ''
        type: >-
