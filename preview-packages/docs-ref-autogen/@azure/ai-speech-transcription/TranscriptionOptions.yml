### YamlMime:TSType
name: TranscriptionOptions
uid: '@azure/ai-speech-transcription.TranscriptionOptions'
package: '@azure/ai-speech-transcription'
summary: Metadata for a transcription request.
fullName: TranscriptionOptions
remarks: ''
isDeprecated: false
type: interface
properties:
  - name: activeChannels
    uid: '@azure/ai-speech-transcription.TranscriptionOptions.activeChannels'
    package: '@azure/ai-speech-transcription'
    summary: >-
      The 0-based indices of the channels to be transcribed separately. If not
      specified, multiple channels are merged and transcribed jointly. Only up
      to two channels are supported.
    fullName: activeChannels
    remarks: ''
    isDeprecated: false
    syntax:
      content: 'activeChannels?: number[]'
      return:
        description: ''
        type: number[]
  - name: audioUrl
    uid: '@azure/ai-speech-transcription.TranscriptionOptions.audioUrl'
    package: '@azure/ai-speech-transcription'
    summary: >-
      The URL of the audio to be transcribed. The audio must be shorter than 2
      hours in audio duration and smaller than 250 MB in size. If both Audio and
      AudioUrl are provided, Audio is used.
    fullName: audioUrl
    remarks: ''
    isDeprecated: false
    syntax:
      content: 'audioUrl?: string'
      return:
        description: ''
        type: string
  - name: diarizationOptions
    uid: '@azure/ai-speech-transcription.TranscriptionOptions.diarizationOptions'
    package: '@azure/ai-speech-transcription'
    summary: Mode of diarization.
    fullName: diarizationOptions
    remarks: ''
    isDeprecated: false
    syntax:
      content: 'diarizationOptions?: TranscriptionDiarizationOptions'
      return:
        description: ''
        type: >-
          <xref
          uid="@azure/ai-speech-transcription.TranscriptionDiarizationOptions"
          />
  - name: enhancedMode
    uid: '@azure/ai-speech-transcription.TranscriptionOptions.enhancedMode'
    package: '@azure/ai-speech-transcription'
    summary: Enhanced mode properties.
    fullName: enhancedMode
    remarks: ''
    isDeprecated: false
    syntax:
      content: 'enhancedMode?: EnhancedModeOptions'
      return:
        description: ''
        type: <xref uid="@azure/ai-speech-transcription.EnhancedModeOptions" />
  - name: locales
    uid: '@azure/ai-speech-transcription.TranscriptionOptions.locales'
    package: '@azure/ai-speech-transcription'
    summary: >-
      A list of possible locales for the transcription. If not specified, the
      locale of the speech in the audio is detected automatically from all
      supported locales.
    fullName: locales
    remarks: ''
    isDeprecated: false
    syntax:
      content: 'locales?: string[]'
      return:
        description: ''
        type: string[]
  - name: models
    uid: '@azure/ai-speech-transcription.TranscriptionOptions.models'
    package: '@azure/ai-speech-transcription'
    summary: >-
      Maps some or all candidate locales to a model URI to be used for
      transcription. If no mapping is given, the default model for the locale is
      used.
    fullName: models
    remarks: ''
    isDeprecated: false
    syntax:
      content: 'models?: Record<string, string>'
      return:
        description: ''
        type: Record&lt;string, string&gt;
  - name: phraseList
    uid: '@azure/ai-speech-transcription.TranscriptionOptions.phraseList'
    package: '@azure/ai-speech-transcription'
    summary: Phrase list properties.
    fullName: phraseList
    remarks: ''
    isDeprecated: false
    syntax:
      content: 'phraseList?: PhraseListOptions'
      return:
        description: ''
        type: <xref uid="@azure/ai-speech-transcription.PhraseListOptions" />
  - name: profanityFilterMode
    uid: '@azure/ai-speech-transcription.TranscriptionOptions.profanityFilterMode'
    package: '@azure/ai-speech-transcription'
    summary: Mode of profanity filtering.
    fullName: profanityFilterMode
    remarks: ''
    isDeprecated: false
    syntax:
      content: 'profanityFilterMode?: string'
      return:
        description: ''
        type: string
