    fullName: isJsonRequest
    remarks: ''
    isDeprecated: false
    syntax:
      content: 'isJsonRequest?: boolean'
      return:
        description: ''
        type: boolean
  - name: password
    uid: '@azure/arm-securityinsight.JwtAuthModel.password'
    package: '@azure/arm-securityinsight'
    summary: The password
    fullName: password
    remarks: ''
    isDeprecated: false
    syntax:
      content: 'password: Record<string, string>'
      return:
        description: ''
        type: Record&lt;string, string&gt;
  - name: queryParameters
    uid: '@azure/arm-securityinsight.JwtAuthModel.queryParameters'
    package: '@azure/arm-securityinsight'
    summary: >-
      The custom query parameter we want to add once we send request to token
      endpoint.
    fullName: queryParameters
    remarks: ''
    isDeprecated: false
    syntax:
      content: 'queryParameters?: Record<string, string>'
      return:
        description: ''
