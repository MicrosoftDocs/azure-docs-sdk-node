### YamlMime:TSTypeAlias
name: MetricId
uid: '@azure/arm-eventhub.MetricId'
package: '@azure/arm-eventhub'
summary: >-
  Metric Id on which the throttle limit should be set, MetricId can be
  discovered by hovering over Metric in the Metrics section of Event Hub
  Namespace inside Azure Portal \

  [KnownMetricId](xref:@azure/arm-eventhub.KnownMetricId) can be used
  interchangeably with MetricId,
   this enum contains the known values that the service supports.
  ### Known values supported by the service

  **IncomingBytes** \

  **OutgoingBytes** \

  **IncomingMessages** \

  **OutgoingMessages**
fullName: MetricId
remarks: ''
isDeprecated: false
syntax: |
  type MetricId = string
