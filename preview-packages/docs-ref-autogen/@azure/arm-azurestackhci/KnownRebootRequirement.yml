### YamlMime:TSEnum
name: KnownRebootRequirement
uid: '@azure/arm-azurestackhci.KnownRebootRequirement'
package: '@azure/arm-azurestackhci'
summary: >-
  Indicates whether a reboot is required after the update or operation. Helps
  determine if a system restart is necessary to complete the process.
fullName: KnownRebootRequirement
remarks: ''
isDeprecated: false
fields:
  - name: 'False'
    uid: '@azure/arm-azurestackhci.KnownRebootRequirement.False'
    package: '@azure/arm-azurestackhci'
    summary: No reboot is required after the operation.
  - name: 'True'
    uid: '@azure/arm-azurestackhci.KnownRebootRequirement.True'
    package: '@azure/arm-azurestackhci'
    summary: A reboot is required to complete the operation.
  - name: Unknown
    uid: '@azure/arm-azurestackhci.KnownRebootRequirement.Unknown'
    package: '@azure/arm-azurestackhci'
    summary: It is not known whether a reboot is required.
