### YamlMime:TSTypeAlias
name: CassandraSourceReadConsistencyLevels
uid: '@azure/arm-datafactory.CassandraSourceReadConsistencyLevels'
package: '@azure/arm-datafactory'
summary: >-
  The consistency level specifies how many Cassandra servers must respond to a
  read request before returning data to the client application. Cassandra checks
  the specified number of Cassandra servers for data to satisfy the read
  request. Must be one of cassandraSourceReadConsistencyLevels. The default
  value is 'ONE'. It is case-insensitive. \

  [KnownCassandraSourceReadConsistencyLevels](xref:@azure/arm-datafactory.KnownCassandraSourceReadConsistencyLevels)
  can be used interchangeably with CassandraSourceReadConsistencyLevels,
   this enum contains the known values that the service supports.
  ### Known values supported by the service

  **ALL**: ALL \

  **EACH_QUORUM**: EACH_QUORUM \

  **QUORUM**: QUORUM \

  **LOCAL_QUORUM**: LOCAL_QUORUM \

  **ONE**: ONE \

  **TWO**: TWO \

  **THREE**: THREE \

  **LOCAL_ONE**: LOCAL_ONE \

  **SERIAL**: SERIAL \

  **LOCAL_SERIAL**: LOCAL_SERIAL
fullName: CassandraSourceReadConsistencyLevels
remarks: ''
isDeprecated: false
syntax: |
  type CassandraSourceReadConsistencyLevels = string
