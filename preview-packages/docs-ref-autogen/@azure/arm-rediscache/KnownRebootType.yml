### YamlMime:TSEnum
name: KnownRebootType
uid: '@azure/arm-rediscache.KnownRebootType'
package: '@azure/arm-rediscache'
summary: Which Redis node(s) to reboot. Depending on this value data loss is possible.
fullName: KnownRebootType
remarks: ''
isDeprecated: false
fields:
  - name: AllNodes
    uid: '@azure/arm-rediscache.KnownRebootType.AllNodes'
    package: '@azure/arm-rediscache'
    summary: Reboot all nodes, not guaranteed to happen simultaneously.
  - name: PrimaryNode
    uid: '@azure/arm-rediscache.KnownRebootType.PrimaryNode'
    package: '@azure/arm-rediscache'
    summary: >-
      Reboot the primary nodes used for redis write operations. (This may
      trigger role changes.)
  - name: SecondaryNode
    uid: '@azure/arm-rediscache.KnownRebootType.SecondaryNode'
    package: '@azure/arm-rediscache'
    summary: Reboot only the secondary or replica nodes
