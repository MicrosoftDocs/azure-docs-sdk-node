### YamlMime:TSType
name: BusinessVerificationRulePatchProperties
uid: '@azure/arm-billing-trust.BusinessVerificationRulePatchProperties'
package: '@azure/arm-billing-trust'
summary: >-
  Patch body for a businessVerification rule. Settable while evaluationState is
  `pending` or `actionRequired`. `externalId` lets the customer disambiguate an
  ambiguous verification match (e.g. via DUNS); `supplementalDocuments` carries
  references to documents uploaded via the assessment-scoped upload-token
  action.
fullName: BusinessVerificationRulePatchProperties
remarks: ''
isDeprecated: false
type: interface
properties:
  - name: externalId
    uid: >-
      @azure/arm-billing-trust.BusinessVerificationRulePatchProperties.externalId
    package: '@azure/arm-billing-trust'
    summary: >-
      Optional external-registry identifier (e.g. DUNS) used to disambiguate
      ambiguous verification matches.
    fullName: externalId
    remarks: ''
    isDeprecated: false
    syntax:
      content: 'externalId?: ExternalId'
      return:
        description: ''
        type: <xref uid="@azure/arm-billing-trust.ExternalId" />
  - name: kind
    uid: '@azure/arm-billing-trust.BusinessVerificationRulePatchProperties.kind'
    package: '@azure/arm-billing-trust'
    summary: 'The discriminator possible values: eduQualification, businessVerification'
    fullName: kind
    remarks: ''
    isDeprecated: false
    syntax:
      content: 'kind: "businessVerification"'
      return:
        description: ''
        type: '"businessVerification"'
  - name: supplementalDocuments
    uid: >-
      @azure/arm-billing-trust.BusinessVerificationRulePatchProperties.supplementalDocuments
    package: '@azure/arm-billing-trust'
    summary: >-
      References to supplemental documents (businessVerification rules only;
      only settable while evaluationState is `pending` or `actionRequired`).
    fullName: supplementalDocuments
    remarks: ''
    isDeprecated: false
    syntax:
      content: 'supplementalDocuments?: string[]'
      return:
        description: ''
        type: string[]
extends: <xref uid="@azure/arm-billing-trust.RulePatchProperties" />
