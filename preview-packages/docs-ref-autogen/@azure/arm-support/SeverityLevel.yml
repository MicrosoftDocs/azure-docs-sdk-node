### YamlMime:TSTypeAlias
name: SeverityLevel
uid: '@azure/arm-support.SeverityLevel'
package: '@azure/arm-support'
summary: >-
  A value that indicates the urgency of the case, which in turn determines the
  response time according to the service level agreement of the technical
  support plan you have with Azure. Note: 'Highest critical impact', also known
  as the 'Emergency - Severe impact' level in the Azure portal is reserved only
  for our Premium customers. \

  [KnownSeverityLevel](xref:@azure/arm-support.KnownSeverityLevel) can be used
  interchangeably with SeverityLevel,
   this enum contains the known values that the service supports.
  ### Known values supported by the service

  **minimal** \

  **moderate** \

  **critical** \

  **highestcriticalimpact**
fullName: SeverityLevel
remarks: ''
isDeprecated: false
syntax: |
  type SeverityLevel = string
