summary: >-
  Describes what transforms applied before matching. \

  [KnownTransformType](xref:@azure/arm-frontdoor.KnownTransformType) can be used
  interchangeably with TransformType,
   this enum contains the known values that the service supports.
  ### Known values supported by the service

  **Lowercase**: Lowercase \

  **Uppercase**: Uppercase \

  **Trim**: Trim \

  **UrlDecode**: UrlDecode \

  **UrlEncode**: UrlEncode \

  **RemoveNulls**: RemoveNulls
