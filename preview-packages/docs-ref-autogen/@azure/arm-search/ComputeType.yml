### YamlMime:TSTypeAlias
name: ComputeType
uid: '@azure/arm-search.ComputeType'
package: '@azure/arm-search'
summary: >-
  Configure this property to support the search service using either the Default
  Compute or Azure Confidential Compute. \

  [KnownComputeType](xref:@azure/arm-search.KnownComputeType) can be used
  interchangeably with ComputeType,
   this enum contains the known values that the service supports.
  ### Known values supported by the service

  **Default**: Create the service with the Default Compute. \

  **Confidential**: Create the dedicated service with Azure Confidential
  Compute.
fullName: ComputeType
remarks: ''
isDeprecated: false
syntax: |
  type ComputeType = string
