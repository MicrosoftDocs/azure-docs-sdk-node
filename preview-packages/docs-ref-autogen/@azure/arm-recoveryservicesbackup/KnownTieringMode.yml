### YamlMime:TSEnum
name: KnownTieringMode
uid: '@azure/arm-recoveryservicesbackup.KnownTieringMode'
package: '@azure/arm-recoveryservicesbackup'
summary: >-
  Tiering Mode to control automatic tiering of recovery points. Supported values
  are:

  1. TierRecommended: Tier all recovery points recommended to be tiered

  2. TierAfter: Tier all recovery points after a fixed period, as specified in
  duration + durationType below.

  3. DoNotTier: Do not tier any recovery points
fullName: KnownTieringMode
remarks: ''
