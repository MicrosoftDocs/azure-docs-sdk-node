name: KnownMicrosoftHostedNetworkEnableStatus
uid: '@azure/arm-devcenter.KnownMicrosoftHostedNetworkEnableStatus'
package: '@azure/arm-devcenter'
summary: >-
  Indicates whether pools in this Dev Center can use Microsoft Hosted Networks.
  Defaults to Enabled if not set.
fullName: KnownMicrosoftHostedNetworkEnableStatus
remarks: ''
isDeprecated: false
fields:
  - name: Disabled
    uid: '@azure/arm-devcenter.KnownMicrosoftHostedNetworkEnableStatus.Disabled'
    package: '@azure/arm-devcenter'
    summary: Microsoft Hosted Networks are disabled for this Dev Center.
  - name: Enabled
    uid: '@azure/arm-devcenter.KnownMicrosoftHostedNetworkEnableStatus.Enabled'
    package: '@azure/arm-devcenter'
    summary: Microsoft Hosted Networks are enabled for this Dev Center.
