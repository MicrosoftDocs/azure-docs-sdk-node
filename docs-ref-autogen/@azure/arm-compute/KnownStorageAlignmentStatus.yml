### YamlMime:TSEnum
name: KnownStorageAlignmentStatus
uid: '@azure/arm-compute.KnownStorageAlignmentStatus'
package: '@azure/arm-compute'
summary: Specifies the storage alignment status for the disk.
fullName: KnownStorageAlignmentStatus
remarks: ''
isDeprecated: false
fields:
  - name: Aligned
    uid: '@azure/arm-compute.KnownStorageAlignmentStatus.Aligned'
    package: '@azure/arm-compute'
    summary: >-
      Disk has Storage Fault Domain to Compute Fault Domain mapping. Storage
      Fault Domain failure is contained to VMs in a single Compute Fault Domain.
  - name: Unaligned
    uid: '@azure/arm-compute.KnownStorageAlignmentStatus.Unaligned'
    package: '@azure/arm-compute'
    summary: >-
      Disk does not have Storage Fault Domain to Compute Fault Domain mapping. A
      single Storage Fault Domain failure may impact all VMs that reference this
      disk profile.
