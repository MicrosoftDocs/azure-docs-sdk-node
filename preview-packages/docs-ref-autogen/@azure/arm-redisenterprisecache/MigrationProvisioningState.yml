### YamlMime:TSTypeAlias
name: MigrationProvisioningState
uid: '@azure/arm-redisenterprisecache.MigrationProvisioningState'
package: '@azure/arm-redisenterprisecache'
summary: >-
  Current provisioning status \

  [KnownMigrationProvisioningState](xref:@azure/arm-redisenterprisecache.KnownMigrationProvisioningState)
  can be used interchangeably with MigrationProvisioningState,
   this enum contains the known values that the service supports.
  ### Known values supported by the service

  **Accepted**: The request has been accepted and the migration operation is
  being initialized. \

  **InProgress**: The migration operation is in progress. \

  **ReadyForDnsSwitch**: The migration operation has completed transferring data
  and is ready for DNS switch. \

  **Succeeded**: The migration operation has completed successfully. \

  **Failed**: The migration operation has failed. \

  **Cancelling**: The migration operation is being cancelled. \

  **Cancelled**: The migration operation has been cancelled. \

  **CancellationFailed**: The migration operation cancellation has failed.
fullName: MigrationProvisioningState
remarks: ''
isDeprecated: false
syntax: |
  type MigrationProvisioningState = string
