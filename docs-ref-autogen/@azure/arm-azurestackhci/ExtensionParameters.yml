### YamlMime:TSType
name: ExtensionParameters
uid: '@azure/arm-azurestackhci.ExtensionParameters'
package: '@azure/arm-azurestackhci'
summary: >-
  Describes the properties of a Machine Extension. This object mirrors the
  definition in HybridCompute.
fullName: ExtensionParameters
remarks: ''
isDeprecated: false
type: interface
properties:
  - name: autoUpgradeMinorVersion
    uid: '@azure/arm-azurestackhci.ExtensionParameters.autoUpgradeMinorVersion'
    package: '@azure/arm-azurestackhci'
    summary: >-
      Indicates whether the extension should use a newer minor version if one is
      available at deployment time. Once deployed, however, the extension will
      not upgrade minor versions unless redeployed, even with this property set
      to true.
    fullName: autoUpgradeMinorVersion
    remarks: ''
    isDeprecated: false
    syntax:
      content: 'autoUpgradeMinorVersion?: boolean'
      return:
        description: ''
        type: boolean
  - name: enableAutomaticUpgrade
    uid: '@azure/arm-azurestackhci.ExtensionParameters.enableAutomaticUpgrade'
    package: '@azure/arm-azurestackhci'
    summary: >-
      Indicates whether the extension should be automatically upgraded by the
      platform if there is a newer version available.
    fullName: enableAutomaticUpgrade
    remarks: ''
    isDeprecated: false
    syntax:
      content: 'enableAutomaticUpgrade?: boolean'
      return:
        description: ''
        type: boolean
  - name: forceUpdateTag
    uid: '@azure/arm-azurestackhci.ExtensionParameters.forceUpdateTag'
    package: '@azure/arm-azurestackhci'
    summary: >-
      How the extension handler should be forced to update even if the extension
      configuration has not changed.
    fullName: forceUpdateTag
    remarks: ''
    isDeprecated: false
    syntax:
      content: 'forceUpdateTag?: string'
      return:
        description: ''
        type: string
  - name: protectedSettings
    uid: '@azure/arm-azurestackhci.ExtensionParameters.protectedSettings'
    package: '@azure/arm-azurestackhci'
    summary: Protected settings (may contain secrets).
    fullName: protectedSettings
    remarks: ''
    isDeprecated: false
    syntax:
      content: 'protectedSettings?: any'
      return:
        description: ''
        type: any
  - name: publisher
    uid: '@azure/arm-azurestackhci.ExtensionParameters.publisher'
    package: '@azure/arm-azurestackhci'
    summary: The name of the extension handler publisher.
    fullName: publisher
    remarks: ''
    isDeprecated: false
    syntax:
      content: 'publisher?: string'
      return:
        description: ''
        type: string
  - name: settings
    uid: '@azure/arm-azurestackhci.ExtensionParameters.settings'
    package: '@azure/arm-azurestackhci'
    summary: Json formatted public settings for the extension.
    fullName: settings
    remarks: ''
    isDeprecated: false
    syntax:
      content: 'settings?: any'
      return:
        description: ''
        type: any
  - name: type
    uid: '@azure/arm-azurestackhci.ExtensionParameters.type'
    package: '@azure/arm-azurestackhci'
    summary: >-
      Specifies the type of the extension; an example is
      "CustomScriptExtension".
    fullName: type
    remarks: ''
    isDeprecated: false
    syntax:
      content: 'type?: string'
      return:
        description: ''
        type: string
  - name: typeHandlerVersion
    uid: '@azure/arm-azurestackhci.ExtensionParameters.typeHandlerVersion'
    package: '@azure/arm-azurestackhci'
    summary: >-
      Specifies the version of the script handler. Latest version would be used
      if not specified.
    fullName: typeHandlerVersion
    remarks: ''
    isDeprecated: false
    syntax:
      content: 'typeHandlerVersion?: string'
      return:
        description: ''
        type: string
