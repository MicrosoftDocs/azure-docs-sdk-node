  ### Known values supported by the service

  **MD5**: MD5 \

  **SHA1**: SHA1 \

  **SHA256**: SHA256 \

  **SHA384**: SHA384 \

  **GCMAES256**: GCMAES256 \

  **GCMAES128**: GCMAES128
