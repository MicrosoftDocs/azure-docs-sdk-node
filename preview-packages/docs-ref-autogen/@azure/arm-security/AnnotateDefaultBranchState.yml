name: AnnotateDefaultBranchState
uid: '@azure/arm-security.AnnotateDefaultBranchState'
package: '@azure/arm-security'
summary: >-
  Configuration of PR Annotations on default branch.


  Enabled - PR Annotations are enabled on the resource's default branch.

  Disabled - PR Annotations are disabled on the resource's default branch. \

  [KnownAnnotateDefaultBranchState](xref:@azure/arm-security.KnownAnnotateDefaultBranchState)
  can be used interchangeably with AnnotateDefaultBranchState,
   this enum contains the known values that the service supports.
  ### Known values supported by the service

  **Disabled**: Disabled \

  **Enabled**: Enabled
