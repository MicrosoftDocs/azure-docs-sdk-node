name: TagInheritanceProperties
uid: '@azure/arm-costmanagement.TagInheritanceProperties'
package: '@azure/arm-costmanagement'
summary: The properties of the tag inheritance setting.
fullName: TagInheritanceProperties
remarks: ''
isDeprecated: false
type: interface
properties:
  - name: preferContainerTags
    uid: '@azure/arm-costmanagement.TagInheritanceProperties.preferContainerTags'
    package: '@azure/arm-costmanagement'
    summary: >-
      This property defines the behavior when an inherited tag being applied
      matches a lower scope tag (Eg. Subscription tag matches the resource tag).
      If set to true - when tags match, the highest scope tags will be applied.
      Billing profile is the highest scope,  followed by invoice sections,
      subscriptions and resource groups (allows overriding of lower scope tag
      values). If set to false - when tags match, the lowest scope tags will be
      applied. So, if a resource has the same tag as a subscription tag, the
      resource tag will be applied (does not allow overriding of lower scope tag
      values).
    fullName: preferContainerTags
    remarks: ''
    isDeprecated: false
    syntax:
      content: 'preferContainerTags: boolean'
      return:
        description: ''
        type: boolean
