### YamlMime:TSTypeAlias
name: DevBoxDeleteMode
uid: '@azure/arm-devcenter.DevBoxDeleteMode'
package: '@azure/arm-devcenter'
summary: >-
  Indicates possible values for Dev Box delete mode. \

  [KnownDevBoxDeleteMode](xref:@azure/arm-devcenter.KnownDevBoxDeleteMode) can
  be used interchangeably with DevBoxDeleteMode,
   this enum contains the known values that the service supports.
  ### Known values supported by the service

  **Manual**: Dev Boxes will not be deleted automatically, and user must
  manually delete. This is the default. \

  **Auto**: Dev Boxes will be deleted automatically according to configured
  settings.
fullName: DevBoxDeleteMode
remarks: ''
isDeprecated: false
syntax: |
  type DevBoxDeleteMode = string
