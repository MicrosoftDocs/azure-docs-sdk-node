### YamlMime:TSType
name: SearchResourceEncryptionKey
uid: '@azure/arm-search.SearchResourceEncryptionKey'
package: '@azure/arm-search'
summary: >-
  A customer-managed encryption key in Azure Key Vault. Keys that you create and
  manage can be used to encrypt or decrypt data-at-rest, such as indexes and
  synonym maps.
fullName: SearchResourceEncryptionKey
remarks: ''
isDeprecated: false
type: interface
properties:
  - name: accessCredentials
    uid: '@azure/arm-search.SearchResourceEncryptionKey.accessCredentials'
    package: '@azure/arm-search'
    summary: >-
      Optional Azure Active Directory credentials used for accessing your Azure
      Key Vault. Not required if using managed identity instead.
    fullName: accessCredentials
    remarks: ''
    isDeprecated: false
    syntax:
      content: 'accessCredentials?: AzureActiveDirectoryApplicationCredentials'
      return:
        description: ''
        type: >-
          <xref
          uid="@azure/arm-search.AzureActiveDirectoryApplicationCredentials" />
  - name: identity
    uid: '@azure/arm-search.SearchResourceEncryptionKey.identity'
    package: '@azure/arm-search'
    summary: >-
      An explicit managed identity to use for this encryption key. If not
      specified and the access credentials property is null, the system-assigned
      managed identity is used. On update to the resource, if the explicit
      identity is unspecified, it remains unchanged. If "none" is specified, the
      value of this property is cleared.
    fullName: identity
    remarks: ''
    isDeprecated: false
    syntax:
      content: 'identity?: DataIdentityUnion'
      return:
        description: ''
        type: <xref uid="@azure/arm-search.DataIdentityUnion" />
  - name: keyName
    uid: '@azure/arm-search.SearchResourceEncryptionKey.keyName'
    package: '@azure/arm-search'
    summary: >-
      The name of your Azure Key Vault key to be used to encrypt your data at
      rest.
    fullName: keyName
    remarks: ''
    isDeprecated: false
    syntax:
      content: 'keyName?: string'
      return:
        description: ''
        type: string
  - name: keyVersion
    uid: '@azure/arm-search.SearchResourceEncryptionKey.keyVersion'
    package: '@azure/arm-search'
    summary: >-
      The version of your Azure Key Vault key to be used to encrypt your data at
      rest.
    fullName: keyVersion
    remarks: ''
    isDeprecated: false
    syntax:
      content: 'keyVersion?: string'
      return:
        description: ''
        type: string
  - name: vaultUri
    uid: '@azure/arm-search.SearchResourceEncryptionKey.vaultUri'
    package: '@azure/arm-search'
    summary: >-
      The URI of your Azure Key Vault, also referred to as DNS name, that
      contains the key to be used to encrypt your data at rest. An example URI
      might be `https://my-keyvault-name.vault.azure.net`.
    fullName: vaultUri
    remarks: ''
    isDeprecated: false
    syntax:
      content: 'vaultUri?: string'
      return:
        description: ''
        type: string
