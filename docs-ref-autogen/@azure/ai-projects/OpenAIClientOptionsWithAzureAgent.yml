  - name: apiKey
    uid: '@azure/ai-projects.OpenAIClientOptionsWithAzureAgent.apiKey'
    package: '@azure/ai-projects'
    summary: >-
      API key used for authentication.


      - Accepts either a static string or an async function that resolves to a
      string.

      - Defaults to process.env['OPENAI_API_KEY'].

      - When a function is provided, it is invoked before each request so you
      can rotate
        or refresh credentials at runtime.
      - The function must return a non-empty string; otherwise an OpenAIError is
      thrown.

      - If the function throws, the error is wrapped in an OpenAIError with the
      original
        error available as `cause`.
      - Mutually exclusive with `workloadIdentity`.
    fullName: apiKey
    remarks: ''
    isDeprecated: false
    syntax:
      content: 'apiKey?: string | ApiKeySetter'
      return:
        description: ''
        type: string | ApiKeySetter
