name: AccessPolicyType
uid: '@azure/arm-rediscache.AccessPolicyType'
package: '@azure/arm-rediscache'
summary: >-
  Built-In or Custom access policy \

  [KnownAccessPolicyType](xref:@azure/arm-rediscache.KnownAccessPolicyType) can
  be used interchangeably with AccessPolicyType,
   this enum contains the known values that the service supports.
  ### Known values supported by the service

  **Custom**: User-configurable access policy, using the redis access policy
  authoring language \

  **BuiltIn**: Built-in or well-known access policies, whose policy is not
  configurable.
