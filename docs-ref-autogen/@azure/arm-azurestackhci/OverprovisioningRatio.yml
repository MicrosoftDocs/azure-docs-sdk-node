name: OverprovisioningRatio
uid: '@azure/arm-azurestackhci.OverprovisioningRatio'
package: '@azure/arm-azurestackhci'
summary: >-
  Overprovisioning ratio for S2D storage. \

  [KnownOverprovisioningRatio](xref:@azure/arm-azurestackhci.KnownOverprovisioningRatio)
  can be used interchangeably with OverprovisioningRatio,
   this enum contains the known values that the service supports.
  ### Known values supported by the service

  **0**: No overprovisioning. \

  **1**: Overprovisioning ratio of 1. \

  **2**: Overprovisioning ratio of 2.
