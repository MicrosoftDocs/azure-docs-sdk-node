### YamlMime:TSEnum
name: KnownDnsServerConfig
uid: '@azure/arm-azurestackhci.KnownDnsServerConfig'
package: '@azure/arm-azurestackhci'
summary: >-
  Specifies how DNS servers are configured for the infrastructure network.
  Allowed values are 'UseDnsServer' to use the provided DNS servers, and
  'UseForwarder' to use DNS forwarders.
fullName: KnownDnsServerConfig
remarks: ''
isDeprecated: false
fields:
  - name: UseDnsServer
    uid: '@azure/arm-azurestackhci.KnownDnsServerConfig.UseDnsServer'
    package: '@azure/arm-azurestackhci'
    summary: Use the provided DNS servers for the infrastructure network.
  - name: UseForwarder
    uid: '@azure/arm-azurestackhci.KnownDnsServerConfig.UseForwarder'
    package: '@azure/arm-azurestackhci'
    summary: Use DNS forwarders for the infrastructure network.
