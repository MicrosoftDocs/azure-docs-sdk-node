### YamlMime:TSType
name: RaiEgressRuleAction
uid: '@azure/arm-cognitiveservices.RaiEgressRuleAction'
package: '@azure/arm-cognitiveservices'
summary: >-
  The action an egress rule takes when it matches.

  - Allow/Deny: no additional fields needed; headers and rewrite must not be
  set.

  - Transform: headers is required with at least one entry; rewrite must not be
  set.

  - Rewrite: rewrite is required with at least one of scheme/host/path;

  headers is optional for injecting headers alongside the redirect.
fullName: RaiEgressRuleAction
remarks: ''
isDeprecated: false
type: interface
properties:
  - name: actionType
    uid: '@azure/arm-cognitiveservices.RaiEgressRuleAction.actionType'
    package: '@azure/arm-cognitiveservices'
    summary: The kind of action.
    fullName: actionType
    remarks: ''
    isDeprecated: false
    syntax:
      content: 'actionType: string'
      return:
        description: ''
        type: string
  - name: headers
    uid: '@azure/arm-cognitiveservices.RaiEgressRuleAction.headers'
    package: '@azure/arm-cognitiveservices'
    summary: |-
      Header transforms to apply. Required for Transform; optional for Rewrite;
      not allowed for Allow or Deny.
    fullName: headers
    remarks: ''
    isDeprecated: false
    syntax:
      content: 'headers?: RaiEgressHeaderTransform[]'
      return:
        description: ''
        type: <xref uid="@azure/arm-cognitiveservices.RaiEgressHeaderTransform" />[]
  - name: rewrite
    uid: '@azure/arm-cognitiveservices.RaiEgressRuleAction.rewrite'
    package: '@azure/arm-cognitiveservices'
    summary: Destination override. Required for Rewrite; not allowed otherwise.
    fullName: rewrite
    remarks: ''
    isDeprecated: false
    syntax:
      content: 'rewrite?: RaiEgressRewriteTarget'
      return:
        description: ''
        type: <xref uid="@azure/arm-cognitiveservices.RaiEgressRewriteTarget" />
