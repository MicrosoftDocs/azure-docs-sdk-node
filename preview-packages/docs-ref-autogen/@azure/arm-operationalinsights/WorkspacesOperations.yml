  - name: failover
    uid: '@azure/arm-operationalinsights.WorkspacesOperations.failover'
    package: '@azure/arm-operationalinsights'
    summary: >-
      Activates failover for the specified workspace.


      The specified replication location must match the location of the enabled
      replication for this workspace. The failover operation is asynchronous and
      can take up to 30 minutes to complete. The status of the operation can be
      checked using the operationId returned in the response.
