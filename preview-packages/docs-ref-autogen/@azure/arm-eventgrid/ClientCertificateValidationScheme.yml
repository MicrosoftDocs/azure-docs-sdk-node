name: ClientCertificateValidationScheme
uid: '@azure/arm-eventgrid.ClientCertificateValidationScheme'
package: '@azure/arm-eventgrid'
summary: >-
  The validation scheme used to authenticate the client. Default value is
  SubjectMatchesAuthenticationName. \

  [KnownClientCertificateValidationScheme](xref:@azure/arm-eventgrid.KnownClientCertificateValidationScheme)
  can be used interchangeably with ClientCertificateValidationScheme,
   this enum contains the known values that the service supports.
  ### Known values supported by the service

  **SubjectMatchesAuthenticationName**: SubjectMatchesAuthenticationName \

  **DnsMatchesAuthenticationName**: DnsMatchesAuthenticationName \

  **UriMatchesAuthenticationName**: UriMatchesAuthenticationName \

  **IpMatchesAuthenticationName**: IpMatchesAuthenticationName \

  **EmailMatchesAuthenticationName**: EmailMatchesAuthenticationName \

  **ThumbprintMatch**: ThumbprintMatch
fullName: ClientCertificateValidationScheme
remarks: ''
isDeprecated: false
syntax: |
  type ClientCertificateValidationScheme = string
