name: ClusterNetworkAccessFlag
uid: '@azure/arm-kusto.ClusterNetworkAccessFlag'
package: '@azure/arm-kusto'
summary: >-
  Whether or not to restrict outbound network access.  Value is optional but if
  passed in, must be 'Enabled' or 'Disabled' \

  [KnownClusterNetworkAccessFlag](xref:@azure/arm-kusto.KnownClusterNetworkAccessFlag)
  can be used interchangeably with ClusterNetworkAccessFlag,
   this enum contains the known values that the service supports.
  ### Known values supported by the service

  **Enabled**: Enabled \

  **Disabled**: Disabled
fullName: ClusterNetworkAccessFlag
remarks: ''
