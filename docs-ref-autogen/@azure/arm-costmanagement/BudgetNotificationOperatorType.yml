### YamlMime:TSTypeAlias
name: BudgetNotificationOperatorType
uid: '@azure/arm-costmanagement.BudgetNotificationOperatorType'
package: '@azure/arm-costmanagement'
summary: >-
  The comparison operator.


  Supported for CategoryType(s): Cost, ReservationUtilization.


  Supported operators for **CategoryType: Cost**

  - GreaterThan

  - GreaterThanOrEqualTo


  Supported operators for **CategoryType: ReservationUtilization**

  - LessThan \

  [KnownBudgetNotificationOperatorType](xref:@azure/arm-costmanagement.KnownBudgetNotificationOperatorType)
  can be used interchangeably with BudgetNotificationOperatorType,
   this enum contains the known values that the service supports.
  ### Known values supported by the service

  **EqualTo**: Notification will be triggered if the evaluated cost is the same
  as threshold value. Note: It’s not recommended to use this OperatorType as
  there’s low chance of cost being exactly the same as threshold value, leading
  to missing of your alert. This OperatorType will be deprecated in future.


  Supported for CategoryType(s): Cost. \

  **GreaterThan**: Notification will be triggered if the evaluated cost is
  greater than the threshold value. Note: This is the recommended OperatorType
  while configuring Budget Alert.


  Supported for CategoryType(s): Cost. \

  **GreaterThanOrEqualTo**: Notification will be triggered if the evaluated cost
  is greater than or equal to the threshold value.


  Supported for CategoryType(s): Cost. \

  **LessThan**: Notification will be triggered if any Reservations in the scope
  of the Reservation Utilization Alert Rule have a utilization less than the
  threshold percentage.


  Supported for CategoryType(s): ReservationUtilization.
fullName: BudgetNotificationOperatorType
remarks: ''
isDeprecated: false
syntax: |
  type BudgetNotificationOperatorType = string
