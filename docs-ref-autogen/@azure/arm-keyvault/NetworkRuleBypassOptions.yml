name: NetworkRuleBypassOptions
uid: '@azure/arm-keyvault.NetworkRuleBypassOptions'
package: '@azure/arm-keyvault'
summary: >-
  Tells what traffic can bypass network rules. This can be 'AzureServices' or
  'None'.  If not specified the default is 'AzureServices'. \

  [KnownNetworkRuleBypassOptions](xref:@azure/arm-keyvault.KnownNetworkRuleBypassOptions)
  can be used interchangeably with NetworkRuleBypassOptions,
   this enum contains the known values that the service supports.
  ### Known values supported by the service

  **AzureServices** \

  **None**
