name: PartitionKind
uid: '@azure/arm-cosmosdb.PartitionKind'
package: '@azure/arm-cosmosdb'
summary: >-
  Indicates the kind of algorithm used for partitioning. For MultiHash, multiple
  partition keys (upto three maximum) are supported for container create \

  [KnownPartitionKind](xref:@azure/arm-cosmosdb.KnownPartitionKind) can be used
  interchangeably with PartitionKind,
   this enum contains the known values that the service supports.
  ### Known values supported by the service

  **Hash** \

  **Range** \

  **MultiHash**
fullName: PartitionKind
