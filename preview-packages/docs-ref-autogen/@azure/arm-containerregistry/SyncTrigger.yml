### YamlMime:TSTypeAlias
name: SyncTrigger
uid: '@azure/arm-containerregistry.SyncTrigger'
package: '@azure/arm-containerregistry'
summary: >-
  The status of the connected registry's most recent sync. \

  [KnownSyncTrigger](xref:@azure/arm-containerregistry.KnownSyncTrigger) can be
  used interchangeably with SyncTrigger,
   this enum contains the known values that the service supports.
  ### Known values supported by the service

  **SyncTokenUpdate**: Connected Registry sync was triggered by a sync token
  update \

  **InitialSync**: Connected Registry sync was triggered by an initial sync
  during activation \

  **ManualResync**: Connected Registry sync was triggered by a manual resync
  request \

  **RecoveryService**: Connected Registry sync was triggered by the Connected
  Registry's recovery service
fullName: SyncTrigger
remarks: ''
isDeprecated: false
syntax: |
  type SyncTrigger = string
