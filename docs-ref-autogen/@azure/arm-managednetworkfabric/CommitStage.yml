### YamlMime:TSTypeAlias
name: CommitStage
uid: '@azure/arm-managednetworkfabric.CommitStage'
package: '@azure/arm-managednetworkfabric'
summary: >-
  Commit stage Action to be performed. \

  [KnownCommitStage](xref:@azure/arm-managednetworkfabric.KnownCommitStage) can
  be used interchangeably with CommitStage,
   this enum contains the known values that the service supports.
  ### Known values supported by the service

  **Start**: CommitStage-Start indicates to prepare the device configuration for
  the devices which is decided by policy type \

  **Continue**: CommitStage-Continue indicates to push the configuration to the
  devices provided. Either CE1 or CE2 is allowed \

  **Rollback**: CommitStage-Rollback indicates to revert to the previous
  configuration for the devices to which configuration is pushed as part of
  staging.
fullName: CommitStage
remarks: ''
isDeprecated: false
syntax: |
  type CommitStage = string
