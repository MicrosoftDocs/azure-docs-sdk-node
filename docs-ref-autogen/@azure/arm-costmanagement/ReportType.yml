### YamlMime:TSTypeAlias
name: ReportType
uid: '@azure/arm-costmanagement.ReportType'
package: '@azure/arm-costmanagement'
summary: >-
  The type of the report. Usage represents actual usage, forecast represents
  forecasted data and UsageAndForecast represents both usage and forecasted
  data. Actual usage and forecasted data can be differentiated based on dates. \

  [KnownReportType](xref:@azure/arm-costmanagement.KnownReportType) can be used
  interchangeably with ReportType,
   this enum contains the known values that the service supports.
  ### Known values supported by the service

  **Usage**
fullName: ReportType
remarks: ''
isDeprecated: false
syntax: |
  type ReportType = string
