### YamlMime:TSEnum
name: KnownRuleIsCompressionEnabled
uid: '@azure/arm-cdn.KnownRuleIsCompressionEnabled'
package: '@azure/arm-cdn'
summary: >-
  Indicates whether content compression is enabled. If compression is enabled,
  content will be served as compressed if user requests for a compressed
  version. Content won't be compressed on AzureFrontDoor when requested content
  is smaller than 1 byte or larger than 1 MB.
fullName: KnownRuleIsCompressionEnabled
remarks: ''
isDeprecated: false
fields:
  - name: Disabled
    uid: '@azure/arm-cdn.KnownRuleIsCompressionEnabled.Disabled'
    package: '@azure/arm-cdn'
    summary: Disabled
  - name: Enabled
    uid: '@azure/arm-cdn.KnownRuleIsCompressionEnabled.Enabled'
    package: '@azure/arm-cdn'
    summary: Enabled
