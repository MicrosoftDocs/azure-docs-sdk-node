### YamlMime:TSTypeAlias
name: ThresholdType
uid: '@azure/arm-costmanagement.ThresholdType'
package: '@azure/arm-costmanagement'
summary: >-
  The type of threshold.


  Supported for CategoryType(s): Cost. \

  [KnownThresholdType](xref:@azure/arm-costmanagement.KnownThresholdType) can be
  used interchangeably with ThresholdType,
   this enum contains the known values that the service supports.
  ### Known values supported by the service

  **Actual**: Actual costs budget alerts notify when the actual accrued cost
  exceeds the allocated budget. \

  **Forecasted**: Forecasted costs budget alerts provide advanced notification
  that your spending trends are likely to exceed your allocated budget, as it
  relies on forecasted cost predictions.
fullName: ThresholdType
remarks: ''
isDeprecated: false
syntax: |
  type ThresholdType = string
