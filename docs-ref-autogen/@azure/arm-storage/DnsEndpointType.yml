### YamlMime:TSTypeAlias
name: DnsEndpointType
uid: '@azure/arm-storage.DnsEndpointType'
package: '@azure/arm-storage'
summary: >-
  Allows you to specify the type of endpoint. Set this to AzureDNSZone to create
  a large number of accounts in a single subscription, which creates accounts in
  an Azure DNS Zone and the endpoint URL will have an alphanumeric DNS Zone
  identifier. \

  [KnownDnsEndpointType](xref:@azure/arm-storage.KnownDnsEndpointType) can be
  used interchangeably with DnsEndpointType,
   this enum contains the known values that the service supports.
  ### Known values supported by the service

  **Standard** \

  **AzureDnsZone**
fullName: DnsEndpointType
remarks: ''
isDeprecated: false
syntax: |
  type DnsEndpointType = string
