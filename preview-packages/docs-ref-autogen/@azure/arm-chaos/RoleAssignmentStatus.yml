name: RoleAssignmentStatus
uid: '@azure/arm-chaos.RoleAssignmentStatus'
package: '@azure/arm-chaos'
summary: >-
  Enum of the role assignment status. \

  [KnownRoleAssignmentStatus](xref:@azure/arm-chaos.KnownRoleAssignmentStatus)
  can be used interchangeably with RoleAssignmentStatus,
   this enum contains the known values that the service supports.
  ### Known values supported by the service

  **Succeeded**: The role assignment succeeded. \

  **Failed**: The role assignment failed. \

  **Skipped**: The role assignment was skipped (already exists). \

  **Pending**: The role assignment is pending (what-if mode).
