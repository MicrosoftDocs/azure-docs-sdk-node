name: SessionIncludeOption
uid: '@azure/ai-voicelive.SessionIncludeOption'
package: '@azure/ai-voicelive'
summary: >-
  Options for what additional data to include in session responses. \

  [KnownSessionIncludeOption](xref:@azure/ai-voicelive.KnownSessionIncludeOption)
  can be used interchangeably with SessionIncludeOption,
   this enum contains the known values that the service supports.
  ### Known values supported by the service

  **item.input_audio_transcription.logprobs**: Include log probabilities for
  input audio transcription. \

  **item.input_audio_transcription.phrases**: Include phrase-level details for
  input audio transcription. \

  **file_search_call.results**: Include file search call results.
fullName: SessionIncludeOption
remarks: ''
isDeprecated: false
syntax: |
  type SessionIncludeOption = string
