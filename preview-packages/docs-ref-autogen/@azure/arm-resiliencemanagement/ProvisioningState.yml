name: ProvisioningState
uid: '@azure/arm-resiliencemanagement.ProvisioningState'
package: '@azure/arm-resiliencemanagement'
summary: >-
  The status of the current operation. \

  [KnownProvisioningState](xref:@azure/arm-resiliencemanagement.KnownProvisioningState)
  can be used interchangeably with ProvisioningState,
   this enum contains the known values that the service supports.
  ### Known values supported by the service

  **Succeeded**: Resource has been created. \

  **Failed**: Resource creation failed. \

  **Canceled**: Resource creation was canceled. \

  **Provisioning**: Initial provisioning in progress \

  **Updating**: Update in progress \

  **Deleting**: Deletion in progress \

  **Accepted**: Change accepted for processing
fullName: ProvisioningState
remarks: ''
isDeprecated: false
syntax: |
  type ProvisioningState = string
