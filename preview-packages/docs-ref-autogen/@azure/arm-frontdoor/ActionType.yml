  ### Known values supported by the service

  **Allow**: Allow \

  **Block**: Block \

  **Log**: Log \

  **Redirect**: Redirect \

  **AnomalyScoring**: AnomalyScoring \

  **JSChallenge**: JSChallenge \

  **CAPTCHA**: CAPTCHA
