### YamlMime:TSTypeAlias
name: RuleStatus
uid: '@azure/arm-costmanagement.RuleStatus'
package: '@azure/arm-costmanagement'
summary: >-
  Current status of the rule. \

  [KnownRuleStatus](xref:@azure/arm-costmanagement.KnownRuleStatus) can be used
  interchangeably with RuleStatus,
   this enum contains the known values that the service supports.
  ### Known values supported by the service

  **NotActive**: Rule is saved but not used to allocate costs. \

  **Active**: Rule is saved and impacting cost allocation. \

  **Processing**: Rule is saved and cost allocation is being updated. Readonly
  value that cannot be submitted in a put request.
fullName: RuleStatus
remarks: ''
isDeprecated: false
syntax: |
  type RuleStatus = string
