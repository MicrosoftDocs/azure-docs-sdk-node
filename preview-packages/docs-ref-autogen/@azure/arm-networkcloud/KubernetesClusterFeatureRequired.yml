name: KubernetesClusterFeatureRequired
uid: '@azure/arm-networkcloud.KubernetesClusterFeatureRequired'
package: '@azure/arm-networkcloud'
summary: >-
  The indicator of if the feature is required or optional. Optional features may
  be deleted by the user, while required features are managed with the
  kubernetes cluster lifecycle. \

  [KnownKubernetesClusterFeatureRequired](xref:@azure/arm-networkcloud.KnownKubernetesClusterFeatureRequired)
  can be used interchangeably with KubernetesClusterFeatureRequired,
   this enum contains the known values that the service supports.
  ### Known values supported by the service

  **True**: A required feature. \

  **False**: An optional feature.
fullName: KubernetesClusterFeatureRequired
remarks: ''
isDeprecated: false
syntax: |
  type KubernetesClusterFeatureRequired = string
