  - name: list
    uid: '@azure/arm-resources.TagsOperationsOperations.list'
    package: '@azure/arm-resources'
    summary: >-
      This operation performs a union of predefined tags, resource tags,
      resource group tags and subscription tags, and returns a summary of usage
      for each tag name and value under the given subscription. In case of a
      large number of tags, this operation may return a previously cached
      result.
    fullName: list
