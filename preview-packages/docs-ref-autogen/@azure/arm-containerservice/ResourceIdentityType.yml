### YamlMime:TSTypeAlias
name: ResourceIdentityType
uid: '@azure/arm-containerservice.ResourceIdentityType'
package: '@azure/arm-containerservice'
summary: >-
  The type of identity used for the managed cluster. For more information see
  [use managed identities in
  AKS](https://docs.microsoft.com/azure/aks/use-managed-identity). \

  [KnownResourceIdentityType](xref:@azure/arm-containerservice.KnownResourceIdentityType)
  can be used interchangeably with ResourceIdentityType,
   this enum contains the known values that the service supports.
  ### Known values supported by the service

  **SystemAssigned**: Use an implicitly created system assigned managed identity
  to manage cluster resources. Master components in the control plane such as
  kube-controller-manager will use the system assigned managed identity to
  manipulate Azure resources. \

  **UserAssigned**: Use a user-specified identity to manage cluster resources.
  Master components in the control plane such as kube-controller-manager will
  use the specified user assigned managed identity to manipulate Azure
  resources. \

  **None**: Do not use a managed identity for the Managed Cluster, service
  principal will be used instead.
fullName: ResourceIdentityType
remarks: ''
isDeprecated: false
syntax: |
  type ResourceIdentityType = string
