### YamlMime:TSType
name: ExternalAgentDefinition
uid: '@azure/ai-projects.ExternalAgentDefinition'
package: '@azure/ai-projects'
summary: >-
  The external agent definition. Represents a third-party agent hosted outside
  Foundry (for example, on GCP or AWS).

  Registration is metadata-only: Foundry records the agent definition to light
  up observability experiences (traces, evaluations)

  over customer-emitted OpenTelemetry data.
fullName: ExternalAgentDefinition
remarks: ''
isDeprecated: false
type: interface
properties:
  - name: kind
    uid: '@azure/ai-projects.ExternalAgentDefinition.kind'
    package: '@azure/ai-projects'
    summary: The kind of agent.
    fullName: kind
    remarks: ''
    isDeprecated: false
    syntax:
      content: 'kind: "external"'
      return:
        description: ''
        type: '"external"'
  - name: otel_agent_id
    uid: '@azure/ai-projects.ExternalAgentDefinition.otel_agent_id'
    package: '@azure/ai-projects'
    summary: >-
      The OpenTelemetry agent identifier used to attribute customer-emitted
      spans to this Foundry agent.

      Spans must include the attribute `gen_ai.agent.id = <otel_agent_id>` to
      appear under this registration.

      Defaults to the top-level agent name when omitted. Provide an explicit
      value only for migration scenarios

      where the running external agent already emits a stable id that differs
      from the Foundry agent name.

      The resolved value is always echoed on read.
    fullName: otel_agent_id
    remarks: ''
    isDeprecated: false
    syntax:
      content: 'otel_agent_id?: string'
      return:
        description: ''
        type: string
inheritedProperties:
