### YamlMime:TSEnum
name: KnownAdvertiseToFabric
uid: '@azure/arm-networkcloud.KnownAdvertiseToFabric'
package: '@azure/arm-networkcloud'
summary: >-
  The indicator of if this advertisement is also made to the network fabric
  associated with the Network Cloud Cluster. This field is ignored if
  fabricPeeringEnabled is set to False.
fullName: KnownAdvertiseToFabric
remarks: ''
isDeprecated: false
fields:
  - name: 'False'
    uid: '@azure/arm-networkcloud.KnownAdvertiseToFabric.False'
    package: '@azure/arm-networkcloud'
    summary: Do not advertise to fabric
  - name: 'True'
    uid: '@azure/arm-networkcloud.KnownAdvertiseToFabric.True'
    package: '@azure/arm-networkcloud'
    summary: Advertise to fabric
