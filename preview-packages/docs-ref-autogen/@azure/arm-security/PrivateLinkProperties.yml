    uid: '@azure/arm-security.PrivateLinkProperties.privateEndpointConnections'
    package: '@azure/arm-security'
    summary: >-
      List of private endpoint connections associated with this private link.
      Each connection represents a private endpoint from a customer's virtual
      network.
    fullName: privateEndpointConnections
    remarks: ''
    isDeprecated: false
    syntax:
      content: 'privateEndpointConnections?: PrivateEndpointConnection[]'
      return:
        description: ''
        type: <xref uid="@azure/arm-security.PrivateEndpointConnection" />[]
  - name: privateLinkResources
    uid: '@azure/arm-security.PrivateLinkProperties.privateLinkResources'
    package: '@azure/arm-security'
    summary: >-
      List of private link resources available for connection. For Defender
      services, this typically includes the 'containers' group with 'api' and
      regional data endpoints.
    fullName: privateLinkResources
    remarks: ''
    isDeprecated: false
    syntax:
      content: 'privateLinkResources?: PrivateLinkGroupResource[]'
      return:
        description: ''
        type: <xref uid="@azure/arm-security.PrivateLinkGroupResource" />[]
  - name: provisioningState
    uid: '@azure/arm-security.PrivateLinkProperties.provisioningState'
