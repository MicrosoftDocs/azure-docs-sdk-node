name: SdnIntegrationIntent
uid: '@azure/arm-azurestackhci.SdnIntegrationIntent'
package: '@azure/arm-azurestackhci'
summary: >-
  Indicates whether Software Defined Networking (SDN) integration should be
  enabled or disabled for this deployment. \

  [KnownSdnIntegrationIntent](xref:@azure/arm-azurestackhci.KnownSdnIntegrationIntent)
  can be used interchangeably with SdnIntegrationIntent,
   this enum contains the known values that the service supports.
  ### Known values supported by the service

  **Enable**: Enable SDN integration for the deployment. \

  **Disable**: Disable SDN integration for the deployment.
fullName: SdnIntegrationIntent
remarks: ''
isDeprecated: false
syntax: |
  type SdnIntegrationIntent = string
