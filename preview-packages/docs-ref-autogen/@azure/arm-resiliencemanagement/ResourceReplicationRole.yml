### YamlMime:TSTypeAlias
name: ResourceReplicationRole
uid: '@azure/arm-resiliencemanagement.ResourceReplicationRole'
package: '@azure/arm-resiliencemanagement'
summary: >-
  A state specific to the resource that helps identify its role in replication.
  \

  [KnownResourceReplicationRole](xref:@azure/arm-resiliencemanagement.KnownResourceReplicationRole)
  can be used interchangeably with ResourceReplicationRole,
   this enum contains the known values that the service supports.
  ### Known values supported by the service

  **Unknown**: The role of the resource is unknown. \

  **Primary**: A state indicating that the resource is primary and actively
  replicating data to other replicas. \

  **Replica**: A state indicating that the resource is a replica, receiving data
  from the primary.
fullName: ResourceReplicationRole
remarks: ''
isDeprecated: false
syntax: |
  type ResourceReplicationRole = string
