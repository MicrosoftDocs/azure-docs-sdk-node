### YamlMime:TSTypeAlias
name: OverwriteDatabasesOnTargetServer
uid: '@azure/arm-postgresql-flexible.OverwriteDatabasesOnTargetServer'
package: '@azure/arm-postgresql-flexible'
summary: >-
  Indicates if databases on the target server can be overwritten when already
  present. If set to 'False', when the migration workflow detects that the
  database already exists on the target server, it will wait for a confirmation.
  \

  [KnownOverwriteDatabasesOnTargetServer](xref:@azure/arm-postgresql-flexible.KnownOverwriteDatabasesOnTargetServer)
  can be used interchangeably with OverwriteDatabasesOnTargetServer,
   this enum contains the known values that the service supports.
  ### Known values supported by the service

  **True** \

  **False**
fullName: OverwriteDatabasesOnTargetServer
remarks: ''
isDeprecated: false
syntax: |
  type OverwriteDatabasesOnTargetServer = string
