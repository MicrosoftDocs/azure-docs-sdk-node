name: CloudServicesNetworkEnableDefaultEgressEndpoints
uid: '@azure/arm-networkcloud.CloudServicesNetworkEnableDefaultEgressEndpoints'
package: '@azure/arm-networkcloud'
summary: >-
  The indicator of whether the platform default endpoints are allowed for the
  egress traffic. \

  [KnownCloudServicesNetworkEnableDefaultEgressEndpoints](xref:@azure/arm-networkcloud.KnownCloudServicesNetworkEnableDefaultEgressEndpoints)
  can be used interchangeably with
  CloudServicesNetworkEnableDefaultEgressEndpoints,
   this enum contains the known values that the service supports.
  ### Known values supported by the service

  **True**: Enable default egress endpoints. \

  **False**: Disable default egress endpoints.
