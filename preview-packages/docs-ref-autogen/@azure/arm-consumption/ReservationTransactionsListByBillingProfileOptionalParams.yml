  - name: filter
    uid: >-
      @azure/arm-consumption.ReservationTransactionsListByBillingProfileOptionalParams.filter
    package: '@azure/arm-consumption'
    summary: >-
      Filter reservation transactions by date range. The properties/EventDate
      for start date and end date. The filter supports 'le' and  'ge'. Note: API
      returns data for the entire start date's and end date's billing month. For
      example, filter
      properties/eventDate+ge+2020-01-01+AND+properties/eventDate+le+2020-12-29
      will include data for entire December 2020 month (i.e. will contain
      records for dates December 30 and 31)
    fullName: filter
