name: ScheduleDay
uid: '@azure/arm-automation.ScheduleDay'
package: '@azure/arm-automation'
summary: >-
  Day of the occurrence. Must be one of monday, tuesday, wednesday, thursday,
  friday, saturday, sunday. \

  [KnownScheduleDay](xref:@azure/arm-automation.KnownScheduleDay) can be used
  interchangeably with ScheduleDay,
   this enum contains the known values that the service supports.
  ### Known values supported by the service

  **Monday**: Monday \

  **Tuesday**: Tuesday \

  **Wednesday**: Wednesday \

  **Thursday**: Thursday \

  **Friday**: Friday \

  **Saturday**: Saturday \

  **Sunday**: Sunday
