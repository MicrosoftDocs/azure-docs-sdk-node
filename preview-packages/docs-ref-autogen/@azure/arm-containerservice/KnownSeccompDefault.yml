### YamlMime:TSEnum
name: KnownSeccompDefault
uid: '@azure/arm-containerservice.KnownSeccompDefault'
package: '@azure/arm-containerservice'
summary: >-
  Specifies the default seccomp profile applied to all workloads. If not
  specified, 'Unconfined' will be used by default.
fullName: KnownSeccompDefault
remarks: ''
isDeprecated: false
fields:
  - name: RuntimeDefault
    uid: '@azure/arm-containerservice.KnownSeccompDefault.RuntimeDefault'
    package: '@azure/arm-containerservice'
    summary: >-
      The default seccomp profile for container runtime is applied, which
      restricts certain system calls for enhanced security.
  - name: Unconfined
    uid: '@azure/arm-containerservice.KnownSeccompDefault.Unconfined'
    package: '@azure/arm-containerservice'
    summary: No seccomp profile is applied, allowing all system calls.
