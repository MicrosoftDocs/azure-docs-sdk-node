### YamlMime:TSTypeAlias
name: StepStateStatus
uid: '@azure/arm-networkcloud.StepStateStatus'
package: '@azure/arm-networkcloud'
summary: >-
  The status of the step. A value of Completed or Failed indicates a terminal
  state for the step. \

  [KnownStepStateStatus](xref:@azure/arm-networkcloud.KnownStepStateStatus) can
  be used interchangeably with StepStateStatus,
   this enum contains the known values that the service supports.
  ### Known values supported by the service

  **Completed**: The completed status. \

  **InProgress**: The in-progress status. \

  **Failed**: The failed status. \

  **NotStarted**: The not started status.
fullName: StepStateStatus
remarks: ''
isDeprecated: false
syntax: |
  type StepStateStatus = string
