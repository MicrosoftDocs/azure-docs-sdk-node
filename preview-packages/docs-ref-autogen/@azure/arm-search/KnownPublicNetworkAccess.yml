### YamlMime:TSEnum
name: KnownPublicNetworkAccess
uid: '@azure/arm-search.KnownPublicNetworkAccess'
package: '@azure/arm-search'
summary: >-
  This value can be set to 'Enabled' to avoid breaking changes on existing
  customer resources and templates. If set to 'Disabled', traffic over public
  interface is not allowed, and private endpoint connections would be the
  exclusive access method.
fullName: KnownPublicNetworkAccess
remarks: ''
isDeprecated: false
fields:
  - name: Disabled
    uid: '@azure/arm-search.KnownPublicNetworkAccess.Disabled'
    package: '@azure/arm-search'
    summary: >-
      The search service is not accessible from traffic originating from the
      public internet. Access is only permitted over approved private endpoint
      connections.
  - name: Enabled
    uid: '@azure/arm-search.KnownPublicNetworkAccess.Enabled'
    package: '@azure/arm-search'
    summary: >-
      The search service is accessible from traffic originating from the public
      internet.
  - name: SecuredByPerimeter
    uid: '@azure/arm-search.KnownPublicNetworkAccess.SecuredByPerimeter'
    package: '@azure/arm-search'
    summary: >-
      The network security perimeter configuration rules allow or disallow
      public network access to the resource. Requires an associated network
      security perimeter.
