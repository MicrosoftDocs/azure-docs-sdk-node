name: FabricPeeringEnabled
uid: '@azure/arm-networkcloud.FabricPeeringEnabled'
package: '@azure/arm-networkcloud'
summary: >-
  The indicator to specify if the load balancer peers with the network fabric. \

  [KnownFabricPeeringEnabled](xref:@azure/arm-networkcloud.KnownFabricPeeringEnabled)
  can be used interchangeably with FabricPeeringEnabled,
   this enum contains the known values that the service supports.
  ### Known values supported by the service

  **True**: Enable fabric peering. \

  **False**: Disable fabric peering.
