### YamlMime:TSTypeAlias
name: CustomCaptureConfigurationsStatus
uid: '@azure/arm-paloaltonetworksngfw.CustomCaptureConfigurationsStatus'
package: '@azure/arm-paloaltonetworksngfw'
summary: >-
  Current state of the custom capture operation. Single source of truth —
  clients poll until this reaches a terminal value (Success / Failed). \

  [KnownCustomCaptureConfigurationsStatus](xref:@azure/arm-paloaltonetworksngfw.KnownCustomCaptureConfigurationsStatus)
  can be used interchangeably with CustomCaptureConfigurationsStatus,
   this enum contains the known values that the service supports.
  ### Known values supported by the service

  **InProgress**: Capture is still running. \

  **Success**: Capture completed successfully and the file has been written to
  storage. \

  **Failed**: Capture failed; see properties.pcapDetailReason and the root error
  envelope for details.
fullName: CustomCaptureConfigurationsStatus
remarks: ''
isDeprecated: false
syntax: |
  type CustomCaptureConfigurationsStatus = string
