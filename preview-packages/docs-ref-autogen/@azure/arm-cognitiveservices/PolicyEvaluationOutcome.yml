name: PolicyEvaluationOutcome
uid: '@azure/arm-cognitiveservices.PolicyEvaluationOutcome'
package: '@azure/arm-cognitiveservices'
summary: >-
  The outcome of a policy evaluation. \

  [KnownPolicyEvaluationOutcome](xref:@azure/arm-cognitiveservices.KnownPolicyEvaluationOutcome)
  can be used interchangeably with PolicyEvaluationOutcome,
   this enum contains the known values that the service supports.
  ### Known values supported by the service

  **Compliant**: The deployment is compliant with all policies. \

  **NonCompliant**: The deployment violates one or more policies. \

  **Error**: An error occurred during evaluation.
