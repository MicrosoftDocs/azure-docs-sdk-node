name: FoundryAutoUpgradeMode
uid: '@azure/arm-cognitiveservices.FoundryAutoUpgradeMode'
package: '@azure/arm-cognitiveservices'
summary: >-
  Represents the mode for foundry auto-upgrade configuration. \

  [KnownFoundryAutoUpgradeMode](xref:@azure/arm-cognitiveservices.KnownFoundryAutoUpgradeMode)
  can be used interchangeably with FoundryAutoUpgradeMode,
   this enum contains the known values that the service supports.
  ### Known values supported by the service

  **Enabled**: Auto-upgrade is enabled. \

  **Disabled**: Auto-upgrade is disabled (opted out).
