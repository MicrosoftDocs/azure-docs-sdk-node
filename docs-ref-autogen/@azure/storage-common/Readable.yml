  - name: >-
      every((data: any, options?: Abortable) => boolean | Promise<boolean>,
      Pick<ReadableOperatorOptions, "signal" | "concurrency">)
    uid: '@azure/storage-common.Readable.every'
    package: '@azure/storage-common'
    summary: >-
      This method is similar to `Array.prototype.every` and calls *fn* on each
      chunk in the stream

      to check if all awaited return values are truthy value for *fn*. Once an
      *fn* call on a chunk

      `await`ed return value is falsy, the stream is destroyed and the promise
      is fulfilled with `false`.

      If all of the *fn* calls on the chunks return a truthy value, the promise
      is fulfilled with `true`.
    remarks: ''
    isDeprecated: false
    syntax:
      content: >-
        function every(fn: (data: any, options?: Abortable) => boolean |
        Promise<boolean>, options?: Pick<ReadableOperatorOptions, "signal" |
        "concurrency">): Promise<boolean>
      parameters:
        - id: fn
          type: >-
            (data: any, options?: Abortable) =&gt; boolean |
            Promise&lt;boolean&gt;
          description: a function to call on each chunk of the stream. Async or not.
        - id: options
          type: Pick&lt;ReadableOperatorOptions, "signal" | "concurrency"&gt;
          description: ''
      return:
        description: >-
          a promise evaluating to `true` if *fn* returned a truthy value for
          every one of the chunks.
        type: Promise&lt;boolean&gt;
  - name: >-
      filter((data: any, options?: Abortable) => boolean | Promise<boolean>,
      ReadableOperatorOptions)
    uid: '@azure/storage-common.Readable.filter'
    package: '@azure/storage-common'
    summary: >-
      This method allows filtering the stream. For each chunk in the stream the
      *fn* function will be called

      and if it returns a truthy value, the chunk will be passed to the result
      stream.

      If the *fn* function returns a promise - that promise will be `await`ed.
    remarks: ''
    isDeprecated: false
    syntax:
      content: >-
        function filter(fn: (data: any, options?: Abortable) => boolean |
        Promise<boolean>, options?: ReadableOperatorOptions): Readable
      parameters:
        - id: fn
          type: >-
            (data: any, options?: Abortable) =&gt; boolean |
            Promise&lt;boolean&gt;
          description: a function to filter chunks from the stream. Async or not.
        - id: options
          type: ReadableOperatorOptions
          description: ''
      return:
        description: a stream filtered with the predicate *fn*.
        type: <xref uid="@azure/storage-common.Readable" />
