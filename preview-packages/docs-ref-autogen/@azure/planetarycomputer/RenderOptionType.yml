name: RenderOptionType
uid: '@azure/planetarycomputer.RenderOptionType'
package: '@azure/planetarycomputer'
summary: >-
  Specifies the types of render options for map visualization. \

  [KnownRenderOptionType](xref:@azure/planetarycomputer.KnownRenderOptionType)
  can be used interchangeably with RenderOptionType,
   this enum contains the known values that the service supports.
  ### Known values supported by the service

  **raster-tile**: Raster tile rendering type. \

  **vt-polygon**: Vector tile polygon rendering type. \

  **vt-line**: Vector tile line rendering type.
fullName: RenderOptionType
remarks: ''
isDeprecated: false
syntax: |
  type RenderOptionType = string
