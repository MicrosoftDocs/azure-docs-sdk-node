### YamlMime:TSEnum
name: KnownClusterContinueUpdateVersionSafeguardMode
uid: '@azure/arm-networkcloud.KnownClusterContinueUpdateVersionSafeguardMode'
package: '@azure/arm-networkcloud'
summary: >-
  ClusterContinueUpdateVersionSafeguardMode represents the mode of the cluster
  continue update safeguards.
fullName: KnownClusterContinueUpdateVersionSafeguardMode
remarks: ''
isDeprecated: false
fields:
  - name: All
    uid: '@azure/arm-networkcloud.KnownClusterContinueUpdateVersionSafeguardMode.All'
    package: '@azure/arm-networkcloud'
    summary: >-
      Run all pre‑operation validation checks before continuing the version
      update. If any check fails, the request is rejected and no changes are
      made.
  - name: None
    uid: >-
      @azure/arm-networkcloud.KnownClusterContinueUpdateVersionSafeguardMode.None
    package: '@azure/arm-networkcloud'
    summary: >-
      Skip all safeguards and continue the version update without running
      pre‑operation validation checks.
