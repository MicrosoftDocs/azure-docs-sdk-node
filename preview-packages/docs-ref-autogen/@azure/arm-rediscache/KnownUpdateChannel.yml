### YamlMime:TSEnum
name: KnownUpdateChannel
uid: '@azure/arm-rediscache.KnownUpdateChannel'
package: '@azure/arm-rediscache'
summary: >-
  Optional: Specifies the update channel for the monthly Redis updates your
  Redis Cache will receive. Caches using 'Preview' update channel get latest
  Redis updates at least 4 weeks ahead of 'Stable' channel caches. Default value
  is 'Stable'.
fullName: KnownUpdateChannel
remarks: ''
isDeprecated: false
fields:
  - name: Preview
    uid: '@azure/arm-rediscache.KnownUpdateChannel.Preview'
    package: '@azure/arm-rediscache'
    summary: >-
      Preview channel normally receives updates before Stable channel, and is
      the recommended channel for non-production workloads.
  - name: Stable
    uid: '@azure/arm-rediscache.KnownUpdateChannel.Stable'
    package: '@azure/arm-rediscache'
    summary: >-
      Stable channel receives updates, which may include important security and
      stability updates, later than Preview channel.
