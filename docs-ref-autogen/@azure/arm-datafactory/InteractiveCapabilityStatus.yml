name: InteractiveCapabilityStatus
uid: '@azure/arm-datafactory.InteractiveCapabilityStatus'
package: '@azure/arm-datafactory'
summary: >-
  The interactive authoring capability status. Must be one of
  InteractiveCapabilityStatus. The default value is 'Enabling'. \

  [KnownInteractiveCapabilityStatus](xref:@azure/arm-datafactory.KnownInteractiveCapabilityStatus)
  can be used interchangeably with InteractiveCapabilityStatus,
   this enum contains the known values that the service supports.
  ### Known values supported by the service

  **Enabling**: Enabling \

  **Enabled**: Enabled \

  **Disabling**: Disabling \

  **Disabled**: Disabled
