### YamlMime:TSTypeAlias
name: ReservationType
uid: '@azure/arm-compute.ReservationType'
package: '@azure/arm-compute'
summary: >-
  Indicates the type of capacity reservation. Allowed values are 'Block' for
  block capacity reservations and 'Targeted' for reservations that enable a VM
  to consume a specific capacity reservation when a capacity reservation group
  is provided. The reservation type is immutable and cannot be changed after it
  is assigned. \

  [KnownReservationType](xref:@azure/arm-compute.KnownReservationType) can be
  used interchangeably with ReservationType,
   this enum contains the known values that the service supports.
  ### Known values supported by the service

  **Targeted**: To consume on demand allocated capacity reservation when a
  capacity reservation group is provided. \

  **Block**: To consume scheduled allocated block capacity reservation when a
  capacity reservation group is provided.
fullName: ReservationType
remarks: ''
isDeprecated: false
syntax: |
  type ReservationType = string
