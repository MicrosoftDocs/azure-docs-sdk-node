### YamlMime:TSTypeAlias
name: DependenciesAggregationType
uid: '@azure/arm-cloudhealth.DependenciesAggregationType'
package: '@azure/arm-cloudhealth'
summary: >-
  Aggregation type for child dependencies. \

  [KnownDependenciesAggregationType](xref:@azure/arm-cloudhealth.KnownDependenciesAggregationType)
  can be used interchangeably with DependenciesAggregationType,
   this enum contains the known values that the service supports.
  ### Known values supported by the service

  **WorstOf**: Default behavior: Worst child health state is propagated. \

  **MinHealthy**: Healthy if the count/percentage of healthy children meets the
  threshold. \

  **MaxNotHealthy**: Healthy if the count/percentage of not-healthy children
  stays below the threshold.
fullName: DependenciesAggregationType
remarks: ''
isDeprecated: false
syntax: |
  type DependenciesAggregationType = string
