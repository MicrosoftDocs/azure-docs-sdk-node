name: InstanceFlexibility
uid: '@azure/arm-billing.InstanceFlexibility'
package: '@azure/arm-billing'
summary: >-
  Turning this on will apply the reservation discount to other VMs in the same
  VM size group. Only specify for VirtualMachines reserved resource type. \

  [KnownInstanceFlexibility](xref:@azure/arm-billing.KnownInstanceFlexibility)
  can be used interchangeably with InstanceFlexibility,
   this enum contains the known values that the service supports.
  ### Known values supported by the service

  **On**: On \

  **Off**: Off
