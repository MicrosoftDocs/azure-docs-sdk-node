### YamlMime:TSEnum
name: KnownDeploymentState
uid: '@azure/arm-cognitiveservices.KnownDeploymentState'
package: '@azure/arm-cognitiveservices'
summary: >-
  The state of the deployment. Controls whether the deployment is accepting
  inference requests. Use 'Running' for active deployments that process
  requests, or 'Paused' to temporarily stop inference while preserving the
  deployment configuration.
fullName: KnownDeploymentState
remarks: ''
isDeprecated: false
fields:
  - name: Paused
    uid: '@azure/arm-cognitiveservices.KnownDeploymentState.Paused'
    package: '@azure/arm-cognitiveservices'
    summary: The deployment is paused and not accepting inference requests.
  - name: Running
    uid: '@azure/arm-cognitiveservices.KnownDeploymentState.Running'
    package: '@azure/arm-cognitiveservices'
    summary: The deployment is running and accepting inference requests.
