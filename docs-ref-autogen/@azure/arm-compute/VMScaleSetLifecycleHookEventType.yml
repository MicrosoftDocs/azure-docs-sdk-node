### YamlMime:TSTypeAlias
name: VMScaleSetLifecycleHookEventType
uid: '@azure/arm-compute.VMScaleSetLifecycleHookEventType'
package: '@azure/arm-compute'
summary: >-
  Specifies the scenario for which the customer is interested in receiving
  virtual machine scale set lifecycle hook events. \

  [KnownVMScaleSetLifecycleHookEventType](xref:@azure/arm-compute.KnownVMScaleSetLifecycleHookEventType)
  can be used interchangeably with VMScaleSetLifecycleHookEventType,
   this enum contains the known values that the service supports.
  ### Known values supported by the service

  **UpgradeAutoOSScheduling**: Lifecycle hook event sent to the customer before
  an Auto OS Upgrade operation starts on the virtual machine scale set. \

  **UpgradeAutoOSRollingBatchStarting**: Lifecycle hook event sent to the
  customer before upgrade starts on a batch of virtual machines belonging to a
  virtual machine scale set during an Auto OS Upgrade operation.
fullName: VMScaleSetLifecycleHookEventType
remarks: ''
isDeprecated: false
syntax: |
  type VMScaleSetLifecycleHookEventType = string
