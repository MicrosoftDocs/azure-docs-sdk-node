name: ManagedEventHubState
uid: '@azure/arm-purview.ManagedEventHubState'
package: '@azure/arm-purview'
summary: >-
  Gets or sets the state of managed eventhub. If enabled managed eventhub will
  be created, if disabled the managed eventhub will be removed. \

  [KnownManagedEventHubState](xref:@azure/arm-purview.KnownManagedEventHubState)
  can be used interchangeably with ManagedEventHubState,
   this enum contains the known values that the service supports.
  ### Known values supported by the service

  **NotSpecified**: NotSpecified \

  **Disabled**: Disabled \

  **Enabled**: Enabled
