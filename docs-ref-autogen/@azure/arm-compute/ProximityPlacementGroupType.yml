name: ProximityPlacementGroupType
uid: '@azure/arm-compute.ProximityPlacementGroupType'
package: '@azure/arm-compute'
summary: >-
  Specifies the type of the proximity placement group. Possible values are:
  **Standard** : Co-locate resources within an Azure region or Availability
  Zone. **Ultra** : For future use. \

  [KnownProximityPlacementGroupType](xref:@azure/arm-compute.KnownProximityPlacementGroupType)
  can be used interchangeably with ProximityPlacementGroupType,
   this enum contains the known values that the service supports.
  ### Known values supported by the service

  **Standard** \

  **Ultra**
