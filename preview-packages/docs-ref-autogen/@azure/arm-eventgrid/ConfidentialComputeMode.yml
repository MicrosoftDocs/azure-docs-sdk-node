### YamlMime:TSTypeAlias
name: ConfidentialComputeMode
uid: '@azure/arm-eventgrid.ConfidentialComputeMode'
package: '@azure/arm-eventgrid'
summary: >-
  This property specifies the mode of the Azure Confidential Compute
  configuration.

  Possible values are 'Disabled' or 'Enabled'.

  This is an immutable property set at the time of resource creation and cannot
  be modified later.

  Enabling this property ensures that messages are processed and stored in a
  Azure Confidential Compute environment. \

  [KnownConfidentialComputeMode](xref:@azure/arm-eventgrid.KnownConfidentialComputeMode)
  can be used interchangeably with ConfidentialComputeMode,
   this enum contains the known values that the service supports.
  ### Known values supported by the service

  **Disabled**: Disabled \

  **Enabled**: Enabled
fullName: ConfidentialComputeMode
remarks: ''
isDeprecated: false
syntax: |
  type ConfidentialComputeMode = string
